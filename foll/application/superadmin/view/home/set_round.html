{extend name='public/public' /}
{block name="hea"}
{/block}
{block name="menu"}
{/block}
{block name='main'}
<div class="site-text" style="margin-right:196px;">
<form class="layui-form layui-form-pane" action="" id="p">
    <input type="hidden" name="mid" value="{$id}">
    <div class="layui-form-item">
        <label class="layui-form-label">轮次名称</label>
        <div class="layui-input-block">
            <input type="text" name="name[]" id="name[]" value="" required="" lay-verify="required" placeholder="请输入轮次名称" autocomplete="off" class="layui-input">
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">中签人数</label>
        <div class="layui-input-block">
            <input type="text" name="count[]" id="count[]" value="" required="" lay-verify="required" placeholder="请输入中签人数" autocomplete="off" class="layui-input">
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">摇号时间</label>
        <div class="layui-input-block">
            <input type="text" name="time[]"  id="time[]" value="" required="" lay-verify="required" placeholder="请选择摇号时间" autocomplete="off" class="layui-input timer">
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">抽签人员
        </label>
        <div class="layui-input-block">
            <input type="text" name="lottery_user[]" id="lottery_user[]" value=""  required="" lay-verify="required" placeholder="请输入手机号" autocomplete="off" class="layui-input">
        </div>
    </div>
    <div id="pp"></div>
    <div class="layui-form-item">
        <label class="layui-form-label">摇号方式</label>
        <div class="layui-input-block">
            <input type="radio" name="lottery_type" value="0" title="系统摇号">
            <input type="radio" name="lottery_type" value="1" title="人工摇号" checked>
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">摇号地点</label>
        <div class="layui-input-block">
            <input type="text" name="lottery_addr" id="" value=""  placeholder="地址" autocomplete="off" class="layui-input">
        </div>
    </div>
    <div class="layui-form-item">
        <button class="layui-btn" lay-submit="" lay-filter="formDemoPane">提交全部</button>
        <button class="layui-btn" onclick="Add(this)">新增下轮</button>
        <button class="layui-btn" onclick="Del(this)">删除本轮</button>
    </div>
</form>
</div>
<link rel="stylesheet" href="./static/plugins/layui/css/modules/laydate/default/laydate.css">
<script src="./static/plugins/layui/jquery.js"></script>
<script src="./static/plugins/layui/layui.js"></script>
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>
<!--<script src="./static/plugins/layui/lay/modules/laydate.js"></script>-->
<script>
    layui.use(['layer','laydate','form'], function(){
        layer = layui.layer;
        laydate = layui.laydate;
        form = layui.form;
        laydate.render({
            elem: '.timer', //指定元素
            type:"datetime"
        });

        form.on("submit(formDemoPane)",function (data) {
            var index = layer.load(1, {
                shade: [0.1,'#fff'] //0.1透明度的白色背景
            });
            axios.post("{:Url('superadmin/savelotteryround')}",{data:data.field}).then(function (response) {
                console.dir(response.data);
                layer.close(index);
                if(response.data.code == 0){
                    console.log("wc");
                    layer.msg(response.data.msg);
                }else{
                    layer.msg(response.data.msg);
                }
            }).catch(function (err) {
                layer.msg(err);
            })
            return false;
        })
    });


    function Add(obj) {

        var h = ' <div><div style="border-top:1px solid black;margin-bottom:12px;"></div> <div class="layui-form-item">\n' +
            '        <label class="layui-form-label">轮次名称</label>\n' +
            '        <div class="layui-input-block">\n' +
            '            <input type="text" name="name[]" id="name[]" required="" value="" lay-verify="required" placeholder="请输入轮次名称" autocomplete="off" class="layui-input">\n' +
            '        </div>\n' +
            '    </div>\n' +
            '    <div class="layui-form-item">\n' +
            '        <label class="layui-form-label">中签人数</label>\n' +
            '        <div class="layui-input-block">\n' +
            '            <input type="text" name="count[]" id="count[]" required="" value="" lay-verify="required" placeholder="请输入中签人数" autocomplete="off" class="layui-input">\n' +
            '        </div>\n' +
            '    </div>\n' +
            '    <div class="layui-form-item">\n' +
            '        <label class="layui-form-label">摇号时间</label>\n' +
            '        <div class="layui-input-block">\n' +
            '            <input type="text" name="time[]" id="time[]" required=""  value="" lay-verify="required" lay-filter="time" placeholder="请输入摇号时间" autocomplete="off" class="layui-input timer">\n' +
            '        </div>\n' +
            '    </div>\n' +
            '    <div class="layui-form-item">\n' +
            '        <label class="layui-form-label">抽签人员\n' +
            '        </label>\n' +
            '        <div class="layui-input-block">\n' +
            '            <input type="text" name="lottery_user[]" id="lottery_user[]" value="" required="" lay-verify="required" placeholder="请输入手机号" autocomplete="off" class="layui-input">\n' +
            '        </div>\n' +
            '    </div></div>';
        $("#pp").append(h);
        // form.render(null,"time");

        lay('.timer').each(function() {
            laydate.render({
                elem: this,
                type: 'datetime',
            });
        });
        return false;
    }

    function Del() {
        $("#pp").children(':last-child').remove();
    }

</script>

{/block}
