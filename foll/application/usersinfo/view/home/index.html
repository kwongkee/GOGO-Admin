<!DOCTYPE >
<!DOCTYPE html>
<html lang="zh">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<meta http-equiv="X-UA-Compatible" content="ie=edge" />
	<title>{$title}</title>
	<link rel="stylesheet" type="text/css" href="__STATIC__/plugins/layui/css/layui.css"/>
	<script type="text/javascript" src="__STATIC__/plugins/layui/layui.js"></script>
	<style type="text/css">
		.header{width: 100%;height: 50px;line-height: 50px;background:#2e6da4;color: #fff}
		.title{margin-left: 20px;font-size: 20px;}
		.userinfo{float: right;margin-right: 20px;}
		.userinfo a{color:#fff;}
		.menu{width: 200px;background: #333744;position: absolute;}
		.main{position: absolute;left: 200px;right: 16px;padding-left: 20px;}

		.layui-collapse{border: none;}
		.layui-colla-item{border: none;}
		.layui-colla-title{background: #42485b;color: #fff}
		.layui-colla-content{padding: 0px;border-top: none;}
	</style>
</head>
<body>
	<!-- header -->
	<div class="header">
		<span class="title"><span style="font-size:15px;"></span>{$title}</span>
		<span class="userinfo">{$admin.user_name}【{$admin.user_mobile}】<span><a href="javascript:;" onclick="logout()">退出</a></span></span>
	</div>
	
	<!-- menu 菜单 -->
	<div class="menu" id="menu">
		<div class="layui-collapse" lay-accordion>
		  	{if condition="$admin.platform eq 'parking'"}
		  	<div class="layui-colla-item">
		    	<h2 class="layui-colla-title">停车用户信息</h2>
		    	<div class="layui-colla-content">
					<ul class="layui-nav layui-nav-tree" lay-filter="test">
					  	<li class="layui-nav-item">
					  		<a href="javascript:;" onclick="menuFire(this)" src="usersinfo/parking">查看用户信息</a>
					  	</li>
					</ul>
		    	</div>
		  	</div>
		  	{elseif condition="$admin.platform eq 'Crossborder'"}
		  	<div class="layui-colla-item">
		    	<h2 class="layui-colla-title">跨境用户信息</h2>
		    	<div class="layui-colla-content">
					<ul class="layui-nav layui-nav-tree" lay-filter="test">
					  	<li class="layui-nav-item">
					  		<a href="javascript:;" onclick="menuFire(this)" src="usersinfo/crossborder">查看用户信息</a>
					  	</li>
					</ul>
		    	</div>
		  	</div>
		  	{/if}
		</div>
	</div>
	
	<!-- 主操作页面 onload="resetMainHeight(this)"   -->
	<div class="main">
		<iframe src="{:Url('usersinfo/welcome')}" id="iframes" style="width: 100%;height: 100%;" frameborder="0" scrolling="0"></iframe>
	</div>
	
	<script>
		//注意：折叠面板 依赖 element 模块，否则无法进行功能性操作
		layui.use(['element','jquery','layer'], function(){
		  var element = layui.element;
		  	$ = layui.jquery;
		  	layer = layui.layer;
		  	restMenuHeight();
		});

		// 重新设置菜单容器高度
		function restMenuHeight(){
			var height = document.documentElement.clientHeight - 50;
			$('#menu').height(height);
		}

		// 重置设置主操作页面的高度
		function resetMainHeight(obj){
			var height = parent.document.documentElement.clientHeight - 53;
			$(obj).parent('div').height(height);
		}

		// 菜单点击事件
		function menuFire(obj){
			// 获取url
			var src = $(obj).attr('src');
			// 设置iframe的src
			$('iframe').attr('src','http://shop.gogo198.cn/foll/public/?s='+src);
		}

		// 退出
		function logout(){

			layer.confirm('确定要退出吗?',{
				icon:3,
				btn:['确定','取消']
			},function(){
				$.post("{:Url('usersinfo/logout')}",function(res) {
					if(res.code <= 0) {
						layer.msg(res.msg,{icon:2});
					} else {
						layer.msg(res.msg,{icon:1});
						setTimeout(function(){
							window.location.href = "{:Url('usersinfo/login')}";
						},1000);
					}
				},'json');
			});
		}
	</script>
</body>
</html>
