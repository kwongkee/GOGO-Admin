	<script type="text/javascript">
		layui.use(['layer','form','jquery'],function(){
			form = layui.form;
			layer = layui.layer;
			$ = layui.jquery;
		});

		// 保存管理员
		function save() {
//			var id = parseInt($('input[name="id"]').val());
			var CnAddr = $.trim($('input[name="domain[CnAddr]"]').val());//公司名称
			var licenseId = $.trim($('input[name="domain[licenseId]"]').val());//营业执照
			var OrgNo = $.trim($('input[name="domain[OrgNo]"]').val());//机构代码
			var role = $.trim($('input[name="domain[role]"]').val());//跨境角色
			var Qualify = $.trim($('input[name="domain[Qualify]"]').val());//许可业务
			var email = $.trim($('input[name="domain[email]"]').val());//许可业务
			if(CnAddr == ''){
				layer.alert('请输入企业名称',{icon:2});
				return false;
			}

			if(licenseId == ''){
				layer.alert('请输入营业执照',{icon:2});
				return false;
			}
			
			if(OrgNo == ''){
				layer.alert('请输入机构代码',{icon:2});
				return false;
			}
			
			if(role == ''){
				layer.alert('请输入跨境角色',{icon:2});
				return false;
			}
			
			if(Qualify == ''){
				layer.alert('请输入许可业务',{icon:2});
				return false;
			}
            if(email == ''){
                layer.alert('请输入企业邮箱',{icon:2});
                return false;
            }
			$.post("{:Url('Record/subjectsSave')}",$('#form1').serialize(),function(res){
				console.dir(res);
				
				if(res.code > 0){
					layer.alert(res.msg,{icon:2});
				} else {
					layer.alert(res.msg,{icon:1});
					setTimeout(function(){
						window.location.reload();
					},1000);
				}
			});
		}

	</script>
