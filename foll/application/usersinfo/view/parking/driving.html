<!DOCTYPE html>
<html>
<head>
  	<meta charset="utf-8">
  	<title>{$info.title}</title>
  	<meta name="renderer" content="webkit">
  	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  	<link rel="stylesheet" type="text/css" href="__STATIC__/plugins/layui/css/layui.css"/>
	<script type="text/javascript" src="__STATIC__/plugins/layui/layui.js"></script>
	<style type="text/css">
		.hrsd{margin: 15px auto;}
	</style>
</head>

<body>
<div style="margin-top: 10px;"></div>
<p><h2 style="text-align: center;color: green;font-weight: bold;">{$info.title}</h2></p>
<div class="hrsd">
	
</div>
<form action="" class="layui-form layui-form-pane">
	
	<div class="layui-form-item">
		<label class="layui-form-label">驾驶证号</label>
		<div class="layui-input-block">
			<input type="text" readonly="readonly" lay-verify="title" autocomplete="off" class="layui-input" value="{$info.driverlicense}"/>
		</div>
	</div>
	
	<div class="layui-form-item">
		<div class="layui-form-label">用户姓名</div>
		<div class="layui-input-block">
			<input type="text" readonly="readonly" lay-verify="required" autocomplete="off" class="layui-input" value="{$info.uname}" />
		</div>
	</div>
	
	<div class="layui-form-item">
	    <label class="layui-form-label">用户地址</label>
	    <div class="layui-input-block">
	      <input type="text" readonly="readonly" lay-verify="required"  autocomplete="off" class="layui-input" value="{$info.addr}">
	    </div>
	</div>
	
	<div class="layui-form-item">
	    <label class="layui-form-label">认证时间</label>
	    <div class="layui-input-block">
	      <input type="text" readonly="readonly" lay-verify="required"  autocomplete="off" class="layui-input" value="{$info.time|date='Y-m-d H:i:s',###}">
	    </div>
	</div>
	
	<div class="layui-form-item">
	    <label class="layui-form-label">认证状态</label>
	    <div class="layui-input-block">
	      <input type="text" readonly="readonly" lay-verify="required"  autocomplete="off" class="layui-input" value="认证成功">
	    </div>
	</div>
	
</form>

</body>
</html>
