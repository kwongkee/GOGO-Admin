<!DOCTYPE html>
<html>
<head>
	<title></title>
	<link rel="stylesheet" type="text/css" href="__STATIC__/plugins/layui/css/layui.css"/>
	<script type="text/javascript" src="__STATIC__/plugins/layui/layui.js"></script>
	<style>
		.header span{background: #009688;margin-left: 30px;padding: 10px;color: #fff;}
		.header div{border-bottom:solid 2px #009688;margin-top: 8px;}
		.header button{float: right;margin-top: -5px;}
	</style>
</head>
<body style="padding:10px;">
	<div class="header">
		<span>菜单管理</span>
		<div></div>
	</div>
	
	{if condition="$pid>0"}
	<button style="float:right;margin:5px 0px;" class="layui-btn layui-btn-pirmary layui-btn-sm" onclick="back({$backid});return false;">返回上级</button>
	{/if}
	<table class="layui-table">
		<thead>
			<tr>
				<td>ID</td>
				<td>排序</td>
				<td>菜单名称</td>
				<td>Controller</td>
				<td>method</td>
				<td>是否隐藏</td>
				<td>是否禁用</td>
				<td>操作</td>
			</tr>
		</thead>
		<form class="layui-form">
		<tbody>
			{volist name="data.lists" id="vo"}
			<tr>
				<td>{$vo.id}</td>
				<td><input type="text" class="layui-input" name="ords[{$vo.id}]" value="{$vo.list_order}"></td>
				<td><input type="text" class="layui-input" name="title[{$vo.id}]" value="{$vo.name}"></td>
				<td><input type="text" class="layui-input" name="model[{$vo.id}]" value="{$vo.model}"></td>
				<td><input type="text" class="layui-input" name="action[{$vo.id}]" value="{$vo.action}"></td>
				<td><input type="checkbox" lay-skin="primary" name="ishiddens[{$vo.id}]" title="隐藏" {$vo.ishidden?'checked':''} value="1"> 隐藏</td>
				<td><input type="checkbox" lay-skin="primary" name="status[{$vo.id}]" title="禁用" {$vo.status?'checked':''} value="1"> 禁用</td>
				<td><button class="layui-btn layui-btn-xs" onclick="child({$vo.id});return false;">子菜单</button></td>
			</tr>
			{/volist}

			<tr>
				<td></td>
				<td><input type="text" class="layui-input" name="ords[0]"></td>
				<td><input type="text" class="layui-input" name="title[0]"></td>
				<td><input type="text" class="layui-input" name="model[0]"></td>
				<td><input type="text" class="layui-input" name="action[0]"></td>
				<td><input type="checkbox" lay-skin="primary" name="ishiddens[0]" title="隐藏" value="1"> 隐藏</td>
				<td><input type="checkbox" lay-skin="primary" name="status[0]" title="禁用" value="1"> 禁用</td>
				<td></td>
			</tr>
			<input type="hidden" name="pid" value="{$pid}">
		</tbody>
		</form>
	</table>
	
	<button class="layui-btn" onclick="save();">保存</button>

	<script type="text/javascript">
		layui.use(['layer','form','jquery'],function(){
			$ = layui.jquery;
			layer = layui.layer;
			var form = layui.form;
		});

		// 子菜单
		function child(pid){
			window.location.href = "{:Url('menu/index')}&pid="+pid;
		}

		// 返回上一级
		function back(pid) {
			window.location.href = "{:Url('menu/index')}&pid="+pid;
		}

		// 保存
		function save(){
			$.post("{:Url('menu/save')}",$('form').serialize(),function(res){
				if(res.code > 0){
					layer.alert(res.msg,{'icon':2});
				} else {
					layer.msg(res.msg,{'icon':1});
					setTimeout(function(){window.location.reload();},1000);
				}
			},'json');
		}
	</script>
</body>
</html>
