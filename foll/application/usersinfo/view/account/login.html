<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>{$order.title}</title>
		<link rel="stylesheet" type="text/css" href="__STATIC__/plugins/layui/css/layui.css"/>
		<script type="text/javascript" src="__STATIC__/plugins/layui/layui.js"></script>
		<!--<script type="text/javascript" src="__STATIC__/plugins/layui/jquery.js"></script>-->
		<style>
			body{
				background: #00FF00 url(./static/plugins/layui/images/bg.jpg) no-repeat fixed top;
			}
			.imgs{margin-top: -15px;margin-bottom: 25px;text-align: center;}
		</style>
	</head>
	<body>
		<div style="position: absolute;left: 50%;top: 50%;width: 500px;margin-left: -250px;margin-top: -200px;">
			
			<p class="imgs"><img width="350px" src="./static/plugins/layui/images/bg3.png" alt="" /></p>
			
			<div style="background: #fff;padding: 20px;border-radius: 4px;box-shadow: 5px 5px 20px #444;">
				<div class="layui-form">
					<div class="layui-form-item" style="color: gray;text-align: center">
						<h2>{$order.title}</h2>
					</div>
					<hr />
					
					<div class="layui-form-item">
						<label class="layui-form-label">手机号</label>
						<div class="layui-input-block">
							<input type="text" class="layui-input" name="username" maxlength="11" id="username" value=""/>
						</div>
					</div>
					
					<div class="layui-form-item">
						<label class="layui-form-label">所属平台</label>
						<div class="layui-input-block">
							<select name="platform" lay-verify="required" id="platform">
						       <option value=""></option>
						       {volist name="$plat" id="vo" key="index"}
						       <option value="{$vo.value}">{$vo.name}</option>
						       {/volist}
						    </select>
						</div>
					</div>
					
					<div class="layui-form-item">
						<label class="layui-form-label">验证码</label>
						<div class="layui-input-inline">
							<input type="text" id="verifycode" name="yzm" value="" class="layui-input"/>
						</div>
						<!--<img src="{:captcha_src()}" onclick="reloadImg()" id="img" />-->
						<button class="layui-btn" id="sendCode" onclick="sendYzm(this)">发送验证码</button>
					</div>
					
					<div class="layui-form-item">
						<div class="layui-input-block">
							<button class="layui-btn layui-btn-lg" onclick="dologin()">立即登录</button>
							
						</div>
					</div>
					
				</div>
			</div>
		</div>
		<div style="color: #ffff;
		display: block;
    	margin-right: auto;
    	margin-left: auto;margin-top: 40%;">
			<div style="text-align:center;position: relative">
				版权所有 佛山市钜铭商务资讯服务有限公司 &nbsp; &nbsp;
			</div>
			<div style="position: absolute;margin-left: 45%;">
				<a style="color: white" href="http://www.miitbeian.gov.cn" target="_blank">粤ICP备09003656号</a>
			</div>
		</div>
	</body>
	<script type="text/javascript">			
			layui.use(['layer','form','jquery'],function(){
				$ = layui.jquery;
				layer = layui.layer;
				var form = layui.form;
				
				// 用户名控件获取焦点 
				$('#username').focus();
				// 回车登录
				$('input').keydown(function(e){
					if(e.keyCode == 13){
						dologin();
					}
				});
			});
			
			//登录 
			function dologin()
			{
				var username = $.trim($('#username').val());
				var verifycode = $.trim($('#verifycode').val());
				var platform   = $.trim($('#platform').val());
				
				if(username == ''){
					layer.alert('请输入手机号',{icon:2});
					return;
				}
				
				if(platform == ''){
					layer.alert('请输选择平台',{icon:2});
					return;
				}
				
				if(verifycode == ''){
					layer.alert('请输入验证码',{icon:2});
					return;
				}
				
				$.post("{:Url('usersinfo/LoginChecked')}",{'username':username,'yzm':verifycode,'platform':platform},function(res){
					if(res.code <= 0){
						layer.alert(res.msg,{icon:2});
					} else {
						layer.msg(res.msg);
							setTimeout(function(){ //登录成功跳转后台   菜单页
								window.location.href = "{:Url('usersinfo/home')}"
							},1000);
					}
				},'json');
				
			}
			
			//倒计时
			var n=60;
		    function timers(){
		        n-=1;
		        if(n==0){
		        	n=60
		        	
		            $("#sendCode").html("发送验证码");
		            $('#sendCode').removeClass('layui-btn-disabled');
		        }else{
		        	
		        	$('#sendCode').addClass('layui-btn-disabled');
		            $("#sendCode").html(n+"秒后重发");
		            setTimeout(function () {
		                timers();
		            },1000);
		        }
		    }
		    
		    //发送验证码
		    function sendYzm(obj) {
		    	var username=$("#username").val();
		    	var platform   = $.trim($('#platform').val());
				
				if(username == ''){
					layer.alert('手机号不能为空',{icon:2});
					return;
				}
				
				if(platform == ''){
					layer.alert('请输选择平台',{icon:2});
					return;
				}
		    	
		    	if(username.strlen > 11){
		    		layer.msg('请检查手机号码长度');
		    		return false;
		    	}
		    	
	    		var myreg=/^[1][3,4,5,7,8][0-9]{9}$/; //手机正则
	    		if (!myreg.test(username)){
	    			layer.msg('手机号码不正确，请检查');
	                return false; 
	            }else{
	            	if(n==60) {
	            		
			            $.get("{:Url('usersinfo/sendCode')}&username="+$("#username").val()+'&platform='+$("#platform").val(),function(res){
							if(res.code > 0) {
								timers();
								layer.msg(res.msg);
							}else {
								layer.msg(res.msg);
							}
			            },'json');
		       		}
	            }
		    }
		</script>
</html>
