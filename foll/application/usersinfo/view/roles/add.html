<!DOCTYPE html>
<html>
<head>
	<title>角色添加</title>
	<link rel="stylesheet" type="text/css" href="__STATIC__/plugins/layui/css/layui.css	"/>
	<script type="text/javascript" src="__STATIC__/plugins/layui/layui.js"></script>
	<!-- <script type="text/javascript" src="__STATIC__/plugins/layui/jquery.js"></script> -->
	<style>
		.header span{background: #009688;margin-left: 30px;padding: 10px;color: #fff;}
		.header div{border-bottom:solid 2px #009688;margin-top: 8px;}
		.header button{float: right;margin-top: -5px;}
	</style>
</head>
<body style="padding:10px;">
	<form class="layui-form">
		<input type="hidden" name="gid" value="{$role.gid}">
		<div class="layui-form-item">
			<label class="layui-form-label">角色名称</label>
			<div class="layui-input-block">
				<input type="text" class="layui-input" name="title" value="{$role.title}">
			</div>
		</div>

		<div class="layui-form-item">
			<label for="" class="layui-form-label">权限菜单</label>
			{volist name="menus" id="vo"}
			<hr>
			<div class="layui-input-block">
				<input type="checkbox" name="menu[{$vo.id}]" lay-skin="primary" title="{$vo.name}" {:isset($role['rights']) && $role['rights'] && in_array($vo.id,$role['rights'])?'checked':''}>
				<hr>
				{volist name="vo.children" id="cvo"}
					<input type="checkbox" name="menu[{$cvo.id}]" lay-skin="primary" title="{$cvo.name}" {:isset($role['rights']) && $role['rights'] && in_array($cvo.id,$role['rights'])?'checked':''}>
				{/volist}
			</div>
			{/volist}
		</div>
	</form>
	<hr>
	<div class="layui-form-item" style="margin-top: 10px">
		<div class="layui-input-block">
			<button class="layui-btn" onclick="save();">保存</button>
		</div>
	</div>
</body>
<script type="text/javascript">
	layui.use(['layer','form','jquery'],function(){
		$ = layui.jquery;
		layer = layui.layer;
		var form = layui.form;
	});
	// 保存
	function save() {
		var title = $('input[name="title"]').val();
		if(title == ''){
			layer.msg('请填写角色名称',{'icon':2});
			return;
		}
		$.post("{:Url('roles/save')}",$('form').serialize(),function(res){
			if(res.code>0) {
				layer.msg(res.msg,{'icon':2});
			} else {
				layer.msg(res.msg,{'icon':1});
				setTimeout(function(){
					parent.window.location.reload();
				},1000);
			}
		},'json');

	}
</script>
</html>
