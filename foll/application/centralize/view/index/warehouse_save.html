{include file="public/header"}

<style>
    .disf{display:flex;align-items: center;}
    .layui-card-header{background:#0a8ddf;color:#fff;}
</style>
<body style="padding: 10px;background-color: #f2f2f2;">
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <form class="layui-form" action="" method="post" lay-filter="component-form-element">
            <input type="text" style="display:none;" name="id" id="id" value="{$id}">
            <div class="layui-col-md12">
                <div class="layui-card">
                    <div class="layui-card-body">
                        <div class="layui-form-item">
                            <div class="layui-form-label">仓库名称</div>
                            <div class="layui-input-block">
                                <input type="text" class="layui-input" lay-verify="required" name="warehouse_name" id="warehouse_name" value="{$data['warehouse_name']}">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">联系人</div>
                            <div class="layui-input-block">
                                <input type="text" class="layui-input" lay-verify="required" name="name" id="name" value="{$data['name']}">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">手机号</div>
                            <div class="layui-input-block">
                                <input type="number" class="layui-input" lay-verify="required" name="mobile" id="mobile" value="{$data['mobile']}">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">邮政编号</div>
                            <div class="layui-input-block">
                                <input type="number" class="layui-input" lay-verify="required" name="postal_code" id="postal_code" value="{$data['postal_code']}">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">详细地址</div>
                            <div class="layui-input-block">
                                <input type="text" class="layui-input" lay-verify="required" name="address" id="address" value="{$data['address']}">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">仓库类型</div>
                            <div class="layui-input-block">
                                <select name="type" id="type" lay-verify="required">
                                    <option value="1">国内仓库</option>
                                    <option value="2">海外仓库</option>
                                </select>
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">国家地区</div>
                            <div class="layui-input-block">
                                <select name="country_code" id="country_code" lay-verify="required" lay-search>
                                    {foreach $country_code as $k=>$v}
                                    <option value="{$v['code_value']}">{$v['code_name']}</option>
                                    {/foreach}
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="layui-form-item" style="margin-top: 25px;text-align: center;">
                <div>
                    <button class="layui-btn layui-btn-normal" lay-submit lay-filter="component-form-element">立即提交</button>
                    <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                </div>
            </div>
        </form>
    </div>
</div>
</body>

    <script type="text/javascript">
    layui.use(['layer','form','laydate','upload'],function(){
        laydate = layui.laydate;
        layer = layui.layer;
        var form  = layui.form;
        $ = layui.jquery;
        var upload = layui.upload;

        form.on('submit(component-form-element)', function(data){
            // JSON.stringify()
            // console.log(data.field);return false;

            $.ajax({
                url:"{:Url('centralize/index/warehouse_save')}",
                method:'post',
                data:data.field,
                dataType:'JSON',
                success:function(res){
                    layer.msg(res.msg,{time:2000}, function () {
                        if(res.code == 0)
                        {
                            parent.location.reload();
                        }
                    });
                },
                error:function (data) {
                    layer.msg('系统错误',{time:2000});
                }
            });
            return false;
        });
    });
</script>
</body>
</html>
