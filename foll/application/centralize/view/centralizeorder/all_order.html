{include file="public/header_new"}

<style>
    img{ width:20px;height:20px;}
</style>
<body class="gray-bg">

<div class="row">
    <div class="col-sm-12">
        <div class="ibox float-e-margins">
            <div class="ibox-content">
                <h3 style="text-align: center;">
                    {if $op==1}
                        待付款列表
                    {elseif($op==2)}
                        待发货列表
                    {elseif($op==3)}
                        已发货列表
                    {elseif($op==4)}
                        已完成列表
                    {/if}
                </h3>
                <div id="toolbar" class="btn-group" style="margin-top: 10px;margin-bottom: 10px;line-height: 34px;">

                </div>
                <table id="table"

                /*默认排序项*/
                data-sort-name="id"
                data-sort-order="desc"
                /*工具栏相关*/
                data-toolbar="#toolbar"
                data-search="true"          /*搜索框*/
                data-search-on-enter-key="false"
                data-show-refresh="true"    /*刷新按钮*/
                /*分页相关*/
                data-side-pagination="server"
                data-pagination="true"      /*显示分页*/
                data-page-size="10"         /*每页显示条数*/
                /*移动端相关*/
                data-mobile-responsive="true"
                data-card-view="true"
                data-show-columns="true"
                /*radio or checkbox字段名称*/
                data-select-item-name="id" >

                <thead>
                <tr>
                    <th data-field="checkbox"
                        data-align="center"
                        data-checkbox="true"></th>
                    <th data-field="id"
                        data-align="center"
                        data-sortable="true"
                        data-visible="true">ID</th>
                    <th data-field="member_info"
                        data-align="center"
                        data-sortable="true">会员名称</th>
                    <th data-field="package_no"
                        data-align="center"
                        data-sortable="true">包裹合并单号</th>
                    <th data-field="package_name"
                        data-align="center"
                        data-sortable="true">包裹申报名称</th>
                    <th data-field="package_money"
                        data-align="center"
                        data-sortable="true">包裹价值（￥）</th>
                    <th data-field="totalPrice"
                        data-align="center"
                        data-sortable="true">支付金额（HK$）</th>
                    <th data-field="line_info"
                        data-align="center"
                        data-sortable="true">线路名称</th>
                    <th data-field="method_id"
                        data-align="center"
                        data-sortable="true">取货方式</th>
                    <th data-field="createtime"
                        data-align="center"
                        data-sortable="true">合并时间</th>
                    <th data-field="manage"
                        data-align="center"
                        data-sortable="true"
                        data-formatter="actionFormatter">操作</th>
                </tr>
                </thead>
                </table>
            </div>
        </div>
    </div>
</div>

<script type="text/javascript">

    var table;

    $(document).ready(function(){
        table = $('#table').bootstrapTable({
            url: "{:url('centralize/centralizeorder/all_order')}",
            queryParams: queryParams,
        });
        $('.form-control').attr('placeholder','搜索包裹合并单号');
    });

    queryParams = function (params) {
        var temp = {
            sort: params.sort,
            order: params.order,
            limit: params.limit,            //页面大小
            offset: params.offset,          //页码
            search: params.search,
            op:"{$op}"
        };
        return temp;
    };

    //操作栏的格式化
    function actionFormatter(value, row, index) {
        var id = row.id;
        var title = row.package_no;

        var result = "";
        if(row.status==2){
            //待发货
            result += '<button style="margin-right: 5px;" type="button" onclick="openWindow('+id+',\''+title+'\',\''+2+'\')" class="btn btn-primary btn-xs">立即发货</button>';
        }else if(row.status==5){
            result += '<button style="margin-right: 5px;" type="button" onclick="openWindow('+id+',\''+title+'\',\''+3+'\')" class="btn btn-danger btn-xs">处理退换货申请</button>';
        }


        result += '<button style="margin-right: 5px;" type="button" onclick="openWindow('+id+',\''+title+'\',\''+1+'\')" class="btn btn-success btn-xs">详情</button>';
        return result;
    }

    function edit(id,name){
        var index = layer.open({
            type: 2,
            title: name+' 审核',
            area:['600px','500px'],
            content: "{:url('centralize/centralizeorder/packing_check')}&id="+id
        });
        // layer.full(index);
    }

    function del(id,title){
        layer.confirm('确认删除该会员吗？',function(index){
            $.ajax({
                url: "<?php echo Url('centralize/member/member_del'); ?>",
                data:{'id':id},
                type:'post',
                cache:false,
                dataType:'json',
                success:function(data){
                    if(data.code==1)
                    {
                        layer.msg(data.msg, {
                            icon: 1,
                            time: 2000
                        }, function(){
                            window.location.reload();
                        });
                        return true;
                    }else {
                        layer.msg(data.message, {icon:2, time:2000});
                        return false;
                    }
                },
                error:function() {
                    layer.msg('系统出错,请重试',{icon:2,time:1000});
                }
            });
        });
    }

    function openWindow(id,title,type){
        if(type==1){
            var index = layer.open({
                type: 2,
                title: title+' 详情',
                area:['100%','100%'],
                content: "{:url('centralize/centralizeorder/parcel_merge_order_detail')}&id="+id+"&type="+type+"&name="+title
            });
        }else if(type==2){
            var index = layer.open({
                type: 2,
                title: title+' 发货',
                area:['600px','500px'],
                content: "{:url('centralize/centralizeorder/deliver_goods')}&id="+id+"&type="+type+"&name="+title
            });
        }else if(type==3){
            var index = layer.open({
                type: 2,
                title: title+' 处理退换货申请',
                area:['600px','500px'],
                content: "{:url('centralize/centralizeorder/return_goods_apply')}&id="+id+"&type="+type+"&name="+title
            });
        }
    }
</script>

</body>
</html>
