<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>配置用户信息</title>
    <link rel="stylesheet" href="./static/hadmin/assets/layui/css/layui.css">
    <link rel="stylesheet" href="./static/hadmin/assets/common.css"/>
    <link href="static/cklein/css/style.css" rel="stylesheet">
    <link href="static/cklein/css/bootstrap.min.css" rel="stylesheet">
    <style>
        form{
            margin-top: 47px;
            margin-right: 32px;
        }
        .layui-form-label{
            width:110px;
        }
        .tel,.email,.code{display:none;}
    </style>
</head>
<body class="gray-bg">
<form class="layui-form" action="">
    <input type="text" name="id" value="{$id}" style="display:none;">
    <div class="layui-form-item">
        <label class="layui-form-label">用户名称</label>
        <div class="layui-input-inline">
            <input type="text" name="name" lay-verify="required" value="{$data['name']}" placeholder="请输入用户名称" autocomplete="off" class="layui-input">
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">注册方式</label>
        <div class="layui-input-inline layui-select-fscon">
            <select name="type" lay-filter="type" lay-filter="type">
                <option value="">请选择注册方式</option>
                <option value="1" {if $data['type']==1}selected{/if}>手机</option>
                <option value="2" {if $data['type']==2}selected{/if}>邮箱</option>
            </select>
        </div>
    </div>
    <div class="layui-form-item tel">
        <label class="layui-form-label">手机号码</label>
        <div class="layui-input-inline">
            <input type="text" name="tel" value="{$data['tel']}" placeholder="请输入手机号码" autocomplete="off" class="layui-input">
        </div>
    </div>
    <div class="layui-form-item email">
        <label class="layui-form-label">电子邮箱</label>
        <div class="layui-input-inline">
            <input type="text" name="email" value="{$data['email']}" placeholder="请输入电子邮箱" autocomplete="off" class="layui-input">
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">选择企业</label>
        <div class="layui-input-inline layui-select-fscon">
            <select name="ent_id" lay-filter="ent_id" lay-search>
                <option value="">请选择企业</option>
                {volist name="enterprise" id="vo"}
                <option value="{$vo.id}" {if $data['ent_id']==$vo.id}selected{/if}>{$vo.enterprise_name}</option>
                {/volist}
            </select>
        </div>
    </div>
<!--    <div class="layui-form-item code">-->
<!--        <label class="layui-form-label">验证码</label>-->
<!--        <div class="layui-input-inline">-->
<!--            <input type="text" name="code" value="" placeholder="请输入验证码" autocomplete="off" class="layui-input">-->
<!--        </div>-->
<!--    </div>-->
<!--    <div class="layui-form-item">-->
<!--        <label class="layui-form-label">选择角色</label>-->
<!--        <div class="layui-input-inline layui-select-fscon">-->
<!--            <select name="role_id" lay-filter="role_id" lay-search>-->
<!--                <option value="">请选择角色</option>-->
<!--                    <option value=""></option>-->
<!--            </select>-->
<!--        </div>-->
<!--    </div>-->

    <div class="layui-form-item">
        <div class="layui-input-block">
            <div class="layui-footer" style="left: 0;">
                <button class="layui-btn" lay-submit="" lay-filter="component-form-demo1">立即提交</button>
                <button type="reset" class="layui-btn layui-btn-primary">重置</button>
            </div>
        </div>
    </div>
</form>
</body>
<script src="./static/hadmin/assets/layui/layui.js"></script>
<script src="./static/hadmin/assets/jquery-3.2.1.min.js"></script>
<script src="./static/hadmin/assets/layui/xm-select.js"></script>
<script>
    layui.use(['form','upload'], function(){
        var form = layui.form,upload = layui.upload;

        //选择注册方式
        form.on('select(type)',function(data){
            let val = data.value;

            if(val==1){
                $('.tel').show();
                $('.email').hide();
                // $('.code').show();
            }else if(val==2){
                $('.tel').hide();
                $('.email').show();
                // $('.code').show();
            }else{
                $('.tel').hide();
                $('.email').hide();
                // $('.code').hide();
            }
        });

        //监听提交
        form.on('submit(component-form-demo1)', function(data){
            // if(data.field['isCustomsDeclUnit']==1 && data.field['enterprise_id']==''){
            //     layer.msg('请选择报关单位！');
            //     return false;
            // }
            data.field['pa'] = 1;
            $.ajax({
                url:"{:Url('centralize/managemenber/save_person')}",
                method:'post',
                data:data.field,
                dataType:'JSON',
                success:function(res){
                    layer.msg(res.msg,{time:2000}, function () {
                        if(res.code == 1)
                        {
                            var index = parent.layer.getFrameIndex(window.name);
                            parent.layer.close(index);
                            parent.window.location.reload();
                        }
                    });
                },
                error:function (data) {
                    layer.msg('系统错误',{time:2000});
                }
            });
            return false;
        });
    });

</script>
</html>
