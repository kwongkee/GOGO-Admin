<!DOCTYPE html>
<html>

<head>
    {include file="common/meta"}
</head>

<body class="gray-bg">
<div class="col-sm-12">
    <div class="ibox float-e-margins">
        <div class="ibox-title" style="height:60px;">
            <button type="button" class="btn btn-info btn-lg" style="width: 100px;" id="add" onclick="window.location.href='{:url('admin/AdminAdvertingAdd')}'">展位添加</button>
        <div style="float:right">
        	<form action="{:url('admin/adminAdverting')}" method="post">
        		<select name="uniacid" id="">
        			<option value="">请选择公众号</option>
        			{volist name="wechats" id="v"}
	                    <option value="{$v['uniacid']}">{$v['name']}</option>
	                {/volist}
        		</select>
        		<select name="condition" id="">
        			<option value="">请选择...</option>
        			<option value="1">空闲</option>
        			<option value="2">非空闲</option>
        		</select>
        		<input type="text" name="number" placeholder="请输入编号"/>
        		<input type="submit" />
        	</form>
        </div>
        </div>
        <div class="ibox-content">
            <table class="table table-hover">
                <thead>
                <tr>
                    <th>id</th>
                    <th>名称</th>
                    <th>编号</th>
                    <th>类别</th>
                    <th>公众号</th>
                    <th>所属板块</th>
                    <th>费用</th>
                    <th>时间</th>
                    <th>状态</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody>
                {volist name="data" id="vo"}
                <tr>
                	<td>{$vo.id}</td>
                	<td>{$vo.adv_name}</td>
                	<td>{$vo.number}</td>
                	<td>{$Type['type'][$vo.type]}</td>
                	<td>{$vo.name}</td>
                	<td>{$vo.pagename}</td>
                	<td>{$vo.money}</td>
                	<td>{$vo.create_time|date="Y-m-d",###}</td>
                	<td>{if $vo.condition eq 1}空闲{else}非空闲{/if}</td>
                    <td><a class="btn btn-white btn-rounded" href="{:Url('admin/AdminAdvertingEdit')}&id={$vo.id}">编辑</a><a class="btn btn-danger btn-rounded" href="{:Url('admin/AdminAdvertingDel')}&id={$vo.id}">删除</a></td>
                </tr>
                {/volist}
                </tbody>
            </table>
            <div class="page">
		        <div>
		           {$page}
		        </div>
		    </div>
        </div>
    </div>
</div>

<!-- 全局js -->
<script src="./static/hadmin/js/jquery.min.js?v=2.1.4"></script>
<script src="./static/hadmin/js/bootstrap.min.js?v=3.3.6"></script>

<!-- 自定义js -->
<script src="./static/hadmin/js/content.js?v=1.0.0"></script>


<!-- Bootstrap table -->
<script src="./static/hadmin/js/plugins/bootstrap-table/bootstrap-table.min.js"></script>
<script src="./static/hadmin/js/plugins/bootstrap-table/bootstrap-table-mobile.min.js"></script>
<script src="./static/hadmin/js/plugins/bootstrap-table/locale/bootstrap-table-zh-CN.min.js"></script>
<script src="./static/hadmin/layui/layui.all.js"></script>
<!-- Peity -->
</body>

<script>
    function requestAdd(){
        var name=$("#name").val();
        var Authority=$('input[name="auth"]:checked').val();
        var status =$('input[name="optionsRadios"]:checked').val();
        var beizhu=$("#beizhu").val();
        $.post("{:Url('admin/AdminCharacterSave/')}",{"name":name,"authType":Authority,"roleStatus":status,"beizhu":beizhu},function (data) {
            if(!data.status){
                layer.msg(data.msg);
                return false;
            }
            layer.msg(data.msg);
        })
    }
</script>

</html>
