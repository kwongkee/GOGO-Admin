{include file="public/header"}

<body style="padding: 10px;">

<form action="" class="layui-form" id="form1">
    <div class="layui-form-item">
        <label for="" class="layui-form-label">商家企业</label>
        <div class="layui-input-inline">
            <select name="getMerch" lay-verify="">
                <option value="">请选择商家企业</option>
                {volist name="merch" id="vo"}
                <option value="{$vo['id']}-{$vo['mid']}">{$vo['nickname']}-{$vo['name']}</option>
                {/volist}
            </select>
        </div>
    </div>
    <!--该快递公司可用号段-->
    <span style="font-size: 14px;color:#ff5555;margin-bottom:10px;" class="this_exp_num"></span>
    <div class="layui-form-item">
        <label for="" class="layui-form-label">物流企业</label>
        <div class="layui-input-inline">
            <select name="getLogi" lay-verify="" lay-filter="getLogi">
                <option value="">请选择物流企业</option>
                {volist name="logistics" id="vo"}
                <option value="{$vo['id']}">{$vo['name']}-{$vo['code']}</option>
                {/volist}
            </select>
        </div>
    </div>

    <div class="layui-form-item">
        <label for="" class="layui-form-label">运单号数量</label>
        <div class="layui-input-inline">
            <input type="text" name="num" placeholder="请输入分配运单号数量" autocomplete="off" class="layui-input">
        </div>
        <!--<label class="layui-form-label">号段起止</label>-->
        <!--<div class="layui-input-inline" style="width: 150px;">-->
            <!--<input type="text" name="expNums" placeholder="开始号码段：0001" autocomplete="off" class="layui-input">-->
        <!--</div>-->
        <!--<div class="layui-form-mid">-</div>-->
        <!--<div class="layui-input-inline" style="width: 150px;">-->
            <!--<input type="text" name="expNumd" placeholder="截止号码段：9999" autocomplete="off" class="layui-input">-->
        <!--</div>-->
    </div>
    <input type="text" name="canUseNum" style="display:none;">
</form>

<div class="layui-form-item">
    <div class="layui-input-block">
        <button class="layui-btn" onclick="save()">确认分配</button>
    </div>
</div>

<script type="text/javascript">
    layui.use(['layer','form','laydate'],function(){
        laydate = layui.laydate;
        layer = layui.layer;
        var form  = layui.form;
        $ = layui.jquery;

        laydate.render({
            elem: '#Times' //指定元素
        });

        form.on('select(getLogi)', function(data){
            var index = layer.load(1);
            $.ajax({
                url:"{:url('admin/waybill/get_this_exp_way_num')}",
                type:"POST",
                dataType:"json",
                data:{express_id:data.value},
                success:function (ret){
                    layer.close(index);
                    if (ret.code==1){
                        $('.this_exp_num').text('可用号段：'+ret.str);
                        $('input[name="canUseNum"]').val(ret.num);
                    }else{
                        layer.msg(ret.msg);
                        $('.this_exp_num').text('');
                    }
                },
                error:function (xhr){
                    layer.close(index);
                    layer.msg('系统错误！');
                }
            });
            return false;
        });

    })


    // 添加管理员
    function save()
    {
        var getMerch          = $("select[name='getMerch'] option:selected").val();
        var getLogi          = $("select[name='getLogi'] option:selected").val();
        var num             = $('input[name="num"]').val();
        var canUseNum             = $('input[name="canUseNum"]').val();
        // var expNumd             = $('input[name="expNumd"]').val();
        // var expNumd             = $('input[name="expNumd"]').val();
        var this_exp_num             = $('.this_exp_num').text();

        if(getMerch == '') {
            layer.msg('请选中商家企业',{icon:2});
            return false;
        }

        if(getLogi == '') {
            layer.msg('请选中物流企业',{icon:2});
            return false;
        }

        if(this_exp_num==''){
            layer.msg('该快递公司还没有导入运单号',{icon:2});
            return false;
        }

        if(num=='') {
            layer.msg('请输入分配运单号数量',{icon:2});
            return false;
        }

        if(parseInt(num)>parseInt(canUseNum)){
            layer.msg('分配运单号数量不能超过可用运单号数量！',{icon:2,time:5000});
            return false;
        }

        // if(expNums == '' || expNums.length!=4) {
        //     layer.msg('请按规则输入起始号段',{icon:2});
        //     return false;
        // }
        //
        // if(expNumd == '' || expNumd.length!=4) {
        //     layer.msg('请按规则输入截止号段',{icon:2});
        //     return false;
        // }
        //
        // if(expNumd<=expNums){
        //     layer.msg('截止号不得小于起始号',{icon:2});
        //     return false;
        // }

        // 请求处理数据
        $.post("{:Url('admin/waybill/numberassign_add2')}",{
            getMerch:getMerch,
            getLogi:getLogi,
            num:num
            // expNums:expNums,
            // expNumd:expNumd,
        },function(resd){

            var res = JSON.parse(resd);
            if(res.code == 1) {
                layer.msg(res.msg,{icon:1});
                setTimeout(function(){
                    layer.closeAll();
                    parent.window.location.reload();
                },1000);
            } else {
                layer.msg(res.msg,{icon:2});
            }

        });
    }
</script>
</body>
</html>
