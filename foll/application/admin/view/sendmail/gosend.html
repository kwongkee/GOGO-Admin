{include file="public/header_new" /}

<!--百度富文本-->
<script type="text/javascript" src="static/cklein/plugins/ueditor/ueditor.config.js"></script>
<script type="text/javascript" src="static/cklein/plugins/ueditor/ueditor.all.min.js"> </script>
<script type="text/javascript" src="static/cklein/plugins/ueditor/lang/zh-cn/zh-cn.js"></script>

<script type="text/javascript">
    function gosendMail() {
        var email = $("#email").val();
        var title = $("#title").val();

        var ue = UE.getEditor('content');
        var content = ue.getContent();


        if(!email)
        {
            layer.msg('发送邮箱不能为空！', {icon:2, time:2000});
            return false;
        }

        if(!title)
        {
            layer.msg('发送标题不能为空！', {icon:2, time:2000});
            return false;
        }

        if(!content)
        {
            layer.msg('发送内容不能为空！', {icon:2, time:2000});
            return false;
        }

        layer.confirm('确认发送此邮件吗？',function(index){

            $.ajax({
                url: "{:Url('admin/sendmail/gosend')}",
                data:{'email':email, 'title':title, 'content':content},
                type:'post',
                cache:false,
                dataType:'json',
                success:function(data){
                    if(data.status==1)
                    {
                        layer.msg(data.message, {
                                    icon: 1,
                                    time: 2000
                                }, function(){
                                    parent.window.table.bootstrapTable('refresh');
                                    var index = parent.layer.getFrameIndex(window.name);
                                    parent.layer.close(index);
                                });
                                return true;
                    }else {
                        layer.msg(data.message, {icon:2, time:2000});
                        return false;
                    }
                },
                error:function() {
                   layer.msg('系统出错,请重试',{icon:2,time:1000});
                }
            });
        });


    }
</script>

<body class="gray-bg">

    <div class="wrapper wrapper-content">
        <div class="row">
            <div class="col-sm-12 animated fadeInRight">
                <div class="mail-box-header">
                    <div class="pull-right tooltip-demo">

                    </div>
                    <h2>
                    写信
                </h2>
                </div>
                <div class="mail-box">
                    <div class="mail-body">
                        <form class="form-horizontal" method="get">
                            <input type="hidden" id="see_code" value="{$see_code}">
                            <div class="form-group">
                                <label class="col-sm-2 control-label">发送到：</label>
                                <div class="col-sm-10">
                                    <textarea type="text" class="form-control" id="email" rows="4" cols="80">{if ($isSendCom==1)}198@gogo198.net;{/if}</textarea>
                                    <span class="help-block m-b-none">多个邮箱请用 ; 隔开</span>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-2 control-label">主题：</label>

                                <div class="col-sm-10">
                                    <input type="text" class="form-control" id="title">
                                </div>
                            </div>
                        </form>
                    </div>

                    <div class="mail-text h-200">
                        <script id="content" type="text/plain" style="width:100%;height:400px;"></script>
                        <div class="clearfix"></div>
                    </div>
                    <div class="mail-body text-right tooltip-demo">
                        {if ($isSendCom==1)}
                        <a href="javascript:history.back(-1);" class="layui-btn btn-info btn">返回</a>
                        {/if}
                        <button type="button" href="javascript:;" onClick="gosendMail()" class="btn btn-default">
                          发送
                        </button>
                    </div>
                    <div class="clearfix"></div>

                </div>

            </div>
        </div>
    </div>


	<script type="text/javascript">
    $(document).ready(function()
    {
        var ue = UE.getEditor('content', {
            initialFrameHeight: 400,
            serverUrl: 'static/cklein/plugins/ueditor/php/controller.php'
        });

    });
    </script>

</body>

</html>
