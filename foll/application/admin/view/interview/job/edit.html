{include file="public/header_new" /}

<!--百度富文本-->
<script type="text/javascript" src="static/cklein/plugins/ueditor/ueditor.config.js"></script>
<script type="text/javascript" src="static/cklein/plugins/ueditor/ueditor.all.min.js"> </script>
<script type="text/javascript" src="static/cklein/plugins/ueditor/lang/zh-cn/zh-cn.js"></script>

<script type="text/javascript">
    function gosendMail() {
        var id = $("#id").val();
        var job_name = $("#title").val();
        var ue = UE.getEditor('content');
        var job_description = ue.getContent();
        var ue2 = UE.getEditor('content2');
        var job_requirement = ue2.getContent();

        if(!job_name)
        {
            layer.msg('岗位名字不能为空！', {icon:2, time:2000});
            return false;
        }
        if(!job_description)
        {
            layer.msg('岗位描述不能为空！', {icon:2, time:2000});
            return false;
        }
        if(!job_requirement)
        {
            layer.msg('应聘条件不能为空！', {icon:2, time:2000});
            return false;
        }

        layer.confirm('确认修改该岗位吗？',function(index){
            $.ajax({
                url: "{:Url('admin/interview/jobedit')}",
                data:{'id':id,'job_name':job_name, 'job_description':job_description, 'job_requirement': job_requirement},
                type:'post',
                cache:false,
                dataType:'json',
                success:function(data){
                    if(data.status==1)
                    {
                        layer.msg(data.message, {
                                    icon: 1,
                                    time: 2000
                                }, function(){
                                    parent.window.table.bootstrapTable('refresh');
                                    var index = parent.layer.getFrameIndex(window.name);
                                    parent.layer.close(index);
                                });
                                return true;
                    }else {
                        layer.msg(data.message, {icon:2, time:2000});
                        return false;
                    }
                },
                error:function() {
                   layer.msg('系统出错,请重试',{icon:2,time:1000});
                }
            });
        });


    }
</script>

<body class="gray-bg">

    <div class="wrapper wrapper-content">
        <div class="row">
            <div class="col-sm-12 animated fadeInRight">
                <div class="mail-box">
                    <div class="mail-body">
                        <form class="form-horizontal" method="get">
                        	<input type="hidden" id="id" value="{$data['id']}">
                            <div class="form-group">
                                <label class="col-sm-2 control-label">岗位名称：</label>
                                <div class="col-sm-10">
                                    <input type="text" class="form-control" id="title" value="{$data['job_name']}">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-2 control-label">岗位描述：</label>
                                <div class="col-sm-10">
                                    <script id="content" type="text/plain" style="width:100%;height:400px;">{$data['job_description']|htmlspecialchars_decode|stripslashes}</script>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-2 control-label">应聘条件：</label>
                                <div class="col-sm-10">
                                    <script id="content2" type="text/plain" style="width:100%;height:400px;">{$data['job_requirement']|htmlspecialchars_decode|stripslashes}</script>
                                </div>
                            </div>

                            <div class="form-group">
                                <label class="col-sm-2 control-label"></label>
                                <div class="col-sm-10">
                                    <button type="button" href="javascript:;" onClick="gosendMail()" class="btn btn-primary">
                                        保存
                                      </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>


	<script type="text/javascript">
    $(document).ready(function()
    {
        var ue = UE.getEditor('content', {
            initialFrameHeight: 400,
            serverUrl: 'static/cklein/plugins/ueditor/php/controller.php'
        });
        var ue2 = UE.getEditor('content2', {
            initialFrameHeight: 400,
            serverUrl: 'static/cklein/plugins/ueditor/php/controller.php'
        });
    });
    </script>
</body>
</html>
