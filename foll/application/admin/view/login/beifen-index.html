<body class="signin">
    <div class="signinpanel">
        <div class="row">
            <div class="col-sm-12">
                <form method="post" action="{:Url('admin/loginUserVerif')}">
                    <h4 class="no-margins" style="color: #333;;">登录：</h4>
                    <p class="m-t-md" style="color: #333;">Gogo总后台登录</p>
                    <input type="text" name="username" class="form-control uname" placeholder="用户名" id="username" required=""/>
                    <input type="text" name="yzm" class="form-control pword m-b" placeholder="验证码" id="yzm" required=""/>
                    <a href="#" onclick="sendYzm(this);return false;" style="float: right;" id="sendCode">发送验证码</a>
     <!--               <a href="">忘记密码了？</a>-->
                    <button class="btn btn-success btn-block">登录</button>
                </form>
            </div>
        </div>
        <div class="signup-footer">
            <div class="pull-left">

            </div>
        </div>
    </div>
</body>
<script>
	//倒计时
	var n=60;
    function timers(){
//      console.log(1);
        n-=1;
        if(n==0){
        	n=60
            $("#sendCode").html("发送验证码");
        }else{
            $("#sendCode").html(n+"重试");
            setTimeout(function () {
                timers();
            },1000);
        }
    }
    
    //发送验证码
    function sendYzm(obj) {
    	var username=$("#username").val();
    	if(username==''){
    		layer.msg('用户名不能为空');
//			alert('用户名不能为空')
    		return false;
    	}else{
    		var myreg=/^[1][3,4,5,7,8][0-9]{9}$/; //手机正则
    		if (!myreg.test(username)){  
//  			layer.msg('手机格式错误');

    			
                return false;  
            }else{
            	if(n==60){
		        	timers();
		            $.get("{:Url('admin/sendCode')}&username="+$("#username").val(),function (e) {
		            	console.log(e)
		                if(e.code==001){
		                    layer.msg(e.msg);		                    
		                }else{
		                    layer.msg(e.msg);		                    
		                }
		            });
	       		}
            }
    	}
        return false;
    }
