<!DOCTYPE html>
<html>
<head>
    <title>查验风控</title>
    <link rel="stylesheet" type="text/css" href="__STATIC__/plugins/layui/css/layui.css"/>
    <script type="text/javascript" src="__STATIC__/plugins/layui/layui.js"></script>
    <style>
        .header span{background: #009688;margin-left: 30px;padding: 10px;color: #fff;}
        .header div{border-bottom:solid 2px #009688;margin-top: 8px;}
        .header button{float: right;margin-top: -5px;}
        .ths{font-size: 22px;font-weight: bold}
        .boys{font-size: 16px;}
    </style>
</head>
<body style="padding-top: 10px;">

<table class="layui-table">
    <thead>
    <tr>
        <th>批次编号</th>
        <th>操作</th>
    </tr>
    </thead>

    <tbody>
    {volist name='order' id='vo' key='k'}
    <tr>
        <td>{$vo.batch_num}</td>
        <td>
            <a href="{:url('insps/insplist')}&batch_num={$vo.batch_num}" class="layui-btn layui-btn-sm">查看风险</a>
        </td>
    </tr>
    {/volist}
    </tbody>
</table>

<div class="layui-box layui-laypage layui-laypage-default">{$page}</div>

<script>
    layui.use(['form','layer'], function() {
        $ = layui.jquery;
        var form = layui.form,layer = layui.layer;
    });

    // 添加操作
    function addPost() {
        var hscode   = $('input[name="hscode"]').val();
        var brand    = $('input[name="brand"]').val();
        var goodname = $('input[name="goodname"]').val();
        var desc     = $('input[name="desc"]').val();


        if(hscode == '') {
            layer.msg('HS编码不能为空');
            return false;
        }

        if(brand == '') {
            layer.msg('品牌名称不能为空');
            return false;
        }

        if(goodname == '') {
            layer.msg('商品名称不能为空');
            return false;
        }

        if(desc == '') {
            layer.msg('风险描述不能为空');
            return false;
        }

        $.post("{:url('insp/add')}",{
            hscode:hscode,brand:brand,goodname:goodname,desc:desc,
        },function(res) {
            var das = JSON.parse(res);
            if(das.status) {
                layer.msg(das.msg);
            } else {
                layer.msg(das.msg);
            }

            setTimeout(function(){
                document.location.reload();
            },800);
        });
    }

    // 删除功能
    function del(id) {

        if(id == '') {
            layer.msg('数据不允许删除');
            return false;
        }

        layer.confirm('您确定要删除吗？',{title:'消息提示',btn:['确认','取消'],icon:3},function(){

            $.post("{:url('insp/del')}",{id:id},function(res) {
                var das = JSON.parse(res);
                if(das.status) {
                    layer.msg(das.msg);
                    setTimeout(function(){
                        document.location.reload();
                    },800);
                } else {
                    layer.msg(das.msg);
                }
            })

        },function(){
            layer.msg('取消删除')
        })
    }

    function edit(id) {
        layer.open({
            type:2,
            title:'编辑查验风险',
            shadeClose:true,
            shade:0.3,
            area:['500px','450px'],
            content:"{:Url('insp/edit')}&id="+id,
            yes:function(){},
            end:function(){}
        });
    }
</script>


</body>
</html>
