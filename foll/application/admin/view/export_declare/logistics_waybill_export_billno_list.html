{include file="public/header_new"}
<style>
    img {
        width: 20px;
        height: 20px;
    }
</style>
<body class="gray-bg">

<div class="row">
    <div class="col-sm-12">
        <div class="ibox float-e-margins">

            <div class="ibox-content">
                <h3 style="text-align: center;">批次号：{$batchNum}运单号</h3>
                <table id="table"
                /*默认排序项*/
                data-sort-name="create_at"
                data-sort-order="desc"
                /*工具栏相关*/
                data-toolbar="#toolbar"
                data-search="true" /*搜索框*/
                data-search-on-enter-key="false"
                data-show-refresh="true" /*刷新按钮*/
                /*分页相关*/
                data-side-pagination="server"
                data-pagination="true" /*显示分页*/
                data-page-size="10" /*每页显示条数*/
                /*移动端相关*/
                data-mobile-responsive="true"
                data-card-view="true"
                data-show-columns="true"
                /*radio or checkbox字段名称*/
                data-select-item-name="tids" >

                <thead>
                <tr>
                    <th data-field="id"
                        data-align="center"
                        data-sortable="true">ID
                    </th>
                    <th data-field="logistics_no"
                        data-align="center"
                        data-sortable="true">运单号
                    </th>
                    <th data-field="freight"
                        data-align="center"
                        data-sortable="true">运费
                    </th>
                    <th data-field="pack_no"
                        data-align="center"
                        data-sortable="true">件数
                    </th>
                    <th data-field="gross_weight"
                        data-align="center"
                        data-sortable="true">毛重
                    </th>
                    <th data-field="action_message"
                        data-align="center"
                        data-sortable="true">申报信息
                    </th>
                    <th data-field="action_time"
                        data-align="center"
                        data-sortable="true">申报时间
                    </th>
                    <th data-field="create_at"
                        data-align="center"
                        data-sortable="true">创建时间
                    </th>
                </tr>
                </thead>
                </table>
            </div>
        </div>
    </div>
</div>

<script type="text/javascript">

    var table;

    $(document).ready(function () {
        table = $('#table').bootstrapTable({
            url: "{:url('admin/export/getLogisticsNo')}&batch_num={$batchNum}",
            queryParams: queryParams,
        });
    });

    queryParams = function (params) {
        var temp = {
            sort: params.sort,
            order: params.order,
            limit: params.limit,            //页面大小
            offset: params.offset,          //页码
        };
        return temp;
    };



</script>

</body>
</html>
