{include file="public/header_new"}
<style>
    img{ width:20px;height:20px;}
</style>
<body class="gray-bg">

<div class="row">
    <div class="col-sm-12">
        <div class="ibox float-e-margins">
            <div class="ibox-content">
                <h3 style="text-align: center;">电子订单申报</h3>
                <div id="toolbar" class="btn-group" style="margin-top: 10px;margin-bottom: 10px;line-height: 34px;">
                    <button type="button" href="javascript:;" onClick="addBody('新增主体','')" class="btn btn-default">
                        新增主体
                    </button>
<!--                    <button type="button" href="javascript:;" onClick="data_add('新增合并','')" class="btn btn-default">-->
<!--                        新增合并-->
<!--                    </button>-->
                </div>
                <table id="table"

                /*默认排序项*/
                data-sort-name="create_at"
                data-sort-order="desc"
                /*工具栏相关*/
                data-toolbar="#toolbar"
                data-search="true"          /*搜索框*/
                data-search-on-enter-key="false"
                data-show-refresh="true"    /*刷新按钮*/
                /*分页相关*/
                data-side-pagination="server"
                data-pagination="true"      /*显示分页*/
                data-page-size="10"         /*每页显示条数*/
                /*移动端相关*/
                data-mobile-responsive="true"
                data-card-view="true"
                data-show-columns="true"
                /*radio or checkbox字段名称*/
                data-select-item-name="tids" >

                <thead>
                <tr>
                    <th data-field="checkbox"
                        data-align="center"
                        data-checkbox="true"></th>
                    <th data-field="id"
                        data-align="center"
                        data-sortable="true"
                        data-visible="false">ID</th>
                    <th data-field="tracking_num"
                        data-align="center"
                        data-sortable="true">提单编号</th>
                    <th data-field="user_name"
                        data-align="center"
                        data-sortable="true">操作用户</th>
                    <th data-field="app_type"
                        data-align="center"
                        data-sortable="true">操作类型</th>
                    <th data-field="order_type"
                        data-align="center"
                        data-sortable="true">订单类型</th>
                    <th data-field="ebp_code"
                        data-align="center"
                        data-sortable="true">电商平台代码</th>
                    <th data-field="ebp_name"
                        data-align="center"
                        data-sortable="true">电商平台名称</th>
                    <th data-field="ebc_code"
                        data-align="center"
                        data-sortable="true">电商企业代码</th>
                    <th data-field="ebc_name"
                        data-align="center"
                        data-sortable="true">电商企业名称</th>
                    <th data-field="create_at"
                        data-align="center"
                        data-sortable="true">时间</th>
                    <th data-field="manage"
                        data-align="center"
                        data-sortable="true"
                        data-formatter="actionFormatter">操作</th>
                </tr>
                </thead>
                </table>
            </div>
        </div>
    </div>
</div>

<script type="text/javascript">

    var table;

    $(document).ready(function(){
        table = $('#table').bootstrapTable({
            url: "{:url('admin/export/getLading')}&type=CEB303Message",
            queryParams: queryParams,
        });
        $('.form-control').attr('placeholder','搜索提单编号');
    });

    queryParams = function (params) {
        var temp = {
            sort: params.sort,
            order: params.order,
            limit: params.limit,            //页面大小
            offset: params.offset,          //页码
            search: params.search,
        };
        return temp;
    };

    //操作栏的格式化
    function actionFormatter(value, row, index) {
        var id = row.tracking_num;
        var result = "";
        result += '<button style="margin-right: 5px;" type="button" onclick="batchView('+"'"+id+"'"+')" class="btn btn-primary btn-xs">查看批次</button>';
        return result;
    }

    function batchView(id) {
        var index = layer.open({
            type: 2,
            title: '出口电子订单批次列表',
            content: "{:url('admin/export/orderExportBatchView')}&tracking_num="+id
        });
        layer.full(index);
    }


    function addBody(title) {
        var a= table.bootstrapTable('getSelections');
        if(a.length==1){
            var index = layer.open({
                type: 2,
                title: title,
                area:['820px','600px'],
                content: "{:url('admin/export/addOrderBody')}&id="+a[0].id
            });

        }else{
            layer.msg("请选择行", {icon:5, time:2000});
        }

        // layer.full(index);
    }

    //发送
    function data_add(title,url)
    {
        layer.open({
            type: 2,
            title: title,
            area:['820px','600px'],
            content: "{:url('admin/export/newOrderMerge')}"
        });
        // var index = layer.open({
        //     type: 2,
        //     title: title,
        //     content: url
        // });
        // layer.full(index);
    }



</script>

</body>
</html>
