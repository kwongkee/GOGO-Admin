{include file="public/header_new"}
<style>
    img {
        width: 20px;
        height: 20px;
    }
</style>
<body class="gray-bg">

<div class="row">
    <div class="col-sm-12">
        <div class="ibox float-e-margins">

            <div class="ibox-content">
                <h3 style="text-align: center;">报关单申报</h3>
                <table id="table"
                /*默认排序项*/
                data-sort-name="create_at"
                data-sort-order="desc"
                /*工具栏相关*/
                data-toolbar="#toolbar"
                data-search="true" /*搜索框*/
                data-search-on-enter-key="false"
                data-show-refresh="true" /*刷新按钮*/
                /*分页相关*/
                data-side-pagination="server"
                data-pagination="true" /*显示分页*/
                data-page-size="10" /*每页显示条数*/
                /*移动端相关*/
                data-mobile-responsive="true"
                data-card-view="true"
                data-show-columns="true"
                /*radio or checkbox字段名称*/
                data-select-item-name="tids" >

                <thead>
                <tr>
                    <th data-field="id" data-align="center" data-sortable="true">ID</th>
                    <th data-field="tracking_num" data-align="center" data-sortable="true">提单编号</th>
                    <th data-field="user_name" data-align="center" data-sortable="true">操作用户</th>
                    <th data-field="agent_code" data-align="center" data-sortable="true">申报单位代码</th>
                    <th data-field="agent_name" data-align="center" data-sortable="true">申报单位名称</th>
                    <th data-field="custom_master" data-align="center" data-sortable="true">主管海关</th>
                    <th data-field="distinate_port" data-align="center" data-sortable="true">经停港</th>
                    <th data-field="ie_port" data-align="center" data-sortable="true">进出关别</th>
                    <th data-field="decl_trn_rel" data-align="center" data-sortable="true">报关转关标志</th>
                    <th data-field="create_at" data-align="center" data-sortable="true">时间</th>
                    <th data-field="manage" data-align="center" data-sortable="true" data-formatter="actionFormatter">操作
                    </th>
                </tr>
                </thead>
                </table>
            </div>
        </div>
    </div>
</div>

<script type="text/javascript">

    var table;

    $(document).ready(function () {
        table = $('#table').bootstrapTable({
            url: "{:url('admin/export/customsDeclarationList')}",
            method:"post",
            queryParams: queryParams,
        });
        $('.form-control').attr('placeholder', '搜索提单编号');
    });

    queryParams = function (params) {
        var temp = {
            sort: params.sort,
            order: params.order,
            limit: params.limit,            //页面大小
            offset: params.offset,          //页码
            search: params.search,
        };
        return temp;
    };

    //操作栏的格式化
    function actionFormatter(value, row, index) {
        var id = row.tracking_num;
        var result = "";
        result += '<button style="margin-right: 5px;" type="button" onclick="batchView(\''+id+'\');" class="btn btn-primary btn-xs">查看批次</button>';
        return result;
    }

    function batchView(id) {
        var index = layer.open({
            type: 2,
            title: '报关单批次列表',
            content: "{:url('admin/export/customsDeclarationBatchList')}&tracking_num=" + id
        });
        layer.full(index);
    }


</script>

</body>
</html>
