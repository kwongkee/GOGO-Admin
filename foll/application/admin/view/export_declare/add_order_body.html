{include file="public/header_new"}
<body class="gray-bg">
<form class="form-horizontal" style="margin-left: 18%;margin-top: 12%;">
    <input type="hidden" name="id" value="{$id}">
    <div class="form-group">
        <label for="dxp" class="col-sm-2 control-label">传输企业</label>
        <div class="col-sm-6">
            <select class="form-control" id="dxp" name="sid">
                <option>请选择</option>
                {volist name="cop" id="item"}
                <option value="{$item['id']}">{$item['area_code']}:{$item['decl_name']}</option>
                {/volist}
            </select>

        </div>
    </div>
    <div class="form-group">
        <label for="ebpCode" class="col-sm-2 control-label">电商平台代码</label>
        <div class="col-sm-6">
            <input type="text" class="form-control" name="ebp_code" id="ebpCode" placeholder="">
        </div>

    </div>
    <div class="form-group">

        <label for="ebpName" class="col-sm-2 control-label">电商平台名称</label>
        <div class="col-sm-6">
            <input type="text" class="form-control" name="ebp_name" id="ebpName" placeholder="">
        </div>
    </div>

    <div class="form-group">
        <label for="ebcCode" class="col-sm-2 control-label">电商企业代码</label>
        <div class="col-sm-6">
        <input type="text" class="form-control" name="ebc_code" id="ebcCode" placeholder="">
        </div>
    </div>
    <div class="form-group">
        <label for="ebcName" class="col-sm-2 control-label">电商企业名称</label>
        <div class="col-sm-6">
        <input type="text" class="form-control" name="ebc_name" id="ebcName" placeholder="">
        </div>
    </div>
    <button type="button" class="btn btn-primary btn-lg btn-block" onclick="req();return false;" style="width: 50%;margin-left: 16%;">新增</button>
</form>
</body>

<script type="text/javascript">
   function req() {
       let data={};
       let value = $('form').serializeArray();
       $.each(value,function (index,item) {
           data[item.name]=item.value;
       });
       var i=layer.load(1); //风格1的加载
       $.ajax({
           url:"{:url('admin/export/addOrderBody')}",
           type:"POST",
           dataType:"json",
           data:data,
           success:function (res) {
               layer.close(i);
               if(res.code<0){
                   layer.msg(res.msg, {icon:5, time:2000});
               }else{
                   layer.msg(res.msg, {icon:6, time:2000});
               }
           }
       });
       return false;
   }
</script>
</html>
