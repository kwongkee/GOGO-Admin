{include file="public/header_new"}

<body class="gray-bg">
    <div class="row">
        <div class="col-sm-12">
            <div class="ibox float-e-margins">
                <div class="ibox-content">
                    <div class="row">
                        <form action="{:url('admin/smallwechat/setauth')}" method="post" class="form form-horizontal" id="form" >
                            <input type="hidden" name="user_id" value="{$user_id}">
                            <input type="hidden" id="userauth" value="{$user.auth}">
                            <div class="form-group">
                                <label class="col-sm-2 control-label">权限配置</label>
                                <div class="col-sm-10">
                                    {volist name="auth" id="vo"}
                                    <div class="checkbox checkbox-success checkbox-inline">
                                        <input name="auth[]" type="checkbox" id="inlineCheckbox{$vo.id}" value="{$vo.id}">
                                        <label for="inlineCheckbox{$vo.id}"> {$vo.name} </label>
                                    </div>
                                    {/volist}
                                </div>
                            </div>

                            <div class="form-group">
                                <div class="col-sm-4 col-sm-offset-2">
                                    <button class="btn btn-primary" type="submit">保存修改</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    $(function()
    {
        var userauth = $("#userauth").val().split(",");
        for (var i = 0; i < userauth.length; i++) {
            $("#inlineCheckbox"+userauth[i]).attr("checked",true);
        }
        var form = $("#form").Validform({
            tiptype:2,
            postonce:true,//让表单只能提交一次，提交成功后再提交表单将不会有操作
            ajaxPost:true,
            tiptype:function(msg,o,cssctl){
                if(!o.obj.is("form"))
                {
                    var objtip=o.obj.siblings(".Validform_checktip");
                    cssctl(objtip,o.type);
                    objtip.text(msg);
                }
                else
                {
                    var objtip=o.obj.find("#msgtip");
                    cssctl(objtip,o.type);
                    objtip.text(msg);
                }
            },
            callback:function(data){
                if(data.status==1)
                {
                    layer.msg(data.message, {
                                icon: 1,
                                time: 2000
                            }, function(){
                                parent.window.table.bootstrapTable('refresh');
                                var index = parent.layer.getFrameIndex(window.name);
                                parent.layer.close(index);
                            });
                            return true;
                }
                else
                {
                    layer.msg(data.message, {icon:2, time:2000});
                    return false;
                }
            }
        });
    });
    </script>

</body>
</html>
