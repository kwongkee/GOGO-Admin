<!DOCTYPE html>
<html>

<head>
    {include file="common/meta"}
</head>

<body class="gray-bg">
<div class="col-sm-12">
    <div class="ibox float-e-margins">
        <div class="ibox-content"  id="list2">
            <form class="form-horizontal" method="post" action="{:Url('admin/businessAdminMenuAdd')}">
                <input type="hidden" name="id" value="" />
                <div class="form-group">
                    <label class="col-sm-2 control-label">应用名称app</label>
                    <div class="col-sm-10">
                        <input type="text" name="app" value="" placeholder="应用名称app" class="form-control">
                    </div>
                </div>
                <div class="form-group">
                    <label class="col-sm-2 control-label">控制器</label>
                    <div class="col-sm-10">
                        <input type="text" name="model" value="" placeholder="控制器" class="form-control">
                    </div>
                </div>
                <div class="form-group">
                    <label class="col-sm-2 control-label">所属父级分类</label>
                    <div class="col-sm-10">
                        <select name="parent_id" class="form-control m-b" id="">
                        	<option value=""></option>
                        	{volist name="menu" id="vo"}
                        	<option value="{$vo.id}" {if $vo.id eq $id}selected{/if}>{$vo.app}</option>
                        	{if !empty($menu.children)}
                	        {volist name="$menu.children" id="chil_menu"}
                	        <option value="{$chil_menu.id}">--&nbsp;&nbsp;&nbsp;{$chil_menu.app}</option>
                	        {/volist}
                	        {/if}
                        	{/volist}
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label class="col-sm-2 control-label">操作名称</label>
                    <div class="col-sm-10">
                        <input type="text" name="action" value="" placeholder="操作名称" class="form-control">
                    </div>
                </div>
                <div class="form-group">
                    <label class="col-sm-2 control-label">url参数</label>
                    <div class="col-sm-10">
                        <input type="text" name="url_param" value="" placeholder="url参数" class="form-control">
                    </div>
                </div>
                <div class="form-group">
                    <label class="col-sm-2 control-label">菜单类型</label>
                    <div class="col-sm-8">
                        <div class="radio i-checks">
                            <label><input type="radio" value="1" name="type"> <i></i>权限认证+菜单</label>
                            <label><input type="radio" value="0" name="type"> <i></i>只作为菜单</label>
                                
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label class="col-sm-2 control-label">状态</label>
                    <div class="col-sm-8">
                        <div class="radio i-checks">
                            <label><input type="radio" value="1" name="status"> <i></i>显示</label>
                            <label><input type="radio" value="0" name="status"> <i></i>不显示</label>      
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label class="col-sm-2 control-label">菜单名称</label>
                    <div class="col-sm-10">
                        <input type="text" name="name" value="" placeholder="菜单名称" class="form-control">
                    </div>
                </div>
                <div class="form-group">
                    <label class="col-sm-2 control-label">菜单图标</label>
                    <div class="col-sm-10">
                        <input type="text" name="icon" value="" placeholder="菜单图标" class="form-control">
                    </div>
                </div>
                <div class="form-group">
                    <label class="col-sm-2 control-label">备注</label>
                    <div class="col-sm-10">
                        <input type="text" name="remark" value="" placeholder="备注" class="form-control">
                    </div>
                </div>
                <div class="form-group">
                    <label class="col-sm-2 control-label">排序ID</label>
                    <div class="col-sm-10">
                        <input type="text" name="list_order" value="" placeholder="排序ID" class="form-control">
                    </div>
                </div>
                <div class="form-group">
                    <label class="col-sm-2 control-label">验证规则</label>
                    <div class="col-sm-10">
                        <input type="text" name="rule_param" value="" placeholder="验证规则" class="form-control">
                    </div>
                </div>
                <div class="form-group">
                    <label class="col-sm-2 control-label">nav_id</label>
                    <div class="col-sm-10">
                        <input type="text" name="nav_id" value="" placeholder="nav_id" class="form-control">
                    </div>
                </div>
                <div class="form-group">
                    <label class="col-sm-2 control-label">请求方式（日志生成）</label>
                    <div class="col-sm-10">
                        <input type="text" name="request" value="" placeholder="请求方式（日志生成）" class="form-control">
                    </div>
                </div>
                <div class="form-group">
                    <label class="col-sm-2 control-label">日志规则</label>
                    <div class="col-sm-10">
                        <input type="text" name="log_rule" value="" placeholder="日志规则" class="form-control">
                    </div>
                </div>
                <div class="form-group">
                    <div class="col-sm-offset-3 col-sm-8">
                        <button class="btn btn-sm btn-info" type="submit">更 新</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- 全局js -->
<script src="./static/hadmin/js/jquery.min.js?v=2.1.4"></script>
<script src="./static/hadmin/js/bootstrap.min.js?v=3.3.6"></script>
<!-- 自定义js -->
<script src="./static/hadmin/js/content.js?v=1.0.0"></script>
<!-- Bootstrap table -->
<script src="./static/hadmin/js/plugins/bootstrap-table/bootstrap-table.min.js"></script>
<script src="./static/hadmin/js/plugins/bootstrap-table/bootstrap-table-mobile.min.js"></script>
<script src="./static/hadmin/js/plugins/bootstrap-table/locale/bootstrap-table-zh-CN.min.js"></script>
</body>
</html>
