<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>新增</title>
    <link rel="stylesheet" href="./static/hadmin/assets/layui/css/layui.css">
    <link rel="stylesheet" href="./static/hadmin/assets/common.css"/>
    <style>
        form{
            margin-top: 47px;
            margin-right: 32px;
        }
    </style>
</head>
<body>
<form class="layui-form" action="">

    <div class="layui-form-item">
        <label class="layui-form-label">商户信息</label>
        <div class="layui-input-block">
            <select name="user_id" id="user_id" required  lay-verify="required" lay-search>
                <option value="">请选择商户</option>
                {volist name="user" id='vo'}
                <option value="{$vo.id}/{$vo.openid}">{$vo.user_name}-{$vo.user_tel}</option>
                {/volist}
            </select>
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">授权信息</label>
        <div class="layui-input-block">
            <input type="checkbox" name="app_type[platform_list]" title="平台清单" >
            <input type="checkbox" name="app_type[declare_list]" title="清单申报" >
            <input type="checkbox" name="app_type[logistics_dome]" title="物流单证" >
            <input type="checkbox" name="app_type[offshore_collection]" title="离岸收款" >
            <input type="checkbox" name="app_type[offshore_exchange]" title="离岸换汇" >
            <input type="checkbox" name="app_type[withdrawal]" title="结汇提现" >
            <input type="checkbox" name="app_type[offshore_transfer]" title="离岸转账" >
        </div>
    </div>

    <div class="layui-form-item">
        <div class="layui-input-block">
        <button class="layui-btn" lay-submit lay-filter="formDemo">立即发送</button>
        </div>
    </div>
</form>

</body>
    <script src="./static/hadmin/assets/layui/layui.js"></script>
    <script src="./static/hadmin/assets/jquery-3.2.1.min.js"></script>
    <script type="text/javascript" src="static/cklein/plugins/ueditor/ueditor.config.js"></script>
    <script type="text/javascript" src="static/cklein/plugins/ueditor/ueditor.all.min.js"> </script>
    <script type="text/javascript" src="static/cklein/plugins/ueditor/lang/zh-cn/zh-cn.js"></script>

    <script>
        layui.use(['form','upload'], function(){
            var form = layui.form,upload = layui.upload;

            //监听提交
            form.on('submit(formDemo)', function(data){
                $.ajax({
                    url:'{:Url("admin/authorization/send_auth_request")}',
                    type:"POST",
                    dataType:"json",
                    data:data.field,
                    success:function (res) {
                        if(res.code=1){
                            layer.msg(res.message, {
                                icon: 1,
                                time: 2000
                            }, function(){
                                parent.window.location.reload();
                                var index = parent.layer.getFrameIndex(window.name);
                                parent.layer.close(index);
                            });
                        }else{
                            layer.msg(res.message, {
                                icon: 2,
                                time: 2000
                            });
                        }

                    },
                    error:function (xhr) {
                        layer.msg('链接服务错误..');
                    }
                });
                return false;
            });
        });
    </script>
</html>
