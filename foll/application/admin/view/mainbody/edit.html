<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>海关申报系统菜单管理</title>
    <link rel="stylesheet" href="./static/hadmin/assets/layui/css/layui.css">
    <link rel="stylesheet" href="./static/hadmin/assets/common.css"/>
    <style>
        .layui-form-label{
            width:114px;
        }
        .layui-input-block {
            margin-left: 145px;
        }
    </style>
</head>
<body>

<form class="layui-form" action="">

    <div class="layui-form-item">
        <label class="layui-form-label"></label>
        <input type="hidden" name="id" value="{$data['id']}">
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">单一窗口类型</label>
        <div class="layui-input-block">
            <select name="ebp_type">
                <option value="1" {if condition="$data['ebp_type'] eq 1"} selected {/if}>广州单一窗口</option>
                <option value="2"  {if condition="$data['ebp_type'] eq 2"} selected {/if}>汕头</option>
                <option value="3"  {if condition="$data['ebp_type'] eq 3"} selected {/if}>佛山</option>
            </select>
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">电商平台编号</label>
        <div class="layui-input-block">
            <input type="text" name="ebp_ent_no" required  lay-verify="required" value="{$data['ebp_ent_no']}" placeholder="请输入电商平台编号" autocomplete="off" class="layui-input">
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">电商平台名称</label>
        <div class="layui-input-block">
            <input type="text" name="ebp_ent_name" value="{$data['ebp_ent_name']}"  placeholder="请输入电商平台名称" autocomplete="off" class="layui-input">
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">Edi账户</label>
        <div class="layui-input-block">
            <input type="text" name="edi_account" value="{$data['edi_account']}" placeholder="请输入Edi账户" autocomplete="off" class="layui-input">
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">检验检疫编号</label>
        <div class="layui-input-block">
            <input type="text" name="ciq_code" value="{$data['ciq_code']}" placeholder="请输入检验检疫编号" autocomplete="off" class="layui-input">
        </div>
    </div>


    <div class="layui-form-item">
        <label class="layui-form-label">统一信用代码</label>
        <div class="layui-input-block">
            <input type="text" name="unifiedcode" value="{$data['unifiedcode']}" placeholder="请输入统一信用代码" autocomplete="off" class="layui-input">
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">http_key</label>
        <div class="layui-input-block">
            <input type="text" name="http_key" value="{$data['http_key']}" placeholder="请输入http_key" autocomplete="off" class="layui-input">
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">中国海关注册编码</label>
        <div class="layui-input-block">
            <input type="text" name="gzcus_code" value="{$data['gzcus_code']}"  placeholder="请输入中国海关注册编码" autocomplete="off" class="layui-input">
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">单一窗口编号</label>
        <div class="layui-input-block">
            <input type="text" name="gzeport_code" value="{$data['gzeport_code']}" placeholder="请输入单一窗口编号" autocomplete="off" class="layui-input">
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">海关关区代码</label>
        <div class="layui-input-block">
            <input type="text" name="gzcustoms_code" value="{$data['gzcustoms_code']}" placeholder="请输入海关关区代码" autocomplete="off" class="layui-input">
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">中国海关dxp编号</label>
        <div class="layui-input-block">
            <input type="text" name="dxpid" value="{$data['dxpid']}" placeholder="请输入中国海关dxp编号" autocomplete="off" class="layui-input">
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">检验检疫dxp编号</label>
        <div class="layui-input-block">
            <input type="text" name="ciqdxp_code" value="{$data['ciqdxp_code']}" placeholder="请输入检验检疫dxp编号" autocomplete="off" class="layui-input">
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">检疫关区代码</label>
        <div class="layui-input-block">
            <input type="text" name="ciq_org_code" value="{$data['ciq_org_code']}" placeholder="请输入检疫关区代码" autocomplete="off" class="layui-input">
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">电信增值许可证</label>
        <div class="layui-input-block">
            <input type="text" name="license" value="{$data['license']}" placeholder="请输入电信增值许可证" autocomplete="off" class="layui-input">
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">机构代码</label>
        <div class="layui-input-block">
            <input type="text" name="org_no" value="{$data['org_no']}" placeholder="请输入机构代码" autocomplete="off" class="layui-input">
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">电商企业邮箱</label>
        <div class="layui-input-block">
            <input type="email" name="email" value="{$data['email']}" placeholder="请输入电商企业邮箱" autocomplete="off" class="layui-input">
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">电商平台简称</label>
        <div class="layui-input-block">
            <input type="text" name="platform" value="{$data['platform']}" placeholder="请输入电商平台简称" autocomplete="off" class="layui-input">
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">电商平台域名</label>
        <div class="layui-input-block">
            <input type="text" name="Website" value="{$data['Website']}" placeholder="请输入电商平台域名" autocomplete="off" class="layui-input">
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">电子口岸代码</label>
        <div class="layui-input-block">
            <input type="text" name="eportCode" value="{$data['eportCode']}" placeholder="请输入电子口岸代码" autocomplete="off" class="layui-input">
        </div>
    </div>

    <div class="layui-form-item">
        <div class="layui-input-block">
            <button class="layui-btn" lay-submit lay-filter="formDemo">编辑数据</button>
            <button type="reset" class="layui-btn layui-btn-danger">重置数据</button>
        </div>
    </div>
</form>

</body>
<script src="./static/hadmin/assets/layui/layui.js"></script>
<script src="./static/hadmin/assets/jquery-3.2.1.min.js"></script>

<script>
    //Demo
    layui.use('form', function(){
        var form = layui.form;

        //监听提交
        form.on('submit(formDemo)', function(data){
            $.ajax({
                url:"{:Url('main/doedit')}",
                type:"POST",
                dataType:"json",
                data:data.field,
                success:function (res) {
                    var red = JSON.parse(res);
                    if(red.code < 1) {
                        layer.msg(res.msg);
                        return false;
                    }
                    layer.msg(red.msg);
                    setTimeout(function(){
                        // layer.closeAll();
                        // parent.window.location.reload();
                        parent.window.table.bootstrapTable('refresh');
                        var index = parent.layer.getFrameIndex(window.name);
                        parent.layer.close(index);
                    },1200)
                },
                error:function (xhr) {
                    layer.msg('链接服务错误..');
                }
            });
            return false;
        });
    });
</script>
</html>
