<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>海关申报系统菜单管理</title>
    <link rel="stylesheet" href="./static/hadmin/assets/layui/css/layui.css">
    <link rel="stylesheet" href="./static/hadmin/assets/common.css"/>
    <style>
        .layui-form-label{
            width:114px;
        }
        .layui-input-block {
            margin-left: 145px;
        }
        .reason{display: none;}
    </style>
</head>
<body>

<form class="layui-form" action="">

    <div class="layui-form-item">
        <label class="layui-form-label"></label>
    </div>
    <input type="text" name="id" value="{$dat['id']}" style="display:none;">
    <div class="layui-form-item">
        <label class="layui-form-label">机构名称</label>
        <div class="layui-input-block">
            <input type="text" name="name" required  lay-verify="required" placeholder="请填写换汇机构名称" value="{$dat['name']}" autocomplete="off" class="layui-input">
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">关联结汇机构</label>
        <div class="layui-input-block  layui-select-fscon">
            <div id="connect_foreignExchange" class="xm-select-demo"></div>
        </div>
    </div>

    <div class="layui-form-item">
        <div class="layui-input-block">
            <button class="layui-btn" lay-submit lay-filter="formDemo">编辑数据</button>
            <button type="reset" class="layui-btn layui-btn-danger">重置数据</button>
        </div>
    </div>
</form>

</body>
<script src="./static/hadmin/assets/layui/layui.js"></script>
<script src="./static/hadmin/assets/jquery-3.2.1.min.js"></script>
<script src="./static/hadmin/assets/layui/xm-select.js"></script>
<script>
    //Demo
    layui.use('form', function(){
        var form = layui.form;

        // 商品列表
        var connect_foreignExchange = xmSelect.render({
            el: '#connect_foreignExchange',
            paging: true,
            pageSize: 5,
            filterable: true,
            prop: {
                name: 'name',
                value: 'id',
            },
            autoRow: true,
            data: {$connect},
            name: 'connect_id',
            layVerify: 'required',
            layVerType: 'msg',
            initValue: [{$dat['connect_id']}]
        });

        //监听提交
        form.on('submit(formDemo)', function(data){
            $.ajax({
                url:"{:Url('admin/defaultInfo/exchange_edit')}",
                type:"POST",
                dataType:"json",
                data:data.field,
                success:function (res) {
                    // var red = JSON.parse(res);
                    console.log(res.code);
                    if(res.code < 1) {
                        layer.msg(res.msg);
                        return false;
                    }
                    layer.msg(res.msg);
                    setTimeout(function(){
                        // layer.closeAll();
                        // parent.window.location.reload();
                        parent.window.table.bootstrapTable('refresh');
                        var index = parent.layer.getFrameIndex(window.name);
                        parent.layer.close(index);
                    },1200)
                },
                error:function (xhr) {
                    layer.msg('链接服务错误..');
                }
            });
            return false;
        });
    });
</script>
</html>
