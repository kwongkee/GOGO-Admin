
{include file="public/header_new"}
<body class="gray-bg">

        <div class="row">
          <div class="col-sm-12">
            <div class="ibox float-e-margins">
              <div class="ibox-content">
                <h3 style="text-align: center;">商户银行账户列表</h3>
                <div id="toolbar" class="btn-group" style="margin-top: 10px;margin-bottom: 10px;line-height: 34px;">
                </div>
                <table id="table"

                  /*默认排序项*/
                  data-sort-name="create_at"
                  data-sort-order="desc"
                  /*工具栏相关*/
                  data-toolbar="#toolbar"
                  data-search="false"          /*搜索框*/
                  data-search-on-enter-key="false"
                  data-show-refresh="true"    /*刷新按钮*/
                  /*分页相关*/
                  data-side-pagination="server"
                  data-pagination="true"      /*显示分页*/
                  data-page-size="15"         /*每页显示条数*/
                  /*移动端相关*/
                  data-mobile-responsive="true"
                  data-card-view="true"
                  data-show-columns="true"
                  /*radio or checkbox字段名称*/
                  data-select-item-name="tids" >

                  <thead>
                    <tr>
                    <th data-field="id"
                        data-align="center"
                        data-sortable="true">ID</th>
                        
                      <th data-field="user_name"
                        data-align="center"
                        data-sortable="true">所属商户</th>
                      <th data-field="account_type_text"
                        data-align="center"
                        data-sortable="true">账户类型</th>
                      <th data-field="money_type"
                        data-align="center"
                        data-sortable="true">账户币种</th>
                      <th data-field="money"
                        data-align="center"
                        data-sortable="true">账户余额</th>
                      <th data-field="account_name"
                        data-align="center"
                        data-sortable="true">银行账户名称</th>
                      <th data-field="bank_name"
                        data-align="center"
                        data-sortable="true">银行名称</th>
                      <th data-field="account"
                        data-align="center"
                        data-sortable="true">银行账户</th>
                      <th data-field="bind_time"
                        data-align="center"
                        data-sortable="true">绑定时间</th>
                      <th data-field="status"
                        data-align="center"
                        data-sortable="true">状态</th>
                      <th data-field="manage"
                        data-align="center"
                        class="td-manage">操作</th>
                      </tr>
                    </thead>
                  </table>
                </div>
              </div>
            </div>
          </div>


  <script type="text/javascript">

var table;

$(document).ready(function(){
        table = $('#table').bootstrapTable({
            url: "{:Url('admin/abroadConfig/business_account')}",
            queryParams: queryParams,

        });
        
    });

    queryParams = function (params) {
        var temp = {
            sort: params.sort,
            order: params.order,
            limit: params.limit,            //页面大小
            offset: params.offset,          //页码
        };
        return temp;
    };

    function seeInfo(title,url,id)
    {
        var index = layer.open({
            type: 2,
            title: title,
            content: url + '&id=' + id
        });
        layer.full(index);
    }

    function delInfo(id)
    {
        layer.confirm('确认要冻结该账户吗？', {
            btn: ['确认','取消']
        }, function(){
            $.ajax({
                url:'{:Url("admin/abroadConfig/business_account_frozen")}',
                type:"POST",
                dataType:"json",
                data: { id: id},
                success:function (res) {
                    layer.msg(res.message, {
                        icon: 1,
                        time: 2000
                    }, function(){
                        window.location.reload();
                    });
                },
                error:function (xhr) {
                    layer.msg('链接服务错误..');
                }
            });
        }, function(){
        
        });
    }

</script>

</body>
</html>
