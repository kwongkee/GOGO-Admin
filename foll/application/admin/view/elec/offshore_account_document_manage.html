<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>海关申报系统菜单管理</title>
    <link rel="stylesheet" href="./static/hadmin/assets/layui/css/layui.css">
    <link rel="stylesheet" href="./static/hadmin/assets/common.css"/>
    <style>
        .layui-form-label{
            width:114px;
        }
        .layui-input-block {
            margin-left: 145px;
        }
        .reason{display: none;}
    </style>
</head>
<body>

<form class="layui-form" action="">

    <div class="layui-form-item">
        <label class="layui-form-label"></label>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">商户开户信息</label>
        <input type="text" name="type" value="{$type}" style="display:none;">
        {if $type==2}
        <div class="layui-input-block">
            <input type="checkbox" name="need_upload_document" title="公司营业执照" lay-skin="primary" value="1" {if in_array('1',$data['need_upload_document'])}checked{/if}>
            <input type="checkbox" name="need_upload_document" title="公司章程" lay-skin="primary" value="2" {if in_array('2',$data['need_upload_document'])}checked{/if}>
            <input type="checkbox" name="need_upload_document" title="法人身份证/董事会成员身份证" lay-skin="primary" value="3" {if in_array('3',$data['need_upload_document'])}checked{/if}>
            <input type="checkbox" name="need_upload_document" title="25%持股股东身份证" lay-skin="primary" value="4" {if in_array('4',$data['need_upload_document'])}checked{/if}>
            <input type="checkbox" name="need_upload_document" title="交易授权人身份证" lay-skin="primary" value="5" {if in_array('5',$data['need_upload_document'])}checked{/if}>
            <input type="checkbox" name="need_upload_document" title="国内最新一期完税证明" lay-skin="primary" value="6" {if in_array('6',$data['need_upload_document'])}checked{/if}>
            <input type="checkbox" name="need_upload_document" title="最近3个月银行月结单" lay-skin="primary" value="7" {if in_array('7',$data['need_upload_document'])}checked{/if}>
            <input type="checkbox" name="need_upload_document" title="VA申请表" lay-skin="primary" value="8" {if in_array('8',$data['need_upload_document'])}checked{/if}>
            <input type="checkbox" name="need_upload_document" title="服务协议" lay-skin="primary" value="9" {if in_array('9',$data['need_upload_document'])}checked{/if}>
            <input type="checkbox" name="need_upload_document" title="公司搜索报告" lay-skin="primary" value="10" {if in_array('10',$data['need_upload_document'])}checked{/if}>
            <input type="checkbox" name="need_upload_document" title="公司注册证明" lay-skin="primary" value="11" {if in_array('11',$data['need_upload_document'])}checked{/if}>
            <input type="checkbox" name="need_upload_document" title="商业登记证" lay-skin="primary" value="12" {if in_array('12',$data['need_upload_document'])}checked{/if}>
            <input type="checkbox" name="need_upload_document" title="持有公司25%或以上股份的所有董事和股东的身份证和地址信息" lay-skin="primary" value="13" {if in_array('13',$data['need_upload_document'])}checked{/if}>
        </div>
        {else}
        <div class="layui-input-block">
            <input type="checkbox" name="need_upload_document" title="公司中文名称" lay-skin="primary" value="8" {if in_array('8',$data['need_upload_document'])}checked{/if}>
            <input type="checkbox" name="need_upload_document" title="公司英文名称" lay-skin="primary" value="9" {if in_array('9',$data['need_upload_document'])}checked{/if}>
        </div>
        {/if}
    </div>

    <div class="layui-form-item">
        <div class="layui-input-block">
            <button class="layui-btn" lay-submit lay-filter="formDemo">编辑数据</button>
            <button type="reset" class="layui-btn layui-btn-danger">重置数据</button>
        </div>
    </div>
</form>

</body>
<script src="./static/hadmin/assets/layui/layui.js"></script>
<script src="./static/hadmin/assets/jquery-3.2.1.min.js"></script>

<script>
    //Demo
    layui.use('form', function(){
        var form = layui.form;

        //监听提交
        form.on('submit(formDemo)', function(data){
            if(data.field.need_upload_document=='' || typeof(data.field.need_upload_document)=='undefined'){
                layer.msg('请选择至少一个！');
                return false;
            }
            data.field['need_upload_document'] = '';
            $("input:checkbox[name='need_upload_document']:checked").each(function() {
                data.field['need_upload_document'] += ',' + $(this).val();
            });

            $.ajax({
                url:"{:Url('admin/elec/offshore_account_document_manage')}",
                type:"POST",
                dataType:"json",
                data:data.field,
                success:function (res) {
                    // var red = JSON.parse(res);
                    console.log(res.code);
                    if(res.code < 1) {
                        layer.msg(res.msg);
                        return false;
                    }
                    layer.msg(res.msg);
                    setTimeout(function(){
                        // layer.closeAll();
                        // parent.window.location.reload();
                        parent.window.table.bootstrapTable('refresh');
                        var index = parent.layer.getFrameIndex(window.name);
                        parent.layer.close(index);
                    },1200)
                },
                error:function (xhr) {
                    layer.msg('链接服务错误..');
                }
            });
            return false;
        });
    });
</script>
</html>
