{include file="public/header_new"}
<style type="text/css" media="all">
    .green {
        background: #009688 !important;
        color: #fff !important;
    }
    .sellerTable{display:none;}
</style>
<body class="gray-bg">

<div class="row">
    <div class="col-sm-12">
        <div class="ibox float-e-margins">
            <div class="ibox-content">
                <button type="button" href="javascript:;" class="btn btn-default buyer green">
                        买家配置审批
                    </button>
                    <button type="button" href="javascript:;" class="btn btn-default seller">
                        卖家配置审批
                    </button>
                <div id="toolbar" class="btn-group" style="margin-top: 10px;margin-bottom: 10px;line-height: 34px;">
                    
                </div>
                <table id="table" class="buyerTable"

                /*默认排序项*/
                data-sort-name="create_at"
                data-sort-order="desc"
                /*工具栏相关*/
                data-toolbar="#toolbar"
                data-search="false"          /*搜索框*/
                data-search-on-enter-key="false"
                data-show-refresh="true"    /*刷新按钮*/
                /*分页相关*/
                data-side-pagination="server"
                data-pagination="false"      /*显示分页*/
                data-page-size="15"         /*每页显示条数*/
                /*移动端相关*/
                data-mobile-responsive="true"
                data-card-view="true"
                data-show-columns="true"
                /*radio or checkbox字段名称*/
                data-select-item-name="tids" >

                <thead>
                <tr>
                    <th data-field="checkbox"
                        data-align="center"
                        data-checkbox="true"></th>
                    <th data-field="id"
                        data-align="center"
                        data-sortable="true"
                        data-visible="false">ID</th>
                    <th data-field="name"
                        data-align="center"
                        data-sortable="true">名称</th>
                    <th data-field="type"
                        data-align="center"
                        data-sortable="true">买家类型</th>
                    <th data-field="platform"
                        data-align="center"
                        data-sortable="true">买家类别</th>
                    <th data-field="country"
                        data-align="center"
                        data-sortable="true">注册国地</th>
                    <th data-field="tel"
                        data-align="center"
                        data-sortable="true">电话</th>
                    <th data-field="email"
                        data-align="center"
                        data-sortable="true">邮箱</th>
                    <th data-field="address"
                        data-align="center"
                        data-sortable="true">地址</th>
                    <th data-field="create_at"
                        data-align="center"
                        data-sortable="true">创建时间</th>
                    <th data-field="status"
                        data-align="center"
                        data-sortable="true">状态</th>
                    <th data-field="user_name"
                        data-align="center"
                        data-sortable="true">商家名称</th>
                    <th data-field="user_tel"
                        data-align="center"
                        data-sortable="true">商家电话</th>
                    <th data-field="manage"
                        data-align="center"
                        class="td-manage">操作</th>
                </tr>
                </thead>
                </table>
                
                <table id="table2" class="sellerTable"

                /*默认排序项*/
                data-sort-name="create_at"
                data-sort-order="desc"
                /*工具栏相关*/
                data-toolbar="#toolbar"
                data-search="false"          /*搜索框*/
                data-search-on-enter-key="false"
                data-show-refresh="true"    /*刷新按钮*/
                /*分页相关*/
                data-side-pagination="server"
                data-pagination="false"      /*显示分页*/
                data-page-size="15"         /*每页显示条数*/
                /*移动端相关*/
                data-mobile-responsive="true"
                data-card-view="true"
                data-show-columns="true"
                /*radio or checkbox字段名称*/
                data-select-item-name="tids" >

                <thead>
                <tr>
                    <th data-field="checkbox"
                        data-align="center"
                        data-checkbox="true"></th>
                    <th data-field="id"
                        data-align="center"
                        data-sortable="true"
                        data-visible="false">ID</th>
                    <th data-field="name"
                        data-align="center"
                        data-sortable="true">名称</th>
                    <th data-field="type"
                        data-align="center"
                        data-sortable="true">卖家类型</th>
                    <th data-field="platform"
                        data-align="center"
                        data-sortable="true">卖家类别</th>
                    <th data-field="country"
                        data-align="center"
                        data-sortable="true">注册国地</th>
                    <th data-field="tel"
                        data-align="center"
                        data-sortable="true">电话</th>
                    <th data-field="email"
                        data-align="center"
                        data-sortable="true">邮箱</th>
                    <th data-field="address"
                        data-align="center"
                        data-sortable="true">地址</th>
                    <th data-field="create_at"
                        data-align="center"
                        data-sortable="true">创建时间</th>
                    <th data-field="status"
                        data-align="center"
                        data-sortable="true">状态</th>
                    <th data-field="user_name"
                        data-align="center"
                        data-sortable="true">商家名称</th>
                    <th data-field="user_tel"
                        data-align="center"
                        data-sortable="true">商家电话</th>
                    <th data-field="manage"
                        data-align="center"
                        class="td-manage">操作</th>
                </tr>
                </thead>
                </table>
            </div>
        </div>
    </div>
</div>


<script type="text/javascript">

    var table;

    $(document).ready(function(){
        table = $('#table').bootstrapTable({
            url: "{:Url('admin/elec/buysell_approve')}",
            queryParams: queryParams,
        });
        
        $('.buyer').click(function(){
            $(this).addClass('green').siblings().removeClass('green'); 
            $('.sellerTable').hide();
            $('.bootstrap-table').eq(1).hide();
            $('.bootstrap-table').eq(0).show();
            $('.buyerTable').show();
            table = $('#table').bootstrapTable({
                url: "{:Url('admin/elec/buysell_approve')}",
                queryParams: queryParams,
            });   
        });
        
        $('.seller').click(function(){
            $(this).addClass('green').siblings().removeClass('green'); 
            $('.buyerTable').hide();
            $('.bootstrap-table').eq(0).hide();
            $('.bootstrap-table').eq(1).show();
            $('.sellerTable').show();
            table2 = $('#table2').bootstrapTable({
                url: "{:Url('admin/elec/buysell_approve')}",
                queryParams: queryParams2,
            });   
        });
        
        
        // $('.form-control').attr('placeholder','搜索银行账户名称');
    });

    queryParams = function (params) {
        var temp = {
            sort: params.sort,
            order: params.order,
            limit: params.limit,            //页面大小
            offset: params.offset,          //页码
            search: params.search,
            type:1
        };
        return temp;
    };
    
    queryParams2 = function (params) {
        var temp = {
            sort: params.sort,
            order: params.order,
            limit: params.limit,            //页面大小
            offset: params.offset,          //页码
            search: params.search,
            type:2
        };
        return temp;
    };

    // 申报
    function add()
    {
        layer.open({
            type: 2,
            title: '添加平台主体。tips:非单一窗口请填写海关十位数编号',
            shadeClose: true,
            shade: 0.3,
            area: ['800px', '550px'],
            content: "{:Url('main/add')}", //iframe的url
            yes:function(){
                //setTimeout(function(){window.location.reload();},800);
            },
            end:function() {
                setTimeout(function () {
                    //window.location.reload();
                }, 800);
            }
        });
    }

    // 申报
    function Edit(id,type)
    {
        layer.open({
            type: 2,
            title: '买卖配置审核',
            shadeClose: true,
            shade: 0.3,
            area: ['800px', '550px'],
            content: "{:Url('admin/elec/buysell_approve_edit')}&id="+id+"&type="+type, //iframe的url
            yes:function(){
                //setTimeout(function(){window.location.reload();},800);
            },
            end:function() {
                setTimeout(function () {
                    //window.location.reload();
                }, 800);
            }
        });
    }


    // 删除操作
    function Del(ids) {
        layer.confirm('确定要删除吗?',{
            icon:3,
            btn:['确定','取消']
        },function(){
            $.ajax({
                url:"{:url('main/del')}",
                type:'post',
                dataType:'json',
                data:{'id':ids},
                success:function(data) {
                    var res = JSON.parse(data);
                    if(res.code <= 0) {
                        layer.msg(res.msg,{icon:2});
                    }
                    layer.msg(res.msg,{icon:1});
                    setTimeout(function(){window.location.reload();},1000);
                }
            })
        })
    }


</script>

</body>
</html>
