<!DOCTYPE html>
<html>
<head>
    <title></title>
    <link rel="stylesheet" type="text/css" href="__STATIC__/plugins/layui/css/layui.css"/>
    <script type="text/javascript" src="__STATIC__/plugins/layui/layui.js"></script>
    <style>
        .header span{background: #009688;margin-left: 30px;padding: 10px;color: #fff;}
        .header div{border-bottom:solid 2px #009688;margin-top: 8px;}
        .header button{float: right;margin-top: -5px;}
        .ths{font-size: 22px;font-weight: bold}
        .boys{font-size: 16px;}
    </style>
</head>
<body style="padding-top: 10px;">
<div class="header">
    <span>风控编辑</span>
    <!--<button class="layui-btn layui-btn-sm" onclick="add();">添加</button>-->
    <div></div>
</div>
<form class="layui-form" action="post">

    <div class="layui-form-item"></div>

    <div class="layui-form-item">

        <div class="layui-form-item">
            <label class="layui-form-label">身份触发系数:</label>
            <div class="layui-input-block">
                <input type="text" name="Percen" value="{$data['Percen']}" required placeholder="请输入0.1至1之间的值" class="layui-input">
            </div>
        </div>


        <div class="layui-form-item">
            <label class="layui-form-label">一人多票:</label>
            <div class="layui-input-block">
                <input type="number" name="orderPurch" value="{$data['orderPurch']}" required class="layui-input">
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">一单多品:</label>
            <div class="layui-input-block">
                <input type="number" name="WayNum" value="{$data['WayNum']}" required class="layui-input">
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">同品多购:</label>
            <div class="layui-input-block">
                <input type="number" name="ArtNo" value="{$data['ArtNo']}" required class="layui-input">
            </div>
        </div>


        <div class="layui-form-item">
            <label class="layui-form-label">当月票值:</label>
            <div class="layui-input-block">
                <input type="number" name="monthNum" value="{$data['monthNum']}" required class="layui-input">
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">当月额度:</label>
            <div class="layui-input-block">
                <input type="text" name="monthMoney" value="{$data['monthMoney']}" required  lay-verify="required" autocomplete="off" class="layui-input">
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">当年票值:</label>
            <div class="layui-input-block">
                <input type="number" name="yearNum" value="{$data['yearNum']}" required  lay-verify="required" autocomplete="off" class="layui-input">
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">当年额度:</label>
            <div class="layui-input-block">
                <input type="text" name="yearMoney" value="{$data['yearMoney']}" required  lay-verify="required" placeholder="请输入标题" autocomplete="off" class="layui-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">号码限额次数:</label>
            <div class="layui-input-block">
                <input type="text" name="mobile_number" value="{$data['mobile_number']}" required  lay-verify="required" placeholder="" autocomplete="off" class="layui-input">
            </div>
        </div>
  	<div class="layui-form-item">
    <label class="layui-form-label">限额类型</label>
    <div class="layui-input-block">
      <select name="number_type" id='number_type' lay-verify="required">
        <option value="">请选择</option>
        <option value="batch">批次</option>
        <option value="month">月累计</option>
        <option value="year">年累计</option>
        <option value="history">总累计</option>
      </select>
    </div>
  </div>
        <input type="hidden" name="id" value="{$data['id']}">

    </div>

    <div class="layui-form-item">
        <div class="layui-input-block">
            <button class="layui-btn" id="sub" lay-submit lay-filter="formDemo">确认设置</button>
            <button type="reset" class="layui-btn layui-btn-primary">重置信息</button>
        </div>
    </div>
</form>

<script>

    var flag = false;
    //Demo
    layui.use(['layer','jquery','form'],function(){
        layer = layui.layer;
        var form = layui.form
        $ = layui.jquery;

        //监听提交
        form.on('submit(formDemo)', function(data){

            if(flag) {
                return false;
            }

            //layer.msg(JSON.stringify(data.field));
            var id = data.field.id;
            var monthNum    = data.field.monthNum;
            var monthMoney  = data.field.monthMoney;
            var orderPurch     = data.field.orderPurch;
            var yearNum     = data.field.yearNum;
            var yearMoney   = data.field.yearMoney;
            var waynum      = data.field.WayNum;
            var artno       = data.field.ArtNo;
            var percen       = data.field.Percen;
            var number_type = data.field.number_type;
            var mobile_number = data.field.mobile_number;

            if(percen == '') {
                layer.msg('身份系数不能为空',{icon:1});
            }

            if(orderPurch == '') {
                layer.msg('订单多购不能为空',{icon:1});
            }

            if(waynum == '') {
                layer.msg('运单多购不能为空',{icon:1});
            }

            if(artno == '') {
                layer.msg('同品多购不能为空',{icon:1});
            }

            if(monthNum == '') {
                layer.msg('当月峰值不能为空',{icon:1});
            }

            if(monthMoney == '') {
                layer.msg('当月额度不能为空',{icon:1});
            }
            if(yearNum == '') {
                layer.msg('当年峰值不能为空',{icon:1});
            }
            if(yearMoney == '') {
                layer.msg('当年额度不能为空',{icon:1});
            }

            $('#sub').attr('disabled',true);
            flag = true;

            $.ajax({
                url:"{:Url('admin/risk/store')}",
                type:'post',
                dataType:'json',
                data:{
                    'id':id,'monthNum':monthNum,
                    'monthMoney':monthMoney,'yearNum':yearNum,
                    'yearMoney':yearMoney,'WayNum':waynum,'ArtNo':artno,
                    'Percen':percen,'orderPurch':orderPurch,
                    'mobile_number':mobile_number,
                    'number_type':number_type
                },
                success:function(data) {
                    var d = JSON.parse(data);
                    if(d.code == 1 ) {
                        layer.msg(d.msg,{icon:1});
                    } else {
                        layer.msg(d.msg,{icon:2});
                    }

                    setTimeout(function() {
                        var index = parent.layer.getFrameIndex(window.name);
                        // 关闭父级窗口
                        parent.layer.close(index);
                        window.location.reload();
                    },1000);

                },
                error:function(er) {
                    //console.log(er)
                }
            })

            return false;
        });
    });
</script>
</body>
</html>
