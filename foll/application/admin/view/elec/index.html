<script type="text/javascript">
    layui.use(['layer','jquery'],function(){
        layer = layui.layer;
        $ = layui.jquery;
    });

    //2021-10-30
    function closeDiv(){
        $('#print').hide();
    }

    function printElec(batch_num){
        var layer = layui.layer;
        $('#print').find('.batch_num').val(batch_num);
        $.ajax({
            url:"{:Url('admin/elec/get_this_batch_order')}",
            type:"GET",
            data:{'batch_num':batch_num},
            dataType:"json",
            success:function (res) {
                if(res.code==-1){
                    layer.msg(res.msg);
                }else{
                    var html = '';
                    $('#selectOrder').find('.orderno').remove();
                    for(var i=0;i<res.data.length;i++){
                        html += '<div style="margin-left:65px;" class="orderno"><label>'+res.data[i]['EntOrderNo']+'</label><input type="checkbox" name="order" value="'+res.data[i]['EntOrderNo']+'-'+res.type+'" style="margin-left:5px;"></div>';
                    }
                    $('#selectOrder').append(html);
                }
            },
            error:function(xhr){
                layer.msg('请求失败!');
            }
        });
        $('#print').show();
    }

    $(function(){
        //立即打印-电子面单
        $('#dayin').click(function(){
            let batch_num = $('#print').find('.batch_num').val();
            let device    = $('select[name="device"] option:selected').val();
            let express    = $('select[name="express"] option:selected').val();
            // let order    = $('input[type="checkbox"]:checked').val();

            //创建一个空数组
            var data_arr = [];
            //index下标 element 当前选中的元素
            $('input:checkbox[name=order]:checked').each(function(index,element){
                //压入数组
                data_arr[index] = $(this).val();
            });

            var layer = layui.layer;
            if(batch_num==''){
                layer.msg('批次编号不能为空');return false;
            }
            if(data_arr==''){
                layer.msg('请勾选至少一个订单号');return false;
            }
            if(device==''){
                layer.msg('设备选择不能为空');return false;
            }
            if(express==''){
                layer.msg('快递公司选择不能为空');return false;
            }

            $.ajax({
                url:"{:Url('admin/elec/print_elec')}",
                type:'POST',
                dataType:'JSON',
                data:{
                    batch_num:batch_num,
                    device:device,
                    express:express,
                    orderno:data_arr,
                },
                // alert(res.msg);
                success:function(res){
                    // console.log(res.temp);

                    // if(res.code==1){
                    layer.msg('成功');
                    //快递鸟
                    // var index = layer.open({
                    //     type:1,
                    //     title: '本地打印',
                    //     area:['100%','100%'],
                    //     content: document.write(res.temp+'<input id="btnPrint" type="button" value="打印预览" onclick="preview(1)" />')
                    // });
                    // layer.full(index);
                    // }
                },
                error:function(res){
                    layer.msg('链接服务出错');
                }
            })
        });
    })
    //end

    // 状态查询
    function Declared(batch)
    {
        layer.open({
            type: 2,
            title: '申报进度',
            shadeClose: true,
            shade: 0.3,
            area: ['490px', '389px'],
            content: "{:Url('admin/elec/schedulesQuery')}&batch_num="+batch, //iframe的url
            yes:function(){
                //setTimeout(function(){window.location.reload();},800);
            },
            end:function() {
                setTimeout(function () {
                    //window.location.reload();
                }, 800);
            }
        });
    }

    // 申报
    function Declare(batch,uid)
    {
        layer.confirm('确定要申报么？', function(index){
            layer.open({
                type: 2,
                title: '电子订单申报',
                shadeClose: true,
                shade: 0.3,
                area: ['726px', '489px'],
                content: "{:Url('admin/elec/declare')}&batch_num="+batch+'&uid='+uid, //iframe的url
                yes:function(res){
                    setTimeout(function(){window.location.reload();},800);
                },
                end:function() {
                    setTimeout(function () {
                        window.location.reload();
                    }, 800);
                }
            });
        });
    }

    function editSender(batchNum) {
        layer.open({
            type:2,
            title:'修改发件人信息',
            area:['800px','400px'],
            content:"{:Url('admin/elec/editordersender')}&batch_num="+batchNum
        });
    }

    // 退回操作
    function Returns(ids) {
        layer.confirm('您确定退回吗?',{
            icon:3,
            btn:['确定','取消']
        },function(){
            $.ajax({
                url:"{:url('admin/elec/returns')}",
                type:'post',
                dataType:'json',
                data:{'batch_num':ids},
                success:function(data) {
                    var res = JSON.parse(data);
                    if(res.code > 0) {
                        layer.msg(res.msg,{icon:1});
                    } else {
                        layer.msg('退回失败',{icon:2});
                    }
                    setTimeout(function(){window.location.reload();},1000);
                }
            })
        })
    }



    // 请求加入队列
    function dels(batch){
        layer.confirm('您确定要申报吗？', {
            icon:3,
            btn: ['确定','取消'] //按钮
        }, function() {

            $.ajax({
                url:"http://decl.gogo198.cn/api/elec/declares",
                type:'post',
                dataType:'json',
                //async:false,
                data:{'batch_num':batch},
                success:function(data) {
                    if(data.code > 0) {
                        layer.msg('加入申报队列成功',{icon:1});
                    } else {
                        layer.msg('加入申报队列失败',{icon:2});
                        setTimeout(function(){window.location.reload();},1000);
                    }
                },
                error:function(er) {
                    //console.log(er)
                }
            })
        });
    }

    // 2019-12-20
    function goPay(batchNum) {
        layer.msg('该功能暂未开通')
        return false;
    }
    function exprotElist(id){
        layer.open({
            type: 1,
            area:['556px','141px'],
            title:'选择导出格式',
            content: ' <a href="{:Url(\'admin/elec/export_excel\')}&batch_num='+id+'&type=1" onclick="loding();" class="layui-btn">格式一</a> <a onclick="loding();" href="{:Url(\'admin/elec/export_excel\')}&batch_num='+id+'&type=2" class="layui-btn">格式二</a><a onclick="loding();" href="http://declare.gogo198.cn/download/exportDaWangCbecInventory/'+id+'" class="layui-btn">大旺清单</a><a onclick="loding();" href="http://declare.gogo198.cn/elist/order/exportGogoLogisticsAndInventory/'+id+'" class="layui-btn">自建物流系统清单</a></br>><a style="margin-top: 10px;" onclick="loding();" href="http://declare.gogo198.cn/customs/download/rongtong/'+id+'" class="layui-btn">荣通物流</a><a style="margin-top: 10px;" onclick="loding();" href="http://declare.gogo198.cn//elist/order/commonList/'+id+'" class="layui-btn">清单</a><a style="margin-top: 10px;" onclick="loding();" href="http://declare.gogo198.cn/customs/sourceElecOrderFileDownload?batchNum='+id+'" class="layui-btn">原文件</a><a style="margin-top: 10px;" onclick="loding();" href="http://decl.gogo198.cn/download/boHuiWayBillExport?batch_num='+id+'" class="layui-btn">博汇运单模板</a>' //注意，如果str是object，那么需要字符拼接。
        });
        return false;
    }

    function loding() {
        layer.load();
        setTimeout(function () {
            layer.closeAll();
        },5000);
    }
</script>
</body>
</html>
