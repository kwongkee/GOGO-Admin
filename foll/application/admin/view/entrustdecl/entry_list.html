
{include file="public/header_new"}
<body class="gray-bg">

        <div class="row">
          <div class="col-sm-12">
            <div class="ibox float-e-margins">
              <div class="ibox-content">
                <h3 style="text-align: center;">外币归集列表</h3>
                <div id="toolbar" class="btn-group" style="margin-top: 10px;margin-bottom: 10px;line-height: 34px;">

                </div>
                <table id="table"

                  /*默认排序项*/
                  data-sort-name="id"
                  data-sort-order="desc"
                  /*工具栏相关*/
                  data-toolbar="#toolbar"
                  data-search="false"          /*搜索框*/
                  data-search-on-enter-key="false"
                  data-show-refresh="true"    /*刷新按钮*/
                  /*分页相关*/
                  data-side-pagination="server"
                  data-pagination="true"      /*显示分页*/
                  data-page-size="15"         /*每页显示条数*/
                  /*移动端相关*/
                  data-mobile-responsive="true"
                  data-card-view="true"
                  data-show-columns="true"
                  /*radio or checkbox字段名称*/
                  data-select-item-name="tids" >

                  <thead>
                    <tr>
                    <th data-field="id"
                        data-align="center"
                        data-sortable="true">ID</th>
                      <th data-field="serial_number"
                        data-align="center"
                        data-sortable="true">流水号</th>
                        <th data-field="user_name"
                        data-align="center"
                        data-sortable="true">商户名称</th>  
                      <th data-field="ordersn"
                        data-align="center"
                        data-sortable="true">关联单号</th>
                        <th data-field="entry_money"
                        data-align="center"
                        data-sortable="true">入账金额</th> 
                        <th data-field="buyer"
                        data-align="center"
                        data-sortable="true">境外买家/付款人</th>
                        <th data-field="buyer_region"
                        data-align="center"
                        data-sortable="true">贸易国家/地区</th>
                        <th data-field="orders_money"
                        data-align="center"
                        data-sortable="true">清单商品金额</th>
                        <th data-field="trans_mode"
                        data-align="center"
                        data-sortable="true">交易方式</th>
                        <th data-field="status"
                        data-align="center"
                        data-sortable="true">状态</th>   
                      <th data-field="create_at"
                        data-align="center"
                        data-sortable="true">创建时间</th>
                      <th data-field="manage"
                        data-align="center"
                        class="td-manage">操作</th>
                      </tr>
                    </thead>
                  </table>
                </div>
              </div>
            </div>
          </div>


  <script type="text/javascript">

var table;

$(document).ready(function(){
        table = $('#table').bootstrapTable({
            url: "{:Url('admin/entrustDecl/entry_list')}",
            queryParams: queryParams,

        });
        
    });

    queryParams = function (params) {
        var temp = {
            sort: params.sort,
            order: params.order,
            limit: params.limit,            //页面大小
            offset: params.offset,          //页码
        };
        return temp;
    };

    //配置权限
    function seeInfo(title,url,id)
    {
        var index = layer.open({
            type: 2,
            title: title,
            content: url + '&id=' + id
        });
        layer.full(index);
    }

</script>

</body>
</html>
