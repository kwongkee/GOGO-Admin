
{include file="public/header_new"}
<body class="gray-bg">

<div class="row">
    <div class="col-sm-12">
        <div class="ibox float-e-margins">
            <div class="ibox-content">
                <h3 style="text-align: center;">国内提现申请列表</h3>
                <div id="toolbar" class="btn-group" style="margin-top: 10px;margin-bottom: 10px;line-height: 34px;">

                </div>
                <table id="table"

                /*默认排序项*/
                data-sort-name="id"
                data-sort-order="desc"
                /*工具栏相关*/
                data-toolbar="#toolbar"
                data-search="false"          /*搜索框*/
                data-search-on-enter-key="false"
                data-show-refresh="true"    /*刷新按钮*/
                /*分页相关*/
                data-side-pagination="server"
                data-pagination="true"      /*显示分页*/
                data-page-size="15"         /*每页显示条数*/
                /*移动端相关*/
                data-mobile-responsive="true"
                data-card-view="true"
                data-show-columns="true"
                /*radio or checkbox字段名称*/
                data-select-item-name="tids" >

                <thead>
                <tr>
                    <th data-field="id"
                        data-align="center"
                        data-sortable="true">ID</th>
                    <th data-field="user_name"
                        data-align="center"
                        data-sortable="true">商户名称</th>
                    <th data-field="withdraw_money"
                        data-align="center"
                        data-sortable="true">提现金额</th>
                    <th data-field="money_type"
                        data-align="center"
                        data-sortable="true">提现币种</th>
                    <th data-field="withdraw_account"
                        data-align="center"
                        data-sortable="true">提现账户</th>
                    <th data-field="true_money"
                        data-align="center"
                        data-sortable="true">到账金额</th>
                    <th data-field="createtime"
                        data-align="center"
                        data-sortable="true">申请时间</th>
                    <th data-field="check_status"
                        data-align="center"
                        data-sortable="true">状态</th>
                    <th data-field="manage"
                        data-align="center"
                        class="td-manage">操作</th>
                </tr>
                </thead>
                </table>
            </div>
        </div>
    </div>
</div>


<script type="text/javascript">

    var table;

    $(document).ready(function(){
        table = $('#table').bootstrapTable({
            url: "{:Url('admin/entrustDecl/domestic_withdrawal_list')}",
            queryParams: queryParams,

        });

    });

    queryParams = function (params) {
        var temp = {
            sort: params.sort,
            order: params.order,
            limit: params.limit,            //页面大小
            offset: params.offset,          //页码
        };
        return temp;
    };

    //配置权限
    function seeInfo(title,url,id)
    {
        var index = layer.open({
            type: 2,
            title: title,
            content: url + '&id=' + id
        });
        layer.full(index);
    }

    //删除
    function del(url,id){
        layer.confirm('确定要删除吗?', {icon: 3, title:'提示',btn:['确定','取消']}, function(index){
            $.post(url,{id:id},function(res){
                // var res = JSON.parse(resd);
                if(res.code == 1) {
                    layer.msg(res.msg,{icon:1});
                    setTimeout(function(){
                        layer.closeAll();
                        parent.window.location.reload();
                    },1100);
                } else {
                    layer.alert(res.msg,{icon:2});
                }
            },'json');
        });
    }

</script>

</body>
</html>
