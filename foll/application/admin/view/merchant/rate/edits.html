<!DOCTYPE html>
<html>
<head>
    <title></title>
    <link rel="stylesheet" type="text/css" href="__STATIC__/plugins/layui/css/layui.css"/>
    <script type="text/javascript" src="__STATIC__/plugins/layui/layui.js"></script>
    <style>
        .header span{background: #009688;margin-left: 30px;padding: 10px;color: #fff;}
        .header div{border-bottom:solid 2px #009688;margin-top: 8px;}
        .header button{float: right;margin-top: -5px;}
        .ths{font-size: 22px;font-weight: bold}
        .boys{font-size: 16px;}
    </style>
</head>
<body style="padding-top: 10px;">
<div class="header">
    <span>清算费率设置</span>
    <!--<button class="layui-btn layui-btn-sm" onclick="add();">添加</button>-->
    <div></div>
</div>
<form class="layui-form" action="post">

    <div class="layui-form-item"></div>

    <div class="layui-form-item">

        <div class="layui-form-item">
            <label class="layui-form-label">商户名称:</label>
            <div class="layui-input-block">
                <input type="text" value="{$data['uname']}" readonly class="layui-input">
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">身份验证费率:</label>
            <div class="layui-input-block">
                <input type="text" name="verfee" value="{$data['verfee']}" required  lay-verify="required" autocomplete="off" class="layui-input">
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">支付报关费率:</label>
            <div class="layui-input-block">
                <input type="text" name="payfee" value="{$data['payfee']}" required  lay-verify="required" autocomplete="off" class="layui-input">
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">订单报关费率:</label>
            <div class="layui-input-block">
                <input type="text" name="orderfee" value="{$data['orderfee']}" required  lay-verify="required" placeholder="请输入标题" autocomplete="off" class="layui-input">
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">清单申报费率:</label>
            <div class="layui-input-block">
                <input type="text" name="elistfee" value="{$data['elistfee']}" required  lay-verify="required" placeholder="清单申报费率(按票计算)" autocomplete="off" class="layui-input">
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">运单申报费率:</label>
            <div class="layui-input-block">
                <input type="text" name="logisfee" value="{$data['logisfee']}" required  lay-verify="required" placeholder="运单申报费率(按票计算)" autocomplete="off" class="layui-input">
            </div>
        </div>

        <input type="hidden" name="id" value="{$data['id']}">

    </div>

    <div class="layui-form-item">
        <div class="layui-input-block">
            <button class="layui-btn" id="sub" lay-submit lay-filter="formDemo">确认设置</button>
            <button type="reset" class="layui-btn layui-btn-primary">重置信息</button>
        </div>
    </div>
</form>

<script>

    var flag = false;
    //Demo
    layui.use(['layer','jquery','form'],function(){
        layer = layui.layer;
        var form = layui.form
        $ = layui.jquery;

        //监听提交
        form.on('submit(formDemo)', function(data){

            if(flag) {
                return false;
            }

            //layer.msg(JSON.stringify(data.field));
            var id = data.field.id;
            var verfee      = data.field.verfee;
            var payfee      = data.field.payfee;
            var orderfee    = data.field.orderfee;
            var elistfee    = data.field.elistfee;
            var logisfee    = data.field.logisfee;

            $('#sub').attr('disabled',true);
            flag = true;

            $.ajax({
                url:"{:Url('merchant/feed')}",
                type:'post',
                dataType:'json',
                data:{'id':id,'verfee':verfee,'payfee':payfee,'orderfee':orderfee,'elistfee':elistfee,'logisfee':logisfee},
                success:function(data) {
                    var d = JSON.parse(data);
                    if(d.code == 1 ) {
                        layer.msg(d.msg,{icon:1});
                    } else {
                        layer.msg(d.msg,{icon:2});
                    }

                    setTimeout(function() {
                        var index = parent.layer.getFrameIndex(window.name);
                        // 关闭父级窗口
                        parent.layer.close(index);
                        window.location.reload();
                    },1000);

                },
                error:function(er) {
                    //console.log(er)
                }
            })

            return false;
        });
    });
</script>
</body>
</html>
