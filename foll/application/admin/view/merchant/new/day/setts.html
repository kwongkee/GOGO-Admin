{if count($datas) > 0}
    <style type="text/css">
        table {font-size: 13px;font-weight: normal;
            border: 1px solid #2a94de; border-collapse: collapse;margin-left: 10px;
            word-break: break-all; word-wrap: break-word;width: 100%;
            box-shadow: 0px 0px 10px 5px #ccc;
        }
        tr{
            height: 35px;
        }
        tr td{height: 35px;text-align: center;padding: 3px;}
        tr th{padding: 5px;}
        .h{height: 35px;}
        .hot a{color: #de9a20;}
        .hot a:hover{color: #2a94de}
        .bg1{color: green;}
        .ok{
            display: inline-block;
            border: none;
            background: #1E9FFF;
            color: #fff;
            padding: 8px;
            letter-spacing: 1px;
            border-radius:5px;
            cursor: pointer;
        }
        .err{
            display: inline-block;
            border: none;
            background: #f6a828;
            color: #fff;
            padding: 8px;
            letter-spacing: 1px;
            border-radius:5px;
            cursor: pointer;
        }
    </style>

    <table border="1" cellspacing="0" cellpadding="0">

        <tr class="h">
            <th colspan="50">Gogo購購網 网购直邮进口<br>其他费用 <label style="color: red;">{$config['accountDay']}</label> 对账单</th>
        </tr>

        <tr>
            <th>经营商户</th>
            <th colspan="10" class="sh">{$config['uname']}</th>

            <th>电话</th>
            <th colspan="6">{$config['tel']}</th>

            <th>电邮</th>
            <th colspan="8">{$config['email']}</th>
        </tr>

        <tr>
            <th colspan="10">收费项名称</th>
            <th colspan="6" class="bg1">账单金额</th>
            <th colspan="11">收费标准</th>
        </tr>

        {volist name='datas' id='vo' key='k'}
        <tr>
            <td colspan="10">{$vo['project']}</td>
            <td colspan="6" class="bg1">{$vo['money']}</td>
            <td colspan="11">{$vo['desc']}</td>
        </tr>
        {/volist}

        <tr>
            <td colspan="5" style="background:#de9a20;">应付</td>
            <td colspan="18"><label style="font-size: 18px;font-weight: bold;color: red;">￥{$money} 元</label> </td>
        </tr>

        <tr>
            <td colspan="5" style="border-bottom: 0;">商户确认</td>

            <td colspan="18">
                <buttom class="ok">{$check}</buttom>
            </td>
        </tr>

    </table>
{/if}
