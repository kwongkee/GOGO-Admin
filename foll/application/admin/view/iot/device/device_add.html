<!DOCTYPE html>
<html>

<head>
    {include file="common/meta"}
</head>
<body class="gray-bg">
<div class="ibox-content">
    <form class="form-horizontal">
        <div class="form-group">
            <label class="col-sm-3 control-label">设备分类：</label>
            <div class="col-sm-8">
                <select class="form-control m-b" name="cate_id" id="cate_id">
                    <option value="">请选择</option>
                    {volist name='cate' id='vo'}
                    <option value="{$vo.id}">{$vo.name}</option>
                    {/volist}
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">接口配置：</label>
            <div class="col-sm-8">
                <select class="form-control m-b" name="setting_id" id="setting_id">
                    <option value="">请选择</option>
                    {volist name='setting' id='vo'}
                    <option value="{$vo.id}">{$vo.api_name}</option>
                    {/volist}
                </select>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-3 control-label">设备名称：</label>
            <div class="col-sm-8">
                <input type="text" name="device_name" id="device_name" value="" placeholder="" class="form-control">
                <span class="help-block m-b-none"></span>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">设备ID：</label>
            <div class="col-sm-8">
                <input type="text"  name="deviceid" id="deviceid" value="" placeholder="" class="form-control">
                <span class="help-block m-b-none"></span>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">操作参数：</label>
            <div class="col-sm-8">
                <input type="text" name="params" id="params" value="" placeholder='{"开":{"switch":"on"},"关":{"switch":"off"}}' class="form-control">
                <span class="help-block m-b-none"></span>
            </div>
        </div>
        <div class="form-group">
            <div class="col-sm-offset-3 col-sm-8">
                <a class="btn btn-sm btn-info" type="submit" onclick="save();return false;">提 交</a>
            </div>
        </div>
    </form>
</div>
</body>
<script>
    function save(){
        $.ajax({
            url:"{:Url('admin/iot/deviceadd')}",
            type:'post',
            dataType:'json',
            data:{
                setting_id:$("#setting_id").val(),
                device_name:$("#device_name").val(),
                deviceid:$("#deviceid").val(),
                params:$("#params").val(),
                class_id:$("#cate_id").val()
            },
            success:function (res) {
                parent.layer.msg(res.message,{icon: 1});
                if (res.code==0){
                    setTimeout(function () {
                        location.reload();
                    },3000);
                }
            }
        });
        return false;
    }
</script>
</html>
