<!DOCTYPE html>
<html>

<head>
    {include file="common/meta"}
</head>
<body class="gray-bg">
    <div class="ibox-content">
        <form class="form-horizontal">
            <div class="form-group">
                <label class="col-sm-3 control-label">名称：</label>
                <div class="col-sm-8">
                    <input type="text" name="api_name" id="api_name" value="" placeholder="名称" class="form-control">
                    <span class="help-block m-b-none"></span>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">手机号：</label>
                <div class="col-sm-8">
                    <input type="tel" id="tel" value="" placeholder="手机号" class="form-control">
                    <span class="help-block m-b-none">邮箱或手机必填一个</span>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">邮箱：</label>
                <div class="col-sm-8">
                    <input type="email" id="email" value="" placeholder="邮箱" class="form-control">
                    <span class="help-block m-b-none">邮箱或手机必填一个</span>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">密码：</label>
                <div class="col-sm-8">
                    <input type="text" id="password" value="" placeholder="密码" class="form-control">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">appid：</label>
                <div class="col-sm-8">
                    <input type="appid" id="appid" value="" placeholder="appid" class="form-control">
                    <span class="help-block m-b-none"></span>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">appsecret：</label>
                <div class="col-sm-8">
                    <input type="appsecret" id="appsecret" value="" placeholder="appsecret" class="form-control">
                    <span class="help-block m-b-none"></span>
                </div>
            </div>
            <div class="form-group">
                <div class="col-sm-offset-3 col-sm-8">
                    <a class="btn btn-sm btn-info" type="submit" onclick="save();return false;">提 交</a>
                </div>
            </div>
        </form>
    </div>
</body>
<script>
    function save(){
        $.ajax({
            url:"{:Url('admin/iot/addapisetting')}",
            type:'post',
            dataType:'json',
            data:{
                phone:$("#tel").val(),
                email:$("#email").val(),
                password:$("#password").val(),
                appid:$("#appid").val(),
                appsecret:$("#appsecret").val(),
                api_name:$("#api_name").val()
            },
            success:function (res) {
                parent.layer.msg(res.message,{icon: 1});
                if (res.code==0){
                    setTimeout(function () {
                        location.reload();
                    },3000);
                }
            }
        });
        return false;
    }
</script>
</html>
