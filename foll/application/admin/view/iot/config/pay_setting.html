<!DOCTYPE html>
<html>
<head>
    {include file="common/meta"}
</head>
<body class="gray-bg">
<div class="ibox-content">
    <form class="form-horizontal">
        <input type="hidden" name="id" id="id" value="{$res['id']}">
        <div class="form-group">
            <label class="col-sm-3 control-label">支付金额：</label>
            <div class="col-sm-8">
                <input type="text" name="money" id="money" value="{$res['money']}" placeholder="金额为0表示不需要支付" class="form-control">
                <span class="help-block m-b-none"></span>
            </div>
        </div>
        <div class="form-group">
            <div class="col-sm-offset-3 col-sm-8">
                <a class="btn btn-sm btn-info" type="submit" onclick="save();return false;">提 交</a>
            </div>
        </div>
    </form>
</div>
</body>
<script>
    function save(){
        $.ajax({
            url:"{:Url('admin/iot/paysetting')}",
            type:'post',
            dataType:'json',
            data:{
                money:$("#money").val(),
                id:$("#id").val()
            },
            success:function (res) {
                parent.layer.msg(res.message,{icon: 1});
                if (res.code==0){
                    setTimeout(function () {
                        location.reload();
                    },3000);
                }
            }
        });
        return false;
    }
</script>
</html>
