{include file="public/header_new"}
<style>
   img{ width:20px;height:20px;}
</style>
<body class="gray-bg">

        <div class="row">
          <div class="col-sm-12">
            <div class="ibox float-e-margins">
              <div class="ibox-content">


                <table id="table"

                  /*默认排序项*/
                  data-sort-name="create_time"
                  data-sort-order="desc"
                  /*工具栏相关*/
                  data-toolbar="#toolbar"
                  data-search="false"          /*搜索框*/
                  data-search-on-enter-key="false"
                  data-show-refresh="true"    /*刷新按钮*/
                  /*分页相关*/
                  data-side-pagination="server"
                  data-pagination="false"      /*显示分页*/
                  data-page-size="15"         /*每页显示条数*/
                  /*移动端相关*/
                  data-mobile-responsive="true"
                  data-card-view="true"
                  data-show-columns="true"
                  /*radio or checkbox字段名称*/
                  data-select-item-name="tids" >

                  <thead>
                    <tr>
                      <th data-field="id"
                        data-align="center"
                        data-sortable="true"
                        data-visible="false">ID</th>
                      <th data-field="hscode"
                        data-align="center"
                        data-sortable="true">Hs编码</th>
                      <th data-field="customs_ordersn"
                        data-align="center"
                        data-sortable="true">客户原单号</th>
                    <th data-field="brand_cn"
                        data-align="center"
                        data-sortable="true">品牌(中文)</th>
                      <th data-field="brand_en"
                        data-align="center"
                        data-sortable="true">品牌(英文)</th>
                      <th data-field="good_name"
                        data-align="center"
                        data-sortable="true">品名</th>
                    <th data-field="num"
                        data-align="center"
                        data-sortable="true">数量</th>
                    <th data-field="speks"
                        data-align="center"
                        data-sortable="true">规格</th>
                    <th data-field="unit_name"
                        data-align="center"
                        data-sortable="true">容量单位</th> 
                    <th data-field="pack_unit_name"
                        data-align="center"
                        data-sortable="true">包装单位</th>
                    <th data-field="series_model"
                        data-align="center"
                        data-sortable="true">系列型号</th>
                    <th data-field="material"
                        data-align="center"
                        data-sortable="true">材质</th>                   
                    <th data-field="g_weight"
                        data-align="center"
                        data-sortable="true">毛重</th> 
                    <th data-field="price"
                        data-align="center"
                        data-sortable="true">单价</th> 
                        <th data-field="consignee"
                        data-align="center"
                        data-sortable="true">收件人</th> 
                        <th data-field="consignee_phone"
                        data-align="center"
                        data-sortable="true">收件人电话</th>
                        <th data-field="consignee_zip"
                        data-align="center"
                        data-sortable="true">收件人邮编</th>
                        <th data-field="consignee_address"
                        data-align="center"
                        data-sortable="true">收件人地址</th> 
                        <th data-field="consignee_province"
                        data-align="center"
                        data-sortable="true">收件人省份</th> 
                        <th data-field="consignee_city"
                        data-align="center"
                        data-sortable="true">收件人城市</th> 
                        <th data-field="consignee_id"
                        data-align="center"
                        data-sortable="true">收件人身份证</th> 
                        <th data-field="former"
                        data-align="center"
                        data-sortable="true">发件人</th> 
                        <th data-field="former_phone"
                        data-align="center"
                        data-sortable="true">发件人电话</th>
                        <th data-field="former_zip"
                        data-align="center"
                        data-sortable="true">发件人邮编</th> 
                        <th data-field="former_address"
                        data-align="center"
                        data-sortable="true">发件人地址</th>
                        <th data-field="former_country"
                        data-align="center"
                        data-sortable="true">发件人国家</th> 
                        <th data-field="former_city"
                        data-align="center"
                        data-sortable="true">发件人城市</th> 
                        <th data-field="n_weigth"
                        data-align="center"
                        data-sortable="true">净重或数量</th> 
                        <th data-field="unit"
                        data-align="center"
                        data-sortable="true">计量单位</th> 
                        <th data-field="benefits"
                        data-align="center"
                        data-sortable="true">保证金</th> 
                      </tr>
                    </thead>
                  </table>
                </div>
              </div>
            </div>
          </div>


  <script type="text/javascript">

var table;

$(document).ready(function(){
        table = $('#table').bootstrapTable({
            url: "{:Url('admin/ccelec/getGoods')}",
            queryParams: queryParams,

        });

    });

    queryParams = function (params) {
        var temp = {
            sort: params.sort,
            order: params.order,
            limit: params.limit,            //页面大小
            offset: params.offset,          //页码
            batch_num: '{$batch_num}',

        };
        return temp;
    };

</script>

</body>
</html>
