<!DOCTYPE html>
<html>
<head>
    <title>编辑账户</title>
    <link rel="stylesheet" type="text/css" href="__STATIC__/plugins/layui/css/layui.css"/>
    <script type="text/javascript" src="__STATIC__/plugins/layui/layui.js"></script>
    <style>
        .header span{background: #009688;margin-left: 30px;padding: 10px;color: #fff;}
        .header div{border-bottom:solid 2px #009688;margin-top: 8px;}
        .header button{float: right;margin-top: -5px;}
        .ths{font-size: 22px;font-weight: bold}
        .boys{font-size: 16px;}
    </style>
</head>
<body style="padding-top: 10px;">


<form class="layui-form">

    <input type="hidden" name="id" value="{$data['id']}">

    <div class="layui-form-item">
        <div class="layui-inline">
            <label class="layui-form-label">银行卡号</label>
            <div class="layui-input-block">
                <input type="text" name="cardNo" required value="{$data['cardNo']}" maxlength="20"  lay-verify="required" placeholder="银行卡号" autocomplete="off" class="layui-input">
            </div>
        </div>
    </div>

    <div class="layui-form-item">
        <div class="layui-inline">
            <label class="layui-form-label">账户户名</label>
            <div class="layui-input-block">
                <input type="text" name="accName" required value="{$data['accName']}"  lay-verify="required" placeholder="账户户名" autocomplete="off" class="layui-input">
            </div>
        </div>
    </div>


    <div class="layui-form-item">
        <div class="layui-inline">
            <label class="layui-form-label">账户类型</label>
            <div class="layui-input-block">
                <select name="accType" lay-filter="accType" lay-verify="required">
                    <option value="0" {if $data['accType'] == '0'} selected {/if}>卡</option>
                    <option value="1" {if $data['accType'] == '1'} selected {/if}>存折</option>
                    <option value="2" {if $data['accType'] == '2'} selected {/if}>对公账号</option>
                </select>
            </div>
        </div>
    </div>


    <div class="layui-form-item">
        <div class="layui-inline">
            <label class="layui-form-label">所属银行</label>
            <div class="layui-input-block">
                <select name="code" lay-filter="code" lay-verify="required">
                    <option value="" names>所属银行</option>
                    {volist name="bank" id='vo'}
                        <option value="{$vo.code}" names="{$vo.Name}"  {if $data['code'] == $vo.code} selected {/if}>{$vo.Name}</option>
                    {/volist}
                </select>
            </div>
        </div>
    </div>


    <input type="hidden" value="{$data['bankName']}" name="bankNames" id="bankNames">

    <div class="layui-form-item">
        <div class="layui-inline">
            <div class="layui-input-block">
                <button lay-submit lay-filter="sub" class="layui-btn">编辑账户</button>
                <button type="reset" class="layui-btn layui-btn-primary">重 置</button>
            </div>
        </div>
    </div>


</form>

<script>
    layui.use(['form','layer','jquery'], function() {
        $ = layui.jquery,form = layui.form,layer = layui.layer;
        form.on('select(code)',function(data) {
            var op = data.elem[data.elem.selectedIndex];
            // 名称
            var names = $(op).attr('names');
            $('#bankNames').val(names);

        });

        // 监听提交
        form.on('submit(sub)', function(data) {
            var formData = data.field;
            // 提交数据
            $.post("{:url('admin/customs/doEdit')}",{formData},function(res) {
                var das = JSON.parse(res);
                if(das.code == '0' ) {
                    layer.msg(das.msg);
                    return false;
                }
                layer.msg(das.msg);
                setTimeout(function() {
                    layer.close(layer.index);
                    window.parent.location.reload();
                },800);
            });
            return false; //阻止表单跳转。如果需要表单跳转，去掉这段即可。
        });
    });
</script>

</body>
</html>
