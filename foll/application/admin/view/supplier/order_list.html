{include file="public/header_new"}
<style>
    img{ width:20px;height:20px;}
</style>
<body class="gray-bg">

<div class="row">
    <div class="col-sm-12">
        <div class="ibox float-e-margins">
            <div class="ibox-content">
                <h3 style="text-align: center;">京东订单管理</h3>
                <div id="toolbar" class="btn-group" style="margin-top: 10px;margin-bottom: 10px;line-height: 34px;">
                    <button type="button" href="javascript:;" onclick="add();" class="btn btn-default">
                        添加订单
                    </button>
                    <button type="button" href="javascript:;" onclick="export_excel();" class="btn btn-default" style="margin-left:7px;">
                        导入订单
                    </button>
                </div>
                <table id="table"

                /*默认排序项*/
                data-sort-name="createtime"
                data-sort-order="desc"
                /*工具栏相关*/
                data-toolbar="#toolbar"
                data-search="true"          /*搜索框*/
                data-search-on-enter-key="false"
                data-show-refresh="true"    /*刷新按钮*/
                /*分页相关*/
                data-side-pagination="server"
                data-pagination="true"      /*显示分页*/
                data-page-size="10"         /*每页显示条数*/
                /*移动端相关*/
                data-mobile-responsive="true"
                data-card-view="true"
                data-show-columns="true"
                /*radio or checkbox字段名称*/
                data-select-item-name="id" >

                <thead>
                <tr>
                    <th data-field="checkbox"
                        data-align="center"
                        data-checkbox="true"></th>
                    <th data-field="id"
                        data-align="center"
                        data-sortable="true"
                        data-visible="false">ID</th>
                    <th data-field="orderno"
                        data-align="center"
                        data-sortable="true">订单号</th>
                    <th data-field="currency"
                        data-align="center"
                        data-sortable="true">订单币种</th>
                    <th data-field="order_price"
                        data-align="center"
                        data-sortable="true">订单金额</th>
                    <th data-field="order_time"
                        data-align="center"
                        data-sortable="true">下单时间</th>
                    <th data-field="pay_time"
                        data-align="center"
                        data-sortable="true">付款时间</th>
                    <th data-field="user_name"
                        data-align="center"
                        data-sortable="true">所属商户</th>
                    <th data-field="status"
                        data-align="center"
                        data-sortable="true">状态</th>
                    <th data-field="check_status"
                        data-align="center"
                        data-sortable="true">确认状态</th>
                    <th data-field="manage"
                        data-align="center"
                        data-sortable="true"
                        data-formatter="actionFormatter">操作</th>
                </tr>
                </thead>
                </table>
            </div>
        </div>
    </div>
</div>

<script type="text/javascript">

    var table;

    $(document).ready(function(){
        table = $('#table').bootstrapTable({
            url: "{:url('admin/supplier/order_list')}",
            queryParams: queryParams,
        });
        $('.form-control').attr('placeholder','搜索订单编号');
    });

    queryParams = function (params) {
        var temp = {
            sort: params.sort,
            order: params.order,
            limit: params.limit,            //页面大小
            offset: params.offset,          //页码
            search: params.search,
        };
        return temp;
    };

    //操作栏的格式化
    function actionFormatter(value, row, index) {
        var id = row.id;
        var orderno = row.orderno;
        var user_id = row.user_id;
        var result = "";
        result += '<button style="margin-right: 5px;" type="button" onclick="edit('+id+',\''+orderno+'\')" class="btn btn-primary btn-xs">查看</button>';
        result += '<button style="margin-right: 5px;" type="button" onclick="edit_status('+id+',\''+orderno+'\','+user_id+')" class="btn btn-primary btn-xs">修改状态</button>';
        return result;
    }

    function edit(id,name){
        var index = layer.open({
            type: 2,
            title: '编辑-'+name,
            area:['100%','100%'],
            content: "{:url('admin/supplier/edit_order')}&id="+id
        });
        // layer.full(index);
    }

    function edit_status(id,name,user_id){
        var index = layer.open({
            type: 2,
            title: '修改状态-'+name,
            area:['80%','80%'],
            content: "{:url('admin/supplier/edit_order_status')}&id="+id+"&user_id="+user_id+"&orderno="+name
        });
    }

    function add(){
        var index = layer.open({
            type: 2,
            title: '添加订单',
            area:['600px','500px'],
            content: "{:url('admin/supplier/add_order')}"
        });
        layer.full(index);
    }

    //导入订单
    function export_excel(){
        var index = layer.open({
            type: 2,
            title: '导入订单',
            area:['50%','50%'],
            content: "{:url('admin/supplier/export_order')}"
        });
        // layer.full(index);
    }

</script>

</body>
</html>
