{include file="public/header"}
<style>
    .disf{display:flex;align-items: center;}
    .layui-card-header{background:#0a8ddf;color:#fff;}
</style>
<body style="padding: 10px;background-color: #f2f2f2;">
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <form class="layui-form" action="" method="post" lay-filter="component-form-element">
            <input type="text" style="display:none;" name="id" id="id" value="{$id}">
            <div class="layui-col-md12">
                <div class="layui-card">
                    <div class="layui-card-body">
                        <table class="layui-table">
                            <thead>
                            <tr>
                                <th>仓库编号</th>
                                <th>仓库名称</th>
                                <th>发货国</th>
                                <th>地址</th>
                                <th>联系方式</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr>
                                <td>
                                    <input type="text" lay-verify="required" name="no" value="{$data['no']}" placeholder="仓库编号" autocomplete="off" class="layui-input">
                                </td>
                                <td>
                                    <input type="text" lay-verify="required" name="name" value="{$data['name']}" placeholder="仓库名称" autocomplete="off" class="layui-input">
                                </td>
                                <td>
                                    <select name="country" lay-search lay-verify="required">
                                        {volist name="country" id="vo"}
                                        <option value="{$vo.code_value}" {php echo $data['country']==$vo.code_value?selected:'';}>{$vo.code_value}:{$vo.code_name}</option>
                                        {/volist}
                                    </select>
                                </td>
                                <td>
                                    <input type="text" lay-verify="required" name="address" id="address" value="{$data['address']}" placeholder="地址" autocomplete="off" class="layui-input">
                                </td>
                                <td>
                                    <input type="text" lay-verify="required" name="tel" id="tel" value="{$data['tel']}" placeholder="联系方式" autocomplete="off" class="layui-input">
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div class="layui-form-item" style="margin-top: 25px;text-align: center;">
                <div>
                    <button class="layui-btn layui-btn-normal" lay-submit lay-filter="component-form-element">立即提交</button>
                    <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                </div>
            </div>
        </form>
    </div>
</div>
</body>

<script type="text/javascript">
    layui.use(['layer','form','laydate'],function(){
        laydate = layui.laydate;
        layer = layui.layer;
        var form  = layui.form;
        $ = layui.jquery;

        laydate.render({
            elem: '#pay_time' //指定元素
            ,format: 'yyyy-MM-dd HH:mm:ss'
            ,type:'datetime'
        });

        form.on('submit(component-form-element)', function(data){
            //layer.msg(JSON.stringify(data.field));
            $.ajax({
                url:"{:Url('admin/supplier/warehouse_save')}",
                method:'post',
                data:data.field,
                dataType:'JSON',
                success:function(res){
                    layer.msg(res.msg,{time:2000}, function () {
                        if(res.code == 0)
                        {
                            parent.location.reload();
                        }
                    });
                },
                error:function (data) {
                    layer.msg('系统错误',{time:2000});
                }
            });
            return false;
        });
    });

</script>
</body>
</html>
