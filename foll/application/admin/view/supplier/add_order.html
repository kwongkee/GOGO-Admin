{include file="public/header"}
<style>
    .disf{display:flex;align-items: center;}
    .layui-card-header{background:#0a8ddf;color:#fff;}
</style>
<body style="padding: 10px;background-color: #f2f2f2;">
    <div class="layui-fluid">
        <div class="layui-row layui-col-space15">
            <form class="layui-form" action="" method="post" lay-filter="component-form-element">
                <div class="layui-col-md12">
                    <div class="layui-card">
                        <div class="layui-card-header">订单信息</div>
                        <div class="layui-card-body">
                            <table class="layui-table">
                                <thead>
                                <tr>
                                    <th>所属商户</th>
                                    <th>订单编号(只需输入京东订单编号)</th>
                                    <th>下单时间</th>
                                    <th>付款时间</th>
                                    <th>订单金额</th>
                                    <th>卖家备注</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr>
                                    <td>
                                        <select name="user_id" lay-search lay-verify="required" lay-filter="user_id">
                                            <option value="">请选择商户</option>
                                            {volist name="decl_user" id="vo"}
                                                <option value="{$vo.id}">{$vo.id}:{$vo.user_name}</option>
                                            {/volist}
                                        </select>
                                    </td>
                                    <td>
                                        <input type="text" lay-verify="required" name="orderno" value="" placeholder="订单编号" autocomplete="off" class="layui-input">
                                    </td>
                                    <td>
                                        <input type="text" lay-verify="required" name="order_time" id="order_time" value="" placeholder="下单时间" autocomplete="off" class="layui-input">
                                    </td>
                                    <td>
                                        <input type="text" lay-verify="required" name="pay_time" id="pay_time" value="" placeholder="付款时间" autocomplete="off" class="layui-input">
                                    </td>
                                    <td>
                                        <div class="disf">
                                            <select name="currency" lay-search lay-verify="required">
                                                {volist name="currency" id="vo"}
                                                <option value="{$vo.code_value}">{$vo.code_name}</option>
                                                {/volist}
                                            </select>
                                            <input type="text" lay-verify="required" name="order_price" value="" placeholder="订单金额" autocomplete="off" class="layui-input">
                                        </div>
                                    </td>
                                    <td>
                                        <input type="text" name="seller_remark" value="" placeholder="卖家备注" autocomplete="off" class="layui-input">
                                    </td>
                                </tr>

                                </tbody>
                                <thead>
                                <tr>
                                    <th>订单状态</th>
                                    <th>是否多个供应商</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr>
                                    <td>
                                        <select name="status" lay-search lay-verify="required">
                                            <option value="1">待发货</option>
                                            <!--<option value="2">待收货</option>-->
                                            <!--<option value="3">已完成</option>-->
                                            <!--<option value="4">已取消</option>-->
                                            <!--<option value="5">处理中</option>-->
                                        </select>
                                    </td>
                                    <td>
                                        <select name="is_more_supplier" id="is_more_supplier">
                                            <option value="">请选择是否多个供应商</option>
                                            <option value="1">是</option>
                                            <option value="2">否</option>
                                        </select>
                                    </td>
                                </tr>
                                </tbody>
                            </table>

                        </div>
                    </div>
                </div>

                <div class="layui-col-md12">
                    <div class="layui-card">
                        <div class="layui-card-header">收货信息</div>
                        <div class="layui-card-body">
                            <table class="layui-table">
                                <thead>
                                <tr>
                                    <th>收货人</th>
                                    <th>收货地址</th>
                                    <th>手机号</th>
                                    <th>固定电话</th>
                                    <th>买家留言</th>
                                    <th>买家邮箱</th>
                                </tr>
                                <tr>
                                    <td>
                                        <input type="text" lay-verify="required" name="buyer_name" value="" placeholder="收货人" autocomplete="off" class="layui-input">
                                    </td>
                                    <td>
                                        <input type="text" lay-verify="required" name="buyer_address" value="" placeholder="收货地址" autocomplete="off" class="layui-input">
                                    </td>
                                    <td>
                                        <input type="text" lay-verify="required" name="buyer_mobile" value="" placeholder="手机号" autocomplete="off" class="layui-input">
                                    </td>
                                    <td>
                                        <input type="text" name="buyer_tel" value="" placeholder="固定电话" autocomplete="off" class="layui-input">
                                    </td>
                                    <td>
                                        <input type="text" name="buyer_remark" value="" placeholder="买家留言" autocomplete="off" class="layui-input">
                                    </td>
                                    <td>
                                        <input type="text" name="buyer_email" value="" placeholder="买家邮箱" autocomplete="off" class="layui-input">
                                    </td>
                                </tr>
                                </thead>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="layui-col-md12">
                    <div class="layui-card">
                        <div class="layui-card-header">商品信息</div>
                        <div class="layui-card-body">
                            <table class="layui-table goods_info">

                                <thead>
                                <tr>
                                    <th>商品名称</th>
                                    <th>单价</th>
                                    <th>数量</th>
                                    <th>操作</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr>
                                    <td>
                                        <select name="goods_id[]" id="goods_id" lay-search lay-verify="required">
                                            <option value="">请选择该商户下已配置商品</option>
                                        </select>
                                    </td>
                                    <td>
                                        <div class="disf">
                                            <select name="goods_currency[]" lay-search lay-verify="required">
                                                {volist name="currency" id="vo"}
                                                <option value="{$vo.code_value}">{$vo.code_name}</option>
                                                {/volist}
                                            </select>
                                            <input type="text" lay-verify="required" name="goods_price[]" value="" placeholder="单价" autocomplete="off" class="layui-input">
                                        </div>
                                    </td>
                                    <td>
                                        <input type="text" lay-verify="required" name="goods_num[]" value="" placeholder="数量" autocomplete="off" class="layui-input">
                                    </td>
                                    <td>
                                        <a href="javascript:add();" class="layui-btn">增加</a>
                                    </td>
                                </tr>
                                </tbody>
                            </table>

                        </div>
                    </div>
                </div>
                <div class="layui-form-item" style="margin-top: 25px;text-align: center;">
                    <div>
                        <button class="layui-btn layui-btn-normal" lay-submit lay-filter="component-form-element">立即提交</button>
                        <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
    </body>

<script type="text/javascript">
    window.goods_list = '';
    layui.use(['layer','form','laydate'],function(){
        laydate = layui.laydate;
        layer = layui.layer;
        var form  = layui.form;
        $ = layui.jquery;

        laydate.render({
            elem: '#pay_time' //指定元素
            ,format: 'yyyy-MM-dd HH:mm:ss'
            ,type:'datetime'
        });
        laydate.render({
            elem: '#order_time' //指定元素
            ,format: 'yyyy-MM-dd HH:mm:ss'
            ,type:'datetime'
        });

        //获取商户下的商品
        form.on('select(user_id)',function(data){
            $.ajax({
                url:"{:Url('admin/supplier/get_user_goods')}",
                method:'post',
                data:{'user_id':data.value},
                dataType:'JSON',
                success:function(res){
                    if(res.code == 0)
                    {
                        window.goods_list=res.list;
                        let html = '<option value="">请选择该商户下已配置商品</option>';
                        for(let i=0;i<res.list.length;i++){
                            html += '<option value="'+res.list[i].id+'">'+res.list[i].gZnName+'('+res.list[i].gEnName+')</option>';
                        }

                        $('#goods_id').html(html);
                        form.render(null, 'component-form-element');
                    }
                },
                error:function (data) {
                    layer.msg('系统错误',{time:2000});
                }
            });
            return false;
        });

        form.on('submit(component-form-element)', function(data){
            //layer.msg(JSON.stringify(data.field));
            $.ajax({
                url:"{:Url('admin/supplier/add_order')}",
                method:'post',
                data:data.field,
                dataType:'JSON',
                success:function(res){
                    layer.msg(res.msg,{time:2000}, function () {
                        if(res.code == 0)
                        {
                            parent.location.reload();
                        }
                    });
                },
                error:function (data) {
                    layer.msg('系统错误',{time:2000});
                }
            });
            return false;
        });
    });
    var num=1;
    function add(){
        var layer = layui.layer
            ,$ = layui.jquery
            ,form = layui.form;
        var goods_list = window.goods_list;
        let html = '<tr class="gtr'+num+'">\n' +
            '                                    <td>\n'+
            '<select name="goods_id[]" id="goods_id" lay-search lay-verify="required">\n' +
            '                                            <option value="">请选择该商户下已配置商品</option>\n';
            for(let i=0;i<goods_list.length;i++){
                html += '<option value="'+goods_list[i].id+'">'+goods_list[i].gZnName+'('+goods_list[i].gEnName+')</option>';
            }
            html += '                                        </select>\n'+
            '                                    </td>\n' +
            '                                    <td>\n' +
            '                                        <div class="disf">\n' +
            '                                            <select name="goods_currency[]" lay-search lay-verify="required">\n'+
                                                            '<option value="398">(ASF)清算瑞士法郎</option>\n'+
                                                            '<option value="601">(AUD)澳大利亚元</option>\n'+
                                                            '<option value="501">(CAD)加拿大元</option>\n'+
                                                            '<option value="331">(CHF)瑞士法郎</option>\n'+
                                                            '<option value="142">(CNY)人民币</option>\n'+
                                                            '<option value="302">(DKK)丹麦克朗</option>\n'+
                                                            '<option value="201">(DZD)阿尔及利亚第纳尔</option>\n'+
                                                            '<option value="300">(EUR)欧元</option>\n'+
                                                            '<option value="303">(GBP)英镑</option>\n'+
                                                            '<option value="110">(HKD)港币</option>\n'+
                                                            '<option value="112">(IDR)印度尼西亚卢比</option>\n'+
                                                            '<option value="113">(IRR)伊朗里亚尔</option>\n'+
                                                            '<option value="116">(JPY)日本元</option>\n'+
                                                            '<option value="133">(KRW)韩国圆</option>\n'+
                                                            '<option value="118">(KWD)科威特第纳尔</option>\n'+
                                                            '<option value="121">(MOP)澳门元</option>\n'+
                                                            '<option value="122">(MYR)马来西亚林吉特</option>\n'+
                                                            '<option value="326">(NOK)挪威克朗</option>\n'+
                                                            '<option value="609">(NZD)新西兰元</option>\n'+
                                                            '<option value="129">(PHP)菲律宾比索</option>\n'+
                                                            '<option value="127">(PKR)巴基斯坦卢比</option>\n'+
                                                            '<option value="344">(RUB)俄罗斯卢布</option>\n'+
                                                            '<option value="330">(SEK)瑞典克朗</option>\n'+
                                                            '<option value="132">(SGD)新加坡元</option>\n'+
                                                            '<option value="136">(THB)泰国铢</option>\n'+
                                                            '<option value="143">(TWD)新台币</option>\n'+
                                                            '<option value="502">(USD)美元</option>\n'+
            '                                            </select>\n'+
            '                                            <input type="text" lay-verify="required" name="goods_price[]" value="" placeholder="单价" autocomplete="off" class="layui-input">\n' +
            '                                        </div>\n' +
            '                                    </td>\n' +
            '                                    <td>\n' +
            '                                        <input type="text" lay-verify="required" name="goods_num[]" value="" placeholder="数量" autocomplete="off" class="layui-input">\n' +
            '                                    </td>\n' +
            '                                    <td>\n' +
            '<div class="disf">\n'+
            '                                        <a href="javascript:add();" class="layui-btn">增加</a>\n' +
            '                                        <div data-num="'+num+'" class="layui-btn layui-btn-danger delGtr">删除</div>\n' +
            '</div>\n'+
            '                                    </td>\n' +
            '                                </tr>';

        $('.goods_info').append(html);
        form.render(null, 'component-form-element');
        num+=1;

        $('.delGtr').click(function(){
            let num = $(this).attr('data-num');
            $('.gtr'+num).remove();
        });
    }

</script>
</body>
</html>
