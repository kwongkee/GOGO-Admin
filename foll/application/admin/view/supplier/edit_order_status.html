{include file="public/header"}
<style>
    .disf{display:flex;align-items: center;}
    .layui-card-header{background:#0a8ddf;color:#fff;}
</style>
<body style="padding: 10px;background-color: #f2f2f2;">
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <form class="layui-form" action="" method="post" lay-filter="component-form-element">
            <input type="text" style="display:none;" name="id" id="id" value="{$id}">
            <input type="text" style="display:none;" name="user_id" id="user_id" value="{$user_id}">
            <input type="text" style="display:none;" name="orderno" id="orderno" value="{$orderno}">
            <div class="layui-col-md12">
                <div class="layui-card">
                    <div class="layui-card-body">
                        <div class="layui-row layui-form-item">
                            <div class="layui-form-item">
                                <div class="layui-col-md12">
                                    <label class="layui-form-label">选择状态：</label>
                                    <div class="layui-input-block" style="line-height: 2.8;">
                                        <select name="status" id="status" lay-search lay-verify="required" lay-filter="status">
                                            <option value="1" {if $data['status']==1}selected{/if}>待发货</option>
                                            <option value="2" {if $data['status']==2}selected{/if}>待收货</option>
                                            <option value="3" {if $data['status']==3}selected{/if}>已完成</option>
                                            <option value="4" {if $data['status']==4}selected{/if}>已取消</option>
                                            <option value="5" {if $data['status']==5}selected{/if}>处理中</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="layui-form-item status5" style="display:none;">
                                <div class="layui-col-md12">
                                    <label class="layui-form-label">退款信息：</label>
                                    <div class="layui-input-block">
                                        <table class="layui-table">
                                            <thead>
                                                <tr>
                                                    <!--<th>退款申请单号</th>-->
                                                    <th>退款币种</th>
                                                    <th>退款金额</th>
                                                    <th>申请时间</th>
                                                    <th>出库状态</th>
                                                    <th>订单商品</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <tr>
                                                    <!--<td><input type="text" class="layui-input" placeholder="退款申请单号" name="refund_no" id="refund_no"></td>-->
                                                    <td>
                                                        <select name="refund_currency" id="refund_currency" lay-search>
                                                            <option value="">请选择退款币种</option>
                                                            {foreach $currency as $k=>$v}
                                                            <option value="{$v['code_value']}">{$v['code_name']}</option>
                                                            {/foreach}
                                                        </select>
                                                    </td>
                                                    <td>
                                                        <input type="text" class="layui-input" placeholder="退款金额" name="refund_money" id="refund_money">
                                                    </td>
                                                    <td>
                                                        <input type="text" class="layui-input" placeholder="申请时间" name="apply_time" id="apply_time">
                                                    </td>
                                                    <td>
                                                        <select name="outbound_status" id="outbound_status">
                                                            <option value="">请选择出库状态</option>
                                                            <option value="1">未出库</option>
                                                            <option value="2">已出库</option>
                                                        </select>
                                                    </td>
                                                    <td>
                                                        <div id="goods_id" class="xm-select-demo" style="width:300px;"></div>
                                                    </td>
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="layui-form-item" style="margin-top: 25px;text-align: center;">
                <div>
                    <button class="layui-btn layui-btn-normal" lay-submit lay-filter="component-form-element">立即提交</button>
                    <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                </div>
            </div>
        </form>
    </div>
</div>
</body>
<script src="./static/hadmin/assets/layui/xm-select.js"></script>
<script type="text/javascript">
    layui.use(['layer','form','laydate'],function(){
        laydate = layui.laydate;
        layer = layui.layer;
        var form  = layui.form;
        $ = layui.jquery;

        laydate.render({
            elem: '#apply_time' //指定元素
            ,format: 'yyyy-MM-dd HH:mm:ss'
            ,type:'datetime'
        });

        // 商品列表
        var connect_foreignExchange = xmSelect.render({
            el: '#goods_id',
            paging: true,
            pageSize: 5,
            filterable: true,
            prop: {
                name: 'gZnName',
                value: 'id',
            },
            autoRow: true,
            data: {$goods},
            name: 'goods_id',
            layVerify: '',
            layVerType: 'msg',
        });

        //买家申请退款
        form.on('select(status)',function(data){
            let val = data.value;
            $('.status5').hide();
            if(val==5){
                $('.status5').show();
            }
        });

        form.on('submit(component-form-element)', function(data){
            //layer.msg(JSON.stringify(data.field));
            $.ajax({
                url:"{:Url('admin/supplier/edit_order_status')}",
                method:'post',
                data:data.field,
                dataType:'JSON',
                success:function(res){
                    layer.msg(res.msg,{time:2000}, function () {
                        if(res.code == 0)
                        {
                            parent.location.reload();
                        }
                    });
                },
                error:function (data) {
                    layer.msg('系统错误',{time:2000});
                }
            });
            return false;
        });
    });

</script>
</body>
</html>
