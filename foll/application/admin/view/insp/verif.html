<!DOCTYPE html>
<html>
<head>
    <title>查验风控</title>
    <link rel="stylesheet" type="text/css" href="__STATIC__/plugins/layui/css/layui.css"/>
    <script type="text/javascript" src="__STATIC__/plugins/layui/layui.js"></script>
    <style>
        .header span{background: #009688;margin-left: 30px;padding: 10px;color: #fff;}
        .header div{border-bottom:solid 2px #009688;margin-top: 8px;}
        .header button{float: right;margin-top: -5px;}
        .ths{font-size: 22px;font-weight: bold}
        .boys{font-size: 16px;}
    </style>
</head>
<body style="padding-top: 10px;">


<form class="layui-form">

    <div class="layui-form-item">
        <div class="layui-inline">

            <label class="layui-form-label">HS编码</label>
            <div class="layui-input-inline">
                <input type="text" name="hscode" required  lay-verify="required" placeholder="请输入HS编码" autocomplete="off" class="layui-input">
            </div>

            <div class="layui-form-mid">品牌</div>
            <div class="layui-input-inline">
                <input type="text" name="brand" required  lay-verify="required" placeholder="请输入品牌名称" autocomplete="off" class="layui-input">
            </div>

            <div class="layui-form-mid">商品名称</div>
            <div class="layui-input-inline">
                <input type="text" name="goodname" required  lay-verify="required" placeholder="请输入商品名称" autocomplete="off" class="layui-input">
            </div>

            <div class="layui-form-mid">所属分类</div>
            <div class="layui-input-inline">
                <select name="cate" lay-verify="required">
                    <option value="">请选择分类</option>
                    {volist name="cate" id='vo'}
                        <option value="{$vo.id}">{$vo.cateName}</option>
                    {/volist}
                </select>
            </div>

            <div class="layui-form-mid">风险描述</div>
            <div class="layui-input-inline">
                <input type="text" name="desc" required  lay-verify="required" placeholder="请输入风险描述" autocomplete="off" class="layui-input">
            </div>

        </div>
    </div>


    <div class="layui-form-item" style="text-align: left;margin-left: 20%;">

        <div class="layui-inline">

                <div class="layui-input-inline">
                    <a class="layui-btn" href="javascript:void(0);" onclick="addPost();">添加风险</a>
                    <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                </div>

                <div class="layui-input-inline">
                    <a class="layui-btn" href="javascript:void(0);" onclick="addCate();">添加分类</a>
                </div>

                <div class="layui-input-inline">
                    <a class="layui-btn" href="javascript:void(0);" onclick="Category();">分类管理</a>
                </div>
        </div>
    </div>
</form>

<table class="layui-table">
    <thead>
        <tr>
            <th>HS编码</th>
            <th>品牌名称</th>
            <th>商品名称</th>
            <th>风险类型</th>
            <th>风险描述</th>
            <th>添加日期</th>
            <th>关键词</th>
            <th>操作</th>
        </tr>
    </thead>

    <tbody>
        {volist name='order.lists' id='vo' key='k'}
        <tr>
            <td>{$vo.hscode}</td>
            <td>{$vo.brand}</td>
            <td>{$vo.goodname}</td>
            <td>{$cateNames[$vo['cate']]}</td>
            <td>{$vo.desc}</td>
            <td>{$vo.create_time|date='Y-m-d H:i:s',###}</td>
            <td>{$vo.keyword}</td>
            <td>
                <a href="javascript:void(0);" onclick="edit({$vo.id});" class="layui-btn layui-btn-sm">编辑</a>
                <a href="javascript:void(0);" onclick="del({$vo.id});" class="layui-btn layui-btn-sm layui-btn-danger">删除</a>
            </td>
        </tr>
        {/volist}
    </tbody>
</table>

<div class="layui-box layui-laypage layui-laypage-default">{$order.pages}</div>

<script>
    layui.use(['form','layer'], function() {
        $ = layui.jquery;
        var form = layui.form,layer = layui.layer;
    });


    // 添加操作
    function addPost() {
        var hscode   = $('input[name="hscode"]').val();
        var brand    = $('input[name="brand"]').val();
        var goodname = $('input[name="goodname"]').val();
        var desc     = $('input[name="desc"]').val();
        var cate     = $('select option:selected').val();

        if(hscode == '' && brand == '' && goodname == '') {
            layer.msg('至少有一项不能为空');
            return false;
        }

        if(cate == '') {
            layer.msg('请选择分类');
            return false;
        }

        if(desc == '') {
            layer.msg('风险描述不能为空');
            return false;
        }

        $.post("{:url('insp/add')}",{
            hscode:hscode,brand:brand,goodname:goodname,desc:desc,cate:cate,
        },function(res) {
            var das = JSON.parse(res);
            if(das.status) {
                layer.msg(das.msg);
            } else {
                layer.msg(das.msg);
            }

            setTimeout(function(){
                document.location.reload();
            },800);
        });
    }

    // 删除功能
    function del(id) {

        if(id == '') {
            layer.msg('数据不允许删除');
            return false;
        }

        layer.confirm('您确定要删除吗？',{title:'消息提示',btn:['确认','取消'],icon:3},function(){

            $.post("{:url('insp/del')}",{id:id},function(res) {
                var das = JSON.parse(res);
                if(das.status) {
                    layer.msg(das.msg);
                    setTimeout(function(){
                        document.location.reload();
                    },800);
                } else {
                    layer.msg(das.msg);
                }
            })

        },function(){
            layer.msg('取消删除')
        })
    }

    function edit(id) {
        layer.open({
            type:2,
            title:'编辑查验风险',
            shadeClose:true,
            shade:0.3,
            area:['500px','450px'],
            content:"{:Url('insp/edit')}&id="+id,
            yes:function(){},
            end:function(){}
        });
    }


    // 添加分类
    function addCate(){
        layer.open({
            type:2,
            title:'添加分类',
            shadeClose:true,
            shade:0.3,
            area:['400px','240px'],
            content:"{:Url('insp/cate')}",
            yes:function(){},
            end:function(){}
        });
    }

    // 分类管理
    function Category() {
        layer.open({
            type:2,
            title:'管理分类',
            shadeClose:true,
            shade:0.3,
            area:['600px','450px'],
            content:"{:Url('insp/catelist')}",
            yes:function(){},
            end:function(){}
        });
    }

</script>


</body>
</html>
