<!DOCTYPE html>
<html>
<head>
    <title>编辑查验风控</title>
    <link rel="stylesheet" type="text/css" href="__STATIC__/plugins/layui/css/layui.css"/>
    <script type="text/javascript" src="__STATIC__/plugins/layui/layui.js"></script>
    <style>
        .header span{background: #009688;margin-left: 30px;padding: 10px;color: #fff;}
        .header div{border-bottom:solid 2px #009688;margin-top: 8px;}
        .header button{float: right;margin-top: -5px;}
        .ths{font-size: 22px;font-weight: bold}
        .boys{font-size: 16px;}
    </style>
</head>
<body style="padding-top: 10px;">


<form class="layui-form">

    <div class="layui-form-item">
        <div class="layui-inline">
            <label class="layui-form-label">分类名称</label>
            <div class="layui-input-block">
                <input type="text" name="cateName" required lay-verify="required" placeholder="请输入分类名称" autocomplete="off" class="layui-input">
            </div>
        </div>
    </div>

    <div class="layui-form-item">
        <div class="layui-input-block">
            <a class="layui-btn" href="javascript:void(0);" onclick="addCates();">立即提交</a>
            <button type="reset" class="layui-btn layui-btn-primary">重置</button>
        </div>
    </div>
</form>


<script>
    layui.use(['form','layer'], function() {
        $ = layui.jquery;
        var form = layui.form,layer = layui.layer;
    });


    // 添加操作
    function addCates() {
        var cateName   = $('input[name="cateName"]').val();

        $.post("{:url('insp/docate')}",{
            cateName:cateName,
        },function(res) {
            var das = JSON.parse(res);
            if(das.status) {
                layer.msg(das.msg);
            } else {
                layer.msg(das.msg);
            }

            setTimeout(function(){
                window.parent.document.location.reload();
            },800);
        });
    }
</script>


</body>
</html>
