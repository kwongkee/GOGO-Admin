<!DOCTYPE html>
<html>
<head>
    <title>{$title}</title>
    <link rel="stylesheet" type="text/css" href="__STATIC__/plugins/layui/css/layui.css"/>
    <script type="text/javascript" src="__STATIC__/plugins/layui/layui.js"></script>
    <style>
        .header span{background: #009688;margin-left: 30px;padding: 10px;color: #fff;}
        .header div{border-bottom:solid 2px #009688;margin-top: 8px;}
        .header button{float: right;margin-top: -5px;}
        .ths{font-size: 22px;font-weight: bold}
        .boys{font-size: 16px;}
    </style>
</head>
<body style="padding-top: 10px;">

<table class="layui-table">
    <thead>
    <tr>
        <th>分类名称</th>
        <th>操作</th>
    </tr>
    </thead>

    <tbody>
    {volist name='orders' id='vo' key='k'}
    <tr>
        <td>{$vo.cateName}</td>
        <td>
            <a href="javascript:void(0);" onclick="edit({$vo.id});" class="layui-btn layui-btn-sm">编辑</a>
            <a href="javascript:void(0);" onclick="del({$vo.id});" class="layui-btn layui-btn-sm layui-btn-danger">删除</a>
        </td>
    </tr>
    {/volist}
    </tbody>
</table>

<div class="layui-box layui-laypage layui-laypage-default">{$pages}</div>

<script>
    layui.use(['form','layer'], function() {
        $ = layui.jquery;
        var form = layui.form,layer = layui.layer;
    });

    // 删除功能
    function del(id) {

        if(id == '') {
            layer.msg('数据不允许删除');
            return false;
        }

        layer.confirm('您确定要删除吗？',{title:'消息提示',btn:['确认','取消'],icon:3},function(){

            $.post("{:url('insp/catedel')}",{id:id},function(res) {
                var das = JSON.parse(res);
                if(das.status) {
                    layer.msg(das.msg);
                    setTimeout(function(){
                        document.location.reload();
                    },800);
                } else {
                    layer.msg(das.msg);
                }
            })

        },function(){
            layer.msg('取消删除')
        })
    }

    function edit(id) {
        layer.open({
            type:2,
            title:'编辑查验风险',
            shadeClose:true,
            shade:0.3,
            area:['400px','240px'],
            content:"{:Url('insp/catedit')}&id="+id,
            yes:function(){},
            end:function(){}
        });
    }
</script>


</body>
</html>
