<!DOCTYPE html>
<html>

<head>

    {include file="common/meta"}
</head>

<body class="gray-bg">
<div class="wrapper wrapper-content animated fadeInRight">
    <div class="row">
        <div class="col-sm-12">
            <div class="ibox float-e-margins">
                <div class="ibox-title">
                    <h5>角色修改</h5>
                </div>
                <div class="ibox-content">
                    <form method="post" class="form-horizontal" action="{:Url('admin/AdminCharacterEdit')}">
                        <input type="hidden" value="{$data.id}" name="id">
                        <div class="form-group">
                            <label class="col-sm-2 control-label">名称</label>
                            <div class="col-sm-10">
                                <input type="text" name="name" value="{$data.name}" class="form-control">
                            </div>
                        </div>
                        <div class="hr-line-dashed"></div>
                        <div class="form-group">
                            <label class="col-sm-2 control-label">备注</label>
                            <div class="col-sm-10">
                                <input type="text" name="remark" value="{$data.remark}" class="form-control">
                            </div>
                        </div>
                        <div class="hr-line-dashed"></div>
                            <div class="form-group">
                                <label class="col-sm-2 control-label">角色状态：</label>
                                <div class="col-sm-9">
                                    <label class="radio-inline">
                                        {if $data.status ==1}
                                        <input type="radio" checked="" value="1" id="optionsRadios1" name="roleStatus">启用</label>
                                        {else}
                                        <input type="radio"  value="1" id="optionsRadios1" name="roleStatus">启用</label>
                                        {/if}
                                    <label class="radio-inline">
                                        {if $data.status ==0}
                                        <input type="radio" checked="" value="0" id="optionsRadios2" name="roleStatus">禁用</label>
                                        {else}
                                        <input type="radio" value="0" id="optionsRadios2" name="roleStatus">禁用</label>
                                    {/if}
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-2 control-label" for="-NaN">权限：</label>
                                <div class="col-sm-9">
                                    <label class="radio-inline" for="-NaN">
                                        {if $data.read==1&&$data.write==0}
                                        <input type="radio" checked="" value="1" id="-NaN" name="authType">可读</label>
                                        {else}
                                        <input type="radio"  value="1" id="-NaN" name="authType">可读</label>
                                        {/if}
                                    <label class="radio-inline" for="-NaN">
                                        {if $data.write==1}
                                        <input type="radio" checked="" value="2" id="-NaN" name="authType">可写</label>
                                        {else}
                                        <input type="radio" value="2" id="-NaN" name="authType">可写</label>
                                        {/if}
                                </div>
                            </div>
                        <div class="hr-line-dashed"></div>
                        <div class="form-group">
                            <div class="col-sm-4 col-sm-offset-2">
                                <button class="btn btn-primary" type="submit">保存内容</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- 全局js -->
<script src="./static/hadmin/js/jquery.min.js?v=2.1.4"></script>
<script src="./static/hadmin/js/bootstrap.min.js?v=3.3.6"></script>

<!-- 自定义js -->
<script src="./static/hadmin/js/content.js?v=1.0.0"></script>

<!-- iCheck -->
<script src="./static/hadmin/js/plugins/iCheck/icheck.min.js"></script>
<script>
    $(document).ready(function () {
        $('.i-checks').iCheck({
            checkboxClass: 'icheckbox_square-green',
            radioClass: 'iradio_square-green',
        });
    });
</script>
</body>

</html>
