{include file="public/header_new"}
<style>
   img{ width:20px;height:20px;}
</style>
<body class="gray-bg">

        <div class="row">
          <div class="col-sm-12">
            <div class="ibox float-e-margins">
              <div class="ibox-content">

                <div id="toolbar" class="btn-group" style="margin-top: 10px;margin-bottom: 10px;line-height: 34px;">
                    <button type="button" href="javascript:;" onClick="data_add('新增反馈','{:url('admin/Prerecorded/adddepartureresult')}&ylordersn={$ylordersn}')" class="btn btn-default">
                      新增反馈
                    </button>
                </div>
                <input type="hidden" id="ylordersn" value="{$ylordersn}">
                <table id="table"

                  /*默认排序项*/
                  data-sort-name="create_at"
                  data-sort-order="desc"
                  /*工具栏相关*/
                  data-toolbar="#toolbar"
                  data-search="true"          /*搜索框*/
                  data-search-on-enter-key="false"
                  data-show-refresh="true"    /*刷新按钮*/
                  /*分页相关*/
                  data-side-pagination="server"
                  data-pagination="true"      /*显示分页*/
                  data-page-size="15"         /*每页显示条数*/
                  /*移动端相关*/
                  data-mobile-responsive="true"
                  data-card-view="true"
                  data-show-columns="true"
                  /*radio or checkbox字段名称*/
                  data-select-item-name="tids" >

                  <thead>
                    <tr>
                      <th data-field="checkbox"
                        data-align="center"
                        data-checkbox="true"></th>
                      <th data-field="id"
                        data-align="center"
                        data-sortable="true"
                        data-visible="false">ID</th>
                      <th data-field="title"
                        data-align="center"
                        data-sortable="true">标题</th>
                     <th data-field="status"
                        data-align="center"
                        data-sortable="true">状态</th>
                      <th data-field="create_at"
                        data-align="center"
                        data-sortable="true">反馈时间</th>
                      

                      </tr>
                    </thead>
                  </table>
                </div>
              </div>
            </div>
          </div>


  <script type="text/javascript">

var table;

$(document).ready(function(){
        table = $('#table').bootstrapTable({
            url: "{:url('admin/Prerecorded/getdepartureresult')}",
            queryParams: queryParams,

        });
        $('.form-control').attr('placeholder','搜索关键词');
    });

    queryParams = function (params) {
        var temp = {
            sort: params.sort,
            order: params.order,
            limit: params.limit,            //页面大小
            offset: params.offset,          //页码
            search: params.search,
            ylordersn: $("#ylordersn").val()
        };
        return temp;
    };

    //发送
    function data_add(title,url)
    {
        var index = layer.open({
            type: 2,
            title: title,
            content: url
        });
        layer.full(index);
    }


</script>

</body>
</html>
