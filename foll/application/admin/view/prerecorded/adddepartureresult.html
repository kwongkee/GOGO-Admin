{include file="public/header_new" /}

<!--百度富文本-->
<script type="text/javascript" src="static/cklein/plugins/ueditor/ueditor.config.js"></script>
<script type="text/javascript" src="static/cklein/plugins/ueditor/ueditor.all.min.js"> </script>
<script type="text/javascript" src="static/cklein/plugins/ueditor/lang/zh-cn/zh-cn.js"></script>

<script type="text/javascript">
    function gosendMail() {
        var title = $("#title").val();
        var status = $("#status").val();
        var ylordersn = $("#ylordersn").val();
        var ue = UE.getEditor('content');
        var content = ue.getContent();

        if(!title)
        {
            layer.msg('发送标题不能为空！', {icon:2, time:2000});
            return false;
        }

        if(!content)
        {
            layer.msg('发送内容不能为空！', {icon:2, time:2000});
            return false;
        }

        layer.confirm('确认新增该反馈信息吗？',function(index){

            $.ajax({
                url: "{:Url('admin/Prerecorded/addsavedepartureresult')}",
                data:{'title':title, 'status':status, 'content':content ,'ylordersn': ylordersn  },
                type:'post',
                cache:false,
                dataType:'json',
                success:function(data){
                    if(data.status==1)
                    {
                        layer.msg(data.message, {
                                    icon: 1,
                                    time: 2000
                                }, function(){
                                    parent.window.table.bootstrapTable('refresh');
                                    var index = parent.layer.getFrameIndex(window.name);
                                    parent.layer.close(index);
                                });
                                return true;
                    }else {
                        layer.msg(data.message, {icon:2, time:2000});
                        return false;
                    }
                },
                error:function() {
                   layer.msg('系统出错,请重试',{icon:2,time:1000});
                }
            });
        });


    }
</script>

<body class="gray-bg">

    <div class="wrapper wrapper-content">
        <div class="row">
            <div class="col-sm-12 animated fadeInRight">
                <div class="mail-box-header">
                    <div class="pull-right tooltip-demo">

                    </div>
                    <h2>
                    新增反馈
                </h2>
                </div>
                <div class="mail-box">
                    <div class="mail-body">
                        <form class="form-horizontal">
                            <input type="hidden" id="ylordersn" value="{$ylordersn}">
                            <div class="form-group">
                                <label class="col-sm-2 control-label">标题：</label>
                                <div class="col-sm-10">
                                    <input type="text" class="form-control" id="title">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-2 control-label">反馈状态：</label>
                                <div class="col-sm-10">
                                    <select class="form-control m-b" id="status">
                                        <option value="1">待提交</option>
                                        <option value="3">待申报</option>
                                        <option value="4">已申报</option>
                                        <option value="5">申请撤回</option>
                                        <option value="6">已撤回</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-2 control-label">反馈内容：</label>
                                <div class="col-sm-10">
                                    <div class="mail-text h-200">
                                        <script id="content" type="text/plain" style="width:100%;height:400px;"></script>
                                        <div class="clearfix"></div>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>

                    <div class="mail-body text-right tooltip-demo">
                        <button type="button" href="javascript:;" onClick="gosendMail()" class="btn btn-default">
                          添加
                        </button>
                    </div>
                    <div class="clearfix"></div>

                </div>

            </div>
        </div>
    </div>


	<script type="text/javascript">
    $(document).ready(function()
    {
        var ue = UE.getEditor('content', {
            initialFrameHeight: 400,
            serverUrl: 'static/cklein/plugins/ueditor/php/controller.php'
        });

    });
    </script>

</body>

</html>
