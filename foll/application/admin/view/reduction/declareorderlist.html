{include file="public/header_new"}
<style>
    img{ width:20px;height:20px;}
</style>
<body class="gray-bg">

<div class="row">
    <div class="col-sm-12">
        <div class="ibox float-e-margins">
            <div class="ibox-content">
                <h3 style="text-align: center;">还原清单申报</h3>
                <div id="toolbar" class="btn-group" style="margin-top: 10px;margin-bottom: 10px;line-height: 34px;">
                    <button type="button" href="javascript:;" onClick="addOrder('生成申报清单','')" class="btn btn-default">
                        生成申报清单
                    </button>
                </div>
                <table id="table"

                /*默认排序项*/
                data-sort-name="createtime"
                data-sort-order="desc"
                /*工具栏相关*/
                data-toolbar="#toolbar"
                data-search="false"          /*搜索框*/
                data-search-on-enter-key="false"
                data-show-refresh="true"    /*刷新按钮*/
                /*分页相关*/
                data-side-pagination="server"
                data-pagination="true"      /*显示分页*/
                data-page-size="10"         /*每页显示条数*/
                /*移动端相关*/
                data-mobile-responsive="true"
                data-card-view="true"
                data-show-columns="true"
                /*radio or checkbox字段名称*/
                data-select-item-name="tids" >

                <thead>
                <tr>
                    <th data-field="checkbox"
                        data-align="center"
                        data-checkbox="true"></th>
                    <th data-field="id"
                        data-align="center"
                        data-sortable="true"
                        data-visible="false">ID</th>
                    <th data-field="preNo"
                        data-align="center"
                        data-sortable="true">预录入编号</th>
                    <th data-field="invtNo"
                        data-align="center"
                        data-sortable="true">清单编号</th>
                    <th data-field="entIntNum"
                        data-align="center"
                        data-sortable="true">企业内部编号</th>
                    <th data-field="ordNo"
                        data-align="center"
                        data-sortable="true">订单编号</th>
                    <th data-field="logisticsNo"
                        data-align="center"
                        data-sortable="true">运单编号</th>
                    <th data-field="ebp_name"
                        data-align="center"
                        data-sortable="true">电商平台名称</th>
                    <th data-field="saleEnt"
                        data-align="center"
                        data-sortable="true">生产销售企业名称</th>
                    <th data-field="ebc_name"
                        data-align="center"
                        data-sortable="true">申报企业名称</th>
                    <th data-field="transMode"
                        data-align="center"
                        data-sortable="true">运输方式</th>
                    <th data-field="voyago"
                        data-align="center"
                        data-sortable="true">航班航次号</th>
                    <th data-field="deliveryNum"
                        data-align="center"
                        data-sortable="true">提运单号</th>
                    <th data-field="epcNo"
                        data-align="center"
                        data-sortable="true">总包号</th>
                    <th data-field="tradeModeName"
                        data-align="center"
                        data-sortable="true">贸易方式</th>
                    <th data-field="declType"
                        data-align="center"
                        data-sortable="true">申报类型</th>
                    <th data-field="appStatusName"
                        data-align="center"
                        data-sortable="true">业务状态</th>
                    <th data-field="beginDate"
                        data-align="center"
                        data-sortable="true">入库时间</th>
                    <th data-field="createtime"
                        data-align="center"
                        data-sortable="true">创建时间</th>
                    <th data-field="manage"
                        data-align="center"
                        data-sortable="true"
                        data-formatter="actionFormatter">操作</th>
                </tr>
                </thead>
                </table>
            </div>
        </div>
    </div>
</div>

<script type="text/javascript">

    var table;

    $(document).ready(function(){
        table = $('#table').bootstrapTable({
            url: "{:url('admin/reduction/declareorderlist')}",
            queryParams: queryParams,
        });
        // $('.form-control').attr('placeholder','搜索提单编号');
    });

    queryParams = function (params) {
        var temp = {
            sort: params.sort,
            order: params.order,
            limit: params.limit,            //页面大小
            offset: params.offset,          //页码
            search: params.search,
        };
        return temp;
    };

    //操作栏的格式化
    function actionFormatter(value, row, index) {
        var id = row.id;
        var result = "";
        result += '<button style="margin-right: 5px;" type="button" onclick="batchView('+"'"+id+"'"+')" class="btn btn-primary btn-xs">查看</button>';
        return result;
    }

    function batchView(id) {
        window.open("{:url('admin/reduction/declare_single_window')}&id="+id);

        // var index = layer.open({
        //     type: 2,
        //     title: '中国国际贸易单一窗口',
        //     content: "{:url('admin/reduction/single_window')}&id="+id
        // });
        // layer.full(index);
    }

    function addOrder(title){
        var index = layer.open({
            type: 2,
            title: title,
            area:['820px','600px'],
            content: "{:url('admin/reduction/generate_declareorderlist')}"
        });
    }

    //发送
    function data_add(title,url)
    {
        layer.open({
            type: 2,
            title: title,
            area:['820px','600px'],
            content: "{:url('admin/export/newOrderMerge')}"
        });
        // var index = layer.open({
        //     type: 2,
        //     title: title,
        //     content: url
        // });
        // layer.full(index);
    }



</script>

</body>
</html>
