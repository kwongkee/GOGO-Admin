{include file="public/header"}
<body style="padding: 10px;">

<div class="header">
    <span>角色列表</span>
    <button class="layui-btn layui-btn-sm" onclick="add()">添加</button>
    <div></div>
</div>

<table class="layui-table">
    <thead>
    <tr>
        <th>ID</th>
        <th>角色名称</th>
        <th>操作</th>
    </tr>
    </thead>

    <tbody>
    {volist name="lists" id="vo"}
    <tr>
        <td>{$vo.gid}</td>
        <td>{$vo.title}</td>
        <td>
            <button class="layui-btn layui-btn-warm layui-btn-xs" onclick="add({$vo.gid})">编辑</button>
            <button class="layui-btn layui-btn-danger layui-btn-xs" onclick="del({$vo.gid})">删除</button>
        </td>
    </tr>
    {/volist}
    </tbody>
</table>
</body>
<script type="text/javascript">
    layui.use(['layer'],function(){
        layer = layui.layer;
        $     = layui.jquery;
    });

    // 添加角色
    function add(gid)
    {
        layer.open({
            type:2,
            title:gid>0 ? '编辑角色' : '添加角色',
            shade:0.3,
            area:['580px','520px'],
            content:'{:Url("agents/role/add")}&gid='+gid
        });
    }


    function del(id)
    {
        layer.confirm('确定要删除吗？',{icon:3,btn:['确定','取消']},function(){

            $.post("/index.php/admin/roles/doDel",{gid:id},function(res){
                if(res.code == 1) {
                    layer.msg(res.msg,{icon:1});
                    setTimeout(function(){
                        layer.closeAll();
                        parent.window.location.reload();
                    },1500);
                } else {
                    layer.alert(res.msg,{icon:2});
                }
            },'json');
        })
    }

</script>

</html>
