{include file="public/header"}
<body style="padding: 10px;">
<form action="" class="layui-form" id="form1">

    <input type="hidden" id="pids" value="{$menu.mid}">
    <?php if($menu){?>
    <div class="layui-form-item">
        <label for="" class="layui-form-label">上级菜单</label>
        <div class="layui-input-inline">
            <input type="text" class="layui-input" readonly value="{$menu.title}">
        </div>
    </div>
    <?php }?>

    <div class="layui-form-item">
        <label for="" class="layui-form-label">菜单名称</label>
        <div class="layui-input-inline">
            <input type="text" class="layui-input" required name="title">
        </div>
    </div>

    <div class="layui-form-item">
        <label for="" class="layui-form-label">排序</label>
        <div class="layui-input-inline">
            <input type="number" class="layui-input" required name="ord">
        </div>
    </div>

    <div class="layui-form-item">
        <label for="" class="layui-form-label">控制器名称</label>
        <div class="layui-input-inline">
            <input type="text" class="layui-input" required name="controller">
        </div>
    </div>

    <div class="layui-form-item">
        <label for="" class="layui-form-label">控制器方法</label>
        <div class="layui-input-inline">
            <input type="text" class="layui-input" required name="method">
        </div>
    </div>

    <div class="layui-form-item">
        <label for="" class="layui-form-label">状态</label>
        <div class="layui-input-inline">
            <input type="checkbox" name="ishidden" lay-skin="primary" title="是否隐藏" value="1">
        </div>
    </div>

</form>

<div class="layui-form-item">
    <div class="layui-input-block">
        <button class="layui-btn" onclick="save()">保存</button>
    </div>
</div>

<script type="text/javascript">
    layui.use(['layer','form'],function(){
        layer = layui.layer;
        var form  = layui.form;
        $ = layui.jquery;
    })


    // 添加管理员
    function save()
    {
        var pid = $('#pids').val();
        var title      = $('input[name="title"]').val();
        var controller = $('input[name="controller"]').val();
        var method     = $('input[name="method"]').val();

        if(pid>0 && title == '') {
            layer.msg('请输入菜单名称',{icon:2});
            return false;
        }

        if(pid>0 && controller == '') {
            layer.msg('请输入控制器名称',{icon:2});
            return false;
        }
        if(pid>0 && method == '') {
            layer.msg('请输入方法名称',{icon:2});
            return false;
        }

        // 请求处理数据
        $.post("{:Url('agents/menu/edit')}",{
            pid:pid,
            title:title,
            controller:controller,
            method:method,
            ord:$('input[name="ord"]').val(),
            ishidden:$('input[name="ishidden"]:checked').val(),

        },function(res){

            if(res.code == 1) {
                layer.msg(res.msg,{icon:1});
                setTimeout(function(){
                    layer.closeAll();
                    parent.window.location.reload();
                },1500);
            } else {
                layer.msg(res.msg,{icon:2});
            }

        });
    }
</script>
</body>
</html>
