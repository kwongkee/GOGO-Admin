<!--百度富文本-->
<script type="text/javascript" src="static/cklein/plugins/ueditor/ueditor.config.js"></script>
<script type="text/javascript" src="static/cklein/plugins/ueditor/ueditor.all.min.js"> </script>
<script type="text/javascript" src="static/cklein/plugins/ueditor/lang/zh-cn/zh-cn.js"></script>

<script type="text/javascript">
    function gosendMail() {
        var name = $("#name").val();
        var type = $("#type").val();

        if(!name)
        {
            layer.msg('项目名称不能为空！', {icon:2, time:2000});
            return false;
        }

        layer.confirm('确认新增该配置吗？',function(index){

            $.ajax({
                url: "{:Url('agents/config/cost_add')}",
                data:{'name':name, 'type':type},
                type:'post',
                cache:false,
                dataType:'json',
                success:function(data){
                    if(data.status==1)
                    {
                        layer.msg(data.message, {
                                    icon: 1,
                                    time: 2000
                                }, function(){
                                    parent.window.table.bootstrapTable('refresh');
                                    var index = parent.layer.getFrameIndex(window.name);
                                    parent.layer.close(index);
                                });
                                return true;
                    }else {
                        layer.msg(data.message, {icon:2, time:2000});
                        return false;
                    }
                },
                error:function() {
                   layer.msg('系统出错,请重试',{icon:2,time:1000});
                }
            });
        });


    }
</script>

<body class="gray-bg">

    <div class="wrapper wrapper-content">
        <div class="row">
            <div class="col-sm-12 animated fadeInRight">
                <div class="mail-box-header">
                    <div class="pull-right tooltip-demo">

                    </div>
                    <h2>
                    项目配置
                </h2>
                </div>
                <div class="mail-box">
                    <div class="mail-body">
                        <form class="form-horizontal" method="get">

                            <div class="form-group">
                                <label class="col-sm-2 control-label">项目类型：</label>
                                <div class="col-sm-10">
                                    <select id="type">
                                        <option value="1">离岸收款</option>
                                        <option value="2">离岸转账</option>
                                        <option value="3">国内提现</option>
                                        <option value="4">国内所得税</option>
                                        <option value="5">离岸所得税</option>
                                        <option value="6">离岸换汇</option>
                                    </select>
                                </div>
                            </div>

                            <div class="form-group">
                                <label class="col-sm-2 control-label">项目名称：</label>

                                <div class="col-sm-10">
                                    <input type="text" class="form-control" id="name">
                                </div>
                            </div>
                        </form>
                    </div>


                    <div class="mail-body text-right tooltip-demo">
                        <button type="button" href="javascript:;" onClick="gosendMail()" class="btn btn-default">
                          保存
                        </button>
                    </div>
                    <div class="clearfix"></div>

                </div>

            </div>
        </div>
    </div>


	<script type="text/javascript">
    $(document).ready(function()
    {
        var ue = UE.getEditor('content', {
            initialFrameHeight: 400,
            serverUrl: 'static/cklein/plugins/ueditor/php/controller.php'
        });

    });
    </script>

</body>

</html>
