
{include file="public/header_new"}
<body class="gray-bg">

<div class="row">
    <div class="col-sm-12">
        <div class="ibox float-e-margins">
            <div class="ibox-content">
                <h3 style="text-align: center;">会员配置会计</h3>
                <table id="table"

                /*默认排序项*/
                data-sort-name="followtime"
                data-sort-order="desc"
                /*工具栏相关*/
                data-toolbar="#toolbar"
                data-search="false"          /*搜索框*/
                data-search-on-enter-key="false"
                data-show-refresh="true"    /*刷新按钮*/
                /*分页相关*/
                data-side-pagination="server"
                data-pagination="true"      /*显示分页*/
                data-page-size="20"         /*每页显示条数*/
                /*移动端相关*/
                data-mobile-responsive="true"
                data-card-view="true"
                data-show-columns="true"
                /*radio or checkbox字段名称*/
                data-select-item-name="tids" >

                <thead>
                <tr>
                    <th data-field="fanid"
                        data-align="center"
                        data-sortable="true">ID</th>
                    <th data-field="nickname"
                        data-align="center"
                        data-sortable="true">粉丝名称</th>
                        <th data-field="openid"
                        data-align="center"
                        data-sortable="true">openid</th>
                    <th data-field="is_accounting"
                        data-align="center"
                        data-sortable="true">是否会计</th>
                    <th data-field="followtime"
                        data-align="center"
                        data-sortable="true">关注时间</th>
                    <th data-field="manage"
                        data-align="center"
                        class="td-manage">操作</th>
                </tr>
                </thead>
                </table>
            </div>
        </div>
    </div>
</div>


<script type="text/javascript">

    var table;

    $(document).ready(function(){
        table = $('#table').bootstrapTable({
            url: "{:Url('admin/account/member')}",
            queryParams: queryParams,

        });

    });

    queryParams = function (params) {
        var temp = {
            sort: params.sort,
            order: params.order,
            limit: params.limit,            //页面大小
            offset: params.offset,          //页码
        };
        return temp;
    };


    //配置权限
    function editInfo(title,url,id)
    {
        $.ajax({
            url:'{:Url("admin/account/set_member_to_account")}',
            type:"POST",
            dataType:"json",
            data: { fanid: id},
            success:function (res) {
                layer.msg(res.message, {
                    icon: 1,
                    time: 2000
                }, function(){
                    window.location.reload();
                });
            },
            error:function (xhr) {
                layer.msg('链接服务错误..');
            }
        });

        // var index = layer.open({
        //     type: 2,
        //     title: title,
        //     content: url + '&id=' + id
        // });
        // layer.full(index);
    }

    function delInfo(id)
    {
        layer.confirm('确认要删除该账户吗？', {
            btn: ['确认','取消']
        }, function(){
            $.ajax({
                url:'{:Url("admin/accountConfig/offshore_account_del")}',
                type:"POST",
                dataType:"json",
                data: { id: id},
                success:function (res) {
                    layer.msg(res.message, {
                        icon: 1,
                        time: 2000
                    }, function(){
                        window.location.reload();
                    });
                },
                error:function (xhr) {
                    layer.msg('链接服务错误..');
                }
            });
        }, function(){

        });
    }

    function data_add(title,url)
    {
        var index = layer.open({
            type: 2,
            title: title,
            content: url
        });
        layer.full(index);
    }


</script>

</body>
</html>
