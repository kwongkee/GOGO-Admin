{include file="public/header"}
<style>
    .disf{display:flex;align-items: center;}
    .layui-card-header{background:#0a8ddf;color:#fff;}
    .is_tax2,.exchange_rate{display:none;}
    .is_tax2{margin-top:10px;}
</style>
<body style="padding: 10px;background-color: #f2f2f2;">
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <form class="layui-form" action="" method="post" lay-filter="component-form-element1">
            <div class="layui-col-xs12">
                <div class="layui-col-xs3">
                    企业名称
                </div>
                <div class="layui-col-xs9">
                    <input type="text" class="layui-input" name="enterprise_name" id="enterprise_name" value="" lay-verify="required"/>
                </div>
            </div>
            <div class="layui-col-xs12" style="margin:15px 0;">
                <div class="layui-col-xs3">
                    法人
                </div>
                <div class="layui-col-xs9">
                    <input type="text" class="layui-input" name="legal_name" id="legal_name" value="" lay-verify="required" />
                </div>
            </div>
            <div class="layui-col-xs12">
                <div class="layui-col-xs3">
                    组织机构代码
                </div>
                <div class="layui-col-xs9">
                    <input type="text" class="layui-input" name="orgNo" id="orgNo" value="" lay-verify="required" />
                </div>
            </div>
            
            <div class="layui-form-item" style="margin-top: 25px;text-align: center;">
                <div>
                    <button class="layui-btn layui-btn-normal" lay-submit lay-filter="component-form-element">立即提交</button>
                    <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                </div>
            </div>
            
        </form>
    </div>
</div>
</body>

<script type="text/javascript">

    layui.use(['layer','form','laydate'],function(){
        laydate = layui.laydate;
        layer = layui.layer;
        var form  = layui.form;
        $ = layui.jquery;

        form.render(null,'component-form-element1');

        form.on('submit(component-form-element)', function(data){
            //layer.msg(JSON.stringify(data.field));
            $.ajax({
                url:"{:Url('admin/enterprise/add_elist')}",
                method:'post',
                data:data.field,
                dataType:'JSON',
                success:function(res){
                    layer.msg(res.msg,{time:2000}, function () {
                        if(res.code == 0)
                        {
                            parent.location.reload();
                        }
                    });
                },
                error:function (data) {
                    layer.msg('系统错误',{time:2000});
                }
            });
            return false;
        });

        
    });
</script>
</body>
</html>
