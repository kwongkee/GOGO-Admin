<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>编辑角色</title>
    <link rel="stylesheet" href="./static/hadmin/assets/layui/css/layui.css">
    <link rel="stylesheet" href="./static/hadmin/assets/common.css"/>
    <link rel="stylesheet" href="./static/hadmin/css/zTreeStyle/zTreeStyle.css"/>
    <style>
        body .layui-tree-skin-shihuang .layui-tree-branch{color: #EDCA50;}

    </style>
</head>
<body>
<form class="layui-form" action="">
    <input type="hidden" name="id" value="{$role['id']}">
    <div class="layui-form-item">
        <label class="layui-form-label">角色名：</label>
        <div class="layui-input-block">
            <input type="text" name="role_name" value="{$role['role_name']}" required  lay-verify="required" placeholder="请输入名称" autocomplete="off" class="layui-input">
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">说明</label>
        <div class="layui-input-block">
            <input type="text" name="remark" value="{$role['remark']}" placeholder="" autocomplete="off" class="layui-input">
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">状态</label>
        <div class="layui-input-block">
            <select name="status" lay-verify="required">
                <option value=""></option>
                <option value="0" {if $role['status']==0}selected{/if}>启用</option>
                <option value="1" {if $role['status']==1}selected{/if}>禁用</option>
            </select>
        </div>
    </div>
    <div style="width: 100%;margin-left: 68px;">
        <div style="border: 1px solid #333333c4;width: 252px;float: left;height:auto !important;">
            <ul id="treeDemo" class="ztree"></ul>
        </div>
    </div>

    <div class="layui-form-item">
        <div class="layui-input-block">
            <button class="layui-btn" lay-submit lay-filter="formDemo">立即提交</button>
            <button type="reset" class="layui-btn layui-btn-primary">重置</button>
        </div>
    </div>
</form>

</body>
<script src="./static/hadmin/assets/jquery-3.2.1.min.js"></script>
<script src="./static/hadmin/assets/layui/layui.js"></script>
<script src="./static/hadmin/js/jquery.ztree.core.js"></script>
<script src="./static/hadmin/js/jquery.ztree.excheck.min.js"></script>
<script>
    var idlist = [];
    layui.use(['form','jquery'], function(){
        var form = layui.form;
        var $ = layui.jquery;
        form.on('submit(formDemo)', function(data) {
            var treeObj = $.fn.zTree.getZTreeObj("treeDemo"),
                nodes = treeObj.getCheckedNodes(true);
            // v = "";
            var ids = [];
            for (var i = 0; i < nodes.length; i++) {
                // v += nodes[i].title + ",";
                ids.push({"id":nodes[i].id,"pid":nodes[i].pId,"level":nodes[i].level});
                // if (nodes[i].pId != "0") {
                //     ids += nodes[i].id + ",";
                // }
            }
            $.ajax({
                url: '{:Url("admin/customssystem/roleEdit")}',
                type: "POST",
                dataType: "JSON",
                data: {"menu":ids,"data":data.field},
                success:function (res) {
                    layer.msg(res.msg);
                    if (res.code==0){
                        setTimeout(function () {
                            location.reload();
                        },2000);
                    }
                },error:function (xhr) {
                    layer.msg("连接服务错误..");
                }
            });
            return false;
        });
    });

    $(function () {
        //ZTREE
        var setting = {
            view: {
                selectedMulti: true, //设置是否能够同时选中多个节点
                showIcon: true, //设置是否显示节点图标
                showLine: true, //设置是否显示节点与节点之间的连线
                showTitle: true, //设置是否显示节点的title提示信息
            },
            data: {
                simpleData: {
                    enable: true, //设置是否启用简单数据格式（zTree支持标准数据格式跟简单数据格式，上面例子中是标准数据格式）
                    idKey: "id", //设置启用简单数据格式时id对应的属性名称
                    pidKey: "pid", //设置启用简单数据格式时parentId对应的属性名称,ztree根据id及pid层级关系构建树结构
                    rootPId:0
                },
                key:{
                    name:"title"
                }
            },
            check:{
                enable: true , //设置是否显示checkbox复选框
                chkStyle:"checkbox"
            },
        };
        $.ajax({
            type: "Get",
            dataType:"json",
            url: "{:Url('admin/customssystem/getMenuList')}",   //ajax请求地址
            success: function (data) {
                $.fn.zTree.init($("#treeDemo"), setting, data);
            },
        });
    });

</script>
</html>
