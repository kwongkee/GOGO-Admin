<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>海关申报系统菜单管理</title>
    <link rel="stylesheet" href="./static/hadmin/assets/layui/css/layui.css">
    <link rel="stylesheet" href="./static/hadmin/assets/common.css"/>
    <link rel="stylesheet" href="./static/hadmin/css/zTreeStyle/zTreeStyle.css"/>
    <style>
        body .layui-tree-skin-shihuang .layui-tree-branch{color: #EDCA50;}

    </style>
</head>
<body style="padding: 10px;">

<form class="layui-form" id="form">
    <div class="layui-col-md6">
        <div class="layui-form-item">
            <label class="layui-form-label">菜单配置</label>
            <div class="layui-input-block" style="border: 1px solid #333333c4;width: 60%;height:auto !important;">
                <ul id="treeDemo" class="ztree"></ul>
            </div>
        </div>
    </div>
    <div class="layui-col-md6">
        <div class="layui-form-item">
            <label class="layui-form-label">业务类型配置</label>
            <div class="layui-input-block" style="border: 1px solid #333333c4;width: 60%;height:auto !important;">
                <ul id="BusinessType" class="ztree"></ul>
            </div>
        </div>
    </div>
    <input type="hidden" id="user_id" value="{$userData.id}">
    <input type="hidden" id="user_menus" value="{$userData.menus}">
    <input type="hidden" id="business_type" value="{$userData.business_type}">
    <div class="layui-form-item">
        <div class="layui-input-block">
            <button class="layui-btn" lay-submit lay-filter="formDemo">保存提交</button>
        </div>
    </div>
</form>




</body>
<script src="./static/hadmin/assets/layui/layui.js"></script>
<script src="./static/hadmin/assets/jquery-3.2.1.min.js"></script>
<script src="./static/hadmin/js/jquery.ztree.core.js"></script>
<script src="./static/hadmin/js/jquery.ztree.excheck.min.js"></script>

<script>
    //Demo
    layui.use(['form','layer'], function () {

        var form = layui.form;
        var layer = layui.layer;
        var $ = layui.jquery;
        form.on('submit(formDemo)', function(data) {
            var treeObj = $.fn.zTree.getZTreeObj("treeDemo"),
            nodes = treeObj.getCheckedNodes(true);

            var menus = "";
            for (i = 0; i < nodes.length; i++) {
                menus += nodes[i].id + ","; //获取选中节点的TID 
            }

            var treeType = $.fn.zTree.getZTreeObj("BusinessType"),
            type_nodes = treeType.getCheckedNodes(true);

            var business_type = "";
            for (i = 0; i < type_nodes.length; i++) {
                business_type += type_nodes[i].id + ","; //获取选中节点的TID 
            }

            $.ajax({
                    url: '{:Url("admin/merchant/menu")}',
                    type: "POST",
                    dataType: "JSON",
                    data: {"menus":menus, "business_type":business_type, "id": $("#user_id").val() },
                    success:function (res) {
                        layer.msg(res.msg);
                        if (res.code==0){
                            setTimeout(function () {
                            location.reload();
                            },2000);
                        }
                    },error:function (xhr) {
                        layer.msg("连接服务错误..");
                    }
                });
            return false;

        });
        

    });

    $(function () {
        //ZTREE
        var setting = {
            view: {
                selectedMulti: true, //设置是否能够同时选中多个节点
                showIcon: true, //设置是否显示节点图标
                showLine: true, //设置是否显示节点与节点之间的连线
                showTitle: true, //设置是否显示节点的title提示信息
            },
            data: {
                simpleData: {
                    enable: true, //设置是否启用简单数据格式（zTree支持标准数据格式跟简单数据格式，上面例子中是标准数据格式）
                    idKey: "id", //设置启用简单数据格式时id对应的属性名称
                    pidKey: "pid", //设置启用简单数据格式时parentId对应的属性名称,ztree根据id及pid层级关系构建树结构
                    rootPId:0
                },
                key:{
                    name:"title"
                }
            },
            check:{
                enable: true , //设置是否显示checkbox复选框
                chkStyle:"checkbox"
            },
        };
        $.ajax({
            url: "{:Url('admin/customssystem/getMenuList')}",   //ajax请求地址
            type: "POST",
            dataType: "JSON",
            data: {"user_id": $("#user_id").val() },
            success: function (data) {
                $.fn.zTree.init($("#treeDemo"), setting, data.menuList);
                $.fn.zTree.getZTreeObj("treeDemo").expandAll(true);
                $.fn.zTree.init($("#BusinessType"), setting, data.typeList);
                $.fn.zTree.getZTreeObj("BusinessType").expandAll(true);
            },
        });
    });

</script>
</html>
