<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>海关申报系统菜单管理</title>
    <link rel="stylesheet" href="./static/hadmin/assets/layui/css/layui.css">
    <link rel="stylesheet" href="./static/hadmin/assets/common.css"/>
</head>
<body style="padding: 10px;">

<form class="layui-form" id="form">

    <input type="hidden" name="parent_id" id="parent_id" value="{$pid}">
    <div class="layui-form-item">
        <label class="layui-form-label">用户名称</label>
        <div class="layui-input-block">
            <input type="text" name="user_name" required  lay-verify="required" placeholder="请输入名称" autocomplete="off" class="layui-input">
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">手机号码</label>
        <div class="layui-input-block">
            <input type="text" name="user_tel" required placeholder="请输入用户手机号码" autocomplete="off" class="layui-input">
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">用户邮箱</label>
        <div class="layui-input-block">
            <input type="text" name="user_email" placeholder="请输入用户邮箱" autocomplete="off" class="layui-input">
        </div>
    </div>


    <div class="layui-form-item">
        <label class="layui-form-label">是否启用</label>
        <div class="layui-input-block">
            <input type="radio" name="isOpen" title="启用" value="1" checked lay-skin="switch">
            <input type="radio" name="isOpen" title="关闭" value="0" lay-skin="switch">
        </div>
    </div>

    <div class="layui-form-item layui-form-text">
        <label class="layui-form-label">身份费率</label>
        <div class="layui-input-block">
            <input type="text" class="layui-input" required placeholder="请输入身份费率" name="idfee">
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">申报失败</label>
        <div class="layui-input-block">
            <input type="radio" name="isCharge" title="收费" value="1" checked lay-skin="switch">
            <input type="radio" name="isCharge" title="不收费" value="0" lay-skin="switch">
        </div>
    </div>

    <div class="layui-form-item layui-form-text">
        <label class="layui-form-label">申报费率</label>
        <div class="layui-input-block">
            <input type="text" class="layui-input" required placeholder="请输入申报费率" name="sbfee">
        </div>
    </div>

    <div class="layui-form-item layui-form-text">
        <label class="layui-form-label">支付费率</label>
        <div class="layui-input-block">
            <input type="text" class="layui-input" required placeholder="请输入支付费率" name="payfee">
        </div>
    </div>

    <div class="layui-form-item layui-form-text">
        <label class="layui-form-label">货值折扣</label>
        <div class="layui-input-block">
            <input type="number" class="layui-input" required placeholder="请输入 0.1 ~ 1 的数字折扣" name="payhfee">
        </div>
    </div>

</form>

<div class="layui-form-item">
    <div class="layui-input-block">
        <button class="layui-btn" onclick="save()" lay-filter="formDemo">保存提交</button>
    </div>
</div>


</body>
<script src="./static/hadmin/assets/layui/layui.js"></script>
<script src="./static/hadmin/assets/jquery-3.2.1.min.js"></script>

<script>
    //Demo
    layui.use('form', function(){
        var form = layui.form;
        $  = layui.jquery;
    });

    // 保存方法
    function save()
    {
        var user_name  = $('input[name="user_name"]').val();
        var user_tel   = $('input[name="user_tel"]').val();
        var idfee      = $('input[name="idfee"]').val();
        var sbfee      = $('input[name="sbfee"]').val();
        var payfee     = $('input[name="payfee"]').val();
        var payhfee    = $('input[name="payhfee"]').val();

        if(user_name == '') {
            layer.msg('用户名称不能为空',{icon:2});return false;
        }

        if(user_tel == '') {
            layer.msg('用户手机号码不能为空',{icon:2});return false;
        }

        if(idfee == '') {
            layer.msg('身份费率不能为空',{icon:2});return false;
        }

        if(sbfee == '') {
            layer.msg('申报费率不能为空',{icon:2});return false;
        }

        if(payfee == '') {
            layer.msg('支付费率不能为空',{icon:2});return false;
        }

        if(payhfee == '') {
            layer.msg('支付货值折扣不能为空',{icon:2});return false;
        }

        $.ajax({
            url:"{:Url('admin/merchant/doAdd')}",
            type:"POST",
            dataType:"json",
            data:$('#form').serialize(),
            success:function (res) {
                if(res.code == 1) {
                    layer.msg(res.msg,{icon:1});
                    setTimeout(function(){
                        layer.closeAll();
                        parent.window.location.reload();
                    },1000)
                } else {
                    layer.msg(res.msg,{icon:2});
                }
                console.log(res);
            },
            error:function (xhr) {
                layer.msg('数据保存失败，请稍后重试...');
            }
        });


    }

</script>
</html>
