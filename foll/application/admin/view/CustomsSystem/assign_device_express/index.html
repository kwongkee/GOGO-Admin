<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>分配设备和快递公司</title>
    <link rel="stylesheet" href="./static/hadmin/assets/layui/css/layui.css">
    <link rel="stylesheet" href="./static/hadmin/assets/common.css"/>
</head>
<body>
<form class="layui-form" action="">
    <div class="layui-form-item">
        <label class="layui-form-label">选择设备</label>
        <div class="layui-input-block">
            <div id="connect_device" class="xm-select-demo"></div>
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">快递公司</label>
        <div class="layui-input-block">
            <div id="connect_express" class="xm-select-demo"></div>
        </div>
    </div>

    <div class="layui-form-item">
        <div class="layui-input-block">
            <button class="layui-btn" lay-submit lay-filter="formDemo">立即提交</button>
            <button type="reset" class="layui-btn layui-btn-primary">重置</button>
        </div>
    </div>
</form>

</body>
<script src="./static/hadmin/assets/jquery-3.2.1.min.js"></script>
<script src="./static/hadmin/assets/layui/layui.js"></script>
<script src="./static/hadmin/assets/layui/xm-select.js"></script>
<script>
    layui.use(['form','jquery'], function(){
        var form = layui.form;
        var $ = layui.jquery;

        // 设备列表
        var connect_device = xmSelect.render({
            el: '#connect_device',
            paging: true,
            pageSize: 5,
            filterable: true,
            prop: {
                name: 'name',
                value: 'id',
            },
            autoRow: true,
            data: {$device},
            name: 'device',
            layVerify: 'required',
            layVerType: 'msg',
            initValue: [{$deex['device_id']}]
        });

        // 快递公司
        var connect_express = xmSelect.render({
            el: '#connect_express',
            paging: true,
            pageSize: 5,
            filterable: true,
            prop: {
                name: 'name',
                value: 'id',
            },
            autoRow: true,
            data: {$express},
            name: 'express',
            layVerify: 'required',
            layVerType: 'msg',
            initValue: [{$deex['express_id']}]
        });

        form.on('submit(formDemo)', function(data) {
            $.ajax({
                url: '{:Url("admin/assign_device_express/saveConfig")}',
                type: "POST",
                dataType: "JSON",
                data: {"uid":{$uid},"data":data.field},
                success:function (res) {
                    layer.msg(res.message);
                    // if (res.code==0){
                    //     setTimeout(function () {
                    //         location.reload();
                    //     },2000);
                    // }
                },error:function (xhr) {
                    layer.msg("连接服务错误..");
                }
            });
            return false;
        });
    });


</script>
</html>
