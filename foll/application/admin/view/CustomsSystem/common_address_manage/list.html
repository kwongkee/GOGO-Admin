<!DOCTYPE html>
<html>

<head>
    {include file="common/meta"}
    <link rel="stylesheet" href="./static/hadmin/layui/css/layui.css"></link>
    <style type="text/css">
        /*您可以将下列样式写入自己的样式表中*/
        .childBody{padding: 15px;}

        /*layui 元素样式改写*/
        .layui-btn-sm{line-height: normal; font-size: 12.5px;}
        .layui-table-view .layui-table-body{min-height: 256px;}
        .layui-table-cell .layui-input.layui-unselect{height: 30px; line-height: 30px;}

        /*设置 layui 表格中单元格内容溢出可见样式*/
        .table-overlay .layui-table-view,
        .table-overlay .layui-table-box,
        .table-overlay .layui-table-body{overflow: visible;}
        .table-overlay .layui-table-cell{height: auto; overflow: visible;}

        /*文本对齐方式*/
        .text-center{text-align: center;}
    </style>

</head>
<body class="gray-bg">

<!--<table class="layui-hide" id="tabl" lay-filter="tabl"></table>-->
<div class="layui-card">
    <div class="layui-card-body layui-text">
        <div id="toolbar">
            <div>
                <form class="layui-form">
                    <div class="layui-inline">
                        <label class="layui-form-label">手机号</label>
                        <div class="layui-inline">
                            <input style="height:38px;margin-top: 0px;" class="layui-input" name="phone" id="phone">
                        </div>
                    </div>

                    <button class="layui-btn" style="margin-top: -6px;" onclick="search();return false;">搜索</button>
                    <button class="layui-btn" id="refresh" style="margin-top: -8px;float: right;">
                        <i class="layui-icon layui-icon-refresh-3" ></i>刷新
                    </button>
            </div>
        </div>
        <div id="tableRes" class="table-overlay">
            <table id="dataTable" lay-filter="dataTable" class="layui-hide"></table>
        </div>
    </div>
</div>
</body>
<!-- 全局js -->
<!--<script src="./static/hadmin/js/jquery.min.js?v=2.1.4"></script>-->
<!-- Bootstrap table -->
<script type="text/html" id="toolbarDemo">
    <div class="layui-btn-container">
        <button class="layui-btn layui-btn-sm" lay-event="addData">添加</button>
    </div>
</script>
<script src="./static/hadmin/layui/layui.all.js"></script>
<script>
    // admin/goods/add

    layui.use(['jquery', 'table', 'layer'], function () {
        var $ = layui.$, table = layui.table, form = layui.form, layer = layui.layer;

        window.viewObj = {
            tbData:[],
        };
        //数据表格实例化

        var tbWidth = $("#tableRes").width();
        var layTableId = "layTable";
        tableIns = table.render({
            elem: '#dataTable',

            id: layTableId,
            url:'{:Url("admin/CommonAddressManage/getAddrList")}',
            // data: viewObj.tbData,
            width: tbWidth,
            page: true,
            loading: true,
            even: false, //不开启隔行背景
            toolbar: '#toolbarDemo',
            cols: [[
                {type: 'checkbox', fixed: 'left'},
                {field:'id',title: '序号', type: 'numbers'},
                {field: 'phone', title: '手机号'},
                {field: 'address', title: '地址',width:300},
                {field: 'tempId', title: '操作', templet: function(d){
                        return '<a class="layui-btn layui-btn-xs layui-btn-danger" lay-event="del" lay-id="'+ d.tempId +'"><i class="layui-icon layui-icon-delete"></i>移除</a>';
                    }}
            ]],
            done: function(res, curr, count){
                viewObj.tbData = res.data;
            }
        });

        //定义事件集合
        var active = {
            removeEmptyTableCache: function(){
                var oldData = table.cache[layTableId];
                for(var i=0, row; i < oldData.length; i++){
                    row = oldData[i];
                    if(!row || !row.tempId){
                        oldData.splice(i, 1);    //删除一项
                    }
                    continue;
                }
                tableIns.reload({
                    data: oldData
                });
            },
        }

        //激活事件
        var activeByType = function (type, arg) {
            if(arguments.length === 2){
                active[type] ? active[type].call(this, arg) : '';
            }else{
                active[type] ? active[type].call(this) : '';
            }
        }

        //注册按钮事件
        $('.layui-btn[data-type]').on('click', function () {
            var type = $(this).data('type');
            activeByType(type);
        });


        //监听工具条
        table.on('tool(dataTable)', function (obj) {
            var data = obj.data, event = obj.event, tr = obj.tr; //获得当前行 tr 的DOM对象;
            console.log(data);
            switch(event){
                case "del":
                    layer.confirm('真的删除行么？', function(index){
                        $.ajax({
                            url:'{:Url("admin/CommonAddressManage/delete")}',
                            type:"GET",
                            dataType:"json",
                            data:{id:data.id},
                            success:function (resp) {
                                if (resp.code==1){
                                    layer.msg(resp.msg);
                                }else{
                                    obj.del(); //删除对应行（tr）的DOM结构，并更新缓存
                                    layer.close(index);
                                    activeByType('removeEmptyTableCache');
                                }
                            }
                        })

                    });
                    break;
            }
        });

        table.on('toolbar(dataTable)', function(obj){
            switch(obj.event){
                case 'addData':
                    layer.open({
                        type: 1,
                        area:['585px','315px'],
                        content: '<form class="layui-form" action="">\n' +
                            '  <div class="layui-form-item">\n' +
                            '    <label class="layui-form-label">手机号</label>\n' +
                            '    <div class="layui-input-block">\n' +
                            '      <input type="text" name="phone" id="phone" required  lay-verify="required" placeholder="手机号" autocomplete="off" class="layui-input">\n' +
                            '    </div>\n' +
                            '  </div>\n' +
                            '  <div class="layui-form-item">\n' +
                            '    <label class="layui-form-label">常用收件地址</label>\n' +
                            '    <div class="layui-input-block">\n' +
                            '      <input type="text" name="address" id="address" required  lay-verify="required" placeholder="地址" autocomplete="off" class="layui-input">\n' +
                            '    </div>\n' +
                            '  </div>\n' +
                            '  <div class="layui-form-item">\n' +
                            '    <div class="layui-input-block">\n' +
                            '      <button class="layui-btn" lay-submit lay-filter="formDemo">立即提交</button>\n' +
                            '    </div>\n' +
                            '  </div>\n' +
                            '</form>' //这里content是一个普通的String
                    });
                    form.on('submit(formDemo)', function(data){
                        $.ajax({
                            url:"{:Url('admin/CommonAddressManage/create')}",
                            type:"POST",
                            dataType:"json",
                            data:data.field,
                            success:function (ret) {
                                layer.msg(ret.msg);
                            }
                        });
                        return false;
                    });
                    break;
            }
        });

        $('#refresh').on('click',function () {
            tableIns.reload();
            return false;
        });
    });

    function search() {
        tableIns.reload({
            where:{phone:$('#phone').val(),status:$('#wherestatus').val()}
        })
        return false
    }


</script>
</html>
