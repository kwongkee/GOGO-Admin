<!DOCTYPE html>
<html>

<head>
    {include file="common/meta"}
    <link rel="stylesheet" href="./static/hadmin/layui/css/layui.css"></link>
</head>
<body class="gray-bg">
<div class="col-sm-12">
    <div class="ibox float-e-margins">
        <div class="ibox-content" style="display:block;" id="list1">
            <table class="table table-hover">
                <thead>
                <tr>
                    <th>商品货号</th>
                    <th>标题</th>
                    <th>价格</th>
                    <th>购买人数</th>
                    <th>地址</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody>
                {volist name="list" id="vo"}
                <tr>
                    <td>{$vo.ebp_goods_no}</td>
                    <td><input value="{$vo.title}"></td>
                    <td>{$vo.price}</td>
                    <td>{$vo.number}</td>
                    <td><a style="color: red;" href="{$vo.url}" target="_blank">打开地址</a></td>
                    <td>
                        <a class="btn btn-info" href="#"  type="button" onclick="confirmSele('{$vo.ebp_goods_no}','{$vo.url}','{$vo.price}')"><i class="fa fa-paste"></i>选择</a>
                    </td>
                </tr>
                {/volist}
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
<!-- 全局js -->
<script src="./static/hadmin/js/jquery.min.js?v=2.1.4"></script>
<script src="./static/hadmin/js/bootstrap.min.js?v=3.3.6"></script>
<!-- 自定义js -->
<script src="./static/hadmin/js/content.js?v=1.0.0"></script>
<!-- Bootstrap table -->
<script src="./static/hadmin/js/plugins/bootstrap-table/bootstrap-table.min.js"></script>
<!--<script src="./static/hadmin/js/plugins/bootstrap-table/bootstrap-table-mobile.min.js"></script>-->
<!--<script src="./static/hadmin/js/plugins/bootstrap-table/locale/bootstrap-table-zh-CN.min.js"></script>-->
<script src="./static/hadmin/layui/layui.all.js"></script>
<script>
    function confirmSele(goodId,url,price){
        $.ajax({
            url:"{:url('admin/goods/saveGoodsLink')}",
            type:'POST',
            dataType:"json",
            data:{goodsn:goodId,url:url,price:price},
            success:function(res){
                if (res.code==0){
                    parent.layer.msg(res.message, {icon: 6});
                } else{
                    parent.layer.msg(res.message, {icon: 5});
                }
            },error:function (xhr) {
                parent.layer.msg('系统异常', {icon: 5});
            }
        })
        return false;
    }
</script>
</html>
