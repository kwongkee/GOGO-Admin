<!DOCTYPE html>
<html>
<head>
    {include file="common/meta"}
    <link rel="stylesheet" type="text/css" href="./static/plugins/layui/css/layui.css"/>
    <script type="text/javascript" src="./static/plugins/layui/layui.js"></script>
    <style>
        .header span{background: #009688;margin-left: 30px;padding: 10px;color: #fff;}
        .header div{border-bottom:solid 2px #009688;margin-top: 8px;}
        .header button{float: right;margin-top: -5px;}
        th{
            padding:3px 12px;
        }
    </style>
</head>
<body style="padding-top: 10px;">
<div class="layui-col-md12">
    <div class="layui-card">
        <div class="layui-card-header" style="height:98px;">
            <p>商品图片文件名请以商品自编号为准,后缀jpg格式。</br>ps:商品名称.jpg,商品详情页头页尾请加：商品名称_head.jpg,商品名称_footer.jpg。多张图请使用：自编号加下划线商品名称(xxx_01.jpg)</p>
        </div>
        <div class="layui-card-body">
            <div class="layui-upload">
                <blockquote class="layui-elem-quote layui-quote-nm" style="margin-top: 10px;">
                    预览图：
                    <div class="layui-upload-list" id="test-upload-more-list"></div>
                </blockquote>
                <button type="button" class="layui-btn" id="test-upload-more">图片上传</button><input class="layui-upload-file" type="file" accept="undefined" name="file" multiple="">
            </div>
        </div>
    </div>
</div>
<script type="text/javascript">
    var priceNum = 0;
    layui.use(['layer','jquery','upload','form'],function(){
        layer = layui.layer;
        $ = layui.jquery;
        upload = layui.upload;
        form = layui.form;

        //多图片上传
        upload.render({
            elem: '#test-upload-more'
            ,url: "{:Url('admin/goods/upload_goods_image')}"
            ,multiple: true
            ,accept:'file'
            ,exts:'jpg'
            ,before: function(obj){
                //预读本地文件示例，不支持ie8
                obj.preview(function(index, file, result){
                    $('#test-upload-more-list').append('<img src="'+ result +'" alt="'+ file.name +'" class="layui-upload-img" style="width:92p;height: 92px;margin:0 10px 10px 0; ">')
                });
                layer.load(); //上传loading
            }
            ,done: function(res){
                //上传完毕
                layer.closeAll('loading'); //关闭loading
                if(res.code<0){
                    layer.msg(res.message);
                    return false;
                }
                priceNum+=1;
                layer.msg(res.message+priceNum);
            }
            ,error:function (index,upload) {
                layer.msg('服务异常');
                layer.closeAll('loading'); //关闭loading
            }
        });

    });


</script>
</body>
</html>
