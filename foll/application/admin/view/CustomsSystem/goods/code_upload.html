<script>
    layui.use('upload', function () {
        var upload = layui.upload;
        var uploadInst = upload.render({
            elem: '#file1' //绑定元素
            ,accept:"file"
            , url: '{:Url("admin/goods/code_file_upload")}' //上传接口
            ,before: function(obj){
                layer.load(); //上传loading
            }
            , done: function (res) {
                layer.closeAll('loading');
                if (res.code==0){
                    parent.layer.msg(res.message, {icon: 6});
                } else{
                    parent.layer.msg(res.message, {icon: 5});
                }
            }
            , error: function () {
                //请求异常回调
                // parent.layer.msg('请求异常', {icon: 6});
            }
        });
        var uploadInst = upload.render({
            elem: '#file2' //绑定元素
            ,accept:"file"
            , url: '{:Url("admin/goods/listcode_file_upload")}' //上传接口
            ,before: function(obj){

            }
            , done: function (res) {

                if (res.code==0){

    });
