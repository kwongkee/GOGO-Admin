{include file="public/header"}

<body style="padding: 10px;">

<form action="" class="layui-form" id="form1">

    <input type="hidden" name="pid" value="{$pid}">

    <div class="layui-form-item">
        <label for="" class="layui-form-label">供应商名称</label>
        <div class="layui-input-inline">
            <input type="text" class="layui-input" value="{$merchatName}" readonly placeholder="请输入包材供应商名称">
        </div>
    </div>

    <div class="layui-form-item">
        <label for="" class="layui-form-label">包材名称</label>
        <div class="layui-input-inline">
            <input type="text" class="layui-input" name="packgeName" placeholder="请输入包材名称">
        </div>
    </div>

    <div class="layui-form-item">
        <label for="" class="layui-form-label">包材规格</label>
        <div class="layui-input-inline">
            <input type="text" class="layui-input" name="speci" placeholder="请输入包材规格">
        </div>
    </div>

    <div class="layui-form-item">
        <label for="" class="layui-form-label">包材单价</label>
        <div class="layui-input-inline">
            <input type="text" class="layui-input" name="price" placeholder="请输入包材单价">
        </div>
    </div>

    <div class="layui-form-item">
        <label for="" class="layui-form-label">包材数量</label>
        <div class="layui-input-inline">
            <input type="number" class="layui-input" name="num" placeholder="请输入包材数量">
        </div>
    </div>

</form>

<div class="layui-form-item">
    <div class="layui-input-block">
        <button class="layui-btn" onclick="save()">确认购入</button>
    </div>
</div>

<script type="text/javascript">
    layui.use(['layer','form'],function(){
        layer = layui.layer;
        var form  = layui.form;
        $ = layui.jquery;
    })


    // 添加管理员
    function save()
    {
        var pid         = $('input[name="pid"]').val();
        var packgeName  = $('input[name="packgeName"]').val();
        var speci       = $('input[name="speci"]').val();
        var price       = $('input[name="price"]').val();
        var num         = $('input[name="num"]').val();

        if(packgeName == '') {
            layer.msg('请输入包材名称',{icon:2});
            return false;
        }
        if(speci == '') {
            layer.msg('请输入包材规格',{icon:2});
            return false;
        }
        if(price == '') {
            layer.msg('请输入购买单价',{icon:2});
            return false;
        }
        if(num == '') {
            layer.msg('请输入购买数量',{icon:2});
            return false;
        }

        if(num <= 0 ) {
            layer.msg('请输入正确的购买数量',{icon:2});
            return false;
        }

        // 请求处理数据
        $.post("{:Url('admin/packages/newDoadd')}",{
            pid:pid,
            packgeName:packgeName,
            speci:speci,
            price:price,
            num:num,
            Method:'add',
        },function(resd){
            var res = JSON.parse(resd);
            if(res.code == 1) {
                layer.msg(res.msg,{icon:1});
                setTimeout(function(){
                    layer.closeAll();
                    parent.window.location.reload();
                },1100);
            } else {
                layer.msg(res.msg,{icon:2});
            }

        });
    }
</script>
</body>
</html>
