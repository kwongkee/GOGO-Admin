{include file="public/header"}

<body style="padding: 10px;">

<script src="static/index/admin/js/jquery-1.8.0.min.js"></script>

<form action="" class="layui-form" id="form1">

    <div class="layui-form-item">
        <label class="layui-form-label">分配商户</label>
        <div class="layui-input-inline" onchange="changes()" style="width: 100px;">
            <select name="public" lay-verify="" lay-filter="public"  id="public">
                <option value="">公众号</option>
                {volist name="account" id="vo"}
                <option value="{$vo['uniacid']}">{$vo['name']}</option>
                {/volist}
            </select>
        </div>

        <div class="layui-form-mid">-</div>
        <div class="layui-input-inline" id="showUid" style="width: 100px;">
            <select name="merchat" lay-verify="" lay-filter="merchat"  id="merchat">
            </select>
        </div>
    </div>


    <div class="layui-form-item">
        <label for="" class="layui-form-label">快递企业</label>
        <div class="layui-input-inline">
            <select name="getExpress" lay-verify="" lay-filter="getExpress" id="getExpress">
                <option value="">请选择快递企业</option>
                {volist name="express" id="vos"}
                    <option value="{$vos['id']}">{$vos['expName']}</option>
                {/volist}
            </select>
        </div>
    </div>


    <div class="layui-form-item">
        <label for="" class="layui-form-label">号段选择</label>
        <div class="layui-input-inline">
            <select name="expParg" lay-verify="" id="expParg">
            </select>
        </div>
    </div>

</form>

<div class="layui-form-item">
    <div class="layui-input-block">
        <button class="layui-btn" onclick="save()">确认分配</button>
    </div>
</div>

<script type="text/javascript">

    layui.use(['layer','form','laydate'],function(){
        laydate = layui.laydate;
        layer = layui.layer;
        form  = layui.form;
        $ = layui.jquery;

        laydate.render({
            elem: '#Times' //指定元素
        });

        form.on('select(public)', function(data){

            $.post("{:Url('admin/transport/getMerchat')}",{uniacid:data.value},function(red){

                var res = JSON.parse(red);
                var str = '';
                if(res.code == 1) {
                    str += '<option value="">选择商户</option>';

                    $.each(res.data,function(i,item) {
                        str += '<option value="'+item.uid+'">'+item.username+'</option>';
                    })

                } else {
                    str += '<option value="">'+res.data+'</option>';
                }

                $('#merchat').html(str);
                form.render('select'); //刷新select选择框渲染

            });
        });

        // 获取号码段
        form.on('select(getExpress)', function(data){

            $.post("{:Url('admin/transport/getTrans')}",{id:data.value},function(red){

                var res = JSON.parse(red);
                var str = '';
                if(res.code == 1) {
                    str += '<option value="">选择号码段</option>';

                    $.each(res.data,function(i,item) {
                        str += '<option value="'+item.id+'">'+item.expNames+'</option>';
                    })

                } else {
                    str += '<option value="">'+res.data+'</option>';
                }

                $('#expParg').html(str);
                form.render('select'); //刷新select选择框渲染

            });
        });

    });


    // 分配确认
    function save()
    {
        var publicId           = $("#public option:selected").val();
        var merchatId          = $("#merchat option:selected").val();
        var expressId          = $("#getExpress option:selected").val();
        var expPargId          = $("#expParg option:selected").val();

        if(publicId == '') {
            layer.msg('请选择公众号',{icon:2});
            return false;
        }
        if(merchatId == '') {
            layer.msg('请选择商户',{icon:2});
            return false;
        }

        if(expressId == '') {
            layer.msg('请选择快递企业',{icon:2});
            return false;
        }

        if(expPargId == '') {
            layer.msg('请选择号码段',{icon:2});
            return false;
        }

        // 请求处理数据
        $.post("{:Url('admin/transport/distriDoadd')}",{
            //logisticName:logisticName,
            publicId:publicId,
            merchatId:merchatId,
            expressId:expressId,
            expPargId:expPargId,
            Method:'add',
        },function(resd){

            var res = JSON.parse(resd);
            if(res.code == 1) {
                layer.msg(res.msg,{icon:1});
                setTimeout(function(){
                    layer.closeAll();
                    parent.window.location.reload();
                },1000);
            } else {
                layer.msg(res.msg,{icon:2});
            }

        });
    }
</script>
</body>
</html>
