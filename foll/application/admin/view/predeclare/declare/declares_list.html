<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>清单申报列表-CEB603</title>
    <link rel="stylesheet" href="./static/hadmin/assets/layui/css/layui.css">
    <link rel="stylesheet" href="./static/hadmin/assets/common.css"/>
</head>
<style>
    .test-table-operate-btn .layui-btn{margin-right:5px !important;}
</style>

</head>
<body>

<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-col-md12">
            <div class="layui-card">
                <div class="layui-card-header">报文类型：CEB603Message-清单申报列表</div>
                <div class="layui-card-body">
                    <div class="layui-btn-group test-table-operate-btn" style="margin-bottom: 10px;">
                        <button class="layui-btn layui-btn-normal" onclick="location.reload()">刷新</button>
                    </div>

                    <table class="layui-hide" id="mainTable"></table>
                </div>
            </div>
        </div>
    </div>
</div>


<script src="./static/hadmin/assets/layui/layui.js"></script>
<script>
    layui.use(['layer', 'table'], function(){
        var admin = layui.admin
            ,table = layui.table
            ,$ = layui.jquery;

        table.render({
            elem: '#mainTable'
            ,cellMinWidth: 200
            ,url: "{:Url('admin/predeclare/declares_list')}&tracking_num={$tracking_num}"
            ,cols: [[
                {field:'id', width:80, title: '编号'}
                ,{field:'tracking_num', title: '临时提单号码'}
                ,{field:'batch_num', width:230, title: '批次号'}
                ,{field:'type', title: '报文类型'}
                ,{field:'batch_status', title: '状态'}
                ,{field:'total_num', title: '单笔数量'}
                ,{field:'success_num', title: '成功数'}
                ,{field:'error_num', title: '错误数'}
                ,{field:'create_at', title: '创建时间'}
                ,{width:360, align:'center', title: '操作', templet: function(d){
                        return [

                        ].join('');
                    } }
            ]]
            ,page: true
        });

        var $ = layui.$, active = {
            reload: function(){
                //执行重载
                table.reload('mainTable', {
                    page: {
                        curr: 1 //重新从第 1 页开始
                    }
                    ,where: {
                        keywords: $("#keywords").val()
                    }
                });
            }
        };

        $('.main-table-reload-btn .layui-btn').on('click', function(){
            var type = $(this).data('type');
            active[type] ? active[type].call(this) : '';
        });
    });

    function openWindow(title,url)
    {
        var layer = layui.layer;
        var index = layer.open({
            type: 2,
            title: title,
            content: url
        });
        layer.full(index);
    }

</script>

</body>
</html>
