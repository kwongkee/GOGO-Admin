<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>汇总申请单-CEB701</title>
    <link rel="stylesheet" href="./static/hadmin/assets/layui/css/layui.css">
    <link rel="stylesheet" href="./static/hadmin/assets/common.css"/>
</head>
<style>
    .test-table-operate-btn .layui-btn{margin-right:5px !important;}
</style>

</head>
<body>
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-col-md12">
            <div class="layui-card">
                <div class="layui-card-header">报文类型：CEB701Message-汇总申请单</div>
                <div class="layui-card-body">
                    <div class="layui-btn-group test-table-operate-btn" style="margin-bottom: 10px;">
                        <button class="layui-btn layui-btn-normal" onclick="openWindow('关联预报编号','{:Url(\'admin/predeclare/declare_t_connect\')}');">关联预报编号</button>
                    </div>
                    <table class="layui-hide" id="mainTable"></table>
                </div>
            </div>
        </div>
    </div>
</div>


<script src="./static/hadmin/assets/layui/layui.js"></script>
<script>
    layui.use(['layer', 'table', 'upload'], function(){
        var admin = layui.admin
            ,table = layui.table
            ,$ = layui.jquery
            ,upload = layui.upload;

        table.render({
            elem: '#mainTable'
            ,url: "{:Url('admin/predeclare/declare_t')}"
            ,cols: [[
                {field:'id', width:80, title: '编号'}
                ,{field:'tracking_num', width: 150, title: '正式提单号码'}
                ,{field:'self_ordersn', width:230, title: '关联单号'}
                ,{field:'customs_code', width: 150, title: '申报地海关'}
                ,{field:'agent_name', width: 150, title: '申报单位名称'}
                ,{field:'ebc_name', width: 150, title: '电商企业名称'}
                ,{field:'decl_agent_name', width: 150, title: '报关单位名称'}
                ,{field:'create_at', width: 150, title: '创建时间'}
                ,{width:200, align:'center',  title: '操作', templet: function(d){
                        return [
                            '<a onclick="openWindow2('+ "'"+d.tracking_num+"申报列表'" +',' + "'{:Url('admin/predeclare/declare_t_list')}&tracking_num="+ d.tracking_num +"'" + ');" class="layui-btn layui-btn-xs layui-btn-normal">申报列表</a>',
                        ].join('');
                    } }
            ]]
            ,page: true
        });
    });

    function openWindow(title,url)
    {
        var layer = layui.layer;
        var index = layer.open({
            type: 2,
            title: title,
            area:['600px','500px'],
            content: url
        });
        // layer.full(index);
    }
    function openWindow2(title,url)
    {
        var layer = layui.layer;
        var index = layer.open({
            type: 2,
            title: title,
            content: url
        });
        layer.full(index);
    }
</script>

</body>

</html>
