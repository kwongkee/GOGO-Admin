<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>清单申报-CEB603</title>
    <link rel="stylesheet" href="./static/hadmin/assets/layui/css/layui.css">
    <link rel="stylesheet" href="./static/hadmin/assets/common.css"/>
</head>
<style>
    .test-table-operate-btn .layui-btn{margin-right:5px !important;}
</style>

</head>
<body>
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-col-md12">
            <div class="layui-card">
                <div class="layui-card-header">报文类型：CEB603Message-清单申报</div>
                <div class="layui-card-body">
                    <div class="layui-btn-group test-table-operate-btn" style="margin-bottom: 10px;">
                        <button class="layui-btn layui-btn-normal" onclick="openWindow('关联预报编号','{:Url(\'admin/predeclare/declares_connect\')}');">关联预报编号</button>
                        <button class="layui-btn layui-btn-normal" onclick="location.reload()">刷新</button>
                    </div>
                    <table class="layui-hide" id="mainTable"></table>
                </div>
            </div>
        </div>
    </div>
</div>


<script src="./static/hadmin/assets/layui/layui.js"></script>
<script>
    layui.use(['layer', 'table', 'upload'], function(){
        var admin = layui.admin
            ,table = layui.table
            ,$ = layui.jquery
            ,upload = layui.upload;

        table.render({
            elem: '#mainTable'
            ,cellMinWidth: 200
            ,url: "{:Url('admin/predeclare/declares')}"
            ,cols: [[
                {field:'id', width:80, title: '编号'}
                ,{field:'app_type', width:230, title: '操作类型'}
                ,{field:'tracking_num', title: '临时提单号码'}
                ,{field:'self_ordersn', width:230, title: '关联单号'}
                ,{field:'statistics_flag', title: '申报业务类型'}
                ,{field:'logistics_code', title: '物流企业代码'}
                ,{field:'logistics_name', title: '物流企业名称'}
                ,{field:'ebp_code', title: '电商平台代码'}
                ,{field:'ebp_name', title: '电商平台名称'}
                ,{field:'trade_mode', title: '贸易方式'}
                ,{field:'create_at', title: '创建时间'}
                ,{width:200, align:'center', title: '操作', templet: function(d){
                        return [
                            '<a onclick="openWindow2('+ "'"+d.tracking_num+"申报列表'" +',' + "'{:Url('admin/predeclare/declares_list')}&tracking_num="+ d.tracking_num +"'" + ');" class="layui-btn layui-btn-xs layui-btn-normal">申报列表</a>',
                        ].join('');
                    } }
            ]]
            ,page: true
        });

        var $ = layui.$, active = {
            reload: function(){
                //执行重载
                table.reload('mainTable', {
                    page: {
                        curr: 1 //重新从第 1 页开始
                    }
                    ,where: {
                        keywords: $("#keywords").val()
                    }
                });
            }
        };

        $('.main-table-reload-btn .layui-btn').on('click', function(){
            var type = $(this).data('type');
            active[type] ? active[type].call(this) : '';
        });
    });

    function openWindow(title,url)
    {
        var layer = layui.layer;
        var index = layer.open({
            type: 2,
            title: title,
            area:['600px','500px'],
            content: url
        });
        // layer.full(index);
    }
    function openWindow2(title,url)
    {
        var layer = layui.layer;
        var index = layer.open({
            type: 2,
            title: title,
            content: url
        });
        layer.full(index);
    }

</script>

</body>

</html>
