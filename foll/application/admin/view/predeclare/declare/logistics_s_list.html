<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>物流离境单申报列表-CEB509</title>
    <link rel="stylesheet" href="./static/hadmin/assets/layui/css/layui.css">
    <link rel="stylesheet" href="./static/hadmin/assets/common.css"/>
</head>
<style>
    .test-table-operate-btn .layui-btn{margin-right:5px !important;}
</style>

</head>
<body>

<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-col-md12">
            <div class="layui-card">
                <div class="layui-card-header">报文类型：CEB509Message-物流离境单申报列表</div>
                <div class="layui-card-body">
                    <div class="layui-btn-group test-table-operate-btn" style="margin-bottom: 10px;">
                    </div>
                    <table class="layui-hide" id="mainTable"></table>
                </div>
            </div>
        </div>
    </div>
</div>


<script src="./static/hadmin/assets/layui/layui.js"></script>
<script>
    layui.use(['layer', 'table'], function(){
        var admin = layui.admin
            ,table = layui.table
            ,$ = layui.jquery;

        table.render({
            elem: '#mainTable'
            ,url: "{:Url('admin/predeclare/logistics_s_list')}&tracking_num={$tracking_num}"
            ,cols: [[
                {field:'id', width:80, title: '编号'}
                ,{field:'tracking_num', width:150, title: '正式提单号码'}
                ,{field:'batch_num', width:230, title: '批次号'}
                ,{field:'cop_no', width:230, title: '企业唯一编号'}
                ,{field:'type', width:150, title: '报文类型'}
                ,{field:'batch_status', width:150, title: '状态'}
                ,{field:'total_num', width:150, title: '单笔数量'}
                ,{field:'success_num', width:150, title: '成功数'}
                ,{field:'error_num', width:150, title: '错误数'}
                ,{field:'create_at', width:150, title: '创建时间'}
                ,{width:220, align:'center', title: '操作', templet: function(d){
                        return [

                        ].join('');
                    } }
            ]]
            ,page: true
        });
    });

    function openWindow(title,url)
    {
        var layer = layui.layer;
        var index = layer.open({
            type: 2,
            title: title,
            content: url
        });
        layer.full(index);
    }

    function downError(batch_num) {

    }

</script>

</body>
</html>
