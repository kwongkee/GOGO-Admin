<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title></title>
    <link rel="stylesheet" href="./static/hadmin/assets/layui/css/layui.css">
    <link rel="stylesheet" href="./static/hadmin/assets/common.css"/>
</head>
<style>
    .test-table-operate-btn .layui-btn{margin-right:5px !important;}
</style>
<body class="gray-bg">
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-col-md12" style="margin-top:15px;">
            <div class="layui-card">
                <div class="layui-card-header">报文类型：CEB303Message-电子订单申报列表</div>
                <div class="layui-card-body">
                    <div class="layui-btn-group test-table-operate-btn" style="margin-bottom: 10px;">
                        <button class="layui-btn layui-btn-normal" onclick="openWindow('关联预报编号','{:Url(\'admin/predeclare/ecommerce_connect\')}');">关联预报编号</button>
                        <button class="layui-btn layui-btn-normal" onclick="location.reload()">刷新</button>
                    </div>
                    <table class="layui-hide" id="mainTable"></table>
                </div>
            </div>
        </div>
    </div>
</div>


<script src="./static/hadmin/assets/layui/layui.js"></script>
<script>
    layui.use(['layer', 'table'], function(){
        var admin = layui.admin
            ,table = layui.table
            ,layer = layui.layer
            ,$ = layui.jquery;

        table.render({
            elem: '#mainTable'
            ,url: "{:Url('admin/predeclare/ecommerce')}"
            ,cellMinWidth: 200
            ,cols: [[
                {field:'id', width: 80, title: '编号'}
                ,{field:'app_type', title: '操作类型'}
                ,{field:'tracking_num',  title: '临时提单号码'}
                ,{field:'self_ordersn', width: 230, title: '关联单号'}
                ,{field:'ebp_code', title: '电商平台代码'}
                ,{field:'ebp_name', title: '电商平台名称'}
                ,{field:'ebc_code', title: '电商企业代码'}
                ,{field:'ebc_name', title: '电商企业名称'}
                ,{field:'create_at', title: '创建时间'}
                ,{align:'center',  title: '操作', templet: function(d){
                        return [
                            '<a onclick="openWindow2('+ "'"+d.tracking_num+"申报列表'" +',' + "'{:Url('admin/predeclare/ecommerce_list')}&tracking_num="+ d.tracking_num +"'" + ');" class="layui-btn layui-btn-xs layui-btn-normal">申报列表</a>',
                        ].join('');
                    } }
            ]]
            ,page: true
        });

        var $ = layui.$, active = {
            reload: function(){
                //执行重载
                table.reload('mainTable', {
                    page: {
                        curr: 1 //重新从第 1 页开始
                    }
                    ,where: {
                        keywords: $("#keywords").val()
                    }
                });
            }
        };

        $('.main-table-reload-btn .layui-btn').on('click', function(){
            var type = $(this).data('type');
            active[type] ? active[type].call(this) : '';
        });
    });

    function openWindow(title,url)
    {
        var layer = layui.layer;
        var index = layer.open({
            type: 2,
            title: title,
            area:['600px','500px'],
            content: url
        });
        // layer.full(index);
    }
    function openWindow2(title,url)
    {
        var layer = layui.layer;
        var index = layer.open({
            type: 2,
            title: title,
            content: url
        });
        layer.full(index);
    }

</script>

</body>
</html>
