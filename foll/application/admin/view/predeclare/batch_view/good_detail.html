<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>商品详情</title>
    <link rel="stylesheet" href="./static/hadmin/assets/layui/css/layui.css">
    <link rel="stylesheet" href="./static/hadmin/assets/common.css"/>
</head>
<body>


<form class="layui-form" action="">

    <div class="layui-form-item">
        <label class="layui-form-label"></label>
        <input type="hidden" name="id" value="{$id}">
        <input type="hidden" name="pre_batch_num" value="{$batch_num}">
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">商品货号</label>
        <div class="layui-input-block">
            <input type="text" name="itemNo" value="{$goods['itemNo']}"  readonly lay-verify="required" autocomplete="off" class="layui-input">
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">商品名称</label>
        <div class="layui-input-block">
            <input type="text" name="gname" value="{$goods['gname']}"  lay-verify="required" autocomplete="off" class="layui-input">
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">商户编码</label>
        <div class="layui-input-block">
            <input type="text" name="gcode" value="{$goods['gcode']}"  lay-verify="required" autocomplete="off" class="layui-input">
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">币种</label>
        <div class="layui-input-block">
            <select name="currency" id="currency" lay-verify="required" lay-search>
                {foreach $currency as $val}
                <option value="{$val['code_value']}" {if $goods['currency']==$val['code_value']}selected{/if}>{$val['code_name']}</option>
                {/foreach}
            </select>
            <!--<input type="text" name="currency" value="$goods['currency']"  lay-verify="required" autocomplete="off" class="layui-input">-->
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">申报数量</label>
        <div class="layui-input-block">
            <input type="text" name="qty" value="{$goods['qty']}"  lay-verify="required" autocomplete="off" class="layui-input">
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">法定申报数量</label>
        <div class="layui-input-block">
            <input type="text" name="qty1" value="{$goods['qty1']}"  lay-verify="required" autocomplete="off" class="layui-input">
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">商品规格</label>
        <div class="layui-input-block">
            <input type="text" name="gmodel" value="{$goods['gmodel']}"  lay-verify="required" autocomplete="off" class="layui-input">
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">商品单价</label>
        <div class="layui-input-block">
            <input type="text" name="price" value="{$goods['price']}"  lay-verify="required" autocomplete="off" class="layui-input">
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">商品总价</label>
        <div class="layui-input-block">
            <input type="text" name="totalPrice" value="{$goods['totalPrice']}"  lay-verify="required" autocomplete="off" class="layui-input">
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">收款金额</label>
        <div class="layui-input-block">
            <input type="text" name="charge" value="{$goods['charge']}"  lay-verify="required" autocomplete="off" class="layui-input">
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">到账时间</label>
        <div class="layui-input-block">
            <input type="text" name="chargeDate" value="{$goods['chargeDate']}" autocomplete="off" class="layui-input">
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">物流运单编号</label>
        <div class="layui-input-block">
            <input type="text" name="logisticsNo" value="{$goods['logisticsNo']}" readonly lay-verify="required" autocomplete="off" class="layui-input">
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">运费</label>
        <div class="layui-input-block">
            <input type="text" name="freight" value="{$goods['freight']}"  lay-verify="required" autocomplete="off" class="layui-input">
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">保价费</label>
        <div class="layui-input-block">
            <input type="text" name="insuredFee" value="{$goods['insuredFee']}"  lay-verify="required" autocomplete="off" class="layui-input">
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">条形码</label>
        <div class="layui-input-block">
            <input type="text" name="barCode" value="{$goods['barCode']}"  lay-verify="required" autocomplete="off" class="layui-input">
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">毛重</label>
        <div class="layui-input-block">
            <input type="text" name="grossWeight" value="{$goods['grossWeight']}"  lay-verify="required" autocomplete="off" class="layui-input">
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">净重</label>
        <div class="layui-input-block">
            <input type="text" name="netWeight" value="{$goods['netWeight']}"  lay-verify="required" autocomplete="off" class="layui-input">
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">件数</label>
        <div class="layui-input-block">
            <input type="text" name="packNo" value="{$goods['packNo']}"  lay-verify="required" autocomplete="off" class="layui-input">
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">主要商品信息</label>
        <div class="layui-input-block">
            <input type="text" name="goodsInfo" value="{$goods['goodsInfo']}"  lay-verify="required" autocomplete="off" class="layui-input">
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">申报计量单位</label>
        <div class="layui-input-block">
            <select name="unit" id="unit" lay-verify="required" lay-search>
                {foreach $unit as $val}
                <option value="{$val['code_value']}" {if $goods['unit']==$val['code_value']}selected{/if}>{$val['code_name']}</option>
                {/foreach}
            </select>
            <!--<input type="text" name="unit" value="$goods['unit']"  lay-verify="required" autocomplete="off" class="layui-input">-->
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">法定计量单位</label>
        <div class="layui-input-block">
            <select name="unit1" id="unit1" lay-verify="required" lay-search>
                {foreach $unit as $val}
                <option value="{$val['code_value']}" {if $goods['unit1']==$val['code_value']}selected{/if}>{$val['code_name']}</option>
                {/foreach}
            </select>
            <!--<input type="text" name="unit1" value="$goods['unit1']"  lay-verify="required" autocomplete="off" class="layui-input">-->
        </div>
    </div>


    <div class="layui-form-item">
        <div class="layui-input-block">
            <button class="layui-btn" lay-submit lay-filter="formDemo">确认修改</button>
            <button type="reset" class="layui-btn layui-btn-danger">重置数据</button>
        </div>
    </div>
</form>


</body>
<script src="./static/hadmin/assets/layui/layui.js"></script>
<script src="./static/hadmin/assets/jquery-3.2.1.min.js"></script>


<script>
    //Demo
    layui.use('form', function(){
        var form = layui.form;

        form.on('select(getMer)',function(obj){
            if(obj.value == '') {
                layer.msg('请选择支付渠道');
                return false;
            }

            // 请求获取数据
            $.ajax({
                url:"{:Url('paychannel/getMer')}",
                type:'POST',
                data:{id:obj.value},
                success:function(res){
                    if(res.code <= 0) {
                        layer.msg(res.msg);
                        return false;
                    }

                    $('#selMer').html(res.str);
                    form.render();
                }
            })
        })


        //监听提交
        form.on('submit(formDemo)', function(data) {
            $.ajax({
                url:"{:Url('admin/predeclare/good_detail')}",
                type:"POST",
                dataType:"json",
                data:data.field,
                success:function (red) {
                    if(red.code <= 0) {
                        layer.msg(red.msg);
                        return false;
                    }
                    layer.msg(red.msg);
                    setTimeout(function(){
                        layer.closeAll();
                        window.location.reload();
                    },1200)
                },
                error:function (xhr) {
                    layer.msg('链接服务错误..');
                }
            });
            return false;
        });
    });
</script>
</html>
