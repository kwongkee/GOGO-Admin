<!DOCTYPE html>
<html>

<head>
    {include file="common/meta"}
</head>

<body class="gray-bg">
<div class="col-sm-12">
    <div class="ibox float-e-margins">
        <div class="ibox-title" style="height:60px;">
            <button type="button" class="btn btn-info btn-lg" style="width: 100px;" id="one">账户管理</button>
            <button type="button" class="btn btn-info btn-lg" style="width: 100px;" id="two" >账户添加</button>
        </div>
        <div class="ibox-content" style="display:block;" id="list1">
            <table class="table table-hover">
                <thead>
                <tr>
                    <th>id</th>
                    <th>用户名</th>
                    <th>手机号</th>
                    <th>创建时间</th>
                    <th>用户状态</th>
                    <th>角色</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody>
                    {volist name="userList" id="vo"}
	                    <tr>
	                        <td>{$vo.id}</td>
	                        <td>{$vo.username}</td>
	                        <td>{$vo.tel}</td>
	                        <td>{$vo.create_time|date='Y-m-d H:i:s',###}</td>
	                        <td>{$userStatus[$vo.user_status]}</td>
	                        <td>{$vo.role_name}</td>
	                        <td>
	                            {if $vo.user_status == 1}
	                            <a class="btn btn-default btn-rounded" href="{:Url('admin/AdminAccount/update')}&id={$vo.id}&status=0">禁用</a>
	                            {else}
	                            <a class="btn btn-default btn-rounded" href="{:Url('admin/AdminAccount/update')}&id={$vo.id}&status=1">启用</a>
	                            {/if}
	                            <a class="btn btn-default btn-rounded" href="{:Url('admin/AdminAccount/edit')}&id={$vo.id}">编辑账户</a>
	                            <a class="btn btn-default btn-rounded" style="background:red;color:white!important;" href="{:Url('admin/AdminAccount/delete')}&id={$vo.id}">删除</a>
	                        </td>
	                    </tr>
                	{/volist}
                </tbody>
            </table>
        </div>
                <div class="ibox-content" style="display:none;" id="list2">
                    <form class="form-horizontal" method="post" action="{:Url('admin/AdminAccount/add')}">
                        <div class="form-group" style="margin-top:20px">
                            <label class="col-sm-2 control-label">用户名：</label>
                            <div class="col-sm-10">
                                <input type="text" name="username" placeholder="用户名" class="form-control">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="col-sm-2 control-label">手机号：</label>
                            <div class="col-sm-10">
                                <input type="tel" name="tel" placeholder="手机号" class="form-control">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="col-sm-2 control-label">账户状态
                            </label>

                            <div class="col-sm-8">
                                <div class="radio i-checks">
                                    <label>
                                        <input type="radio" checked="" value="1" name="user_status"> <i></i>正常</label>
                                </div>
                                <div class="radio i-checks">
                                    <label>
                                        <input type="radio"  value="0" name="user_status"> <i></i>禁用</label>
                                </div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="col-sm-2 control-label">角色</label>
                            <div class="col-sm-10">
                                <select class="form-control m-b" name="role">
                                    <option>请选择</option>
                                    {volist name="roleResule" id="vo"}
                                    	<option value="{$vo.id}">{$vo.role_name}</option>
                                    {/volist}
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <div class="col-sm-offset-3 col-sm-8">
                                <button class="btn btn-sm btn-info" type="submit">添 加</button>
                            </div>
                        </div>
                    </form>
                </div>
    </div>
</div>

<!-- 全局js -->
<script src="./static/hadmin/js/jquery.min.js?v=2.1.4"></script>
<script src="./static/hadmin/js/bootstrap.min.js?v=3.3.6"></script>
<!-- 自定义js -->
<script src="./static/hadmin/js/content.js?v=1.0.0"></script>
<!-- Bootstrap table -->
<script src="./static/hadmin/js/plugins/bootstrap-table/bootstrap-table.min.js"></script>
<script src="./static/hadmin/js/plugins/bootstrap-table/bootstrap-table-mobile.min.js"></script>
<script src="./static/hadmin/js/plugins/bootstrap-table/locale/bootstrap-table-zh-CN.min.js"></script>
<script src="./static/hadmin/layui/layui.all.js"></script>
<script>
    $("#one").click(function () {
        console.log('1');
        $("#list2").hide();
        $("#list1").show();
    })
    $("#two").click(function () {
        $("#list1").hide();
        $("#list2").show();
    })
</script>
<!-- Peity -->
</body>
</html>
