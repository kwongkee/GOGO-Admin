<!DOCTYPE html>
<html>

<head>
    {include file="common/meta"}
    <link rel="stylesheet" href="./static/hadmin/layui/css/layui.css"></link>
    <style type="text/css">
    	.ibox{
    		margin-top: 10px;
    	}
    </style>
</head>
<body class="gray-bg">
<div class="col-sm-12">
    <select name="status" id="status" style="height: 36px;margin: 5px 5px 0 5px;">
        <option value="">状态</option>
        <option value="0">已通知、未验核</option>
        <option value="1">已验核、已成功</option>
        <option value="2">已验核、已失败</option>
    </select>
    <input style="float: left;width:27%; margin-top: 5px;" type="text" name="name" value="" id="name" required lay-verify="required"
           placeholder="请输入姓名,手机号,批次号" autocomplete="off" class="layui-input">
    <a class="btn btn-info" href="#" type="button" id="search" style="line-height:28px;"><i
            class="fa fa-file-excel-o"></i>搜索</a>
    <a class="btn btn-info" href="#" type="button" id="load" style="line-height:28px;background-color: #009688;"><i
            class="fa fa-file-excel-o"></i>导入</a>
    <a class="btn btn-info" href="#" type="button" id="export" style="line-height:28px;background-color: #009688;"><i
            class="fa fa-file-excel-o"></i>导出</a>
    <div class="ibox float-e-margins">

        <div class="ibox-content" style="display:block;" id="list1">
            <table class="table table-hover">
                <thead>
                <tr>
                    <th>提单编号</th>
                    <th>运单编号</th>
                    <th>买家姓名</th>
                    <th>收件手机</th>
                    <th>验核状态</th>
                    <th>验证时间</th>
                </tr>
                </thead>
                <tbody>
                {volist name="data" id="vo"}
                <tr>
                    <td>{$vo.bill_num}</td>
                    <td>{$vo.waybill_no}</td>
                    <td>{$vo.name}</td>
                    <td>{$vo.mobile}</td>
                    <td>{$status[$vo.status]}</td>

                    <td> {if($vo.update_time!="")}
                        {$vo.update_time|date="Y-m-d H:i",###}
                        {/if}
                    </td>
                </tr>
                {/volist}
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="layui-box layui-laypage layui-laypage-default">{$page}</div>
</body>
<!-- 全局js -->
<script src="./static/hadmin/js/jquery.min.js?v=2.1.4"></script>
<script src="./static/hadmin/js/bootstrap.min.js?v=3.3.6"></script>
<!-- Bootstrap table -->
<script src="./static/hadmin/js/plugins/bootstrap-table/bootstrap-table.min.js"></script>
<script src="./static/hadmin/layui/layui.all.js"></script>
<script>
    // admin/goods/add
    layui.use(['upload', 'form'], function () {
        upload = layui.upload;
        form = layui.form;
    });
    $('#load').bind("click", function () {
        layer.open({
            type: 1,        //弹窗类型
            title: false,   //显示标题
            closeBtn: 1,     //是否显示关闭按钮
            shadeClose: true, //显示模态窗口
            area: ['379px', '96px'], //宽高
            content: '<div class="col-sm-12" id="upload">\n' +
                '        <div class="ibox float-e-margins">\n' +
                '            <div class="ibox-content">\n' +
                '                <div class="page-container">\n' +
                '                    <button type="button" class="layui-btn" id="file2">\n' +
                '                        <i class="layui-icon">&#xe67c;</i>上传买家信息\n' +
                '                    </button>\n' +
                '                </div>\n' +
                '            </div>\n' +
                '        </div>\n' +
                '</div>', //弹窗内容
            cancel: function () {
                // $('#f').css('display','none');
                window.location.reload();
            }

        });
        var uploadInst = upload.render({
            elem: '#file2' //绑定元素
            , accept: "file"
            , url: '{:url("admin/MemberIdentityVerif/loadUserInfoByExcel")}' //上传接口
            , data: {
                code: function () {
                    return $('#code').val();
                }
            }
            , before: function (obj) {
                layer.load(); //上传loading
            }
            , done: function (res) {
                layer.closeAll('loading');
                if (res.code == 0) {
                    parent.layer.msg(res.message, {icon: 6});
                } else {
                    parent.layer.msg(res.message, {icon: 5});
                }
            }
            , error: function () {
                //请求异常回调
                parent.layer.msg('请求异常', {icon: 5});
            }
        });
        form.render();
    });
    $('#export').bind("click", function () {
        layer.open({
            type: 1,        //弹窗类型
            title: false,   //显示标题
            closeBtn: 1,     //是否显示关闭按钮
            shadeClose: true, //显示模态窗口
            area: ['379px', '110px'], //宽高
            content: '<form class="layui-form"><div class="layui-form-item">\n' +
                '    <label class="layui-form-label">提单号</label>\n' +
                '    <div class="layui-input-block">\n' +
                '      <input type="text" name="billNum" id="billNum" required  lay-verify="required" placeholder="请输入提单号" autocomplete="off" class="layui-input">\n' +
                '    </div>\n' +
                '  </div> <div class="layui-form-item">\n' +
                '    <div class="layui-input-block">\n' +
                '      <button class="layui-btn" lay-submit lay-filter="formDemo" onclick="exports();return false;">立即提交</button>\n'+
                '    </div>\n' +
                '  </div></form>', //弹窗内容
        });
    });
    $("#search").bind('click', function () {
        var name = $("#name").val();
        var status = $('#status').val();
        window.location.href = "{:Url('admin/MemberIdentityVerif/verif_list')}&name=" + name + "&status=" + status;
    });
    function exports() {
        layer.load();
        var billNum=$('#billNum').val();
        window.location.href="{:Url(\"admin/MemberIdentityVerif/exportUserVerifInfo\")}&billNum="+billNum;
        setTimeout(function () {
            layer.closeAll('loading');
        },3000);
        return false;
    }
</script>
</html>
