<!DOCTYPE html>
<html>

<head>
    <script src="./static/hadmin/js/jquery.min.js?v=2.1.4"></script>
    <link rel="stylesheet" href="./static/agents/layui/css/layui.css">
    </link>
    <link rel="stylesheet" type="text/css"
        href="./static/index/admin/css/formSelects-v4.css" />
    <script src="./static/index/admin/js/formSelects-v4.js" type="text/javascript"
        charset="utf-8"></script>
</head>

<body style="padding: 10px;background-color: #f2f2f2;">
    <div class="layui-fluid">
        <div class="layui-row layui-col-space15">
            <div class="layui-col-md12">
                <div class="layui-card">
                    <div class="layui-card-header">商户总账户列表</div>
                    <div class="layui-card-body">
                        <table class="layui-table" lay-size="sm">
                            <thead>
                                <tr>
                                    <th>手机号</th>
                                    <th>姓名</th>
                                    <th>公司名称</th>
                                    <th>状态</th>
                                    <th>备注</th>
                                    <th>授权应用</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                {volist name='data' id='vo'}
                                <tr>
                                    <td>{$vo.mobile}</td>
                                    <td>{$vo.user_name}</td>
                                    <td>{$vo.company_name}</td>
                                    <td>{$status[$vo.status]}</td>
                                    <td>{$vo.desc}</td>
                                    <td>
        
                                        <select name="rule{$vo.id}" xm-select="rule{$vo.id}" xm-select-skin="normal" xm-select-show-count="2">
                                            <option value="">请选择关联应用</option>
                                            {volist name='app' id='selec'}
                                            <option value="{$selec.id}" {if in_array($selec['id'],$vo["app"])}selected="selected"{/if}>{$selec.system_name}</option>
                                            {/volist}
                                        </select>
        
                                    </td>
                                    <td>
                                        {if $vo.status==1}
                                        <a href="#" class="btn btn-info" onclick="check(this,{$vo.id},0)">通过</a>
                                        <a href="#" class="btn btn-danger" onclick="check(this,{$vo.id},2)">拒绝</a>
                                        {else}
                                        <a href="#" class="btn btn-info" onclick="update(this,{$vo.id})">更新</a>
                                        {/if}
                                    </td>
                                </tr>
                                {/volist}
                            </tbody>
                        </table>

                        <div class="layui-box layui-laypage">{$page}</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>


<script src="./static/hadmin/layui/layui.all.js"></script>

</html>

<script>
    formSelects.render();

    function check(obj, id, status) {
        var sel = formSelects.value('rule'+id);
        var url = "{:url('buss/user/review')}";
        if (status == 0) {
            if (sel.length <= 0) {
                // parent.layer.msg('请选择授权应用！', {
                //     icon: 5
                // });
                alert('请选择授权应用！');
                return;
            }
        }
        var data = {
            id: id,
            status: status,
            select: sel
        };
        requsetServer(url,data);
        return;
    }


    function update(obj,id){
        var sel = formSelects.value('rule'+id);
        var url = "{:url('buss/user/update')}";
        if (sel.length <= 0) {
            // parent.layer.msg('请选择授权应用！', {
            //     icon: 5
            // });
            alert('请选择授权应用！');
            return;
        }
        var data = {
            id: id,
            select: sel
        };
        requsetServer(url,data);
        return;
    }

    function requsetServer(url,data) {
        $.ajax({
            url: url,
            type: "POST",
            dataType: "json",
            data: data,
            success: function (res) {
                if (res.code === 0) {
                    // layer.msg(res.message, {
                    //     icon: 6
                    // });
                    alert(res.message);
                    setTimeout(() => {
                        window.location.reload;
                    }, 1200);
                } else {
                    // layer.msg(res.message, {
                    //     icon: 5
                    // });
                    alert(res.message);
                }
            }
        })
    }
</script>
