                                </td>
                                <td>
                                    <select name="event_unit[]" lay-search lay-verify="required">
                                        <option value="">请选择计价单位</option>

                                            {volist name="currency" id="vo"}
                                            <option value="{$vo.code_value}" {if $vo.code_value==$order['content']['event_currency'][$index-1]}selected{/if}>{$vo.code_name}</option>

                                        </select>
                                        <input type="text" name="currency_backup" value="{$order['currency_backup']}" style="display: none;">

                                    <input type="number" class="layui-input" name="event_num[]" placeholder="" value="{$order['content']['event_num'][$index-1]}" lay-verify="required">

                                <td>
                                    <input type="number" class="layui-input event_totalprice" name="event_totalprice[]" placeholder="" value="{$order['content']['event_totalprice'][$index-1]}" lay-verify="required">

                                    <input type="text" class="layui-input" name="event_remark[]" placeholder="" value="{$order['content']['event_remark'][$index-1]}">

            <div class="layui-col-md12">

                            <thead>

                                <th>企业信息</th>

                            <tbody>

                                <td>

                                </td>
                                <td>

                                    </select>

                                    <input type="number" lay-verify="required" name="price" id="price" value="{$order['price']}" placeholder="应付金额" autocomplete="off" class="layui-input" style="margin:10px 0;">

                    </div>
                    </td>

                        <select name="is_tax" id="is_tax" lay-filter="is_tax" style="margin-bottom:10px;">
                            <option value="">请选择包含方式</option>
                            <option value="1" {if $order['is_tax']==1}selected{/if}>应付金额包含税费</option>
                            <option value="2" {if $order['is_tax']==2}selected{/if}>应付金额不包含税费</option>

                            <option value="1" {if $order['tax_type']==1}selected{/if}>销售税（Gat）</option>
                            <option value="2" {if $order['tax_type']==2}selected{/if}>增值税（Vat）</option>
                        </select>

                        <input type="number" name="tax_num" id="tax_num" value="{$order['tax_num']}" placeholder="税率(例如：0.01)" autocomplete="off" class="layui-input" style="margin-top:10px;">
                </div>

                <input type="number" lay-verify="required" name="invoicing_tax" value="{$order['invoicing_tax']}" placeholder="开票税费" autocomplete="off" class="layui-input" style="margin-top:10px;" readonly>
                </td>
                <td>
                    <input type="number" lay-verify="required" name="real_price" value="{$order['real_price']}" placeholder="实付金额" autocomplete="off" class="layui-input">

                </table>

<div class="layui-form-item" style="margin-top: 25px;text-align: center;">
    <div>
        <button class="layui-btn layui-btn-normal" lay-submit lay-filter="component-form-element">立即提交</button>
        <button type="reset" class="layui-btn layui-btn-primary">重置</button>
    </div>
</div>

</form>
</div>
</div>
</body>

<script type="text/javascript">

    layui.use(['layer','form','laydate'],function(){
        laydate = layui.laydate;
        layer = layui.layer;
        var form  = layui.form;
        $ = layui.jquery;

        form.on('select(event_currency)',function(data){
            let val = data.value;
            if(val!='142'){
                $('input[name="currency_backup"]').val(val);
            }
        });

        form.on('select(currency)',function(data){
            let val = data.value;
            let currency_backup = $('input[name="currency_backup"]').val();
            if(val!=''){
                // && val!=currency_backup
                if(val!='142' ){
                    $('.exchange_rate').show();
                }else{
                    $('.exchange_rate').hide();
                }
            }
        });

        form.on('select(is_tax)',function(data){
            let val = data.value;

            if(val==2){
                $('.is_tax2').show();
            }else{
                $('input[name="invoicing_tax"]').val('0');
                $('input[name="real_price"]').val($('input[name="price"]').val());
                $('.is_tax2').hide();
            }
        });

        {if empty($order['content'])}
        laydate.render({
            elem: '#event_date0'
            ,type: 'date'
            ,format: 'MM月dd日'
        });
        {else}
        {volist name="order['content']['event_date']" key="index" id="val"}
        laydate.render({
            elem: '#event_date{$index-1}'
            ,type: 'date'
            ,format: 'MM月dd日'
        });
        {/volist}
            {/if}

                form.render(null,'component-form-element1');

                form.on('submit(component-form-element)', function(data){
                    //layer.msg(JSON.stringify(data.field));
                    $.ajax({
                        url:"{:Url('admin/crossorder/edit_olists')}",
                        method:'post',
                        data:data.field,
                        dataType:'JSON',
                        success:function(res){
                            layer.msg(res.msg,{time:2000}, function () {
                                if(res.code == 0)
                                {
                                    parent.location.reload();
                                }
                            });
                        },
                        error:function (data) {
                            layer.msg('系统错误',{time:2000});
                        }
                    });
                    return false;
                });

                $('#tax_num').bind('input propertychange',function(){
                    var tax = parseFloat($(this).val());//税率
                    var price = parseFloat($('#price').val());//应付金额
                    var val = tax*price;
                    val = val.toFixed(2);
                    $('input[name="invoicing_tax"]').val(val);
                    var totalprice = parseFloat(val) + price;
                    $('input[name="real_price"]').val(totalprice.toFixed(2));
                });
            });

    function add_line(){
        var layer = layui.layer
            ,form = layui.form
            ,laydate = layui.laydate;
        let dateNum = $('#dateNum').val();
        let html = '                     <tr>\n' +
            '                                <td>\n' +
            '                                    <input type="text" class="layui-input" name="event_date[]" id="event_date'+dateNum+'" value="" placeholder="yymmddhhii" lay-verify="required">\n' +
            '                                </td>\n' +
            '                                <td>\n' +
            '                                    <select name="event_type[]" lay-search lay-verify="required">\n' +
            '                                                    <option value="">请选择费用类别</option>\n' +
            '                                                    <option value="1">应付费用</option>\n' +
            '                                                    <option value="2">代付费用</option>\n' +
            '                                                    <option value="3">其他费用</option>\n' +
            '                                    </select>\n' +
            '                                </td>\n'+
            '                                <td>\n' +
            '                                    <input type="text" lay-verify="required" name="event_name[]" value="" placeholder="事项名称" autocomplete="off" class="layui-input">\n' +
            '                                </td>\n' +
            '                                <td>\n' +
            '                                    <select name="event_unit[]" lay-search lay-verify="required">\n' +
            '                                        <option value="">请选择计价单位</option>\n';
        {volist name="unit" id="vo"}
        html += '                                            <option value="{$vo.code_value}">{$vo.code_name}</option>\n';
        {/volist}
            html += '                                    </select>\n'+
                '                                </td>\n' +
                '                                <td>\n' +
                '                                                <div class="disf">\n' +
                '                                                    <select name="event_currency[]" lay-search lay-verify="required" lay-filter="event_currency">\n' +
                '                                                        <option value="">请选择计价币种</option>\n';
            {volist name="currency" id="vo"}
            html += '                                                        <option value="{$vo.code_value}">{$vo.code_name}</option>\n';
            {/volist}
                html += '                                            </select>\n' +
                    '                                                    <input type="number" class="layui-input" name="event_price[]" placeholder="单价" value="" lay-verify="required">\n' +
                    '                                                </div>\n' +
                    '                            </td>\n' +
                    '                            <td>\n' +
                    '                                                <input type="number" class="layui-input" name="event_num[]" placeholder="计价数量" value="" lay-verify="required">\n' +
                    '                            </td>\n' +
                    '                            <td>\n' +
                    '                                                <input type="number" class="layui-input event_totalprice" name="event_totalprice[]" placeholder="总金额" value="" lay-verify="required">\n' +
                    '                            </td>\n' +
                    '                            <td>\n' +
                    '                                                <input type="text" class="layui-input" name="event_remark[]" placeholder="备注" value="">\n' +
                    '                            </td>\n'+
                    '                            <td>\n' +
                    '                                                <input type="text" class="layui-input" name="event_url[]" placeholder="订单详情链接" value="">\n' +
                    '                            </td>\n'+
                    '                            </tr>';

                $('#dateNum').val(parseInt(dateNum) + 1);
                $('.btm_add').before(html);
                laydate.render({
                    elem: '#event_date'+dateNum
                    ,type: 'date'
                    ,format: 'MM月dd日'
                });

                form.render(null,'component-form-element1');

            }
</script>
</body>
</html>
