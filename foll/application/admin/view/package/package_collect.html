{include file="public/header_new"}
<body class="gray-bg">

        <div class="row">
          <div class="col-sm-12">
            <div class="ibox float-e-margins">
              <div class="ibox-content">
                <div id="toolbar" class="btn-group" style="margin-top: 10px;margin-bottom: 10px;line-height: 34px;">
                  <button type="button" href="javascript:;" onClick="data_add('添加数据','{:url('admin/Package/packageCollectAdd')}')" class="btn btn-default">
                    发起揽收
                  </button>
                  <!-- <button type="button" href="javascript:;" onClick="dels()" class="btn btn-default">
                    <i class="glyphicon glyphicon-trash"></i>
                  </button> -->
                </div>
                <table id="table"
                  data-url="{:url('admin/Package/packageCollect')}"
                  /*默认排序项*/
                  data-sort-name="id"
                  data-sort-order="desc"
                  /*工具栏相关*/
                  data-toolbar="#toolbar"
                  data-search="false"          /*搜索框*/
                  data-search-on-enter-key="false"
                  data-show-refresh="true"    /*刷新按钮*/
                  /*分页相关*/
                  data-side-pagination="server"
                  data-pagination="true"      /*显示分页*/
                  data-page-size="15"         /*每页显示条数*/
                  /*移动端相关*/
                  data-mobile-responsive="true"
                  data-card-view="true"
                  data-show-columns="true"
                  /*radio or checkbox字段名称*/
                  data-select-item-name="tids" >

                  <thead>
                    <tr>
                      <th data-field="checkbox"
                        data-align="center"
                        data-checkbox="true"></th>
                      <th data-field="id"
                        data-align="center"
                        data-sortable="true"
                      data-visible="false">ID</th>
                      <th data-field="form_buss"
                        data-align="center"
                        data-sortable="true">发起商户</th>
                      <th data-field="to_buss"
                        data-align="center"
                        data-sortable="true">揽收商户</th>
                      <th data-field="package_ids"
                        data-align="center"
                        data-sortable="true">包裹编号</th>
                      <th data-field="type"
                        data-align="center"
                        data-sortable="true">发起方式</th>
                      <th data-field="create_time"
                        data-align="center"
                        data-sortable="true">创建时间</th>
                      <th data-field="status"
                        data-align="center"
                        class="td-status"
                        data-sortable="true">状态</th>
                      <th data-field="manage"
                        data-align="center"
                        class="td-manage">操作</th>
                      </tr>
                    </thead>
                  </table>
                </div>
              </div>
            </div>
          </div>


  <script type="text/javascript">

var table;
$(document).ready(function(){
    table = $('#table').bootstrapTable({
    });

    //$('.form-control').attr('placeholder','搜索地址');
});

/*数据-增加*/
function data_add(title,url)
{
    var index = layer.open({
        type: 2,
        title: title,
        content: url
    });
    layer.full(index);
}

function data_edit(title,url,id)
{
    var index = layer.open({
        type: 2,
        title: title,
        content: url+'/id/'+id
    });
    layer.full(index);
}

</script>

</body>
</html>
