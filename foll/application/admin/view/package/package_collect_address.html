{include file="public/header_new"}
<body class="gray-bg">

        <div class="row">
          <div class="col-sm-12">
            <div class="ibox float-e-margins">
              <div class="ibox-content">
                <div id="toolbar" class="btn-group" style="margin-top: 10px;margin-bottom: 10px;line-height: 34px;">
                  <button type="button" href="javascript:;" onClick="data_add('添加数据','{:url('admin/Package/packageCollectAddressAdd')}')" class="btn btn-default">
                    <i class="glyphicon glyphicon-plus"></i>
                  </button>
                  <button type="button" href="javascript:;" onClick="admindels()" class="btn btn-default">
                    <i class="glyphicon glyphicon-trash"></i>
                  </button>
                </div>
                <table id="table"
                  data-url="{:url('admin/Package/packageCollectAddress')}"
                  /*默认排序项*/
                  data-sort-name="tid"
                  data-sort-order="asc"
                  /*工具栏相关*/
                  data-toolbar="#toolbar"
                  data-search="false"          /*搜索框*/
                  data-search-on-enter-key="false"
                  data-show-refresh="true"    /*刷新按钮*/
                  /*分页相关*/
                  data-side-pagination="server"
                  data-pagination="true"      /*显示分页*/
                  data-page-size="15"         /*每页显示条数*/
                  /*移动端相关*/
                  data-mobile-responsive="true"
                  data-card-view="true"
                  data-show-columns="true"
                  /*radio or checkbox字段名称*/
                  data-select-item-name="tids" >

                  <thead>
                    <tr>
                      <th data-field="checkbox"
                        data-align="center"
                        data-checkbox="true"></th>
                      <th data-field="tid"
                        data-align="center"
                        data-sortable="true"
                      data-visible="false">TID</th>
                      <th data-field="address"
                        data-align="center"
                        data-sortable="true">揽收地址</th>
                      <th data-field="users"
                        data-align="center"
                        data-sortable="true">揽收人员</th>
                      <th data-field="sort"
                        data-align="center"
                        data-sortable="true">排序</th>
                      <th data-field="create_time"
                        data-align="center"
                        data-sortable="true">创建时间</th>
                      <th data-field="status"
                        data-align="center"
                        class="td-status"
                        data-sortable="true">状态</th>
                      <th data-field="manage"
                        data-align="center"
                        class="td-manage">操作</th>
                      </tr>
                    </thead>
                  </table>
                </div>
              </div>
            </div>
          </div>


  <script type="text/javascript">

var table;
$(document).ready(function(){
    table = $('#table').bootstrapTable({
    });

    $('.form-control').attr('placeholder','搜索地址');
});

/*数据-增加*/
function data_add(title,url)
{
    var index = layer.open({
        type: 2,
        title: title,
        content: url
    });
    layer.full(index);
}

function data_edit(title,url,id)
{
    var index = layer.open({
        type: 2,
        title: title,
        content: url+'/id/'+id
    });
    layer.full(index);
}

/*启用*/
function start(obj,tid)
{
    layer.confirm('确认要启用该地址吗？',function(index){
        $.post("{:url('Manage/Admin/adminStatus')}", { 'id':id, 'status':1 }, function(data) {
            if(data.status==1)
            {
                $(obj).parents("tr").find(".td-manage").prepend('<a href="javascript:;" title="停用" onClick="stop(this,'+id+')"><i class="glyphicon glyphicon-minus-sign manage"></i></a>');
                $(obj).parents("tr").find(".td-status").html('<span class="label label-primary">启用</span>');
                $(obj).remove();
                layer.msg('已启用!', {icon: 6,time:1000});
                table.bootstrapTable('refresh');
            }
            else
            {
                layer.msg(data.info, {icon: 5,time:1000});
                table.bootstrapTable('refresh');
            }
        }, 'json');
    });
}

/*停用*/
function stop(obj,tid)
{
    layer.confirm('确认要停用该管理员吗？',function(index){
        $.post("{:url('Manage/Admin/adminStatus')}", { 'id':id, 'status':0 }, function(data) {
            if(data.status==1)
            {
                $(obj).parents("tr").find(".td-manage").prepend('<a href="javascript:;" title="启用" onClick="start(this,'+id+')"><i class="glyphicon glyphicon-ok-sign manage"></i></a>');
                $(obj).parents("tr").find(".td-status").html('<span class="label label-danger">停用</span>');
                $(obj).remove();
                layer.msg('已停用!', {icon: 6,time:1000});
                table.bootstrapTable('refresh');
            }
            else
            {
                layer.msg(data.info, {icon: 5,time:1000});
                table.bootstrapTable('refresh');
            }
        }, 'json');
    });
}

/*管理员-批量删除*/
function admindels()
{
    var chk_value = $.map($('#table').bootstrapTable('getSelections'), function (row) {
            return row.tid;
        });

    if(chk_value=='')
    {
        layer.msg('请选选择数据!', {icon: 2,time:1000});
        return false;
    }

    layer.confirm('地址删除须谨慎，确认要删除所有选中管理员吗？',function(index){

        $.post("{:url('Manage/Admin/adminDeletes')}", { 'tid':chk_value }, function(data) {
            if(data.status== 1)
            {
                // 刷新表格数据
                table.bootstrapTable('refresh');
                layer.msg('删除成功!', {icon: 6,time:1000});
            }
            else
            {
                table.bootstrapTable('refresh');
                layer.msg('操作错误!', {icon: 5,time:1000});
            }
        }, 'json');
    });
}

/*管理员-批量删除*/
function admin_del(obj,tid){
    layer.confirm('地址删除须谨慎，确认要删除吗？',function(index){
        //此处请求后台程序，下方是成功后的前台处理……
        $.ajax({
            url: "admindeletes",
            data:{'id':id},
            type:'post',
            cache:false,
            dataType:'json',
            success:function(data){
                if(data.status==1)
                {
                    $(obj).parents("tr").remove();
                    layer.msg(data.message,{icon:1,time:1000});
                    table.bootstrapTable('refresh');
                }
                else
                {
                    layer.msg(data.message,{icon:2,time:1000});
                    table.bootstrapTable('refresh');
                }
            },
            error:function() {
               layer.msg('删除出错',{icon:2,time:1000});
               table.bootstrapTable('refresh');
            }
        });
    });
}


</script>

</body>
</html>
