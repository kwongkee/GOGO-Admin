{include file="public/header_new" /}
</head>

<body class="gray-bg">
    <div class="animated fadeInRight">

        <div class="row">
            <div class="col-sm-12">
                <div class="ibox float-e-margins">

                    <div class="ibox-content">
                        <form action="{:url('admin/Package/packageCollectAddressAdd')}" method="post" class="form form-horizontal" id="form" >

						            <div class="form-group">
                            <label class="col-sm-2 control-label">揽收地址</label>
                            <div class="col-sm-10">
                                <input type="text" class="form-control" id="address" name="address" datatype="*6-50"
                                  autocomplete="off" sucmsg="通过验证！" nullmsg="请填写揽收地址！" errormsg="揽收地址在6~50位之间！" />
                                <span class="help-block m-b-none Validform_checktip"></span>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="col-sm-2 control-label">揽收人员</label>
                            <div class="col-sm-10">
                                <input type="text" class="form-control" id="open_code" name="open_code"  />
                                <span class="help-block m-b-none Validform_checktip"></span>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="col-sm-2 control-label">序号</label>
                            <div class="col-sm-10">
                                <input type="text" class="form-control" id="sort" name="sort"  />
                                <span class="help-block m-b-none Validform_checktip"></span>
                            </div>
                        </div>

						            <div class="form-group">
                            <label class="col-sm-2 control-label"></label>
                            <div class="col-sm-10">
                                <input type="submit" class="btn btn-primary" value="&nbsp;提交&nbsp;">
                                <span id="msgtip" style="margin-left:30px;"></span>
                            </div>
						            </div>

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>


	<script>
    $(function()
    {

        var form = $("#form").Validform({
            tiptype:2,
            postonce:true,//让表单只能提交一次，提交成功后再提交表单将不会有操作
            ajaxPost:true,
            tiptype:function(msg,o,cssctl){
                if(!o.obj.is("form"))
                {
                    var objtip=o.obj.siblings(".Validform_checktip");
                    cssctl(objtip,o.type);
                    objtip.text(msg);
                }
                else
                {
                    var objtip=o.obj.find("#msgtip");
                    cssctl(objtip,o.type);
                    objtip.text(msg);
                }
            },
            callback:function(data){
                if(data.status==1)
                {
                    layer.msg(data.message, {
                                icon: 1,
                                time: 2000
                            }, function(){
                                parent.window.table.bootstrapTable('refresh');
                                var index = parent.layer.getFrameIndex(window.name);
                                parent.layer.close(index);
                            });
                            return true;
                }
                else
                {
                    layer.msg(data.message, {icon:2, time:2000});
                    return false;
                }
            }
        });
    });
    </script>

</body>

</html>
