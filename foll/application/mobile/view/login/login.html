<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>
    <meta name="format-detection" content="telephone=no,email=no,date=no,address=no">
    <title></title>
    <link rel="stylesheet" type="text/css" href="./static/css/aui.2.0.css" />
    <script src="https://cdn.bootcss.com/jquery/3.3.1/jquery.min.js"></script>
</head>
<body>
<header class="aui-bar aui-bar-nav">登录</header>
<div class="aui-content aui-margin-b-15" style="margin-top:40px;">
    <ul class="aui-list aui-form-list">
        <li class="aui-list-item">
            <div class="aui-list-item-inner">
                <div class="aui-list-item-label-icon">
                    <i class="aui-iconfont aui-icon-mobile"></i>
                </div>
                <div class="aui-list-item-input">
                    <input type="tel" placeholder="username" value="" id="val">
                </div>
            </div>
        </li>
    </ul>
</div>
<p><div class="aui-btn aui-btn-info aui-btn-block" onclick="login()">登录</div></p>
</body>
<script>
    function login() {
        $.ajax({
            url:"{:Url('mobile/verif_login')}",
            type:"post",
            dataType:"json",
            data:{"username":$("#val").val()},
            success:function(str){
                if(str.code=="success"){
                    window.location.href="http://shop.gogo198.cn/foll/public/?s=mobile";
                    return true;
                }
                alert(str.msg);
            },
            error:function () {
                alert("服务链接失败");
            }
        });
    }
</script>
</html>
