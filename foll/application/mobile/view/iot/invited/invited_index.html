{include file='iot/header'}
<body style="background-color:#fff;">
<link rel="stylesheet" type="text/css" href="./static/iot/css/bootstrap-datepicker3.css">
<style>
    .tip {
        display: none;
        font-size: 14px;
        position: absolute;
        top: 50%;
        left: 5%;
        background: #000;
        opacity: .5;
        width: 90%;
        color: #fff;
        text-align: center;
        padding: 5% 0;
        z-index: 11;
    }
</style>
<div class="whole">
    <div class="header">
        <div class="toplogo"><img src="./static/iot/images/top-logo.png" alt=""></div>
        <h2 class="title">来访邀请</h2>
    </div>
    <form action="" id="uploadForm" enctype="multipart/form-data">
        <div class="content">
            <div class="box">
                <div class="single" style="margin-left:15%;">
                        <label for="" class="visited"><input name="visit" type="radio" value="0" class="radio" checked="true"/>首次来访</label>
                        <label for="" class="visited"><input name="visit" type="radio" value="1" class="radio" />再次来访</label>
                </div>
                    <div class="tip" id="tip"></div>
                </div>
            <!--<div class="register_icon"><img src="./static/iot/images/icon_big02.png" alt=""></div>-->
            <div class="box">
                <!-- <img src="./static/iot/images/icon_07.png" alt="" class="icon"> -->
                <!-- <input data-provide="datepicker"> -->
                <span style="margin: 0 9px 0 4%;">来访日期</span>
                <input type="text" name="invited_time" value="" placeholder="请选择来访日期" class="box_input" data-provide="datepicker" id="data">
            </div>
            <div class="box">
                <!-- <img src="./static/iot/images/icon_08.png" alt="" class="icon"> -->
                <span style="margin: 0 9px 0 4%;">来访时限</span>
                <select name="invited_expre" id="invited_expre" placeholder="请选择来访时限" class="box_input">
                    <option value="4">4小时</option>
                    <option value="8">8小时</option>
                    <option value="12">12小时</option>
                    <option value="24">24小时</option>
                </select>
            </div>
       
            <div class="box">
                <span style="margin: 0 9px 0 4%;">验证类型</span>
                <select name="type" id="type" placeholder="请选择来访方式" class="box_input">
                    <option value="">请选择</option>
                    <option value="idcard">身份验证</option>
                    <option value="face">人脸识别</option>
                    <option value="qrcode">扫码</option>
                    <!--<option value="">密匙</option>-->
                </select>
            </div>
        </div>
        <div class="btn" onclick="submits();"><a href="#">提交</a></div>
    </form>
    <div class="login_bottom"><img src="./static/iot/images/bottom.jpg" alt=""></div>
</div>
<script src="http://cdn.bootcss.com/jquery/1.11.0/jquery.min.js" type="text/javascript"></script>
<!--<script>window.jQuery || document.write('<script src="./static/iot/js/jquery-1.11.0.min.js"><\/script>')</script>-->
<script src="http://cdn.bootcss.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
<script type="text/javascript" src="./static/iot/js/bootstrap-datepicker.min.js"></script>
<script type="text/javascript" src="http://res.wx.qq.com/open/js/jweixin-1.0.0.js"></script>

 <!--<script type="text/javascript" src="dist/locales/bootstrap-datepicker.zh-CN.min.js" charset="UTF-8"></script> -->
<script type="text/javascript">
    $(function() {
        $('.datepicker').datepicker({})
    });

    $('#type').change(function () {
        var val = $(this).val();
        if (val=='face'){
            $("#idcarder").remove();
            $('.content').append('<div class="box" id="facer">\n' +
                '\t\t\t<span style="margin: 0 9px 0 4%;">人脸图片</span>\n' +
                '\t\t\t<input type="file" name="face" value="" placeholder="上传照片" id="face" style="line-height: 28px;">\n' +
                '\t\t</div>');
        } else if (val=='idcard'){
            $("#facer").remove();
            $(".content").append('<div id="idcarder"><div class="box"><span style="margin: 0 9px 0 4%;">身份证号</span><input type="text" name="idCard" value="" id="id_card" placeholder="请填写身份证号" class="box_input"></div><div class="box"><span style="margin: 0 9px 0 4%;">身份姓名</span><input type="text" name="idName" value="" id="id_name" placeholder="请填写姓名" class="box_input"></div><div class="box"><span  style="margin: 0 9px 0 4%;">手机号码</span><input type="text" name="tel" value="" style="line-height:28px" placeholder="请填写手机号"  id="tel"></div></div>');
        }else{
            $("#idcarder").remove();
            $("#facer").remove();
        }
    });
    function submits(){
        var invited_time = $("#data").val();
        var invited_expre = $("#invited_expre").val();
        var visit = $("input[name='visit']:checked").val();
        var type = $("#type").val();
        if (invited_time==''){
            showMsg('请填写来访时间');
            return false;
        }
        if (invited_expre==''){
            showMsg('请填写来访时限');
            return false;
        }
        if (visit==''){
            showMsg('请选来访类型');
            return false;
        }
        if (type==''){
            showMsg('请选择认证类型');
            return false;
        }
        $('#tip').html('稍等。。');
        $('#tip').css('display','block');
        $.ajax({
            url: '{:Url("iot/invite")}',
            type: 'POST',
            cache: false,
            data: new FormData($('#uploadForm')[0]),
            processData: false,
            contentType: false
        }).done(function(res) {
            $('#tip').css('display','none');
            if(res.code==0){
                window.location.href=res.data;
            }else{
                showMsg(res.message);
            }
        }).fail(function(res) {
            $('#tip').css('display','none');
        });
        return false;
    }
</script>
</body>
</html>
