<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>
    <meta name="format-detection" content="telephone=no,email=no,date=no,address=no">
    <title></title>
    <link rel="stylesheet" type="text/css" href="./static/css/aui.2.0.css" />
    <script src="https://cdn.bootcss.com/jquery/3.3.1/jquery.min.js"></script>
</head>
<body>
<header class="aui-bar aui-bar-nav">车位列表</header>
<!--<div class="aui-searchbar" id="search">-->
    <!--<div class="aui-searchbar-input aui-border-radius" tapmode>-->

        <!--<form action="javascript:search();">-->
            <!--<input type="search" placeholder="请输入搜索内容" id="search-input">-->
        <!--</form>-->
    <!--</div>-->
<!--</div>-->
<div class="aui-content aui-margin-b-15">
    <ul class="aui-list aui-list-in">
        {volist name="list" id="vo" empty="暂时没有数据" }
        <a href="{:Url('mobile/parking_info')}&pid={$vo['number']}&did={$vo['ordersn']}">
        <li class="aui-list-item">
            <div class="aui-list-item-inner">
                <input class="aui-radio" type="checkbox" name="num"  value="{$vo['number']}">
                <div class="aui-list-item-title" style="margin-right:106px;font-size: 14px;">{$vo['Area']}{$vo['Road']}{$vo['Road_num']}号<div style="float:right;margin-right:-58px;">&nbsp&nbsp&nbsp&nbsp&nbsp昵称:{$vo['nickname']}</div></div>
            </div>
        </li>
        </a>
        {/volist}
    </ul>
</div>
<p><div class="aui-btn aui-btn-info aui-btn-block" onclick="sendgo()">模拟停车离开</div></p>
</body>
<script>
    function sendgo() {
        var fruit = "";
        $("input:checkbox[name='num']:checked").each(function() {
            fruit += $(this).val() + ",";
        });
        console.dir(fruit);
        $.ajax({
            url:"{:Url('mobile/sendmsg')}",
            type:"get",
            dataType:"json",
            data:{"num":fruit},
            success:function(str){
               // var str=JSON.parse(str);
               alert(str.msg);
               console.dir(str);
            },
            error:function () {
                alert("服务器错误");
            }
        });
    }

</script>
</html>
