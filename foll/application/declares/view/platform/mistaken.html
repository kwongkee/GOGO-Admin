<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{$order.title}</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <link rel="stylesheet" type="text/css" href="__STATIC__/plugins/layui/css/layui.css"/>
	<script type="text/javascript" src="__STATIC__/plugins/layui/layui.js"></script>
	<style type="text/css">
		.clear{clear: both;height: 8px;}
		.money{color: red;font-weight: bold;font-size: 15px;}
		.laytable-cell-1-0{ width: 80px; }
		.laytable-cell-1-2{width:218px;}
		.laytable-cell-1-amount{width: 165px;}
		.laytable-cell-1-a{width: 145px;}
		.laytable-cell-1-4{ width: auto; }
		
		.laytable-cell-1-province{ width: 105px; }
		.laytable-cell-1-city{ width: 75px; }
		.laytable-cell-1-zone{ width: 80px; }
		.laytable-cell-1{width: 99px;}
		.fee{color: red;}
		.layui-form-select dl {
        z-index: 9999;
    }
	</style>
</head>

<body>
<div style="margin-top: 10px;"></div>
<p><h2 style="text-align: center;color: green;">{$order.title}</h2></p>

<div class="layui-form layui-border-box layui-table-view" lay-filter="LAY-table-1" style="width:auto;float: left;margin-right:8px;">
	<div class="layui-table-box">
		<div class="layui-table-header">
			<table cellspacing="0" cellpadding="0" border="0" class="layui-table">
				<thead>
					<tr><th data-field="2" colspan="4"><div class="layui-table-cell laytable-cell-group" align="center"><span style="font-size: 14px;font-weight: bold;">{$order.newDate}月{$order.title}</span></div></th></tr>
					<tr>
						<th data-field="province"><div class="layui-table-cell laytable-cell-1-province"><span>日期</span></div></th>
						<th data-field="city"><div class="layui-table-cell laytable-cell-1-city"><span>状态</span></div></th>
						<th data-field=""><div class="layui-table-cell laytable-cell-1"><span>对账类型</span></div></th>
						<th data-field=""><div class="layui-table-cell laytable-cell-1"><span>选择商户</span></div></th>
					</tr>
				</thead>
			</table>
		</div>
		
		<div class="layui-table-body layui-table-main">
			<table cellspacing="0" cellpadding="0" border="0" class="layui-table">
				<tbody>
					<!-- 对账类型  -->
					<input type="hidden" name="Autype" id="Autype" value="" />
					
					{volist name="$order.queryOk.lists" id='vo' key='index'}
					<form class="layui-form">
					<tr data-index="{$vo.id}">
						<td data-field="province"><div class="layui-table-cell laytable-cell-1-province">{$vo.accountDay}</div></td>
						<td data-field="city"><div class="layui-table-cell laytable-cell-1-city" style="color: red;font-weight: blo;">有误单</div></td>
						
						<td style="text-align: center;">
							<div class="layui-form-item">
								<div class="layui-input-inline" style="width: 99px;">
								    <select name="types" lay-verify="required" lay-filter="types">
								    	<option value=""></option>
								        <option value="{$vo.type}">{if condition="$vo.type eq 'auth'"}实名认证{elseif condition="$vo.type eq 'goods'"/}商品备案{elseif condition="$vo.type eq 'pay'"/}支付订单{/if}</option>
								    </select>
								</div>
							</div>
						</td>
						
						<td style="text-align: center;">
							<div class="layui-form-item">
							    <div class="layui-input-inline" style="width: 95px;">
							        <!-- 账单时间 -->
								    <!--input type="hidden" name="Reconcildate" id="Reconcildate" value="{$vo.accountDay}" /-->
							        <select name="userid" class="userids" lay-verify="required" lay-filter="userid">
							        	<option value=""></option>
							        	<option value="{$vo.uid}={$vo.accountDay}={$vo.confirmId}">{$vo.user_name}</option>
							        </select>
							    </div>
						   </div>
						</td>
					</tr>
					</form>
					{/volist}
				</tbody>
			</table>
		</div>
		
		<span style="margin:0px 8px;font-size: 15px;font-weight: bold;">共有:{$order.queryOk.total} 条</span>
		<div class="layui-box layui-laypage layui-laypage-default">{$order.queryOk.pages}</div>
	</div>
</div>

<!-- 查看对账部分结束  -->

<!--div style="width: 10px;margin: 0px 15px;"></div-->

<!-- 数据加载部分 -->
<div class="layui-form layui-border-box layui-table-view" lay-filter="LAY-table-2" id="duizhang" style="width:588px;float:left;display: none;">
	<div class="layui-table-box  layui-form">
		<div class="layui-table-header">
			<table cellspacing="0" cellpadding="0" border="0" class="layui-table">
				<thead>
					<tr>
						<th data-field="username" rowspan="2"><div class="layui-table-cell laytable-cell-1-amount"><span>订单时间</span></div></th>
						<th data-field="amount" rowspan="2"><div class="layui-table-cell laytable-cell-1-2"><span>订单编号</span></div></th>
						<th data-field="amount" rowspan="2"><div class="layui-table-cell laytable-cell-1-a"><span>订单金额</span></div></th>
						<th data-field="amount" rowspan="2"><div class="layui-table-cell laytable-cell-1-amount"><span>操作</span></div></th>
						<!--th data-field="0" rowspan="3" colspan="6" data-unresize="true"><div class="layui-table-cell laytable-cell-1-0 laytable-cell-checkbox">
								<input type="checkbox" name="AllChoose" lay-skin="primary" value="全选" lay-filter="AllChoose">
								<div class="layui-unselect layui-form-checkbox" id="cancelBox" lay-skin="primary"><i class="layui-icon layui-icon-ok"></i></div></div>
						</th-->
					</tr>
				</thead>
			</table>
		</div>
		
		<div class="layui-table-body layui-table-main">
			<table cellspacing="0" cellpadding="0" border="0" class="layui-table">
				<tbody id="tabledata">
					
				</tbody>
			</table>
		</div>
		
		<form class="layui-form" id="CheckIds">
			<div class="layui-table-page" style="height: 70px;">
				<!-- 当前页数  -->
				<input type="hidden" id="pages" value=""/>
				<!-- 每页显示条数 -->
				<input type="hidden" id="limit" value=""/>
				<input type="hidden" id="uid" value="" />
				<!-- 对账日 -->
				<input type="hidden" id="accountDay" value="" />
				<!-- 对账类型 -->
				<input type="hidden" id="type" value="" />
				<!--  数据ID -->
				<input type="hidden" id="confirmId" value="" />
				<input type="hidden" id="pageNum" value="" />
				
				<input type="hidden" id="startDate" value=""/>
				<input type="hidden" id="endDate" value="" />
				
				<div style="float: left;height: 27px;" id="showNext">
					<a href="javascript:void(0);" class="layui-btn layui-btn-xs" id="prev">上一页</a>
					<a href="javascript:void(0);" class="layui-btn layui-btn-normal layui-btn-xs " id="next">下一页</a>
				</div>
				
				<span style="color: green;margin:0px 10px;font-size: 13px;" id="pagess">当前第：1 页</span>
				
				<span style="color: green;font-size: 13px;" id="pageNums">共有：6 页</span>
				
				<span style="font-weight: bold;"> 当前查看商户为:  <span style="color: green;" id="username">0</span> </span>
				
				<div style="float:right;height: 27px;margin-right: 15px;" id="showNext">
					
					<a href="javascript:void(0);" class="layui-btn layui-btn-sm" id="queryOk">已全部核查</a>
					<a href="javascript:void(0);" class="layui-btn layui-btn-sm layui-btn-danger" id="upload">下载</a>
				</div>
				
				<!--span style="color:silver;margin:0px 10px;font-size: 13px;">请确认对账，账单无误，请点击右上角方框全选</span-->
				
				<div class="clear" style="height: 8px;"></div>
				
				<!--p style="font-size: 14px;font-weight: bold;padding: 0px 10px;">对账数量:<span id="parent" class="fee">0</span>条 &nbsp;&nbsp;&nbsp;服务费用:￥<span id="serverfee" class="fee">0.00</span>元&nbsp;&nbsp;&nbsp; 验核或备案或支付费用:￥<span id="yhfee" class="fee">0.00</span>元&nbsp;&nbsp;&nbsp;应付总额:￥<span id="totalfee" class="fee">0.00</span>元 </p-->
				
			</div>
		</form>

	</div>
</div>

<div class="clear"></div>

<script>
layui.use(['layer','form','jquery','laypage','table','flow','element'],function() {
		var $ = layui.jquery,form=layui.form,layer=layui.layer,laypage=layui.laypage,table=layui.table,element=layui.element,flow=layui.flow;
		var element = layui.element;
		//监听选择对账类型
		form.on('select(types)',function(res){
			$('#Autype').val(res.value);
		});
		
		//监听选择商户
		form.on('select(userid)',function(data){
		    //被选中的值
		    var userid = data.value;
		    //变成数组
		    var user = userid.split("=");
		    var types = $('#Autype').val();
		    if(types == ''){
		    	layer.msg('请选择对账类型',{'icon':5})
		    	return false;
		    }
		    /**
		     * ajax 请求数据  返回前端显示 
		     */
		  var CheckIds = '';
			setTimeout(function(){
				$('.x-bodys').css('display','none');//隐藏查看
				$('#duizhang').css('display','block');//显示对账
				$.post("{:Url('Platform/Mistakensee')}",{'uid':user[0],'accountDay':user[1],'confirmId':user[2],'type':types},function(res) {
					$('#tabledata').empty();
					switch(res.type){
						case 'orders':
							$.each(res.data, function(index,val) {
								var trdata =  '<tr data-index="'+index+'"><td><div class="layui-table-cell laytable-cell-1-amount">'+val['OrderDate']+'</div></td>';
									trdata += '<td><div class="layui-table-cell laytable-cell-1-2">'+val['goodsNo']+'</div></td>';
									trdata += '<td><div class="layui-table-cell laytable-cell-1-a">'+val['Price']+'元</div></td>';
									trdata += '<td> <a href="javascript:void(0);" class="layui-btn layui-btn-sm" data="'+val['id']+'='+res.type+'='+res.uid+'" id="update">修改</a></td>';
								$('#tabledata').append(trdata);
							});
						break;
						case 'goods':
							$.each(res.data, function(index,val) {
								var trdata =  '<tr data-index="'+index+'"><td><div class="layui-table-cell laytable-cell-1-amount">'+val['DeclTime']+'</div></td>';
									trdata += '<td><div class="layui-table-cell laytable-cell-1-2">'+val['EntGoodsNo']+'</div></td>';
									trdata += '<td><div class="layui-table-cell laytable-cell-1-a">'+val['RegPrice']+'元</div></td>';
									trdata += '<td> <a href="javascript:void(0);" class="layui-btn layui-btn-sm" data="'+val['id']+'='+res.type+'='+res.uid+'" id="update">修改</a></td>';
								$('#tabledata').append(trdata);
							});
						break;
						case 'auth':
							$.each(res.data, function(index,val) {
								var trdata =  '<tr data-index="'+index+'"><td><div class="layui-table-cell laytable-cell-1-amount">'+val['completeTime']+'</div></td>';
									trdata += '<td><div class="layui-table-cell laytable-cell-1-2">'+val['orderId']+'</div></td>';
									trdata += '<td><div class="layui-table-cell laytable-cell-1-a">'+(val['fee']/100)+'元</div></td>';
									trdata += '<td> <a href="javascript:void(0);" class="layui-btn layui-btn-sm" data="'+val['id']+'='+res.type+'='+res.uid+'" id="update">修改</a></td>';
								$('#tabledata').append(trdata);
							});
						break;
						case 'pay':
							$.each(res.data, function(index,val) {
								var trdata =  '<tr data-index="'+index+'"><td><div class="layui-table-cell laytable-cell-1-amount">'+val['payTimeStr']+'</div></td>';
									trdata += '<td><div class="layui-table-cell laytable-cell-1-2">'+val['orderId']+'</div></td>';
									trdata += '<td><div class="layui-table-cell laytable-cell-1-a">'+(val['payAmount']/100)+'元</div></td>';
									trdata += '<td> <a href="javascript:void(0);" class="layui-btn layui-btn-sm" data="'+val['id']+'='+res.type+'='+res.uid+'" id="update">修改</a></td>';
								$('#tabledata').append(trdata);
							});
						break;
					}
					
					$('#pages').val(res.pages);//分页数
					$('#limit').val(res.limit);//每页显示条数
					$('#pageNum').val(res.pageNum);//总页数
					$('#uid').val(res.uid);//uid
					$('#accountDay').val(res.accountDay);//对账日期
					$('#type').val(res.type);//对账类型
					$('#confirmId').val(res.confirmId);//对账ID
					$('#startDate').val(res.tongji.startDate);//对账ID
					$('#endDate').val(res.tongji.endDate);//对账ID
					
					$('#pagess').html('当前第: '+res.pages+' 页')//当前页数
					$('#pageNums').html('共有: '+res.pageNum+' 页')//共有页数
					
					$('#parent').html(res.tongji.count)//对账数量
					$('#serverfee').html(res.tongji.ServerMoney)//服务费用
					$('#yhfee').html(res.tongji.Money)//验核费用
					$('#totalfee').html(res.tongji.Total)//应付总额
					$('#username').html(res.tongji.username);
				});
			},200);
			return false;
		});
		
	//修改按钮  2018-07-18 10:54
	$(document).on('click','#update',function(res){
			var target = res.currentTarget;
			var gid = target.attributes.data.value;//节点字串
			//var valArr = gid.split("=");//分割
			layer.open({
				type:2,
				title:'编辑数据',
				shade:0.3,
				area:['480px','380px'],
				content:"{:Url('Platform/edit')}&gid="+gid,
				yes:function(resd){
					
				}
			});
	});
			
	//上一页
	$(document).on('click','#prev',function(vals) {
				
		var pageNum = $('#pageNum').val();//总页数
		var pages   = $('#pages').val();//上一页减一
		var limit 	= $('#limit').val();//每页显示条数
		var uid 	= $('#uid').val();//uid
		var accountDay   = $('#accountDay').val();//对账日期
		var type   = $('#type').val();//对账类型
		var confirmId   = $('#confirmId').val();//对账ID
		
		pages   = parseInt(pages);
		pageNum = parseInt(pageNum);
		
		if(pages == 1) {
			pages = 1;
			return false;
		} else if(pages >1 ){
			pages = parseInt(pages)-1;
		}
	
		var CheckIds  = '';
		
		setTimeout(function(){
			$.post("{:Url('Platform/Mistakensee')}",{'pages':pages,'limit':limit,'uid':uid,'accountDay':accountDay,'type':type,'confirmId':confirmId},function(res) {
				//console.dir(res);
				$('#tabledata').empty();
				switch(res.type){
					case 'orders':
						$.each(res.data, function(index,val) {
							var trdata =  '<tr data-index="'+index+'"><td><div class="layui-table-cell laytable-cell-1-amount">'+val['OrderDate']+'</div></td>';
								trdata += '<td><div class="layui-table-cell laytable-cell-1-2">'+val['goodsNo']+'</div></td>';
								trdata += '<td><div class="layui-table-cell laytable-cell-1-a">'+val['Price']+'元</div></td>';
								trdata += '<td> <a href="javascript:void(0);" class="layui-btn layui-btn-sm" data="'+val['id']+'='+res.type+'='+res.uid+'" id="update">修改</a></td>';
								//trdata += '<td conspan="2"> <a href="javascript:void(0);" class="layui-btn layui-btn-sm" data="'+val['id']+'='+res.type+'='+res.uid+'" id="update">修改</a><a href="javascript:void(0);" class="layui-btn layui-btn-sm layui-btn-danger" onclick="upload(1)">下载</a></td>';
							$('#tabledata').append(trdata);
						});
					break;
					case 'goods':
						$.each(res.data, function(index,val) {
							var trdata =  '<tr data-index="'+index+'"><td><div class="layui-table-cell laytable-cell-1-amount">'+val['DeclTime']+'</div></td>';
								trdata += '<td><div class="layui-table-cell laytable-cell-1-2">'+val['EntGoodsNo']+'</div></td>';
								trdata += '<td><div class="layui-table-cell laytable-cell-1-a">'+val['RegPrice']+'元</div></td>';
								trdata += '<td> <a href="javascript:void(0);" class="layui-btn layui-btn-sm" data="'+val['id']+'='+res.type+'='+res.uid+'" id="update">修改</a></td>';
								//trdata += '<td conspan="2"> <a href="javascript:void(0);" class="layui-btn layui-btn-sm" data="'+val['id']+'='+res.type+'='+res.uid+'" id="update">修改</a><a href="javascript:void(0);" class="layui-btn layui-btn-sm layui-btn-danger" onclick="upload(1)">下载</a></td>';
							$('#tabledata').append(trdata);
						});
					break;
					case 'auth':
						$.each(res.data, function(index,val) {
							var trdata =  '<tr data-index="'+index+'"><td><div class="layui-table-cell laytable-cell-1-amount">'+val['completeTime']+'</div></td>';
								trdata += '<td><div class="layui-table-cell laytable-cell-1-2">'+val['orderId']+'</div></td>';
								trdata += '<td><div class="layui-table-cell laytable-cell-1-a">'+(val['fee']/100)+'元</div></td>';
								trdata += '<td> <a href="javascript:void(0);" class="layui-btn layui-btn-sm" data="'+val['id']+'='+res.type+'='+res.uid+'" id="update">修改</a></td>';
							$('#tabledata').append(trdata);
						});
					break;
					case 'pay':
						$.each(res.data, function(index,val) {
							var trdata =  '<tr data-index="'+index+'"><td><div class="layui-table-cell laytable-cell-1-amount">'+val['payTimeStr']+'</div></td>';
								trdata += '<td><div class="layui-table-cell laytable-cell-1-2">'+val['orderId']+'</div></td>';
								trdata += '<td><div class="layui-table-cell laytable-cell-1-a">'+(val['payAmount']/100)+'元</div></td>';
								trdata += '<td> <a href="javascript:void(0);" class="layui-btn layui-btn-sm" data="'+val['id']+'='+res.type+'='+res.uid+'" id="update">修改</a></td>';
							$('#tabledata').append(trdata);
						});
					break;
				}
				
				$('#pages').val(res.pages);//分页数
				$('#limit').val(res.limit);//每页显示条数
				$('#pageNum').val(res.pageNum);//总页数
				$('#uid').val(res.uid);//uid
				$('#accountDay').val(res.accountDay);//对账日期
				$('#type').val(res.type);//对账类型
				$('#confirmId').val(res.confirmId);//对账ID
				$('#pagess').html('当前第: '+res.pages+' 页')//当前页数
				$('#pageNums').html('共有: '+res.pageNum+' 页')//共有页数
			});
		},300);
	});

	//下一页
	$(document).on('click','#next',function(vals) {
				
		var pageNum = $('#pageNum').val();//总页数
		var pages   = $('#pages').val();//上一页减一
		var limit 	= $('#limit').val();//每页显示条数
		var uid 	= $('#uid').val();//uid
		var accountDay   = $('#accountDay').val();//对账日期
		var type   = $('#type').val();//对账类型
		var confirmId   = $('#confirmId').val();//对账ID
		
		pages   = parseInt(pages);
		pageNum = parseInt(pageNum);
		//最后一页
		if(pageNum == pages) {
		  	pages  = pageNum;
		} else {
		  	pages = (parseInt(pages)+1);
		}
		var CheckIds  = '';
		
		setTimeout(function(){
			$.post("{:Url('Platform/Mistakensee')}",{'pages':pages,'limit':limit,'uid':uid,'accountDay':accountDay,'type':type,'confirmId':confirmId},function(res) {
				$('#tabledata').empty();
				switch(res.type){
					case 'orders':
						$.each(res.data, function(index,val) {
							var trdata =  '<tr data-index="'+index+'"><td><div class="layui-table-cell laytable-cell-1-amount">'+val['OrderDate']+'</div></td>';
								trdata += '<td><div class="layui-table-cell laytable-cell-1-2">'+val['goodsNo']+'</div></td>';
								trdata += '<td><div class="layui-table-cell laytable-cell-1-a">'+val['Price']+'元</div></td>';
								trdata += '<td> <a href="javascript:void(0);" class="layui-btn layui-btn-sm" data="'+val['id']+'='+res.type+'='+res.uid+'" id="update">修改</a></td>';
							$('#tabledata').append(trdata);
						});
					break;
					case 'goods':
						$.each(res.data, function(index,val) {
							var trdata =  '<tr data-index="'+index+'"><td><div class="layui-table-cell laytable-cell-1-amount">'+val['DeclTime']+'</div></td>';
								trdata += '<td><div class="layui-table-cell laytable-cell-1-2">'+val['EntGoodsNo']+'</div></td>';
								trdata += '<td><div class="layui-table-cell laytable-cell-1-a">'+val['RegPrice']+'元</div></td>';
								trdata += '<td> <a href="javascript:void(0);" class="layui-btn layui-btn-sm" data="'+val['id']+'='+res.type+'='+res.uid+'" id="update">修改</a></td>';
							$('#tabledata').append(trdata);
						});
					break;
					case 'auth':
						$.each(res.data, function(index,val) {
							var trdata =  '<tr data-index="'+index+'"><td><div class="layui-table-cell laytable-cell-1-amount">'+val['completeTime']+'</div></td>';
								trdata += '<td><div class="layui-table-cell laytable-cell-1-2">'+val['orderId']+'</div></td>';
								trdata += '<td><div class="layui-table-cell laytable-cell-1-a">'+(val['fee']/100)+'元</div></td>';
								trdata += '<td> <a href="javascript:void(0);" class="layui-btn layui-btn-sm" data="'+val['id']+'='+res.type+'='+res.uid+'" id="update">修改</a></td>';
							$('#tabledata').append(trdata);
						});
					break;
					case 'pay':
						$.each(res.data, function(index,val) {
							var trdata =  '<tr data-index="'+index+'"><td><div class="layui-table-cell laytable-cell-1-amount">'+val['payTimeStr']+'</div></td>';
								trdata += '<td><div class="layui-table-cell laytable-cell-1-2">'+val['orderId']+'</div></td>';
								trdata += '<td><div class="layui-table-cell laytable-cell-1-a">'+(val['payAmount']/100)+'元</div></td>';
								trdata += '<td> <a href="javascript:void(0);" class="layui-btn layui-btn-sm" data="'+val['id']+'='+res.type+'='+res.uid+'" id="update">修改</a></td>';
							$('#tabledata').append(trdata);
						});
					break;
				}
				
				$('#pages').val(res.pages);//分页数
				$('#limit').val(res.limit);//每页显示条数
				$('#pageNum').val(res.pageNum);//总页数
				$('#uid').val(res.uid);//uid
				$('#accountDay').val(res.accountDay);//对账日期
				$('#type').val(res.type);//对账类型
				$('#confirmId').val(res.confirmId);//对账ID
				$('#pagess').html('当前第: '+res.pages+' 页')//当前页数
				$('#pageNums').html('共有: '+res.pageNum+' 页')//共有页数
			});
		},300);
	});
	
	
	//下载按钮
	$(document).on('click','#upload',function(vals) {
			var uid = $('#uid').val();
			var type = $('#type').val();
			var accountDay = $('#accountDay').val();
			var startDate  = $('#startDate').val();
			var endDate    = $('#endDate').val();
			$('#upload').addClass('layui-hide');
			$.post("{:Url('Platform/upload')}",{'uid':uid,'type':type,'accountDay':accountDay,'startDate':startDate,'endDate':endDate},function(res){
	    	if(res.code == 1){
	    		layer.msg(res.msg,{'icon':6});
	    	} else {
	    		layer.msg(res.msg,{'icon':5});
	    		$('#upload').removeClass('layui-hide');
	    	}
		});
	});
	
	
	//已全部核查  2017-08-18 17:43
	$(document).on('click','#queryOk',function(vals) {
			var uid = $('#uid').val();
			var type = $('#type').val();
			var accountDay = $('#accountDay').val();
			var startDate  = $('#startDate').val();
			var endDate    = $('#endDate').val();
			$('#queryOk').addClass('layui-hide');
			$.post("{:Url('Platform/queryOk')}",{'uid':uid,'type':type,'accountDay':accountDay,'startDate':startDate,'endDate':endDate},function(res){
	    	if(res.code == 1){
	    		layer.msg(res.msg,{'icon':6});
	    		setTimeout(function(){
	    			window.location.reload();
	    		},1100);
	    	} else {
	    		layer.msg(res.msg,{'icon':5});
	    		$('#queryOk').removeClass('layui-hide');
	    	}
		});
	});

});
</script>
