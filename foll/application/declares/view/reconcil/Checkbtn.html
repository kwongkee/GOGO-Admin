<!DOCTYPE html>
<html>
<head>
	<title>确认订单与收付结算页面</title>
	<link rel="stylesheet" type="text/css" href="__STATIC__/plugins/layui/css/layui.css"/>
	<script type="text/javascript" src="__STATIC__/plugins/layui/layui.js"></script>
</head>
<body style="padding: 10px;">
	
	<form class="layui-form">
		<input type="hidden" name="uid" value="{$data.user_id}">
		<div class="layui-form-item">
			<label class="layui-form-label">商户姓名：</label>
			<div class="layui-input-inline">
				<input type="text" class="layui-input" maxlength="11" readonly name="user_name" value="{$data.user_name}">
			</div>
		</div>
		
		<div class="layui-form-item">
			<label class="layui-form-label">电子邮箱：</label>
			<div class="layui-input-inline">
				<input type="email" class="layui-input" name="user_email" value="{$data.user_email}">
			</div>
		</div>
	</form>

	<div class="layui-form-item">
		<div class="layui-input-block">
			<button class="layui-btn layui-btn-lx" onclick="save()">确认下载</button>
		</div>
	</div>

	<script type="text/javascript">
		layui.use(['layer','form','jquery'],function(){
			form = layui.form;
			layer = layui.layer;
			$ = layui.jquery;
			
		});

		// 保存管理员
		function save() {
			var id 		 = parseInt($('input[name="uid"]').val());
			var username = $.trim($('input[name="user_mobile"]').val());
			var email 	 = $.trim($('input[type=email][name="user_email"]').val());
			
			if(email == ''){
				layer.alert('请输入电子邮箱',{icon:2});
				return false;
			}
			
			if(!emails(email)){
				layer.alert('请输入正确的电子邮箱',{icon:2});
				return false;
			}

			$.post("{:Url('Reconcil/Checkok')}",$('form').serialize(),function(res){
				console.dir(res);
				if(res.code > 0){
					layer.alert(res.msg,{icon:5});
				} else {
					layer.msg(res.msg,{icon:6});
					setTimeout(function(){
						layer.closeAll();
						parent.window.location.reload();
					},1000);
				}
			});
		}
		
		function emails(val){
			var em = /^[a-z0-9]+([._\\-]*[a-z0-9])*@([a-z0-9]+[-a-z0-9]*[a-z0-9]+.){1,63}[a-z0-9]+$/;
			return em.test(val);
		}
		
		function phone(val){
			var ph = /^1(3|4|5|7|8)\d{9}$/;
			return ph.test(val);
		}
	</script>
</body>
</html>
