<body style="padding-top: 10px;">
<div class="layui-card" xmlns="http://www.w3.org/1999/html">
    <div class="layui-card-header" style="padding:0 9px;line-height:26px;height:127px;background:#D1EEEE;">填报说明:1.只支持上传2003版本的Excel文件</br>2.必须按照Excel模板文件填写</br>3.点击这里：<a style="color: red;" href="./static/realname.xls">下载Excel模板文件</a>;</br>4.建议每次最多导入100行数据，大于100行数据请分多批导入;<br></div>
    <div class="layui-card-body">
        <form class="layui-form layui-form-pane" id="form1" action="{:Url('helpay/Import')}" method="post" enctype="multipart/form-data">
            <ul id="formli">
                
                <!--li>
                    <div class="layui-form-item">
                        <label class="layui-form-label" style="width: 150px;">申报日期:</label>
                        <div class="layui-input-inline">
                            <input type="text" class="layui-input" name="SendTime" id="time" readonly="true" value="" placeholder="">
                        </div>

                </li-->
                
                <li>
                    <div class="layui-form-item">
                        <label class="layui-form-label" style="width: 150px;">本次标题:</label>
                        <div class="layui-input-inline">
                            <input type="text" class="layui-input" required="required" name="ImportName"  value="" placeholder="">

                <li>
                    <div class="layui-form-item">
                        <label class="layui-form-label" style="width: 150px;">Excel文件*:</label>

            <button class="layui-btn" lay-submit lay-filter="formDemo" onclick="alertShade();">立即提交</button>

    </div>
</div>


</body>
<script type="text/javascript">

    layui.use(['layer','form','jquery','laydate'],function(){
        $ = layui.jquery;
        layer = layui.layer;
        var form = layui.form;
        var laydate = layui.laydate;
        laydate.render({
            elem: '#OrderDate', //指定元素
            type:'date',
            format:'yyyyMMdd',
            range:false
        });
    });
    
    function getNowFormatDate() {
        var date = new Date();
        var seperator1 = "-";
        var seperator2 = ":";
        var month = date.getMonth() + 1;
        var strDate = date.getDate();
        if (month >= 1 && month <= 9) {
            month = "0" + month;
        }
        if (strDate >= 0 && strDate <= 9) {
            strDate = "0" + strDate;
        }
        var currentdate = date.getFullYear() + seperator1 + month + seperator1 + strDate
            + " " + date.getHours() + seperator2 + date.getMinutes()
            + seperator2 + date.getSeconds();
        return currentdate;
    }
    
    function alertShade(){
        layer.load(1, {shade: 0.3});
    }
</script>
