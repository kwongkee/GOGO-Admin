<!DOCTYPE html>
<html>
<head>
	<title></title>
	<link rel="stylesheet" type="text/css" href="__STATIC__/plugins/layui/css/layui.css"/>
	<script type="text/javascript" src="__STATIC__/plugins/layui/layui.js"></script>
	<style>
		.header span{background: #009688;margin-left: 30px;padding: 10px;color: #fff;}
		.header div{border-bottom:solid 2px #009688;margin-top: 8px;}
		.header button{float: right;margin-top: -5px;}
		#formli {width: 100%;float: left;}
		#formli li{float: left;}
		
		#formli2 {width: 100%;float: left;}
		#formli2 li{float: left;margin-right: 10px;}
	</style>
</head>
<body style="padding: 10px;">
	
	<div class="header">
		<span>跨境实名认证</span>
		<!--<button class="layui-btn layui-btn-xs" style="float: right;" onclick="add();">添加</button>-->
		<div></div>
	</div>
	
	<div style="margin: 15px 0px;"></div>
	
	<form class="layui-form layui-form-pane" id="form1">
	  	
	  	<div class="layui-form-item">
	  		<label class="layui-form-label">姓 名:</label>
	  		<div class="layui-input-block">
	  			<input type="text" class="layui-input" name="domain[userName]" value="" maxlength="30" placeholder="请输入所属身份证姓名"/>
	  		</div>
	  		<div class="layui-form-mid layui-word-aux">请输入所属身份证姓名</div>
	  	</div>
	  	
	  	<div class="layui-form-item">
	  		<label class="layui-form-label">身份证:</label>
	  		<div class="layui-input-block">
	  			<input type="text" class="layui-input" name="domain[userId]" id="userId" value="" maxlength="18" placeholder="请输入所属身份证号码"/>
	  		</div>
	  		<div class="layui-form-mid layui-word-aux">请输入所属身份证号码</div>
	  	</div>
	</form>
	
	<div class="layui-form-item">
		<div class="layui-input-block">
			<button class="layui-btn layui-btn-lx" id="submitBtn" onclick="save()">保 存</button>
			<input type="reset" class="layui-btn layui-btn-danger layui-btn-lx" value="重 置" />
		</div>
	</div>
	
	<script type="text/javascript">
		layui.use(['layer','form','jquery'],function(){
			form = layui.form;
			layer = layui.layer;
			$ = layui.jquery;
			
			$('#userId').keyup(function() {
				if($(this).val().length == 18) {
					if(!checkCertNo($(this).val())) {
						layer.alert('您的身份证号码输入有误，请检查！',{icon:2});
						console.dir($(this).val())
					} else {
						return true;
					}
				}
			});
		});
			
		// 保存实名认证
		function save() {
			var partnerId = $.trim($('input[name="domain[userName]"]').val());//姓名
			var pkey = $.trim($('input[name="domain[userId]"]').val());//身份证号码
			if(partnerId == '') {
				layer.alert('请输入姓名',{icon:2});
				return false;
			}
			
			if(pkey == '') {
				layer.alert('请输入身份证号码',{icon:2});
				return false;
			}

			$.post("{:Url('Helpay/RealName')}",$('#form1').serialize(),function(res) {
				
				$("#submitBtn").attr('disabled',true);//禁用按钮
				
				var Result = $.parseJSON(res);
				if(Result.code >= 1)
				{
					$('#submitBtn').removeAttr('disabled');
					layer.alert(Result.msg,{'icon':1});
					
				} else if(Result.code == 0){
					
					$('#submitBtn').removeAttr('disabled');
					layer.alert(Result.msg,{'icon':2});
				}
			});
		}
		
		//身份证判断正则；
		function checkCertNo(obj)
		{
	        var aCity = {11: "北京", 12: "天津", 13: "河北", 14: "山西", 15: "内蒙古", 21: "辽宁", 22: "吉林", 23: "黑龙 江", 31: "上海", 32: "江苏", 33: "浙江", 34: "安徽", 35: "福建", 36: "江西", 37: "山东", 41: "河南", 42: "湖 北", 43: "湖南", 44: "广东", 45: "广西", 46: "海南", 50: "重庆", 51: "四川", 52: "贵州", 53: "云南", 54: "西 藏", 61: "陕西", 62: "甘肃", 63: "青海", 64: "宁夏", 65: "新疆", 71: "台湾", 81: "香港", 82: "澳门", 91: "国 外"};
	        var iSum = 0;
	        //var info = "";
	        var strIDno = obj;
	        var idCardLength = strIDno.length;
	        if(!/(^\d{15}$)|(^\d{18}$)|(^\d{17}(\d|X|x)$)/.test(strIDno))
	            return false; //非法身份证号
	
	        if (aCity[parseInt(strIDno.substr(0, 2))] == null)
	            return false;// 非法地区
	
	        // 15位身份证转换为18位
	        if (idCardLength == 15)
	        {
	            sBirthday = "19" + strIDno.substr(6, 2) + "-" + Number(strIDno.substr(8, 2)) + "-" + Number(strIDno.substr(10, 2));
	            var d = new Date(sBirthday.replace(/-/g, "/"))
	            var dd = d.getFullYear().toString() + "-" + (d.getMonth() + 1) + "-" + d.getDate();
	            if (sBirthday != dd)
	                return false; //非法生日
	            strIDno = strIDno.substring(0, 6) + "19" + strIDno.substring(6, 15);
	            strIDno = strIDno + GetVerifyBit(strIDno);
	        }
	
	        // 判断是否大于2078年，小于1900年  1990
	        var year = strIDno.substring(6, 10);
	        if (year < 1900 || year > 2078)
	            return false;//非法生日
	
	        //18位身份证处理
	
	        //在后面的运算中x相当于数字10,所以转换成a
	        strIDno = strIDno.replace(/x$/i, "a");
	
	        sBirthday = strIDno.substr(6, 4) + "-" + Number(strIDno.substr(10, 2)) + "-" + Number(strIDno.substr(12, 2));
	        var d = new Date(sBirthday.replace(/-/g, "/"))
	        if (sBirthday != (d.getFullYear() + "-" + (d.getMonth() + 1) + "-" + d.getDate()))
	            return false; //非法生日
	        // 身份证编码规范验证
	        for (var i = 17; i >= 0; i --)
	            iSum += (Math.pow(2, i) % 11) * parseInt(strIDno.charAt(17 - i), 11);
	        if (iSum % 11 != 1)
	            return false;// 非法身份证号
	
	        // 判断是否屏蔽身份证
	        var words = new Array();
	        words = new Array("11111119111111111", "12121219121212121");
	
	        for (var k = 0; k < words.length; k++) {
	            if (strIDno.indexOf(words[k]) != -1) {
	                return false;;
	            }
	        }
	        return true;
    	}

	</script>
</body>
</html>
