<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>企业应付订单与结算</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  	<link rel="stylesheet" type="text/css" href="__STATIC__/plugins/layui/css/layui.css"/>
	<script type="text/javascript" src="__STATIC__/plugins/layui/layui.js"></script>
	<style type="text/css">
		p{width: 100%;margin: 5px auto;font-size: 16px;color: green;font-weight: bold;text-align: center;padding-left: 45px;}
		.show{display: none;};
	</style>
</head>
<body>

<div style="margin-top: 10px;"></div>
<p>有误订单需修改或核实</p>
<table class="layui-table">
  <thead>
    <tr>
        <th>编号</th>
        <th>商户名称</th>
        <th>电子邮箱</th>
        <th>对账开始日期</th>
        <th>对账结束日期</th>
        <th>提交日期</th>
        <th>操作</th>
    </tr>
  </thead>
  
  <tbody>
	    {volist name='data.lists' id='vo' key='index'}
	    <tr>
	    		<td>{$index}</td>
					<td>{$vo.user_name}</td>
					<td>{$vo.user_email}</td>
					<td>{$vo.startDate}</td>
					<td>{$vo.endDate}</td>
					<td>{$vo.c_time}</td>
	        <td><a href="javascript:;" class="layui-btn layui-btn-sm layui-btn-radius" onclick="getInfo('{$vo.id}')">前往修改</a></td>
	    </tr>
	    {/volist}
  </tbody>
</table>

<div class="layui-box layui-laypage layui-laypage-default">
	{$data.pages}
</div>

<script type="text/javascript">
		layui.use(['layer','jquery'],function(){
			layer = layui.layer;
			$ = layui.jquery;
		});
		
		//商品详细
		function getInfo(id)
		{
			layer.open({
			  type: 2,
			  title:'订单详细',
			  shadeClose: true,
			  shade: 0.3,
			  area: ['490px', '489px'],
			  content: "{:Url('Reconcil/Checkdetail/')}&id="+id //iframe的url
			}); 
		}
		
		//确认对账  商品列表
		function Confirm()
		{
			/**
			 * 打开确认页面，默认显示用户邮箱，没有的话需要商户输入；
			 */
				layer.open({
					type:2,
					title:'确认对账下载',
					shade:0.3,
					content:"{:Url('Reconcil/CheckBtn')}"
				});
		}
		

		//有误对账  商品列表
		function Mistaken(val)
		{
			$.post("{:Url('Reconcil/Mistaken')}",{'token':val},function(res){
				console.dir(res);
				if(res.code > 0){
					layer.alert(res.msg,{icon:5});
				} else {
					layer.msg(res.msg,{icon:6});
					setTimeout(function(){
						window.location.reload();
					},1000);
				}
			});
		}
		
	</script>
</body>
</html>
