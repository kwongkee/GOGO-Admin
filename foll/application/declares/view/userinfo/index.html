<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{$order.title}</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <link rel="stylesheet" type="text/css" href="__STATIC__/plugins/layui/css/layui.css"/>
	<script type="text/javascript" src="__STATIC__/plugins/layui/layui.js"></script>
	<style type="text/css">
		.clear{clear: both;height: 8px;}
		.money{color: red;font-weight: bold;font-size: 15px;}
		.laytable-cell-1-0{ width: 80px; }
		.laytable-cell-1-2{width: 185px;}
		.laytable-cell-1-amount{width: 165px;}
		.laytable-cell-1-4{ width: auto; }
		
		.laytable-cell-1-province{ width: 115px; }
		.laytable-cell-1-city{ width: 80px; }
		.laytable-cell-1-zone{ width: 80px; }
		.fee{color: red;}
	</style>
</head>

<body>
<div style="margin-top: 10px;"></div>
<p><h2 style="text-align: center;color: green;">{$order.title}</h2></p>

<div class="layui-form layui-border-box layui-table-view" lay-filter="LAY-table-1" style="width:auto;float: left;margin-right: 15px;">
	<div class="layui-table-box">
		
		<div class="layui-table-header">
			<table cellspacing="0" cellpadding="0" border="0" class="layui-table">
				<thead>
					<tr><th data-field="8" colspan="3"><div class="layui-table-cell laytable-cell-group" align="center"><span style="font-size: 14px;font-weight: bold;">{$order.title}</span></div></th></tr>
					<tr>
						<th data-field="province"><div class="layui-table-cell laytable-cell-1-2"><span>用户ID</span></div></th>
						<th data-field="city"><div class="layui-table-cell laytable-cell-1-2"><span>来源于</span></div></th>
						<th data-field="zone"><div class="layui-table-cell laytable-cell-1-2"><span>注册信息</span></div></th>
						<th data-field="zone"><div class="layui-table-cell laytable-cell-1-2"><span>实名信息</span></div></th>
						<th data-field="zone"><div class="layui-table-cell laytable-cell-1-2"><span>交易信息</span></div></th>
						<th data-field="zone"><div class="layui-table-cell laytable-cell-1-2"><span>备注信息</span></div></th>
					</tr>
				</thead>
			</table>
		</div>
		
		<div class="layui-table-body layui-table-main">
			<table cellspacing="0" cellpadding="0" border="0" class="layui-table">
				<tbody>
					{volist name="$order.lists" id='vo' key='index'}
					<tr data-index="{$index}">
						{if isset($vo.openid)}
							<td data-field="province"><div class="layui-table-cell laytable-cell-1-2">{$vo.openid}</div></td>
						{else/}
							<td data-field="province"><div class="layui-table-cell laytable-cell-1-2">{$vo.mobile}</div></td>						
						{/if}
						
						{if $vo.application == 'Cross-border'}
							<td data-field="city"><div class="layui-table-cell laytable-cell-1-2">跨境电商平台</div></td>
						{else/}
							<td data-field="city"><div class="layui-table-cell laytable-cell-1-2">其他平台</div></td>
						{/if}
						
						<td data-field="city"><div class="layui-table-cell laytable-cell-1-2">其他平台</div></td>
						
						<td data-field="city"><div class="layui-table-cell laytable-cell-1-2">其他平台</div></td>
						
						<td data-field="city"><div class="layui-table-cell laytable-cell-1-2">其他平台</div></td>
						
						<td data-field="zone">
							<div class="layui-table-cell laytable-cell-1-2">
								<form class="layui-form">
									<a class="layui-btn-sm layui-btn layui-btn-danger" href="javascript:void(0);" hrs="{$vo.aid}" id="checkOk">对账</a>
								</form>
							</div>
						</td>
					</tr>
					{/volist}
				</tbody>
			</table>
		</div>
		<span style="margin:0px 8px;font-size: 15px;font-weight: bold;">共有:{$order.total} 条</span>
		<div class="layui-box layui-laypage layui-laypage-default">{$order.pages}</div>
	</div>
</div>

<script>
layui.use(['layer','form','jquery','laypage','table','flow'],function() {
		var $ = layui.jquery,form=layui.form,layer=layui.layer,laypage=layui.laypage,table=layui.table,element=layui.element,flow=layui.flow;
		
		//下一页
		$(document).on('click','#next',function(vals) {
				
		});
		
});
</script>
</body>
</html>
