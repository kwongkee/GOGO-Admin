<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>实名认证</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  	<link rel="stylesheet" type="text/css" href="__STATIC__/plugins/layui/css/layui.css"/>
	<script type="text/javascript" src="__STATIC__/plugins/layui/layui.js"></script>
</head>
<body>

<div style="margin-top: 10px;"></div>

<form class="layui-form">
		<div class="layui-form-item">
			<label class="layui-form-label">开始时间</label>
			<div class="layui-input-inline">
				<input type="text" class="layui-input" maxlength="11" name="user_mobile" value="">
			</div>
		</div>
</form>

<span class="x-right" style="line-height:40px">共有数据：{$order.total} 条</span>
<table class="layui-table">
  <colgroup>
    <col width="50">
    <col width="200">
    <col>
  </colgroup>
  <thead>
    <tr>
        <th>订单编号</th>
        <th>公司名称</th>
        <th>支付单号</th>
        <th>返回日期</th>
        <th>报关状态</th>
        <th>详情</th>
    </tr> 
  </thead>
  
  <tbody>
    {volist name='order.lists' id='vo'}
    <tr>
        <td>{$vo.orderId}</td>
		<td>{$vo.eCompanyName}</td>
		<td>{$vo.payTransactionNo}</td>
		<td>{$vo.completeTime}</td>
		
		
		<td>
			{if condition="$vo.chkMark eq 2"}
               <span class="layui-btn layui-btn-ls layui-btn-normal layui-btn-mini">
                	报关成功
                </span>
           {else if condition="$vo.chkMark eq 3"}
                <span class="layui-btn layui-btn-danger layui-btn-mini">
                	报关失败
                </span>
           {/if}
		</td>
		
        <td><a href="javascript:;" class="layui-btn layui-btn-sm layui-btn-radius" onclick="getInfo('{$vo.id}')">详情</a></td>
    </tr>
    {/volist}
    
  </tbody>
</table>

<div class="layui-box layui-laypage layui-laypage-default">{$order.pages}</div>

</body>
</html>
