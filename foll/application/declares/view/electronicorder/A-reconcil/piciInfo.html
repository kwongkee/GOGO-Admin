<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>备案批次详细</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  	<link rel="stylesheet" type="text/css" href="__STATIC__/plugins/layui/css/layui.css"/>
	<script type="text/javascript" src="__STATIC__/plugins/layui/layui.js"></script>
</head>
<body style="padding: 10px;">
	
<form class="layui-form">
	
	<div class="layui-form-item">
		<label class="layui-form-label">申报企业编号：</label>
		<div class="layui-input-block">
			<input type="text" class="layui-input" maxlength="11" name="DeclEntNo" value="{$data.DeclEntNo}">
		</div>
	</div>
	
	<div class="layui-form-item">
		<label class="layui-form-label">申报企业名称：</label>
		<div class="layui-input-block">
			<input type="text" class="layui-input" maxlength="11" name="DeclEntName" value="{$data.DeclEntName}">
		</div>
	</div>
	
	<div class="layui-form-item">
		<label class="layui-form-label">电商企业编号：</label>
		<div class="layui-input-block">
			<input type="text" class="layui-input" maxlength="11" name="EBEntNo" value="{$data.EBEntNo}">
		</div>
	</div>
	
	<div class="layui-form-item">
		<label class="layui-form-label">电商企业名称：</label>
		<div class="layui-input-block">
			<input type="text" class="layui-input" maxlength="11" name="EBEntName" value="{$data.EBEntName}">
		</div>
	</div>
	
	<div class="layui-form-item">
		<label class="layui-form-label">主管海关代码：</label>
		<div class="layui-input-block">
			<input type="text" class="layui-input" maxlength="11" name="CustomsCode" value="{$data.CustomsCode}">
		</div>
	</div>
	
	<div class="layui-form-item">
		<label class="layui-form-label">检验检疫机构代码：</label>
		<div class="layui-input-block">
			<input type="text" class="layui-input" maxlength="11" name="CIQOrgCode" value="{$data.CIQOrgCode}">
		</div>
	</div>
	
	<div class="layui-form-item">
		<label class="layui-form-label">电商平台企业编号：</label>
		<div class="layui-input-block">
			<input type="text" class="layui-input" maxlength="11" name="EBPEntNo" value="{$data.EBPEntNo}">
		</div>
	</div>
	
	<div class="layui-form-item">
		<label class="layui-form-label">电商平台名称：</label>
		<div class="layui-input-block">
			<input type="text" class="layui-input" maxlength="11" name="EBPEntName" value="{$data.EBPEntName}">
		</div>
	</div>
	
	<div class="layui-form-item">
		<label class="layui-form-label">币制代码：</label>
		<div class="layui-input-block">
			<input type="text" class="layui-input" maxlength="11" name="CurrCode" value="{$data.CurrCode}">
		</div>
	</div>
	
	<div class="layui-form-item">
		<label class="layui-form-label">进口类型：</label>
		<div class="layui-input-block">
			{if condition="$data.BusinessType eq 1"}
				<input type="text" class="layui-input" maxlength="11" name="BusinessType" value="特殊监管区域BBC保税进口">
			{elseif condition="$data.BusinessType eq 2"}
				<input type="text" class="layui-input" maxlength="11" name="BusinessType" value="保税仓库BBC保税进口">
			{else/}
				<input type="text" class="layui-input" maxlength="11" name="BusinessType" value="BC直购进口">
			{/if}
			
		</div>
	</div>
	
	<div class="layui-form-item">
		<label class="layui-form-label">录入时间：</label>
		<div class="layui-input-block">
			<input type="text" class="layui-input" maxlength="11" name="InputDate" value="{$data.InputDate}">
		</div>
	</div>
	
	<div class="layui-form-item">
		<label class="layui-form-label">进出标志：</label>
		<div class="layui-input-block">
			{if condition="$data.IeFlag eq 'I'"}
				<input type="text" class="layui-input" maxlength="11" name="IeFlag" value="进">
			{else/}
				<input type="text" class="layui-input" maxlength="11" name="IeFlag" value="出">
			{/if}
		</div>
	</div>
	
	<div class="layui-form-item">
		<label class="layui-form-label">备注：</label>
		<div class="layui-input-block">
			<input type="text" class="layui-input" maxlength="11" name="Notes" value="{$data.Notes}">
		</div>
	</div>
	

	<div class="layui-form-item">
		<label class="layui-form-label">申报状态：</label>
		<div class="layui-input-block">
			{if condition="$data.declare_status eq 1"}
				<input type="text" class="layui-input" maxlength="11" name="declare_status" value="备案失败">
			{else/}
				<input type="text" class="layui-input" maxlength="11" name="declare_status" value="备案成功">
			{/if}
		</div>
	</div>
	
	<div class="layui-form-item">
		<label class="layui-form-label">操作方式：</label>
		<div class="layui-input-block">
			{if condition="$data.OpType eq 'A'"}
				<input type="text" class="layui-input" maxlength="11" name="OpType" value="新增操作">
			{elseif condition="$data.OpType eq 'M'"}
				<input type="text" class="layui-input" maxlength="11" name="OpType" value="修改操作">
			{else/}
				<input type="text" class="layui-input" maxlength="11" name="OpType" value="取消操作">
			{/if}
		</div>
	</div>
	
</form>
</body>
</html>
