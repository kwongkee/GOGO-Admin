<!DOCTYPE html>
<html>
<head>
	<title></title>
	<link rel="stylesheet" type="text/css" href="__STATIC__/plugins/layui/css/layui.css"/>
	<script type="text/javascript" src="__STATIC__/plugins/layui/layui.js"></script>
</head>
<body style="padding: 10px;">
	
	<form class="layui-form">
		
		<h3 style="color: green;">海关申报系统平台收费标准设置</h3>
		
		<input type="hidden" name="datas[uid]" value="{$data.uid}">		
		<!-- 商品备案结算方式  -->
		<fieldset class="layui-elem-field layui-field-title" style="margin-top: 30px;">
		  <legend style="margin-bottom: 10px;font-size: 15px;font-weight: bold;">平台应付(商品备案)</legend>
		  
		  	<div class="layui-form-item">
				<label class="layui-form-label">结算方式：</label>
				<div class="layui-input-block">
					<input type="radio" name="datas[setMothod]" lay-filter="RecordMoney" value="good" checked title="元 / 商品" {if condition="$data.setMothod eq 'good'"} checked {/if}>
					<input type="radio" name="datas[setMothod]" lay-filter="RecordMoney" value="pici" title="元 / 批次" {if condition="$data.setMothod eq 'pici'"} checked {/if}>
				</div>
			</div>
		
		  	<div class="layui-form-item">
		  		<div class="layui-form-mid layui-word-aux" style="margin-left: 25px;">平台应付</div>
				<label class="layui-form-label">备案<span id="pici">商品</span>数:</label>
				<div class="layui-input-inline" style="width: 60px;">
					<input type="text" class="layui-input" name="datas[banMoney]" min="1" max="999" maxlength="3" value="{$data.banMoney}">
				</div>
				<div class="layui-form-mid" id="good" style="color: red;">元 / 商品</div>
			</div>
			
		</fieldset>
		
		<!-- 商品备案结算方式  END -->
		<fieldset class="layui-elem-field layui-field-title" style="margin-top: 30px;">
		  	<legend style="margin-bottom: 10px;font-size: 15px;font-weight: bold;">平台应付(服务费用)</legend>
		  	
		  	<div class="layui-form-item">
				<label class="layui-form-label">收付结算：</label>
				<div class="layui-input-block">
					<input type="radio" name="datas[pserMothod]" lay-filter="PlaSerMoney" value="Percentage" checked title="% / 结算" {if condition="$data.pserMothod eq 'Percentage'"} checked {/if}>
					<input type="radio" name="datas[pserMothod]" lay-filter="PlaSerMoney" value="Element" title="元  / 结算" {if condition="$data.pserMothod eq 'Element'"} checked {/if}>
				</div>
			</div>
			
			<div class="layui-form-item">
				<div class="layui-form-mid layui-word-aux" style="margin-left: 25px;">平台应付</div>
				<label class="layui-form-label">订单<span id="pServerText">金额</span>的:</label>
				<div class="layui-input-inline" style="width:60px;">
					<input type="text" class="layui-input" name="datas[pserMoney]" min="1" max="999" maxlength="3" value="{$data.pserMoney}">
				</div>
				<div class="layui-form-mid" id="pServer" style="color: red;">% / 结算</div>
			</div>
		</fieldset>
		<!-- 服务费用 -->
		
		<!-- 验核费用 -->
		<fieldset class="layui-elem-field layui-field-title" style="margin-top: 30px;">
		  	<legend style="margin-bottom: 10px;font-size: 15px;font-weight: bold;">验核费用(身份认证)</legend>
			<div class="layui-form-item">
				<div class="layui-form-mid layui-word-aux" style="margin-left: 25px;">平台应付</div>
				<label class="layui-form-label">订单金额的: </label>
				<div class="layui-input-inline" style="width: 60px;">
					<input type="text" class="layui-input" name="datas[authPtaiMoney]" min="1" max="100" maxlength="3" value="{$data.authPtaiMoney}">
				</div>
				<span class="layui-form-mid" style="color: red;">% 结算</span>
			</div>
		</fieldset>
		<!-- 验核费用 -->
		
		<!-- 交易费用 -->
		<fieldset class="layui-elem-field layui-field-title" style="margin-top: 30px;">
		  	<legend style="margin-bottom: 10px;font-size: 15px;font-weight: bold;">交易费用(支付单)</legend>
			
			<div class="layui-form-item">
				<div class="layui-form-mid layui-word-aux" style="margin-left: 25px;">平台应收</div>
				<label class="layui-form-label">订单金额的: </label>
				<div class="layui-input-inline" style="width: 60px;">
					<input type="text" class="layui-input" name="datas[payPtaiMoney]" min="1" max="100" maxlength="3" value="{$data.payPtaiMoney}">
				</div>
				<span class="layui-form-mid" style="color: red;">% 结算</span>
			</div>
		</fieldset>
		<!-- 交易费用 -->
		
	</form>
	
	<div class="layui-form-item">
		<div class="layui-input-block">
			<button class="layui-btn layui-btn-lx" onclick="save()">保存</button>
		</div>
	</div>

	<script type="text/javascript">
		layui.use(['layer','form','jquery'],function(){
			form = layui.form;
			layer = layui.layer;
			$ = layui.jquery;
			//结算方式(商品备案)
			form.on('radio(RecordMoney)',function(data){
				if(data.value == 'good'){
					$('#pici').text('商品');
					$('#good').text('元 / 商品');
					$(this).attr('checked',true);
					$(this).siblings().attr('checked',false);
				} else {
					$('#pici').text('批次');
					$('#good').text('元 / 批次');
					$(this).attr('checked',true);
					$(this).siblings().attr('checked',false);
				}
			});//end
			
			//企业应付(服务费用) 
			form.on('radio(ServerMoney)',function(data){
				if(data.value == 'Percentage'){
					$('#ServerText').text('金额');
					$('#Server').text('% / 结算');
					$(this).attr('checked',true);
					$(this).siblings().attr('checked',false);
				} else {
					$('#ServerText').text('数量');
					$('#Server').text('元 / 结算');
					$(this).attr('checked',true);
					$(this).siblings().attr('checked',false);
				}
			});//end
			
			//平台应付(服务费用)
			form.on('radio(PlaSerMoney)',function(data){
				if(data.value == 'Percentage'){
					$('#pServerText').text('金额');
					$('#pServer').text('% / 结算');
					$(this).attr('checked',true);
					$(this).siblings().attr('checked',false);
				} else {
					$('#pServerText').text('数量');
					$('#pServer').text('元 / 结算');
					$(this).attr('checked',true);
					$(this).siblings().attr('checked',false);
				}
			});//end
			
			form.render();
			
		});

		// 保存管理员
		function save() {
			
			$.post("{:Url('admins/Chargesave')}",$('form').serialize(),function(res){
				console.dir(res);
				if(res.code > 0){
					layer.alert(res.msg,{icon:5});
				} else {
					layer.msg(res.msg,{icon:6});
					setTimeout(function(){
						parent.window.location.reload();
					},1000);
				}
			});
		}
		
		function emails(val){
			var em = /^[a-z0-9]+([._\\-]*[a-z0-9])*@([a-z0-9]+[-a-z0-9]*[a-z0-9]+.){1,63}[a-z0-9]+$/;
			return em.test(val);
		}
		
		function phone(val){
			var ph = /^1(3|4|5|7|8)\d{9}$/;
			return ph.test(val);
		}
	</script>
</body>
</html>
