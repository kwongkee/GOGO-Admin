	<script type="text/javascript">
		layui.use(['layer','form','jquery'],function(){
			form = layui.form;
			layer = layui.layer;
			$ = layui.jquery;
		});

		// 保存管理员
		function save() {
//			var id = parseInt($('input[name="id"]').val());
			var cbeCode = $.trim($('input[name="domain[cbeCode]"]').val());//检验检疫电商企业代码
			var ciqcurrency = $.trim($('input[name="domain[ciqcurrency]"]').val());//检验检疫支付币种
			var customsCode = $.trim($('input[name="domain[customsCode]"]').val());//海关关区代码
			var ciqOrgCode = $.trim($('input[name="domain[ciqOrgCode]"]').val());//检验检疫机构代码
			var functionCode = $.trim($('input[name="domain[functionCode]"]').val());//申报类型

			if(cbeCode == ''){
				layer.alert('请输入检验检疫电商企业代码',{icon:2});
				return false;
			}
			
			if(ciqcurrency == ''){
				layer.alert('请输入检验检疫支付币种',{icon:2});
				return false;
			}
			
			if(customsCode == ''){
				layer.alert('请输入海关关区代码',{icon:2});
				return false;
			}
			
			if(ciqOrgCode == ''){
				layer.alert('请输入检验检疫机构代码',{icon:2});
				return false;
			}
			
			if(functionCode == ''){
				layer.alert('请输入申报类型',{icon:2});
				return false;
			}

			$.post("{:Url('Record/inspectionSave')}",$('#form1').serialize(),function(res){
				console.dir(res);
				
				if(res.code > 0){
					layer.alert(res.msg,{icon:2});
				} else {
					layer.alert(res.msg,{icon:1});
					setTimeout(function(){
						window.location.reload();
					},1000);
				}
			});
		}

	</script>
