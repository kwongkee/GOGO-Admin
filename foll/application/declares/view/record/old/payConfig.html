	<div class="header">

	<div style="margin: 15px 0px;"></div>
	
	<form class="layui-form layui-form-pane" id="form1">
	  	
	  	<div class="layui-form-item">
	  		<label class="layui-form-label">会员号:</label>
	  		<div class="layui-input-block">
	  			<input type="text" class="layui-input" name="domain[partnerId]" value="<?php if(isset($info['partnerId'])){echo $info['partnerId'];}?>" placeholder="请输入会员号"/>
	  		</div>
	  		<div class="layui-form-mid layui-word-aux">会员号</div>
	  	</div>
	  	
	  	<div class="layui-form-item">
	  		<label class="layui-form-label">网关收款密钥:</label>
	  		<div class="layui-input-block">
	  			<input type="text" class="layui-input" name="domain[pkey]" value="<?php if(isset($info['pkey'])){echo $info['pkey'];}?>" placeholder="请输入网关收款密钥"/>
	  		</div>
	  		<div class="layui-form-mid layui-word-aux">网关收款密钥</div>
	  	</div>
		
		<div class="layui-form-item">
	  		<label class="layui-form-label">支付密钥:</label>
	  		<div class="layui-input-block">
	  			<input type="text" class="layui-input" name="domain[key]" value="<?php if(isset($info['key'])){echo $info['key'];}?>" placeholder="请输入支付秘钥"/>

	<div class="layui-form-item">
		<div class="layui-input-block">
			<button class="layui-btn layui-btn-lx" onclick="save()">保 存</button>
			<input type="reset" class="layui-btn layui-btn-danger layui-btn-lx" value="重 置" />
		</div>
	</div>
	
	<script type="text/javascript">
		layui.use(['layer','form','jquery'],function(){
			form = layui.form;
			layer = layui.layer;
			$ = layui.jquery;
		});

		// 保存管理员
		function save() {
//			var id = parseInt($('input[name="id"]').val());
			var partnerId = $.trim($('input[name="domain[partnerId]"]').val());//会员号
			var pkey = $.trim($('input[name="domain[pkey]"]').val());//网关收款密钥
			var keys = $.trim($('input[name="domain[key]"]').val());//支付密钥

			if(partnerId == ''){
				layer.alert('请输入会员号',{icon:2});
				return false;
			}
			
			if(pkey == ''){
				layer.alert('请输入网关收款密钥',{icon:2});
				return false;
			}
			
			if(keys == ''){
				layer.alert('请输入支付密钥',{icon:2});
				return false;
			}

			$.post("{:Url('Record/payConfigSave')}",$('#form1').serialize(),function(res){
				console.dir(res);
				
				if(res.code > 0){
					layer.alert(res.msg,{icon:2});
				} else {
					layer.alert(res.msg,{icon:1});
					setTimeout(function(){
						window.location.reload();
					},1000);
				}
			});
		}

	</script>
