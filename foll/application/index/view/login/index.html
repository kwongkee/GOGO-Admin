
<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>登录界面</title>
    <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
    <link rel="stylesheet" href="https://cdn.bootcss.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <link href="./static/index/admin/css/style.css" type="text/css" rel="stylesheet">
    <style>
        body{color:#fff; font-family:"微软雅黑"; font-size:14px;}
        .wrap1{position:absolute; top:0; right:0; bottom:0; left:0; margin:auto }/*把整个屏幕真正撑开--而且能自己实现居中*/
        .main_content{background:url(/static/index/admin/images/main_bg.png) repeat; margin-left:auto; margin-right:auto; text-align:left; float:none; border-radius:8px;}
        .form-group{position:relative;}
        .login_btn{display:block; background:#3872f6; color:#fff; font-size:15px; width:100%; line-height:50px; border-radius:3px; border:none; }
        .login_input{width:100%; border:1px solid #3872f6; border-radius:3px; line-height:40px; padding:2px 5px 2px 30px; background:none;}
        .icon_font{position:absolute; bottom:15px; left:10px; font-size:18px; color:#3872f6;}
        .font16{font-size:16px;}
        .mg-t20{margin-top:20px;}
        @media (min-width:200px){.pd-xs-20{padding:20px;}}
        @media (min-width:768px){.pd-sm-50{padding:50px;}}
        #grad {
            background: -webkit-linear-gradient(#4990c1, #52a3d2, #6186a3); /* Safari 5.1 - 6.0 */
            background: -o-linear-gradient(#4990c1, #52a3d2, #6186a3); /* Opera 11.1 - 12.0 */
            background: -moz-linear-gradient(#4990c1, #52a3d2, #6186a3); /* Firefox 3.6 - 15 */
            background: linear-gradient(#4990c1, #52a3d2, #6186a3); /* 标准的语法 */
        }
    </style>

</head>

<body style="background:url(./static/index/admin/images/bg.jpg) no-repeat;">

<div class="container wrap1" style="height:450px;">
    <h2 class="mg-b20 text-center">Gogo商户运营管理</h2>
    <div class="col-sm-8 col-md-5 center-auto pd-sm-50 pd-xs-20 main_content">
        <p class="text-center font16">用户登录</p>
        <form action="{:Url('index/verifLogin')}" method="post">
            <div class="form-group mg-t20">
                <i class="icon-user icon_font"></i>
                <input type="tel" class="form-control" name="login_tel" id="tel"  placeholder="请输入手机号"  style="height: 46px;"/>
            </div>
            <div class="form-group mg-t20" style="width: 273px;position: absolute;float:  left;margin-top: -9px;">
                <i class="icon-lock icon_font"></i>
                <input type="text" style="background-color:#fff;color: black;" class="login_input" id="loginform-password" name="login_code" placeholder="请输入验证码" />

            </div>
            <div class="checkbox mg-b25" style="position: relative;float:  right;margin-right:  2px;margin-top: -7px;border: 1px solid bule;width:  95px;height: 42px;background-color: #3872f6;line-height: 40px;color: white;">
               <span style="submit ;padding-left: 8px;color: white" id="tips" >获取验证码</span>
            </div>
            <!--<div class="checkbox mg-b25">-->
                <!--<label>-->
                    <!--<input type="checkbox" />记住我的登录信息-->
                <!--</label>-->
            <!--</div>-->
            <button style="submit" class="login_btn">登 录</button>
        </form>
    </div><!--row end-->
</div><!--container end-->

</body>
<script src="./static/index/admin/js/jquery.min.js"></script>
<script src="./static/index/default/js/jquery-form.js" type="text/javascript"></script>
<script>
    var countdown=60;
    $("#tips").click(function () {
        if(countdown==60){
            var tel=$("#tel").val();
            $.get("{:Url('index/sendCode')}&tel="+tel,function (data) {
                // var datas=JSON.parse(data);
                if(data.code==10001){alert("手机号不能空");}
                console.log(data);
            });
            if(tel !=''){
                time();
            }
        }

        return false;
    });
    function time(o) {
        if (countdown == 0) {
            $("#tips").text("获取验证码");
            countdown = 60;
        } else {
            $("#tips").text("重新发送(" + countdown + ")");
            countdown--;
            setTimeout(function() {
                    time(o)
                },
                1000)
        }
    }
</script>
</html>
