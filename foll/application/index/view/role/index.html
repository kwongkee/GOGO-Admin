{include file="common/header"}
<body style="min-width:790px;">
<style>
    .alert{
        position: fixed !important;z-index: 1000;width: 98%;top: 2%;
    }
</style>

<div class="container-fluid">
    <div id="alert"></div>
    <ul class="nav nav-tabs">

        <li class="active"><a href="{:Url('index/role_manage')}">角色管理</a></li>
        <li><a href="{:Url('index/role_add')}">增加角色</a></li>

    </ul>
    <table class="table table-hover table-bordered">
        <thead>
        <tr>
            <th width="30">ID</th>
            <th align="left">角色名称</th>
            <th align="left">角色描述</th>
            <th>权限</th>
            <th width="50" align="left">状态</th>
            <th width="160">操作</th>
        </tr>
        </thead>
        <tbody>
        {volist name="listRole" id="vo"}
        <tr>
            <td>{$vo.id}</td>
            <td>{$vo.name}</td>
            <td>{$vo.remark}</td>
            <td>读：{$authType['read'][$vo.read]}/写：{$authType['write'][$vo.write]}</td>
            <td>
                {if $vo.status==1}
                <font color="red">√</font>
                {else}
                <font color="red">x</font>
                {/if}
            </td>
            <td>
                <a class="a-post" post-msg="你确定要删除吗" href="{:Url('index/role_delete')}&id={$vo.id}">删除</a>
            </td>
        </tr>
        {/volist}
        </tbody>
    </table>
    <script src="./static/index/admin/js/cmsinfo.js"></script>
</div>

{include file="common/footer"}
