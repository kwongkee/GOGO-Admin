<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>添加</title>
    <link href="./static/index/admin/css/bootstrap.min.css" rel="stylesheet">
    <link href="./static/index/admin/css/site.css" rel="stylesheet">
    <script src="./static/index/admin/js/jquery.min.js"></script>
    <script src="./static/index/admin/js/bootstrap.min.js"></script>
</head>
<body style="min-width:790px;">
<style>
    .alert{
        position: fixed !important;z-index: 1000;width: 98%;top: 2%;
    }
</style>
<div class="container-fluid">
    <div id="alert"></div>
    <ul class="nav nav-tabs">
        <li><a href="{:Url('index/role_manage')}">角色管理</a></li>
        <li class="active"><a href="{:Url('index/role_add')}">增加角色</a></li>
    </ul>
    <div class="site-signup">
        <div class="row">
            <form class="form-horizontal" action="{:Url('index/role_add')}" method="post">


                <div class="form-group ">
                    <label class="col-lg-2 control-label" >角色名称</label>
                    <div class="col-lg-3">
                        <input type="text" class="form-control" value="" name="name">
                    </div>
                </div>
                <div class="form-group">
                    <label class="col-lg-2 control-label">角色描述</label>
                    <div class="col-lg-3">
                        <textarea name="remark" class="form-control" rows="3" value=""></textarea>
                    </div>
                </div>

                <div class="form-group">
                    <label class="col-lg-2 control-label">状态 </label>
                    <div class="col-lg-3">
                        <label class="radio-inline">
                            <input type="radio" checked="" name="status" value="1"> 开启
                        </label>
                        <label class="radio-inline">
                            <input type="radio" name="status" value="0"> 禁用
                        </label>
                    </div>
                </div>
                <div class="form-group">
                    <label class="col-lg-2 control-label">权限 </label>
                    <div class="col-lg-3">
                        <label class="radio-inline">
                            <input type="radio" checked="" name="authType" value="1"> 可读
                        </label>
                        <label class="radio-inline">
                            <input type="radio" name="authType" value="2"> 可写
                        </label>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-primary ajax-post " autocomplete="off">
                        保存
                    </button>
                    <a class="btn btn-default active" onclick="history.go(-1)">返回</a>
                </div>
            </form>
        </div>
    </div>
    <script src="./static/index/admin/js/cmsinfo.js"></script>
</div>
{include file="common/footer"}
