{include file="common/header"}

          
<blockquote class="layui-elem-quote layui-text">
	系统试运营设置
</blockquote>

<form class="layui-form">
  	
  	<div class="layui-form-item">
	    <div class="layui-inline">
	      <label class="layui-form-label">阶段名称：</label>
	      <div class="layui-input-inline">
	        <input type="text" name="title" id="title" value="" lay-verify="title" autocomplete="off" placeholder="请输入阶段名称" class="layui-input">
	      </div>
	      <div class="layui-form-mid layui-word-aux">请输入阶段名称</div>
	    </div>
  	</div>
  
  	<div class="layui-form-item">
	    <div class="layui-inline">
	      <label class="layui-form-label">阶段折扣：</label>
	      <div class="layui-input-inline">
	        <input type="text" name="discount" id="discount" value="" lay-verify="required" placeholder="请输入折扣0~9的数字" min="1" maxlength="1" max="9" autocomplete="off" class="layui-input">
	      </div>
	      <div class="layui-form-mid layui-word-aux">折(0折为免费)</div>
	    </div>
  	</div>
  
  	<div class="layui-form-item">
  	
	    <div class="layui-inline">
	      	<label class="layui-form-label">阶段时限：</label>
	      	<div class="layui-input-inline" style="width: 200px;">
	        	<input type="text" name="startDate" id="startDate" value="" lay-verify="datetime" placeholder="yyyy-MM-dd HH:mm:ss" autocomplete="off" class="layui-input">
	      	</div>
	
	      	<div class="layui-form-mid">-</div>
	
	  		<div class="layui-input-inline" style="width: 200px;">
	        	<input type="text" name="endDate" id="endDate" value="" lay-verify="datetime" placeholder="yyyy-MM-dd HH:mm:ss" autocomplete="off" class="layui-input">
	      	</div>
	
	      	<div class="layui-form-mid layui-word-aux">默认日期开始00:00:01开始至结束日期的23:59:59结束</div>
	  	</div>
	  	
		</div>
		
		<div class="layui-form-item" id="show" style="display: none;">
	    <div class="layui-inline">
	      <label class="layui-form-label">警告消息：</label>
	      <div class="layui-form-mid" style="color: red;" id="msg">暂无警告！</div>
	    </div>
  	</div>
  
  	<div class="layui-form-item">
	    <div class="layui-input-block">
	      <button class="layui-btn" lay-submit="" lay-filter="demo1">立即设置</button>
	      <button type="reset" class="layui-btn layui-btn-primary">重置信息</button>
	    </div>
  	</div>
  	
</form>

<!-- 注意：如果你直接复制所有代码到本地，上述js路径需要改成你本地的 -->
<script>
layui.use(['form', 'layedit', 'laydate'], function(){
  	var form = layui.form
  	,layer = layui.layer
  	,layedit = layui.layedit
  	,laydate = layui.laydate;
  
  //日期
  	var start = laydate.render({
	    elem: '#startDate'
	    ,theme: 'molv'
	    ,type: 'datetime'
	    ,format:'yyyy-MM-dd HH:mm:ss'
	    ,min: '-0'
	    ,max:'2099-6-16 23:59:59'
	    ,done:function(value,data){
	    	
	    }
  	});
  
  	var end = laydate.render({
    	elem: '#endDate'
    	,theme: 'molv'
    	,type: 'datetime'
    	,format:'yyyy-MM-dd HH:mm:ss'
    	,min: '-0'
    	,max:'2099-6-16 23:59:59'
    	,done:function(value,data,endDate){
    		
    	}
  	});
  
 
  //自定义验证规则
  form.verify({
    title: function(value) {
      if(value.length < 3){
        return '标题至少得3个字符啊';
      }
    }
  });
  
  $('#title').blur(function() {
  			
  			if($(this).val() == ' ') {
  					$('#show').css('display','block');
  					layer.msg('标题不能为空', {icon: 5});
  					$(this).val(' ').focus().val($(this).val());
  					$('#msg').html('标题不能为空');
  					return false;
  			} else {
	  				$.post("{:Url('trialopera/checkTitle')}",{
				        "title":$(this).val()
			    		},function (res) {
			    			var res = JSON.parse(res);
			    			if( res.code == 0 ) {
			    				
			    				$('#show').css('display','block');
			    				$('#msg').html(res.msg);
			    				
			    				$('#title').val(' ').focus().val($(this).val());
			    				
			    				layer.alert(res.msg, {
							    	title: '错误提示！'
							  	})
			    				
			    			} else {
			    				$('#show').css('display','none');
			    			}
			    		}
		    		);
  			}
  })
  
  
  $('#discount').blur(function(){
  	
  			if($(this).val() == ' ') {
  					$('#show').css('display','block');
  					layer.msg('折扣不能为空', {icon: 5});
  					$(this).val(' ').focus().val($(this).val());
  					$('#msg').html('请输入折扣');
  					return false;
  			} else {
  					if(!checkNumber($(this).val())) {
  						$('#show').css('display','block');
  					  $('#msg').html('请输入0~9的折扣数字');
  					  $(this).focus().val('');
  						return false;
  					} else {
  						$('#show').css('display','none');
  					}
  			}
  });
  
  //正则判断是否为数字
  function checkNumber(theObj)
  {
  	var reg = /^[0-9]+.?[0-9]*$/;
  	if(reg.test(theObj))
  	{
  		return true;
  	}
  	return false;  	
  }
  
  //监听提交
  form.on('submit(demo1)', function(data) {
  	
//  layer.alert(JSON.stringify(data.field), {
//    title: '最终的提交信息'
//  })
		
		if($('#title').val() == '') {
				$('#show').css('display','block');
				$('#msg').html('标题不能为空!');
				return false;
		}
		
		if($('#discount').val() == '') {
				$('#show').css('display','block');
				$('#msg').html('折扣率不能为空!');
				return false;
		}
		
		if($('#startDate').val() == '') {
				$('#show').css('display','block');
				$('#msg').html('开始时间不能为空!');
				return false;
		}
		
		if($('#endDate').val() == '') {
				$('#show').css('display','block');
				$('#msg').html('结束时间不能为空!');
				return false;
		}
		
    $.post("{:Url('trialopera/save')}",{
	      "title":$('#title').val(),
	      "discount":$('#discount').val(),
	      "startDate":$('#startDate').val(),
	      "endDate":$('#endDate').val(),}
    	,function (res) {
					var res = JSON.parse(res);
	        if(res.code == 1 ) {
	        		$('#show').css('display','none');
	        		
	            layer.msg('设置成功', {icon: 6});
	            setTimeout(function () {
	                location.reload();
	            },1500);
	        }
	        
	        if(res.code==0) {
	        	
	        		$('#show').css('display','block');
	        		$('#msg').html(res.msg);
	        		
	            layer.msg(res.msg, {icon: 5});
	        }
    	}
    )
    
    return false;
    
  });
  
});
</script>

{include file="common/footer"}
