{include file="common/header"}
<!--<script src="https://cdn.staticfile.org/html5shiv/r29/html5.min.js"></script>-->
<!--<script src="https://cdn.staticfile.org/respond.js/1.4.2/respond.min.js"></script>-->
<body>

<div style="margin-top: 20px;">
    <textarea id="text" style="display: none;">{$text.text}</textarea>
</div>
<button style="width: 100%;" class="layui-btn layui-btn-fluid" onclick="btnText(this)">添加</button>

</body>
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>
<script>
    var index =null;
    var layedit= null;
    layui.use('layedit', function(){
        layedit = layui.layedit;
        index= layedit.build('text',{
            tool: [
                'strong' //加粗
                ,'italic' //斜体
                ,'underline' //下划线
                ,'del' //删除线

                ,'|' //分割线

                ,'left' //左对齐
                ,'center' //居中对齐
                ,'right' //右对齐
                ,'link' //超链接
                ,'unlink' //清除链接
                ,'face' //表情
            ]
        }); //建立编辑器
    });

    function btnText(obj) {
       var content =  layedit.getContent(index);
       axios.post("{:Url('month_card/add_aplpub')}",{context:content}).then(function (res) {
           console.log(res);
           layui.layer.msg(res.data.msg);
       }).catch(function (err) {
           layui.layui.msg(err);
       })
        return false;
    }
</script>
</html>
