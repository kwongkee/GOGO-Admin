{include file="common/header"}
<script src="https://cdn.staticfile.org/html5shiv/r29/html5.min.js"></script>
<script src="https://cdn.staticfile.org/respond.js/1.4.2/respond.min.js"></script>
<body>
<div class="x-body">
    <div class="layui-card-body" style="display: none;">
        <form class="layui-form layui-form-pane"  lay-filter="component-form-element">
            <div class="layui-row layui-col-space10 layui-form-item">
                <div class="layui-col-lg6">
                    <label class="layui-form-label">月卡名称：</label>
                    <div class="layui-input-block">
                        <input type="text" name="card_name" lay-verify="required" placeholder="" autocomplete="off" class="layui-input">
                    </div>
                </div>
                <div class="layui-col-lg6">
                    <label class="layui-form-label">领取类型：</label>
                    <div class="layui-input-block">
                        <select name="receive_type" lay-verify="required" lay-filter="receive_type">
                            <option value="1">购买</option>
                            <option value="0">免费</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="layui-row layui-col-space10 layui-form-item">
                <div class="layui-col-lg6">
                    <label class="layui-form-label">可用天数：</label>
                    <div class="layui-input-block">
                        <input type="text" name="use_time" lay-verify="required" placeholder="" autocomplete="off" class="layui-input">
                    </div>
                </div>
                <div class="layui-col-lg6">
                    <label class="layui-form-label">月卡状态：</label>
                    <div class="layui-input-block">
                        <input type="checkbox" name="card_status" lay-skin="switch" checked="checked" lay-text="启用|禁用">
                        <div class="layui-unselect layui-form-switch layui-form-onswitch" lay-skin="_switch">
                            <em>是</em>
                            <i></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="layui-col-lg6">
                <label class="layui-form-label">支付费用：</label>
                <div class="layui-input-block">
                    <input type="text" name="card_money" placeholder="" autocomplete="off" class="layui-input">
                </div>
            </div>

            <div class="layui-form-item">
                <label class="layui-form-label">类型：</label>
                <div class="layui-input-block">
                    <input type="radio" name="card_type" value="1" title="全日"><div class="layui-unselect layui-form-radio"></div>
                    <input type="radio" name="card_type" value="2" title="夜间卡"><div class="layui-unselect layui-form-radio"></div>
                    <input type="radio" name="card_type" value="3" title="白间卡" checked=""><div class="layui-unselect layui-form-radio"></div>
                </div>
            </div>
            <div class="layui-form-item">
                <div class="layui-input-block">
                    <button class="layui-btn layui-btn-normal layui-btn-radius" lay-submit="" lay-filter="component-form-element">添加</button>
                </div>
            </div>
        </form>
    </div>
    <a class="layui-btn layui-btn-xs layui-btn-radius xz layui-btn-primary" onclick="xz(this);" style="display: none;color:black;">新增</a>
    <table id="table-checkbox" lay-filter="test"></table>
</div>
<script type="text/html" id="barDemo">
    <a class="layui-btn layui-btn-xs layui-btn-radius layui-btn-normal" lay-event="edit">修改</a>
    <a class="layui-btn layui-btn-xs layui-btn-radius" lay-event="push" >推送</a>
</script>
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>
<script type="text/javascript">
    layui.use(['layer','form','jquery','laypage','table'],function(){
        $ = layui.jquery;
        layer = layui.layer;
        var form = layui.form;
        var table = layui.table;
        var index = layer.load(1);
        setTimeout(function () {
            $('.xz').css('display','block');
            table.render({
                elem: '#table-checkbox'
                ,url: '{:Url("index/get_day_card_data")}'
                ,height: 300
                ,even: true //开启隔行背景
                ,size: 'lg' //小尺寸的表格
                ,cols: [[
                    {field:'card_name', title: '卡名称', width:200}
                    ,{field:'use_time', title: '使用天数', width:200}
                    ,{field:'card_status', title: '卡状态', width:200}
                    ,{field:'card_money',title: '购买金额', width:200}
                    ,{field:'card_type', title: '卡类型', width:200}
                    ,{field:'receive_type', title: '获取路径', width:200}
                    ,{align:'center', fixed: 'right', toolbar: '#barDemo', width:300}
                ]]
                ,page: true
                ,done:function () {
                    layer.close(index);
                }
            });
        },800);
        //监听工具条
        table.on('tool(test)', function(obj){
            var data = obj.data;
            if(obj.event === 'push'){
                push(data);
            }else if(obj.event == 'edit'){
                edit(data);
            }
        });
        form.on('submit(component-form-element)', function(data){
            submit_data(data.field);
            return false; //阻止表单跳转。如果需要表单跳转，去掉这段即可。
            });
        });
    function submit_data(filed) {
        axios.post('{:Url("index/set_month_card_type")}',filed).then(function (repose) {
            console.log(repose.data);
            if(repose.data.code == 0){
                location.reload();
            }else{
                layer.msg(repose.data.message, {icon: 5});
            }
        }).catch(function (error) {
            layer.msg(error, {icon: 5});
        });

    }
    function xz(obj){
        if($(obj).html() == '新增'){
            $('.layui-card-body').css('display','block');
            $(obj).html('关闭');
        }else{
            $('.layui-card-body').css('display','none');
            $(obj).html('新增');
        }
        return false;
    }

    function edit(data){
        layer.open({
            type: 2,
            area:['1091px','430px'],
            content: '{:Url("index/edit_month_card_type")}&id='+data.id,//这里content是一个普通的String
            cancel: function(index, layero){
                layer.close(index);
                setTimeout(function () {
                    location.reload();
                },1000);
                return false;
            }
        });
    }

    function push(data){
        layer.open({
            type: 2,
            area:['1000px','650px'],
            content: '{:Url("index/push__month_card")}&id='+data.id//这里content是一个普通的String
        });
    }
</script>
</body>
</html>
