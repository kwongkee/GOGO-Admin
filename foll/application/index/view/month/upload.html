{include file="common/header"}
<body>
<div style="margin-top:  28px;margin-left:  33px;">资料格式示例下载：<a href="./static/上传中签示例.xls" style="color: red;">点击下载</a></div>
<div class="layui-upload-drag" id="test-upload-drag" style="margin-left:29px;margin-top: 28px;padding:61px;">
    <i class="layui-icon"></i>
    <p>点击上传，或将文件拖拽到此处,文件格式Excel 文件xls后缀类型</p>
</div>
</body>
<script>
    layui.use(['upload','layer'], function(){
        var upload = layui.upload;
        var layer = layui.layer;
        //执行实例
        var uploadInst = upload.render({
            elem: '#test-upload-drag' //绑定元素
            ,url: '{:Url("month_card/upload_winresl")}' //上传接口
            ,accept:'file'
            ,before: function(obj){ //obj参数包含的信息，跟 choose回调完全一致，可参见上文。
                layer.load(); //上传loading
            }
            ,done: function(res){
                console.log(res);
                layer.closeAll('loading'); //关闭loading
                layer.msg(res.msg);
                //上传完毕回调
            }
            ,error: function(){
                layer.msg('服务器开了小差,请稍微再试！');
                //请求异常回调
            }
        });
    });
</script>
</html>
