{include file="common/header"}
<script src="https://cdn.staticfile.org/html5shiv/r29/html5.min.js"></script>
<script src="https://cdn.staticfile.org/respond.js/1.4.2/respond.min.js"></script>
<script src="http://apps.bdimg.com/libs/jquery-qrcode/1.0.0/jquery.qrcode.min.js"></script>
<style>
    .choice_pay{
        width: 80%;
        margin: auto;
    }

    .choice_pay h1{text-align: center;color: #666;font-size: 16px;}
    .choice_pay form{margin-top: 5%;}
    .type{
        float: left;
    }
    .type2{
        float:right
    }
    .is_pay{
        display: inline-block;
        width: 50%;
        height: 40px;
        background: #ccc;
        margin:5% 0 0 22%;
        line-height: 40px;
        text-align: center;
        color: #666;
    }
    .clear{clear: both;}
    #qrcode canvas{margin: auto;}
</style>
<style>
    .pagination { display: inline-block; padding-left: 0; margin: 20px 0; border-radius: 4px; }
    .pagination li { display: inline; }
    .pagination li a,.pagination li span { position: relative; float: left; padding: 6px 12px; margin-left: -1px; line-height: 1.428571429; text-decoration: none; background-color: #fff; border: 1px solid #ddd; }
    .pagination li:first-child a { margin-left: 0; border-bottom-left-radius: 4px; border-top-left-radius: 4px; }
    .pagination li:last-child a { border-top-right-radius: 4px; border-bottom-right-radius: 4px; }
    .pagination li a:hover, .pagination li a:focus { background-color: #eee; }
    .pagination .active span, .pagination .active span:hover, .pagination .active span:focus { z-index: 2; color: #fff; cursor: default; background-color: #428bca; border-color: #428bca; }
    .pagination .disabled span, .pagination .disabled span:hover, .pagination .disabled span:focus { color: #999; cursor: not-allowed; background-color: #fff; border-color: #ddd; }
    .pagination-lg li a { padding: 10px 16px; font-size: 18px; }
    .pagination-sm li a, .pagination-sm li span { padding: 5px 10px; font-size: 12px; }
</style>
<body>
<div class="x-body">

    <table class="layui-table">
        <thead>
        <tr style="text-align:center;">
            <th style="text-align:center;">会员姓名</th>
            <th style="text-align:center;">手机号码</th>
            <th style="text-align:center;">车牌号码</th>
            <th style="text-align:center;">授权状态</th>
            <th style="text-align:center;">授权类型</th>
            <th style="text-align:center;">注册时间</th>
        </tr>
        </thead>

        <tbody>
        <tr class="i_tr" style="text-align:center;">
            <td>{$order.name}</td>
            <td>{$order.mobile}</td>
            <td>{$order.CarNo}</td>
            <td>
                {if condition="$order.auth_status eq 1"}
                    已开通
                {else/}
                    未开通
                {/if}
            </td>
            <td>{$order.type}</td>
            <td>{$order.create_time}</td>
        </tr>
        </tbody>
    </table>


</div>
</body>



</html>
