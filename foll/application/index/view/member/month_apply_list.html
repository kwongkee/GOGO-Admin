    function update(obj, id, openid) {
        layer.open({
            content: '<form class="layui-form" action=""><div class="layui-form-item"><label class="layui-form-label">是否需要抽签</label><div class="layui-input-block"><select id="shifou" name="sf" style="display:block;height:38px;" lay-verify="required"><option value="">请选择</option><option value="1">是</option><option value="2" selected="selected">否</option></select></div></div></form>'
            , btn: ['确认'],
            area: ['300px', '200px']
            ,scrollbar: false
            , yes: function (index, layero) {
                var shifou = $("#shifou").val();
                $.get("{:Url('index/update_review_status')}", {
                    "openid": openid,
                    "id":id,
                    "sf": shifou,
                }, function (res) {
                    if (res.code == 0) {
                        layer.msg('审核成功', {icon: 1});
                        $(obj).parent('td').parent('tr').remove();
                    } else {
                        alert('服务链接失败');
                    }
                })
            }
        });
    }

    $("#imgs img").each(function (index) {
        $(this).bind("click", function () {
            layer.msg("<img height='500' width='800' src='" + $(this).attr('src') + "'>", {
                time: 50000,
                area: 'auto',
                maxWidth: 1000,
                maxHeight: 1000,
                Boolean: true,
                btn: '关闭'
            });
