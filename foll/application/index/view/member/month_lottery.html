{include file="common/header"}
<div class="x-nav">
    <a class="layui-btn layui-btn-small" style="line-height:1.6em;margin-top:3px;float:right" href="javascript:location.replace(location.href);" title="刷新">
        <i class="layui-icon" style="line-height:30px">ဂ</i></a>
</div>
<div class="x-body">

    <input type="text" name="number"  placeholder="请输入中签人数" value="" id="n" autocomplete="off" class="layui-input">
    <!-- <input type="text" name="username"  placeholder="请输入中奖几率%" autocomplete="off" class="layui-input"> -->
    <!--<input type="text" name="money"  placeholder="请输入付款金额" value="" id="m" autocomplete="off" class="layui-input">-->
    <button class="layui-btn"  lay-submit="" onclick="lottery()" lay-filter="sreach">抽签</button>
    </form>
</div>
<table class="layui-table">
    <thead>
    <tr>
        <th>编号</th>
        <th>姓名</th>
        <th>性别</th>
        <th>绑定车牌号</th>
        <th>地址</th>
        <th>状态</th>
    </tr>
    </thead>
    <tbody>
    {volist name='list.data'  id='item'}
    <tr>
        <td>{$item['id']}</td>
        <td>{$item['uname']}</td>
        <td>{$sex[$item['sex']]}</td>
        <td>{$item['license']}</td>
        <td>{$item['addr']}</td>
        <td>待抽签</td>
    </tr>
    {/volist}
    </tbody>
</table>
<div class="layui-box layui-laypage layui-laypage-default">{$page}</div>

</div>

<script>
    layui.use('laydate', function(){
        var laydate = layui.laydate;

        //执行一个laydate实例
        laydate.render({
            elem: '#start' //指定元素
        });

        //执行一个laydate实例
        laydate.render({
            elem: '#end' //指定元素
        });
    });

    function lottery(){
        var number=$("#n").val();
        // var money=$("#m").val();
        layer.load(0);
        $.ajax({
            url:"{:Url('index/lottery')}",
            type:"post",
            data:{"number":number},
            success:function(data){
                layer.closeAll();
                if(data.code==0){
                    layer.alert('完成', {icon: 1});
                }else if(data.code==1){
                    layer.msg(data.message, {icon: 5});
                }
            },
            error:function(){
                alert('服务器错误');
                layer.closeAll();
            }
        });
    }
</script>
</body>
</html>
