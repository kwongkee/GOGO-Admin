{include file="common/header"}
<!-- <script src="https://cdn.staticfile.org/html5shiv/r29/html5.min.js"></script>
<script src="https://cdn.staticfile.org/respond.js/1.4.2/respond.min.js"></script> -->
<body>
<div class="x-nav">
    <a class="layui-btn layui-btn-small" style="line-height:1.6em;margin-top:3px;float:right" href="javascript:location.replace(location.href);" title="刷新">
        <i class="layui-icon" style="line-height:30px">ဂ</i></a>
</div>
<div class="x-body">
    手机号：
    <div class="layui-inline" style="width: 205px;">
        <input class="layui-input" name="tel" id="tel" value="" autocomplete="off" placeholder="请输入手机号">
    </div>

    车牌号：
    <div class="layui-inline" style="width: 205px;">
        <input class="layui-input" name="card" id="card" value="" autocomplete="off" placeholder="请输入车牌号">
    </div>

    姓名：
    <div class="layui-inline" style="width: 205px;">
        <input class="layui-input" name="name" id="name" value="" autocomplete="off" placeholder="请输入姓名">
    </div>
    <button class="layui-btn" data-type="reload" id="search">开始查找</button>
    <button class="layui-btn" data-type="reload" id="exproUser">导出用户</button>

    <div>总会员数：{$count['total']} &nbsp;&nbsp;微信授权：{$count['wxAuth']} &nbsp;&nbsp;农商授权：{$count['fAgro']}  &nbsp;&nbsp;银联授权：{$count['card']}</div>
    <table id="table-checkbox" lay-filter="test"></table>
</div>
<script type="text/html" id="barDemo">
    <a class="layui-btn layui-btn-xs layui-btn-radius" lay-event="detail" style="line-height:31px;">详情</a>
    <a class="layui-btn layui-btn-danger layui-btn-xs layui-btn-radius" lay-event="del" style="line-height:31px;">账户注销</a>
</script>
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>
<script type="text/javascript">
    layui.use(['layer','form','jquery','laypage','table'],function(){
        $ = layui.jquery;
        layer = layui.layer;
        var form = layui.form;
        var table = layui.table;
        var index = layer.load(1);
        setTimeout(function () {
            table.render({
                elem: '#table-checkbox'
                ,url: '{:Url("index/member_list")}'
                ,cols: [[
                    {field:'mobile', title: '手机号',width:300}
                    ,{field:'name', title: '名称',width:200}
                    ,{field:'auth_status', title: '免密授权',width:200}
                    ,{field:'auth_type',title: '授权类型',width:200}
                    ,{field:'CarNo', title: '车牌号1',width:200}
                    ,{field:'create_time',title:'注册时间',width:200}
                    ,{align:'center', fixed: 'right', toolbar: '#barDemo',width:200}
                ]]
                ,page: true
                ,loading:true
                ,done:function () {
                    layer.close(index);
                }
            });
        },1200);
        //监听工具条
        table.on('tool(test)', function(obj){
            var data = obj.data;
            console.dir(data);
            if(obj.event === 'detail'){
                layer.open({
                    type: 2,
                    area:['1085px','307px'],
                    content: '{:Url("index/userDeteil")}&user_id='+data.openid //这里content是一个URL，如果你不想让iframe出现滚动条，你还可以content: ['http://sentsin.com', 'no']
                });
            }else if(obj.event==='del'){
                layer.open({
                    content: '是否确认删除？'
                    ,btn: ['是', '否']
                    ,yes: function(index, layero){
                        $.ajax({
                            url:"{:Url('index/user/del')}&id="+data.id,
                            type:"GET",
                            dataType:"json",
                            success:function (res) {
                                if (res.code==0){
                                    layer.alert(res.message, {icon: 1});
                                     obj.del();
                                } else{
                                    layer.msg(res.message, {icon: 5});
                                }
                            }
                        })
                    }
                    ,btn2: function(index, layero){
                    }
                });
            }
        });

        $('#search').bind('click',function () {
            var name = $('#name').val();
            var card = $('#card').val();
            var tel  = $('#tel').val();
            table.render({
                elem: '#table-checkbox'
                ,url: '{:Url("index/member_list")}'
                ,where:{
                    'name':name,
                    'card':card,
                    'tel':tel
                }
                ,cols: [[
                    {field:'mobile', title: '手机号',width:300}
                    ,{field:'name', title: '名称',width:200}
                    ,{field:'auth_status', title: '免密授权',width:200}
                    ,{field:'auth_type',title: '授权类型',width:200}
                    ,{field:'CarNo', title: '车牌号',width:200}
                    ,{field:'create_time',title:'注册时间',width:200}
                    ,{align:'center', fixed: 'right', toolbar: '#barDemo',width:200}
                ]]
                ,page: true
                ,loading:true
                ,done:function () {
                    layer.close(index);
                }
            });
            return false;
        });
    });
    $('#exproUser').bind('click',function () {
       console.log('导出');
        var loads = layer.load(1);
       window.location.href="{:Url('index/exproUser')}";
        layer.close(loads);
    });
</script>
</body>
</html>
