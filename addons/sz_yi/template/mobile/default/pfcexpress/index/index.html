{template 'common/header'}
<title>pfc内容对比</title>
<link href="../addons/sz_yi/static/css/layui.css" rel="stylesheet">
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-col-md12">
            <table class="layui-table">
                <thead>
                    <th style="background:#1790FF;color:#fff;">标题</th>
                    <th style="background:#1790FF;color:#fff;">操作</th>
                </thead>
                <tbody>
                    {loop $change_ids $val}
                        <tr>
                            <td>{$val['title']}</td>
                            <td><a class="layui-btn layui-btn-xs layui-btn-primary" href="./index.php?i=3&c=entry&do=pfcexpress&p=index&m=sz_yi&op=detail&ids={$val['ids']}">查看</a></td>
                        </tr>
                    {/loop}
                </tbody>
            </table>
        </div>
    </div>
</div>

<script type="text/javascript" src="../addons/sz_yi/static/js/layui/layui.js"></script>

{template 'common/footer'}
