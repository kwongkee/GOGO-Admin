{template 'common/warehouse_header'}
<style>
    body{background:#f8f8f8;}
    .layui-table td, .layui-table th{ text-align: center;}
    .layui-table th{ background-color: #ecf6fc; }
    .required{color: red;font-size: 1.3rem;right: 3px;position: relative;top: 7px;}
    .icon-right{font-size: 20px;line-height: 20px;padding-right: 10px;vertical-align: middle;}
    .layui-layer-adminRight{top : 0px !important;}
    .layui-layer-btn .layui-layer-btn0{border-color: #F7931E!important;background-color: #F7931E!important;}
    .layui-table-cell{padding:0 2px;}
    .laytable-cell-1-0-2{height:auto;min-height:auto;}
    .page_head{width:100%;background:#fff;margin-bottom:5px;box-shadow:0 0 4px #ddd;padding:10px 0 10px;}
    .page_head .center{text-align: center;}
    .page_head .left{width:20%;display:flex;align-items:center;font-size:15px;}
    .page_head .left .back{width:13px;height:13px;border-top:2px solid #000;border-left:2px solid #000;transform:rotate(-50deg);margin-left:15px;margin-right:5px;}

    .box{display:inline-block;width: 49%;text-align: center;margin-bottom:20px;}
    .box .box2{font-size: 15px;width: 80%;margin: 0 auto;box-shadow: 0px 0px 2px #a7a5a5;border-radius: 5px;box-sizing: border-box;padding:15px 20px;}

    .layui-layer-hui .layui-layer-content{color:#fff;}
</style>
<div class="page_head">
    <div class="center">
        <div style="font-size:15px;padding-top:2px;">{$title}</div>
    </div>
</div>

<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-col-md12">
            <div class="layui-card">
                <div class="layui-card-header">
                    <div class="layui-btn layui-btn-normal layui-btn-sm" onclick="openWindow(0,3)">新增分类</div>
                    <div class="layui-btn layui-btn-normal layui-btn-sm" onclick="openWindow(0,5)" style="background:#00B83F;">新闻前台☰</div>
                    <!--<div class="layui-btn layui-btn-normal layui-btn-sm" onclick="openWindow(0,6)" style="background:#00B83F;">数据导出</div>-->
                </div>
                <div class="layui-card-body" style="padding:20px 0 0;">
                    <table class="layui-hide" id="mainTable"></table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    $(function() {
        layui.use(['layer', 'form', 'table', 'upload', 'laydate'], function () {
            var $ = layui.$
                , layer = layui.layer
                , form = layui.form
                , element = layui.element
                , laydate = layui.laydate
                , upload = layui.upload
                , table = layui.table;

            table.render({
                elem: '#mainTable'
                ,url: "./index.php?i=3&c=entry&do=policy&p=manage&m=sz_yi&op=manage_index&pa=1"
                ,cellMinWidth: 200
                ,cols: [[
                    {field:'id', width: 80, title: '编号'}
                    ,{field:'category_name', title: '分类名称'}
                    ,{field:'createtime', title: '创建时间'}
                    ,{align:'center',  title: '操作',fixed:'right',width:170, templet: function(d){
                            return [
                                '<a onclick="openWindow('+"'"+ d.id +"'" +','+"1"+ ');" class="layui-btn layui-btn-normal layui-btn-xs">编辑</a>',
                                '<a  class="layui-btn layui-btn-xs layui-btn-danger" onclick="openWindow('+"'"+ d.id +"'" +','+"4"+');">隐藏</a>',
                                '<a  class="layui-btn layui-btn-xs layui-btn-normal" onclick="openWindow('+"'"+ d.id +"'" +','+"2"+');">新闻列表</a>',
                            ].join('');
                        } }
                ]]
                ,page: false
            });
        });
    });

    function check_auth(authType,url,opera=0){
        var $ = layui.$
            , layer = layui.layer;

        $.ajax({
            url:"./index.php?i=3&c=entry&do=policy&p=manage&m=sz_yi&op=check_auth",
            method:'post',
            data:{'authType':authType},
            dataType:'JSON',
            success:function(res){
                layer.closeAll('loading');

                if(res.code == 0)
                {
                    if(opera==4){
                        layer.load(); //上传loading
                        layer.confirm('确认隐藏？', {
                            btn: ['确认','取消'] //按钮
                        }, function() {
                            $.ajax({
                                url:"./index.php?i=3&c=entry&do=policy&p=manage&m=sz_yi&op=del_category",
                                method:'post',
                                data:{'id':url},
                                dataType:'JSON',
                                success:function(res2){
                                    layer.closeAll('loading');
                                    layer.msg(res2.msg,{time:3000}, function () {
                                        if(res2.code == 0)
                                        {
                                            window.location.reload();
                                        }
                                    });
                                },
                                error:function (data) {
                                    layer.msg('系统错误',{time:3000});
                                }
                            });
                        },function(){
                            layer.closeAll('loading');
                        });
                    }else{
                        window.location.href=url;
                    }
                }else if(res.code==-1){
                    layer.msg(res.msg,{time:3000});
                }

            },
            error:function (data) {
                layer.msg('系统错误',{time:3000});
            }
        });
    }

    function openWindow(id,typ)
    {
        var $ = layui.$
            , layer = layui.layer;
        if(typ==1){
            //编辑分类
            check_auth(2,"./index.php?i=3&c=entry&do=policy&p=manage&m=sz_yi&op=save_category&id="+id);
        }else if(typ==2){
            window.location.href="./index.php?i=3&c=entry&do=policy&p=manage&m=sz_yi&op=news_list&cate_id="+id;
        }else if(typ==3){
            //新增分类
            check_auth(2,"./index.php?i=3&c=entry&do=policy&p=manage&m=sz_yi&op=save_category&id=0");
        }else if(typ==4){
            check_auth(2,id,4);
        }else if(typ==5){
            check_auth(1,"https://decl.gogo198.cn/policy/index");
        }else if(typ==6){
            //导出数据
            // check_auth(1,"url('/policy/index')");
        }
    }
</script>
