<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>调查结束</title>
<!--手机端需要添加-->
<meta name="viewport" content="width=device-width,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no">
<!--手机端需要添加---->
<link rel="stylesheet" href="../addons/sz_yi/template/mobile/default/enterprise/static/css/test_rx.css">
<script src="../addons/sz_yi/template/mobile/default/enterprise/static/js/jquery-1.8.3.min.js"></script>
<script src="../addons/sz_yi/template/mobile/default/enterprise/static/js/jQuery.fontFlex.js"></script>
<script>
$(document).ready(function(e) {
  //320宽度的时候html字体大小是20px;、640宽度的时候html字体大小是40px;
  $('html').fontFlex(20, 40, 16);   
  var ishttps = 'https:' == document.location.protocol ? true: false;
	if(!ishttps){
		var url = window.location.href;
		window.location.href = url.replace("http","https");
	}
});
</script>
<style type="text/css">
	.kasj_db_but{margin: 0 10% 0.6rem;}
</style>
</head>
<body>

<div class="wjdt_title">
  <div class="header">
  	<h3>尽职调查</h3>
  </div>
<div class="dtks_box" >

   <!--题目-->
  {if $enterprise_members['is_verify']!=1}
    <!--未验证-->
    <div class="finish">
      <div class="pic"><img src="../addons/sz_yi/template/mobile/default/enterprise/static/images/icon.png" alt=""></div>
      <div class="finish-txt" style="margin: 0 0 2rem;">
        <h3>{if $_GPC['ok'] } 您已尽职调查完毕！ {else} 提交成功！ {/if}</h3>
        <p>感谢配合尽职调查，</p>
        <p style="padding-top: 0;">请先进行法人实名认证！</p>
      </div>
      <div class="kasj_db_but" style="float: left;"> <a href="javascript:void(0);" class="tj_zuotm hui-button" onclick="msg_notice();">短信通知法人</a> </div>
      <!--<div class="kasj_db_but smyz" style="float: left;"> <a href="javascript:void(0);" class="tj_zuotm hui-button" onclick="verify();">实名认证</a> </div>-->
      <div class="kasj_db_but "> <a href="javascript:void(0);" class="tj_zuotm" style="background: #dd0000;" onclick="show('请关闭页面！')">关闭</a> </div>
    </div>
  {else}
    <!--已验证-->
    <div class="finish">
      <div class="pic"><img src="../addons/sz_yi/template/mobile/default/enterprise/static/images/icon.png" alt=""></div>
      <div class="finish-txt" style="margin: 0 0 2rem;">
        <h3>{if $_GPC['ok'] } 您已尽职调查完毕！ {else} 提交成功！ {/if}</h3>
        <p>感谢配合尽职调查，</p>
        <p style="padding-top: 0;">请问是否在线注册成为平台用户？</p>
      </div>
      <div class="kasj_db_but " style="float: left;"> <a href="javascript:void(0);" class="tj_zuotm hui-button" onclick="register();">同意</a> </div>
      <div class="kasj_db_but "> <a href="javascript:void(0);" class="tj_zuotm" style="background: #dd0000;" onclick="show('请关闭页面！')">关闭</a> </div>
    </div>
  {/if}
</div>
</div>
<!--结束------------------------------------------>

<div class="footer">
	<img src="../addons/sz_yi/template/mobile/default/enterprise/static/images/logo.png" alt=""> &nbsp;&nbsp;技术支持
</div>
<!--<div class="zfb_identify_verify" style="display:none;"></div>-->
<script type="text/javascript" src="../addons/sz_yi/template/mobile/default/enterprise/static/js/hui.js" charset="UTF-8"></script>
<script type="text/javascript" src="../addons/sz_yi/template/mobile/default/enterprise/static/js/hui-accordion.js"></script>
<script type="text/javascript">
	hui.accordion(true, true);

  function show(msg)
  {
    alert(msg);
  }

  function verify(){
    $.ajax({
      url: 'https://decl.gogo198.cn/api/auth_verify',
      method: 'post',
      data: {
        'mobile': "{$enterprise_members['mobile']}",
        'idcard': "{$enterprise_members['idcard']}",
        'realname': "{$legal_info['operName']}",
        'reg_type':1,
      },
      dataType: 'JSON',
      success: function (res) {
        $.ajax({
          url: 'https://shop.gogo198.cn/app/index.php?i=3&c=entry&do=enterprise&m=sz_yi&p=finish&op=save_zfb_form',
          method: 'post',
          data: {
            'form': res,
          },
          dataType: 'JSON',
          success: function (res2) {
            $('.open_code').html('<img src="'+res2.result.img+'" style="width:200px;"><p style="color:#ff2222;text-align: center;">请保存二维码分享给法人刷脸认证！</p>');
            $('.open_code').show();
            $('.smyz').hide();
            $('.smyz2').show();
          }
        });
        // $('.zfb_identify_verify').html(res);
      }
    });
  }

  //短信通知法人
  function msg_notice(){
    $.ajax({
      url: 'https://decl.gogo198.cn/api/auth_verify',
      method: 'post',
      data: {
        'mobile': "{$enterprise_members['mobile']}",
        'idcard': "{$enterprise_members['idcard']}",
        'realname': "{$legal_info['operName']}",
        'reg_type':1,
      },
      dataType: 'JSON',
      success: function (res) {
        $.ajax({
          url: 'https://shop.gogo198.cn/app/index.php?i=3&c=entry&do=enterprise&m=sz_yi&p=finish&op=send_msg',
          method: 'post',
          data: {
            'mobile':"{$enterprise_members['mobile']}",
            'realname':"{$legal_info['operName']}",
            'form': res,
          },
          dataType: 'JSON',
          success: function (res2) {
            if(res2.status==1){
              alert(res2.result.msg);

              setInterval(function(){
                window.location.reload();
              },10000);
            }
          }
        });
      }
    });
  }

  function register()
  {
     //2021-09-24,https问题
    // php echo $this->createMobileUrl("enterprise/finish")&op=register
    hui.ajax({
                url  : 'https://shop.gogo198.cn/app/index.php?i=3&c=entry&p=finish&do=enterprise&m=sz_yi&op=register',
                type : 'POST',
                data : {},
                beforeSend : function(){hui.loading();},
                complete   : function(){hui.closeLoading();},
                success : function(res){
                    alert(res.result.msg);
                },
                error : function(e){
                    console.log(JSON.stringify(e));
                },
                'backType' : "JSON"
            });
  }
</script>
</body>
</html>
