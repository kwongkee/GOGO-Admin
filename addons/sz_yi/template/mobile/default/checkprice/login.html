{template 'common/warehouse_header'}
<title>账户登录</title>
<style>
    body,.layui-footer{background:{$website['color']};}
    .layui-table td, .layui-table th{ text-align: center;}
    .layui-table th{ background-color: #ecf6fc; }
    .required{color: red;font-size: 1.3rem;right: 3px;position: relative;top: 7px;}
    .icon-right{font-size: 20px;line-height: 20px;padding-right: 10px;vertical-align: middle;}
    .layui-layer-adminRight{top : 0px !important;}
    .layui-layer-btn .layui-layer-btn0{border-color: #F7931E!important;background-color: #F7931E!important;}
    .layui-table-cell{padding:0 2px;}
    .laytable-cell-1-0-2{height:auto;min-height:auto;}
    .page_head{width:100%;background:#fff;margin-bottom:5px;box-shadow:0 0 4px #ddd;padding:10px 0 10px;}
    .page_head .left{width:20%;display:flex;align-items:center;font-size:15px;}
    .page_head .left .back{width:13px;height:13px;border-top:2px solid #000;border-left:2px solid #000;transform:rotate(-50deg);margin-left:15px;margin-right:5px;}

    .layui-layer-hui .layui-layer-content{color:#fff;}
    .email{display:none;}
    .layui-btn{background:{$website['color']};color:{$website['color_word']};border:1px solid {$website['color_word']};}
</style>

<div class="layui-fluid" style="margin-top:15px;">
    <div class="layui-row layui-col-space15">
        <div class="layui-col-md12">
            <div class="layui-card">
                <div class="layui-card-header">
                    账户登录
                </div>
                <div class="layui-card-body">
                    <form class="layui-form" action="" lay-filter="component-form-demo1">
                        <input type="text" name="inquiry_id" id="inquiry_id" value="{$inquiry_id}" style="display:none;"/>
                        <div class="layui-form-item">
                            <label class="layui-form-label">登录方式</label>
                            <div class="layui-input-block layui-select-fscon">
                                <select name="reg_method" id="reg_method" lay-filter="reg_method">
                                    <option value="1">手机号码</option>
                                    <option value="2">电子邮箱</option>
                                </select>
                            </div>
                        </div>
                        <div class="layui-form-item phone">
                            <label class="layui-form-label">手机号码</label>
                            <div class="layui-input-block layui-select-fscon">
                                <input type="number" class="layui-input" name="phone" id="phone" value="" placeholder="手机号码"/>
                            </div>
                        </div>
                        <div class="layui-form-item email">
                            <label class="layui-form-label">电子邮箱</label>
                            <div class="layui-input-block layui-select-fscon">
                                <input type="text" class="layui-input" name="email" id="email" value="" placeholder="电子邮箱"/>
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <label class="layui-form-label">验证码</label>
                            <div class="layui-input-block disf">
                                <input type="text" class="layui-input" name="code" id="code" value="" placeholder="验证码" lay-verify="required"/>
                                <div class="layui-btn layui-btn-md btn-send" onclick="send_code()" id="sendCode">发送</div>
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-input-block" style="margin-left:0;text-align: center;">
                                <button class="layui-btn" lay-submit="" lay-filter="component-form-demo" style="padding: 0 100px;border: 1px solid #D2A778;">立即登录</button>
                            </div>
                        </div>
<!--                        <div class="layui-form-item layui-layout-admin">-->
<!--                            <div class="layui-input-block">-->
<!--                                <div class="layui-footer" style="left: 0;text-align:center;">-->
<!--                                    <button class="layui-btn" lay-submit="" lay-filter="component-form-demo">立即登录</button>-->
<!--                                    &lt;!&ndash;<button type="reset" class="layui-btn layui-btn-primary">重置</button>&ndash;&gt;-->
<!--                                </div>-->
<!--                            </div>-->
<!--                        </div>-->
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    layui.use(['layer', 'form', 'table', 'upload', 'laydate'], function () {
        var $ = layui.$
            , layer = layui.layer
            , form = layui.form
            , element = layui.element
            , laydate = layui.laydate
            , upload = layui.upload
            , table = layui.table;
        
        form.on('select(reg_method)',function(data){
            let val = data.value;
            if(val==1){
               $('.email').hide();
               $('.phone').show();
            }else if(val==2){
               $('.email').show();
               $('.phone').hide();
            }
        });
        
        /* 监听提交 */
        form.on('submit(component-form-demo)', function(data){
            if($('#reg_method').val()==1){
                number = $('#phone').val();
                if(number==''){
                    layer.msg('请输入您的手机号码',{time:3000});return false;
                }
            }else if($('#reg_method').val()==2){
                number = $('#email').val();
                if(number==''){
                    layer.msg('请输入您的邮箱地址',{time:3000});return false;
                }
            }
            $.ajax({
                url:"./index.php?i=3&c=entry&do=checkprice&p=index&m=sz_yi&op=login",
                method:'post',
                data:data.field,
                dataType:'JSON',
                success:function(res){
                    layer.msg(res.result.msg,{time:3000}, function () {
                        if({$open}==1){
                            
                            parent.location.href="./index.php?i=3&c=entry&do=checkprice&p=index&m=sz_yi&op=thanks";
                        }else if({$open}==2){
                            window.location.href="/?s=index/chat&uid="+res.uid;
                        }else if({$open}==3){
                            var layer = layui.layer;
                            var index = parent.layer.getFrameIndex(window.name); //先得到当前iframe层的索引 
                            parent.layer.close(index);
                        }else if(res.status==-1){
                            
                        }else{
                            window.location.reload();  
                        }
                    });
                },
                error:function (data) {
                    layer.msg('系统错误',{time:3000});
                }
            });
            return false;
        });
    });
    
    //倒计时
    var n=60;
    function timers(){
        n-=1;
        if(n==0){
            n=60;
            $("#sendCode").html("发送");
        }else{
            $("#sendCode").html(n+"重试");
            setTimeout(function () {
                timers();
            },1000);
        }
    }
    
    function send_code(){
        let val = $('#reg_method').val();
        let number = '';
        
        if(val==1){
            number = $('input[name="phone"]').val();
            if(number==''){
                alert('手机格式错误');return false;
            }
        }else if(val==2){
            number = $('input[name="email"]').val();
            var myreg=/^([a-zA-Z]|[0-9])(\w|\-)+@[a-zA-Z0-9]+\.([a-zA-Z]{2,4})$/; //邮箱正则
            if (!myreg.test(number)){
                alert('邮箱格式错误');return false;
            }
        }
        if(n==60){
            timers();
            $.ajax({
                url: "./index.php?i=3&c=entry&do=checkprice&p=index&m=sz_yi&op=send_code",
                method: 'post',
                data: {'code_type':val,'number':number,'islogin':1},
                dataType: 'JSON',
                success: function (res) {
                    layer.msg(res.result.msg,{time:3000}, function () {
                        if(res.status==-1){
                           
                        }else{
                            
                        }
                    });
                },
                error: function (data) {
                    
                }
            });   
        }
    }

</script>
