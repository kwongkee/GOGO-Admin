{template 'common/header'}
<title>催款列表</title>
<style type="text/css">
    body {margin:0px; background:#efefef; font-family:'微软雅黑'; -moz-appearance:none;}
    .info_main {height:auto;  background:#fff; margin-top:0px; border-bottom:1px solid #e8e8e8; border-top:1px solid #e8e8e8;}
    .info_main .line {margin:0 10px; height:40px; border-bottom:1px solid #e8e8e8; line-height:40px; color:#999;}
    .info_main .line .title {height:40px; width:80px; line-height:40px; color:#444; float:left; font-size:14px;}
    .info_main .line .info { width:100%;float:right;margin-left:-80px; }
    .info_main .line .inner { margin-left:80px; }
    .info_main .line .inner input {height:40px; width:100%;display:block; padding:0px; margin:0px; border:0px; float:left; font-size:15px;}
    .info_main .line .inner .user_sex {line-height:40px;}
    .info_sub {height:44px; margin:14px 5px; background:#31cd00; border-radius:4px; text-align:center; font-size:16px; line-height:44px; color:#fff;}
    .select { border:1px solid #ccc;height:25px;}
    .table{width:100%;font-size:15px;}
    .table tr{height:30px;}
    /*.list-t2 .table tr td:nth-of-type(1){width:88%;overflow: hidden;white-space: nowrap;text-overflow: ellipsis;}*/
    /*.list-t2 .table tr td:nth-of-type(2){width:12%;text-align: center;}*/
    .page_topbar{display: flex;align-items: center;}
    .page_topbar .bon{text-align:center;font-size:16px;width:50%;}
    .page_topbar .bonAct{border-bottom:1px solid #1E9FFF;color:#1E9FFF;}
    .list-t2{display: none;}
    .see{box-sizing: border-box;padding: 2px 4px;font-size: 15px;color: #fff;background: #1E9FFF;text-align:center;}
    select, input {
        -webkit-appearance: checkbox !important;
    }
    .floatBox{position: fixed;right: 10px;z-index: 999;font-size: 13px;color: #fff;width: 52px;height: 52px;transition: all .7s;background: #1E9FFF;bottom: 140px;border-radius: 50%;text-align: center;padding: 0;padding-top:8px;box-sizing:border-box;}
</style>

<link type="text/css" rel="stylesheet" href="../addons/sz_yi/template/pc/default/static/css/bootstrap.min.css" />
<script type="text/javascript" src="../addons/sz_yi/static/template/pc/default/static/js/bootstrap.min.js"></script>
<div id="container">
    <div class="info_main list-t1">
        {if empty($list)}
        <div class="line" style="text-align:center;">暂无信息</div>
        {else}
        <table class="table table-striped">
            <thead>
            <tr>
                <td>订单号</td>
                <td>付款人</td>
                <td>操作</td>
            </tr>
            </thead>
            <tbody>
            {loop $list $val}
            <tr>
                <td>{$val['ordersn']}</td>
                <td style="width: 100px;">{$val['payer_name']}</td>
                <td><div class="see" onclick='see({$val["id"]})'>查看</div></td>
            </tr>
            {/loop}
            </tbody>
        </table>
        {/if}
    </div>

    <div class="floatBox">
        <div>添加</div>
        <div>催款</div>
    </div>
</div>

<script language="javascript">
    require(['tpl', 'core'], function(tpl, core) {
        $('.floatBox').click(function(){
            window.location.href="./index.php?i=3&c=entry&do=domestic&m=sz_yi&p=liquidation&op=pressMoney_add";
        });
    });
    function see(id) {
        window.location.href="./index.php?i=3&c=entry&do=domestic&m=sz_yi&p=collection&op=search_detail&id="+id;
    }
</script>
{template 'common/footer'}
