{template 'common/header'}
<title>立即提现</title>
<style type="text/css">
    body {margin:0px; background:#efefef; font-family:'微软雅黑'; -moz-appearance:none;}
    .info_main {height:auto;  background:#fff; margin-top:14px; border-bottom:1px solid #e8e8e8; border-top:1px solid #e8e8e8;}
    .info_main .line {margin:0 10px; height:40px; border-bottom:1px solid #e8e8e8; line-height:40px; color:#999;}
    .info_main .line .title {height:40px; width:80px; line-height:40px; color:#444; float:left; font-size:15px;}
    .info_main .line .info { width:100%;float:right;margin-left:-80px; }
    .info_main .line .inner { margin-left:80px; width:265px;overflow: hidden;white-space: nowrap;text-overflow: ellipsis;font-size:15px;}
    .info_main .line .inner input {height:40px; width:100%;display:block; padding:0px; margin:0px; border:0px; float:left; font-size:15px;padding-left: 40px;box-sizing: border-box;}
    .info_main .line .inner .user_sex {line-height:40px;}
    .info_sub {height:44px; margin:14px 5px; background:#31cd00; border-radius:4px; text-align:center; font-size:16px; line-height:44px; color:#fff;}
    .select { border:1px solid #ccc;height:25px;}
    .table{width:100%;font-size:15px;}
    .table tr{height:30px;}
    .table tr td:nth-of-type(1){width:88%;overflow: hidden;white-space: nowrap;text-overflow: ellipsis;}
    .table tr td:nth-of-type(2){width:12%;text-align: center;}
    .see{box-sizing: border-box;padding: 2px 4px;font-size: 14px;color: #fff;background: #1E9FFF;text-align:center;}
    .page_topbar{display: flex;align-items: center;}
    .page_topbar .bon{text-align:center;font-size:16px;width:50%;}
    .page_topbar .bonAct{border-bottom:1px solid #1E9FFF;color:#1E9FFF;}
    .list-t2{display:none;}
    .tixian{height: 44px;margin: 14px 5px;background: #1E9FFF;border-radius: 4px;text-align: center;font-size: 16px;line-height: 44px;color: #fff;}
    .currency::before{
        content:'CNY';
        display: block;
        position:absolute;
    }
</style>
<script src="../addons/sz_yi/static/js/dist/mobiscroll/mobiscroll.core-2.5.2.js" type="text/javascript"></script>
<script src="../addons/sz_yi/static/js/dist/mobiscroll/mobiscroll.core-2.5.2-zh.js" type="text/javascript"></script>
<link href="../addons/sz_yi/static/js/dist/mobiscroll/mobiscroll.core-2.5.2.css" rel="stylesheet" type="text/css" />
<link href="../addons/sz_yi/static/js/dist/mobiscroll/mobiscroll.animation-2.5.2.css" rel="stylesheet" type="text/css" />
<script src="../addons/sz_yi/static/js/dist/mobiscroll/mobiscroll.datetime-2.5.1.js" type="text/javascript"></script>
<script src="../addons/sz_yi/static/js/dist/mobiscroll/mobiscroll.datetime-2.5.1-zh.js" type="text/javascript"></script>
<script src="../addons/sz_yi/static/js/dist/mobiscroll/mobiscroll.android-ics-2.5.2.js" type="text/javascript"></script>
<link href="../addons/sz_yi/static/js/dist/mobiscroll/mobiscroll.android-ics-2.5.2.css" rel="stylesheet" type="text/css" />

<div id="container">
    <div class="info_main">
        <div class="line"><div class="title">账户类型</div><div class='info'>
            <div class="inner">
                <span class="type" data-val="1"><i class="fa fa-circle-o"></i> 私户</span>&nbsp;&nbsp;
                <span class="type" data-val="2"><i class="fa fa-circle-o"></i> 公户</span>
                <input type="text" name="type" id="type" style="display: none;">
            </div>
        </div></div>
        <div class="line private_account" style="display: none;"><div class="title">私户账号</div><div class='info'>
            <div class="inner">
                <select name="private_account" id="private_account" style="background:none;border:0;">
                    <option value="">请选择私户账号</option>
                    {loop $account_p $val}
                    <option value="{$val['id']}">{$val['account_name']}-{$val['account']}</option>
                    {/loop}
                </select>
            </div>
        </div></div>
        <div class="line common_account" style="display: none;"><div class="title">公户账号</div><div class='info'>
            <div class="inner">
                <select name="common_account" id="common_account" style="background:none;border:0;">
                    <option value="">请选择公户账号</option>
                    {loop $account_c $val}
                    <option value="{$val['id']}">{$val['account_name']}-{$val['account']}</option>
                    {/loop}
                </select>
            </div>
        </div></div>
        <div class="line"><div class="title">可提现订单</div><div class='info'><div class='inner'>
            <!--multiple="multiple"-->
            <select id="organId" name="organId" style="width:100%;height:28px;background:none;">
                <option value="">请选择订单号</option>
                {loop $list $val}
        　　　　<option value="{$val['id']}">{$val['ordersn']}</option>
                {/loop}
        　　</select>
        </div></div></div>
        <div class="line"><div class="title">提现金额</div><div class='info'><div class='inner currency'>
            <input type="text" name="withdraw_money" id="withdraw_money" value="" readonly>
        </div></div></div>
        <div class="line"><div class="title">费率</div><div class='info'><div class='inner'>
            <!--$fee['bankcard_rate']-->
            <input type="text" name="withdrawal_expenses_rate" id="withdrawal_expenses_rate" value="" readonly>
        </div></div></div>
        <div class="line"><div class="title">提现费用</div><div class='info'><div class='inner currency'>
            <input type="text" name="withdrawal_expenses" id="withdrawal_expenses" value="" readonly>
        </div></div></div>
        <div class="line"><div class="title">预计到账</div><div class='info'><div class='inner currency'>
            <input type="text" name="true_money" id="true_money" value="" readonly>
        </div></div></div>
    </div>

    <div class="button tixian">立即提现</div>
</div>
<script>
    require(['tpl', 'core'], function(tpl, core) {
        $('.tixian').click(function(){
            let orderid = '';
            $('#organId option:selected').each(function () {
                orderid += $(this).val()+',';
            });
            if(orderid==''){
                core.tip.show('请选择可提现订单号!');
                return;
            }

            let type = $('#type').val();
            if($('#type').isEmpty()){
                core.tip.show('请选择卡户类型!');
                return;
            }
            if(type==1){
                var private_account = $('#private_account').val();
                if($('#private_account').isEmpty()){
                    core.tip.show('请选择私户账户!');
                    return;
                }
            }else if(type==2){
                var common_account = $('#common_account').val();
                if($('#common_account').isEmpty()){
                    core.tip.show('请选择公户账户!');
                    return;
                }
            }
            let withdraw_money = $('#withdraw_money').val();
            if(withdraw_money<=0){
                core.tip.show('提现金额不得小于或等于0！');
                return;
            }

            let withdrawal_expenses_rate = $('#withdrawal_expenses_rate').val();
            let withdrawal_expenses = $('#withdrawal_expenses').val();
            let true_money = $('#true_money').val();
            if(true_money=='' || true_money<=0){
                core.tip.show('预计到账金额不得小于或等于0！');
                return;
            }
            core.json('domestic/liquidation',{
                'op':'withdraw_woyao',
                'orderid':orderid,
                'type':type,
                'private_account':private_account,
                'common_account':common_account,
                'withdraw_money':withdraw_money,
                'withdrawal_expenses_rate':withdrawal_expenses_rate,
                'withdrawal_expenses':withdrawal_expenses,
                'true_money':true_money
            },function(json){
                if(json.status==-1){
                    core.tip.show(json.result.msg);
                }else{
                    core.tip.show('申请提现成功！请耐心等待审核');
                    setTimeout(function(){
                        window.history.back(-1);

                    },2000)
                }
            });
        });
        $('#organId').change(function(){
            var orderid = $(this).val();
            orderid = orderid.toString();

            var fee = $('#withdrawal_expenses_rate').val();
            if(fee!='请联系管理人员配置费率！' && fee!='' && typeof(fee)!='undefined'){
                core.json('domestic/liquidation',{'op':'getOrderPrice','orderid':orderid,'fee':fee},function(json){
                    if(json.status==1){
                        $('#withdraw_money').val(json.result.money);
                        $('#withdrawal_expenses').val(json.result.fee_money);
                        $('#true_money').val(json.result.true_money);
                    }
                });
            }else{
                if(fee=='请联系管理人员配置费率！'){
                    alert('请联系管理人员配置费率！');
                }else{
                    alert('请选择银行卡账号！');
                }
            }
        });
        //私户
        $('#private_account').change(function() {
            var p_acc = $(this).val();
            p_acc = p_acc.toString();
            core.json('domestic/liquidation',{'op':'getaccountfee','account_id':p_acc},function(json){
                if(json.status==1){
                    $('#withdrawal_expenses_rate').val(json.result.fee)
                }else{
                    alert(json.result.msg);
                }
            });
        });

        //公户
        $('#common_account').change(function() {
            var p_acc = $(this).val();
            p_acc = p_acc.toString();
            core.json('domestic/liquidation',{'op':'getaccountfee','account_id':p_acc},function(json){
                if(json.status==1){
                    $('#withdrawal_expenses_rate').val(json.result.fee)
                }else{
                    alert(json.result.msg);
                }
            });
        });
    });

    $(function(){
        //账户类型
        $('.type').click(function() {
            var $this = $(this);
            var val = $this.data('val');
            $('.type').find('i').css('color', '#999').removeClass('fa-check-circle-o').addClass('fa-circle-o');
            $(this).find('i').removeClass('fa-circle-o').addClass('fa-check-circle-o').css('color', '#0c9');
            $('#type').val(val);
            if(val==1){
                $('.private_account').show();
                $('.common_account').hide();
            }else{
                $('.private_account').hide();
                $('.common_account').show();
            }
        });
    })
</script>
{template 'common/footer'}
