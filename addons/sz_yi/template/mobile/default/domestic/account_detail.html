{template 'common/header'}
<!--<title>项目配置中心</title>-->
<style type="text/css">
    body {margin:0px; background:#efefef; font-family:'微软雅黑'; -moz-appearance:none;}
    .info_main {height:auto;  background:#fff; margin-top:14px; border-bottom:1px solid #e8e8e8; border-top:1px solid #e8e8e8;}
    .info_main .line {margin:0 10px; height:40px; border-bottom:1px solid #e8e8e8; line-height:40px; color:#999;font-size:15px;}
    .info_main .line .title {height:40px; width:80px; line-height:40px; color:#444; float:left; font-size:15px;}
    .info_main .line .info { width:100%;float:right;margin-left:-80px; }
    .info_main .line .inner { margin-left:80px; }
    .info_main .line .inner input {height:40px; width:100%;display:block; padding:0px; margin:0px; border:0px; float:left; font-size:15px;}
    .info_main .line .inner select{font-size:15px;}
    .info_main .line .inner .user_sex {line-height:40px;}
    .info_sub {height:44px; margin:14px 5px; background:#1E9FFF !important; border-radius:4px; text-align:center; font-size:16px; line-height:44px; color:#fff;}
    .select { border:1px solid #ccc;height:25px;}
    .atype{color:#0c9;}
</style>
<script src="../addons/sz_yi/static/js/dist/mobiscroll/mobiscroll.core-2.5.2.js" type="text/javascript"></script>
<script src="../addons/sz_yi/static/js/dist/mobiscroll/mobiscroll.core-2.5.2-zh.js" type="text/javascript"></script>
<link href="../addons/sz_yi/static/js/dist/mobiscroll/mobiscroll.core-2.5.2.css" rel="stylesheet" type="text/css" />
<link href="../addons/sz_yi/static/js/dist/mobiscroll/mobiscroll.animation-2.5.2.css" rel="stylesheet" type="text/css" />
<script src="../addons/sz_yi/static/js/dist/mobiscroll/mobiscroll.datetime-2.5.1.js" type="text/javascript"></script>
<script src="../addons/sz_yi/static/js/dist/mobiscroll/mobiscroll.datetime-2.5.1-zh.js" type="text/javascript"></script>
<script src="../addons/sz_yi/static/js/dist/mobiscroll/mobiscroll.android-ics-2.5.2.js" type="text/javascript"></script>
<link href="../addons/sz_yi/static/js/dist/mobiscroll/mobiscroll.android-ics-2.5.2.css" rel="stylesheet" type="text/css" />

<div id="container">
    <div class="page_topbar">
        <div class="title">编辑银行账号</div>
    </div>
    <div class="info_main">
        <input type="text" name="id" id="id" value="{$data['id']}" style="display:none;">
        <div class="line"><div class="title">账户类型</div><div class='info'><div class='inner'>
            <select name="account_type2" id="account_type2" style="width:100%;background: #fff;border:0;">
                <option value="1" {php echo $data['account_type2']==1?'selected':''}>商户私户</option>
                <option value="2" {php echo $data['account_type2']==2?'selected':''}>商户公户</option>
            </select>
        </div></div></div>
        <div class="line"><div class="title">账户币种</div><div class='info'><div class='inner'>
            <select name="money_type" id="money_type" style="width:100%;background: #fff;border:0;">
                <option value="CNY" {php echo $data['money_type']=='CNY'?'selected':''}>人民币</option>
            </select>
        </div></div></div>
        <div class="line"><div class="title">账户名称</div><div class='info'><div class='inner'>
            <input type="text" name="account_name" id="account_name" placeholder="请输入账户名称" value="{$data['account_name']}">
        </div></div></div>
        <div class="line"><div class="title">银行名称</div><div class='info'><div class='inner'>
            <select name="bank_name" id="bank_name" style="width:100%;background: #fff;border:0;">
                <option value="">请选择开户行</option>
                {loop $bank_list $k $v}
                <option value="{$v['bank_name']}" {php echo $data['bank_name']==$v['bank_name']?'selected':''}>{$v['bank_name']}</option>
                {/loop}
            </select>
        </div></div></div>
        <div class="line"><div class="title">分支机构</div><div class='info'><div class='inner'>
            <input type="text" name="bank_org_name" id="bank_org_name" placeholder="请输入分支机构名称" value="{$data['bank_org_name']}">
        </div></div></div>
        <div class="line"><div class="title">银行账号</div><div class='info'><div class='inner'>
            <input type="text" name="account" id="account" placeholder="请输入银行账号" value="{$data['account']}">
        </div></div></div>
        <div class="line">
            <div class="title">银行卡类型</div>
            <div class='info'>
                <div class='inner'>
                    <span class="account_type" data-val="1"><i class="fa {php echo $data['account_type']==1?'fa-check-circle-o atype':'fa-circle-o'}"></i>储蓄卡</span>
                    <span class="account_type" data-val="2" style="margin-left:5px;"><i class="fa  {php echo $data['account_type']==2?'fa-check-circle-o atype':'fa-circle-o'}"></i>信用卡</span>
                    <input type="text" name="account_type" id="account_type" value="{$data['account_type']}" style="display: none;">
                </div>
            </div>
        </div>
    </div>
    <div class="info_sub">提交</div>
</div>

<script language="javascript">
    require(['tpl', 'core'], function(tpl, core) {
        //银行卡类型
        $('.account_type').click(function() {
            var $this = $(this);
            var val = $this.data('val');
            $('.account_type').find('i').css('color', '#999').removeClass('fa-check-circle-o').addClass('fa-circle-o');
            $(this).find('i').removeClass('fa-circle-o').addClass('fa-check-circle-o').css('color', '#0c9');
            $('#account_type').val(val);
        });

        $('.info_sub').click(function() {
            if( $('#account_type2').isEmpty()){
                core.tip.show('请选择账户类型!');
                return;
            }
            if( $('#money_type').isEmpty()){
                core.tip.show('请选择账户币种!');
                return;
            }
            if( $('#account_name').isEmpty()){
                core.tip.show('请填写账户名称!');
                return;
            }
            if( $('#bank_name').isEmpty()){
                core.tip.show('请选择银行!');
                return;
            }
            // if( $('#bank_org_name').isEmpty()){
            //     core.tip.show('请填写分支机构名称!');
            //     return;
            // }
            if( $('#account').isEmpty()){
                core.tip.show('请填写银行账号!');
                return;
            }
            if( $('#account_type').isEmpty()){
                core.tip.show('请选择银行卡类型!');
                return;
            }

            let data = '';
            data += $('#account_type2').val()+',';
            data += $('#money_type').val()+',';
            data += $('#account_name').val()+',';
            data += $('#bank_name').val()+',';
            data += $('#bank_org_name').val()+',';
            data += $('#account').val()+',';
            data += $('#account_type').val()+',';
            data += $('#id').val();

            core.json('domestic/liquidation',{'op':'account_detail','data':data},function(json){
                if(json.status==-1){
                    core.tip.show(json.result.msg);
                }else{
                    core.tip.show('编辑成功！');

                    setTimeout(function(){
                        window.history.go(-1);
                    },2000)
                }
            });
        });
    });
</script>

{template 'common/footer'}
