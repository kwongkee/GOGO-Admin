    .layui-table-cell{padding:0 2px;}
    .laytable-cell-1-0-2{height:auto;min-height:auto;}
    .page_head{width:100%;background:#fff;margin-bottom:5px;box-shadow:0 0 4px #ddd;padding:10px 0 10px;}
    .page_head .left{width:20%;display:flex;align-items:center;font-size:15px;}

<div class="page_head">

</div>

<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-col-md12">
            <div class="layui-card">
                <div class="layui-card-header">
                    <p>еЈ≤дїШжђЊеЈ≤жПРдЇ§еЊЕз°ЃиЃ§еИЧи°®</p>
                </div>
                <div class="layui-card-body">
                    <table class="layui-hide" id="mainTable"></table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    layui.use(['layer', 'form', 'table', 'upload', 'laydate'], function () {
        var $ = layui.$
            , layer = layui.layer
            , form = layui.form
            , element = layui.element
            , laydate = layui.laydate
            , upload = layui.upload
            , table = layui.table;

        table.render({
            elem: '#mainTable'
            ,url: "./index.php?i=3&c=entry&do=onlinepay&p=index&m=sz_yi&op=status3_1&pa=1"
            ,cellMinWidth: 200
            ,cols: [[
                {field:'ordersn_flow', title: 'жФѓдїШеНХеПЈ'}
                ,{field:'totalmoney', title: 'жФѓдїШеНХйЗСйҐЭ'}
                ,{field:'statusname', title: 'жФѓдїШеНХзКґжАБ'}
                ,{field:'createtime', title: 'еИЫеїЇжЧґйЧі'}
                ,{align:'center',  title: 'жУНдљЬ',fixed:'right',width:120, templet: function(d){
                        return [
                            '<a onclick="openWindow('+"'"+ d.id +"'" +','+"1"+ ');" class="layui-btn layui-btn-success layui-btn-xs">жЯ•зЬЛиѓ¶жГЕ</a>',
                            // '<a onclick="openWindow('+"'"+ d.id +"'" +','+"3"+ ');" class="layui-btn layui-btn-danger layui-btn-xs">еИ†йЩ§</a>',
                        ].join('');
                    } }
            ]]
            ,page: false
        });
    });


    function openWindow(id,typ)
    {
        if(typ==1){
            //жЯ•зЬЛиѓ¶жГЕ
            window.location.href="./index.php?i=3&c=entry&do=onlinepay&m=sz_yi&p=index&op=order_detail&oid="+id;
        }else if(typ==2){
            //з°ЃиЃ§
            window.location.href="./index.php?i=3&c=entry&do=behalf&m=sz_yi&p=merchant&op=save_product&id="+id;
        }else if(typ==3){
            //з°ЃиЃ§
            layer.confirm('з°ЃиЃ§иѓ•жФѓдїШеНХеРЧпЉЯ', {
                btn: ['з°ЃиЃ§','еПЦжґИ'] //жМЙйТЃ
            }, function() {
                $.ajax({
                    url:"./index.php?i=3&c=entry&do=onlinepay&p=index&m=sz_yi&op=status1&pa=2",
                    method:'post',
                    data:{'id':id},
                    dataType:'JSON',
                    success:function(res2){
                        layer.closeAll('loading');
                        layer.msg(res2.result.msg,{time:3000}, function () {
                            if(res2.status == 0)
                            {
                                window.location.reload();
                            }
                        });
                    },
                    error:function (data) {
                        layer.msg('з≥їзїЯйФЩиѓѓ',{time:3000});
                    }
                });
            },function(){
                layer.closeAll('loading');
            });
        }
    }
</script>
