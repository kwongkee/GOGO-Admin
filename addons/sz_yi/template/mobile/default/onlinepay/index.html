<script language="javascript">
    require(['tpl', 'core'], function(tpl, core) {
        $('.info_sub').click(function(){
            let trade_price = $('#trade_price').val();
            let project_name = $('#project_name').val();
            let payer_name = $('#payer_name').val();
            let payer_tel = $('#payer_tel').val();

            if( $('#trade_price').isEmpty()){
                core.tip.show('请输入交易金额!');
                return;
            }
            if( $('#project_name').isEmpty()){
                core.tip.show('请输入交易项目!');
                return;
            }
            if( $('#payer_name').isEmpty()){
                core.tip.show('请输入付款人名称!');
                return;
            }
            if(!$('#payer_tel').isMobile()){
                core.tip.show('请输入正确手机号码!');
                return;
            }

            core.json('member/customcollection',{'op':'createorder','trade_price':trade_price,'project_name':project_name,'payer_name':payer_name,'payer_tel':payer_tel},function(json){
                if(json.status==-1){
                    core.tip.show(json.result.msg);
                }else{
                    core.tip.show('创建成功！');
                    setTimeout(function(){
                        window.location.reload();
                    },2000)
                }
            });
        });
    })
</script>
