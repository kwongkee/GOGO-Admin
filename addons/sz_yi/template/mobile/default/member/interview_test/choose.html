<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>职位选择</title>
	<!--手机端需要添加-->
	<!--<meta name="viewport" content="width=device-width, initial-scale=1.0">-->
	<meta name="viewport" content="width=device-width,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no">

	<!--手机端需要添加---->
	<link rel="stylesheet" type="text/css" href="../addons/sz_yi/static/interview_test/css/test_rx.css" />
    <link rel="stylesheet" type="text/css" href="../addons/sz_yi/static/interview_test/css/home.css" />
	<script src="../addons/sz_yi/static/interview_test/js/jquery-1.8.3.min.js"></script>
	<script src="../addons/sz_yi/static/interview_test/js/jQuery.fontFlex.js"></script>
	<script>
	$(document).ready(function(e) {
		//320宽度的时候html字体大小是20px;、640宽度的时候html字体大小是40px;
		$('html').fontFlex(20, 40, 16); 
		//
	     $(".dxt_box li").click(function(){
			$(this).addClass("on").siblings().removeClass("on");
			$(this).parent(".dxt_box").parent(".kcks_title_ts").attr("date-title",1);
			$(this).parent(".dxt_box").parent(".last").attr("date-title",0); 	
			});
	});
	</script>
	<style>
		body{overflow-x: hidden;}
		@media screen and (max-width: 450px) and (min-width: 321px){
			.choose{
				min-height: 350px;
				margin-bottom: 0px;
			}
			.home-but{
				margin: 40% 0 0 24%;
			}
		}
		@media screen and (max-width: 320px){
			.choose{
				min-height: 310px;
				margin-bottom: 20px;
			}
			.home-but{
				margin: 37% 0 0 18%;
			}
		}
		/* toast */
        #hui-toast{width:100%; position:fixed; z-index:21; left:0; bottom:50px; text-align:center;}
        #hui-toast-msg{margin:0 auto; line-height:22px; background:rgba(0,0,0,0.7); padding:10px; color:#FFFFFF; font-size:14px; text-align:center; max-width:200px; border-radius:6px; display:inline-block;}
	</style>
</head>
<body>
<div class="position">
	<div class="home-logo">
		<img src="../addons/sz_yi/static/interview_test/images/logo.png" alt="">
	</div>	
	<div class="position-con">
		<form>
			<h2 class="position-title">请选择应聘岗位</h2>
			<div class="choose">
				<div class="button-holder">
					<input type="radio" id="radio-1-1" name="" class="regular-radio" checked=""><label for="radio-1-1"></label>策划营销与运营 
				</div>
				<!-- <div class="button-holder">
					<input type="radio" id="radio-1-2" name="" class="regular-radio"><label for="radio-1-2"></label>软件网络与运维 
				</div> -->
				<button class="home-but" onclick="start();" type="button">下一步</button>
			</div>
		</form>
	</div>
</div>

<script>
	function start()
	{
		var url = '{php echo $this->createMobileUrl("member/interview_test")}&op=check_index';
		window.location.href = url;
	}
</script>

</body>
</html>
