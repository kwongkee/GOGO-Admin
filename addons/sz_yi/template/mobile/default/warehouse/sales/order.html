<div class="layui-fluid">

                    <li class="layui-this">еҺҹе§Ӣи®ўеҚ•</li>
                    <li>еҗҲе№¶и®ўеҚ•</li>
                </ul>
                <div class="layui-tab-content">

                        <div class="main-table-reload-btn" style="margin-bottom: 10px;">
                            жҗңзҙўе…ій”®иҜҚпјҡ
                            <div class="layui-inline">
                                <input class="layui-input" placeholder="иҰҒжҗңзҙўзҡ„е…ій”®иҜҚ"  id="keywords" autocomplete="off">
                            </div>
                            <button class="layui-btn layui-btn-normal" data-type="reload">жҗңзҙў</button>
                        </div>
                        <table class="layui-hide" id="mainTable"></table>
                    </div>
                    <div class="layui-tab-item mainTable2">
                        <div class="main-table-reload-btn" style="margin-bottom: 10px;">
                            жҗңзҙўе…ій”®иҜҚпјҡ
                            <div class="layui-inline">
                                <input class="layui-input" placeholder="иҰҒжҗңзҙўзҡ„е…ій”®иҜҚ"  id="keywords2" autocomplete="off">
                            </div>
                            <button class="layui-btn layui-btn-normal" data-type="reload">жҗңзҙў</button>
                        </div>
                        <table class="layui-hide" id="mainTable2"></table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{template 'common/footer'}
<script>
    $(function() {
        layui.use(['layer', 'form', 'table', 'upload','element'], function () {
            var $ = layui.$
                , layer = layui.layer
                , form = layui.form
                , element = layui.element
                , upload = layui.upload
                , table = layui.table;

            table.render({
                elem: '#mainTable'
                ,url: "<?php echo $this->createMobileUrl('warehouse/sales');?>&op=order&pa=1"
                ,cellMinWidth: 200
                ,cols: [[
                    {field:'id', width: 60, title: 'зј–еҸ·'}
                    ,{field:'ordersn', title: 'еҢ…иЈ№еҚ•еҸ·'}
                    ,{field:'express_no', title: 'еҝ«йҖ’еҚ•еҸ·'}
                    ,{field:'nickname', title: 'д№°е®¶еҗҚз§°'}
                    ,{field:'createtime', title: 'еҲӣе»әж—¶й—ҙ'}
                    ,{align:'center',  title: 'ж“ҚдҪң',fixed:'right',width:90, templet: function(d){
                            return [
                                '<a onclick="openWindow('+ "'"+d.ordersn+"жҹҘзңӢиҜҰжғ…'" +',' + "'"+ d.id +"'" +','+"1"+ ');" class="layui-btn layui-btn-normal layui-btn-xs">жҹҘзңӢиҜҰжғ…</a>',
                            ]
                        } }
                ]]
                ,page: true
            });

            table.render({
                elem: '#mainTable2'
                ,url: "<?php echo $this->createMobileUrl('warehouse/sales');?>&op=order&pa=2"
                ,cellMinWidth: 200
                ,cols: [[
                    {field:'id', width: 60, title: 'зј–еҸ·'}
                    ,{field:'ordersn', title: 'еҢ…иЈ№еҗҲе№¶еҚ•еҸ·'}
                    ,{field:'nickname', title: 'д№°е®¶еҗҚз§°'}
                    ,{field:'createtime', title: 'еҲӣе»әж—¶й—ҙ'}
                    ,{align:'center', title: 'ж“ҚдҪң',fixed:'right',width:90, templet: function(d){
                            return [
                                '<p><a onclick="openWindow('+ "'"+d.ordersn+"жҹҘзңӢиҜҰжғ…'" +',' + "'"+ d.id +"'" +','+"2"+ ');" class="layui-btn layui-btn-normal layui-btn-xs">жҹҘзңӢиҜҰжғ…</a></p>'+
                                '<p><a onclick="openWindow('+ "'"+d.ordersn+"еҜјеҮәиҙ§зү©'" +',' + "'"+ d.id +"'" +','+"3"+ ');" class="layui-btn layui-btn-success layui-btn-xs">еҜјеҮәиҙ§зү©</a></p>',
                            ]
                        } }
                ]]
                ,page: true
            });

            var $ = layui.$, active = {
                reload: function(){
                    //жү§иЎҢйҮҚиҪҪ
                    table.reload('mainTable', {
                        page: {
                            curr: 1 //йҮҚж–°д»Һз¬¬ 1 йЎөејҖе§Ӣ
                        }
                        ,where: {
                            keywords: $("#keywords").val()
                        }
                    });
                    //жү§иЎҢйҮҚиҪҪ
                    table.reload('mainTable2', {
                        page: {
                            curr: 1 //йҮҚж–°д»Һз¬¬ 1 йЎөејҖе§Ӣ
                        }
                        ,where: {
                            keywords: $("#keywords2").val()
                        }
                    });
                },
            };

            $('.main-table-reload-btn .layui-btn').on('click', function(){
                var type = $(this).data('type');
                active[type] ? active[type].call(this) : '';
            });
        });
    });

    function openWindow(title,id,typ)
    {
        var layer = layui.layer;
        var url = '';
        if(typ==1){
            //жҹҘзңӢиҜҰжғ…
            url="<?php echo $this->createMobileUrl('warehouse/sales');?>&op=order_detail&id="+id;
        }else if(typ==2){
            //жҹҘзңӢиҜҰжғ…
            url="<?php echo $this->createMobileUrl('warehouse/sales');?>&op=merge_order_detail&id="+id;
        }else if(typ==3){
            //еҜјеҮәе•Ҷе“Ғ
            window.location.href="<?php echo $this->createMobileUrl('warehouse/sales');?>&op=export_goods_excel&id="+id;
            // $.ajax({
            //     url: "<?php echo $this->createMobileUrl('warehouse/sales');?>",
            //     type: "GET",
            //     dataType: "json",
            //     data: {
            //         "op":'export_goods_excel',
            //         "id": id,
            //     },
            //     success: function (res) {
            //         layer.msg(res.msg,{time:3000},function(){
            //             if(res.code==0){
            //
            //             }
            //         })
            //     },
            // });
            return false;
        }
        var index = layer.open({
            type: 2,
            title: title,
            content: url,
            area:['100%','100%']
        });
        // layer.full(index);
    }
</script>
