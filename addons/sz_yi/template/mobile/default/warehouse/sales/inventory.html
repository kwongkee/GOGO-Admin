{template 'common/footer'}
<script>
    $(function() {
        layui.use(['layer', 'form', 'table', 'upload', 'laydate'], function () {
            var $ = layui.$
                , layer = layui.layer
                , form = layui.form
                , element = layui.element
                , laydate = layui.laydate
                , upload = layui.upload
                , table = layui.table;

            table.render({
                elem: '#mainTable'
                ,url: "<?php echo $this->createMobileUrl('warehouse/sales');?>&op=inventory&pa=1"
                ,cellMinWidth: 200
                ,cols: [[
                    {field:'id', width: 80, title: '编号'}
                    ,{field:'ordersn', title: '订单号'}
                    ,{field:'user_name', title: '买家名称'}
                    ,{field:'good_name', title: '货物名称'}
                    ,{field:'num', title: '数量'}
                    ,{field:'status', title: '状态'}
                    ,{field:'createtime', title: '操作时间'}
                    // ,{align:'center',  title: '操作',fixed:'right',width:90, templet: function(d){
                    //         return [
                    //             '<a onclick="openWindow('+ "'"+d.name+"查看详情'" +',' + "'"+ d.id +"'" +','+"1"+ ');" class="layui-btn layui-btn-normal layui-btn-xs">查看详情</a>',
                    //         ]
                    //     } }
                ]]
                ,page: true
            });

            var $ = layui.$, active = {
                reload: function(){
                    //执行重载
                    table.reload('mainTable', {
                        page: {
                            curr: 1 //重新从第 1 页开始
                        }
                        ,where: {
                            keywords: $("#keywords").val()
                        }
                    });
                }
            };

            $('.main-table-reload-btn .layui-btn').on('click', function(){
                var type = $(this).data('type');
                active[type] ? active[type].call(this) : '';
            });
        });
    });

    function openWindow(title,id,typ)
    {
        var layer = layui.layer;
        var url = '';
        if(typ==1){
            //修改产品
            url="<?php echo $this->createMobileUrl('warehouse/sales/goods');?>&op=goods_detail&id="+id;
        }
        var index = layer.open({
            type: 2,
            title: title,
            content: url,
            area:['100%','100%']
        });
        // layer.full(index);
    }
</script>
