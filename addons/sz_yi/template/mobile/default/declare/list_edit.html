{template 'common/header'}
<title>修改清单</title>
<link href="../addons/sz_yi/static/css/layui.css" rel="stylesheet">
<style>
    .layui-table td, .layui-table th{ text-align: center;}
    .layui-table th{ background-color: #ecf6fc; }
    .required{color: red;font-size: 1.3rem;right: 3px;position: relative;top: 7px;}
    .icon-right{
        font-size: 20px;
        line-height: 20px;
        padding-right: 10px;
        vertical-align: middle;
    }
    .layui-layer-adminRight{
        top : 0px !important;
    }
    .layui-layer-btn .layui-layer-btn0{border-color: #F7931E!important;background-color: #F7931E!important;}
    .disf{display:flex;align-items: center;justify-content: space-evenly;}
    .layui-tab-title li{min-width:50px;}
    .layui-table img{max-width:50px;}
    .layui-upload-list img{max-width:50px;}
    .layui-table-view{margin-top:60px;}
    .layui-table-page{overflow-x:scroll;}
    .list_div{padding:2px 0;}
</style>

<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-col-md12">
            <div class="layui-card">
                <div class="layui-card-header">清单列表</div>
                <div class="layui-card-body list_div">
                    <div class="main-table-reload-btn" style="margin-bottom: 10px;float: right;">
                        搜索关键词：
                        <div class="layui-inline">
                            <input class="layui-input" placeholder="要搜索的关键词"  id="keywords" autocomplete="off">
                        </div>
                        <button class="layui-btn layui-btn-normal" data-type="reload">搜索</button>
                    </div>
                    <table class="layui-hide" id="mainTable"></table>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="text/javascript" src="../addons/sz_yi/static/js/layui/layui.js"></script>
<script>
    $(function() {
        layui.use(['layer', 'form', 'table', 'upload', 'laydate'], function () {
            var  $ = layui.$
                ,layer = layui.layer
                , form = layui.form
                ,element = layui.element
                ,laydate = layui.laydate
                ,upload = layui.upload
                , table = layui.table;

            form.render(null, 'component-form-element1');
            // element.render('breadcrumb', 'breadcrumb');

            table.render({
                elem: '#mainTable'
                ,url: "<?php echo $this->createMobileUrl('declare/index');?>&op=list_edit&pa=1&id={$id}"
                ,cols: [[
                    {type: 'numbers', width:80, title: '序号'}
                    ,{field:'itemName', width: 150, title: '企业商品名称'}
                    ,{field:'unit', width: 150, title: '计量单位'}
                    ,{field:'currency', width: 150, title: '币制'}
                    ,{field:'qty', width: 150, title: '数量'}
                    ,{field:'price', width: 150, title: '单价'}
                    ,{field:'totalPrice', width: 150, title: '总价'}
                    ,{width:100, align:'center', fixed: 'right', title: '操作', templet: function(d){
                            return [
                                '<a onclick="openWindow('+ "'"+d.itemName+"编辑'" +',' + "'<?php echo $this->createMobileUrl("declare/index");?>&op=goods_edit&id="+ d.id +"'" + ');" class="layui-btn layui-btn-normal layui-btn-xs">编辑</a>',
                                // '<a onclick="del('+ "'"+d.id+"'" +');" class="layui-btn layui-btn-normal layui-btn-xs">删除</a>',
                            ].join('');
                        } }
                ]]
                ,page: true
            });

            var $ = layui.$, active = {
                reload: function(){
                    //执行重载
                    table.reload('mainTable', {
                        page: {
                            curr: 1 //重新从第 1 页开始
                        }
                        ,where: {
                            keywords: $("#keywords").val()
                        }
                    });
                }
            };

            $('.main-table-reload-btn .layui-btn').on('click', function(){
                var type = $(this).data('type');
                active[type] ? active[type].call(this) : '';
            });
        });
    });

    function openWindow(title,url)
    {
        var layer = layui.layer;
        var index = layer.open({
            type: 2,
            title: title,
            content: url
        });
        layer.full(index);
    }
</script>
{template 'common/footer'}
