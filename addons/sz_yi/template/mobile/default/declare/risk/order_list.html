{template 'common/header'}
<link href="../addons/sz_yi/static/css/layui.css" rel="stylesheet">
<style>
    .layui-table td, .layui-table th{ text-align: center;}
    .layui-table th{ background-color: #ecf6fc; }
    .required{color: red;font-size: 1.3rem;right: 3px;position: relative;top: 7px;}
    .icon-right{
        font-size: 20px;
        line-height: 20px;
        padding-right: 10px;
        vertical-align: middle;
    }
    .layui-layer-adminRight{
        top : 0px !important;
    }
    .layui-layer-btn .layui-layer-btn0{border-color: #F7931E!important;background-color: #F7931E!important;}
    .layui-table-cell{padding:0 2px;}
    .laytable-cell-1-0-2{height:auto;min-height:auto;}
</style>

<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-col-md12">
            <div class="layui-card">
                <div class="layui-card-header">订单概览</div>
                <div class="layui-card-body" style="padding:0;">
                    <table class="layui-hide" id="mainTable"></table>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="text/javascript" src="../addons/sz_yi/static/js/layui/layui.js"></script>
<script>
    $(function() {
        layui.use(['layer', 'form', 'table', 'upload', 'laydate'], function () {
            var $ = layui.$
                , layer = layui.layer
                , form = layui.form
                , element = layui.element
                , laydate = layui.laydate
                , upload = layui.upload
                , table = layui.table;

            table.render({
                elem: '#mainTable'
                ,url: "<?php echo $this->createMobileUrl('declare/risk');?>&op=order_list&pa=1&id={$id}&typ={$type}&batch_num={$batch_num}&logisticsNo={$logisticsNo}"
                ,cellMinWidth: 200
                ,cols: [[
                    {field:'logisticsNo', title: '运单号'}
                    ,{field:'all_num', title: '总数'}
                    ,{field:'all_weight', title: '总重'}
                    ,{field:'all_money', title: '总值', templet: function(d){
                        var html = '';
                        for(var i=0;i<d.all_money.length;i++){
                            html += '<div class="layui-table-cell laytable-cell-1-0-2">'+d.all_money[i]+'</div>';
                        }
                        return html;
                    }}
                    // ,{align:'center',  title: '操作', templet: function(d){
                            // return [
                            //     '<a onclick="openWindow('+ "'"+d.pre_batch_num+"订单概览'" +',' + "'"+ d.id +"'" +','+"1"+ ');" class="layui-btn layui-btn-normal layui-btn-xs">订单概览</a>',
                            //     '<a  class="layui-btn layui-btn-xs layui-btn-normal" onclick="openWindow('+"'"+ d.pre_batch_num +"交易管理'"+','+"'"+ d.id +"'" +','+"2"+');">交易管理</a>',
                            // ].join('');
                        // } }
                ]]
                ,page: false
            });

            var $ = layui.$, active = {
                reload: function(){
                    //执行重载
                    table.reload('mainTable', {
                        page: {
                            curr: 1 //重新从第 1 页开始
                        }
                        ,where: {
                            keywords: $("#keywords").val()
                        }
                    });
                }
            };
        });
    });

    function openWindow(title,id,typ)
    {
        var layer = layui.layer;
        var url = '';
        if(typ==1){
            //订单概览
            url="<?php echo $this->createMobileUrl('declare/risk');?>&op=order_list&id="+id;
        }else if(typ==2){
            //交易管理
            url="<?php echo $this->createMobileUrl('declare/risk');?>&op=transaction_manage&id="+id;
        }
        var index = layer.open({
            type: 2,
            title: title,
            content: url
        });
        layer.full(index);
    }
</script>
{template 'common/footer'}
