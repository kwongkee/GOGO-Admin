{template 'common/header'}
{template '_header'}
<title>兑换记录</title>
{if $_GPC['shine']==1}
<script type='text/javascript' src='../addons/sz_yi/plugin/creditshop/template/mobile/default/images/jquery.color.js'></script>
{/if}
<script type='text/javascript' src='../web/resource/js/lib/bootstrap.min.js'></script>
<link rel="stylesheet" type="text/css" href="../web/resource/css/bootstrap.min.css">

<style type='text/css'>
  body { background:#fff }
#log_loading { padding:10px;color:#666;text-align: center;}
.container_list{margin-bottom: 20px;}

.record_line .img {width: 60px}
.record_line .img img{width: 60px}
.record_line .info {padding-left: 70px;}
/*han 20170401*/
/*取消bootstrap重置*/
*{webkit-box-sizing: content-box;-moz-box-sizing: content-box;box-sizing: content-box;}
.record_line .info .result {height: 30px;line-height: 25px;}
.btn {display: inline-block;padding: 6px 12px;margin-bottom: 0;font-size: 14px;font-weight: 400;line-height: 1.42857143;text-align: center;white-space: nowrap;vertical-align: middle;cursor: pointer;-webkit-user-select: none;-moz-user-select: none;-ms-user-select: none;user-select: none;background-image: none;border: 1px solid transparent;border-radius: 4px;}
.btn-default {float:right;color: #333;background-color: #fff;border-color: #ccc;}
.btn {padding: 4px 12px;margin-right:5px;box-sizing: content-box;width: auto !important;border-radius: 2px;}
</style>
<div id='container'></div>
<script id='tpl_main' type='text/html'>
   <div class="page_topbar">
    <a href="{php echo $this->createPluginMobileUrl('creditshop')}" class="back" onclick="history.back()"><i class="fa fa-angle-left"></i></a>
    <div class="title">兑换记录</div>
</div>
<div id="container_list"></div>
</script>
<script id='tpl_empty' type='text/html'>
    <div class="record_ico"><i class="fa fa-database"></i></div>
    <div class="record_no">您还没有兑换记录哦~</div>
</script>
<script id='tpl_list' type='text/html'>
    <%each list as log i%>
    <div class="record_line"
           <%if log.type==0%>
                    <%if log.status==1 || log.status==2%>onclick="location.href='{php echo $this->createPluginMobileUrl('creditshop/log',array('op'=>'detail'))}&id=<%log.id%>'"<%/if%>
                <%else%>
                    <%if log.status==1%>onclick="location.href='{php echo $this->createPluginMobileUrl('creditshop/detail')}&id=<%log.goodsid%>'"<%/if%>
                    <%if log.status==2 || log.status==3%>onclick="location.href='{php echo $this->createPluginMobileUrl('creditshop/log',array('op'=>'detail'))}&id=<%log.id%>'"<%/if%>
                <%/if%>
             
         >
        <div class="img"><img src="<%log.thumb%>"></div>
		<!--han 20170401 type=0 -> status=3 &&4 确认兑换状态或者确认收货状态隐藏右箭头-->
        <div class="go" ><%if log.type==0%><%if log.status < 3 %><i class='fa fa-angle-right'></i><%/if%><%/if%></div>

             <div  class="info">
        	<div class="desc">
                     
                <%if log.type==0%>兑换<%else%>抽取<%/if%><%log.title%></div>
       
            <div class="price">
              
             <%if log.acttype==0%>
                 <%log.credit%><i class="fa fa-database" style=" padding-left:5px;"></i> <i class="fa fa-plus" style=" padding-left:5px;"></i> <%log.money%><i class="fa fa-rmb" style=" padding-left:5px;"></i>
            <%/if%>
            <%if log.acttype==1%>
               <%log.credit%><i class="fa fa-database" style=" padding-left:5px;"></i>
            <%/if%>
    
            <%if log.acttype==2%>
               <%log.money%><i class="fa fa-rmb" style=" padding-left:5px;"></i>
            <%/if%><%if log.goodstype==0%>
                <span style='font-size:12px;'>
				<%if log.isverify==1 && log.storeid==0%>请选择门店<%/if%>
	        <%if log.isverify==0 && log.addressid==0%>请选择地址<%/if%>
		
				</span>	<%/if%>
            </div>
             <div class="result">
			 <!-- han type=0 && status=3 添加查询物流、确认收货按钮，添加状态4，确认收货-->
	   <%if log.goodstype==0%>
                <%if log.type==0%>
                    <%if log.status==2%>兑奖码: <%log.eno%><%/if%>
                    <%if log.status==3%>成功兑换~<button type='button' class='btn btn-default ex1' onclick='express_find(this,"<%log.id%>")'  style="padding:2px 5px;">查看物流</button><button type='button' class='btn btn-default ex1' onclick='confirm_receipt("<%log.id%>")'  style="padding:2px 5px;">确认收货</button><%/if%>
                    <%if log.status==4%>已收货~<button type='button' class='btn btn-default ex1' onclick='express_find(this,"<%log.id%>")'  style="padding:2px 5px;">查看物流</button><%/if%>
                <%else%>
                    <%if log.status==1%>未中奖~<%/if%>
                    <%if log.status==2%>兑奖码: <%log.eno%><%/if%>
                    <%if log.status==3%>已兑换~<%/if%>
                <%/if%>
				<%else%>
				   <%if log.status==1%>未中奖~<%/if%>
                    <%if log.status==3%>优惠券已发放~<%/if%>
				<%/if%>
            </div>
        </div>
    </div>
<%/each%>
</script>
<!-- han 20170401 -->
<!-- 查看物流 -->
<div id="modal-express" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true" style="width:auto;margin:0px auto;">
    <div class="modal-dialog">
      <div class="modal-content" >
        <div class="modal-header" style="padding:0 15px;"><button aria-hidden="true" data-dismiss="modal" class="close" type="button">×</button><h3>查看物流</h3></div>
        <div class="modal-body" style='max-height:500px;overflow: auto;' >
          <div class="form-group">
            <p class='form-control-static' id="module-menus-express"></p>
          </div>
        </div>
        <div class="modal-footer"><a href="#" class="btn btn-default" data-dismiss="modal" aria-hidden="true">关闭</a></div>
      </div>
    </div>
</div>
<script language='javascript'>
// han 20170331 express_find
 function express_find(btn,orderid){
    $(btn).button('loading');
    $.ajax({
      url: "{php echo $this->createPluginMobileUrl('creditshop/log',array('op'=>'deal','to' => 'express'));}&id="+ orderid,
      cache:false,
      success:function(html){
        $('#module-menus-express').html(html);
        $('#modal-express').modal();
        $(btn).button('reset');
      }
    })
  }
  function confirm_receipt(orderid){
    $.ajax({
      url: "{php echo $this->createPluginMobileUrl('creditshop/log',array('op'=>'receipt'));}&id="+ orderid,
      cache:false,
      success:function(html){
        location.reload();
      }
    })
  }
  // han end
    var page= 1;
 
    require(['tpl', 'core'], function(tpl, core) {
       
        core.pjson('creditshop/log',{},function(json){

                     
                     $('#container').html(  tpl('tpl_main',json.result) );
                     
                     if(json.result.total<=0){
                        $('#container_list').html(  tpl('tpl_empty') );
                     }else{
                           $('#container_list').html(  tpl('tpl_list',json.result) );
                     }
  
                {if $_GPC['shine']==1}
                     var first = $('.record_line:first-child');
                     if(first.length>0){
                         first.animate({backgroundColor:'#ff0'},300,null,function(){
                               first.animate({backgroundColor:'#fff'},200);
                         });
                     }
                {/if}
if (json.result.list.length < json.result.pagesize) {
                            return;
                     }
                
                     var loaded = false;
                      var stop=true; 
                      $(window).scroll(function(){ 
                          if(loaded){ 
                              return;
                          }
                            totalheight = parseFloat($(window).height()) + parseFloat($(window).scrollTop()); 
                            if($(document).height() <= totalheight){ 
                                
                                if(stop==true){ 
                                    stop=false; 
                                    $("#container_list").append('<div id="log_loading"><i class="fa fa-spinner fa-spin"></i> 正在加载...</div>');
                                    page++;
                                    core.pjson('creditshop/log', {page:page}, function(morejson) {  
                                        stop = true;
                                        $('#log_loading').remove();
                                        $("#container_list").append(tpl('tpl_list', morejson.result));
                                        bindEvents();
                                        if (morejson.result.list.length <morejson.result.pagesize) {
                                          
                                            $('#container_list').append('<div id="log_loading">已经加载完全部记录</div>');
                                            loaded = true;
                                            $(window).scroll = null;
                                            return;
                                        }
                                    },true); 
                                } 
                            } 
                        });
            
                  
              
                     
         },true);
   });
</script>
{template 'common/footer'}
