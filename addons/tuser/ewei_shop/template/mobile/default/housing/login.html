ction time(year,month,day,hour,minute,second) {	var leftTime = (new Date(year,month-1,day,hour,minute,second)) - (new Date()); //计算剩余的毫秒数  var days = parseInt(leftTime / 1000 / 60 / 60 / 24 , 10); //计算剩余的天数   var hours = parseInt(leftTime / 1000 / 60 / 60 % 24 , 10); //计算剩余的小时   var minutes = parseInt(leftTime / 1000 / 60 % 60, 10);//计算剩余的分钟   var seconds = parseInt(leftTime / 1000 % 60, 10);//计算剩余的秒数   days = checkTime(days);  hours = checkTime(hours);  minutes = checkTime(minutes);  seconds = checkTime(seconds);   setInterval("time(2017,11,9,14,00,00)",5000);   document.getElementById("date").innerHTML = '距离验证结束：'+days+"天" + hours+"小时" + minutes+"分"+seconds+"秒"; }time('2017','11','9','14','00','00'); function checkTime(i){ //将0-9的数字前面加上0，例1变为01  if(i<10)  { i = "0" + i; } return i;}function really(){    var a=document.getElementById('register');    document.getElementById('bx').style.display='none';    a.style.display='block';}function age(num){    birth=num.substring(6, 14);    return birth;};$('#f').blur(function(){    if(yz($(this).val())){    var ages=age($(this).val());    $('.fz').css('color','');    $('#t').val(ages);    }else{    $('.fz').css('color','red');    }})function yz(sId){    if(!/^\d{17}(\d|x)$/i.test(sId)){        return false;    }else{        return true;    }}function submit(){		    var n=$('input[name=name]').val();    var d=$('input[name=documents]').val();    var m=$('input[name=mobile]').val();//  if(n == '' || d=='' || m==''){

//  }    $('.mo').css('color','');    if(m.length!=11){    	    $('.mo').css('color','red');    	return false;    }        $.post("{php echo mobileUrl('login')}",    	{'name':n,'documents':d,'mobile':m},function(sourrce){        // alert(sourrce);        console.dir(sourrce);            })    }</script></html>
