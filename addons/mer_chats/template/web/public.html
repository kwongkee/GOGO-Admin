<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>配置公众号</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="stylesheet" href="../addons/mer_chats/static/web/css/layui.css"  media="all">
    <link rel="stylesheet" href="../addons/mer_chats/static/web/css/style.css"  media="all">
    <style>
        .layui-form-label{
            width: 95px;
        }
        .layui-form-checkbox[lay-skin=primary] span{
            padding-left: 25px;
        }
        .layui-form-item .layui-form-checkbox[lay-skin=primary]{
        	width: 100%;;
        }
    </style>
</head>
<body>
<form class="layui-form" action="" id="forms">

    <div class="layui-form-item" pane="">
        <label class="layui-form-label">公众号选择：</label>
        <div class="layui-input-block">
            {loop $publics $index $item}
                <input type="checkbox" name="public[{$item['uniacid']}]" {if in_array($item['uniacid'],$upublic)} checked {/if} lay-skin="primary" title="{$item['name']}">
            {/loop}
        </div>
    </div>

    <input type="hidden" name="uid" value="{$uid}">
    <input type="hidden" name="username" value="{$uname}">

    <div class="layui-form-item" style="float: left; clear: none;">
        <div class="layui-input-block">
            <button type="reset" class="layui-btn layui-btn-primary">重置</button>
        </div>
    </div>
    
</form>

<div class="layui-form-item" style="float: left; clear: none;">
    <div class="layui-input-block" style="margin-left: 50px;">
        <button class="layui-btn" onclick="submis()">立即提交</button>
    </div>
</div>

<script src="../addons/mer_chats/static/web/layui.js"></script>
<script src="../addons/mer_chats/static/js/jquery.min.js"></script>
<script>
    layui.use(['form', 'layedit', 'laydate'], function(){
        var form = layui.form
            ,layer = layui.layer
            ,layedit = layui.layedit
            ,laydate = layui.laydate;

        //表单赋值
        layui.$('#LAY-component-form-setval').on('click', function(){
            form.val('example', {
                "like[checkbox]": true //复选框选中状态
            });
        });

    });

    function submis() {
        var formData = $('#forms').serialize();
        var urls = "{php echo WebUrl('mer_chats/public',array('m' => 'mer_chats','do'=>'index', 'p'=>'editpublic'))}";
        $.ajax({
            url:urls,
            type:'POST',
            data:formData,
            success:function(res) {
                var red = JSON.parse(res);
                if(red.code != 1) {
                    layer.msg(red.msg);
                    return false;
                }
                layer.msg(red.msg);
                setTimeout(function(){
                    layer.closeAll();
                    window.location.reload();
                },1200)
            }
        })
    }



</script>
