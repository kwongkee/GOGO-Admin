<script type="text/javascript">

    var urls = "{php echo WebUrl('mcs',array('m' => 'mer_chats','do'=>'index'))}";
    //     加载layui.js
    layui.use(['element','layer'],function(){
        var element = layui.element;
        $ = layui.jquery;
        layer = layui.layer;

        // 初始化菜单高度
        resetMenuHeight();
    })

    // 重新设置页面高度
    function resetMenuHeight()
    {
        var height = document.documentElement.clientHeight - 50;
        // 设置菜单高度
        $('#menu').height(height);
    }

    // 设置iframe 高度
    function resetMainHeight(obj)
    {
        // 获取父级的高度
        var height = parent.document.documentElement.clientHeight - 55;
        // 给当前父级div重置高度
        $(obj).parent('div').height(height);
    }

    // 点击对应菜单跳转打开iframe
    function menuFire(obj)
    {
        let src = $(obj).attr('src');
        $('iframe').attr('src',src);
    }


    // 退出登陆
    function logOut()
    {
        // 使用$.get请求退出
        layer.confirm('您确定退出吗？',{
            icon:2,
            btn:['确定','取消']
        },function(){
            $.get("/index.php/admin/account/logOut",{},function(res){
                if(res.code == 1) {
                    layer.msg(res.msg,{icon:1});
                    setTimeout(function(){
                        window.location.href = '/index.php/admin/account/login';
                    },1000);
                } else {
                    layer.msg(res.msg,{icon:2});
                }
            });
        })
    }

</script>
