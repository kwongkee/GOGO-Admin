
{template 'web/link'}
<style>
    .layui-table thead tr{
        background-color:#ecf6fc;
    }
    .layui-table thead tr th{
        color: #1b7ab6;
    }
    .layui-input-block {
        margin-left: 0;
        min-height: 5px;
    }
    hr{
        margin: 41px 0 0;
    }
    .pagination{
        margin: 10px 0px;display: inline-block;
        padding-left: 0px;
        border-radius: 4px;
    }

    .pagination>li:first-child>a,.pagination>li:first-child>span
    {
        margin-left: 0px;border-top-left-radius: 4px;border-bottom-left-radius: 4px;
    }
    .pagination>li>a,.pagination>li>span
    {
        background-color: #FFF;border: 1px solid #DDD;color: inherit;float: left;line-height: 1.42857;
        margin-left: 1px;padding: 4px 10px;position: relative;text-decoration: none;
    }
    .pagination>.active>a,.pagination>.active>span,.pagination>.active>a:hover,.pagination>.active>span:hover,.pagination>.active>a:focus,.pagination>.active>span:focus
    {
        background-color: #1ab394;border-color: #1ab394;color: #fff;cursor: default;z-index: 2;
    }
    .pagination>li{display: inherit;text-align: -webkit-match-parent;float: left;width: auto;text-align: center;font-size: 14px;}

    .shopUrl{
        width: 100%;
        height: 34px;
        border: 1px solid skyblue;
        -webkit-border-radius: 3px;
        -moz-border-radius: 3px;
        border-radius: 3px;
        padding: 0px 5px 0px 5px;
    }
</style>
<!-- 内容主体区域 -->
<div style="padding: 15px;">
    <div class="laytitle"><span>商户公众号列表</span></div>
    <hr class="layui-bg-blue">

    <div class="layui-form">
        <table class="layui-table">
            <thead>
            <tr>
                <th>公众号名称</th>
                <th>公众号账号</th>
                <th>原始ID</th>
                <th>AppId</th>
                <th>AppSecret</th>
                <th>网络店铺地址(可编辑)</th>
            </tr>
            </thead>
            <tbody>
            {loop $puconfig $inx $itm}
            <tr>
                <td>{$itm['public']}</td>
                <td>{$itm['account']}</td>
                <td>{$itm['original']}</td>
                <td>{$itm['AppId']}</td>
                <td>{$itm['AppSecret']}</td>
                <td style="padding: 1px;">
                    <input type="text" value="{$itm['shopUrl']}" class="shopUrl" onchange="changes(this,{$itm['id']})">
                </td>
            </tr>
            {/loop}
            </tbody>
        </table>

        <div  style="text-align: center;" id="pager">
            {$pager}
        </div>

    </div>
</div>

<script>
    layui.use('layer', function(){ //独立版的layer无需执行这一句
        var $ = layui.jquery, layer = layui.layer; //独立版的layer无需执行这一句
    });

    // 修改网络商铺地址
    function changes(obj,id) {

        var urls = "{php echo WebUrl('mer_chats',array('m' => 'mer_chats','do'=>'index', 'p'=>'editshopurl'))}";
        $.ajax({
            url:urls,
            type:'POST',
            data:{
                id:id,val:$(obj).val()
            },success:function(red){
                var res = JSON.parse(red);
                if(res.code != 1) {
                    layer.msg(res.msg,{icon:2});
                    return false;
                }
                layer.msg(res.msg,{icon:1});
            }
        });
    }

</script>


<script>
    layui.use(['form', 'layedit', 'laydate'], function(){
        var form = layui.form
            ,layer = layui.layer
            ,layedit = layui.layedit
            ,laydate = layui.laydate;

        //表单赋值
        layui.$('#LAY-component-form-setval').on('click', function(){
            form.val('example', {
                "like[checkbox]": true //复选框选中状态
            });
        });

    });

</script>
