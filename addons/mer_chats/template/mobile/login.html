{template '_head'}
<body>
<div class="top">
    <div class="loginbg"><img src="../addons/mer_chats/static/images/logo.png" alt=""></div>
</div>
<div class="warrp">
    <div class="content">
        <form action="" id="form">
            <div class="login-sel">
                商户类型：
                <select name="CusType" id="CusType">
                    <option value="buss_in_china">中国境内商户</option>
                    <option value="buss_over_china">中国境外商户</option>
                    <option value="indi_in_china">中国境内个人</option>
                    <option value="indi_outs_china">中国境外个人</option>
                </select>
            </div>
            <div class="login-input">
                <span id="inpmt">手机号码：</span>
                <input id="inpm" name="phone" type="text" placeholder="请输入手机号码">
            </div>
            <div class="login-input">&nbsp;&nbsp;
                验证码： <input type="text" name="yzm" maxlength="6" placeholder="请输入验证码" style="width: 40%;">
                <button id="yzm" type="button" class="zbox-btn zbox-btn-blue zbox-btn-outlined code fr">获取验证码</button>
            </div>
            <div class="login-btn">
                <button id="submit" type="button" class="zbox-btn zbox-btn-blue zbox-btn-outlined login">登&nbsp;&nbsp;录</button>
            </div>
            <div class="login-text">还没有账号？ <a href="{php echo url('entry',array('do'=>'register','m'=>'mer_chats'))}">立即注册<img src="../addons/mer_chats/static/images/row.png" alt="" style="position: relative; top: 3px;"></a></div>
        </form>
    </div>
</div>

<div class="foot">
    <p>版权所有 © Gogo|購購網    粤ICP备09003656号 </p>
    <p>中国海关注册编码：44289609SL   跨境电商平台备案：C011000000332982</p>
</div>

<script>

    var maxtime = 60; //倒计时60秒
    function CountDown() {
        if (maxtime >= 1) {
            msg = maxtime+"秒后获取";
            $('#yzm').text(msg);
            $('#yzm').attr("disabled",true);
            --maxtime;
        } else {
            clearInterval(timer);
            $('#yzm').text('获取验证码');
            $('#yzm').attr("disabled",false);
        }
    }

    // 选择商户类型
    $('#CusType').change(function() {
        switch ($(this).val()) {
            case 'buss_in_china': // 中国境内商户
                $('#inpmt').html('手机号码：');
                $('#inpm').attr('name','phone')
                $('#inpm').attr('placeholder','请输入手机号码')
                break;

            case 'buss_over_china'://中国境外商户
                $('#inpmt').html('电子邮箱：');
                $('#inpm').attr('name','email')
                $('#inpm').attr('placeholder','请输入电子邮箱')
                break;

            case 'indi_in_china'://中国境内个人
                $('#inpmt').html('手机号码：');
                $('#inpm').attr('name','phone')
                $('#inpm').attr('placeholder','请输入手机号码')
                break;

            case 'indi_outs_china'://中国境外个人
                $('#inpmt').html('电子邮箱：');
                $('#inpm').attr('name','email')
                $('#inpm').attr('placeholder','请输入电子邮箱')
            break;
        }
    })


    // 获取验证码
    $('#yzm').click(function() {

        var names = $('#inpm').attr('name');
        var val  = $('#inpm').val();
        if(val == null) {
            $.DialogByZ.Alert({Title: "提示", Content: '请输入手机号码或电子邮箱',BtnL:"确定",FunL:alerts})
            return false;
        }

        // 获取验证码地址
        var urls = "{php echo url('entry',array('do'=>'Loginyzm','m'=>'mer_chats'))}";
        // Ajax  获取验证码
        $.ajax({url:urls, type:'POST',
            data:{
                'type':names,// 类型 手机，邮箱
                'val':val,// 值
            },
            success:function(req) {
                var res = JSON.parse(req);
                // 获取成功改变按钮
                if(!res.code) {
                    $.DialogByZ.Alert({Title: "提示", Content: res.msg,BtnL:"确定",FunL:alerts})
                    return false;
                }

                $.DialogByZ.Alert({Title: "提示", Content: res.msg,BtnL:"确定",FunL:alerts})

                timer = setInterval("CountDown()", 1000);
            }
        });

    });

    // 登陆
    $('#submit').click(function() {

        var formData = $('#form').serialize();
        var forms    = $('#form').serializeArray();

        if(forms[1].value == '') {
            $.DialogByZ.Alert({Title: "提示", Content: "请输入手机号码或电子邮箱",BtnL:"确定",FunL:alerts})
            return false;
        }

        if(forms[2].value == '') {
            $.DialogByZ.Alert({Title: "提示", Content: "请输入验证码",BtnL:"确定",FunL:alerts})
            return false;
        }

        // 获取验证码地址
        var urls = "{php echo url('entry',array('do'=>'Login','m'=>'mer_chats'))}";
        // Ajax  获取验证码
        $.ajax({url:urls, type:'POST',
            data:formData,
            success:function(red) {
                // 获取成功改变按钮
                var req = JSON.parse(red);
                console.log(req)
                if(!req.code) {
                    $.DialogByZ.Alert({Title: "提示", Content: req.msg,BtnL:"确定",FunL:alerts})
                    return false;
                }

                setTimeout(function() {
                    window.location.href = "{php echo url('entry',array('do'=>'index','p'=>'index','m'=>'mer_chats'))}";
                },1200);
            }
        });
    })


    /*提示框*/
    $("#alertBtn").click(function(){
        $.DialogByZ.Alert({Title: "提示", Content: "您的请求失败",BtnL:"确定",FunL:alerts})
    })
    function alerts(){

        $.DialogByZ.Close();
    }
</script>
</body>
</html>
