{template '_headers'}

<div class="warp">
    <div class="container">
        <form action="" id="forms">
            <div class="shop-input">
                角色名称： <input type="text" name="roleName" value="{$role['roleName']}" placeholder="请输入角色名称">
            </div>
            <div class="shop-sel">
                角色权限：
                <select name="rolePermiss" id="rolePermiss">
                    <option value="rw" {if $role['rolePermiss'] == 'rw'} selected {/if}>可读可写</option>
                    <!--option value="w" {if $role['rolePermiss'] == 'w'} selected {/if}>可读禁写</option-->
                    <option value="n" {if $role['rolePermiss'] == 'n'} selected {/if}>禁读禁写</option>
                </select>
            </div>
            <input type="hidden" name="method" value="edit">
            <input type="hidden" name="id" value="{$role['id']}">
            <input type="hidden" name="uid" value="{$role['uid']}">
            <input type="hidden" name="oldName" value="{$role['roleName']}">
            <div class="login-btn">
                <button id="alertBtn" type="button" class="zbox-btn zbox-btn-blue zbox-btn-outlined login">提交</button>
            </div>

        </form>
    </div>

</div>

<script>
    $('#alertBtn').click(function(){
        var urls = "{php echo url('entry',array('do'=>'index','p'=>'roledoadd','m'=>'mer_chats'))}";
        var formData = $('#forms').serialize();
        $.ajax({
            url:urls,
            type:'POST',
            data:formData,
            success:function(res) {
                // 获取成功改变按钮
                var red = JSON.parse(res);
                console.log(red);
                if(red.code != 1) {
                    $.DialogByZ.Alert({Title: "提示", Content: red.msg,BtnL:"确定",FunL:alerts})
                }

                $.DialogByZ.Alert({Title: "提示", Content: red.msg,BtnL:"确定",FunL:alerts})
                setTimeout(function(){
                    window.history.go(-1);
                },1200);
            }
        });
    });
</script>
{template '_footers'}
