<!DOCTYPE html PUBLIC "-//WAPFORUM//DTD XHTML Mobile 1.0//EN" "http://www.wapforum.org/DTD/xhtml-mobile10.dtd">

<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
<meta http-equiv="Cache-Control" content="no-cache"/>
<title>找回密码 - {$config['webtitle']}</title>
<meta content="width=device-width, initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no" name="viewport" />
<meta name="MobileOptimized" content="240" />
<meta http-equiv="Expires" content="0" />
<meta http-equiv="Cache-Control" content="no-cache" />
<meta http-equiv="Pragma" content="no-cache" />
<meta content="yes" name="apple-mobile-web-app-capable" />
<meta content="black" name="apple-mobile-web-app-status-bar-style" />
<link rel="stylesheet" href="{$templateurl}css/yun_wap_member.css" type="text/css"/>
<link rel="stylesheet" href="{$templateurl}css/wap_css.css" type="text/css"/>
<script src="{$templateurl}js/jquery-1.8.0.min.js" language="javascript"></script>
<script>
	function phone_ckd(){					
		var mobile_code = document.getElementById('mobile_code').value;
		if (mobile_code == ""){
			alert("手机验证码不能为空!");
			document.getElementById('mobile_code').focus();
			return false; 
		}
	}
	
	//获取手机验证码
	function get_mobile_code(pcode){
		$.post('{$url_sms}', {mobile:jQuery.trim($('#mobile').val()),send_code:pcode}, function(msg) {
			alert(jQuery.trim(unescape(msg)));
			if(msg=='请求成功'){
				RemainTime();
			}
		});
	};
	var iTime = 59;
	var Account;
	function RemainTime(){
		document.getElementById('zphone').disabled = true;
		var iSecond,sSecond="",sTime="";
		if (iTime >= 0){
			iSecond = parseInt(iTime%60);
			iMinute = parseInt(iTime/60)
			if (iSecond >= 0){
				if(iMinute>0){
					sSecond = iMinute + "分" + iSecond + "秒";
				}else{
					sSecond = iSecond + "秒";
				}
			}
			sTime=sSecond;
			if(iTime==0){
				clearTimeout(Account);
				sTime='获取验证码';
				iTime = 59;
				document.getElementById('zphone').disabled = false;
			}else{
				Account = setTimeout("RemainTime()",1000);
				iTime=iTime-1;
			}
		}else{
			sTime='没有倒计时';
		}
		document.getElementById('zphone').value = sTime;
	}
</script>
</head>

<body>
<div class="body_wap">
<header>
  <div class="header_bg"> <a class="hd-lbtn" href="{$urlt}"><i class="header_top_l iconfont"></i></a>
    <div class="header_h1">验证身份</div>
  </div>
</header>




<div class="password_box">
  <div class="password">
     
    
    
  <div class="password_cont " style="" id="step3_moblie">
    <div class="password_list m10">
      <div class="password_list_s"> 我们将向您的绑定手机<span class="password_list_s_c"  id="step3_moblie_halt">{$username}</span>发送验证码短信</div>
    </div>
	<form action="{$urlt}" method="post" enctype="multipart/form-data" class="js-ajax-form" onSubmit="return phone_ckd();">
	<input type="hidden" name="token" value="{$_W['token']}" />
	<input type="hidden" name="op" value="{$op}" />
	<input type="hidden" name="type" value="moblie" />
	<input id="mobile" name="phone" type="hidden" value="{$_GPC['phone']}" >
	{if $config['sms_open']}
    <ul class="password_cont_box">
      <li class="password_cont_box_list"><span class="password_cont_box_list_s">验证码：</span>
        <div class="password_cont_box_p">
          <input type="text" value="" placeholder="请输入手机验证码" class="password_list_text_new" id="mobile_code" name="mobile_code" maxlength="6">
        </div>
      </li>
      <li class="password_cont_box_list">
        <div class="password_cont_box_p step3_moblie_timer">如需从新发送，请
		<input id="zphone" type="button" value="点击免费获取 " onClick="get_mobile_code({$_SESSION['send_code']});" class="password_a_dj" style="border:1px solid #FFFFFF; background-color:#FFFFFF;">
		</div>
      </li>
    </ul>
	<div class="password_list m15">
      <input name="uid" type="hidden" value="{$_GPC['uid']}" />
      <input type="submit" name="do_submit" value="下一步" class="password_list_bth" >
    </div>
	{else}
	<div class="password_list m10">
      <div class="password_list_s"> 抱歉！网站还<span class="password_list_s_c"  id="step3_moblie_halt">未开启</span>短信验证</div>
    </div>
	{/if}
	
	</form>
  </div>
  
 
  <div class="password_tip">
    <div class="password_tip_t">温馨提示：</div>
    <div>如手机号码已丢失且未绑定邮箱</div>
    <div>请拨打全国统一服务热线</div>
    <div class="password_tip_tel">{$config['telephone']}</div>
	{if $config['telephone']}
    <div class="password_tip_tel_link"><a href="tel:{$config['telephone']}"><i class="password_tip_tel_link_tel"></i>拨打</a></div>
	{/if}
  </div>
  
</div>
</div>
</div>

</body>
</html>
