
<!doctype html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0 user-scalable=no">
	<meta name="format-detection" content="telephone=no" />
	<title>VIP续费 - {$config['webtitle']}</title>
	<link href="{$templateurl}css/foxui.min.css" rel="stylesheet" type="text/css" />
</head>	
<body ontouchstart>

<div class='fui-page-group '>
<style>
			
	.fui-according-header{
		font-size: .7rem;
	}
	.fui-according-header .text{
		color: #666666;
		font-size: .65rem;
		text-align: right;
	}
	.fui-cell-group.recharge{
		padding:.6rem 0 ;
	}
	.fui-cell-group.recharge .fui-cell{
		padding:0;
		font-size: .6rem;
		height:1rem;
		line-height:1rem;
	}
	.fui-cell-group.recharge .fui-cell .fui-cell-text{
		color: #666;
	}
	.fui-cell-group.recharge .fui-cell:before{display: none}
	.fui-cell-group.recharge:before{
		content: " ";
		position: absolute;
		left: 0;
		right: 0;
		top: 0;
		height: 1px;
		border-top: 1px solid #ebebeb;
		color: #D9D9D9;
		-webkit-transform-origin: 0 0;
		-ms-transform-origin: 0 0;
		transform-origin: 0 0;
		-webkit-transform: scaleY(0.5);
		-ms-transform: scaleY(0.5);
		transform: scaleY(0.5);
	}
	.fui-according.expanded .fui-according-header .text{
		filter:alpha(opacity=0);
		-moz-opacity:0;
		-khtml-opacity: 0;
		opacity: 0;
	}
	.fui-cell-group .fui-cell .fui-cell-icon {
		width: auto;
		margin-right: .75rem;
	}
	.fui-cell-group .fui-cell .fui-cell-icon img {
		width: 1.7rem;
		height: 1.7rem;
	}
	.fui-cell-info .title {
		position: relative;
		font-size: 0.7rem;
		color: #000;
		white-space: nowrap;
		text-overflow: ellipsis;
		overflow: hidden;
		height: 1rem;
		line-height: 1rem;
	}
	.fui-cell.applyradio{
		height: 3.25rem;padding: .4rem .6rem;
	}
	.fui-cell.applyradio .fui-cell-info{
		display: -webkit-box;
		display: -webkit-flex;
		display: -ms-flexbox;
		display: flex;
		height: 100%;
		-webkit-box-orient: vertical;
		-webkit-flex-direction: column;
		-ms-flex-direction: column;
		flex-direction: column;
		-webkit-box-pack: justify;
		-ms-flex-pack: justify;
		-webkit-justify-content: space-around;
		justify-content: space-around;
	}
</style>
<div id="agreement" class='fui-page fui-page-current' >
    <div class="fui-header">
		<div class="fui-header-left">
			<a class="back" href="{php echo $this->createMobileUrl('m_index');}"></a>
		</div>
		<div class="title">VIP服务</div> 
		<div class="fui-header-right">&nbsp;</div>
    </div>   
    <div style="clear:both; height:50px;"></div>
    <div class="xufeisjj">
        <h1>续费/购买延长VIP有效期<a href="javascript:void(0);" onClick="ckshow()">服务协议 ></a></h1>
		{loop $level_list $key $value}
        <FONT><h2>{$value[level_name]} <span>{$value['level_validity']}</span> 天  <span>{$value['level_price']}</span> 元</h2><a href="{$urlt}&op=show&id={$value['id']}">下单</a></FONT>
		{/loop}
    </div>
</div> 


<!--协议 start-->
<script>
	//显示
	function ckshow(){
		document.getElementById("agreement").style.display = "none";
	  	document.getElementById("agreement1").style.display = "block";
	}
	//关闭
	function ckclose(){
		document.getElementById("agreement").style.display = "block";
	  	document.getElementById("agreement1").style.display = "none";
	}
</script>
<div id="agreement1" class='fui-page  fui-page-current article-index-page' style="background:#fff; display:none;">

	<div class="fui-header">
		<div class="fui-header-left">
			<a href="javascript:void(0);" onClick="ckclose()" class="back"></a>
		</div>
		<div class="title">服务协议</div> 
		<div class="fui-header-right">&nbsp;</div>
    </div>
	<div class='fui-content'>
		<div class="fui-article-page" style="padding:10px 12px;">				
			<div class="fui-article-content">{php echo html_entity_decode($config['vipfwxieyi']);}</div>
		</div>
	</div>
	
</div> 
<!--协议 end-->
</div>
	
</body>
</html>
