{template 't_theclass_header'}            
         
		 {if $_GPC['ob'] === 'add'}
		 <!--编辑器 start-->
		<script type="text/javascript" charset="utf-8" src="../addons/{$_GPC['m']}/ueditor/ueditor.config.js"></script>
        <script type="text/javascript" charset="utf-8" src="../addons/{$_GPC['m']}/ueditor/ueditor.all.min.js"> </script>
        <script type="text/javascript" charset="utf-8" src="../addons/{$_GPC['m']}/ueditor/lang/zh-cn/zh-cn.js"></script>
        <!--函数插件-->
        <script type="text/javascript" charset="utf-8" src="../addons/{$_GPC['m']}/ueditor/kityformula-plugin/addKityFormulaDialog.js"></script>
        <script type="text/javascript" charset="utf-8" src="../addons/{$_GPC['m']}/ueditor/kityformula-plugin/getKfContent.js"></script>
        <script type="text/javascript" charset="utf-8" src="../addons/{$_GPC['m']}/ueditor/kityformula-plugin/defaultFilterFix.js"></script>
        <!--编辑器 end-->
		  <!--添加 start-->
		  <div class="fabutz">
		  	<script>
			function checkinfo() {
				var titlename = document.formpt.titlename.value;
				if (titlename == ""){
					alert("通知标题不能为空!");
					document.formpt.titlename.focus();
					return false; 
				}
			}
			</script>
          	<form name="formpt" action="{$urltk}" method="post" class='form-ajax' onSubmit="return checkinfo(this);" enctype="multipart/form-data" >
  			<input type="hidden" name="token" value="{$_W['token']}" />
			<input type="hidden" name="op" value="{$op}" />
            	<input type="text" name='titlename' value="" placeholder="填写通知标题"/>
                <textarea name="infotext" id="infotext"></textarea>
				<input type="submit" name="add_submit" value="发  布" class='button' >
            </form>
            <script type="text/javascript">
				var editor = new UE.ui.Editor();
				editor.render("infotext");
			</script>
          </div>
		  	
		 {else} 
		 <style type="text/css">
		 .fayitdt {border-radius:3px; margin-top:3px; padding:1px 5px; background-color:#F2896F; margin-left:5px;}
		 </style>
         <a class="fayit" href="{$urltk}&op={$op}&ob=add">发布一条新通知</a>
         <div class="clear"></div>
 		 <div class="banjitongzhi">
		 	{if $list}
		    {loop $list $key $value}
			<a href="{php echo $this->createMobileUrl('bjnotice_show');}&id={$value['id']}">{$value['titlename']}<br /><i class="iconfont">&#xe63a;</i><span>{php echo date('Y-m-d H:i', $value['dateline']);}</span></a> 
			<a href="{$urltk}&op={$op}&ob=delete&tzid={$value['id']}" onclick="return confirm('本操作不可恢复，确认删除？');" style="text-align:right;" ><span class="fayitdt"><font color="#FFFFFF">删除</font></span></a>
			{/loop}
			{else}
			<div style="padding-top:20px;padding-bottom:20px; text-align:center;">抱歉！未找到相应数据！</div>
			{/if}  
         </div>
          
         <div class="pagelist" style="text-align:center;">{$pager}</div>
    	 {/if}
		  
{template 't_theclass_footer'}
