
<!doctype html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0 user-scalable=no">
        <meta name="format-detection" content="telephone=no" />
        <title>余额充值 - {$config['webtitle']}</title>
        <link href="{$templateurl}css/foxui.min.css" rel="stylesheet" type="text/css" />
    </head>

    <body ontouchstart>

		<div class='fui-page-group '>
            <style>
			
	.fui-according-header{
		font-size: .7rem;
	}
	.fui-according-header .text{
		color: #666666;
		font-size: .65rem;
		text-align: right;
	}
	.fui-cell-group.recharge{
		padding:.6rem 0 ;
	}
	.fui-cell-group.recharge .fui-cell{
		padding:0;
		font-size: .6rem;
		height:1rem;
		line-height:1rem;
	}
	.fui-cell-group.recharge .fui-cell .fui-cell-text{
		color: #666;
	}
	.fui-cell-group.recharge .fui-cell:before{display: none}
	.fui-cell-group.recharge:before{
		content: " ";
		position: absolute;
		left: 0;
		right: 0;
		top: 0;
		height: 1px;
		border-top: 1px solid #ebebeb;
		color: #D9D9D9;
		-webkit-transform-origin: 0 0;
		-ms-transform-origin: 0 0;
		transform-origin: 0 0;
		-webkit-transform: scaleY(0.5);
		-ms-transform: scaleY(0.5);
		transform: scaleY(0.5);
	}
	.fui-according.expanded .fui-according-header .text{
		filter:alpha(opacity=0);
		-moz-opacity:0;
		-khtml-opacity: 0;
		opacity: 0;
	}
	.fui-cell-group .fui-cell .fui-cell-icon {
		width: auto;
		margin-right: .75rem;
	}
	.fui-cell-group .fui-cell .fui-cell-icon img {
		width: 1.7rem;
		height: 1.7rem;
	}
	.fui-cell-info .title {
		position: relative;
		font-size: 0.7rem;
		color: #000;
		white-space: nowrap;
		text-overflow: ellipsis;
		overflow: hidden;
		height: 1rem;
		line-height: 1rem;
	}
	.fui-cell.applyradio{
		height: 3.25rem;padding: .4rem .6rem;
	}
	.fui-cell.applyradio .fui-cell-info{
		display: -webkit-box;
		display: -webkit-flex;
		display: -ms-flexbox;
		display: flex;
		height: 100%;
		-webkit-box-orient: vertical;
		-webkit-flex-direction: column;
		-ms-flex-direction: column;
		flex-direction: column;
		-webkit-box-pack: justify;
		-ms-flex-pack: justify;
		-webkit-justify-content: space-around;
		justify-content: space-around;
	}
</style>
<div class='fui-page fui-page-current'>
    <div class="fui-header">
		<div class="fui-header-left">
			<a class="back" href="{$returnurl}"></a>
		</div>
		<div class="title">账户充值</div> 
		<div class="fui-header-right">&nbsp;</div>
    </div>
    <div class='fui-content navbar' >
		<form method="post" action="{$payurl}" class="form" >
		<input name="token" type="hidden" value="{$_W['token']}" />
		<input type="hidden" name="type" value="topup" />
		<div class='fui-cell-group'>
			<div class='fui-cell'>
				<div class='fui-cell-label'>当前余额</div>
				<div class='fui-cell-info c000'>￥{$profile['credit2']}</div>
			</div>
			<div class='fui-cell'>
				<div class='fui-cell-label'>充值金额</div>
				<div class='fui-cell-info c000'style="    display: -webkit-box;display: -webkit-flex;display: -ms-flexbox;display: flex;-webkit-box-align: center;-webkit-align-items: center;-ms-flex-align: center;align-items: center;">￥<input type='number' class='fui-input' id='money' name="paymoney" value="" placeholder="0.00" onKeyUp="value=value.replace(/[^\d.]/g,'')"></div>
			</div>
		</div>

		<input type="submit" name="dosubmit" value="确认支付" class='btn btn-danger mtop  block btn-pay' style="width:93%;">
		</form>
    </div>
	
	
</div> 


	
	

	
</body>
</html>
