<!DOCTYPE html PUBLIC "-//WAPFORUM//DTD XHTML Mobile 1.0//EN" "http://www.wapforum.org/DTD/xhtml-mobile10.dtd">

<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
<meta http-equiv="Cache-Control" content="no-cache"/>
<title>添加学生 - {$config['webtitle']}</title>
<meta http-equiv="description" content="" />
<meta name="renderer" content="webkit"/>
<meta http-equiv="X-UA-Compatible" content="IE=Edge,chrome=1"/>
<meta http-equiv="Cache-Control" content="no-siteapp" />
<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"/>
<meta name="description" content="" id="description"/>
<meta name="keywords" content=""/>
<link rel="stylesheet" href="{$templateurl}css/css.css" type="text/css"/>
<script src="{$templateurl}js/jquery-1.8.0.min.js" language="javascript"></script>
</head>

<body>
<div class="jrbn">
	<div class="topjrbj">
		<form action="./index.php" method="get">
		<input type="hidden" name="i" value="{$_GPC['i']}">
		<input type="hidden" name="c" value="{$_GPC['c']}">
		<input type="hidden" name="do" value="{$_GPC['do']}">
		<input type="hidden" name="m" value="{$_GPC['m']}">
		<input type="hidden" name="id" value="{$_GPC['id']}">
		<input type="hidden" name="op" value="{$_GPC['op']}">
		<input type="hidden" name="ob" value="{$_GPC['ob']}">
		<input type="text" name="keyword" value="{$_GPC['keyword']}" placeholder="请输入学生的编号" />
		<button><i class="iconfont">&#xe69b;</i></button>
		</form>
    </div>
    {if $list}
	{loop $list $key $value}
	<div class="bjssmr">
    	<h1>学生姓名：{$value['name']}</h1>       
        <h2>学生编号：{$value['usernumber']}</h2>
        <a href="{$urltk}&op={$op}&ob=xsadd&uid={$value['uid']}" onclick="return confirm('确认要添加该学生加入本班吗？');">添加进本班</a>
        <div class="clear"></div>
    </div>
	{/loop}
	{else}
		{if $keyword}
		<div class="bjssmr" style="padding-top:20px;padding-bottom:20px; text-align:center;">抱歉！未找到相应学生信息！</div>
		{else}
		<div class="bjssmr">
			<h1>添加方法</h1>
			<p><span>您可以使用如下方法进行加入班级</span><span>1、搜索学生编号进行加入。</span><span>2、学生编号在学生的会员中心可查看。</span></p>
			<div class="clear"></div>
		</div>
		{/if}
    {/if}
</div>
<div class="clear"></div>

<!--footer strat-->
{template 't_footer'}

</body>
</html>
