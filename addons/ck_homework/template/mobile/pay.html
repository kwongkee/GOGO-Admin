<html>

		<link href="{$templateurl}css/foxui.min.css" rel="stylesheet" type="text/css" />
	</head>

<body ontouchstart>

<div class='fui-page-group '>
<style>
	.fui-according-header{
		font-size: .7rem;
	}
	.fui-according-header .text{
		color: #666666;
		font-size: .65rem;
		text-align: right;
	}
	.fui-cell-group.recharge{
		padding:.6rem 0 ;
	}
	.fui-cell-group.recharge .fui-cell{
		padding:0;
		font-size: .6rem;
		height:1rem;
		line-height:1rem;
	}
	.fui-cell-group.recharge .fui-cell .fui-cell-text{
		color: #666;
	}
	.fui-cell-group.recharge .fui-cell:before{display: none}
	.fui-cell-group.recharge:before{
		content: " ";
		position: absolute;
		left: 0;
		right: 0;
		top: 0;
		height: 1px;
		border-top: 1px solid #ebebeb;
		color: #D9D9D9;
		-webkit-transform-origin: 0 0;
		-ms-transform-origin: 0 0;
		transform-origin: 0 0;
		-webkit-transform: scaleY(0.5);
		-ms-transform: scaleY(0.5);
		transform: scaleY(0.5);
	}
	.fui-according.expanded .fui-according-header .text{
		filter:alpha(opacity=0);
		-moz-opacity:0;
		-khtml-opacity: 0;
		opacity: 0;
	}
	.fui-cell-group .fui-cell .fui-cell-icon {
		width: auto;
		margin-right: .75rem;
	}
	.fui-cell-group .fui-cell .fui-cell-icon img {
		width: 1.7rem;
		height: 1.7rem;
	}
	.fui-cell-info .title {
		position: relative;
		font-size: 0.7rem;
		color: #000;
		white-space: nowrap;
		text-overflow: ellipsis;
		overflow: hidden;
		height: 1rem;
		line-height: 1rem;
	}
	.fui-cell.applyradio{
		height: 3.25rem;padding: .4rem .6rem;
	}
	.fui-cell.applyradio .fui-cell-info{
		display: -webkit-box;
		display: -webkit-flex;
		display: -ms-flexbox;
		display: flex;
		height: 100%;
		-webkit-box-orient: vertical;
		-webkit-flex-direction: column;
		-ms-flex-direction: column;
		flex-direction: column;
		-webkit-box-pack: justify;
		-ms-flex-pack: justify;
		-webkit-justify-content: space-around;
		justify-content: space-around;
	}
</style>
<div class='fui-page  fui-page-current article-index-page' style="background:#fff;">

	<div class="fui-header">
		<div class="fui-header-left">
			<a class="back" href="{$returnurl}"></a>
		</div>
		<div class="title">在线支付</div> 
		<div class="fui-header-right">&nbsp;</div>
    </div>
	<div class='fui-content'>
		
		<div class="fui-article-page" style="padding:10px 12px;">
			<div class="fui-article-content">{php $this->pay($params);}</div>
		</div>

	</div>
	
</div> 

</body>
