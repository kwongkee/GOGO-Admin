<!DOCTYPE html PUBLIC "-//WAPFORUM//DTD XHTML Mobile 1.0//EN" "http://www.wapforum.org/DTD/xhtml-mobile10.dtd">

<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
<meta http-equiv="Cache-Control" content="no-cache"/>
<title>手机号注册  - {$config['webtitle']}</title>
<meta content="width=device-width, initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no" name="viewport" />
<meta name="MobileOptimized" content="240" />
<meta http-equiv="Expires" content="0" />
<meta http-equiv="Cache-Control" content="no-cache" />
<meta http-equiv="Pragma" content="no-cache" />
<meta content="yes" name="apple-mobile-web-app-capable" />
<meta content="black" name="apple-mobile-web-app-status-bar-style" />
<link rel="stylesheet" href="{$templateurl}css/yun_wap_member.css" type="text/css"/>
<link rel="stylesheet" href="{$templateurl}css/wap_css.css" type="text/css"/>

<script src="{$templateurl}js/jquery-1.8.0.min.js" language="javascript"></script>
<script>
	function phone_ckd(){
		var tab = Number(document.formpt.tab.value);					
		var phone = document.p_register.phone.value;
		if(!(/^1[34578]\d{9}$/.test(phone))){ 
			alert("请输入有效的手机号码!");
			document.p_register.phone.focus();
			return false; 
		}
		var sms_open = document.p_register.sms_open.value;
		if(sms_open == 1){
			var mobile_code = document.p_register.mobile_code.value;
			if (mobile_code == ""){
				alert("手机验证码不能为空!");
				document.p_register.mobile_code.focus();
				return false; 
			}
		}
		var hzname = document.p_register.yname.value;
			if (yname == ""){
				alert("请填写您的姓名!");
				document.p_register.yname.focus();
				return false; 
			}
		var password = document.p_register.password.value;
		var newpassword = document.p_register.newpassword.value;
		if (password.length < 6){
			alert("密码不能少于6位!");
			document.p_register.password.focus();
			return false; 
		}
		if (newpassword != password){
			alert("确认密码与密码不一致！");
			document.p_register.newpassword.focus();
			return false; 
		}
		
		if(tab === 3){
			var hzname = document.p_register.hzname.value;
			if (hzname == ""){
				alert("请填写孩子姓名!");
				document.p_register.hzname.focus();
				return false; 
			}
			var hzphone = document.p_register.hzphone.value;
			if (hzphone == ""){
				alert("请填写孩子手机号!");
				document.p_register.hzphone.focus();
				return false; 
			}
		}
		
		if(document.getElementById("xieyi1").checked){
			return true;
		}else{
			alert("请阅读并同意注册协议！");
			document.p_register.xieyi1.focus();
			return false;
		}
	}
	
	//获取手机验证码
	function get_mobile_code(pcode){
		$.post('{$url_sms}', {mobile:jQuery.trim($('#mobile').val()),send_code:pcode}, function(msg) {
			alert(jQuery.trim(unescape(msg)));
			if(msg=='请求成功'){
				RemainTime();
			}
		});
	};
	var iTime = 59;
	var Account;
	function RemainTime(){
		document.getElementById('zphone').disabled = true;
		var iSecond,sSecond="",sTime="";
		if (iTime >= 0){
			iSecond = parseInt(iTime%60);
			iMinute = parseInt(iTime/60)
			if (iSecond >= 0){
				if(iMinute>0){
					sSecond = iMinute + "分" + iSecond + "秒";
				}else{
					sSecond = iSecond + "秒";
				}
			}
			sTime=sSecond;
			if(iTime==0){
				clearTimeout(Account);
				sTime='获取验证码';
				iTime = 59;
				document.getElementById('zphone').disabled = false;
			}else{
				Account = setTimeout("RemainTime()",1000);
				iTime=iTime-1;
			}
		}else{
			sTime='没有倒计时';
		}
		document.getElementById('zphone').value = sTime;
	}
	
	//阅读协议
	//显示
	function ck_zsd(){
		document.getElementById("xiyishow0").style.display = "none";
	  	document.getElementById("xiyishow1").style.display = "block";
	}
	//关闭
	function ckclose(){
		document.getElementById("xiyishow0").style.display = "block";
	  	document.getElementById("xiyishow1").style.display = "none";
	}
</script>
</head>

<body>
<div id="xiyishow0" class="body_wap">
<header>
  <div class="header_bg"> <a class="hd-lbtn" href="{php echo $this->createMobileUrl('registered');}"><i class="header_top_l iconfont"></i></a>
    <div class="header_h1">{if $tab == 2}老师{else}学生{/if}注册</div>
  </div>
</header>

<div class="yunwapreg_box">
  <section class="list">
  <article>
    <div class="regform">
      <ul class="regtab">
        <li class="current"><a style="display:block;">手机号注册</a></li>
      </ul>
      <form name="p_register" action="{$urltk}" method="post" onSubmit="return phone_ckd();">
      <input type="hidden" name="token" value="{$_W['token']}" />
      <input type="hidden" name="tab" value="{$tab}" />
      <input name="sms_open" type="hidden" value="{$config['sms_open']}" />
        <dl class="forminputitem">
		 <dd >
            <div class="c ico_name inputitem_w"> <i class="reg_icon_font login_icon_n1 "></i>
              <input class="inputitemtxt" placeholder="真实姓名" id="yname" name="yname" type="text" >
            </div>
          </dd>
          <dd >
            <div class="c ico_name inputitem_w"> <i class="reg_icon_font login_icon_n1 "></i>
              <input class="inputitemtxt" placeholder="填写手机号" id="mobile" name="phone" type="text" >
            </div>
          </dd>
          {if $config['sms_open']}
          <dd>
            <div class="c ico_pwd2 inputitem_w"> <i class="reg_icon_font login_icon_n2_1 "></i>
              <input class="inputitemtxt" placeholder="手机验证码" name="mobile_code" type="text">
              <em class="viewpwd"></em>
			  <input id="zphone" type="button" value="获取 " onClick="get_mobile_code({$_SESSION['send_code']});" style="float:right; position:relative; margin-top:-30px; border:1px solid #F63; background:#F93; color:#fff; line-height:24px; margin-right:5px;">
			</div>
          </dd>
          {/if}
          
          <dd>
            <div class="c ico_pwd2 inputitem_w"> <i class="reg_icon_font login_icon_n2 "></i>
              <input class="inputitemtxt" onfocus="this.type='password'" placeholder="填写密码" name="password" id="password" type="text">
              <em class="viewpwd"></em></div>
          </dd>
          <dd>
            <div class="c ico_pwd2 inputitem_w"> <i class="reg_icon_font login_icon_n2 "></i>
              <input class="inputitemtxt" onfocus="this.type='password'" placeholder="确认密码" name="newpassword" id="newpassword" type="text">
              <em class="viewpwd"></em></div>
          </dd>
          
          {if $tab == '3'}
          <dd >
            <div class="c ico_name inputitem_w"> <i class="reg_icon_font login_icon_n1 "></i>
              <input class="inputitemtxt" placeholder="请填写孩子姓名" id="hzname" name="hzname" type="text" >
            </div>
          </dd>
          <dd >
            <div class="c ico_name inputitem_w"> <i class="reg_icon_font login_icon_n1 "></i>
              <input class="inputitemtxt" placeholder="请填写孩子手机号" id="hzphone" name="hzphone" type="text" >
            </div>
          </dd>
          {/if}
          
          <dd><span class="photochk" style="width:100%">
            <input id="xieyi1" type="checkbox" name="xieyi1" value="1" class="inputChk" checked="checked">
            <em style="width:100%">我已阅读并同意《<a href="javascript:void(0);" onclick="ck_zsd()">{$config['webtitle']}注册协议</a>》</em></span></dd>
          <dd>
            <input type="submit" name="do_submit" id="subreg" value="提交" class="inputSubmit">
          </dd>
        </dl>
      </form>
    </div>
  </article>
  </section>
</div>
</div>


<!--协议 start-->
<div id="xiyishow1" class="body_wap" style="display:none;">
<header>
  <div class="header_bg"> <a class="hd-lbtn" href="javascript:void(0);" onclick="ckclose()"><i class="header_top_l iconfont"></i></a>
    <div class="header_h1">{$config['webtitle']}注册协议</div>
  </div>
</header>

<div class="yunwapreg_box">
    <section class="list">
        <article>
            <div class="regform">{php echo html_entity_decode($config['registerxy']);}</div>
        </article>
    </section>
</div>
</div>

</body>
</html>
