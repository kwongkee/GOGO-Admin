<!DOCTYPE html PUBLIC "-//WAPFORUM//DTD XHTML Mobile 1.0//EN" "http://www.wapforum.org/DTD/xhtml-mobile10.dtd">

<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
<meta http-equiv="Cache-Control" content="no-cache"/>
<title>个人基本信息  - {$config['webtitle']}</title>
<meta content="width=device-width, initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no" name="viewport" />
<meta name="MobileOptimized" content="240" />
<meta http-equiv="Expires" content="0" />
<meta http-equiv="Cache-Control" content="no-cache" />
<meta http-equiv="Pragma" content="no-cache" />
<meta content="yes" name="apple-mobile-web-app-capable" />
<meta content="black" name="apple-mobile-web-app-status-bar-style" />
<link rel="stylesheet" href="{$templateurl}css/yun_wap_member.css" type="text/css"/>
<link rel="stylesheet" href="{$templateurl}css/wap_css.css" type="text/css"/>

<script src="{$templateurl}js/jquery-1.8.0.min.js" language="javascript"></script>
</head>

<body>

<header>
  <div class="header_bg"> <a class="hd-lbtn" href="javascript:history.go(-1);"><i class="header_top_l iconfont"></i></a>
    <div class="header_h1">完善个人基本信息</div>
  </div>
</header>

<div class="main_member_body">
<script src="{$templateurl}js/mobiscroll_002.js"></script> 
<script src="{$templateurl}js/mobiscroll.js"></script> 
<script src="{$templateurl}js/mobiscroll_003.js"></script>
<link rel="stylesheet" href="{$templateurl}css/animate.min.css" type="text/css">
<link rel="stylesheet" href="{$templateurl}css/mobiscroll.css" type="text/css">
<script>
$(function () {
	var currYear = (new Date()).getFullYear();
	var opt = {
		preset: 'date', 
		theme: 'android-ics light', 
		display: 'modal', 
		mode: 'scroller', 
		dateFormat: 'yy-mm-dd', 
		setText: '确定', 
		cancelText: '取消',
		dateOrder: 'yyyymmdd', 
		dayText: '日', monthText: '月', yearText: '年',
		startYear: currYear - 100, 
		endYear: currYear
	};
	$("#birthday").mobiscroll('setDate', $("#birthday").val(), true).date(opt); 

});
function checkinfo() {
	var tab = Number(document.formpt.tab.value);
	var name = document.formpt.name.value;
	if (name == ""){
		alert("姓名不能为空!");
		document.formpt.name.focus();
		return false; 
	}
	var sex = document.formpt.sex.value;
	if (sex == ""){
		alert("请选择性别!");
		document.formpt.sex.focus();
		return false; 
	}
	if(tab === 2){
		var subjectid = document.formpt.subjectid.value;
		if (subjectid == ""){
			alert("请选择学科!");
			document.formpt.subjectid.focus();
			return false; 
		}
	}else if(tab === 3){
		var hzname = document.formpt.hzname.value;
		if (hzname == ""){
			alert("请填写孩子姓名!");
			document.formpt.hzname.focus();
			return false; 
		}
		var hzphone = document.formpt.hzphone.value;
		if (hzphone == ""){
			alert("请填写孩子手机号!");
			document.formpt.hzphone.focus();
			return false; 
		}
	}else{
		var birthday = document.formpt.birthday.value;
		if (birthday == ""){
			alert("请选择出生日期!");
			document.formpt.birthday.focus();
			return false; 
		}
	}
	var address = document.formpt.address.value;
	if (address == ""){
		alert("居住地址不能为空!");
		document.formpt.address.focus();
		return false; 
	}
}
function ckresume(type){
	var val=$("#"+type).find("option:selected").text(); 
	$('.'+type).html(val); 
}
</script>
<form id="resumeInfo" name="formpt" action="{$urltk}" method="post" onsubmit="return checkinfo(this);" enctype="multipart/form-data" >
  <input type="hidden" name="token" value="{$_W['token']}" />
  <input type="hidden" name="tab" value="{$tab}" />
  <div class="main_member_cot_box">
    <div class="wap_member_comp_h1"><span>基本信息</span></div>
    <div class="yun_wap_addresume_box">
      <div class="yun_wap_addresume_box_group">
        <div class="yun_wap_addresume_box_label"> 姓&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;名 <span class="resume-cont_wate_bj">*</span> </div>
        <div class="yun_wap_addresume_box_control">
          <input type="text" name="name" value="" placeholder="请填写真实姓名" class="yun_wap_addresume_text" style="width:100px">
          </div>
      </div>
      <div class="yun_wap_addresume_box_group">
        <div class="yun_wap_addresume_box_label"> 性&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;别 <span class="resume-cont_wate_bj">*</span> </div>
        <div class="yun_wap_addresume_box_control">
          <div class="select"><span class="txt sex"> 请选择性别</span>
            <select id="sex" name="sex" class="textval" onchange="ckresume('sex')">
              <option value="">请选择</option>
              <option value="1" >男</option>
              <option value="2" >女</option>
            </select>
          </div>
        </div>
      </div>
	  
	  {if $tab == '2'}
	  <div class="yun_wap_addresume_box_group">
        <div class="yun_wap_addresume_box_label"> 学&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;科 <span class="resume-cont_wate_bj">*</span> </div>
        <div class="yun_wap_addresume_box_control">
          <div class="select"><span class="txt subjectid"> 请选择科目</span>
            <select id="subjectid" name="subjectid" class="textval" onchange="ckresume('subjectid')">
              <option value="">请选择</option>
			  {loop $category $value}
			  <option value="{$value[cid]}" >{$value[name]}</option>
			  {/loop}
            </select>
          </div>
        </div>
      </div>
      {elseif $tab == '3'}
      <div class="yun_wap_addresume_box_group">
        <div class="yun_wap_addresume_box_label"> 孩子姓名 </div>
        <div class="yun_wap_addresume_box_control">
          <input type="text" name="hzname" id="hzname" value=""   class="yun_wap_addresume_text"placeholder="请填写孩子姓名" >
        </div>
      </div>
      <div class="yun_wap_addresume_box_group">
        <div class="yun_wap_addresume_box_label"> 孩子手机号 </div>
        <div class="yun_wap_addresume_box_control">
          <input type="text" name="hzphone" id="hzphone" value=""   class="yun_wap_addresume_text"placeholder="请填写孩子手机号" >
        </div>
      </div>
	  {else}
      <div class="yun_wap_addresume_box_group">
        <div class="yun_wap_addresume_box_label"> 出生年月 <span class="resume-cont_wate_bj">*</span> </div>
        <div class="yun_wap_addresume_box_control">
          <input id="birthday" class="yun_wap_addresume_text"onfocus="this.blur();"  type="text" value="" name="birthday"placeholder="请选择出生日期" >
        </div>
      </div>
	  {/if}
     
      <div class="yun_wap_addresume_box_group">
        <div class="yun_wap_addresume_box_label"> 手机号码 </div>
        <div class="yun_wap_addresume_box_control">
          <input type="text" name="phone" id="phone" value="" onkeyup="this.value=this.value.replace(/[^0-9.]/g,'')" class="yun_wap_addresume_text"placeholder="请填写手机号码" >
        </div>
      </div>
     
      <div class="yun_wap_addresume_box_group">
        <div class="yun_wap_addresume_box_label"> 登录密码 </div>
        <div class="yun_wap_addresume_box_control">
          <input type="password" name="password" value=""  class="yun_wap_addresume_text" placeholder="如不填写则不修改" >
        </div>
      </div>
      <div class="yun_wap_addresume_box_group">
        <div class="yun_wap_addresume_box_label"> 联系邮箱 </div>
        <div class="yun_wap_addresume_box_control">
          <input type="text" name="email" id="email" value=""   class="yun_wap_addresume_text"placeholder="请填写联系邮箱" >
        </div>
      </div>
      <div class="yun_wap_addresume_box_group">
        <div class="yun_wap_addresume_box_label"> 现居住地 <span class="resume-cont_wate_bj">*</span> </div>
        <div class="yun_wap_addresume_box_control">
          <input type="text" name="address" id="address" value=""  placeholder="比如：苏州-沧浪区" class="yun_wap_addresume_text">
        </div>
      </div>
      <div class="yun_wap_addresume_box_group">
        <div class="yun_wap_addresume_box_label"> QQ </div>
        <div class="yun_wap_addresume_box_control">
          <input type="text" name="qq" id="qq" value=""  placeholder="输入你的QQ号码" class="yun_wap_addresume_text">
        </div>
      </div>
      <em style="width:90%; color:#999; padding-top:10px; display:block; margin:auto;">绑定手机以及设定密码后，可以在网页端通过手机号密码登录，并同步微信数据。</em>
      
      <div class="yun_wap_addresume_box_group" style="background: transparent; border: none;">
        <input type="submit" name="do_submit" value="保  存" class="reinputText2">
      </div>
    </div>
  </div>
</form>
</div>


</body>
</html>
