<div class="body_wap">

<div class="password_box">
  <div class="password">
    <div class="flowsteps flowsteps_jj">
      <ul>
        <li class="flowsfrist"><span><i>1</i><em>用户名</em></span></li>
        <li class="flowsfrist" id="nav2"><span><i>2</i><em>验证身份</em></span></li>
        <li class="flowsfrist" id="nav3"><span><i>3</i><em>重置密码</em></span></li>
        <li class="flowsfrist" id="nav4"><span><i id="shensu_i">4</i><em id="shensu_e">修改成功</em></span></li>
      </ul>
    </div>
    <div class="clear"></div>
    
   <div class="password_cont  " style="width:100%;margin:0 auto;" id="step5">
    <div class="password_cont_success " style="width:100%;">
      <div class="password_cont_success_p" style="padding-left:0;width:100%;text-align:center;">恭喜您！密码重置成功！</div>
      <div class="password_contm-row" style="margin-left:0;width:100%;text-align:center;"> <a href="{php echo $this->createMobileUrl('index');}" style="margin:0 auto;width:280px;" class="password_input_btn">立即登录</a> </div>
    </div>
  </div>
  <div class="password_cont none" id="finish">

  </div>
  <div class="clear"></div>
  
  
  <div class="password_tip">
    <div class="password_tip_t">温馨提示：</div>

    <div>请拨打全国统一服务热线</div>
    <div class="password_tip_tel">{$config['telephone']}</div>
	{if $config['telephone']}
    <div class="password_tip_tel_link"><a href="tel:{$config['telephone']}"><i class="password_tip_tel_link_tel"></i>拨打</a></div>
	{/if}
  </div>
</div>
