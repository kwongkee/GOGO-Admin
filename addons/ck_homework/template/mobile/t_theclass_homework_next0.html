<!DOCTYPE html PUBLIC "-//WAPFORUM//DTD XHTML Mobile 1.0//EN" "http://www.wapforum.org/DTD/xhtml-mobile10.dtd">

<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
<meta http-equiv="Cache-Control" content="no-cache"/>
<title>自动组卷 - {$config['webtitle']}</title>
<meta http-equiv="description" content="" />
<meta name="renderer" content="webkit"/>
<meta http-equiv="X-UA-Compatible" content="IE=Edge,chrome=1"/>
<meta http-equiv="Cache-Control" content="no-siteapp" />
<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"/>
<meta name="description" content="" id="description"/>
<meta name="keywords" content=""/>
<link rel="stylesheet" href="{$templateurl}css/css.css" type="text/css"/>
<link rel="stylesheet" type="text/css" href="{$templateurl}css/selectFilter.css" />
<script src="{$templateurl}js/jquery-1.8.0.min.js" language="javascript"></script> 
</head>

<body>
<div class="cuotidiankai">
	<div class="a1">
    <p style="text-align:center; font-size:16px;"><a href="{$urltk}&ob=wordadd&wid={$wid}" style="float:left; font-size:12px;">上一步</a>组卷中心</p>
    </div>
    <div class="z1">
    	您将在<strong>{$parentid_tale}</strong>个知识点中随机抽取题目（<strong>{$total}</strong>个）进行组卷发布作业，发布后可在班级作业中查看。
    </div>
	<script type="text/javascript">
	function checkinfo() {
		var numbpl = document.getElementById("numbpl").value;
		if (numbpl == ""){
			alert("请选择数量!");
			document.getElementById("numbpl").focus();
			return false; 
		}
		var rulesname = document.getElementById("rulesname").value;
		if (rulesname == ""){
			alert("请设定选题规则!");
			document.getElementById("rulesname").focus();
			return false; 
		}
	}
	</script>
    <form name="formt" action="{php echo $this->createMobileUrl('t_theclass_show');}&id={$id}" method="post" onSubmit="return checkinfo(this);" class="form">
	<input name="token" type="hidden" value="{$_W['token']}" />
	<input name="wid" type="hidden" value="{$_GPC['wid']}" />
     <div class="zjs1">
    	<P>每知识点题目数量</P> <br />   
          <div class="filter-box" style="z-index:99; position:relative;">
				<div class="filter-text">
					<input class="filter-title" type="text" id="numbpl" name="numbpl" readonly placeholder="选择数量" />
					<i class="icon icon-filter-arrow"></i>
				</div>
				<select name="filter">
					<option value="1">1</option>
					<option value="2">2</option>
					<option value="3">3</option>
					<option value="4">4</option>
					<option value="5">5</option>
					<option value="6">6</option>
					<option value="7">7</option>
					<option value="8">8</option>
					<option value="9">9</option>
					<option value="10">10</option>
					<option value="11">11</option>
					<option value="12">12</option>
					<option value="13">13</option>
					<option value="14">14</option>
					<option value="15">15</option>
					<option value="16">16</option>
					<option value="17">17</option>
					<option value="18">18</option>
					<option value="19">19</option>
					<option value="20">20</option>
				</select>
			</div>
     </div>
    
     <div class="zjs1">
    	<P>设定选题规则</P> <br />   
          <div class="filter-box1" style="z-index:9; position:relative;">
				<div class="filter-text">
					<input class="filter-title" id="rulesname" type="text" readonly placeholder="选择出题方式" />
					<i class="icon icon-filter-arrow"></i>
				</div>
				<select name="rulesid">
					<option value="0">全部随机</option>
					<option value="1">随机抽取未在本班布置过的题目</option>
					<option value="2">随机抽取本班做过的作业</option>
					<option value="3">优先选择本班错误率高的</option>
				</select>
			</div>
    </div>
    <input type="submit" name="zdsace_submit" value="确定并发布作业" class="z1a">
    </form>
</div>
<div class="clear"></div>

<script type="text/javascript" src="{$templateurl}js/selectFilter.js"></script>
<script type="text/javascript">
	//本小插件支持移动端哦
	
	//这里是初始化
	$('.filter-box').selectFilter({
		callBack : function (val){
			//返回选择的值
			console.log(val+'-是返回的值')
		}
	});//这里是初始化
	$('.filter-box1').selectFilter({
		callBack : function (val){
			//返回选择的值
			console.log(val+'-是返回的值')
		}
	});
</script>

</body>
</html>
