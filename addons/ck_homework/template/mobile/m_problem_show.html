<style>
.fabutz{ background:none; width:98%; overflow:hidden; margin:8px auto 0 auto;}
.fabutz input{ width:100%; border:1px solid #eee; line-height:28px; text-indent:5px; font-size:13px; margin-bottom:3px;}

.fabutz .button{display:block; color:#fff; font-size:14px; text-align:center; width:50%; margin:5px auto; line-height:32px; border:none; background-color:#F60; border-radius:3px;}

.banjine .a1 .bkl{ display:block;}
.banjine .a1 .bkl img{float:right; width:60px; height:60px; margin-right:5px;}
.banjine .a1 .bkl font{display:inline-block;}
.banjine .a1 .bkl h2{color:#333; font-size:16px; margin:0; margin-top:5px;}
.banjine .a1 .bkl span{font-weight:normal; margin-right:10px; font-size:13px; color:#999;}
.banjine .a1 .bkl h3{float:right; font-size:12px; font-weight:normal; position:absolute; right:5px; background: rgba(0,0,0,.5); color:#fff; padding:0 5px; border-radius:4px; margin-top:-50px;}
.banjine .a1 .bkl h3 i{font-size:10px; margin-right:2px;}

<body>

	  <div class="tiobgbj"><h1>您与{$srdb['lsname']}老师交流</h1><a href="{php echo $this->createMobileUrl('m_problem');}"> < 返回</a></div>
    
      <div class="banjine">

		</div>

    <input type="hidden" name="lsuid" value="{$_GPC['lsuid']}" />
    <textarea name="content" id="content" ></textarea>
    <input type="submit" name="add_submit" value="发  布" class="button">
