<!DOCTYPE html PUBLIC "-//WAPFORUM//DTD XHTML Mobile 1.0//EN" "http://www.wapforum.org/DTD/xhtml-mobile10.dtd">

<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
<meta http-equiv="Cache-Control" content="no-cache"/>
<title>个人基本信息  - {$config['webtitle']}</title>
<meta content="width=device-width, initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no" name="viewport" />
<meta name="MobileOptimized" content="240" />
<meta http-equiv="Expires" content="0" />
<meta http-equiv="Cache-Control" content="no-cache" />
<meta http-equiv="Pragma" content="no-cache" />
<meta content="yes" name="apple-mobile-web-app-capable" />
<meta content="black" name="apple-mobile-web-app-status-bar-style" />
<link rel="stylesheet" href="{$templateurl}css/yun_wap_member.css" type="text/css"/>
<link rel="stylesheet" href="{$templateurl}css/css.css" type="text/css"/>

<!--头像 start-->	
<script type="text/javascript" src="./resource/js/lib/jquery-1.11.1.min.js"></script>
<script type="text/javascript" src="./resource/js/app/util.js"></script>
<script type="text/javascript" src="./resource/js/require.js"></script>
<link href="{$_W['siteroot']}app/resource/css/bootstrap.min.css?v=20170802" rel="stylesheet">
<style>
	.mui-toast-container{position:fixed;z-index:9999;width:120px;min-height:120px;top:180px;left:50%;margin-left:-3.8em;background:rgba(40,40,40,.75);text-align:center;border-radius:5px;color:#fff;opacity:0;-webkit-transition:opacity .8s;transition:opacity .8s}.mui-toast-container.mui-active{opacity:1}.mui-toast-container .mui-toast-icon{margin-top:20px;height:55px;line-height:55px;color:#fff;font-size:40px;text-align:center;margin-bottom:4px}
	.help-block img{ width:80px; height:80px; border-radius: 50%;}
</style>
<!--头像 end-->
</head>

<body>

<header>
  <div class="header_bg"> <a class="hd-lbtn" href="{php echo $this->createMobileUrl('t_index');}"><i class="header_top_l iconfont"></i></a>
    <div class="header_h1">个人基本信息</div>
  </div>
</header>

<div class="main_member_body">
<script>
$(function () {
	//执行选择性别
	ckresume('sex');
	//执行选择学科
	ckresume('subjectid');
});
function checkinfo() {
	var tab = Number(document.formpt.tab.value);
	var name = document.formpt.name.value;
	if (name == ""){
		alert("姓名不能为空!");
		document.formpt.name.focus();
		return false; 
	}
	var sex = document.formpt.sex.value;
	if (sex == ""){
		alert("请选择性别!");
		document.formpt.sex.focus();
		return false; 
	}
	var subjectid = document.formpt.subjectid.value;
	if (subjectid == ""){
		alert("请选择学科!");
		document.formpt.subjectid.focus();
		return false; 
	}
	var address = document.formpt.address.value;
	if (address == ""){
		alert("居住地址不能为空!");
		document.formpt.address.focus();
		return false; 
	}
}
function ckresume(type){
	var val=$("#"+type).find("option:selected").text(); 
	$('.'+type).html(val); 
}
</script>
<form id="resumeInfo" name="formpt" action="{$urltk}" method="post" onsubmit="return checkinfo(this);" enctype="multipart/form-data" >
  <input type="hidden" name="token" value="{$_W['token']}" />
  <div class="main_member_cot_box">
    <div class="wap_member_comp_h1"><span>基本信息</span></div>
    <div class="yun_wap_addresume_box">
	  <!--头像 strat-->
	  <div class="yun_wap_addresume_box_group">
		<div class="yun_wap_addresume_box_label">头像修改</div>
        <div class="yun_wap_addresume_box_control">
			{php echo tpl_form_field_image('headimg', $user_show['headimg'])}							
       </div>
	  </div>
	  <!--头像 end-->
      <div class="yun_wap_addresume_box_group">
        <div class="yun_wap_addresume_box_label"> 姓&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;名 <span class="resume-cont_wate_bj">*</span> </div>
        <div class="yun_wap_addresume_box_control">
          <input type="text" name="name" value="{$user_show['name']}" placeholder="请填写真实姓名" class="yun_wap_addresume_text" style="width:100px">
          </div>
      </div>
      <div class="yun_wap_addresume_box_group">
        <div class="yun_wap_addresume_box_label"> 性&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;别 <span class="resume-cont_wate_bj">*</span> </div>
        <div class="yun_wap_addresume_box_control">
          <div class="select"><span class="txt sex"> 请选择性别</span>
            <select id="sex" name="sex" class="textval" onchange="ckresume('sex')">
              <option value="">请选择</option>
              <option value="1" {if $user_show['sex'] == '1'}selected{/if}>男</option>
              <option value="2" {if $user_show['sex'] == '2'}selected{/if}>女</option>
            </select>
          </div>
        </div>
      </div>
	  
      <div class="yun_wap_addresume_box_group">
        <div class="yun_wap_addresume_box_label"> 学&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;科 <span class="resume-cont_wate_bj">*</span> </div>
        <div class="yun_wap_addresume_box_control">
          <div class="select"><span class="txt subjectid"> 请选择科目</span>
            <select id="subjectid" name="subjectid" class="textval" onchange="ckresume('subjectid')">
              <option value="">请选择</option>
			  {loop $category $value}
			  <option value="{$value[cid]}" {if $user_show['subjectid'] == $value['cid']}selected{/if}>{$value[name]}</option>
			  {/loop}
            </select>
          </div>
        </div>
      </div>
     
      <div class="yun_wap_addresume_box_group">
        <div class="yun_wap_addresume_box_label"> 手机号码 </div>
        <div class="yun_wap_addresume_box_control">
		  {if $user_show['phone']}
		  {$user_show['phone']}
		  <span style="float:right;"><a href="{php echo $this->createMobileUrl('t_mobile');}" >修改</a>&nbsp; ></span>
		  {else}
          <input type="text" name="phone" id="phone" value="{$user_show['phone']}" onkeyup="this.value=this.value.replace(/[^0-9.]/g,'')" class="yun_wap_addresume_text"placeholder="请填写手机号码" >
		  {/if}
        </div>
      </div>
     
      <div class="yun_wap_addresume_box_group">
        <div class="yun_wap_addresume_box_label"> 登录密码 </div>
        <div class="yun_wap_addresume_box_control">
          <input type="password" name="password" value=""  class="yun_wap_addresume_text" placeholder="如不填写则不修改" >
        </div>
      </div>
      <div class="yun_wap_addresume_box_group">
        <div class="yun_wap_addresume_box_label"> 联系邮箱 </div>
        <div class="yun_wap_addresume_box_control">
          <input type="text" name="email" id="email" value="{$user_show['email']}"   class="yun_wap_addresume_text"placeholder="请填写联系邮箱" >
        </div>
      </div>
      <div class="yun_wap_addresume_box_group">
        <div class="yun_wap_addresume_box_label"> 现居住地 <span class="resume-cont_wate_bj">*</span> </div>
        <div class="yun_wap_addresume_box_control">
          <input type="text" name="address" id="address" value="{$user_show['address']}"  placeholder="比如：苏州-沧浪区" class="yun_wap_addresume_text">
        </div>
      </div>
      <div class="yun_wap_addresume_box_group">
        <div class="yun_wap_addresume_box_label"> QQ </div>
        <div class="yun_wap_addresume_box_control">
          <input type="text" name="qq" id="qq" value="{$user_show['qq']}"  placeholder="输入你的QQ号码" class="yun_wap_addresume_text">
        </div>
      </div>
      <em style="width:90%; color:#999; padding-top:10px; display:block; margin:auto;">绑定手机以及设定密码后，可以在app及网页端通过手机号密码登录，并同步微信数据。</em>
      
      <div class="yun_wap_addresume_box_group" style="background: transparent; border: none;">
        <input type="submit" name="save_submit" value="保  存" class="reinputText2">
      </div>
    </div>
  </div>
</form>
</div>


</body>
</html>
