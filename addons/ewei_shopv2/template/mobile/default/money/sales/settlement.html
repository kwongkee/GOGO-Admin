		/**
		 *	获取验证码 
		 */
		$('#vcodes').click(function(){
			
			var phoneVal = $('#phone').val(); 
			if(phoneVal != ''){
				if(checkPhone(phoneVal)){
					
					var timesRun = 60;
					var interval = setInterval(function(){
						timesRun -= 1;
						if(timesRun === 1){
							
							$('#vcodes').html('获取验证码');
							$('#vcodes').css('pointer-events','block');
							$('#vcodes').css('color','#3cc51f');
							clearInterval(interval);
							
						}else{
							$('#vcodes').html('重新获取('+timesRun+')');
							$('#vcodes').css('pointer-events','none');
							$('#vcodes').css('color','#D3D3D3');
						}
						
					}, 1000);
					
					
					$.ajax({
						type:'post',
						url:$('#VcodeUrl').val(),
						async:'false',
						dataType:'json',
						data: 'phone='+ $('#phone').val(),
						success:function(data){
//							console.dir(data);
							if(data.vcode == 'success'){
								$.toast("验证码成功");
							}else{
								console.dir(data.vcode);
							}
						}
					})
					
					
				}else{
					$('#phoneText').html('您输入的手机号码格式不正确');
					$('#phoneText').css('display','block');
				}
			}else{
				$('#phoneText').html('请输入手机号码');
				$('#phoneText').css('display','block');
				$('#Phone').val('').focus();
			}
		});

		// 验证手机号
		function checkPhone(phone){
			var pattern = /^1[345678]\d{9}$/;
			return pattern.test(phone);
		}
		
		//验证中文名称
		function isChinaName(name) {
			var pattern = /^[\u4E00-\u9FA5]{1,6}$/;
			return pattern.test(name);
		}
		
		
		//身份证判断正则；
		function checkCertNo(obj)
		{
	        var aCity = {11: "北京", 12: "天津", 13: "河北", 14: "山西", 15: "内蒙古", 21: "辽宁", 22: "吉林", 23: "黑龙 江", 31: "上海", 32: "江苏", 33: "浙江", 34: "安徽", 35: "福建", 36: "江西", 37: "山东", 41: "河南", 42: "湖 北", 43: "湖南", 44: "广东", 45: "广西", 46: "海南", 50: "重庆", 51: "四川", 52: "贵州", 53: "云南", 54: "西 藏", 61: "陕西", 62: "甘肃", 63: "青海", 64: "宁夏", 65: "新疆", 71: "台湾", 81: "香港", 82: "澳门", 91: "国 外"};
	        var iSum = 0;
	        //var info = "";
	        var strIDno = obj;
	        var idCardLength = strIDno.length;
//	        if (!/^\d{17}(\d|x)$/i.test(strIDno) && !/^\d{15}$/i.test(strIDno))
	        if(!/(^\d{15}$)|(^\d{18}$)|(^\d{17}(\d|X|x)$)/.test(strIDno))
	            return false; //非法身份证号
	
	        if (aCity[parseInt(strIDno.substr(0, 2))] == null)
	            return false;// 非法地区
	
	        // 15位身份证转换为18位
	        if (idCardLength == 15)
	        {
	            sBirthday = "19" + strIDno.substr(6, 2) + "-" + Number(strIDno.substr(8, 2)) + "-" + Number(strIDno.substr(10, 2));
	            var d = new Date(sBirthday.replace(/-/g, "/"))
	            var dd = d.getFullYear().toString() + "-" + (d.getMonth() + 1) + "-" + d.getDate();
	            if (sBirthday != dd)
	                return false; //非法生日
	            strIDno = strIDno.substring(0, 6) + "19" + strIDno.substring(6, 15);
	            strIDno = strIDno + GetVerifyBit(strIDno);
	        }
	
	        // 判断是否大于2078年，小于1900年  1990
	        var year = strIDno.substring(6, 10);
	        if (year < 1900 || year > 2078)
	            return false;//非法生日
	
	        //18位身份证处理
	
	        //在后面的运算中x相当于数字10,所以转换成a
	        strIDno = strIDno.replace(/x$/i, "a");
	
	        sBirthday = strIDno.substr(6, 4) + "-" + Number(strIDno.substr(10, 2)) + "-" + Number(strIDno.substr(12, 2));
	        var d = new Date(sBirthday.replace(/-/g, "/"))
	        if (sBirthday != (d.getFullYear() + "-" + (d.getMonth() + 1) + "-" + d.getDate()))
	            return false; //非法生日
	        // 身份证编码规范验证
	        for (var i = 17; i >= 0; i --)
	            iSum += (Math.pow(2, i) % 11) * parseInt(strIDno.charAt(17 - i), 11);
	        if (iSum % 11 != 1)
	            return false;// 非法身份证号
	
	        // 判断是否屏蔽身份证
	        var words = new Array();
	        words = new Array("11111119111111111", "12121219121212121");
	
	        for (var k = 0; k < words.length; k++) {
	            if (strIDno.indexOf(words[k]) != -1) {
	                return false;;
	            }
	        }
	        return true;
    	}
