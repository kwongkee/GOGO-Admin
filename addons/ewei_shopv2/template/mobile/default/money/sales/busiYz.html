	<script type="text/javascript">
		/**
		 * 支付验真费用 微信支付;
		 */
		
		$("#subt").click(function(){
			//支付请求地址；
			var postUrl = $('#postUrl').val();
			//ajax 请求
			$.ajax({
				type:"post",//请求方式
				url:postUrl,//请求地址
				async:false,//是否跨域请求
				dataType:'json',//数据类型
				data:'payMoney='+$('#money').val()+'&uid='+$('#uid').val(),//参数数据
				success:function(data){//成功返回数据；
					
					console.dir(data);
					
					if(data.status >= 1 ){
						window.location.href = data.result.payUrl;
					}else{
						$.toast(data.result.message, "cancel");
					}
					
				}
			});
			
		});
