		<script>
			//用户信息核实
			$('#query').click(function() {
				
				if(!checkForm1()) {//判断表单是否为空
					$.toast('表单不能为空','cancel');
					return false;
				}
				
				var personName = $('#personName').val();							
				var orgName = $('#orgName').val();
				var creditCode = $('#creditCode').val();
				var registerNum = $('#registerNum').val();
				var establishDate = $('#establishDate').val();
				var uid = $('#uid').val();
				var keys = $('#key').val();
				
				
				$.ajax({
					type:'post',
					url:$('#busiAdd').val(),
					async:'false',
					dataType:'json',
					data:'personName='+personName+'&orgName='+orgName+'&creditCode='+creditCode+'&registerNum='+registerNum+'&establishDate='+establishDate+'&uid='+uid+'&keys='+keys,
//								data:$('#form1').serialize(),
					success:function(data) {									
//									console.dir(data);					
						if(data.status >= 1 ) {
							$.toast(data.result.message);
							$('#show2').css('display','block');
						}else{
							$.toast(data.result.message,'cancel');
						}
					}
				})
				
			});
			
			
			//判断表单是否有空值 表单一
	    	function checkForm1()
	    	{
	    		var inputs = document.form1.getElementsByTagName("input");
				
				for(var i = 0; i < inputs.length; i++) {
				    if(inputs[i].value == ''){
				    	return false;
				    }
				}
				return true;
	    	}
	    	
	    	
		</script>

	<script src="https://cdn.bootcss.com/jquery/1.11.0/jquery.min.js"></script>
		<script type="text/javascript">
			$('#tbody tr').each(function() {
				$(this).bind("click",function(evet) {
				
					if(parseInt($(this).attr('index'))%2==0){
						$(this).css('color','');
						$(this).children('input').removeClass('check');
					}else{
						$(this).css('color','red');
						$(this).children('input').addClass('check');
					}
					$(this).attr('index',parseInt($(this).attr('index'))+1);
				})
			});
			
			/**
			 * 确认账单  没问题
			 */
			$(".query").bind("click",function(){
				
				var data=new Array();
				$(".check").each(function(index){
					data[index]=$(this).val();
				});
				
				$.ajax({
					type:'post',
					url:$('#OkUrl').val(),
					async:'false',
					dataType:'json',
					data:'CheckData=ok',
					success:function(data) {									
						console.dir(data);
						if(data.status >= 1 ) {
							alert('确认账单已提交，请耐心等待!');
						}else{
							alert('确认账单失败，请重新确认!');
						}
					}
				})
				return false;
				
			})
			
			
			/**
			 * 确认账单有问题
			 */
			$(".btns").bind("click",function(){
				var data=new Array();
				$(".check").each(function(index){
					data[index]=$(this).val();
				});
				if(data.length == 0){
					alert('请选择有误订单')
					return false;
				}
				
				$.ajax({
					type:'post',
					url:$('#NoUrl').val(),
					async:'false',
					dataType:'json',
					data:'CheckData='+data,
					success:function(data) {									
						console.dir(data);
						if(data.status >= 1 ) {
							alert('有误账单已提交，请耐心等待!');
						}else{
							alert(data.result.message);
						}
					}
				})
				return false;
			})
			
		</script>
