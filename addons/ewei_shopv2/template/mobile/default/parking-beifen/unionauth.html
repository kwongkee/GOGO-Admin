<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title></title>
    <meta content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=0" name="viewport" />
    <meta content="yes" name="apple-mobile-web-app-capable" />
    <meta content="black" name="apple-mobile-web-app-status-bar-style" />
    <meta content="telephone=no" name="format-detection" />
    <!-- 引入YDUI样式 -->
    <link rel="stylesheet" href="../addons/ewei_shopv2/static/js/build/css/ydui.css" />
    <!-- 引入YDUI自适应解决方案类库 -->
    <script src="../addons/ewei_shopv2/static/js/build/js/ydui.flexible.js"></script>
    <script src="http://apps.bdimg.com/libs/jquery/2.1.4/jquery.min.js"></script>
</head>
<link rel="stylesheet"  href="../addons/ewei_shopv2/static/js/build/css/card.css">
<body>
<section class="g-flexview">
    <header class="m-navbar" style="background:#0099FF;">
        <div class="navbar-center"><span style="color:#FFFFFF;" class="navbar-title">银联卡签约</span></div>
    </header>
    <section class="g-scrollview">
        <div class="m-cell" style="margin-top:.35rem;display:block;">
            <div class="cell-item">
                <div class="cell-left">卡号：</div>
                <div class="cell-right">
                <input type="text" class="cell-input" placeholder="请输入您的卡号" autocomplete="off"></div>
            </div>
            <div class="cell-item">
                <div class="cell-left">手机号：</div>
                <div class="cell-right">
                <input type="text" class="cell-input" placeholder="银行卡预留手机号" autocomplete="off"></div>
            </div>
             <div class="cell-item">
                <div class="cell-left">姓名：</div>
                <div class="cell-right">
                <input type="text" class="cell-input" placeholder="真实姓名" autocomplete="off"></div>
            </div>
             <div class="cell-item">
                <div class="cell-left">身份证号：</div>
                <div class="cell-right">
                <input type="text" class="cell-input" placeholder="请输入身份证号" autocomplete="off"></div>
            </div>
        <!--     <div>
                <div class="cell-left">车牌号：</div>
            </div> -->
            <div class="cell-item">
                <div class="cell-left">车牌号：</div>
                <div class="cell-right">
                <input type="text" id='num' class="cell-input" placeholder="请输入您的车牌" autocomplete="off"></div>
            </div>
            <button type="button" class="btn-block btn-primary" style="background:#0099FF;">提交</button>
        </div>
        <div class="car_input" style="display:none;">
            <ul class="clearfix ul_input"><li class="input_pro"><span></span></li><li class="input_pp input_zim"><span></span></li><li class="input_pp"><span></span></li><li class="input_pp"><span></span></li><li class="input_pp"><span></span></li><li class="input_pp"><span></span></li><li class="input_pp"><span></span></li></ul>
            <button type="button" class="btn-block btn-primary" id="add" style="background:#0099FF;">添加</button>
        </div>
    </section>
</section>
</body>
<script src="../addons/ewei_shopv2/static/js/build/js/layer.js" type="text/javascript"></script>
<script src="../addons/ewei_shopv2/static/js/build/js/index.js" type="text/javascript"></script>
<script>
(function(){
    $('#num').on('click',function(){
        $('.m-cell').css('display','none');
        $('.car_input').css('display','block');
        $('.layui-m-layercont').css('display','block');
    })
    $('#add').on('click',function(){
        var val='';
        $('.ul_input li').each(function(){
            val+=$(this).children('span').html();
        })
        $('#num').val(val);
        $('.m-cell').css('display','block');
        $('.car_input').css('display','none');
        $('.layui-m-layercont').css('display','none');
    })
})()
</script>
</html>
