<script type="text/javascript">
	
	function Surrent() {
		
		var c = confirm('您确定要解约吗?');
		if(c) {
			window.location.href = "<?php echo mobileUrl('parking/auth/wechatSurr');?>";
		} else {
			return false;
		}
	}
	
    var height = $(window).height();
    $(".wx_box").css({"min-height":height});
    $(function(){
        new Swipe(document.getElementById('focus'), {
            speed:500,
            auto:3000,
            callback: function(){
                var lis = $(this.element).next("ol").children();
                lis.removeClass("on").eq(this.index).addClass("on");
            }
        });
    });
    
    
    function timer(opj){
        $(opj).find('ul').animate({
            marginTop : "-0.4rem"
        },500,function(){
            $(this).css({marginTop : "0rem"}).find("li:first").appendTo(this);
        })
    }
    var num = $('.notice').find('li').length;
    if(num > 1){
        var time=setInterval('timer(".notice")',3500);
        $('.notice ul li a').hover(function(){
            clearInterval(time);
        }).mouseout(function(){
            time = setInterval('timer(".notice")',3500);
        });
    };
    $(".license_Fee_arrow").click(function(){
        $(this).toggleClass("license_Fee_arrow02");
        $(this).parents("dl").find("dd").toggle();
    });
    $(".showPopup").click(function(){
        $(".black_bg,.popup").show();
    });

    $(".license_Fee_arrow").parents("dl").find("a").bind("click",function (e) {
        if($(this).is('.showPopup')){
            $(this).attr("href","#");
           return false;
        }
    })
</script>
