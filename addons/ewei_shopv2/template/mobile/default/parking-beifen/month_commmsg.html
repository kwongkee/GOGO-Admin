<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>

    <link rel="stylesheet" href="../addons/ewei_shopv2/static/css/style.css">

    <script src="../addons/ewei_shopv2/static/js/jquery.rotate.min.js"></script>
    <script src="../addons/ewei_shopv2/static/js/jquery.kxbdmarquee.js"></script>
        <style>
        #button {
            cursor:pointer;
            width:30%;
            margin:5px;
            padding:8px;
            border-radius:4px 4px 4px 4px;
            font-size:14px;
            font-weight:bold;
        }
        input{
            transition:all 0.30s ease-in-out;
            -webkit-transition: all 0.30s ease-in-out;
            -moz-transition: all 0.30s ease-in-out;
            border:#364f86 1px solid;
            border-radius:3px;
            outline:none;
        }
        input:focus{
            box-shadow:0 0 5px rgba(81, 203, 238, 1);
            -webkit-box-shadow:0 0 5px rgba(81, 203, 238, 1);
            -moz-box-shadow:0 0 5px rgba(81, 203, 238, 1);
        }
        textarea{
            transition:all 0.30s ease-in-out;
            -webkit-transition: all 0.30s ease-in-out;
            -moz-transition: all 0.30s ease-in-out;
            border:#364f86 1px solid;
            border-radius:3px;
            outline:none;
        }
        textarea:focus{
            box-shadow:0 0 5px rgba(81, 203, 238, 1);
            -webkit-box-shadow:0 0 5px rgba(81, 203, 238, 1);
            -moz-box-shadow:0 0 5px rgba(81, 203, 238, 1);
        }
    </style>
</head>
<body style="background: #ccc;">

<div class="container" style="margin-top: 60px;">
    <div class="list">
        <h4 style="background: #fff;color: black">
            <span>编号</span>
            <span>姓名</span>
            <span>轮次</span>
            <span>手机号</span>
        </h4>
        <div class="kxbdMarquee">
            <ul style="background: #fff;color: black">
                {loop $allData $index $val}
                <li>
                    <span>{$val['flag_id']}</span>
                    <span>{$val['user_name']}</span>
                    <span>{$val['lun']['name']}</span>
                    <span>{$val['mobile']}</span>
                </li>
                {/loop}

            </ul>
        </div>
    </div>
    <!--<div id="s">-->

    <!--</div>-->
    <table style="margin-left: 42px;display: block;" id="t">
        <form action="{php echo mobileUrl('parking/alert_message/saveSay')}" method="post">
        <tr>
            <td><textarea name="message" id="comment" rows="6" cols="40" placeholder="意见及建议"></textarea></td>
        </tr>
        <tr>
            <td colspan="2"align="center">
                <input style="background-color:  #00A5FF;color: aliceblue;border: 1px solid #00A5FF;line-height:28px;" type="submit" id="button" value="提交意见" />
            </td>
        </tr>

    </table>
</div>
<script>

    var isRun = false;
    $('.lottery-btn').on('click', function () {
        if (isRun) return false;
        var data = parseInt(6 * Math.random()); // 1到6随机数
    });
    function rotateFunc(el, awards, angle, text) {
        isRun = true;
        el.stopRotate();
        el.rotate({
            angle: 0,
            duration: 10000,
            animateTo: angle + 1440,
            callback: function() {
                isRun = false;
                console.log(text);
            }
        });
    }
    $('.kxbdMarquee').kxbdMarquee({
        direction: 'up',
        isEqual: false,
        scrollDelay: 50
    });
</script>
