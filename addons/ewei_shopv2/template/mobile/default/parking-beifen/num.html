<!DOCTYPE html>
<html lang="en">
<head>

    <!-- CSS Code -->
    <link rel="stylesheet" href="../addons/ewei_shopv2/static/css/person_style.css" type="text/css">
    <link rel="stylesheet" href="../addons/ewei_shopv2/static/css/flickerplate.css" type="text/css">
    <!-- JavaScript Code -->
    <script src="../addons/ewei_shopv2/static/js/jquery.min.js"></script>
    <script src="../addons/ewei_shopv2/static/js/bootstrap.js"></script>
    <script src="../addons/ewei_shopv2/static/js/modernizr-custom-v2.7.1.min.js"></script>
    <script src="../addons/ewei_shopv2/static/js/jquery-finger-v0.1.0.min.js"></script>

</head>
<body bgcolor="#ebebeb">
  <header>
   <span>&nbsp;&nbsp;</span>
    <div class="title">伦教停车</div>
  </header>
    

 
 
    <div class="person_set_pw_resetpay_rem">
       <div class="tip">输入车位码:</div>
       <div class="srzfmm_box">
            <ul class="mm_box">
                <li></li><li></li><li></li><li></li><li></li><li></li>
            </ul>
        </div>
         <input class="weui_input" type="text"  style="display: none;">        
          <a href="javascript:" onclick="loca()"><div class="next">停车</div></a>
  </div>

        <div class="numb_box">
            <div class="xiaq_tb">
                <img src="../addons/ewei_shopv2/static/images/housing/jftc_14.jpg" height="10"></div>
            <ul class="nub_ggg">
                <li><a href="javascript:void(0);" class="zf_num">1</a></li>
                <li><a href="javascript:void(0);" class="zj_x zf_num">2</a></li>
                <li><a href="javascript:void(0);" class="zf_num">3</a></li>
                <li><a href="javascript:void(0);" class="zf_num">4</a></li>
                <li><a href="javascript:void(0);" class="zj_x zf_num">5</a></li>
                <li><a href="javascript:void(0);" class="zf_num">6</a></li>
                <li><a href="javascript:void(0);" class="zf_num">7</a></li>
                <li><a href="javascript:void(0);" class="zj_x zf_num">8</a></li>
                <li><a href="javascript:void(0);" class="zf_num">9</a></li>
                <li><a href="javascript:void(0);" class="zf_empty">清空</a></li>
                <li><a href="javascript:void(0);" class="zj_x zf_num">0</a></li>
                <li><a href="javascript:void(0);" class="zf_del">删除</a></li>
            </ul>
        </div>
        
    <div class="person_set_about_copyright">
        <img src="../addons/ewei_shopv2/static/images/housing/LOGO.png" style="margin-bottom: 5px"><br>
            <p>Technology by Gogo</p>
    </div>
  <script type="text/javascript">
 
$(function(){
      
      //数字显示隐藏
    $(".xiaq_tb").click(function(){
      $(".numb_box").slideUp(500);
    });
    
    $(".mm_box").click(function(){
      $(".numb_box").slideDown(500);
    });

    //车位码 data
    var i = 0;var dataa=0;
    $(".nub_ggg li .zf_num").click(function(){
        
      if(i<6){
        $(".mm_box li").eq(i).addClass("mmdd");
        $(".mm_box li").eq(i).html($(this).text());
        $(".mm_box li").eq(i).attr("data",$(this).text());
        i++
        if (i==6) {
          setTimeout(function(){
          var data = "";
            $(".mm_box li").each(function(){
            data += $(this).attr("data");
          });
          $(".weui_input").html(data);
          alert("车位码："+data);
          },100);
        };
      } 
    });
      
    $(".nub_ggg li .zf_del").click(function(){
      if(i>0){
        i--
         $(".mm_box li").eq(i).html("");
        $(".mm_box li").eq(i).attr("data","");
      }
    });
  
    $(".nub_ggg li .zf_empty").click(function(){
       $(".mm_box li").html("");
      $(".mm_box li").attr("data","");
      i = 0;
    });
     
  });

   
    function loca(){
        var num=$(".weui_input").val();
//        document.cookie="num="+num;
        window.location.href="http://shop.gogo198.cn/app/index.php?i=14&c=entry&m=ewei_shopv2&do=mobile&r=parking.info&num="+num+"&scan_type=1";
    }

    </script>
</body>
</html>
