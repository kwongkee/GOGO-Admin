<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>其它方案申请信息</title>
    <meta name="keywords" content="">
    <meta name="description" content="">
    <link rel="stylesheet" href="../addons/ewei_shopv2/static/css/style.css">
    <script src="../addons/ewei_shopv2/static/js/jquery.min.js"></script>
    <script src="../addons/ewei_shopv2/static/js/jquery.rotate.min.js"></script>
    <script src="../addons/ewei_shopv2/static/js/jquery.kxbdmarquee.js"></script>
    <style>
        ul {
            margin:0;
            padding:0;
        }
        li {
            list-style: none;
        }

        .pub-wrap {
            position: relative;
            padding: 0 30px 10px;
            margin-top: 28px;
            border-radius: 6px;
            background-color: #fff;
        }

        .pub-title {
            padding-top: 14px;
            margin-right: -20px;
            margin-left: -20px;
            font-size: 1.1875rem;
            text-align: center;
        }

        .pub-process {
            position: relative;
            height: 35px;
            margin-top: 28px;
            margin-left: 35px;
            font-size: 0;
            color: #fff;
        }

        .pub-process:after {
            position: absolute;
            top: 50%;
            left: 0;
            z-index: 1;
            width: 99%;
            height: 4px;
            content: "";
            -webkit-transform: translate(0, -50%);
            transform: translate(0, -50%);
            background-color: #d9d9d9;
        }

        .pub-process li {
            position: relative;
            z-index: 5;
            display: inline-block;
            width: 25%;
            height: 35px;
            font-size: .875rem;
        }

        .pub-process li:first-child {
            width: 35px;
            margin-left: -35px;
        }

        .pub-process .ball {
            position: absolute;
            top: 4px;
            right: 0;
            z-index: 7;
            width: 35px;
            height: 35px;
            line-height: 35px;
            content: "";
            text-align: center;
            border-radius: 50%;
            background-color: #d9d9d9;
        }

        .pub-process .active .ball {
            background-color: #11c2c2;
        }

        .pub-process .active + .active:after {
            position: absolute;
            top: 50%;
            left: 0;
            z-index: 6;
            width: 100%;
            height: 4px;
            content: "";
            -webkit-transform: translate(0, -50%);
            transform: translate(0, -50%);
            background-color: #11c2c2;
        }

        .process-3 li {
            width: 50%;
        }

        .process-5 li {
            width: 25%;
        }


        /* flex ver */
        .pub-process-flex {
            display: -webkit-box;
        }
        .pub-process-flex li {
            display: list-item;
            -webkit-box-flex: 1;
            width: auto;
        }
        .pub-process-flex li:first-child {
            width: 35px;
            margin-left: -35px;
            -webkit-box-flex: 0;
        }
    </style>
</head>
<body style="background: #F6F7F9;">
<div class="container" style="margin-top: 60px;">
    <div class="list">
        <h4 style="background: #fff;color: black">
            <span>卡类</span>
            <span>名称</span>
            <span>编号</span>
            <span>手机号</span>
        </h4>
        <div class="kxbdMarquee">
            <ul style="background: #fff;color: black">
                {$listHTML}
            </ul>
        </div>
    </div>

</div>
<script>
    var isRun = false;
    $('.lottery-btn').on('click', function () {
        if (isRun) return false;
        var data = parseInt(6 * Math.random()); // 1到6随机数
        console.log(data);
    });
    function rotateFunc(el, awards, angle, text) {
        isRun = true;
        el.stopRotate();
        el.rotate({
            angle: 0,
            duration: 10000,
            animateTo: angle + 1440,
            callback: function() {
                isRun = false;
                console.log(text);
            }
        });
    }

    $('.kxbdMarquee').kxbdMarquee({
        direction: 'up',
        isEqual: false,
        scrollDelay: 50
    });
</script>
</body>
</html>
