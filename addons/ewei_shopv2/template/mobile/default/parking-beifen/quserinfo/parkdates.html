    <div class="license_Fee">

		<div align="center">
			<form class="layui-form" action="<?php echo mobileUrl('parking/queryuserinfo/parkDates');?>" method="post">
				
				<div class="dates">
					<span>开始-结束</span>
					<span><input type="date" name="start" id="start" value="" placeholder="开始日期"/></span>
					<span class="sp">-</span>
					<span><input type="date" name="end" id="end" value="" placeholder="结束日期"/></span>
				</div>
				
			  	<div class="layui-form-item" style="text-align: center;">
				    <div class="layui-input-block" style="margin-left: 0px;">
				      <button class="layui-btn layui-btn-sm" lay-submit lay-filter="formDemo">立即查询</button>
				      <button type="reset" class="layui-btn layui-btn-sm layui-btn-danger">信息重置</button>
				    </div>
			  	</div>
			  	
			</form>
			<script>
				//Demo
				layui.use('form', function(){
				  var form = layui.form;
				  //监听提交
				  form.on('submit(formDemo)', function(data) {
				  	var s = data.field;
				  	var st = new Date(s.start);
				  	var ed = new Date(s.end);
				  	var time1 = st.getTime();
				  	var time2 = ed.getTime();
				  	
				  	if((s.start == '') || (s.end == '')){
				  		alert('开始或结束日期不能为空！')
				  		return false;
				  	}
				  	
				  	if(time2 < time1 ) {
				  		alert('结束日期不能小于开始日期！')
				  		return false;
				  	}
				    return true;
				  });
				  
				});
			</script>
		</div>
	</div>

</div>
{template "parking/base/mycomm"}
<script type="text/javascript">
	
	var loading = false;  //状态标记
	$(document.body).infinite().on("infinite", function() {
		var self = this;
		var inp = $(self).children('input');//获取选中值下的input
		var pageNo 		= parseInt(inp[0].defaultValue);//页码
		var pagesCount  = parseInt(inp[1].defaultValue);//总页数
		var start 		= inp[2].defaultValue;//总页数
		var end 		= inp[3].defaultValue;//总页数
		++pageNo;
		//当前页码小于总页数，加载数据
		if(pageNo <= pagesCount) {
			loading = true;
			setTimeout(function() {
				
				$.ajax({
	                url: "{php echo mobileUrl('parking/queryuserinfo/parkDatesd')}",
	                type: 'POST',
	                data: {'pageNo':pageNo,'pagesCount':pagesCount,'start':start,'end':end},
	                async:false,
	                dataType:'text',
	                success: function(res) {
	                	
	                    var datas=JSON.parse(res);
	                    if(datas.code >= 1) {
	                    	
	                    	$.each(datas.result, function(index,obj) {
	                    		
		                    	var contents = '<div class="weui-cells"><a class="weui-cell weui-cell_access" href="'+datas.str+'&ordersn='+obj.ordersn+'"><div class="weui-cell__bd"><p>订单号:</p></div><div class="weui-cell__ft">'+obj.ordersn+'</div></a></div>'
								$("#infinites").append(contents);
		                    });
		                    
	                    } else {
	                    	alert('没有数据了1');
	                    }
	                }
	            });
				loading = false;
				
			},1500);//模拟延迟
			//加载完数据重新赋值页码
			inp[0].defaultValue = pageNo;
		} else {
			alert('没有数据了');
		}
	});
</script>
