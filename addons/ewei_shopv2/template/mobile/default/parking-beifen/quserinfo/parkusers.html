<!--<div class="wx_box">-->
	
    <div class="license_Fee">
    	
    	<h3 class="title_h3"><span>{$title}</span></h3>
    	
		<div align="center">
			<form class="layui-form" action="<?php echo mobileUrl('parking/queryuserinfo/parkUsers');?>" method="post">
				
				<div class="layui-form-item">
				    <label class="layui-form-label" style="padding: 9px 6px;">会员手机号：</label>
				    <div class="layui-input-inline" style="margin-left: 94px;">
				      <input type="text" name="phone" maxlength="11" required lay-verify="required" placeholder="请输入车主手机号码" autocomplete="off" class="layui-input">
				    </div>
			  	</div>
				
			  	<div class="layui-form-item" style="text-align: center;">
				    <div class="layui-input-block" style="margin-left: 0px;">
				      <button class="layui-btn layui-btn-sm" lay-submit lay-filter="formDemo">立即查询</button>
				      <button type="reset" class="layui-btn layui-btn-sm layui-btn-danger">信息重置</button>
				    </div>
			  	</div>
			  	
			</form>
			<script>
				//Demo
				layui.use('form', function(){
				  var form = layui.form;
				  //监听提交
				  form.on('submit(formDemo)', function(data) {
				  	var s = data.field;
				  	if((s.phone == '')){
				  		alert('泊位编号不能为空！')
				  		return false;
				  	}
				  	
				  	if (isPhoneNo($.trim(s.phone)) == false) {
						alert('您输入的手机号码格式不正确,请重新输入！');
						return false;
					}
				  	
				    return true;
				  });
				  
				});
				
				// 验证手机号
				function isPhoneNo(phone) {
					var pattern = /^1[34578]\d{9}$/;
					return pattern.test(phone);
				}
		
			</script>
		</div>
	</div>
	
		{if empty($order)}
			<p class="nodata">暂无数据!</p>
		{else}
	
    	<div class="weui-cells__title infinite" id="infinites">关联车主手机查询</div>

			<input type="hidden" name="pagesCount" value="{$pagesCount}"/>
			<input type="hidden" name="opid" id="" value="{$openid}"/>
			
			{loop $order $item}

				<a class="weui-cell weui-cell_access" href="{php echo mobileUrl('parking/queryuserinfo/parkOrders')}&ordersn={$item['ordersn']}">
					<div class="weui-cell__bd"><p>订单号:</p></div>
					<div class="weui-cell__ft">{$item['ordersn']}</div>
				</a>
		  	</div>
		  	{/loop}
		</div>
	
	{/if}
	
   	<div class="clear">	</div>
    <div class="footer">Technology by </div>
    <div class="footer_placeholder"> </div>
</div>
{template "parking/base/mycomm"}
<script type="text/javascript">
	
	var loading = false;  //状态标记
	$(document.body).infinite().on("infinite", function() {
		var self = this;
		var inp = $(self).children('input');//获取选中值下的input
		var pageNo 		= parseInt(inp[0].defaultValue);//页码
		var pagesCount  = parseInt(inp[1].defaultValue);//总页数
		var openid 		= inp[2].defaultValue;//总页数
		++pageNo;
		//当前页码小于总页数，加载数据
		if(pageNo <= pagesCount) {
			loading = true;
			setTimeout(function() {
				
				$.ajax({
	                url: "{php echo mobileUrl('parking/queryuserinfo/parkUsersd')}",
	                type: 'POST',
	                data: {'pageNo':pageNo,'pagesCount':pagesCount,'openid':openid},
	                async:false,
	                dataType:'text',
	                success: function(res) {
	                	
	                    var datas=JSON.parse(res);
	                    if(datas.code >= 1) {
	                    	
	                    	$.each(datas.result, function(index,obj) {
	                    		
		                    	var contents = '<div class="weui-cells"><a class="weui-cell weui-cell_access" href="'+datas.str+'&ordersn='+obj.ordersn+'"><div class="weui-cell__bd"><p>订单号:</p></div><div class="weui-cell__ft">'+obj.ordersn+'</div></a></div>'
								$("#infinites").append(contents);
		                    });
		                    
	                    } else {
	                    	alert('没有更多数据了');
	                    	return;
	                    }
	                }
	            });
				loading = false;
				
			},500);//模拟延迟
			//加载完数据重新赋值页码
			inp[0].defaultValue = pageNo;
		} else {
			alert('没有更多数据了');
			return;
		}
	});
</script>
