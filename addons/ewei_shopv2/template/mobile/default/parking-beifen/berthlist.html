        }

        .img {
            width: 79px;
            height: 1px;

        }

        .img img {

            margin-top: 12px;
        }

        .road {

        }

        .addr {
            /*color: rgb(180, 180, 180);*/

        .imap {

<body>

<div class="input-card" style="width: 100%;position:relative;margin-left: 10px;margin-top: 13px;font-size: 15px;">
    <div class="input-item">
        <div class="input-item-prepend"><span class="input-item-text">城市</span></div>
        <select id='city' style="width:100px" onchange='city(this)' name="city">
            {loop $data['city'] $index $item}
            <option value="{$item['CityId']}">{$item['CityName']}</option>
            {/loop}
        </select>
    </div>
    <div class="input-item">
        <div class="input-item-prepend"><span class="input-item-text">区域</span></div>
        <select id='province' style="width:100px" onchange='province(this)'>
            {loop $data['area'] $index $item}
            <option value="{$item['AreaId']}">{$item['AreaName']}</option>
            {/loop}
        </select>
    </div>
    <div class="input-item">
        <div class="input-item-prepend"><span class="input-item-text">街道</span></div>
        <select id='district' style="width:100px" onchange='district(this)'>
            {loop $data['street'] $index $item}
            <option value="{$item['StreetId']}">{$item['StreetName']}</option>
            {/loop}
        </select>
    </div>
    <!--<a class="imap">地图形式</a>-->
    <!--<div class="input-item">-->
    <!--<div class="input-item-prepend"><span class="input-item-text" >路段</span></div>-->

</div>

<div id="conten">

    {loop $data['coor']['roads'] $index $item}
    <div style="border-bottom:2px solid #d4dde4;">
        <a href="#" onclick="openMapApp(this);">
            <div class="img"><img src="../addons/ewei_shopv2/static/images/img/addr_icon.png"></div>
            <ul class="main">
                <li><span class="road">{$item['roadName']}</span><div style="margin-right: 75px;color: black; font-weight: normal;margin-top:4px;float: right; color: blue;"><span > (点击进入导航)</span></div></li>
                <li>
                    <span class="addr">
                    <!--<div class="ico">12m</div>-->
                    {$data['addr']}{$item['roadName']}</span>
                </li>
                <li class="">
                    <span class="num">总车位:<span class="num2">{php echo $item['parkSum']+$item['emptySum']}</span></span>
                    <span class="num" style="margin-left: 15px;">空闲车位:<span class="num2">{$item['emptySum']}</span></span></li>
            </ul>
        </a>
    </div>
    {/loop}
</div>

<div id="mapApp">
    
</div>

    var latitude;

    wx.config({
        debug: false,
        appId: '{$signPackage["appId"]}',
        timestamp: '{$signPackage["timestamp"]}',
        nonceStr: '{$signPackage["nonceStr"]}',
        signature: '{$signPackage["signature"]}',
        jsApiList: [
            'checkJsApi',
            'openLocation',
            'getLocation'
        ]
    });
    // wx.ready(function () {

    // });

    wx.checkJsApi({
        jsApiList: [
            'getLocation'
        ],
        success: function (res) {
            // alert(JSON.stringify(res));
            if (res.checkResult.getLocation == false) {
                alert('你的微信版本太低，不支持微信JS接口，请升级到最新的微信版本！');
                return;
            }
        }
    });


    //设备接口暂时只有一个城市，待完善
    function city(obj) {
        var city = $('#city').val();
        console.dir(city);
        return false;
    }


    function province(obj) {
        var street = $('#province').val();
        console.dir(street);
        $.ajax({
            type:'GET',
            url:'{php echo mobileUrl("parking/imap/getStreet")}',
            data:{'key':street},
            dataType:'json',
            success:function(res){
              console.dir(res);
              console.log(res.result.list[0]['StreetName']);
              var h = '<option>请选择</option>';
              for (var i=0;i<res.result.list.length;i++){
                  h+='<option value="'+res.result.list[i]['StreetId']+'">'+res.result.list[i]['StreetName']+'</option>';
              }
              $('#district').html(h);
            },
            error:function (xhr,status,error) {
                alert('抱歉,服务器开小差!');
            }
        });
        return false;
    }

    function district(obj) {
        var road = $('#district').val();
        console.dir(road);
        $.ajax({
            type:'GET',
            url:'{php echo mobileUrl("parking/imap/getRoad")}',
            data:{'key':road},
            dataType:'json',
            success:function(res){
                var h = '';
                var city = $("#city").find("option:selected").text();
                var area = $("#province").find("option:selected").text();
                for (var i=0;i<res.result.list.length;i++){
                    h += ' <div style="border-bottom:2px solid #d4dde4;">\n' +
                        '        <a href="#" onclick="openMapApp(this);">\n' +
                        '            <div class="img"><img src="../addons/ewei_shopv2/static/images/img/addr_icon.png"></div>\n' +
                        '            <ul class="main">\n' +
                        '                <li><span class="road">'+res.result.list[i]['roadName']+'</span><div style="margin-right: 75px;color: black; font-weight: normal;margin-top:4px;float: right; color: blue;"><span > (点击进入导航)</span></div></li>\n' +
                        '                <li>\n' +
                        '                    <span class="addr">\n' +
                        '                    <!--<div class="ico">12m</div>-->\n' +
                        '                    '+city+area+res.result.list[i]['roadName']+'</span>\n' +
                        '                </li>\n' +
                        '                <li class="">\n' +
                        '                    <span class="num">总车位:<span class="num2">'+(parseInt(res.result.list[i]['emptySum'])+parseInt(res.result.list[i]['parkSum']))+'</span></span>\n' +
                        '                    <span class="num" style="margin-left: 15px;">空闲车位:<span class="num2">'+res.result.list[i]['emptySum']+'</span></span></li>\n' +
                        '            </ul>\n' +
                        '        </a>\n' +
                        '    </div>';
                }

                $('#conten').html(h);
            },
            error:function (xhr,status,error) {
                alert('抱歉,服务器开小差!');
            }
        });
        return false;
    }

    function openMapApp(type) {
        wx.getLocation({
            success: function (res) {
                latitude = res.latitude; // 纬度，浮点数，范围为90 ~ -90
                longitude = res.longitude; // 经度，浮点数，范围为180 ~ -180。
                speed = res.speed; // 速度，以米/每秒计
                accuracy = res.accuracy; // 位置精度
                wx.openLocation({
                    latitude: latitude, // 纬度，浮点数，范围为90 ~ -90
                    longitude: longitude, // 经度，浮点数，范围为180 ~ -180。
                    name: '佛山市', // 位置名

                    infoUrl: '' // 在查看位置界面底部显示的超链接,可点击跳转
                });
            },
            cancel: function (res) {
                // alert('用户拒绝授权获取地理位置');
            }
        });
        // switch (type) {

        //         break;

        //         break;
