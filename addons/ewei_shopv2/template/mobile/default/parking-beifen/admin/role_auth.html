{template "parking/base/header"}
<body>
<div class="wx_box">
    <h1 class="title_h1">
        <a href="javascript:history.back(-1);" class="title_h1_return"><img src="../addons/ewei_shopv2/static/images/img/return.png" alt="返回" /></a>
        <span>角色添加</span>
        <a href="https://www.sobot.com/chat/pc/index.html?sysNum=0e3544a96d5e41f4919655542ba43428" class="title_h1_service">联系客服</a>
    </h1>
    <div class="manager">
        <div class="manager_top">
            <img src="../addons/ewei_shopv2/static/images/img/touxiang.jpg">
            <h3>{$data['role']['name']}</h3>
            <p>用户：{$_SESSION['RoleUserInfo']['user_name']}</p>
            <p>商户：{$data['company']['name']}</p>
        </div>
        <div class="manager_content">
            <div class="manager_content_li"><span>角色名称</span><input type="text" name="name" id="name" value="" /><i class="manager_tab_close"><img src="../addons/ewei_shopv2/static/images/img/manager_tab_close.png" alt="关闭" /></i></div>
            <div class="manager_content_li"><span>用户名称</span><input type="text" name="user_name" id="userName" value="" /><i class="manager_tab_close"><img src="../addons/ewei_shopv2/static/images/img/manager_tab_close.png" alt="关闭" /></i></div>

            <div class="manager_content_li">
                <span>角色权限</span>
                <p class="manager_content_select">
                    <i class="on" data="1">可读</i>
                    <i data="0">可写</i>
                </p>
            </div>
            <div class="manager_content_li"><span>手机号</span><input type="tel" minlength="11" name="mobile" id="tel" value="" placeholder="输入角色用户手机号" /></div>
        </div>
        <div class="manager_content_submit"><span class="save">保存</span><span class="back">返回</span></div>
    </div>
    <div class="footer">Technology by </div>
    <div class="footer_placeholder"></div>
    <div class="black_bg"></div>
    <div class="login_tips" style="display: none;"></div>
</div>
</body>
<script type="text/javascript">

    $(".manager_content_select i").click(function(){
        $(this).addClass("on").siblings("i").removeClass("on");
    });
    $(".back").click(function () {
        history.back(-1);
    });
    $(".save").click(function () {
       var mobile =$("#tel").val();
       var name  =$("#name").val();
       var userName=$("#userName").val();
       var authType =$(".manager_content_select .on").attr("data");
       if(mobile==''||name==''){
           $(".login_tips").html("请填写所有参数");
            $(".login_tips").css("display",'block');
            setTimeout(function () {
                $(".login_tips").hide();
            },1000);
            return false;
       }
       if(mobile.length<11){
           $(".login_tips").html("手机格式不正确");
           $(".login_tips").css("display",'block');
           setTimeout(function () {
               $(".login_tips").hide();
           },1000);
           return false;
       }
       ajaxRequest(mobile,name,authType,userName);
    });
    function ajaxRequest(mobile,name,authType,userName) {
        $.post("{php echo mobileUrl('parking/admin/index/roleAuthAdd')}",{"mobile":mobile,"name":name,"authType":authType,'userName':userName},function (data) {
            var deData=JSON.parse(data);
            if(deData.status==1){
                $(".login_tips").html("添加完成");
                $(".login_tips").css("display",'block');
                setTimeout(function () {
                    $(".login_tips").hide();
                },1000);
            }
            if(deData.status==0){
                $(".login_tips").html("权限不足");
                $(".login_tips").css("display",'block');
                setTimeout(function () {
                    $(".login_tips").hide();
                },1000);
            }
        })
    }
</script>
</html>
