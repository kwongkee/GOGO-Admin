<script type="text/javascript">

	$(function(){
		
		$('#ok').click(function(){
			$('#show1').css('display','block');
		});
		
		
		$('#quxiao,#close').click(function(){
			$('#show1').css('display','none');
		});
		
		
		$('#query').click(function(){
			var p_url = $('#url').val();
			$.ajax({
				type:"POST",
				url:p_url,
				data: '&'+$('#kp').serialize(),
				dataType:'json',
				success:function(data)
				{
					console.dir(data);
					if(data.status == 1)
					{
						alert(data.message);
						$('#show1').css('display','none');
						
						location.reload();
					}else {
						alert(data.message);
						$('#show1').css('display','block');
					}
				}
			});
		})
		
		
		//  拒绝开票
		$('#no').click(function(){
			$('#show2').css('display','block');
		});
		
		
		$('#quxiao1,#close1').click(function(){
			$('#show2').css('display','none');
		});
		
		
		$('#query1').click(function(){
			var p_url = $('#url1').val();
			
			$.ajax({
				type:"POST",
				url:p_url,
				data: '&'+$('#kpno').serialize(),
				dataType:'json',

				{
					console.dir(data);
					
					if(data.status == 1)
					{
						alert(data.message);
						$('#show2').css('display','block');
					}else {
						alert(data.message);
						$('#show2').css('display','none');
					}
				}
			});
		})
		
	})
	
	
	
	
	
	
</script>
