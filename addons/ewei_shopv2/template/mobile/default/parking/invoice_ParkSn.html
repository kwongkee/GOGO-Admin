	.btn{

</style>
<!-- 引入jQuery 2.0+ -->
<script src="http://apps.bdimg.com/libs/jquery/2.1.4/jquery.min.js"></script>
<!-- 引入YDUI脚本 -->
<script src="../addons/ewei_shopv2/static/ydui/ydui.js"></script>
<!--<script src="http://frozenui.github.io/js/frozen.js" type="text/javascript" charset="utf-8"></script>-->
<body>


<header class="ui-header ui-header-stable ui-border-b">
    <i class="ui-icon-return" onclick="history.back()"></i><h1>{$title}</h1>
</header>
<div style="margin-top:50px;"></div>

<body>
		
<div class="ui-form ui-border-t">
    <form action="#" method="post" id="parkOrd">
    	
        <div class="ui-form-item ui-form-item-checkbox ui-border-b borderb" style="">
            <label class="ui-checkbox">
                <input type="checkbox" name="checkbox" checked class="ckid" value="{$parkNum['id']}"/>
                <input type="hidden" name="money" value="{$parkNum['pay_account']}" />
            </label>
            <div style="width: 80%;height: 100%;text-align: left;margin-left: 10px;">
            	<ul id="itdemo" style="height: 100%;">
            		<li class="cols">消费金额：<lable class='col'>￥{$parkNum['pay_account']}</lable>元</li>
            		<li class="cols">消费项目：<lable style='color: green;'>{$parkNum['body']}</lable></li>
            		<li><lable class="cols">消费时间：<?php echo date('Y-m-d H:i',$parkNum['pay_time'])?></lable></li>
            	</ul>
            </div>
        </div>
        
		
        <div id="bottem" style="text-align: left;margin-top: 3px;font-size: 16px;">
			
        	<label class="ui-checkbox" style="padding-left:12px;margin-top: 3px;float:left">
                <input type="hidden" name="url" id="url" value="{php echo mobileUrl('parking/invoicelist/CheckHead');}" />
				<input type="hidden" name="urls" id="urls" value="{php echo mobileUrl('parking/invoicelist/park_post');}" />
            </label>
			
        	<div class="ui-btn-wrap">
			    <button type="button" id="ucheck" class="ui-btn-lg ui-btn-primary" style="font-size: 25px;">前往开票</button>
			</div>
        </div>
    </form>
    
    <!-- 下载提示  -->
    <div class="ui-dialog" id="show1" style="display:none;">
	    <div class="ui-dialog-cnt" style="margin: 200px auto;top:-60px;width: 90%;">	    	
	        <header class="ui-dialog-hd ui-border-b">
                <h3>发票抬头信息</h3>
                <i class="ui-dialog-close" data-role="button" id="close"></i>
	        </header>
			<hr>
			
	        <div class="ui-dialog-bd" style="text-align: center;">
				<label style="color:#0997F7">发票抬头</label>
				<p id="copy"></p>
				<hr>
				
				<label style="color:#0997F7">纳税人识别号</label>
				<p id="nsrsbh"></p>
				<hr>
				
				<label style="color:#0997F7">开票金额(含税金额)</label>
				<p id="moneys"></p>
				<hr>
				
				<button class="btn btn-primary" id="uchecks">确认开票</button>				
				<a href="{$selectHead}" class="btn btn-danger"  id="change">抬头管理</a>
				
	        </div>
			
	    </div>
	</div>
	
	
	<div class="ui-dialog" id="show3" style="display:none;">
	    <div class="ui-dialog-cnt" style="margin: 200px auto;">	    	
	        <header class="ui-dialog-hd ui-border-b">
                <h3>发票下载</h3>
                <i class="ui-dialog-close" data-role="button" id="close"></i>
	        </header>
	        <div class="ui-dialog-bd" style="text-align: center;">
	            <a href="" id="pdf" style="color: cornflowerblue;">点击下载发票</a>
	        </div>      
	    </div>
	</div>
	
	
	<!-- 加载提示 -->
	<div class="ui-dialog" id="show2" style="display: none;">
	    <div class="ui-dialog-cnt" style="margin: 200px auto;">
	        <div class="ui-dialog-bd">
	            <div>
		            <h4>正在努力开发票中请稍后...</h4>
	            </div>
	        </div>	       
	    </div>	    
	</div>
	
</div>

<script type="text/javascript">
	
	$('#close').click(function(){
		$('#show1').css('display','none');
		window.location.reload();
	})
	
	// 前往开票按钮
	$("#ucheck").click(function() {
		
		var urls = $('#url').val();
		var money = 0;
		$(":checkbox:checked").each(function() {	
	    	//获取选中的兄弟金额
	    	money = parseFloat(money + $($(this).siblings()).val()).toFixed(2);
	    })
		// 开票金额
		money = Math.round(money * 100)/100;
		
		$.ajax({
            url:urls,
            type:'post',
            data:'payMoney=123',
            dataType:'json',
            success:function(data) {
            	
                if(data.status == 'success') {
				
					$('#show1').css('display','block');
					$('#copy').html(data.info.head_name);
					$('#nsrsbh').html(data.info.nsrsbh);
					$('#moneys').html(money+'元');
					
                }else if(data.status == 'error') {
				
					if(confirm(data.msg)){
						window.location.href = data.info.urls;
					} else {
						window.location.reload();
					}
					
				}
            }
      	});
		
	});
	
	
	
	//确认开票按钮
	$("#uchecks").click(function(){
	
		$('#uchecks').attr('disabled',true);
		//$('#ucheck').hide();
      	var str= new Array();
      	var money  = 0 ;
		var moneys = 0 ;
      	var urls = $('#urls').val();
		var sib  = 0;
	    $(":checkbox:checked").each(function() {
	    	//获取
	    	str.push($(this).val());			
	    	//获取选中的兄弟金额
	    	money = parseFloat(money + $($(this).siblings()).val()).toFixed(2);
	    })
		// 开票金额
		money = Math.round(money * 100)/100;
		
		if(str.length <= 0){
	    	alert('请选择开票的订单');
	    	return false;
	    }
		
	    if(money <= 0) {
	    	alert('开票金额必须大于0元');
	    	return false;
	    }
		
	    $('#num').text(str.length);
	    $('#money').text('￥'+money);
		
	    $('#show2').css('display','block');  
 		
		$.ajax({
           url:urls, 
              //url:'/app/'+"{php echo $this->createMobileUrl('Signup',array('op'=>'sign'))}",
            type:'post',
            data:'payMoney='+money+'&parkCheck='+str,            
            dataType:'json',
            success:function(data) {
				
                if(data.statu == 'success'){
                	
					$('#show2').css('display','none');
					$('#pdf').attr('href',data.pdfurl);
					//$('#show3').css('display','block');
					
					alert('开票成功');
					setInterval(function(){
						window.location.href = data.pdfurl;
					},200);
					
                }else if(data.statu == 'headNodata') {
					$('#show2').css('display','none');
					alert(data.msg)
					setInterval(function(){
						window.location.href = data.pdfurl;
					},150)
                }else if(data.statu == 'error') {
					alert(data.msg);
					window.location.reload();
				}else{
                	alert('请查看开票历史！')
                }
            }
      	});
     });
     
     
	 
     //全选按钮
     $("#btn1").click(function() {
     	
     	if($('input[name="btn"]:checked').val() == 'all') {
     		$('.ckid').prop("checked",true);
     		$(this).prop("checked",true);
     		$(this).val('');
     		
     		var str= new Array();
	      	var money = 0 ;
		    $(":checkbox:checked").each(function() {
		    	str.push($(this).val());
		    	//获取选中的兄弟金额
		    	money = money + parseFloat($($(this).siblings()).val());
		    })
		    $('#num').text(str.length);
		    $('#money').text('￥'+money);
     		
     	} else {     		
     		$('.ckid').prop("checked",false);
     		$(this).prop("checked",false);
     		$(this).val('all');
     		$('#num').text('0');
     		$('#money').text('￥0');
     	}
     });
     
     
</script>
</body>
</html>
