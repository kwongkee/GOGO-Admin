{template "parking/_header"}
<link rel="stylesheet" href="../addons/ewei_shopv2/static/css/frozenui/css/frozen.css">
<style type="text/css">
	.sp1{font-size:13px;color:red;}
	.sp2{margin-left:55px;font-size:18px;color:#fff}
	.weui_panel{background:url(../addons/ewei_shopv2/static/images/orderbg.png) repeat-y 0 0;border-radius:4px;box-shadow: 0px 4px 4px #BADBFE;}
	ul>li{
		width: 100%;
		height: 35px;
		border-bottom: 1px solid darkgray;
		line-height: 35px;
		text-align: center;
		padding-left: 10px;
		background-color:#f8f8f8;
		
	}
	ul{background-color:#f8f8f8;margin: 0px;}
	ul>li>a{color:black;}
	
	.bodys{width:100%;font-size:22px;text-align:center;}
	
	.tops{width:100%;height:45px;line-height:45px;color:#FFFFFF;background:#18b4ed;text-align:center;margin-bottom:8px;border-radius:3px;}
	
	.footers{width:100%;height:45px;line-height:45px;color:#FFFFFF;background:#18b4ed;text-align:center;margin-bottom:8px;border-radius:3px;margin-top:15px;}
	
	.one{width:50%;height:40px;line-height:40px;border-bottom:1px solid #8A8A8A;text-align:center;font-size:20px;float:left;color:#32CD32;font-weight:both;}
	.two{width:50%;height:40px;line-height:40px;border-bottom:1px solid #8A8A8A;text-align:center;font-size:20px;float:left;color:#32CD32;font-weight:both;}
	
	.clear{clear:both;}
	
	.ones{width:50%;padding:5px auto;text-align:center;float:left;margin-bottom:5px;}
	.ones a{width:98%;height:42px;line-height:42px;float:left;text-align:center;border-bottom:1px solid #32CD32;margin:2px auto;font-size:18px;}
	
	.twos{width:50%;padding:5px auto;text-align:center;float:right;margin-bottom:5px;}
	.twos a{width:98%;height:42px;line-height:42px;float:right;text-align:center;border-bottom:1px solid #32CD32;margin:2px auto;font-size:18px;}
	
	
	.fone{width:50%;height:40px;line-height:40px;border-bottom:1px solid #8A8A8A;text-align:center;font-size:20px;float:left;color:#32CD32;font-weight:both;}
	.ftwo{width:50%;height:40px;line-height:40px;border-bottom:1px solid #8A8A8A;text-align:center;font-size:20px;float:left;color:#32CD32;font-weight:both;}
	
	.fones{width:50%;padding:5px auto;text-align:center;float:left;margin-bottom:5px;}
	.fones a{width:98%;height:42px;line-height:42px;float:left;text-align:center;border-bottom:1px solid #32CD32;margin:2px auto;font-size:18px;}
	
	.ftwos{width:50%;padding:5px auto;text-align:center;float:right;margin-bottom:5px;}
	.ftwos a{width:98%;height:42px;line-height:42px;float:right;text-align:center;border-bottom:1px solid #32CD32;margin:2px auto;font-size:18px;}

<body>

<header class="ui-header ui-header-stable ui-border-b">
    <i class="ui-icon-return" onclick="history.back()"></i><h1>{$title}</h1>
</header>
<div style="margin-top:55px;background-color:#f8f8f8;">

	<div class="bodys">
		<div class="tops">停车服务发票</div>
		
		<div class='tops1' style="display:block">
		
			<div class="one">发票开具</div>
			<div class="two">历史查询</div>
			
			<div class="clear"></div>
			
			<div class="ones" style="display:block">
				<a href="{php echo mobileUrl('parking/invoicelist/headers');}">添加抬头</a>
				<a href="{php echo mobileUrl('parking/invoicelist/select_head');}">抬头管理</a>
				<a href="{php echo mobileUrl('parking/invoicelist/park');}">订单开票</a>
				<div class="clear"></div>
			</div>
			
			<div class="twos" style="display:none">
				<a href="{php echo mobileUrl('parking/invoicelist/history');}">历史发票</a>
				<div class="clear"></div>
			</div>
			
		</div>
		
		
		
		<div class="clear"></div>
		<div class="footers">电商服务发票</div>
		<div class='footers1' style="display:none">
		
			<div class="fone">发票开具</div>
			<div class="ftwo">历史查询</div>
			
			<div class="clear"></div>
			
			<div class="fones" style="display:none">
				<a href="{php echo mobileUrl('parking/invoicelist/shop');}">电商服务开票</a>
				<div class="clear"></div>
			</div>
			
			<div class="ftwos" style="display:none">
				<a href="{php echo mobileUrl('parking/invoicelist/shop_history');}">电商服务历史</a>
				<div class="clear"></div>
			</div>
			
		</div>
	</div>
	
</div>

<script>

$(document).ready(function(){
	$(".tops").click(function(){
		$('.tops1').toggle();
	});
	
	$('.one').click(function(){
		$('.ones').toggle();
	})
	
	$('.two').click(function(){
		$('.twos').toggle();
	})
	
	
	
	
	$(".footers").click(function(){
		$('.footers1').toggle();
	});
	
	$('.fone').click(function(){
		$('.fones').toggle();
	})
	
	$('.ftwo').click(function(){
		$('.ftwos').toggle();
	})
	
})

</script>


</body>
