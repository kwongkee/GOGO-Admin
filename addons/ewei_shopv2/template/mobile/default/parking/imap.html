        html,body,#container{

        .info {

            position: relative;
            background: none repeat scroll 0 0 #F9F9F9;
            border-bottom: 1px solid #CCC;
            border-radius: 5px 5px 0 0;
        }
        div.info-top div {
            display: inline-block;
            color: #333333;
            font-size: 14px;
            font-weight: bold;
            line-height: 31px;
            padding: 0 10px;
        }
        div.info-top img {
            position: absolute;
            top: 10px;
            right: 10px;
            transition-duration: 0.25s;
        }
        div.info-top img:hover {
            box-shadow: 0px 0px 5px #000;
        }
        div.info-middle {
            font-size: 12px;
            padding: 6px;
            line-height: 20px;
        }
        div.info-bottom {
            height: 0px;
            width: 100%;
            clear: both;
            text-align: center;
        }
        div.info-bottom img {
            position: relative;
            z-index: 104;
        }
        span {
            margin-left: 5px;
            font-size: 11px;
        }
        .info-middle img {
            float: left;
            margin-right: 6px;
        }
        .main{
            border:1px solid #000;
            width: 160px;
            height: 120px;
            background-color: aliceblue;
        }
        .main li{
            list-style-type:none;
            margin-left: -12px;
        }

            console.log(e);
            // return false;
            infoWindow = new AMap.InfoWindow({

                draggable: true,  //是否可拖动

            var data=[{"fLong":'112.00003','orderON':'1232','tranOFID':'1232','fLati':'38.2345'},{"fLong":'115.00003','orderON':'1232','tranOFID':'1232','fLati':'38.2345'}];
            e.data = data;
            var marker;
            for(var i=0 ; i< e.data.length;i++){
                var jfong=[ e.data[i].fLong,e.data[i].fLati];
                marker = new AMap.Marker({
                    position: jfong,
                    zIndex: 101,
                    map:map
                });
                console.log(e.data[1]);
                marker.setMap(map);
                marker.orderON=e.data[i].orderON;
                marker.tranOFID=e.data[i].tranOFID;
                // marker.fhadd=e.data[i].fhadd;
                // marker.sAdd=e.data[i].sAdd;
                // marker.status=e.data[i].status;
                marker.on('click', function(e){
                    infoWindow.setContent("<ul class='main'><li> 地址： <span style='color:blue'>"+e.target.orderON+"</span></li>"
                        + "<li>  可用车位数: <span style='color:blue'>"+e.target.tranOFID+"  </span></li>"
                        +"<li>点击导航:<span style='color:blue'><a>导航</a></span></li>");
                    infoWindow.open(map, e.lnglat);
                });

            }	// for-end

        }


    }); //	Ajax结束
    function closeInfoWindow() {
        map.clearInfoWindow();
