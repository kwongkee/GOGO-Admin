<body>
    <form>
    <label name="file">
        <div class="layui-upload-drag" id="test10">
                <i class="layui-icon" style="background-image('../addons/ewei_shopv2/static/images/upload.png')"><img style="width:70px;" src="../addons/ewei_shopv2/static/images/upload.png"></i>
                <p>点击上传</p>
                <input type="file" name='file'  id="file" style="display:none;" onchange="preview(this)" accept="image/*">    
                <label></label>
        </div>
    </label>
    <div id="n">
            <ul>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
            </ul>
        </div>
</form>
<a style="clear:both;background-color:#0099ff" javascript:void; class="weui_btn weui_btn_primary">确认</a>
<script>
    function ImageView(obj){
        if(obj.files && obj.files[0]){
            var reader=new FileReader();
            reader.onload=function(evt){
                $("#test10").html('<img style="width:270px;" src="'+evt.target.result+'">');
            }
            reader.readAsDataURL(obj.files[0]);
        }
   }
   function preview(file){
            var formData=new FormData();
            var file1=document.getElementById("file");
            formData.append("file", file1.files[0]);
            setTimeout(function(){
                ImageView(file);
            },500);
            $.ajax({
                url:"{php echo mobileUrl('parking/admin/imagePost')}",
                type:"post",
                data:formData,
                processData:false,
                contentType:false,
                success:function(msg){
                    console.dir(msg);
                },
                error:function(){
                    alert('服务错误');
                }
            })
   }
</script>
