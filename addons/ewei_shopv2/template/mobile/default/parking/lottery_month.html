<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>抽签</title>
    <meta name="keywords" content="">
    <meta name="description" content="">
    <link rel="stylesheet" href="../addons/ewei_shopv2/static/css/style.css">
    <script src="../addons/ewei_shopv2/static/js/jquery.min.js"></script>
    <script src="../addons/ewei_shopv2/static/js/jquery.rotate.min.js"></script>
    <script src="../addons/ewei_shopv2/static/js/jquery.kxbdmarquee.js"></script>
</head>
<body>
<div class="container">

    {if $time>$time2 }
    <div style="margin-left: 50px;margin-top: 40px;font-size: 35px;display: block;">
    {else}
        <div style="margin-left: 50px;margin-top: 40px;font-size: 35px;display: none;">
    {/if}
        <div>
            <span id="_d">00</span>
            <span id="_h">00</span>
            <span id="_m">00</span>
            <span id="_s">00</span>
        </div>
    </div>

        {if $time<$time2}
        <div class="lottery-box" style="display: block;">
        {else}
        <div class="lottery-box" style="display: none;">
        {/if}
        <div class="lottery-img">
            <a class="lottery-btn" href="javascript:;" title="开始抽奖"></a>
        </div>
    </div>

    <div class="list">
        <h4>
            <span>方案</span>
            <span>轮次</span>
            <span>卡类</span>
            <span>手机号</span>
        </h4>
        <div class="kxbdMarquee">
            <ul id="lists">
            </ul>
        </div>
    </div>

    <div class="list">
        <h4>
            <span>方案</span>
            <span>轮次</span>
            <span>卡类</span>
            <span>手机号</span>
        </h4>
        <ul>
            <li>
                <span>{$month['scheme_name']}</span>
                <span>{$round['lun']['name']}</span>
                <span>{$month['month_name']}</span>
                <span>{$round['lun']['lottery_user']}</span>
            </li>
        </ul>
    </div>
    <a href="#" class="btn" onclick="charge(this);">更换抽签人</a>
</div>
<div style="display: none;" id="ch">
    <form action="{php echo mobileUrl('parking/lottery_month/changeLottery')}" method="post">
    <input type="text" name="tel" value="" style="margin-left: 120px;line-height: 24px;width: 133px;" placeholder="请输入手机号">
    <input type="hidden" name="mid" value="{$round['m_id']}">
    <input type="hidden" name="n" value="{$_GPC['n']}">
    <button  class="btn" onclick="charge();">确定</button>
    </form>
</div>
</body>
<script>
    var time = {$time};
    var time2 ={$time2};
    var isRun = false;
    var isRq  = false;
    function requestLottery(){
        if (isRq) return false;
        var m_id = $('input[name="mid"]').val();
        var n = $('input[name="n"]').val();
        $.get("{php echo mobileUrl('parking/lottery_month/startLottery')}",{mid:m_id,n:n},function (res) {
            isRq = true;
            var data = JSON.parse(res);
            alert(data.result.message);
        });

    }

    function fetcchWinList(){
        var m_id = $('input[name="mid"]').val();
        $.get("{php echo mobileUrl('parking/lottery_month/getFetchWinList')}&mid="+m_id,{},function (res) {
            var data = JSON.parse(res);
            $("#lists").append(data.result.message);
        });
        // var js = document.createElement("SCRIPT");
        // js.language = "javascript";
        // js.src = "../addons/ewei_shopv2/static/js/jquery.kxbdmarquee.js";
        // document.getElementsByTagName("HEAD")[0].appendChild(js);
    }

    $('.lottery-btn').on('click', function () {
        if (isRun) return false;
        requestLottery();
        var data = parseInt(6 * Math.random()); // 1到6随机数
        rotateFunc($(this), data, 800, '6');

    });
    function rotateFunc(el, awards, angle, text) {
        isRun = true;
        el.stopRotate();
        el.rotate({
            angle: 0,
            duration: 10000,
            animateTo: angle + 2000,
            callback: function() {
                isRun = false;
                fetcchWinList();
            }
        });

    }

    $('.kxbdMarquee').kxbdMarquee({
        direction: 'up',
        isEqual: false,
        scrollDelay: 50
    });
    function charge(obj) {
        var min = Math.floor((time-time2)/60);
        if (min<60){
            alert('更换时间已过');
            return false;
        }
        $("#ch").css('display','block');
        $(obj).css('display','none');
        return false;
    }
    function countTime() {
        var date = new Date();
        var now = date.getTime();
        var endDate = new Date("{$round['lun']['time']}");//设置截止时间
        var end = endDate.getTime();
        var leftTime = end - now; //时间差
        var d, h, m, s, ms;
        if(leftTime >= 0) {
            d = Math.floor(leftTime / 1000 / 60 / 60 / 24);
            h = Math.floor(leftTime / 1000 / 60 / 60 % 24);
            m = Math.floor(leftTime / 1000 / 60 % 60);
            s = Math.floor(leftTime / 1000 % 60);
            // ms = Math.floor(leftTime % 1000);
            // if(ms < 100) {
            //     ms = "0" + ms;
            // }
            if(s < 10) {
                s = "0" + s;
            }
            if(m < 10) {
                m = "0" + m;
            }
            if(h < 10) {
                h = "0" + h;
            }
        } else {
            console.log('已截止')
            window.location.reload();
        }
        //将倒计时赋值到div中
        document.getElementById("_d").innerHTML = d + "天";
        document.getElementById("_h").innerHTML = h + "时";
        document.getElementById("_m").innerHTML = m + "分";
        document.getElementById("_s").innerHTML = s + "秒";
        setTimeout(countTime, 50);
    }

    countTime();
</script>
</html>
