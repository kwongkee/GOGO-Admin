{template "parking/base/header"}
<body>
<div class="wx_box">
    <h1 class="title_h1">
        <a href="javascript:history.back(-1);" class="title_h1_return"><img src="../addons/ewei_shopv2/static/images/img/return.png" alt="返回" /></a>
        <span>泊位添加</span>
        <a href="https://www.sobot.com/chat/pc/index.html?sysNum=0e3544a96d5e41f4919655542ba43428" class="title_h1_service">联系客服</a>
    </h1>
    <div class="design_plan">
        <!--泊位添加-->
        <div class="design_plan_detalis">
            <ul class="design_plan_ul">
                <li><span>计费方案</span><em class="design_plan_select" id="plan">方案A</em></li>
                <li><span>泊位地址</span><em id="area" class="design_plan_select">广东省广州市天河区</em></li>
                <li><span>地址详情</span><em id="street" class="design_plan_select">华美镇民丰村</em></li>
                <li><span>所属道路</span><input id="start" type="text" placeholder="请输入道路路名" /></li>
                <li><span>道路编号</span><input type="text" placeholder="请输入2位数字的编号" /></li>
            </ul>
        </div>
        <!--泊位添加 end-->
        <!--添加泊位-->
        <div class="design_plan_detalis">
            <h3 class="title_h3"><span>添加泊位</span></h3>
            <ul class="design_plan_park">
                <li>
                    <div class="design_plan_park_left">
                        <span>设备编号</span>
                        <em>199882</em>
                    </div>
                    <div class="design_plan_park_center">
                        <span>泊位编号</span>
                        <em><input type="text" placeholder="请输入编号"/></em>
                    </div>
                    <div class="design_plan_park_right">
                        <em><img src="../addons/ewei_shopv2/static/images/img/park_add.png" /></em>
                    </div>
                </li>
                <li>
                    <div class="design_plan_park_left">
                        <span>设备编号</span>
                        <em>199882</em>
                    </div>
                    <div class="design_plan_park_center">
                        <span>泊位编号</span>
                        <em><input type="text" placeholder="请输入编号"/></em>
                    </div>
                    <div class="design_plan_park_right">
                        <em><img src="../addons/ewei_shopv2/static/images/img/park_add.png" /></em>
                        <em><img src="../addons/ewei_shopv2/static/images/img/park_minus.png" /></em>
                    </div>
                </li>
            </ul>
            <div class="design_plan_submit"><span class="save">提交</span><span class="back">返回</span></div>
        </div>
        <!--添加泊位 end-->
    </div>
    <div class="footer">Technology by </div>
    <div class="footer_placeholder"></div>
    <!--提示框-->
    <div class="black_bg"></div>
    <div class="popup_select">
        <ul>
            <li>选择1</li>
            <li>选择2</li>
        </ul>
        <p class="popup_select_cancel">取消</p>
    </div>
    <!--提示框-->
</div>
</body>
<script src="../addons/ewei_shopv2/static/js/new-js/mobileSelect.js"></script>
<script>
    var planArr=['方案A','方案B','方案C','方案D'];
    var planSelect = new MobileSelect({
        trigger: '#plan',
        title: '方案选择',
        wheels: [
            {data: planArr}
        ],
        position:[2], //初始化定位 打开时默认选中的哪个 如果不填默认为0
        transitionEnd:function(indexArr, data){
            //console.log(data);
        },
        callback:function(indexArr, data){
            console.log(data);
        }
    });

    var areaSelect = new MobileSelect({
        trigger: '#area',
        title: '地区选择',
        wheels: [
            {data:[
                    {
                        id:'1',

        ],
        transitionEnd:function(indexArr, data){
            //console.log(data);
        },
        callback:function(indexArr, data){
            console.log(data);
        }
    });

    var streetSelect = new MobileSelect({
        trigger: '#street',
        title: '街道选择',
        wheels: [
            {data:[
                    {
                        id:'1',

                            {id:'5',value:'10000米'}

                    {id:'3',value:'下城区'},
                    {id:'4',value:'江干区'},

                    {id:'6',value:'西湖区'}
                ]}
        ],
        transitionEnd:function(indexArr, data){

        },

        }
    });

</script>
</html>
