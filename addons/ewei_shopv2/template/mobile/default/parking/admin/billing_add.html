<body>

<div class="wx_box">

        <a href="javascript:history.back(-1);" class="title_h1_return"><img src="../addons/ewei_shopv2/static/images/img/return.png" alt="返回" /></a>

                            <input type="tel" value="0" id="free" />

                        </div>分

                </li>
                <li>
                    <span>时段收费</span>
                    <div class="otb_li_time">

                            <i class="otblt_minus"><img src="../addons/ewei_shopv2/static/images/img/minus.png"/></i>

                        </div>元/
                    </div>
                    <div class="otb_li_time">
                        <div>
                            <i class="otblt_minus"><img src="../addons/ewei_shopv2/static/images/img/minus.png"/></i>
                            <input type="tel" value="0" id="minute" />
                            <i class="otblt_add"><img src="../addons/ewei_shopv2/static/images/img/add.png"/></i>
                        </div>分钟
                    </div>
                </li>
                <li>
                    <span>时段封顶</span>
                    <div class="otb_li_time">
                        <div>
                            <i class="otblt_minus"><img src="../addons/ewei_shopv2/static/images/img/minus.png"/></i>
                            <input type="tel" value="0"  id="capped"/>
                            <i class="otblt_add"><img src="../addons/ewei_shopv2/static/images/img/add.png"/></i>
                        </div>元/
                    </div>
                </li>
                <li>
                    <span>预付费时间</span>
                    <div class="otb_li_time">

                            <i class="otblt_minus"><img src="../addons/ewei_shopv2/static/images/img/minus.png"/></i>
                            <input type="tel" value="0"  id="y_minute"/>

                        </div>分钟/
                    </div>
                </li>
                <li>
                    <span>预付费收费</span>
                    <div class="otb_li_time">
                        <div>
                            <i class="otblt_minus"><img src="../addons/ewei_shopv2/static/images/img/minus.png"/></i>
                            <input type="tel" value="0"  id="y_price"/>
                            <i class="otblt_add"><img src="../addons/ewei_shopv2/static/images/img/add.png"/></i>
                        </div>元/
                    </div>
                </li>
            </ul>
            <div class="design_plan_submit"><span class="save" id="add" style="width:100%">添加时段</span></div>
        </div>
        <!--时段计费 end-->
        <!--封顶计费-->
        <div class="design_plan_detalis">
            <h3 class="title_h3"><span>封顶计费</span></h3>
            <ul class="design_plan_ul">
                <li>
                    <span>跨段封顶</span>
                    <div class="otb_li_time">
                        <div>
                            <i class="otblt_minus"><img src="../addons/ewei_shopv2/static/images/img/minus.png"/></i>
                            <input type="text" value="0"  id="time_limit"/>
                            <i class="otblt_add"><img src="../addons/ewei_shopv2/static/images/img/add.png"/></i>
                        </div>元
                    </div>
                </li>
                <li>
                    <span>全天封顶</span>
                    <div class="otb_li_time">
                        <div>
                            <i class="otblt_minus"><img src="../addons/ewei_shopv2/static/images/img/minus.png"/></i>
                            <input type="text" value="0"  id="Allcapped"/>
                            <i class="otblt_add"><img src="../addons/ewei_shopv2/static/images/img/add.png"/></i>
                        </div>元
                    </div>
                </li>
            </ul>
            <div class="design_plan_submit"><span class="save" id="sumbits">提 交</span><span class="back">返 回</span></div>
        </div>
        <!--封顶计费 end-->
    </div>
    <div class="footer">Technology by </div>
    <div class="footer_placeholder"></div>
    <div class="login_tips" style="display: none;"></div>
    <!--提示框-->
    <div class="black_bg"></div>
</div>
</body>
<script src="../addons/ewei_shopv2/static/js/new-js/mobileSelect.js"></script>
<script type="text/javascript">
    var timeArray={};
    var anapTimeArrray={};
    /**减分钟**/
    $(".otblt_minus").click(function(){
        var num = $(this).next("input").val().trim();
        if(num>0){
            num--;
            $(this).next("input").val(num);
        }else{
            $(this).next("input").val(0);
        }
    });
    /**减分钟end**/
    /**加分钟**/
    $(".otblt_add").click(function(){
        var num = $(this).prev("input").val().trim();
        if(num<0){
            num=0;
        }
        num++;
        $(this).prev("input").val(num);
    });
    /**加分钟end**/
    var planArr=['A','B'];
    var planSelect = new MobileSelect({
        trigger: '#plan',
        title: '方案选择',
        wheels: [
            {data: planArr}
        ],
        position:[2], //初始化定位 打开时默认选中的哪个 如果不填默认为0
        transitionEnd:function(indexArr, data){
            // console.log(data);
        },
        callback:function(indexArr, data){
            // console.log(data);
        }
    });
    var timeArr = ['08:00','08:59','09:00','09:59','10:00','10:59','11:00','11:59','12:00','12:59','13:00','13:59','14:00','14:59','15:00','15:59','16:00','16:59','17:00','17:59','18:00','18:59','19:00','19:59','20:00','20:59','21:00','21:59','22:00','22:59','23:00','23:59'];
    var startTimeSelect = new MobileSelect({
        trigger: '#startTime',
        title: '时间选择',
        wheels: [
            {data: timeArr}
        ],
        position:[1, 2],
        transitionEnd:function(indexArr, data){
            //console.log(data);
        },
        callback:function(indexArr, data){
            anapTimeArrray['starTime']=data[0];
        }
    });
    var overTimeSelect = new MobileSelect({
        trigger: '#overTime',
        title: '时间选择',
        wheels: [
            {data: timeArr}
        ],
        position:[1, 2],
        transitionEnd:function(indexArr, data){
            //console.log(data);
        },
        callback:function(indexArr, data){
            anapTimeArrray['endTime']=data[0];
        }
    });
    var n=0;
    $("#add").click(function () {
        anapTimeArrray['period_name']=$("#timeName").val();
        anapTimeArrray['free']=parseInt($("#free").val());
        anapTimeArrray['price']=parseInt($("#price").val());
        anapTimeArrray['minute']=parseInt($('#minute').val());
        anapTimeArrray['capped']=parseInt($("#capped").val());
        anapTimeArrray['y_minute']=parseInt($("#y_minute").val());
        anapTimeArrray['y_price']=parseInt($("#y_price").val());
        timeArray[n]=anapTimeArrray;
        n++;
        $("input").val(0);
        $("#timeName").attr("value","");
    });

    $("#sumbits").click(function () {
        var period_limit=$("#time_limit").val();
        var allCapped =$("#Allcapped").val();
        var fangan=$("#plan").html();
        $.post("{php echo mobileUrl('parking/admin/index/billingSave')}",{"periodTime":timeArray,"periodLimit":period_limit,"dayCapped":allCapped,"plan":fangan},function (data) {
            // var _data=JSON.parse(data);
            console.dir(data);
            // if(data.status==1){
            //     $(".login_tips").html(data.result.message);
            //     $(".login_tips").css("display",'block');
            //     setTimeout(function () {
            //         $(".login_tips").hide();
            //     },1000);
            // }
            // if(data.status==0){
            //     $(".login_tips").html(data.result.message);
            //     $(".login_tips").css("display",'block');
            //     setTimeout(function () {
            //         $(".login_tips").hide();
            //     },1000);
            // }
        });
    })
</script>
</html>
