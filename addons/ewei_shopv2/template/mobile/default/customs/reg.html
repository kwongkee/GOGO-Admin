
<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <!--主要I是强制让文档的宽度与设备宽度保持1:1，最大宽度1.0，禁止屏幕缩放。-->
    <meta content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" name="viewport">
    <!--这个也是iphone私有标签，允许全屏浏览。-->
    <meta content="yes" name="apple-mobile-web-app-capable">
    <!--iphone的私有标签，iphone顶端状态条的样式。-->
    <meta content="black" name="apple-mobile-web-app-status-bar-style">
    <!--禁止数字自动识别为电话号码，这个比较有用，因为一串数字在iphone上会显示成蓝色，样式加成别的颜色也是不生效的。-->
    <meta content="telephone=no" name="format-detection">
    <!--禁止email识别-->
    <meta content="email=no" name="format-detection">
    <link href="../addons/ewei_shopv2/static/css/customs-common.css" rel="stylesheet" type="text/css">
    <title>申报系统注册</title>
    <style>
        @media only screen  and (min-device-width : 320px)  and (max-device-width : 375px){}
        input,textarea {
            border: 0;
            -webkit-appearance: none;
        }
       input{
           line-height:normal;
           margin-top: 12px;
           height: 30px;
        }
        /*.r_but{*/
            /*width: 2.5rem;*/
        /*}*/
        #code{
            position: absolute;
            border-radius: 6px;
            background: #49b9eb;
            height: 0.8rem;
            width: 2.3rem;
            margin-left: 4rem;
            line-height: 0.8rem;
            margin-top: 8px;
        }
    </style>
    <script>
        (function (doc, win) {
            var docEl = doc.documentElement,
                resizeEvt = 'orientationchange' in window ? 'orientationchange' : 'resize',
                recalc = function () {
                    var clientWidth = docEl.clientWidth;
                    if (!clientWidth) return;
                    if(clientWidth>=750){
                        docEl.style.fontSize = '100px';
                    }else{
                        docEl.style.fontSize = 100 * (clientWidth / 750) + 'px';
                    }
                };

            if (!doc.addEventListener) return;
            win.addEventListener(resizeEvt, recalc, false);
            doc.addEventListener('DOMContentLoaded', recalc, false);
        })(document, window);
    </script>

</head>
<body>
<!--中间内容部分-->
<div id="content">
    <div class="txt01">平台
        <input type="text"  name="plat_name" value="{$plat_id['ebp_ent_name']}" disabled/>
    </div>
    <input type="hidden" id="plat_id" name="plat_id" value="{$plat_id['id']}"/>
    <div class="txt01">公司<input type="text" id="user_name" name="user_name" class="text" value="" placeholder="请输入公司"  onChange="check_for_btn()" /></div>
    <div class="txt01">公司<input type="text" id="company_num" name="company_num" class="text" value="" placeholder="请输入单一窗口编号"  onChange="check_for_btn()" /></div>
    <div class="txt01" style="position: relative;">手机
        <input type="number"  id="user_tel" name="user_tel" class="text" value="" pattern="[0-9]*" placeholder="请输入手机号" tabindex="10" onChange="check_for_btn()" />
        <button id="code"  class="r_but" onClick="yzm()">获取验证码</button>
    </div>
    <div class="txt01">验证码<input type="number" id="yzm" name="yzm" class="text" value=""placeholder="验证码"  onChange="check_for_btn()" /></div>
    <div class="txt01">邮箱<input type="text" id="user_email" name="user_email" class="text" placeholder="请输入邮箱地址" onChange="check_for_btn()" /></div>
    <div class="txt01">使用业务
       <select name="remark" id="remark"  multiple="multiple" size="2" style="margin-top:10px;line-height: 12px;height: 40px;">
           <option value="P">平台管理</option>
           <option value="E">电商预提</option>
           <option value="L">物流申报</option>
       </select>
    </div>
    <div class="txt01">所属商店
        <select name="buss_id" id="buss_id"   style="margin-top:10px;line-height: 12px;height: 40px;">
            {loop $buss_list $index $item}
            <option value="{$item['acid']}">{$item['name']}</option>
            {/loop}
        </select>
    </div>
</div>
<button id="btn" class="r_but" onClick="check()">确定</button>
<script src="../addons/ewei_shopv2/static/js/jquery-3.1.1.min.js" type="text/javascript" charset="utf-8"></script>


<script type="text/javascript">
    //弹出框
    function alert1(e) {
        $("body").append("<div id='msg'><span>" + e + "</span></div>");
        clearmsg();
    }

    //关闭弹出框
    function clearmsg() {
        var t = setTimeout(function() {
            $("#msg").remove();
        }, 2000)
    };

    //提交后的check
    function check() {

        var mobile = $("#user_tel").val();
        var realname = $("#user_name").val();
        var email = $('#user_email').val();
        var yzm =$('#yzm').val();
        var remark  = $('#remark').val();
        var buss = $('#buss_id').val();
        var company_num = $('#company_num').val();
        if(mobile == "") {
            alert1("请输入手机号");
            clearmsg();
            return false;
        }
        if(!(/^1[34578]\d{9}$/.test(mobile))) {
            alert1("请输入正确的手机号");
            clearmsg();
            return false;
        }
        if(realname == "") {
            alert1("请输入公司名称");
            clearmsg();
            return false;
        }
        if (email ==""){
            alert1("请输入邮箱");
            clearmsg();
            return false;
        }
        if (yzm ==""){
            alert1("请输入验证码");
            clearmsg();
            return false;
        }
        if (remark ==""){
            alert1("请输入业务");
            clearmsg();
            return false;
        }

        if (buss ==""){
            alert1("请选择店铺");
            clearmsg();
            return false;
        }

        if (company_num==""){
            alert1("请填写企业编号");
            clearmsg();
            return false;
        }

        $(".r_but").css("background", "#49b9eb");
        $.ajax({
           url:"{php echo mobileUrl('customs/reg/regStorage')}",
           type:"POST",
           dataType:"json",
           data:{plat_id:$("#plat_id").val(),user_name:realname,user_tel:mobile,user_email:email,remark:remark,yzm:yzm,buss_id:buss,company_num:company_num},
           success:function (res) {
               console.dir(res);
               alert1(res.result.message);
               clearmsg();
               if (res.status==0){
                   setTimeout(function () {
                       location.reload();
                   },3000);
               }
           } ,
            error:function () {
                alert1("请求错误!");
                clearmsg();
            }
        });
        return false;
    }

    //必填项没有全部填写时,灰色,全部填写时蓝色
    function check_for_btn() {
        var mobile = $("#user_tel").val();
        if(mobile != null) {
            $("#btn").css("background", "#49b9eb");
        }
    }

    var isRun = false;
    function Countdown(){
        isRun = true;
        $("#code").css("background", "#d1d5db");
        var timer = 60;
        $('#code').html(timer+'后重试');
        var timeOut = setInterval(function () {
            $('#code').html(timer+'后重试');
            if (timer<=0){
                timer = 60;
                isRun =false;
                $('#code').html('获取验证码');
                $("#code").css("background", "#49b9eb");
                clearInterval(timeOut);
            } else{
                timer--;
            }
        },1000);
    }

    function yzm(){
        var mobile = $("#user_tel").val();
        if(!(/^1[34578]\d{9}$/.test(mobile))) {
            alert1("请输入正确的手机号");
            clearmsg();
            return false;
        }
        if (isRun){
            return false;
        }
        Countdown();
        sendCode(mobile);
        return false;
    }

    function sendCode(tel){
        $.get("{php echo mobileUrl('parking/reg/code');}",{'mobile':tel},function(data){
            console.dir(data);
        });
    }

    $(function() {
        $("#btn").css("background", "#d1d5db");
    })
</script>

</body>
</html>
