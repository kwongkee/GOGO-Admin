{template 'htdemo/common_header'}

    <title>添加收款账号</title>
    <link href="css/plugins/iCheck/custom.css" rel="stylesheet">
    <link rel="stylesheet" href="./resource/htdemo/js/kindeditor/themes/default/default.css" />

</head>

<body class="gray-bg">
    <div class="wrapper wrapper-content animated fadeInRight">
        <div class="row">
            <div class="col-sm-12">
                <div class="ibox float-e-margins">
                    <div class="ibox-title">
                        <h5>添加收款账号</h5>
                        <small><a href="article.php" style="color:#ccc;margin-left:10px"><i class="fa fa-list"></i>添加收款账号</a></small>
                        <div class="ibox-tools"><button type="button" id="loading-example-btn" class="btn btn-white btn-sm"><i class="fa fa-refresh"></i> 刷新</button>

                            <a class="collapse-link">
                                <i class="fa fa-chevron-up"></i>
                            </a>
                            <a class="close-link">
                                <i class="fa fa-times"></i>
                            </a>
                        </div>
                    </div>
                    <div class="ibox-content">
                        <form method="get" class="form-horizontal">
                            <div class="form-group">
                                <label class="col-sm-2 control-label">法人手机号</label>

                                <div class="col-sm-3">
                                    <input type="text" class="form-control" name="phone">
                                </div>
                            </div>
                            
                            <div class="hr-line-dashed"></div>
                            <div class="form-group">
                                <label class="col-sm-2 control-label">收款账号</label>
                                <div class="col-sm-3">
                                    <input type="text" class="form-control" name="Anumber">
                                </div>
                            </div>
                            
                            <div class="hr-line-dashed"></div>
                            <div class="form-group">
                                <label class="col-sm-2 control-label">结算方式</label>

                                <div class=" checkbox i-checks col-sm-10">
                                <label>
                                    <input type="radio" checked="" value="1" id="optionsRadios1" name="optionsRadios">支付宝</label>
                                 <label>
                                <input type="radio" value="0" id="optionsRadios2" name="optionsRadios">微信</label>
                                </div>
                            </div>
                            
                            <div class="hr-line-dashed"></div>
                            <div class="form-group">
                                <label class="col-sm-2 control-label">添加时间</label>

                                <div class="col-sm-10">
                                    <input type="date" readonly="true" class="form-control  layer-date" id="date">
                                </div>
                            </div>           
                            
                            <div class="hr-line-dashed"></div>
                            <div class="form-group">
                                <div class="col-sm-4 col-sm-offset-2">
                                    <button class="btn btn-primary" type="submit">添加账号</button>
                                    <a class="btn btn-danger" href="javascript:void(0)" onclick="history.go(-1)" >取 消</a>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

{template 'htdemo/common_js'}

    <script src="./resource/htdemo/js/plugins/layer/laydate/laydate.js"></script>
    <script src="./resource/htdemo/js/plugins/iCheck/icheck.min.js"></script>
 <script charset="utf-8" src="./resource/htdemo/js/kindeditor/kindeditor-min.js"></script>
 <script charset="utf-8" src="./resource/htdemo/js/kindeditor/lang/zh_CN.js"></script>
 <script src="./resource/htdemo/js/plugins/sweetalert/sweetalert.min.js"></script>
 <script>
       $(".btn-primary").click(function() {
           swal({
               title: "添加成功",
               text: "提示信息",
               type: "success"
           })
       });
             var editor;
             KindEditor.ready(function(K) {
                 editor = K.create('textarea[name="article_desc"]', {
                     allowFileManager : true
                 });
             });
             var editor1;
             KindEditor.ready(function(K) {
                 editor1 = K.create('textarea[name="article_content"]', {
                     allowFileManager : true
                 });
             });
        $(document).ready(function(){$(".i-checks").iCheck({checkboxClass:"icheckbox_square-green",radioClass:"iradio_square-green",})});
      $('#loading-example-btn').click(function(){
        location.reload();
       })
      laydate({elem:"#date",event:"focus"});
    </script>
</body>
</html>
