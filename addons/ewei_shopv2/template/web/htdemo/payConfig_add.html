{template 'htdemo/common_header'}

    <link href="./resource/htdemo/css/plugins/sweetalert/sweetalert.css" rel="stylesheet">
</head>

<body class="gray-bg">
    <div class="wrapper wrapper-content animated fadeInRight">
        <div class="row">
            <div class="col-sm-12">
                <div class="ibox float-e-margins">
                    <div class="ibox-title">
                        <h5>添加支付配置</h5>
                        <small><a href="article.php" style="color:#ccc;margin-left:10px"><i class="fa fa-list"></i>添加支付配置</a></small>
                        <div class="ibox-tools"><button type="button" id="loading-example-btn" class="btn btn-white btn-sm"><i class="fa fa-refresh"></i> 刷新</button>

                            <a class="collapse-link">
                                <i class="fa fa-chevron-up"></i>

                            <a class="close-link">
                                <i class="fa fa-times"></i>
                            </a>
                        </div>
                    </div>
                    <div class="ibox-content">

                                <label class="col-sm-2 control-label">支付企业名称</label>

                                <div class="col-sm-3">
                                    <input type="text" class="form-control" name="payCopy">
                                </div>
                            </div>-->
                            
                            <div class="hr-line-dashed"></div>
                            <div class="form-group">
                                <label class="col-sm-2 control-label">支付企业名称</label>
                                <div class="col-sm-2">
                                   <select class="form-control" name="payCopy">
                                       <option>通莞聚合</option>
                                       <option>银联无感</option>
                                       <option>顺德农商</option>
                                   </select>
                                </div>
                            </div>
                            
                            
                            <div class="hr-line-dashed"></div>
                            <div class="form-group">
                                <label class="col-sm-2 control-label">支付配置商户号</label>
                                <div class="col-sm-3">
                                    <input type="text" class="form-control" name="payMchid">
                                </div>
                            </div>
                            
                            <div class="hr-line-dashed"></div>
                            <div class="form-group">
                                <label class="col-sm-2 control-label">支付配置秘钥</label>
                                <div class="col-sm-3">
                                    <input type="text" class="form-control" name="payApi">
                                </div>
                            </div>
                            
                            
                            
                            <!--<div class="hr-line-dashed"></div>
                            <div class="form-group">
                                <label class="col-sm-2 control-label">添加时间</label>

                                <div class="col-sm-10">
                                    <input type="date" readonly="true" class="form-control  layer-date" id="date">
                                </div>
                            </div>           -->
                            
                            <div class="hr-line-dashed"></div>
                            <div class="form-group">
                                <div class="col-sm-4 col-sm-offset-2">
                                    <button class="btn btn-primary" type="submit">添加配置</button>
                                    
                                    <input type="reset" class="btn btn-danger" value="重 置"/>
                                    <a class="btn btn-danger" href="javascript:void(0)" onclick="history.go(-1)" >返 回</a>
                                </div>
                            </div>

                    </div>
                </div>
            </div>
        </div>

{template 'htdemo/common_js'}
    <script src="./resource/htdemo/js/plugins/layer/laydate/laydate.js"></script>
    <script src="./resource/htdemo/js/plugins/iCheck/icheck.min.js"></script>
 <script charset="utf-8" src="./resource/htdemo/js/kindeditor/kindeditor-min.js"></script>
 <script charset="utf-8" src="./resource/htdemo/js/kindeditor/lang/zh_CN.js"></script>
 <script src="./resource/htdemo/js/plugins/sweetalert/sweetalert.min.js"></script>
 <script>
       $(".btn-primary").click(function() {
           swal({
               title: "添加成功",
               text: "提示信息",
               type: "success"
           })
       });
             var editor;
             KindEditor.ready(function(K) {
                 editor = K.create('textarea[name="article_desc"]', {
                     allowFileManager : true
                 });
             });
             var editor1;
             KindEditor.ready(function(K) {
                 editor1 = K.create('textarea[name="article_content"]', {
                     allowFileManager : true
                 });
             });
        $(document).ready(function(){$(".i-checks").iCheck({checkboxClass:"icheckbox_square-green",radioClass:"iradio_square-green",})});
      $('#loading-example-btn').click(function(){
        location.reload();
       })
      laydate({elem:"#date",event:"focus"});
    </script>
</body>
</html>
