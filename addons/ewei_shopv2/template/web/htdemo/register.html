<body class="gray-bg">
    <div class="wrapper wrapper-content animated fadeInRight">
        <div class="row">
            <div class="col-sm-12">
                <div class="ibox float-e-margins">
                    <div class="ibox-title">
                        <h5>企业注册平台</h5>
                        <small><a href="list.php" style="color:#ccc;margin-left:10px"><i class="fa fa-list"></i>企业注册平台</a></small>
                        <div class="ibox-tools"><button type="button" id="loading-example-btn" class="btn btn-white btn-sm"><i class="fa fa-refresh"></i> 刷新</button>

                            <a class="collapse-link">

                        </div>

                        <form method="post" class="form-horizontal" action="" id="sign_form">

                            <div class="hr-line-dashed"></div>
                            <div class="form-group">
                                <label class="col-sm-2 control-label">手机号码</label>

                                <div class="col-sm-3">
                                   <input type="number" name="phone" class="form-control" id="phone" placeholder="请输入手机号码">
                                </div>
                            </div>
                            
                            <!--<div class="hr-line-dashed"></div>-->
                            <div class="form-group">
                                <label class="col-sm-2 control-label">验证码</label>
                                <div class="col-sm-2" style="width: 14%;">
                                   <input type="text" name="code" class="form-control" id="code" placeholder="请输入验证码">
                                </div>
                                
                                <div class="">                                  
                                   <!--<button id="code" style="height: 32px;width: 92px;">获取验证码</button>-->
                                   <input type="button" class="btn btn-warning" id="J_GetCode" value="免费获取验证码">
                                </div>                                 
                            </div>
                            <script type="text/javascript">
                            	var countdown=60; 
                            	$('#J_GetCode').click(function () {
                            		var obj = $("#J_GetCode");
                            		console.log(obj);
//                          		return false;
								    settime(obj);
                            	})
                            	
								function settime(obj) { //发送验证码倒计时
								    if (countdown == 0) { 
								        obj.attr('disabled',false); 
								        //obj.removeattr("disabled"); 
								        obj.val("免费获取验证码");
								        countdown = 60; 
								        return;
								    } else { 
								        obj.attr('disabled',true);
								        obj.val("重新发送(" + countdown + ")");
								        countdown--; 
								    } 
								setTimeout(function() { 
								    settime(obj) }
								    ,1000) 
								}
                            </script>
                            
                        
                            <script type="text/javascript">
                            	$('#code').click(function(){
                            		if(this.src == 'http://localhost/htdemo/img.php'){
										this.src = this.src+'?i='+Math.floor(Math.random()*10);                            			
									}else {
										this.src = this.src+'?i='+1;
									}
									console.log(this.src);                            		
                            	})
                            </script>

                                    <!--<a class="btn btn-white" href="javascript:void(0)" type="" onclick="history.go(-1)" >取消</a>-->
                                    <input type="reset" name="" id="" value="取 消" class="btn btn-danger" />

{template 'htdemo/common_js'}
    <script src="./resource/htdemo/js/plugins/layer/laydate/laydate.js"></script>

 <script charset="utf-8" src="./resource/htdemo/js/kindeditor/kindeditor-min.js"></script>
 <script charset="utf-8" src="./resource/htdemo/js/kindeditor/lang/zh_CN.js"></script>

 <script>
             var editor;
             KindEditor.ready(function(K) {
                 editor = K.create('textarea[name="user_desc"]', {
                     allowFileManager : true
                 });
             });
        $(document).ready(function(){$(".i-checks").iCheck({checkboxClass:"icheckbox_square-green",radioClass:"iradio_square-green",})});
      $('#loading-example-btn').click(function(){
        location.reload();
       })
      laydate({elem:"#date",event:"focus"});
    </script>
    
    <script type="text/javascript">    	
    	$(document).ready(function(){
    		
		});
		function checkSubmit(){
			if($("input[name = copyName]").val() == ''){
				alert('公司名称不能为空，请输入...');				
				return false;
			}else if($("input[name = copy]").val() == '') {
				alert('公司英文名不能为空，请输入...');
				return false;
			}else if($("input[name = pwd]").val() == '') {
				alert('密码不能为空，请输入...');
				return false;
			}else if($("input[name = qpwd]").val() == '') {
				alert('确认密码不能为空，请输入...');
				return false;
			}else if($("input[name = pwd]").val() != $("input[name = qpwd]").val()) {
				alert('两次密码输入不一致，请输入...');
				$("input[name = pwd]").val('');
				$("input[name = qpwd]").val('');
				return false;
			}else if($("input[name = user_email]").val() == '') {
				alert('公司电子邮箱不能为空，请输入...');
				return false;
			}else if($("input[name = phone]").val() == '') {
				alert('手机号码不能为空，请输入...');
				return false;
			}else if($("input[name = appid]").val() == '') {
				alert('微信公众号Appid不能为空，请输入...');
				return false;
			}else if($("input[name = appscret]").val() == '') {
				alert('微信公众号AppScret不能为空，请输入...');
				return false;
			}else if($("input[name = mchid]").val() == '') {
				alert('微信商户号不能为空，请输入...');
				return false;
			}else if($("input[name = apikey]").val() == '') {
				alert('微信商户秘钥不能为空，请输入...');
				return false;
			}

			var pattern = /^1[34578]\d{9}$/;
 			if(pattern.test($.trim($('#phone').val())) === false) {
 				alert('您的手机号码输入不正确，请重新输入...');
 				$('#phone').val('');
				return false;
 			}
			
			//跳转判断用户是否注册
			var url = "{php echo url('htdemo/user/post');}";
			$("#sign_form").attr("action",url);
			$("#sign_form").submit();
   }
   </script>
