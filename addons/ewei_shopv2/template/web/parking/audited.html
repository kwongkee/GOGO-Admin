{template "parking/_header"}
    <div class="x-nav">
      <span class="layui-breadcrumb">
        <a href="">首页</a>
        <a href="">演示</a>
        <a>
          <cite>导航元素</cite></a>
      </span>
      <a class="layui-btn layui-btn-small" style="line-height:1.6em;margin-top:3px;float:right" href="javascript:location.replace(location.href);" title="刷新">
        <i class="layui-icon" style="line-height:30px">ဂ</i></a>
    </div>
    <div class="x-body">
    
          <input type="text" name="number"  placeholder="请输入中签人数" value="" id="n" autocomplete="off" class="layui-input">
          <!-- <input type="text" name="username"  placeholder="请输入中奖几率%" autocomplete="off" class="layui-input"> -->
          <input type="text" name="money"  placeholder="请输入付款金额" value="" id="m" autocomplete="off" class="layui-input">
          <button class="layui-btn"  lay-submit="" onclick="lottery()" lay-filter="sreach">抽签</button>
        </form>
      </div>
      <xblock>
        <span class="x-right" style="line-height:40px">共有数据：{$total['num']}条</span>
      </xblock>
      <table class="layui-table">
        <thead>
          <tr>
            <th>编号</th>
            <th>姓名</th>
            <th>性别</th>
            <th>绑定车牌号</th>
            <th>地址</th>
            <th>状态</th>
            </tr>
        </thead>
        <tbody>
          {loop $data  $index $item}
          <tr>
            <td>{$item['id']}</td>
            <td>{$item['uname']}</td>
            <td>{$sex[$item['sex']]}</td>
            <td>{$item['license']}</td>
            <td>{$item['addr']}</td>
            {if $item['audit_status']==1}
            <td>已中签</td>
            {else}
            <td>未中签</td>
            {/if}
          </tr>
          {/loop}
        </tbody>
      </table>
      <div class="page">
        <div>
         {$pager}
        </div>
      </div>

    </div>
    
    <script>
      layui.use('laydate', function(){
        var laydate = layui.laydate;
        
        //执行一个laydate实例
        laydate.render({
          elem: '#start' //指定元素
        });

        //执行一个laydate实例
        laydate.render({
          elem: '#end' //指定元素
        });
      });

        /*用户-删除*/
      function member_del(obj,id){
          layer.confirm('确认要删除吗？',function(index){
              //发异步删除数据
              $(obj).parents("tr").remove();
              layer.msg('已删除!',{icon:1,time:1000});
          });
      }



      function delAll (argument) {

        var data = tableCheck.getData();
  
        layer.confirm('确认要删除吗？'+data,function(index){
            //捉到所有被选中的，发异步进行删除
            layer.msg('删除成功', {icon: 1});
            $(".layui-form-checked").not('.header').parents('tr').remove();
        });
      }

      function lottery(){
         var number=$("#n").val();
         var money=$("#m").val();
         layer.load(0);
         $.ajax({
          url:"{php echo webUrl('parking/card/CardLottery')}",
          type:"post",
          data:{"number":number,"money":money},
          success:function(data){
            var result=JSON.parse(data);
            layer.closeAll();
            if(result.status==1){
              layer.alert('完成', {icon: 1});
            }else if(result.status==0){
              layer.msg(result.result.message, {icon: 5});
            }
          },
          error:function(){
            alert('服务器错误');
            layer.closeAll();
          }
         });
      }
    </script>
{template "parking/_footer"}
