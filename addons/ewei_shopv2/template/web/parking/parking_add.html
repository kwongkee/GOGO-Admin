{template "parking/_header"}
<div class="x-body">
<form class="layui-form">
  <div class="layui-form-item">
    <label for="username" class="layui-form-label">
    <span class="x-red">*</span>车位编码
    </label>
    <div class="layui-input-inline">
      <input type="text" id="username" name="numbers" required="" autocomplete="off" class="layui-input">
    </div>
  </div>
  <div class="layui-form-item">
    <label for="username" class="layui-form-label">
    <span class="x-red">*</span>收费方案
    </label>
    <div class="layui-input-inline">
      <select id="shipping" name="ChargeClass" lay-verify="required">
        <option value="">请选择</option>
                  {loop $data $index $item}
                  <option value="{$item['id']}">
                    {$item['ChargeClass']}
        </option>
                  {/loop}
      </select>
    </div>
  </div>
  <!--<div class="layui-form-item">-->
    <!--<label for="username" class="layui-form-label">-->
      <!--<span class="x-red">*</span>预付收费方案-->
    <!--</label>-->
    <!--<div class="layui-input-inline">-->
      <!--<select id="shipping" name="PriceClass" lay-verify="required">-->
        <!--<option value="">请选择</option>-->
        <!--{loop $datas $index $item}-->
        <!--<option value="{$item['id']}">-->
          <!--{$item['PriceClass']}-->
        <!--</option>-->
        <!--{/loop}-->
      <!--</select>-->
    <!--</div>-->
  <!--</div>-->
  <div class="layui-form-item">
    <label for="username" class="layui-form-label">
    <span class="x-red">*</span>省
    </label>
    <div class="layui-input-inline">
      <select id="shipping" name="provin" lay-verify="required" lay-filter="prio">
        <option value="">请选择</option>
                  {loop $addr $index $item}
        <option value="{$item['id']}:{$item['name']}">
                    {$item['name']}
        </option>
                  {/loop}
      </select>
    </div>
  </div>
  <div class="layui-form-item">
    <label for="username" class="layui-form-label">
    <span class="x-red">*</span>市
    </label>
    <div class="layui-input-inline">
      <select id="shipping" name="citys" lay-filter="ciy">
        <option value="">请选择</option>
      </select>
    </div>
  </div>
  <div class="layui-form-item">
    <label for="username" class="layui-form-label">
    <span class="x-red">*</span>区
    </label>
    <div class="layui-input-inline">
      <select id="shipping" name="area" class="valid" lay-filter="are">
        <option value="">请选择</option>
      </select>
    </div>
  </div>
  <div class="layui-form-item">
    <label for="username" class="layui-form-label">
    <span class="x-red">*</span>镇
    </label>
    <div class="layui-input-inline">
      <select id="shipping" name="town" class="valid" lay-filter="tow">
        <option value="">请选择</option>
      </select>
    </div>
  </div>
  <div class="layui-form-item">
    <label for="username" class="layui-form-label">
    <span class="x-red">*</span>居委会
    </label>
    <div class="layui-input-inline">
      <select id="shipping" name="committee" class="valid">
        <option value="">请选择</option>
      </select>
    </div>
  </div>
  <div class="layui-form-item">
    <label for="username" class="layui-form-label">
    <span class="x-red">*</span>路
    </label>
    <div class="layui-input-inline">
      <input type="text" name="road" value="" class="layui-input">
    </div>
  </div>
  <div class="layui-form-item">
    <label for="username" class="layui-form-label">
    <span class="x-red">*</span>路编码
    </label>
    <div class="layui-input-inline">
      <input type="text" name="road_num" value="" class="layui-input">
    </div>
  </div>
<div class="layui-form-item">
  <label for="L_repass" class="layui-form-label">
  </label>
  <button class="layui-btn" lay-filter="add" lay-submit="">
                增加
  </button>
</div>
</form>
</div>
<script>
      layui.use(['form','layer'], function(){
          $ = layui.jquery;
        var form = layui.form
        ,layer = layui.layer;
        //自定义验证规则
        form.verify({
          nikename: function(value){
            if(value.length != ''){
              return '不允许空';
            }
          }
        });
        //监听提交
        form.on('submit(add)', function(data){
          //发异步，把数据提交给php
          // console.dir();
          $.ajax({
            url:"{php echo WebUrl('parking/list/Park_save')}",
            type:"POST",
            dataType:"json",
            data:data.field,
            cache:false,
            success:function(info){
              if(info.status=='1'){
                layer.alert("增加成功", {icon: 6},function () {
                    // 获得frame索引
                    var index = parent.layer.getFrameIndex(window.name);
                    //关闭当前frame
                    parent.layer.close(index);
                });
              }else{
                layer.alert("增加失败", {icon: 5},function () {
                    // 获得frame索引
                    var index = parent.layer.getFrameIndex(window.name);
                    //关闭当前frame
                    parent.layer.close(index);
                });
              }
            },
            error:function(){alert('服务链接错误')},
          })
          return false;
        });
        form.on('select(prio)',function(data){
          $.get("{php echo WebUrl('parking/list/Linkage_address')}",{'pid':data.value},function(info){
            var info=JSON.parse(info);
            var h='';
            h="<option value=''>请选择</option>";
            for(var i=0;i<info.status.length;i++){
              h+="<option value='"+info.status[i].id+":"+info.status[i].name+"'>"+info.status[i].name+"</option>"
            }
            $("select[name='citys']").html('').append(h);
            form.render('select');
          });
        });
        form.on('select(ciy)',function(data){
          $.get("{php echo WebUrl('parking/list/Linkage_address')}",{'pid':data.value},function(info){
            var info=JSON.parse(info);
            var h='';
            h="<option value=''>请选择</option>";
            for(var i=0;i<info.status.length;i++){
              h+="<option value='"+info.status[i].id+":"+info.status[i].name+"'>"+info.status[i].name+"</option>"
            }
            $("select[name='area']").html('').append(h);
            form.render('select');
          });
        });
        form.on('select(are)',function(data){
          $.get("{php echo WebUrl('parking/list/Linkage_address')}",{'pid':data.value},function(info){
            var info=JSON.parse(info);
            var h='';
            h="<option value=''>请选择</option>";
            for(var i=0;i<info.status.length;i++){
              h+="<option value='"+info.status[i].id+":"+info.status[i].name+"'>"+info.status[i].name+"</option>"
            }
            $("select[name='town']").html('').append(h);
            form.render('select');
          });
        });
        form.on('select(tow)',function(data){
          $.get("{php echo WebUrl('parking/list/Linkage_address')}",{'pid':data.value},function(info){
            var info=JSON.parse(info);
            var h='';
            h="<option value=''>请选择</option>";
            for(var i=0;i<info.status.length;i++){
              h+="<option value='"+info.status[i].id+":"+info.status[i].name+"'>"+info.status[i].name+"</option>"
            }
            $("select[name='committee']").html('').append(h);
            form.render('select');
          });
        });
      });
  </script>
{template "parking/_footer"}
