      <select id="shipping" name="ChargeClass" lay-verify="required">
        <option value="">请选择</option>

<div class="layui-form-item">

      修改
  </button>

</div>
<script>
      layui.use(['form','layer'], function(){
          $ = layui.jquery;
        var form = layui.form
        ,layer = layui.layer;
        //自定义验证规则
        form.verify({
          nikename: function(value){
            if(value.length != ''){
              return '不允许空';
            }
          }
        });
        //监听提交
        form.on('submit(add)', function(data){
          //发异步，把数据提交给php
          // console.dir();
          $.ajax({
            url:"{php echo WebUrl('parking/list/Edit_Save')}",
            type:"POST",
            dataType:"json",
            data:data.field,
            cache:false,
            success:function(info){
              if(info.status=='1'){
                layer.alert("更新成功", {icon: 6},function () {
                    // 获得frame索引
                    var index = parent.layer.getFrameIndex(window.name);
                    //关闭当前frame
                    parent.layer.close(index);
                });
              }else{
                layer.alert("更新失败", {icon: 5},function () {
                    // 获得frame索引
                    var index = parent.layer.getFrameIndex(window.name);
                    //关闭当前frame
                    parent.layer.close(index);
                });
              }
            },
            error:function(){alert('服务链接错误')},
          })
          return false;
        });
      });
  </script>
