# GOGO-Admin CI/CD Pipeline
# 代码审核 → Docker构建 → 测试验证 → 部署到服务器

name: GOGO-Admin CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  PROJECT_NAME: gogo-admin
  SERVER_IP: 39.108.11.214
  REGISTRY: registry.cn-shenzhen.aliyuncs.com
  IMAGE_NAME: gogo-admin
  DEPLOY_PATH: /opt/docker/gogo-admin

jobs:
  # ============ 阶段1: 代码审核 ============
  code-review:
    name: 代码安全审核
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.2'
          extensions: pdo_mysql, mbstring, zip, opcache
          coverage: none

      - name: 安装Composer依赖
        run: composer install --no-interaction --prefer-dist

      - name: 安装SonarQube Scanner
        run: |
          wget https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-4.8.0.2856-linux.zip -O /tmp/sonar.zip
          unzip -o /tmp/sonar.zip -d /opt

      - name: 运行SonarQube扫描
        run: |
          /opt/sonar-scanner-4.8.0.2856-linux/bin/sonar-scanner \
            -Dsonar.projectKey=${{ env.PROJECT_NAME }} \
            -Dsonar.sources=. \
            -Dsonar.host.url=http://${{ env.SERVER_IP }}:9001 \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}

      - name: ThinkPHP安全检查
        run: |
          echo "检查敏感文件..."
          find . -name ".env*" -type f | grep -v vendor | xargs -I {} basename {} || true
          echo "代码审核完成"

  # ============ 阶段2: Docker构建与测试 ============
  docker-build:
    name: Docker构建与测试
    runs-on: ubuntu-latest
    needs: code-review
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 构建Docker镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.PROJECT_NAME }}:test
          load: true

      - name: 启动测试容器
        run: |
          docker build -t ${{ env.PROJECT_NAME }}:test .
          docker run -d --name ${PROJECT_NAME}_test \
            -p 8082:80 \
            ${{ env.PROJECT_NAME }}:test

      - name: 检查容器状态
        run: |
          sleep 10
          docker ps
          docker logs ${PROJECT_NAME}_test || true

      - name: 清理测试容器
        if: always()
        run: |
          docker stop ${PROJECT_NAME}_test 2>/dev/null || true
          docker rm ${PROJECT_NAME}_test 2>/dev/null || true

  # ============ 阶段3: 推送到镜像仓库 ============
  push-registry:
    name: 推送到镜像仓库
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录阿里云镜像仓库
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: 构建并推送镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  # ============ 阶段4: 部署到服务器 ============
  deploy:
    name: 部署到服务器
    runs-on: ubuntu-latest
    needs: push-registry
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: SSH部署到服务器
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ env.SERVER_IP }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            
            if [ -d ${{ env.DEPLOY_PATH }} ]; then
              cp ${{ env.DEPLOY_PATH }}/docker-compose.yml ${{ env.DEPLOY_PATH }}/docker-compose.yml.bak.$(date +%Y%m%d%H%M%S)
            fi
            
            mkdir -p ${{ env.DEPLOY_PATH }}
            
            cd ${{ env.DEPLOY_PATH }}
            docker-compose down || true
            
            cat > docker-compose.yml << 'EOF'
            version: '3.8'
            services:
              app:
                image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
                container_name: ${{ env.PROJECT_NAME }}
                ports:
                  - "8082:80"
                restart: unless-stopped
            EOF
            
            docker-compose up -d
            echo "$(date): Deployed ${{ github.sha }}" >> deployment.log
