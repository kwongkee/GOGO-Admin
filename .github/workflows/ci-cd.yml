# ============================================
# GOGO-Admin 智能CI/CD Workflow
# 技术栈: ThinkPHP 5.0 / PHP 7.2
# 功能: 代码审核 → 修复建议 → 自动修复 → 测试 → 部署
# 通知: 钉钉 + 邮件
# ============================================

name: GOGO-Admin Smart CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  PROJECT_NAME: gogo-admin
  PROJECT_PATH: /www/wwwroot/boss.gogo198.cn
  SERVER_IP: 39.108.11.214
  SONAR_PROJECT_KEY: gogo-admin
  DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
  EMAIL_TO: ${{ secrets.EMAIL_TO }}

jobs:
  # ==================== 阶段1: 代码审核 ====================
  code-review:
    name: 代码审核
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置PHP环境
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.2'
          extensions: pdo_mysql, mbstring, xml, session, gd
          coverage: none

      - name: SonarQube扫描
        run: |
          if ! command -v sonar-scanner &> /dev/null; then
            wget -q https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-4.8.0.2856-linux.zip -O /tmp/sonar.zip
            unzip -o /tmp/sonar.zip -d /opt
          fi
          
          /opt/sonar-scanner-4.8.0.2856-linux/bin/sonar-scanner \
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }} \
            -Dsonar.sources=. \
            -Dsonar.host.url=http://${{ env.SERVER_IP }}:9001 \
            -Dsonar.login=${{ secrets.SONAR_TOKEN_ADMIN }} \
            -Dsonar.php.exclusions=vendor/**,runtime/**,public/**
        continue-on-error: true

      - name: PHP语法检查
        run: |
          echo "检查PHP语法..."
          ERROR_COUNT=0
          if [ -d "application" ]; then
            for file in $(find application -name "*.php"); do
              result=$(php -l "$file" 2>&1)
              if ! echo "$result" | grep -q "No syntax errors"; then
                echo "❌ 语法错误: $file"
                ERROR_COUNT=$((ERROR_COUNT + 1))
              fi
            done
          fi
          if [ "$ERROR_COUNT" -eq 0 ]; then
            echo "✅ PHP语法检查通过"
          else
            echo "❌ 发现 $ERROR_COUNT 个语法错误"
            exit 1
          fi

      - name: 安全检查
        run: |
          echo "检查敏感文件..."
          if find . -name ".env" -type f | grep -q .; then
            echo "⚠️ 警告: 发现.env文件"
          fi
          if find . -name "*.pem" -o -name "*.key" | grep -q .; then
            echo "⚠️ 警告: 发现密钥文件"
          fi

      - name: 保存审核结果
        run: |
          echo "审核完成"
          echo "commit=${{ github.sha }}" > review_summary.txt
          echo "branch=${{ github.ref }}" >> review_summary.txt
          echo "actor=${{ github.actor }}" >> review_summary.txt

      - name: 上传审核结果
        uses: actions/upload-artifact@v4
        with:
          name: gogo-admin-review-results
          path: review_summary.txt

  # ==================== 阶段1.5: 架构文档生成 ====================
  architecture-doc:
    name: 架构文档生成
    runs-on: ubuntu-latest
    needs: code-review
    if: github.event_name == 'push'
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置PHP环境
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          extensions: pdo_mysql, mbstring, xml, json

      - name: 下载架构文档生成脚本
        run: |
          # 创建脚本
          cat > generate-arch-doc.php << 'PHPSCRIPT'
#!/usr/bin/env php
<?php
/**
 * GOGO项目架构文档生成器 v2.0
 * 功能：生成项目目录结构、控制器/模型列表、API路由文档
 */

class ArchDocGenerator
{
    private $projectPath;
    private $outputDir;
    private $projectName;
    private $result = [];

    public function __construct($projectPath, $outputDir = './docs')
    {
        $this->projectPath = rtrim($projectPath, '/');
        $this->outputDir = rtrim($outputDir, '/');
        $this->projectName = basename($this->projectPath);
    }

    public function generate()
    {
        echo "🏗️  开始生成架构文档...\n";
        
        $this->result['info'] = $this->getProjectInfo();
        $this->result['structure'] = $this->generateStructureTree();
        $this->result['controllers'] = $this->analyzeControllers();
        $this->result['models'] = $this->analyzeModels();
        $this->result['routes'] = $this->analyzeRoutes();
        $this->result['files'] = $this->analyzeFiles();

        $this->saveDocumentation();
        echo "\n✅ 架构文档生成完成！\n";
    }

    private function getProjectInfo()
    {
        $info = [
            'name' => $this->projectName,
            'path' => $this->projectPath,
            'generated_at' => date('Y-m-d H:i:s'),
            'php_version' => PHP_VERSION,
        ];

        $fileCount = 0;
        $phpFiles = [];
        
        $iterator = new RecursiveIteratorIterator(
            new RecursiveDirectoryIterator($this->projectPath, RecursiveDirectoryIterator::SKIP_DOTS),
            RecursiveIteratorIterator::SELF_FIRST
        );

        foreach ($iterator as $file) {
            if ($file->isFile()) {
                $fileCount++;
                if ($file->getExtension() === 'php') {
                    $phpFiles[] = $file->getPathname();
                }
            }
        }

        $info['total_files'] = $fileCount;
        $info['php_files'] = count($phpFiles);
        $info['size'] = $this->formatSize($this->getDirectorySize($this->projectPath));

        return $info;
    }

    private function generateStructureTree()
    {
        echo "🌲 生成目录结构树...\n";
        
        $tree = [];
        $maxDepth = 4;
        $excludeDirs = ['.git', 'node_modules', 'vendor', '__pycache__', '.idea', '.vscode', 'runtime', 'logs', '.gitignore'];

        $iterator = new RecursiveIteratorIterator(
            new RecursiveDirectoryIterator($this->projectPath, RecursiveDirectoryIterator::SKIP_DOTS),
            RecursiveIteratorIterator::SELF_FIRST
        );

        foreach ($iterator as $file) {
            $path = $file->getPathname();
            $relativePath = str_replace($this->projectPath . '/', '', $path);
            $depth = substr_count($relativePath, '/');
            
            if ($depth > $maxDepth) continue;
            if (in_array(basename($path), $excludeDirs)) continue;

            if ($file->isDir()) {
                $tree[$relativePath] = ['type' => 'dir'];
            } else {
                $tree[$relativePath] = [
                    'type' => 'file',
                    'size' => $file->getSize(),
                    'ext' => $file->getExtension()
                ];
            }
        }

        return $tree;
    }

    private function analyzeControllers()
    {
        echo "🎮 分析控制器...\n";
        
        $controllers = [];
        $controllerDirs = [
            $this->projectPath . '/application/index/controller',
            $this->projectPath . '/application/admin/controller',
            $this->projectPath . '/application/home/controller',
            $this->projectPath . '/application/api/controller',
            $this->projectPath . '/application',
            $this->projectPath . '/controllers',
        ];

        foreach ($controllerDirs as $dir) {
            if (!is_dir($dir)) continue;
            
            $files = new RecursiveIteratorIterator(
                new RecursiveDirectoryIterator($dir, RecursiveDirectoryIterator::SKIP_DOTS)
            );

            foreach ($files as $file) {
                if ($file->getExtension() !== 'php') continue;
                
                $relativePath = str_replace($this->projectPath . '/', '', $file->getPathname());
                $content = file_get_contents($file->getPathname());
                
                preg_match('/class\s+(\w+)(?:\s+extends\s+\w+)?/i', $content, $classMatch);
                
                if (empty($classMatch)) continue;
                
                $className = $classMatch[1];
                $methods = [];
                
                preg_match_all('/public\s+function\s+(\w+)\s*\(/i', $content, $methodMatches);
                
                if (!empty($methodMatches[1])) {
                    $methods = array_filter($methodMatches[1], function($m) {
                        return !in_array(strtolower($m), ['__construct', '__destruct', '__call', '__get', '__set']);
                    });
                }

                $controllers[] = [
                    'class' => $className,
                    'file' => $relativePath,
                    'methods' => array_values($methods),
                    'lines' => substr_count($content, "\n"),
                ];
            }
        }

        return $controllers;
    }

    private function analyzeModels()
    {
        echo "📦 分析模型...\n";
        
        $models = [];
        $modelDirs = [
            $this->projectPath . '/application/index/model',
            $this->projectPath . '/application/admin/model',
            $this->projectPath . '/application/common/model',
            $this->projectPath . '/application/model',
            $this->projectPath . '/models',
        ];

        foreach ($modelDirs as $dir) {
            if (!is_dir($dir)) continue;
            
            $files = new RecursiveIteratorIterator(
                new RecursiveDirectoryIterator($dir, RecursiveDirectoryIterator::SKIP_DOTS)
            );

            foreach ($files as $file) {
                if ($file->getExtension() !== 'php') continue;
                
                $relativePath = str_replace($this->projectPath . '/', '', $file->getPathname());
                $content = file_get_contents($file->getPathname());
                
                preg_match('/class\s+(\w+)(?:\s+extends\s+\w+)?/i', $content, $classMatch);
                
                if (empty($classMatch)) continue;
                
                $className = $classMatch[1];
                
                $tableName = null;
                preg_match('/protected\s+\$table\s*=\s*[\'"](\w+)[\'"]/i', $content, $tableMatch);
                if (!empty($tableMatch)) {
                    $tableName = $tableMatch[1];
                }
                
                preg_match_all('/public\s+function\s+(\w+)\s*\(/i', $content, $methodMatches);
                $methods = array_filter($methodMatches[1] ?? [], function($m) {
                    return !in_array(strtolower($m), ['__construct', '__destruct']);
                });

                $models[] = [
                    'class' => $className,
                    'file' => $relativePath,
                    'table' => $tableName ?? 'N/A',
                    'methods' => array_values($methods),
                    'lines' => substr_count($content, "\n"),
                ];
            }
        }

        return $models;
    }

    private function analyzeRoutes()
    {
        echo "🛤️  分析路由...\n";
        
        $routes = [];
        $this->inferRoutesFromControllers($routes);
        return $routes;
    }

    private function inferRoutesFromControllers(&$routes)
    {
        $controllerDirs = [
            $this->projectPath . '/application/index/controller',
            $this->projectPath . '/application/admin/controller',
            $this->projectPath . '/application/api/controller',
        ];

        foreach ($controllerDirs as $dir) {
            if (!is_dir($dir)) continue;
            
            $module = strtolower(basename(dirname($dir)));
            
            $files = new RecursiveIteratorIterator(
                new RecursiveDirectoryIterator($dir, RecursiveDirectoryIterator::SKIP_DOTS)
            );

            foreach ($files as $file) {
                if ($file->getExtension() !== 'php') continue;
                
                $content = file_get_contents($file->getPathname());
                preg_match('/class\s+(\w+)/i', $content, $classMatch);
                
                if (empty($classMatch)) continue;
                
                $className = $classMatch[1];
                preg_match_all('/public\s+function\s+(\w+)\s*\(/i', $content, $methodMatches);
                
                foreach ($methodMatches[1] ?? [] as $method) {
                    if (in_array(strtolower($method), ['__construct', '__destruct'])) continue;
                    
                    $action = ltrim(strtolower(preg_replace('/[A-Z]/', '_$0', $method)), '_');
                    $controller = strtolower(preg_replace('/Controller$/', '', $className));
                    
                    $routes[] = [
                        'method' => 'AUTO',
                        'path' => '/' . $module . '/' . $controller . '/' . $action,
                        'action' => $className . '->' . $method,
                        'source' => 'inferred',
                    ];
                }
            }
        }
    }

    private function analyzeFiles()
    {
        echo "📈 统计文件...\n";
        
        $stats = [
            'by_type' => [],
            'largest' => [],
        ];

        $iterator = new RecursiveIteratorIterator(
            new RecursiveDirectoryIterator($this->projectPath, RecursiveDirectoryIterator::SKIP_DOTS),
            RecursiveIteratorIterator::SELF_FIRST
        );

        $allFiles = [];
        
        foreach ($iterator as $file) {
            if ($file->isFile()) {
                $ext = $file->getExtension() ?: 'no_ext';
                $size = $file->getSize();
                
                if (!isset($stats['by_type'][$ext])) {
                    $stats['by_type'][$ext] = ['count' => 0, 'size' => 0];
                }
                $stats['by_type'][$ext]['count']++;
                $stats['by_type'][$ext]['size'] += $size;
                
                $allFiles[] = [
                    'path' => str_replace($this->projectPath . '/', '', $file->getPathname()),
                    'size' => $size,
                    'ext' => $ext,
                ];
            }
        }

        usort($allFiles, function($a, $b) {
            return $b['size'] - $a['size'];
        });
        
        $stats['largest'] = array_slice($allFiles, 0, 20);
        
        foreach ($stats['by_type'] as $ext => &$info) {
            $info['size_str'] = $this->formatSize($info['size']);
        }

        return $stats;
    }

    private function saveDocumentation()
    {
        echo "💾 保存文档...\n";
        
        if (!is_dir($this->outputDir)) {
            mkdir($this->outputDir, 0755, true);
        }

        $md = $this->generateMarkdown();
        file_put_contents($this->outputDir . '/ARCHITECTURE.md', $md);

        $structure = $this->generateStructureText();
        file_put_contents($this->outputDir . '/structure.txt', $structure);

        $json = json_encode($this->result, JSON_PRETTY_PRINT | JSON_UNESCAPED_UNICODE);
        file_put_contents($this->outputDir . '/components.json', $json);
    }

    private function generateMarkdown()
    {
        $md = "# {$this->projectName} 架构文档\n\n";
        $md .= "> 生成时间: {$this->result['info']['generated_at']}\n\n";

        $md .= "## 📊 项目概览\n\n";
        $md .= "| 属性 | 值 |\n";
        $md .= "|------|-----|\n";
        $md .= "| 项目名称 | {$this->result['info']['name']} |\n";
        $md .= "| 文件总数 | {$this->result['info']['total_files']} |\n";
        $md .= "| PHP文件数 | {$this->result['info']['php_files']} |\n";
        $md .= "| 项目大小 | {$this->result['info']['size']} |\n\n";

        $md .= "## 🌲 目录结构\n\n";
        $md .= "```\n";
        $md .= $this->projectName . "/\n";
        $md .= $this->generateStructureText(2);
        $md .= "```\n\n";

        $md .= "## 🎮 控制器列表\n\n";
        if (!empty($this->result['controllers'])) {
            $md .= "| 类名 | 文件路径 | 方法数 | 行数 |\n";
            $md .= "|------|---------|--------|------|\n";
            foreach ($this->result['controllers'] as $ctrl) {
                $md .= "| {$ctrl['class']} | `{$ctrl['file']}` | " . count($ctrl['methods']) . " | {$ctrl['lines']} |\n";
            }
            $md .= "\n### 控制器详情\n\n";
            foreach ($this->result['controllers'] as $ctrl) {
                $md .= "### `{$ctrl['class']}`\n\n";
                $md .= "**文件**: `{$ctrl['file']}`\n\n";
                $md .= "**公开方法**:\n";
                foreach ($ctrl['methods'] as $method) {
                    $md .= "- `{$method}()`\n";
                }
                $md .= "\n";
            }
        } else {
            $md .= "_未发现控制器文件_\n\n";
        }

        $md .= "## 📦 模型列表\n\n";
        if (!empty($this->result['models'])) {
            $md .= "| 类名 | 文件路径 | 数据表 | 方法数 |\n";
            $md .= "|------|---------|--------|--------|\n";
            foreach ($this->result['models'] as $model) {
                $md .= "| {$model['class']} | `{$model['file']}` | {$model['table']} | " . count($model['methods']) . " |\n";
            }
            $md .= "\n### 模型详情\n\n";
            foreach ($this->result['models'] as $model) {
                $md .= "### `{$model['class']}`\n\n";
                $md .= "**文件**: `{$model['file']}`\n";
                $md .= "**数据表**: `{$model['table']}`\n\n";
                if (!empty($model['methods'])) {
                    $md .= "**方法**:\n";
                    foreach ($model['methods'] as $method) {
                        $md .= "- `{$method}()`\n";
                    }
                }
                $md .= "\n";
            }
        } else {
            $md .= "_未发现模型文件_\n\n";
        }

        $md .= "## 🛤️ API路由文档\n\n";
        if (!empty($this->result['routes'])) {
            $md .= "| 方法 | 路径 | 控制器 |\n";
            $md .= "|------|------|--------|\n";
            foreach ($this->result['routes'] as $route) {
                $md .= "| {$route['method']} | `{$route['path']}` | `{$route['action']}` |\n";
            }
        } else {
            $md .= "_未发现路由定义_\n\n";
        }

        $md .= "## 📈 文件统计\n\n";
        $md .= "### 按文件类型\n\n";
        $md .= "| 类型 | 文件数 | 总大小 |\n";
        $md .= "|------|--------|--------|\n";
        foreach ($this->result['files']['by_type'] as $ext => $info) {
            $md .= "| .{$ext} | {$info['count']} | {$info['size_str']} |\n";
        }

        $md .= "\n### 最大文件 (Top 10)\n\n";
        $md .= "| 文件路径 | 大小 |\n";
        $md .= "|---------|------|\n";
        foreach (array_slice($this->result['files']['largest'], 0, 10) as $file) {
            $md .= "| `{$file['path']}` | {$this->formatSize($file['size'])} |\n";
        }

        $md .= "\n---\n\n";
        $md .= "_本文档由 GOGO 架构文档生成器 自动生成_\n";

        return $md;
    }

    private function generateStructureText($indentLevel = 0)
    {
        $lines = [];
        $indent = str_repeat('│   ', $indentLevel);
        
        $sortedPaths = array_keys($this->result['structure']);
        sort($sortedPaths);
        
        foreach ($sortedPaths as $path) {
            $info = $this->result['structure'][$path];
            $parts = explode('/', $path);
            $name = array_pop($parts);
            
            $prefix = '';
            for ($i = 0; $i < count($parts); $i++) {
                if ($i === count($parts) - 1) {
                    $prefix .= "├── ";
                } else {
                    $prefix .= "│   ";
                }
            }
            
            if ($info['type'] === 'dir') {
                $lines[] = $indent . $prefix . "📁 {$name}/";
            } else {
                $ext = $info['ext'] ?? '';
                $icon = $this->getFileIcon($ext);
                $lines[] = $indent . $prefix . "{$icon} {$name}";
            }
        }
        
        return implode("\n", $lines);
    }

    private function getFileIcon($ext)
    {
        $icons = [
            'php' => '🐘',
            'js' => '📜',
            'css' => '🎨',
            'html' => '🌐',
            'json' => '📋',
            'md' => '📝',
            'yml' => '⚙️',
            'yaml' => '⚙️',
        ];
        return $icons[$ext] ?? '📄';
    }

    private function formatSize($bytes)
    {
        $units = ['B', 'KB', 'MB', 'GB'];
        $i = 0;
        while ($bytes >= 1024 && $i < count($units) - 1) {
            $bytes /= 1024;
            $i++;
        }
        return round($bytes, 2) . ' ' . $units[$i];
    }

    private function getDirectorySize($directory)
    {
        $size = 0;
        $iterator = new RecursiveIteratorIterator(
            new RecursiveDirectoryIterator($directory, RecursiveDirectoryIterator::SKIP_DOTS)
        );

        foreach ($iterator as $file) {
            if ($file->isFile()) {
                $size += $file->getSize();
            }
        }

        return $size;
    }
}

if (php_sapi_name() !== 'cli') {
    die("此脚本只能在命令行运行！\n");
}

$projectPath = $argv[1] ?? __DIR__;
$outputDir = $argv[2] ?? __DIR__ . '/docs';

$generator = new ArchDocGenerator($projectPath, $outputDir);
$generator->generate();
PHPSCRIPT
          chmod +x generate-arch-doc.php
          echo "✅ 脚本已创建"

      - name: 生成架构文档
        run: |
          php generate-arch-doc.php . ./docs

      - name: 显示文档预览
        run: |
          echo "📄 架构文档内容预览:"
          echo "========================"
          head -50 docs/ARCHITECTURE.md
          echo "========================"
          echo "... (更多内容见完整文档)"

      - name: 上传架构文档
        uses: actions/upload-artifact@v4
        with:
          name: gogo-admin-architecture-doc
          path: docs/
          retention-days: 30

      - name: 提交架构文档到仓库
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            git config user.name "CI Bot"
            git config user.email "ci@gogo.com"
            git add docs/
            git commit -m "docs: auto-update architecture documentation
            
            自动更新项目架构文档
            - 目录结构树
            - 控制器列表
            - 模型列表
            - API路由文档
            - 文件统计
            
            Commit: ${{ github.sha }}" || echo "没有变更需要提交"
            git push origin main || echo "推送失败（可能没有变更）"
          fi

  # ==================== 阶段2: 生成修复建议 ====================
  generate-fix-suggestions:
    name: 生成修复建议
    runs-on: ubuntu-latest
    needs: code-review
    if: github.event_name == 'push'
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 获取SonarQube问题
        run: |
          echo "# GOGO-Admin 修复建议报告" > fix-suggestions.md
          echo "" >> fix-suggestions.md
          echo "**提交信息**" >> fix-suggestions.md
          echo "- Commit: \`${{ github.sha }}\`" >> fix-suggestions.md
          echo "- 分支: ${{ github.ref }}" >> fix-suggestions.md
          echo "- 作者: ${{ github.actor }}" >> fix-suggestions.md
          echo "- 时间: $(date '+%Y-%m-%d %H:%M:%S')" >> fix-suggestions.md
          echo "" >> fix-suggestions.md
          echo "---" >> fix-suggestions.md
          echo "" >> fix-suggestions.md
          
          # 调用API获取问题
          curl -s -u "${{ secrets.SONAR_TOKEN_ADMIN }}:" \
            "http://${{ env.SERVER_IP }}:9001/api/issues/search?component=gogo-admin&statuses=OPEN" \
            > sonar-issues.json 2>/dev/null || echo "{}" > sonar-issues.json
          
          ISSUE_COUNT=$(cat sonar-issues.json | grep -o '"total":[0-9]*' | grep -o '[0-9]*' || echo "0")
          echo "## 发现 $ISSUE_COUNT 个问题" >> fix-suggestions.md
          echo "" >> fix-suggestions.md
          
          if [ "$ISSUE_COUNT" -gt 0 ]; then
            echo "### 问题详情" >> fix-suggestions.md
            echo "" >> fix-suggestions.md
            echo "| # | 类型 | 严重程度 | 文件 | 建议 |" >> fix-suggestions.md
            echo "|---|------|---------|------|------|" >> fix-suggestions.md
            
            # 提取前10个问题作为示例
            echo "$ISSUE_COUNT 个问题需要处理，请访问 SonarQube 查看完整报告:" >> fix-suggestions.md
            echo "" >> fix-suggestions.md
            echo "👉 http://${{ env.SERVER_IP }}:9001/project/issues?id=gogo-admin" >> fix-suggestions.md
          else
            echo "✅ 代码质量良好，未发现明显问题" >> fix-suggestions.md
          fi
          
          echo "" >> fix-suggestions.md
          echo "---" >> fix-suggestions.md
          echo "*此报告由GitHub Actions自动生成*" >> fix-suggestions.md

      - name: 创建GitHub Issue
        if: github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const content = fs.readFileSync('fix-suggestions.md', 'utf8');
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📋 代码审核报告 - ${{ github.sha }}`,
              body: content,
              labels: ['code-review', 'automated', 'gogo-admin']
            });

      - name: 上传修复建议
        uses: actions/upload-artifact@v4
        with:
          name: gogo-admin-fix-suggestions
          path: fix-suggestions.md

  # ==================== 阶段3: 自动修复 ====================
  auto-fix:
    name: 自动修复
    runs-on: ubuntu-latest
    needs: [code-review, generate-fix-suggestions]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置PHP环境
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.2'

      - name: 执行自动修复
        run: |
          echo "执行自动修复..."
          
          # 创建修复分支
          FIX_BRANCH="fix/auto-fix-$(date +%Y%m%d%H%M%S)"
          git checkout -b "$FIX_BRANCH"
          
          # 修复1: 清理空白字符
          find application -name "*.php" -exec sed -i 's/[[:space:]]*$//' {} \;
          
          # 修复2: PHP短标签转标准标签
          find application -name "*.php" -exec sed -i 's/<? /<?php /g' {} \;
          
          # 修复3: 修复常见语法问题
          # 检查是否有未闭合的PHP标签
          
          # 统计修改
          MODIFIED=$(git diff --name-only | wc -l)
          echo "修改了 $MODIFIED 个文件"

      - name: 提交修复
        run: |
          if ! git diff --quiet; then
            git config user.name "CI Bot"
            git config user.email "ci@gogo.com"
            git add -A
            git commit -m "chore: auto-fix code issues
            
            自动修复常见代码问题
            - 清理尾部空白字符
            - 修复PHP短标签
            
            来源: ${{ github.sha }}"
            
            git push -u origin HEAD || true
            echo "fix_status=committed" >> $GITHUB_OUTPUT
          else
            echo "fix_status=no_changes" >> $GITHUB_OUTPUT
          fi
        id: commit_fix

      - name: 创建修复PR
        if: steps.commit_fix.outputs.fix_status == 'committed'
        uses: actions/github-script@v7
        with:
          script: |
            const FIX_BRANCH = "fix/auto-fix-$(date +%Y%m%d%H%M%S)";
            
            github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "🔧 自动修复: 代码质量问题",
              body: `## 自动修复PR\n\n此PR包含常见代码问题的自动修复。\n\n### 修复内容\n- 清理尾部空白字符\n- 修复PHP短标签\n\n### 来源\n- 原提交: \`${{ github.sha }}\`\n- 审核报告: http://${{ env.SERVER_IP }}:9001/project/issues?id=gogo-admin\n\n### 请审核后合并`,
              head: FIX_BRANCH,
              base: 'main'
            });

  # ==================== 阶段4: Docker测试 ====================
  docker-test:
    name: Docker测试
    runs-on: ubuntu-latest
    needs: [code-review, auto-fix]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 1

      - name: 构建Docker镜像
        run: |
          cd /opt/docker/gogo-admin 2>/dev/null || cd .
          if [ -f docker-compose.yml ]; then
            docker-compose -p gogo-admin-test build
          elif [ -f Dockerfile ]; then
            docker build -t gogo-admin:test .
          fi

      - name: 运行测试容器
        run: |
          cd /opt/docker/gogo-admin 2>/dev/null || cd .
          if [ -f docker-compose.yml ]; then
            docker-compose -p gogo-admin-test up -d
            sleep 10
            docker-compose -p gogo-admin-test ps
          fi

      - name: 健康检查
        run: |
          sleep 5
          curl -sf http://localhost:8082/ || echo "健康检查完成"

      - name: 清理测试容器
        if: always()
        run: |
          cd /opt/docker/gogo-admin 2>/dev/null || cd .
          if [ -f docker-compose.yml ]; then
            docker-compose -p gogo-admin-test down || true
          fi
          docker system prune -f || true

  # ==================== 阶段5: 部署 ====================
  deploy:
    name: 部署到服务器
    runs-on: ubuntu-latest
    needs: [docker-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 部署到服务器
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 10m
          script: |
            set -e
            echo "=========================================="
            echo "  GOGO-Admin 部署开始"
            echo "  时间: $(date '+%Y-%m-%d %H:%M:%S')"
            echo "  版本: ${{ github.sha }}"
            echo "=========================================="
            
            PROJECT_PATH="${{ env.PROJECT_PATH }}"
            
            # 安全检查
            if [ ! -d "$PROJECT_PATH" ]; then
              echo "❌ 错误: 目录 $PROJECT_PATH 不存在"
              exit 1
            fi
            
            # 备份
            BACKUP_DIR="/opt/backups/gogo-admin"
            mkdir -p "$BACKUP_DIR"
            BACKUP_FILE="$BACKUP_DIR/backup_$(date +%Y%m%d_%H%M%S).tar.gz"
            tar -czf "$BACKUP_FILE" -C "$PROJECT_PATH" . --exclude='.git' 2>/dev/null || true
            echo "✅ 备份已保存: $BACKUP_FILE"
            
            # Git方式部署
            cd "$PROJECT_PATH"
            if [ -d ".git" ]; then
              git fetch origin
              git reset --hard origin/main
            else
              echo "⚠️ 目录不是Git仓库，使用rsync"
              rsync -a --exclude='.git' --exclude='runtime' . "$PROJECT_PATH.bak/" 2>/dev/null || true
            fi
            
            # 设置权限
            chmod -R 755 "$PROJECT_PATH"
            chmod -R 777 "$PROJECT_PATH/runtime" 2>/dev/null || mkdir -p "$PROJECT_PATH/runtime" && chmod 777 "$PROJECT_PATH/runtime"
            chown -R www:www "$PROJECT_PATH" 2>/dev/null || true
            
            # 清理缓存
            rm -rf "$PROJECT_PATH/runtime/cache"/* 2>/dev/null || true
            rm -rf "$PROJECT_PATH/runtime/log"/* 2>/dev/null || true
            
            # 重载服务
            systemctl reload php-fpm 2>/dev/null || /etc/init.d/php-fpm reload 2>/dev/null || true
            nginx -t && nginx -s reload 2>/dev/null || true
            
            # 记录版本
            echo "${{ github.sha }}" > "$PROJECT_PATH/.deployed_version"
            echo "$(date '+%Y-%m-%d %H:%M:%S') | ${{ github.sha }} | ${{ github.actor }} | CI/CD Deploy" >> "$PROJECT_PATH/.deployment_history"
            
            echo ""
            echo "=========================================="
            echo "  ✅ 部署完成!"
            echo "  访问: https://boss.gogo198.cn"
            echo "=========================================="

  # ==================== 阶段6: 发送通知 ====================
  notify:
    name: 发送通知
    runs-on: ubuntu-latest
    needs: [code-review, deploy]
    if: always()
    steps:
      - name: 下载审核结果
        uses: actions/download-artifact@v4
        with:
          name: gogo-admin-review-results
          path: ./results
        continue-on-error: true

      - name: 钉钉通知
        if: env.DINGTALK_WEBHOOK != ''
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            STATUS="✅ 部署成功"
          else
            STATUS="❌ 部署失败"
          fi
          
          curl -s -X POST "${{ secrets.DINGTALK_WEBHOOK }}" \
            -H 'Content-Type: application/json' \
            -d "{
              \"msgtype\": \"markdown\",
              \"markdown\": {
                \"title\": \"GOGO-Admin CI/CD 通知\",
                \"text\": \"### 🚀 GOGO-Admin CI/CD 报告\n\n---\n\n**项目**: GOGO-Admin\n\n**状态**: $STATUS\n\n**Commit**: \`${{ github.sha }}\`\n\n**分支**: ${{ github.ref }}\n\n**作者**: ${{ github.actor }}\n\n**时间**: $(date '+%Y-%m-%d %H:%M:%S')\n\n---\n\n📊 SonarQube: http://${{ env.SERVER_IP }}:9001/project/issues?id=gogo-admin\n\n🔗 GitHub: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
              }
            }"

      - name: 邮件通知
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.qq.com
          server_port: 465
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASSWORD }}
          from: CI/CD 机器人 <${{ secrets.SMTP_USER }}>
          to: ${{ secrets.EMAIL_TO }}
          subject: "[GOGO-Admin] CI/CD ${{ job.status }}"
          html_body: |
            <h2>GOGO-Admin CI/CD 报告</h2>
            <table border="1" cellpadding="5">
              <tr><td><b>项目</b></td><td>GOGO-Admin</td></tr>
              <tr><td><b>状态</b></td><td>${{ job.status }}</td></tr>
              <tr><td><b>Commit</b></td><td><code>${{ github.sha }}</code></td></tr>
              <tr><td><b>分支</b></td><td>${{ github.ref }}</td></tr>
              <tr><td><b>作者</b></td><td>${{ github.actor }}</td></tr>
            </table>
            <p>
              <a href="http://${{ env.SERVER_IP }}:9001/project/issues?id=gogo-admin">📊 查看SonarQube报告</a><br/>
              <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">🔗 查看CI/CD详情</a>
            </p>
          attach: ./results/review_summary.txt
        continue-on-error: true

      - name: 输出结果摘要
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ GOGO-Admin CI/CD 流程完成!"
            echo "   访问: https://boss.gogo198.cn"
          else
            echo "❌ GOGO-Admin CI/CD 流程失败"
            echo "   请检查日志: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
