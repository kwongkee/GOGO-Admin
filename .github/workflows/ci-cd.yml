# GitHub Actions Workflow - GOGO-Admin Monitoring Platform
# Technology Stack: ThinkPHP 5.0 / PHP 7.2
# Server: /www/wwwroot/boss.gogo198.cn
# Priority: TOP
# Deployment Mode: Git Pull

name: GOGO-Admin CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  PROJECT_NAME: gogo-admin
  PROJECT_PATH: /www/wwwroot/boss.gogo198.cn
  SERVER_IP: 39.108.11.214
  SONAR_PROJECT_KEY: gogo-admin

jobs:
  code-review:
    name: Code Quality Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.2'
          extensions: pdo_mysql, mbstring, xml, session, gd
          coverage: none

      - name: Install Composer
        run: |
          if [ -f composer.json ]; then
            composer install --no-interaction --prefer-dist --no-dev
          fi

      - name: Download SonarQube Scanner
        run: |
          if ! command -v sonar-scanner &> /dev/null; then
            wget -q https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-4.8.0.2856-linux.zip -O /tmp/sonar.zip
            unzip -o /tmp/sonar.zip -d /opt
          fi

      - name: SonarQube Scan
        run: |
          /opt/sonar-scanner-4.8.0.2856-linux/bin/sonar-scanner \
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }} \
            -Dsonar.sources=. \
            -Dsonar.host.url=http://${{ env.SERVER_IP }}:9001 \
            -Dsonar.login=${{ secrets.SONAR_TOKEN_ADMIN }} \
            -Dsonar.php.exclusions=vendor/**,runtime/**,public/**
        continue-on-error: true

  syntax-check:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.2'

      - name: PHP Syntax Check
        run: |
          ERROR_COUNT=0
          if [ -d "application" ]; then
            for file in $(find application -name "*.php"); do
              result=$(php -l "$file" 2>&1)
              if ! echo "$result" | grep -q "No syntax errors"; then
                ERROR_COUNT=$((ERROR_COUNT + 1))
              fi
            done
          fi
          if [ "$ERROR_COUNT" -eq 0 ]; then
            echo "All PHP files syntax OK"
          else
            echo "Found $ERROR_COUNT syntax errors"
            exit 1
          fi

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: [code-review, syntax-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 10m
          script: |
            set -e
            PROJECT_PATH="${{ env.PROJECT_PATH }}"
            if [ ! -d "$PROJECT_PATH" ]; then
              echo "ERROR: Directory does not exist"
              exit 1
            fi
            cd "$PROJECT_PATH"
            git fetch --all
            git reset --hard origin/main
            if [ -f composer.json ]; then
              composer install --no-dev --optimize-autoloader --no-interaction || true
            fi
            chmod -R 755 "$PROJECT_PATH"
            chmod -R 777 "$PROJECT_PATH/runtime" 2>/dev/null || mkdir -p "$PROJECT_PATH/runtime" && chmod 777 "$PROJECT_PATH/runtime"
            chown -R www:www "$PROJECT_PATH" 2>/dev/null || true
            rm -rf "$PROJECT_PATH/runtime/cache"/* 2>/dev/null || true
            rm -rf "$PROJECT_PATH/runtime/log"/* 2>/dev/null || true
            systemctl reload php-fpm 2>/dev/null || /etc/init.d/php-fpm reload 2>/dev/null || true            nginx -t && nginx -s reload 2>/dev/null || true
            echo "${{ github.sha }}" > "$PROJECT_PATH/.deployed_version"
            echo "Deployment Complete!"
