{include file="public/header"}

<style>
    .disf{display:flex;align-items: center;}
    .layui-card-header{background:#0a8ddf;color:#fff;}
    .layui-input-block{line-height:35px;}
</style>
<body style="padding: 10px;background-color: #f2f2f2;">
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-col-md12">
            <div class="layui-card">
                <div class="layui-card-body">
                    <div class="layui-form-item">
                        <div class="layui-form-label">用户</div>
                        <div class="layui-input-block">
                            {$data['name']}
                        </div>
                    </div>
                    <div class="layui-form-item">
                        <div class="layui-form-label">标题</div>
                        <div class="layui-input-block">
                            {$data['title']}
                        </div>
                    </div>
                    <div class="layui-form-item">
                        <div class="layui-form-label">内容</div>
                        <div class="layui-input-block">
                            {$data['title']}
                        </div>
                    </div>
                    <div class="layui-form-item">
                        <div class="layui-form-label">图片</div>
                        <div class="layui-input-block">
                            {if !empty($data['img'])}
                                {foreach $data['img'] as $k=>$v}
                                    <img src="/{$v}" alt="" style="width:100px;height:100px;margin-right:10px;">
                                {/foreach}
                            {/if}
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
