{include file="public/header_new"}

<style>
    img{ width:20px;height:20px;}
</style>
<body class="gray-bg">

<div class="row">
    <div class="col-sm-12">
        <div class="ibox float-e-margins">
            <div class="ibox-content">
                <h3 style="text-align: center;">运单管理</h3>
                <div id="toolbar" class="btn-group" style="margin-top: 10px;margin-bottom: 10px;line-height: 34px;">
                    <button type="button" href="javascript:;" onclick="save();" class="btn btn-default">
                        新增运单
                    </button>
                </div>
                <table id="table"

                /*默认排序项*/
                data-sort-name="id"
                data-sort-order="desc"
                /*工具栏相关*/
                data-toolbar="#toolbar"
                data-search="false"          /*搜索框*/
                data-search-on-enter-key="false"
                data-show-refresh="true"    /*刷新按钮*/
                /*分页相关*/
                data-side-pagination="server"
                data-pagination="true"      /*显示分页*/
                data-page-size="10"         /*每页显示条数*/
                /*移动端相关*/
                data-mobile-responsive="true"
                data-card-view="true"
                data-show-columns="true"
                /*radio or checkbox字段名称*/
                data-select-item-name="id" >

                <thead>
                <tr>
                    <th data-field="checkbox"
                        data-align="center"
                        data-checkbox="true"></th>
                    <th data-field="id"
                        data-align="center"
                        data-sortable="true"
                        data-visible="true">ID</th>
                    <th data-field="send_name"
                        data-align="center"
                        data-sortable="true">发件人名称</th>
                    <th data-field="send_mobile"
                        data-align="center"
                        data-sortable="true">发件人电话</th>
                    <th data-field="receive_name"
                        data-align="center"
                        data-sortable="true">收件人名称</th>
                    <th data-field="receive_mobile"
                        data-align="center"
                        data-sortable="true">收件人电话</th>
                    <th data-field="status_name"
                        data-align="center"
                        data-sortable="true">状态</th>
                    <th data-field="createtime"
                        data-align="center"
                        data-sortable="true">生成时间</th>
                    <th data-field="manage"
                        data-align="center"
                        data-sortable="true"
                        data-formatter="actionFormatter">操作</th>
                </tr>
                </thead>
                </table>
            </div>
        </div>
    </div>
</div>

<script type="text/javascript">

    var table;

    $(document).ready(function(){
        table = $('#table').bootstrapTable({
            url: "{:url('centralize/index/waybill_list')}",
            queryParams: queryParams,
        });
        $('.form-control').attr('placeholder','搜索仓库名称');
    });

    queryParams = function (params) {
        var temp = {
            sort: params.sort,
            order: params.order,
            limit: params.limit,            //页面大小
            offset: params.offset,          //页码
            search: params.search,
        };
        return temp;
    };

    //操作栏的格式化
    function actionFormatter(value, row, index) {
        var id = row.id;
        var title = row.id;

        var result = "";

        result += '<button style="margin-right: 5px;" type="button" onclick="share('+id+',\''+title+'\')" class="btn btn-warning btn-xs">分享运单</button>';
        result += '<button style="margin-right: 5px;" type="button" onclick="export_excel('+id+',\''+title+'\')" class="btn btn-normal btn-xs">导出运单</button>';
        if(row.status<2){
            result += '<button style="margin-right: 5px;" type="button" onclick="edit('+id+',\''+title+'\')" class="btn btn-primary btn-xs">编辑</button>';
            result += '<button style="margin-right: 5px;" type="button" onclick="del('+id+',\''+title+'\')" class="btn btn-danger btn-xs">删除</button>';
        }else if(row.status>=2){
            result += '<button style="margin-right: 5px;" type="button" onclick="edit('+id+',\''+title+'\')" class="btn btn-primary btn-xs">查看运单</button>';
            if(row.status==3){
                <!--费用确认，通知买家支付-->
                result += '<button style="margin-right: 5px;" type="button" onclick="buyer_pay('+id+',\''+title+'\')" class="btn btn-warning btn-xs">通知买家支付</button>';
            }
        }

        return result;
    }

    function edit(id,name){
        var index = layer.open({
            type: 2,
            title: '查看-'+name,
            area:['100%','100%'],
            content: "{:url('centralize/index/save_waybill')}&id="+id
        });
        // layer.full(index);
    }


    function save(title) {
        var index = layer.open({
            type: 2,
            title: title,
            area:['100%','100%'],
            content: "{:url('centralize/index/save_waybill')}"
        });
        // layer.full(index);
    }
    
    function share(id,name){
        var index = layer.open({
            type: 2,
            title: '分享运单',
            area:['100%','100%'],
            content: "{:url('centralize/index/share_waybill')}&id="+id
        });
    }

    function export_excel(id,name){
        var index = layer.open({
            type: 2,
            title: '导出运单',
            area:['100%','100%'],
            content: "{:url('centralize/index/export_waybill')}&id="+id
        });
    }

    function del(id,title){
        layer.confirm('确认删除该运单吗？',function(index){
            $.ajax({
                url: "<?php echo Url('centralize/index/del_waybill'); ?>",
                data:{'id':id},
                type:'post',
                cache:false,
                dataType:'json',
                success:function(data){
                    if(data.code==0)
                    {
                        layer.msg(data.msg, {
                            icon: 1,
                            time: 2000
                        }, function(){
                            window.location.reload();
                        });
                        return true;
                    }else {
                        layer.msg(data.msg, {icon:2, time:2000});
                        return false;
                    }
                },
                error:function() {
                    layer.msg('系统出错,请重试',{icon:2,time:1000});
                }
            });
        });
    }

</script>

</body>
</html>
