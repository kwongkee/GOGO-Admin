{include file="common/header_inner_new"}
<!--百度富文本-->
<script type="text/javascript" src="static/cklein/plugins/ueditor/ueditor.config.js"></script>
<script type="text/javascript" src="static/cklein/plugins/ueditor/ueditor.all.min.js"> </script>
<script type="text/javascript" src="static/cklein/plugins/ueditor/lang/zh-cn/zh-cn.js"></script>
<style>
    .format1,.format2,.url,.seo_content,.other_link,.other_navbar{display:none;}
    .seo_content{border:1px solid #eee;padding:20px;box-sizing: border-box;}
</style>
<body style="padding: 10px;background-color: #f2f2f2;">
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <form class="layui-form" action="" method="post" lay-filter="component-form-element">
            <input type="text" style="display:none;" name="id" id="id" value="{$id}">
            <div class="layui-col-md12">
                <div class="layui-card">
                    <div class="layui-card-body">
                        <div class="layui-form-item">
                            <div class="layui-form-label">动态标题</div>
                            <div class="layui-input-block">
                                <input type="text" class="layui-input" lay-verify="required" name="name" value="{$data['name']}">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">动态内容</div>
                            <div class="layui-input-block">
                                <select name="type" id="type" lay-filter="type">
                                    <option value="1" {if $data['type']==1}selected{/if}>发布图文</option>
                                    <option value="2" {if $data['type']==2}selected{/if}>链接社媒</option>
                                </select>
                            </div>
                        </div>
                        <div class="imgtxt" {if $data['type']==2}style="display:none;"{/if}>
                        <div class="layui-form-item">
                            <div class="layui-form-label">图文内容</div>
                            <div class="layui-input-block">
                                <script id="content" name="content" type="text/plain" style="width:100%;height:400px;">
                                        {if !empty($data['content'])}
                                            {$data['content']|htmlspecialchars_decode|stripslashes}
                                        {/if}
                                    </script>
                                <div class="clearfix"></div>
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">原文链接</div>
                            <div class="layui-input-block">
                                <input type="text" class="layui-input" name="origin_link" value="{$data['origin_link']}" placeholder="请输入原文链接">
                            </div>
                        </div>
                    </div>
                    <div class="social" {if $data['type']==1}style="display:none;"{/if}>
                    <div class="layui-form-item">
                        <div class="layui-form-label">选择社媒</div>
                        <div class="layui-input-block">
                            <select name="social_id" id="social_id" lay-filter="social_id" lay-search>
                                <option value="">请选择社媒</option>
                                {volist name="social" id="vo"}
                                <option value="{$vo['id']}" {if $data['social_id']==$vo['id']}selected{/if}>{$vo['name']}</option>
                                {/volist}
                            </select>
                        </div>
                    </div>
                    <div class="layui-form-item">
                        <div class="layui-form-label">社媒链接</div>
                        <div class="layui-input-block">
                            <input type="text" class="layui-input" name="social_link" value="{$data['social_link']}" placeholder="请输入社媒链接">
                        </div>
                    </div>
                </div>
                <div class="layui-form-item">
                    <div class="layui-form-label">发布日期</div>
                    <div class="layui-input-block">
                        <input type="text" class="layui-input" id="release_date" name="release_date" value="{$data['release_date']}" placeholder="yyyy-mm-dd">
                    </div>
                </div>
                <hr>
                <div class="layui-form-item">
                    <div class="layui-form-label">内页标题</div>
                    <div class="layui-input-block">
                        <input type="text" class="layui-input" name="seo_content[title]" value="{$data['seo_content']['title']}">
                    </div>
                </div>
                <div class="layui-form-item">
                    <div class="layui-form-label">内页关键词</div>
                    <div class="layui-input-block">
                        <input type="text" class="layui-input" name="seo_content[keywords]" value="{$data['seo_content']['keywords']}" placeholder="顿号、分隔">
                    </div>
                </div>
                <div class="layui-form-item">
                    <div class="layui-form-label">内页描述</div>
                    <div class="layui-input-block">
                        <input type="text" class="layui-input" name="seo_content[desc]" value="{$data['seo_content']['desc']}">
                    </div>
                </div>
            </div>
    </div>
</div>
<div class="layui-form-item" style="margin-top: 25px;text-align: center;">
    <div>
        <button class="layui-btn layui-btn-normal" lay-submit lay-filter="component-form-element">立即提交</button>
        <button type="reset" class="layui-btn layui-btn-primary">重置</button>
    </div>
</div>
</form>
</div>
</div>
</body>
<script src="./static/hadmin/assets/layui/xm-select.js"></script>
<script type="text/javascript">
    layui.use(['layer','form','laydate','upload','colorpicker'],function(){
        laydate = layui.laydate;
        layer = layui.layer;
        var form  = layui.form;
        $ = layui.jquery;
        var upload = layui.upload;
        var colorpicker = layui.colorpicker;

        laydate.render({
            elem: '#release_date'
            ,format: 'yyyy-MM-dd'
        });

        let ue = UE.getEditor('content', {
            initialFrameHeight: 400,
            serverUrl: 'static/cklein/plugins/ueditor/php/controller.php'
        });

        form.on('select(type)',function(data){
            let val = data.value;
            if(val==1){
                $('.imgtxt').show();
                $('.social').hide();
            }else if(val==2){
                $('.imgtxt').hide();
                $('.social').show();
            }
        });

        form.on('submit(component-form-element)', function(data){
            // JSON.stringify()
            // console.log(data.field);return false;

            // if(data.field['editorValue']==''){
            //     layer.msg('请输入内容！');
            //     return false;
            // }

            // if( $('#img_file-upload-list').children().length == 0 )
            // {
            //     layer.msg('请上传主图！');
            //     return false;
            // }

            $.ajax({
                url:"{:Url('centralize/index/save_enterprise_news')}",
                method:'post',
                data:data.field,
                dataType:'JSON',
                success:function(res){
                    layer.msg(res.msg,{time:2000}, function () {
                        if(res.code == 0)
                        {
                            parent.location.reload();
                        }
                    });
                },
                error:function (data) {
                    layer.msg('系统错误',{time:2000});
                }
            });
            return false;
        });
    });
</script>
</body>
</html>
