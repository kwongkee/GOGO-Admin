{include file="public/header"}

<style>
    .disf{display:flex;align-items: center;}
    .layui-card-header{background:#0a8ddf;color:#fff;}
    .input40{width:92%;}
    .add,.del{font-size:30px;}
    .layui-table th,.layui-colla-title{background:#0e2e68;color:#fff;}
    .layui-elem-field{border:1px solid #000;}
    .postal_temp{border:1px solid #000;width: 48px;height: 38px;text-align: center;line-height: 38px;margin-right:2px;}
    xm-select > .xm-label.auto-row .xm-label-block > span{overflow: hidden;}
    .hide{display:none;}

    .layui-form-label{font-weight: 800;}
    .fee_bigbox .input50{width:50%;}
    .fee_bigbox .input25{width:25%;}
    .fee_bigbox .input35{width:35%;}
    .fee_bigbox .input36{width:36%;}
    .fee_bigbox .white_color{white-space:nowrap;width:45px;text-align:center;}

    .other_link,.other_navbar,.other_pic,.other_msg{display:none;}
</style>
<body style="padding: 10px;background-color: #f2f2f2;">
    <div class="layui-fluid">
        <div class="layui-row layui-col-space15">
            <form class="layui-form" action="" method="post" lay-filter="component-form-element">
                <input type="text" style="display:none;" name="id" id="id" value="{$id}">
                <input type="text" style="display:none;" name="pid" id="pid" value="{$pid}">
                <input type="text" style="display:none;" name="system_id" id="system_id" value="{$system_id}">

                <div class="layui-col-md12">
                    <div class="layui-card">
                        <div class="layui-card-body input40">
                            <div class="layui-form-item">
                                <div class="layui-form-label">级别</div>
                                <div class="layui-input-block">
                                    <select name="level" id="level">
                                        <option value="1" {if $pid>0}selected{/if}>下级</option>
                                        <option value="2" {if $pid==0}selected{/if}>同级</option>
                                    </select>
                                </div>
                            </div>
                            <div class="layui-form-item">
                                <div class="layui-form-label">序号</div>
                                <div class="layui-input-block">
                                    <input type="number" class="layui-input" name="displayorders" placeholder="流程排序" value="{$data['displayorders']}">
                                </div>
                            </div>
                            <div class="layui-form-item">
                                <div class="layui-form-label">顺序描述</div>
                                <div class="layui-input-block">
                                    <input type="text" class="layui-input" name="step" placeholder="流程步骤，如：step1" value="{$data['step']}">
                                </div>
                            </div>
                            <div class="layui-form-item" style="display: none;">
                                <div class="layui-form-label">流程标题</div>
                                <div class="layui-input-block">
                                    <input type="text" class="layui-input" name="title" placeholder="流程标题" value="{$data['title']}">
                                </div>
                            </div>
                            <div class="layui-form-item">
                                <div class="layui-form-label">流程描述</div>
                                <div class="layui-input-block">
                                    <textarea name="content" id="content" class="layui-textarea" placeholder="流程描述">{$data['content']}</textarea>
                                </div>
                            </div>
                            <div class="layui-form-item">
                                <div class="layui-form-label">跳转链接</div>
                                <div class="layui-input-block">
                                    <select name="go_other" lay-filter="go_other">
                                        <option value="0">否</option>
                                        <option value="1" {if $data['go_other']==1}selected{/if}>第三方链接</option>
                                        <option value="2" {if $data['go_other']==2}selected{/if}>应用链接</option>
                                        <option value="3" {if $data['go_other']==3}selected{/if}>图文链接</option>
                                        <option value="4" {if $data['go_other']==4}selected{/if}>消息链接</option>
                                    </select>
                                </div>
                            </div>
                            <div class="layui-form-item other_link" {if $data['go_other']==1}style="display:block;"{/if}>
                                <div class="layui-form-label">第三方链接</div>
                                <div class="layui-input-block">
                                    <input type="text" class="layui-input" name="link" placeholder="请输入第三方链接" value="{$data['link']}">
                                </div>
                            </div>
                            <div class="layui-form-item other_navbar" {if $data['go_other']==2}style="display:block;"{/if}>
                                <div class="layui-form-label">应用链接</div>
                                <div class="layui-input-block">
                                    <select name="other_navbar" lay-search>
                                        <option value="">请选择应用</option>
                                        {if $system_id==1}
                                            {volist name="list" id="vo"}
                                            <option value="{$vo.id}" {if $data['other_navbar']==$vo.id}selected{/if}>{$vo.name}</option>
                                            {if !empty($vo.childMenu)}
                                            {volist name="vo.childMenu" id="vo2"}
                                            <option value="{$vo2.id}" {if $data['other_navbar']==$vo2.id}selected{/if}>--{$vo2.name}</option>
                                            {if !empty($vo2.childMenu)}
                                            {volist name="vo2.childMenu" id="vo3"}
                                            <option value="{$vo3.id}" {if $data['other_navbar']==$vo3.id}selected{/if}>----{$vo3.name}</option>
                                            {if !empty($vo3.childMenu)}
                                            {volist name="vo3.childMenu" id="vo4"}
                                            <option value="{$vo4.id}" {if $data['other_navbar']==$vo4.id}selected{/if}>------{$vo4.name}</option>
                                            {/volist}
                                            {/if}
                                            {/volist}
                                            {/if}
                                            {/volist}
                                            {/if}
                                            {/volist}
                                        {elseif($system_id==2)}
                                            <!--集运网-->
                                            {volist name="list" id="vo"}
                                            <option value="{$vo.id}" {if $data['other_navbar']==$vo.id}selected{/if}>{$vo.content}</option>
                                            {if !empty($vo.children)}
                                            {volist name="vo.children" id="vo2"}
                                            <option value="{$vo2.id}" {if $data['other_navbar']==$vo2.id}selected{/if}>--{$vo2.content}</option>
                                            {if !empty($vo2.children)}
                                            {volist name="vo2.children" id="vo3"}
                                            <option value="{$vo3.id}" {if $data['other_navbar']==$vo3.id}selected{/if}>----{$vo3.content}</option>
                                            {if !empty($vo3.children)}
                                            {volist name="vo3.children" id="vo4"}
                                            <option value="{$vo4.id}" {if $data['other_navbar']==$vo4.id}selected{/if}>------{$vo4.content}</option>
                                            {/volist}
                                            {/if}
                                            {/volist}
                                            {/if}
                                            {/volist}
                                            {/if}
                                            {/volist}
                                        {elseif($system_id==3)}
                                            {volist name="list" id="vo"}
                                                <option value="{$vo.id}" {if $data['other_navbar']==$vo.id}selected{/if}>{$vo.name}</option>
                                            {/volist}
                                        {/if}
                                    </select>
                                </div>
                            </div>
                            <div class="layui-form-item other_pic" {if $data['go_other']==3}style="display:block;"{/if}>
                                <div class="layui-form-label">图文链接</div>
                                <div class="layui-input-block">
                                    <select name="other_pic" lay-search>
                                        <option value="">请选择图文</option>
                                        {volist name="pic_list" id="vo"}
                                        <option value="{$vo.id}" {if $data['other_pic']==$vo.id}selected{/if}>{$vo.name}</option>
                                        {/volist}
                                    </select>
                                </div>
                            </div>
                            <div class="layui-form-item other_msg" {if $data['go_other']==4}style="display:block;"{/if}>
                                <div class="layui-form-label">消息链接</div>
                                <div class="layui-input-block">
                                    <select name="other_msg" lay-search>
                                        <option value="">请选择消息</option>
                                        {volist name="msg_list" id="vo"}
                                        <option value="{$vo.id}" {if $data['other_msg']==$vo.id}selected{/if}>{$vo.name}</option>
                                        {/volist}
                                    </select>
                                </div>
                            </div>

                            <div class="layui-form-item">
                                <div class="layui-form-label">流程图片<br>(200*200)</div>
                                <div class="layui-input-block">
                                    <div class="layui-upload" id="contract_type" style="margin-top: 10px;">
                                        <button type="button" class="layui-btn" id="img_file-upload">上传图片(一张)</button>
                                        <blockquote class="layui-elem-quote layui-quote-nm yulan" style="margin-top: 10px;">
                                            预览图：
                                            <div class="layui-upload-list" id="img_file-upload-list">
                                                {if !empty($data['icon'])}
                                                <div style="display: inline-block;">
                                                    <img onclick="seePic(this);" src="/{$data['icon']}" class="layui-upload-img" style="width:80px;height:80px;">
                                                    <button type="button" onclick="delPic(this);" class="layui-btn layui-btn-xs layui-btn-danger" style="position: relative;left: -45px;top: -39px;">删除</button>
                                                    <input type="hidden" name="ico[]" value="{$data['icon']}">
                                                </div>
                                                {/if}
                                            </div>
                                        </blockquote>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="layui-form-item" style="margin-top: 25px;text-align: center;">
                    <div>
                        <button class="layui-btn layui-btn-normal" lay-submit lay-filter="component-form-element2">提交</button>
                        <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</body>
<script src="./static/hadmin/assets/layui/xm-select.js"></script>
<script type="text/javascript">
    var win_index = '';
    layui.use(['layer','form','laydate','upload','element'],function(){
        var laydate = layui.laydate
            ,layer = layui.layer
            ,form  = layui.form
            ,$ = layui.jquery
            ,element = layui.element
            ,upload = layui.upload;

        form.render(null,'component-form-element');

        form.on('select(go_other)',function(data){
            let val = data.value;
            if(val==0){
                $('.other_link').hide();
                $('.other_navbar').hide();
                $('.other_pic').hide();
                $('.other_msg').hide();
            }else if(val==1){
                $('.other_link').show();
                $('.other_navbar').hide();
                $('.other_pic').hide();
                $('.other_msg').hide();
            }else if(val==2){
                $('.other_link').hide();
                $('.other_pic').hide();
                $('.other_msg').hide();
                $('.other_navbar').show();
            }else if(val==3){
                $('.other_link').hide();
                $('.other_pic').show();
                $('.other_msg').hide();
                $('.other_navbar').hide();
            }else if(val==4){
                $('.other_link').hide();
                $('.other_pic').hide();
                $('.other_msg').show();
                $('.other_navbar').hide();
            }
        });

        form.on('submit(component-form-element2)', function(data){
            // JSON.stringify()
            // console.log(data.field);return false;
            // if( $('#img_file-upload-list').children().length == 0 )
            // {
            //     layer.msg('请上传一张图标！');
            //     return false;
            // }
            $.ajax({
                url:"{:Url('centralize/index/save_process')}",
                method:'post',
                data:data.field,
                dataType:'JSON',
                success:function(res){
                    layer.msg(res.msg,{time:2000}, function () {
                        if(res.code == 0)
                        {
                            parent.location.reload();
                        }
                        else if(res.code == -2){
                            $('input[name="displayorders"]').val(res.step);
                            $('input[name="step"]').val('Step'+res.step);
                            form.render(null,'component-form-element');
                        }
                    });
                },
                error:function (data) {
                    layer.msg('系统错误',{time:2000});
                }
            });
            return false;
        });


        // 轮播图文件
        upload.render({
            elem: '#img_file-upload'
            ,url: '{:Url("admin/basic/upload_file")}'
            ,accept: 'image'
            ,data: { folder: 'centralize', type: 'process_file'}
            ,multiple: true
            ,number:1
            ,before: function(obj){
                layer.load(); //上传loading
            }
            ,done: function(res){
                layer.closeAll('loading'); //关闭loading
                if(res.code == 1)
                {

                    $('#img_file-upload-list').append('<div style="display: inline-block;"><img onclick="seePic(this);" src="/'+ res.file_path +'" class="layui-upload-img" style="width:80px;height:80px;"><button type="button" onclick="delPic(this);" class="layui-btn layui-btn-xs layui-btn-danger" style="position: relative;left: -45px;top: -39px;">删除</button><input type="hidden" name="ico[]" value="'+res.file_path+'"></div>')
                }
            }
        });
    });

    function delPic(obj)
    {
        var layer = layui.layer,$ = layui.$;
        layer.confirm('确认要删除该附件？', {
            btn: ['删除','取消']
        }, function(){
            $(obj).parent().remove();
            layer.closeAll();
        }, function(){

        });
    }
</script>
</body>
</html>
