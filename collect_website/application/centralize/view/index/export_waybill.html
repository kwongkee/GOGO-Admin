{include file="public/header_new"}

<div class="" style="padding:20px;box-sizing:border-box;display:flex;align-items:center;justify-content:space-evenly;height: 80%;">
    <button style="margin-right: 0px;" type="button" class="btn btn-warning btn-md" onclick="generate_pdf(1)">发件人联PDF</button>
    <button style="margin-right: 0px;" type="button" class="btn btn-primary btn-md" onclick="generate_pdf(2)">集运商联PDF</button>
    <button style="margin-right: 0px;" type="button" class="btn btn-info btn-md"  onclick="generate_pdf(3)">运营商联PDF</button>
    <button style="margin-right: 0px;" type="button" class="btn btn-success btn-md" onclick="generate_exl(3)">运营商联EXL</button>
</div>

<script type="text/javascript" charset="utf-8">
    function generate_pdf(typ){
        window.location.href="{:url('centralize/index/export_waybill_pdf')}&id={$id}&type="+typ;
    }

    function generate_exl(typ){
        window.location.href="{:url('centralize/index/export_waybill_exl')}&id={$id}&type="+typ;
    }
</script>
