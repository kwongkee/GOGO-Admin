{include file="public/header"}
<style>
    .disf{display:flex;align-items: center;}
    .layui-card-header{background:#0a8ddf;color:#fff;}
</style>
<body style="padding: 10px;background-color: #f2f2f2;">
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <form class="layui-form" action="" method="post" lay-filter="component-form-element">
            <input type="text" style="display:none;" name="id" id="id" value="{$id}">
            <div class="layui-col-md12">
                <div class="layui-card">
                    <div class="layui-card-body">
                        <div class="layui-form-item">
                            <div class="layui-form-label">自提点名称</div>
                            <div class="layui-input-block">
                                <input type="text" class="layui-input" lay-verify="required" name="point_name" id="point_name" value="{$data['point_name']}">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">自提点电话</div>
                            <div class="layui-input-block">
                                <input type="text" class="layui-input" lay-verify="required" name="point_tel" id="point_tel" value="{$data['point_tel']}">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">自提点负责人</div>
                            <div class="layui-input-block">
                                <input type="text" class="layui-input" lay-verify="required" name="point_person" id="point_person" value="{$data['point_person']}">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">自提点国家</div>
                            <div class="layui-input-block">
                                <select name="point_country_code" id="point_country_code" lay-verify="required" lay-search>
                                    {foreach $country_code as $k=>$v}
                                    <option value="{$v['code_value']}" {if $v['code_value']==$data['point_country_code']}selected{/if}>{$v['code_name']}</option>
                                    {/foreach}
                                </select>
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">自提点地址</div>
                            <div class="layui-input-block">
                                <input type="text" class="layui-input" lay-verify="required" name="point_address" id="point_address" value="{$data['point_address']}">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">状态</div>
                            <div class="layui-input-block">
                                <select name="status" id="status">
                                    <option value="1" {if $data['status']==1}selected{/if}>上架</option>
                                    <option value="2" {if $data['status']==2}selected{/if}>下架</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="layui-form-item" style="margin-top: 25px;text-align: center;">
                <div>
                    <button class="layui-btn layui-btn-normal" lay-submit lay-filter="component-form-element">立即提交</button>
                    <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                </div>
            </div>
        </form>
    </div>
</div>
</body>

<script type="text/javascript">
    layui.use(['layer','form','laydate','upload'],function(){
        laydate = layui.laydate;
        layer = layui.layer;
        var form  = layui.form;
        $ = layui.jquery;
        var upload = layui.upload;

        form.on('submit(component-form-element)', function(data){
            // JSON.stringify()
            // console.log(data.field);return false;

            $.ajax({
                url:"{:Url('centralize/index/pick_up_point_save')}",
                method:'post',
                data:data.field,
                dataType:'JSON',
                success:function(res){
                    layer.msg(res.msg,{time:2000}, function () {
                        if(res.code == 0)
                        {
                            parent.location.reload();
                        }
                    });
                },
                error:function (data) {
                    layer.msg('系统错误',{time:2000});
                }
            });
            return false;
        });
    });
</script>
</body>
</html>
