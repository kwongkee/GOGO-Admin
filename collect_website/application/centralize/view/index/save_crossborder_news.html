{include file="common/header_inner_new"}
<!--百度富文本-->
<script type="text/javascript" src="static/cklein/plugins/ueditor/ueditor.config.js"></script>
<script type="text/javascript" src="static/cklein/plugins/ueditor/ueditor.all.min.js"> </script>
<script type="text/javascript" src="static/cklein/plugins/ueditor/lang/zh-cn/zh-cn.js"></script>
<style>
    .format1,.format2,.url,.seo_content,.other_link,.other_navbar{display:none;}
    .seo_content{border:1px solid #eee;padding:20px;box-sizing: border-box;}
</style>
<body style="padding: 10px;background-color: #f2f2f2;">
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <form class="layui-form" action="" method="post" lay-filter="component-form-element">
            <input type="text" name="id" value="{$id}" style="display: none;">
            <div class="layui-col-md12">
                <div class="layui-card">
                    <div class="layui-card-body">
                        <div class="layui-form-item">
                            <div class="layui-form-label">日期</div>
                            <div class="layui-input-block">
                                <input type="text" class="layui-input" lay-verify="required" name="time" value="{$data['time']}" placeholder="请输入日期：yyyy-mm-dd">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">资讯出处</div>
                            <div class="layui-input-block">
                                <input type="text" class="layui-input" lay-verify="required" name="info_source" value="{$data['info_source']}" placeholder="请输入资讯出处">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">标题</div>
                            <div class="layui-input-block">
                                <input type="text" class="layui-input" lay-verify="required" name="title" value="{$data['title']}" placeholder="请输入标题">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">描述</div>
                            <div class="layui-input-block">
                                <textarea name="descs" class="layui-textarea" id="descs" placeholder="请输入描述" lay-verify="required">{$data['descs']}</textarea>
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">原文链接</div>
                            <div class="layui-input-block">
                                <input type="text" class="layui-input" lay-verify="required" name="link" value="{$data['link']}" placeholder="请输入原文链接">
                            </div>
                        </div>
                        {if !empty($id)}
                        <div class="layui-form-item">
                            <div class="layui-form-label">状态</div>
                            <div class="layui-input-block">
                                <select name="status" id="status">
                                    <option value="0" {if $data['status']==0}selected{/if}>未上架</option>
                                    <option value="1" {if $data['status']==1}selected{/if}>已上架</option>
                                </select>
                            </div>
                        </div>
                        {/if}
                        <!--                        <div class="layui-form-item">-->
                        <!--                            <div class="layui-form-label">内容</div>-->
                        <!--                            <div class="layui-input-block">-->
                        <!--                                if !empty($data['descs'])-->
                        <!--                                $data['descs']|htmlspecialchars_decode|stripslashes-->
                        <!--                                /if-->
                        <!--                                <script id="descs" name="descs" type="text/plain" style="width:100%;height:400px;">-->

                        <!--                                </script>-->
                        <!--                                <div class="clearfix"></div>-->
                        <!--                            </div>-->
                        <!--                        </div>-->
                    </div>
                </div>
            </div>
            <div class="layui-form-item" style="margin-top: 25px;text-align: center;">
                <div>
                    <button class="layui-btn layui-btn-normal" lay-submit lay-filter="component-form-element2">立即提交</button>
                    <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                </div>
            </div>
        </form>
    </div>
</div>
</body>
<script src="./static/hadmin/assets/layui/xm-select.js"></script>

    function delPic(obj)
    {
        var layer = layui.layer,$ = layui.$;
        layer.confirm('确认要删除该附件？', {
            btn: ['删除','取消']
        }, function(){
            $(obj).parent().remove();
            layer.closeAll();
        }, function(){

        });

</body>
</html>
