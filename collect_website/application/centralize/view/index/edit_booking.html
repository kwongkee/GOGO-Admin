{include file="public/header"}
<style type="text/css" media="all">
    .disf{display:flex;align-items: center;}

    .process_div{width:100%;overflow-x:auto;padding-bottom:10px;border-bottom:1px solid #fff;cursor:pointer;}
    .process_child{margin-left:5px;width:60px;text-align: center;margin-right:20px;padding:5px 10px;}
    .process_child .process_img{width:100%;}
    .process_child:last-child .process_arrow_box{display:none;}
    .process_child:first-child{margin-left:10px;}
    .process_child .process_text{color:#fff;}
    .process_child .process_arrow{width:25px;height:25px;}
    .process_active{color:#603160;border-radius: 5px;background:#603160;}
    .no_active{background: #a0a0a0;border-radius: 5px;}

    .f18{font-size: 18px !important;}
    .f15{font-size: 15px !important;}
    .f13{font-size: 13px !important;}
    .layui-table-cell{height:38px !important;line-height: 38px !important;}
    thead .layui-table-cell{height:28px;line-height: 28px}

    .main-container .layui-elem-field legend,.main-container .layui-form-label{color:#000;}
    .guide{cursor:pointer;color:#000;display:none;}
    #cs{display:none;}
    .know{color:#f1be83;}
    .layui-form-item .layui-input-inline{line-height: 38px;}
    .personalMain{overflow: unset !important;}
    /*#content{background:#fff;}*/

    xm-select > .xm-label.auto-row .xm-label-block > span{overflow: hidden;}
    /*.warehouse_layer{background:#000 !important;}*/
    .layui-card{background:#fff;color:#000;}
</style>
<body style="background-color: #e0d7d7;padding:10px;">

        <div class="layui-row layui-col-space15">

            <div class="disf process_div">

                    <div class="f13 process_text">{$vo['step']}</div>
                    <div class="f13 process_text">{$vo['content']}</div>
                    <div class="process_arrow_box" style="position: absolute;top: 15px;right: -25px;">
                        <img src="https://www.gogo198.com/img/white_arrow.png" alt="" class="process_arrow">
                    </div>
                </div>
                {/volist}
            </div>
        </div>
        <section id="content" class="non_topimg">
            <div class="container">
                <div class="personalMain">
                    <div class="personal">
                        <div class="personal_right">
                            <div class="main-container">
                                <div style="padding-top:20px;">
                                    <form class="layui-form" action="" lay-filter="component-form-group">

                                                </select>
                                            </div>
                                        </div>

                                        <div class="task_iframe">
                                            {if $order['prediction_id']==1}
                                            <div class="parcel_list">
                                                <fieldset class="layui-elem-field warehouse_field" style="margin-top:10px;">
                                                    <legend>仓库预订：</legend>
                                                    <div class="layui-field-box">
                                                        <div class="layui-form-item">
                                                            <label class="layui-form-label">目的国地</label>
                                                            <div class="layui-input-inline layui-select-fscon">
                                                                <select name="country" id="country" lay-filter="country" lay-verify="required" lay-search>
                                                                    <option value="">请选择目的国地</option>
                                                                    {volist name="country" id="vo"}
                                                                    <option value="{$vo['id']}" {if $vo['id']==$order['country']}selected{/if}>{$vo['param2']}</option>
                                                                    {/volist}

                                                            </div>
                                                        </div>

                                                            </div>
                                                        </div>
                                                        <div class="layui-form-item">
                                                            <label class="layui-form-label">选择仓库</label>
                                                            <div class="layui-input-inline layui-select-fscon" style="display:flex;align-items:center;">
                                                                <select name="warehouse_id" id="warehouse_id" lay-filter="warehouse_id" lay-verify="required" lay-search>
                                                                    <option value="">请选择仓库</option>
                                                                    {volist name="warehouse" id="vo"}
                                                                    <option value="{$vo['id']}" {if $order['warehouse_id']==$vo['id']}selected{/if}>{$vo['warehouse_name']}</option>
                                                                    {/volist}
                                                                </select>
                                                                <div class="layui-btn layui-btn-primary layui-btn-md" onclick="view_warehouse()">查看</div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </fieldset>
                                            </div>
                                            {elseif($order['prediction_id']==2)}
                                            <div class="parcel_list">
                                                <fieldset class="layui-elem-field warehouse_field" style="margin-top:10px;">
                                                    <legend>仓库预订：</legend>
                                                    <div class="layui-field-box">
                                                        <div class="layui-form-item">
                                                            <label class="layui-form-label">选择仓库</label>
                                                            <div class="layui-input-inline layui-select-fscon" style="display:flex;align-items:center;">
                                                                <select name="warehouse_id" id="warehouse_id" lay-filter="warehouse_id" lay-verify="required" lay-search>
                                                                    <option value="">请选择仓库</option>
                                                                    {volist name="warehouse" id="vo"}
                                                                    <option value="{$vo['id']}" {if $order['warehouse_id']==$vo['id']}selected{/if}>{$vo['warehouse_name']}</option>

                                        </div>

                                            <div class="line_content" style="padding:20px;">

                                            </div>
                                        </div>

                                        <div class="layui-form-item layui-layout-admin">
                                            <div class="layui-input-block">
                                                <div class="" style="left: 0;">
                                                    <button class="layui-btn" lay-submit="" lay-filter="component-form-demo1" style="background:#1E9FFF;color:#fff;border:1px solid #fff;width: 190px;">确认修改</button>
                                                </div>
                                            </div>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        </div>
    </div>
</body>

<script>

        var $ = layui.$

            form.on('select(prediction_id)',function(data){
                let val = data.value;
                if(val==1){
                    let html = single_parcel();
                    if($('.parcel_list').length>0){
                        $('.parcel_list').remove();
                    }
                    $('.task_iframe').append(html);
                    xmSelect.render({
                        el: '#line_id',
                        name:'line_id',
                        autoRow: true, //自动换行
                        filterable: true, //可搜索
                        searchTips: '请选择',
                        radio:true,
                        model: {
                            icon: 'hidden',//是否展示复选框或者单选框图标 show, hidden:变换背景色  ！！这句话是重点，不然会变成父节点也有单选框！！
                        },
                        tree: {
                            show: true, //用树显示
                            showFolderIcon: true, //是否显示节点前的三角图标
                            expandedKeys: true, //默认全部展开
                            showLine: true, //显示渐近线
                            indent: 20, //间距
                            strict: false, //重点！！设置成非严格父子模式，这样父节点被禁用，子节点依然可以点击
                            clickCheck:true,
                        },

                            show: false, //显示工具条

                        },
                        height: '300px', //最大下拉框高度

                        layVerify: 'required',
                    });
                    formrender();
                }else if(val==2){
                    let html = multipart_parcel();
                    if($('.parcel_list').length>0){
                        $('.parcel_list').remove();
                    }
                    $('.task_iframe').append(html);
                }
                formrender();
            });

            //目的国地
            form.on('select(country)',function(data){
                let val = data.value;
                let channel = $('#channel').val();

                //找出当前国地的线路
                if(val!=''){
                    $.ajax({
                        url: "/?s=gather/get_country_lines",
                        method: 'post',
                        data: {val:val},
                        dataType: 'JSON',
                        success: function (res) {
                            layer.msg(res.msg, {time: 2000}, function () {
                                if (res.code == 0) {
                                    xmSelect.render({
                                        el: '#line_id',
                                        name:'line_id',
                                        autoRow: true, //自动换行
                                        filterable: true, //可搜索
                                        searchTips: '请选择',
                                        radio:true,
                                        model: {
                                            icon: 'hidden',//是否展示复选框或者单选框图标 show, hidden:变换背景色  ！！这句话是重点，不然会变成父节点也有单选框！！
                                        },
                                        tree: {
                                            show: true, //用树显示
                                            showFolderIcon: true, //是否显示节点前的三角图标
                                            expandedKeys: true, //默认全部展开
                                            showLine: true, //显示渐近线
                                            indent: 20, //间距
                                            strict: false, //重点！！设置成非严格父子模式，这样父节点被禁用，子节点依然可以点击
                                            clickCheck:true,
                                        },
                                        toolbar: {
                                            show: false, //显示工具条
                                            list: ['ALL', 'REVERSE', 'CLEAR']
                                        },
                                        height: '300px', //最大下拉框高度
                                        data: $.parseJSON(res.list),
                                        layVerify: 'required',
                                    });
                                    formrender();
                                }
                            });
                        },
                        error: function (data) {
                            layer.msg('系统错误', {time: 2000});
                        }
                    });
                }

                // if(channel){
                //     let html = show_line(val,channel);
                //     if($('.line_table').length>0){
                //         $('.task_iframe').find('.parcel_list').find('.warehouse_field').find('.layui-field-box').find('.line_table').html(html[0]);
                //     }else{
                //         $('.task_iframe').find('.parcel_list').find('.warehouse_field').find('.layui-field-box').append(html[0]);
                //     }
                //     put_line_list(html[1],html[2]);
                //     formrender();
                // }
            });

            //集运渠道
            form.on('select(channel)',function(data){
                let val = data.value;
                let country = $('#country').val();
                if(country) {
                    let html = show_line(country, val);
                    if ($('.line_table').length > 0) {
                        $('.task_iframe').find('.parcel_list').find('.warehouse_field').find('.layui-field-box').find('.line_table').html(html[0]);
                    } else {
                        $('.task_iframe').find('.parcel_list').find('.warehouse_field').find('.layui-field-box').append(html[0]);
                    }
                    put_line_list(html[1],html[2]);
                    formrender();
                }
            });

            /* 监听提交 */
            form.on('submit(component-form-demo1)', function (data) {
                $.ajax({
                    url: "{:Url('centralize/index/edit_booking')}",
                    method: 'post',
                    data: data.field,
                    dataType: 'JSON',
                    success: function (res) {
                        layer.msg(res.msg, {time: 2000}, function () {
                            if (res.code == 0) {
                                // var index = parent.layer.getFrameIndex(window.name);
                                // parent.layer.close(index);
                                // parent.window.location.reload();
                                // window.location.href='/?s=gather/order_management';
                                window.location.reload();
                            }
                        });
                    },
                    error: function (data) {
                        layer.msg('系统错误', {time: 2000});
                    }
                });
                return false;
            });
        });

    //单个包裹集运
    function single_parcel(){
        var $ = layui.$
            , layer = layui.layer
            , form = layui.form;
        let html = '   <div class="parcel_list">\n' +
            '               <fieldset class="layui-elem-field warehouse_field" style="margin-top:10px;">\n' +
            '                        <legend>仓库预订：</legend>\n' +
            '                        <div class="layui-field-box">\n' +
            '                            <div class="layui-form-item">\n' +
            '                                <label class="layui-form-label">目的国地</label>\n' +
            '                                <div class="layui-input-inline layui-select-fscon">\n'+
            '                                     <select name="country" id="country" lay-filter="country" lay-verify="required" lay-search>\n'+
            '                                         <option value="">请选择目的国地</option>\n';
        $.ajax({
            url: "https://www.gogo198.com/?s=gather/get_country",
            method: 'post',
            data: {},
            dataType: 'JSON',
            async: false,
            success: function (res) {
                if (res.code == 0) {
                    if(res.list.length!=0){
                        for(let i=0;i<res.list.length;i++){
                            if(res.list[i].param2=='中国'){
                                html += '<option value="'+res.list[i].id+'" selected>'+res.list[i].param2+'</option>\n';
                            }else{
                                html += '<option value="'+res.list[i].id+'">'+res.list[i].param2+'</option>\n';
                            }
                        }
                    }
                }
            },
            error: function (data) {
                layer.msg('系统错误', {time: 2000});
            }
        });
        html += '                                </select>\n'+
            '                                </div>\n' +
            '                            </div>\n' +
            '                                     <div class="layui-form-item">\n'+
            '                                          <label class="layui-form-label">集运线路</label>\n'+
            '                                          <div class="layui-input-inline layui-select-fscon">\n'+
            '                                              <div id="line_id" class="xm-select-demo"></div>\n'+
            // '                                             <select name="channel" id="channel" lay-filter="channel" lay-verify="required" lay-search>\n'+
            // '                                                  <option value="">请选择集运渠道</option>\n';
            // volist name="channel" id="vo"
            // html += '                                          <option value="$vo[\'id\']">$vo[\'name\']，双清到门</option>\n';
            // /volist
            // html += '                                     </select>\n'+
            '                                          </div>\n'+
            '                                     </div>\n'+
            '                        </div>\n' +
            '                    </fieldset>\n' +
            '          </div>';

        return html;
    }

    //多个包裹集运
    function multipart_parcel(){
        var $ = layui.$
            , layer = layui.layer;
        $('.know').css('display','none');
        let html = '   <div class="parcel_list">\n' +
            '               <fieldset class="layui-elem-field warehouse_field" style="margin-top:10px;">\n' +
            '                        <legend>仓库预订：</legend>\n' +
            '                        <div class="layui-field-box">\n' +
            '                            <div class="layui-form-item">\n' +
            '                                <label class="layui-form-label">选择仓库</label>\n' +
            '                                <div class="layui-input-inline layui-select-fscon" style="display:flex;align-items:center;">\n'+
            '                                     <select name="warehouse_id" id="warehouse_id" lay-filter="warehouse_id" lay-verify="required" lay-search>\n'+
            '                                         <option value="">请选择仓库</option>\n';
        $.ajax({
            url: "https://www.gogo198.com/?s=gather/get_warehouse",
            method: 'post',
            data: {},
            dataType: 'JSON',
            async: false,
            success: function (res) {
                if (res.code == 0) {
                    if(res.list.length!=0){
                        for(let i=0;i<res.list.length;i++){
                            html += '<option value="'+res.list[i].id+'">'+res.list[i].warehouse_name+'</option>\n';
                        }
                    }
                }
            },
            error: function (data) {
                layer.msg('系统错误', {time: 2000});
            }
        });
        html += '                             </select>\n'+
            '                                         <div class="layui-btn layui-btn-primary layui-btn-md" onclick="view_warehouse()">查看</div>\n'+
            '                                </div>\n' +
            '                            </div>\n' +
            '                        </div>\n' +
            '                    </fieldset>\n' +
            '          </div>\n';

        return html;
    }

    //预报方式阅读须知
    function guide(){
        var $ = layui.$
            , layer = layui.layer;
        let prediction_id = $('#prediction_id').val();

        $.ajax({
            url: "/?s=gather/get_guide",
            method: 'post',
            data: { 'val': prediction_id},
            dataType: 'JSON',
            async: false,
            success: function (res) {
                timers('guide_times','guide_can_check');
                $('.guide_detail').find('.guide_content').html(res.info.content);
                var index2 = layer.open({
                    type: 1,
                    title: "阅读须知",
                    content: $('.guide_detail'),
                    area:['80%','80%']
                });

                $('.close_win').click(function(){
                    clearTimeout(time_name);
                    layer.close(index2);
                });

                $('.layui-layer-close').click(function(){
                    clearTimeout(time_name);
                });
            }
        });
    }

    //查看仓库详情

        var $ = layui.$

            , form = layui.form;

        let html = '';

            dataType: "json",

                "warehouse_id": warehouse_id,

                    '                        <label class="layui-form-label">收件人电话</label>\n' +

                    '                            <div class="copy2">' + res.data.area_code + '-' + res.data.mobile + '</div>\n' +

        }else{
            $("."+times).html("我已了解（"+n+"秒)");

            },1000);

    }

    //複製全部
    function xs_all(this1){
        var name = $(this1).attr('data-name');
        var tel = $(this1).attr('data-tel');
        var post = $(this1).attr('data-post');
        var address = $(this1).attr('data-address');
        var address2 = '';
        if($('.addrs').length>0) {
            for (let i = 0; i < $('.addrs').length; i++) {
                let num = i + 2;
                address2 += $(this1).attr('data-address'+num)+'\r';
            }
        }
        if(typeof(address2)=='undefined'){
            document.getElementById("cs").innerHTML=name+'<br>'+tel+'<br>'+post+'<br>'+address;
        }else{
            document.getElementById("cs").innerHTML=name+'<br>'+tel+'<br>'+post+'<br>'+address+'<br>'+address2;
        }

        //開始複製
        var oInput = document.createElement('textarea');
        // oInput.value = document.getElementById("cs").innerText;
        if(typeof(address2)=='undefined'){
            oInput.value = name+'\n'+tel+'\n'+post+'\n'+address;
        }else{
            oInput.value = name+'\n'+tel+'\n'+post+'\n'+address+'\n'+address2;
        }
        document.body.appendChild(oInput);
        oInput.select(); // 选择对象
        document.execCommand("Copy"); // 执行浏览器复制命令
        oInput.remove();
        layer.msg("复制成功");
    }
