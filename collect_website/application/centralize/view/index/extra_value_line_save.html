{include file="public/header"}
<!--百度富文本-->
<script type="text/javascript" src="static/cklein/plugins/ueditor/ueditor.config.js"></script>
<script type="text/javascript" src="static/cklein/plugins/ueditor/ueditor.all.min.js"> </script>
<script type="text/javascript" src="static/cklein/plugins/ueditor/lang/zh-cn/zh-cn.js"></script>
<style>
    .disf{display:flex;align-items: center;}
    .layui-card-header{background:#0a8ddf;color:#fff;}
</style>
<body style="padding: 10px;background-color: #f2f2f2;">
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <form class="layui-form" action="" method="post" lay-filter="component-form-element">
            <input type="text" style="display:none;" name="id" id="id" value="{$id}">
            <div class="layui-col-md12">
                <div class="layui-card">
                    <div class="layui-card-body">
                        <div class="layui-form-item">
                            <div class="layui-form-label">路线封面图</div>
                            <div class="layui-input-block">
                                <div class="layui-upload" id="contract_type" style="margin-top: 10px;">
                                    <button type="button" class="layui-btn" id="img_file-upload">上传封面图(一张)</button>
                                    <blockquote class="layui-elem-quote layui-quote-nm yulan" style="margin-top: 10px;">
                                        预览图：
                                        <div class="layui-upload-list" id="img_file-upload-list">
                                            {if isset($data['img'])}
                                            <div style="display: inline-block;">
                                                <img onclick="seePic(this);" src="/{$data['img']}" class="layui-upload-img" style="width:80px;height:80px;">
                                                <button type="button" onclick="delPic(this);" class="layui-btn layui-btn-xs layui-btn-danger" style="position: relative;left: -45px;top: -39px;">删除</button>
                                                <input type="hidden" name="img_file[]" value="{$data['img']}">
                                            </div>
                                            {/if}
                                        </div>
                                    </blockquote>
                                </div>
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">路线名称</div>
                            <div class="layui-input-block">
                                <input type="text" class="layui-input" lay-verify="required" name="name" id="name" value="{$data['name']}">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">所属区域</div>
                            <div class="layui-input-block">
                                <select name="country_code" id="country_code" lay-verify="required" lay-search>
                                    {foreach $country_code as $k=>$v }
                                        <option value="{$v['code_value']}" {if $data['country_code']==$v['code_value']}selected{/if}>{$v['code_name']}</option>
                                    {/foreach}
                                </select>
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">计费模式</div>
                            <div class="layui-input-block">
                                <select name="bill_mode" id="bill_mode" lay-verify="required">
                                    <option value="">请选择计费模式</option>
                                    <option value="首重续重模式" {if $data['bill_mode']=='首重续重模式'}selected{/if}>首重续重模式</option>
                                </select>
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">预计时效</div>
                            <div class="layui-input-block">
                                <input type="text" class="layui-input" lay-verify="required" name="expect_time_limit" id="expect_time_limit" value="{$data['expect_time_limit']}">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">接受物品属性</div>
                            <div class="layui-input-block">
                                <div class="layui-col-xs6">
                                    <div id="good_value" class="xm-select-demo"></div>
                                </div>
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">首重</div>
                            <div class="layui-input-block">
                                <div class="layui-col-xs6">
                                    <input type="text" class="layui-input" lay-verify="required" name="first_kg" id="first_kg" value="{$data['first_kg']}">
                                </div>
                                <div class="layui-col-xs6">
                                    <input type="text" class="layui-input" lay-verify="required" name="first_weight" id="first_weight" value="{$data['first_weight']}">
                                </div>
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">续重</div>
                            <div class="layui-input-block">
                                <div class="layui-col-xs6">
                                    <input type="text" class="layui-input" lay-verify="required" name="continue_kg" id="continue_kg" value="{$data['continue_kg']}">
                                </div>
                                <div class="layui-col-xs6">
                                    <input type="text" class="layui-input" lay-verify="required" name="continue_weight" id="continue_weight" value="{$data['continue_weight']}">
                                </div>
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">增值服务</div>
                        </div>
                        <table class="layui-table service_table">
                            <thead>
                                <tr>
                                    <th>服务名称</th>
                                    <th>服务备注</th>
                                    <th>服务收费（需附带币种标识）</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                {if !empty($data['value_add_services'])}
                                    {foreach $data['value_add_services'] as $k=>$v}
                                        <tr>
                                            <td>
                                                <input type="text" class="layui-input" lay-verify="required" name="service_name[]" value="{$v['service_name']}">
                                            </td>
                                            <td>
                                                <input type="text" class="layui-input" name="service_remark[]" value="{$v['service_remark']}">
                                            </td>
                                            <td>
                                                <input type="text" class="layui-input" lay-verify="required" name="service_fee[]" value="{$v['service_fee']}">
                                            </td>
                                            <td>
                                                <div class="layui-btn layui-btn-primary" onclick="service_add()">增加</div>
                                            </td>
                                        </tr>
                                    {/foreach}
                                {else}
                                    <tr>
                                        <td>
                                            <input type="text" class="layui-input" lay-verify="required" name="service_name[]" value="">
                                        </td>
                                        <td>
                                            <input type="text" class="layui-input" name="service_remark[]" value="">
                                        </td>
                                        <td>
                                            <input type="text" class="layui-input" lay-verify="required" name="service_fee[]" value="">
                                        </td>
                                        <td>
                                            <div class="layui-btn layui-btn-primary" onclick="service_add()">增加</div>
                                        </td>
                                    </tr>
                                {/if}
                            </tbody>
                        </table>

                        <div class="layui-form-item" style="margin-top:25px;">
                            <div class="layui-form-label">路线内容详情</div>
                            <div class="layui-input-block">
                                <script id="content" type="text/plain" style="width:100%;height:400px;">
                                    {if isset($data['content'])}
                                    {$data['content']|htmlspecialchars_decode|stripslashes}
                                    {/if}
                                </script>
                                <div class="clearfix"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="layui-form-item" style="margin-top: 25px;text-align: center;">
                <div>
                    <button class="layui-btn layui-btn-normal" lay-submit lay-filter="component-form-element">立即提交</button>
                    <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                </div>
            </div>
        </form>
    </div>
</div>
</body>

<script src="./static/hadmin/assets/layui/xm-select.js"></script>
<script type="text/javascript">
    layui.use(['layer','form','laydate','upload'],function(){
        laydate = layui.laydate;
        layer = layui.layer;
        var form  = layui.form;
        $ = layui.jquery;
        var upload = layui.upload;

        var ue = UE.getEditor('content', {
            initialFrameHeight: 400,
            serverUrl: 'static/cklein/plugins/ueditor/php/controller.php'
        });

        xmSelect.render({
            el: '#good_value',
            paging: true,
            pageSize: 5,
            filterable: true,
            toolbar: {
                show: true,
            },
            prop: {
                name: 'title',
                value: 'id',
            },
            autoRow: true,
            data: {$goods_value},
            name: 'accept_info',
            layVerify: 'required',
            layVerType: 'msg',
            initValue:[{$data['accept_info']}]
        });

        form.on('submit(component-form-element)', function(data){
            // JSON.stringify()
            // console.log(data.field);return false;
            if(data.field['editorValue']==''){
                layer.msg('请输入路线内容详情！');
                return false;
            }
            $.ajax({
                url:"{:Url('centralize/index/extra_value_line_save')}",
                method:'post',
                data:data.field,
                dataType:'JSON',
                success:function(res){
                    layer.msg(res.msg,{time:2000}, function () {
                        if(res.code == 0)
                        {
                            parent.location.reload();
                        }
                    });
                },
                error:function (data) {
                    layer.msg('系统错误',{time:2000});
                }
            });
            return false;
        });

        // 封面文件
        upload.render({
            elem: '#img_file-upload'
            ,url: '{:Url("admin/defaultInfo/upload_file")}'
            ,accept: 'image'
            ,data: { folder: 'centralize', type: 'extra_line_file'}
            ,multiple: true
            ,number:1
            ,before: function(obj){
                layer.load(); //上传loading
            }
            ,done: function(res){
                layer.closeAll('loading'); //关闭loading
                if(res.code == 1)
                {

                    $('#img_file-upload-list').append('<div style="display: inline-block;"><img onclick="seePic(this);" src="/'+ res.file_path +'" class="layui-upload-img" style="width:80px;height:80px;"><button type="button" onclick="delPic(this);" class="layui-btn layui-btn-xs layui-btn-danger" style="position: relative;left: -45px;top: -39px;">删除</button><input type="hidden" name="img_file[]" value="'+res.file_path+'"></div>')
                }
            }
        });
    });

    function delPic(obj)
    {
        var layer = layui.layer,$ = layui.$;
        layer.confirm('确认要删除该附件？', {
            btn: ['删除','取消']
        }, function(){
            $(obj).parent().remove();
            layer.closeAll();
        }, function(){

        });
    }

    function service_add(){
        let html = '<tr>\n' +
            '                                    <td>\n' +
            '                                        <input type="text" class="layui-input" lay-verify="required" name="service_name[]" value="">\n' +
            '                                    </td>\n' +
            '                                    <td>\n' +
            '                                        <input type="text" class="layui-input" name="service_remark[]" value="">\n' +
            '                                    </td>\n' +
            '                                    <td>\n' +
            '                                        <input type="text" class="layui-input" lay-verify="required" name="service_fee[]" value="">\n' +
            '                                    </td>\n' +
            '                                    <td>\n' +
            '                                        <div class="layui-btn layui-btn-primary" onclick="service_add()">增加</div>\n' +
            '                                        <div class="layui-btn layui-btn-danger" onclick="service_del(this)">删除</div>\n' +
            '                                    </td>\n' +
            '                                </tr>';

        $('.service_table').append(html);

        form.render(null,'component-form-element');
    }

    function service_del(thi){
        $(thi).parent().parent().remove();
    }
</script>
</body>
</html>
