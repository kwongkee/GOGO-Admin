{include file="public/header"}

<style>
    .disf{display:flex;align-items: center;}
    .layui-card-header{background:#0a8ddf;color:#fff;}
    .input40{width:92%;}
    .add,.del{font-size:30px;}
    .layui-table th,.layui-colla-title{background:#0e2e68;color:#fff;}
    .layui-elem-field{border:1px solid #000;}
    .postal_temp{border:1px solid #000;width: 48px;height: 38px;text-align: center;line-height: 38px;margin-right:2px;}
    xm-select > .xm-label.auto-row .xm-label-block > span{overflow: hidden;}
    .hide{display:none;}

    .layui-form-label{font-weight: 800;}
    .fee_bigbox .input50{width:50%;}
    .fee_bigbox .input25{width:25%;}
    .fee_bigbox .input35{width:35%;}
    .fee_bigbox .input36{width:36%;}
    .fee_bigbox .white_color{white-space:nowrap;width:45px;text-align:center;}
</style>
<body style="padding: 10px;background-color: #f2f2f2;">
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <form class="layui-form" action="" method="post" lay-filter="component-form-element">
            <input type="text" style="display:none;" name="id" id="id" value="{$id}">
            <input type="text" style="display:none;" name="pid" id="pid" value="{$pid}">
            <div class="layui-col-md12">
                <div class="layui-card">
                    <div class="layui-card-body input40">
                        <div class="layui-form-item">
                            <div class="layui-form-label">服务标题</div>
                            <div class="layui-input-block">
                                <input type="text" class="layui-input" name="title" placeholder="服务标题" value="{$data['title']}">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">服务内容</div>
                            <div class="layui-input-block">
                                <textarea name="content" id="content" class="layui-textarea" placeholder="服务内容">{$data['content']}</textarea>
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">服务链接</div>
                            <div class="layui-input-block">
                                <input type="text" class="layui-input" name="link" placeholder="服务链接(非必填)" value="">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">ICO<br>(200*200)</div>
                            <div class="layui-input-block">
                                <div class="layui-upload" id="contract_type" style="margin-top: 10px;">
                                    <button type="button" class="layui-btn" id="img_file-upload">上传ICO(一张)</button>
                                    <blockquote class="layui-elem-quote layui-quote-nm yulan" style="margin-top: 10px;">
                                        预览图：
                                        <div class="layui-upload-list" id="img_file-upload-list">
                                            {if !empty($data['icon'])}
                                            <div style="display: inline-block;">
                                                <img onclick="seePic(this);" src="/{$data['icon']}" class="layui-upload-img" style="width:80px;height:80px;">
                                                <button type="button" onclick="delPic(this);" class="layui-btn layui-btn-xs layui-btn-danger" style="position: relative;left: -45px;top: -39px;">删除</button>
                                                <input type="hidden" name="ico[]" value="{$data['icon']}">
                                            </div>
                                            {/if}
                                        </div>
                                    </blockquote>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="layui-form-item" style="margin-top: 25px;text-align: center;">
                <div>
                    <button class="layui-btn layui-btn-normal" lay-submit lay-filter="component-form-element2">提交</button>
                    <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                </div>
            </div>
        </form>
    </div>
</div>
</body>
<script src="./static/hadmin/assets/layui/xm-select.js"></script>
<script type="text/javascript">
    var win_index = '';
    layui.use(['layer','form','laydate','upload','element'],function(){
        var laydate = layui.laydate
            ,layer = layui.layer
            ,form  = layui.form
            ,$ = layui.jquery
            ,element = layui.element
            ,upload = layui.upload;

        form.render(null,'component-form-element');


        form.on('submit(component-form-element2)', function(data){
            // JSON.stringify()
            // console.log(data.field);return false;
            if( $('#img_file-upload-list').children().length == 0 )
            {
                layer.msg('请上传一张图标！');
                return false;
            }
            $.ajax({
                url:"{:Url('centralize/index/save_platform_services_list')}",
                method:'post',
                data:data.field,
                dataType:'JSON',
                success:function(res){
                    layer.msg(res.msg,{time:2000}, function () {
                        if(res.code == 0)
                        {
                            parent.location.reload();
                        }
                    });
                },
                error:function (data) {
                    layer.msg('系统错误',{time:2000});
                }
            });
            return false;
        });


        // 轮播图文件
        upload.render({
            elem: '#img_file-upload'
            ,url: '{:Url("admin/basic/upload_file")}'
            ,accept: 'image'
            ,data: { folder: 'centralize', type: 'platfrom_services_file'}
            ,multiple: true
            ,number:1
            ,before: function(obj){
                layer.load(); //上传loading
            }
            ,done: function(res){
                layer.closeAll('loading'); //关闭loading
                if(res.code == 1)
                {

                    $('#img_file-upload-list').append('<div style="display: inline-block;"><img onclick="seePic(this);" src="/'+ res.file_path +'" class="layui-upload-img" style="width:80px;height:80px;"><button type="button" onclick="delPic(this);" class="layui-btn layui-btn-xs layui-btn-danger" style="position: relative;left: -45px;top: -39px;">删除</button><input type="hidden" name="ico[]" value="'+res.file_path+'"></div>')
                }
            }
        });
    });

    function delPic(obj)
    {
        var layer = layui.layer,$ = layui.$;
        layer.confirm('确认要删除该附件？', {
            btn: ['删除','取消']
        }, function(){
            $(obj).parent().remove();
            layer.closeAll();
        }, function(){

        });
    }
</script>
</body>
</html>
