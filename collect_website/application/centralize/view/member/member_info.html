{include file="public/header"}
<style>
    .disf{display:flex;align-items: center;}
    .layui-card-header{background:#0a8ddf;color:#fff;}
</style>
<body style="padding: 10px;background-color: #f2f2f2;">
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <form class="layui-form" action="" method="post" lay-filter="component-form-element">
            <input type="text" style="display:none;" name="id" id="id" value="{$data['id']}">
            <div class="layui-col-md12">
                <div class="layui-card">
                    <div class="layui-card-body">
                        <div class="layui-form-item">
                            <div class="layui-form-label">会员名称</div>
                            <div class="layui-input-block">
                                <input type="text" class="layui-input" lay-verify="required" name="coupon_name" id="coupon_name" value="{$data['name']}" readonly>
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">邮箱</div>
                            <div class="layui-input-block">
                                <input type="text" class="layui-input" lay-verify="required" name="email" id="email" value="{$data['email']}" readonly>
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">手机号</div>
                            <div class="layui-input-block">
                                <input type="text" class="layui-input" lay-verify="required" name="mobile" id="mobile" value="{$data['mobile']}" readonly>
                            </div>
                        </div>

                        <div class="layui-form-item">
                            <div class="layui-form-label">会员等级</div>
                            <div class="layui-input-block">
                                <select name="vip_grade" id="vip_grade">
                                    <option value="0">普通会员</option>
                                    {foreach $level as $k=>$v}
                                    <option value="{$v['id']}" {if $data['vip_grade']==$v['id']}selected{/if}>{$v['name']}</option>
                                    {/foreach}
                                </select>
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">余额</div>
                            <div class="layui-input-block">
                                <input type="text" class="layui-input" lay-verify="required" name="balance" id="balance" value="{$data['balance']}" readonly>
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">积分</div>
                            <div class="layui-input-block">
                                <input type="text" class="layui-input" lay-verify="required" name="points" id="points" value="{$data['points']}" readonly>
                            </div>
                        </div>

                        <div class="layui-form-item">
                            <div class="layui-form-label">会员状态</div>
                            <div class="layui-input-block">
                                <select name="status" id="status" lay-verify="required">
                                    <option value="0">正常</option>
                                    <option value="1" {if $data['status']==1}selected{/if}>禁用</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="layui-form-item" style="margin-top: 25px;text-align: center;">
                <div>
                    <button class="layui-btn layui-btn-normal" lay-submit lay-filter="component-form-element">立即提交</button>
                    <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                </div>
            </div>
        </form>
    </div>
</div>
</body>

<script type="text/javascript">
    layui.use(['layer','form','laydate','upload'],function(){
        laydate = layui.laydate;
        layer = layui.layer;
        var form  = layui.form;
        $ = layui.jquery;
        var upload = layui.upload;

        form.on('submit(component-form-element)', function(data){
            // JSON.stringify()
            // console.log(data.field);return false;

            $.ajax({
                url:"{:Url('centralize/member/member_info')}",
                method:'post',
                data:data.field,
                dataType:'JSON',
                success:function(res){
                    layer.msg(res.msg,{time:2000}, function () {
                        if(res.code == 0)
                        {
                            parent.location.reload();
                        }
                    });
                },
                error:function (data) {
                    layer.msg('系统错误',{time:2000});
                }
            });
            return false;
        });
    });
</script>
</body>
</html>
