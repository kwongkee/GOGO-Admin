{include file="public/header_new"}

<style>
    img{ width:20px;height:20px;}
</style>
<body class="gray-bg">

<div class="row">
    <div class="col-sm-12">
        <div class="ibox float-e-margins">
            <div class="ibox-content">
                <h3 style="text-align: center;">角色列表</h3>
                <div id="toolbar" class="btn-group" style="margin-top: 10px;margin-bottom: 10px;line-height: 34px;">
                    <button type="button" href="javascript:;" onclick="save();" class="btn btn-default">
                        添加角色
                    </button>
                </div>
                <table id="table"

                /*默认排序项*/
                data-sort-name="id"
                data-sort-order="desc"
                /*工具栏相关*/
                data-toolbar="#toolbar"
                data-search="true"          /*搜索框*/
                data-search-on-enter-key="false"
                data-show-refresh="true"    /*刷新按钮*/
                /*分页相关*/
                data-side-pagination="server"
                data-pagination="true"      /*显示分页*/
                data-page-size="10"         /*每页显示条数*/
                /*移动端相关*/
                data-mobile-responsive="true"
                data-card-view="true"
                data-show-columns="true"
                /*radio or checkbox字段名称*/
                data-select-item-name="id" >

                <thead>
                <tr>
                    <th data-field="checkbox"
                        data-align="center"
                        data-checkbox="true"></th>
                    <th data-field="id"
                        data-align="center"
                        data-sortable="true"
                        data-visible="true">ID</th>
                    <th data-field="name"
                        data-align="center"
                        data-sortable="true">角色名称</th>
                    <th data-field="status"
                        data-align="center"
                        data-sortable="true">状态</th>
                    <th data-field="createtime"
                        data-align="center"
                        data-sortable="true">创建日期</th>
                    <th data-field="manage"
                        data-align="center"
                        data-sortable="true"
                        data-formatter="actionFormatter">操作</th>
                </tr>
                </thead>
                </table>
            </div>
        </div>
    </div>
</div>

<script type="text/javascript">

    var table;

    $(document).ready(function(){
        table = $('#table').bootstrapTable({
            url: "{:url('centralize/managemenber/role_lists')}",
            queryParams: queryParams,
        });
        $('.form-control').attr('placeholder','搜索角色名称');
    });

    queryParams = function (params) {
        var temp = {
            sort: params.sort,
            order: params.order,
            limit: params.limit,            //页面大小
            offset: params.offset,          //页码
            search: params.search,
        };
        return temp;
    };

    //操作栏的格式化
    function actionFormatter(value, row, index) {
        var id = row.id;
        var name = row.name;

        var result = "";

        result += '<button style="margin-right: 5px;" type="button" onclick="openWindow('+id+',\''+name+'\',\''+1+'\')" class="btn btn-primary btn-xs">编辑信息</button>';
        // result += '<button style="margin-right: 5px;" type="button" onclick="openWindow('+id+',\''+name+'\',\''+2+'\')" class="btn btn-success btn-xs">分配人员</button>';
        result += '<button style="margin-right: 5px;" type="button" onclick="openWindow('+id+',\''+name+'\',\''+3+'\')" class="btn btn-danger btn-xs">删除角色</button>';
        return result;
    }

    function save(){
        layer.open({
            type: 2,
            title: '添加角色',
            area:['100%','100%'],
            content: "{:url('centralize/managemenber/save_role')}"
        });
    }

    function del(id,title){
        layer.confirm('确认删除该角色吗？',function(index){
            $.ajax({
                url: "<?php echo Url('centralize/managemenber/del_role'); ?>",
                data:{'id':id},
                type:'post',
                cache:false,
                dataType:'json',
                success:function(data){
                    if(data.code==1)
                    {
                        layer.msg(data.msg, {
                            icon: 1,
                            time: 2000
                        }, function(){
                            window.location.reload();
                        });
                        return true;
                    }else {
                        layer.msg(data.msg, {icon:2, time:2000});
                        return false;
                    }
                },
                error:function() {
                    layer.msg('系统出错,请重试',{icon:2,time:1000});
                }
            });
        });
    }

    function openWindow(id,name,type){
        if(type==1){
            var index = layer.open({
                type: 2,
                title: '['+name+']编辑角色',
                area:['100%','100%'],
                content: "{:url('centralize/managemenber/save_role')}&id="+id+"&type="+type+"&name="+name
            });
        }else if(type==2){
            var index = layer.open({
                type: 2,
                title: '分配人员['+name+']',
                area:['100%','100%'],
                content: "{:url('centralize/managemenber/save_role')}&id="+id+"&type="+type+"&name="+name
            });
        }else if(type==3){
            del(id,name);
        }
    }
</script>

</body>
</html>
