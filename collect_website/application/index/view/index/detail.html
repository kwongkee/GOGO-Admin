{include file="common/header"}
<style>
    *{box-sizing: border-box;}
    .detail{width:1200px;margin:0 auto;padding:0 10px;background-color: #fff;box-shadow: 0 3px 9px rgb(0 0 0);border-radius: 6px;margin-top: 30px;padding: 20px;font-size: 16px;overflow: hidden;color: #555;line-height: 1.7;margin-bottom:30px;}
    @media screen and (max-width: 768px){
        .banner_area{margin-top:65px;}
        .detail {width: 90%;}
        .x6 {width: 100%;}
        .x3-move {margin-left: 0;}
        .input-group .addon{width:20%;}
    }
    
    .neirongbbb {font-weight: 600;color: rgb(1,142,215);font-size: 24px;}
    .description{border-bottom: 1px solid #ddd;margin-bottom:15px;}
    p{margin-bottom: 15px;line-height: 24px;}
    .detail p {text-indent: 2em;}
    hr{background: #ddd;color: #ddd;clear: both;float: none;width: 100%;height: 1px;margin: 10px 0;border: 0;-moz-box-sizing: content-box;box-sizing: content-box;}
</style>
<!--头部banner-->
<section class="banner_area">
    <img src="/{$item['inner_banner']}" alt="">
    <div class="container" style="display: none;">
        <div class="banner_content">
            <h3>About Us</h3>
        </div>
    </div>
</section>

<!--详情-->
<section class="detail">
    <div class="description">{$item['description']}</div>
    {volist name="$item.content" id="vo"}
        <div class="content">
            <p><span class="neirongbbb">{$vo.title}</span></p>
            {$vo.title_content}
        </div>
    <hr>
    {/volist}

    <!--在线咨询-->
    {include file="common/advice"}
</section>

{include file="common/footer"}
