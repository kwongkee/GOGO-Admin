<script>
    $('.dept_select').chosen();
    $('.shape_select').chosen();
    $('.btn-secondary').click(function(){
        $('#exampleModal').hide();
    });
    
    function know(code) {
        if(code!=''){
            $.ajax({
                url: "/collect_website/public/?s=index/price_detail",
                data: {
                    'code': code,
                    'wid': "<?php echo session('wid');?>"
                },
                type: 'post',
                cache: false,
                dataType: 'json',
                success: function (data) {
                    if (data.code == 0) {
                        let html = '';
                        for(let i=0;i<data.data.detail_content.length;i++){
                            html += '<span style="font-size:15px;font-weight:600;">'+data.data.detail_content[i]+'</span><br/><br/>';
                        }
                        $('.modal-body').html(html);
                        $('#exampleModalLabel').html(data.data.name);
                        // $('.modal').popover('show');
                        // $('.example-popover').show();
                        // $('.example-popover').popover('show');
                        // $('[data-toggle="popover"]').popover();
                    }
                }
            });
        }
    }

    function know2(code2){
        window.location.href="/collect_website/public/?s=index/line_detail&insid={$data['id']}&wid=<?php echo session('wid');?>&id="+code2;
    }
</script>
