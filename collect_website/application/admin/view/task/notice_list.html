{include file="common/header_new"}
<body class="gray-bg">
<div class="row">
    <div class="col-sm-12">
        <div class="ibox float-e-margins">
            <div class="ibox-content">
                <h3 style="text-align: center;">平台客服管理</h3>
                <div id="toolbar" class="btn-group" style="margin-top: 10px;margin-bottom: 10px;line-height: 34px;">
                    <button type="button" href="javascript:;" onclick="save();" class="btn btn-default">
                        新增客服
                    </button>
                </div>
                <table id="table"

                /*默认排序项*/
                data-sort-name="id"
                data-sort-order="desc"
                /*工具栏相关*/
                data-toolbar="#toolbar"
                data-search="false"          /*搜索框*/
                data-search-on-enter-key="false"
                data-show-refresh="true"    /*刷新按钮*/
                /*分页相关*/
                data-side-pagination="server"
                data-pagination="true"      /*显示分页*/
                data-page-size="10"         /*每页显示条数*/
                /*移动端相关*/
                data-mobile-responsive="true"
                data-card-view="true"
                data-show-columns="true"
                /*radio or checkbox字段名称*/
                data-select-item-name="id" >

                <thead>
                <tr>
                    <th data-field="checkbox"
                        data-align="center"
                        data-checkbox="true"></th>
                    <th data-field="id"
                        data-align="center"
                        data-sortable="true"
                        data-visible="true">ID</th>
                    <th data-field="name"
                        data-align="center"
                        data-sortable="true">客服名称</th>
                    <th data-field="notice_type"
                        data-align="center"
                        data-sortable="true">邀请方式</th>
                    <th data-field="statusname"
                        data-align="center"
                        data-sortable="true">状态</th>
                    <th data-field="createtime"
                        data-align="center"
                        data-sortable="true">邀请时间</th>
                    <th data-field="manage"
                        data-align="center"
                        data-sortable="true"
                        data-formatter="actionFormatter">操作</th>
                </tr>
                </thead>
                </table>
            </div>
        </div>
    </div>
</div>
<!-- 自定义js -->
<script src="./static/hadmin/js/content.js?v=1.0.0"></script>
<script src="./static/hadmin/layui/layui.all.js"></script>
</body>
<script>
    var table;

    $(document).ready(function(){
        table = $('#table').bootstrapTable({
            url: "{:url('admin/task/notice_list')}",
            queryParams: queryParams,
        });
        $('.form-control').attr('placeholder','搜索用户名称');
    });

    queryParams = function (params) {
        var temp = {
            sort: params.sort,
            order: params.order,
            limit: params.limit,            //页面大小
            offset: params.offset,          //页码
            search: params.search,
        };
        return temp;
    };

    //操作栏的格式化
    function actionFormatter(value, row, index) {
        var id = row.id;
        var name = row.name;

        var result = "";

        result += '<button style="margin-right: 5px;" type="button" onclick="edit('+id+',\''+name+'\')" class="btn btn-primary btn-xs">查看</button>';
        result += '<button style="margin-right: 5px;" type="button" onclick="del('+id+',\''+name+'\')" class="btn btn-danger btn-xs">删除</button>';
        return result;
    }

    function edit(id,name){
        var index = layer.open({
            type: 2,
            title: '查看-'+name,
            area:['100%','100%'],
            content: "{:url('admin/task/notice')}&id="+id
        });
        // layer.full(index);
    }

    function save(title) {
        var index = layer.open({
            type: 2,
            title: title,
            area:['100%','100%'],
            content: "{:url('admin/task/notice')}"
        });
        // layer.full(index);
    }

    function del(id,title){
        layer.confirm('确认删除该客服吗？',function(index){
            $.ajax({
                url: "<?php echo Url('admin/task/del_notice'); ?>",
                data:{'id':id},
                type:'post',
                cache:false,
                dataType:'json',
                success:function(data){
                    if(data.code==0)
                    {
                        layer.msg(data.msg, {
                            icon: 1,
                            time: 2000
                        }, function(){
                            window.location.reload();
                        });
                        return true;
                    }else {
                        layer.msg(data.msg, {icon:2, time:2000});
                        return false;
                    }
                },
                error:function() {
                    layer.msg('系统出错,请重试',{icon:2,time:1000});
                }
            });
        });
    }
</script>

</html>
