<script type="text/javascript">

    var table;

    queryParams = function (params) {
        var temp = {

            order: params.order,
            limit: params.limit,            //йЎөйқўеӨ§е°Ҹ
            offset: params.offset,          //йЎөз Ғ

        return temp;
    };

    //ж“ҚдҪңж Ҹзҡ„ж јејҸеҢ–
    function actionFormatter(value, row, index) {
        var id = row.id;

        var result = "";
        result += '<button style="margin-right: 5px;" type="button" onclick="edit('+id+',\''+title+'\')" class="btn btn-info btn-xs">зј–иҫ‘</button>';
        result += '<button style="margin-right: 5px;" type="button" onclick="del('+id+',\''+title+'\')" class="btn btn-danger btn-xs">еҲ йҷӨ</button>';

        return result;
    }

        function edit(id,name){
            var index = layer.open({
                type: 2,

            // layer.full(index);
        }

        function del(id,title){
            let msg = '';
            layer.confirm('зЎ®и®ӨеҲ йҷӨиҜҘеӣҪе®¶вҖң'+title+'вҖқзҡ„зҰҒйҷҗеҗ—пјҹ',function(index){
                $.ajax({
                    url: "<?php echo Url('admin/country/del_prohibit'); ?>",
                    data:{'id':id},

                        layer.msg('зі»з»ҹеҮәй”ҷ,иҜ·йҮҚиҜ•',{icon:2,time:1000});
                    }

        }

</script>
