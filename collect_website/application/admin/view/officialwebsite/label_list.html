{include file="common/header_new"}

<style>
    img{ width:20px;height:20px;}
    /*.layui-layer-dialog .layui-layer-content{color:#fff !important;}*/
</style>
<body class="gray-bg">

<div class="row">
    <div class="col-sm-12">
        <div class="ibox float-e-margins">
            <div class="ibox-content">
                <h3 style="text-align: center;">标签列表</h3>
                <div id="toolbar1" class="btn-group" style="margin-top: 10px;margin-bottom: 10px;line-height: 34px;float: left;">
                    <button type="button" href="javascript:;" onclick="add_label({$pid},{$plain_id});" class="btn btn-info" style="margin:0 15px;">
                        新增标签
                    </button>
                </div>
                <table id="table"
                /*默认排序项*/
                data-sort-name="id"
                data-sort-order="desc"
                /*工具栏相关*/
                data-toolbar="#toolbar"
                data-search="false"          /*搜索框*/
                data-search-on-enter-key="true"
                data-show-refresh="true"    /*刷新按钮*/
                /*分页相关*/
                data-side-pagination="server"
                data-pagination="true"      /*显示分页*/
                data-page-size="10"         /*每页显示条数*/
                /*移动端相关*/
                data-mobile-responsive="true"
                data-card-view="true"
                data-show-columns="true"
                /*radio or checkbox字段名称*/
                data-select-item-name="id" >
                <thead>
                <tr>
                    <th data-field="manage"
                        data-align="center"
                        data-sortable="true"
                        data-formatter="actionFormatter1">爬取次序</th>
                    <th data-field="label_name"
                        data-align="center"
                        data-sortable="true"
                        data-visible="true">标签名称</th>
                    <th data-field="label_attr"
                        data-align="center"
                        data-sortable="true"
                        data-visible="true">标签属性</th>
                    <th data-field="is_continue"
                        data-align="center"
                        data-sortable="true"
                        data-visible="true">往下页爬取</th>
                    <th data-field="manage"
                        data-align="center"
                        data-sortable="true"
                        data-formatter="actionFormatter">操作</th>
                </tr>
                </thead>
                </table>
            </div>
        </div>
    </div>
</div>

<script type="text/javascript">

    var table;

    $(document).ready(function(){
        table = $('#table').bootstrapTable({
            url: "{:url('admin/officialwebsite/label_list')}&pid={$pid}&plain_id={$plain_id}",
            queryParams: queryParams,
        });

        $('.form-control').attr('placeholder','搜索商户名称');
    });

    queryParams = function (params) {
        var temp = {
            sort: params.sort,
            order: params.order,
            limit: params.limit,            //页面大小
            offset: params.offset,          //页码
            search: params.search,
        };
        return temp;
    };

    //操作栏的格式化
    function actionFormatter(value, row, index) {
        var id = row.id;
        var pid = row.pid;

        var result = "";

        // result += '<button style="margin-right: 5px;" type="button" onclick="openWindow('+id+',\''+pid+'\',\''+1+'\')" class="btn btn-primary btn-xs">标签配置</button>';
        result += '<button style="margin-right: 5px;" type="button" onclick="del('+id+',\''+name+'\')" class="btn btn-danger btn-xs">删除</button>';
        // result += '<button style="margin-right: 5px;" type="button" onclick="del('+id+',\''+name+'\',\''+2+'\')" class="btn btn-primary btn-xs">爬取周期</button>';
        return result;
    }

    function actionFormatter1(value,row,index){
        var id = row.id;
        // var name = row.name;
        var displayorder = row.displayorder;
        var result = "";
        result += '<input type="number" name="displayorder" value="'+displayorder+'" onchange="displayorder(this,'+id+')" style="width: 50px;">';
        return result;
    }

    function displayorder(t,id){
        let val = $(t).val();
        $.ajax({
            url: "<?php echo Url('admin/officialwebsite/crawl_order'); ?>",
            data: {'id': id,'val':val},
            type: 'post',
            cache: false,
            dataType: 'json',
            success: function (data) {
                layer.msg(data.msg,{time:3000},function(){
                });
            }
        });
    }

    function add_label(pid,plain_id){
        var index = layer.open({
            type: 2,
            title: '新增标签',
            area:['100%','100%'],
            content: "{:url('admin/officialwebsite/add_label')}&id="+pid+"&plain_id="+plain_id
        });
    }

    function del(id,title){
        layer.confirm('确认删除该标签吗？',function(index){
            $.ajax({
                url: "<?php echo Url('admin/officialwebsite/del_label'); ?>",
                data:{'id':id},
                type:'post',
                cache:false,
                dataType:'json',
                success:function(data){
                    if(data.code==0)
                    {
                        layer.msg(data.msg, {
                            icon: 1,
                            time: 2000
                        }, function(){
                            window.location.reload();
                        });
                        return true;
                    }else {
                        layer.msg(data.msg, {icon:2, time:2000});
                        return false;
                    }
                },
                error:function() {
                    layer.msg('系统出错,请重试',{icon:2,time:1000});
                }
            });
        });
    }

    function openWindow(id,pid,type){
        if(type==1){
            var index = layer.open({
                type: 2,
                title: '标签配置',
                area:['100%','100%'],
                content: "{:url('admin/officialwebsite/label_list')}&id="+id+"&pid="+pid
            });
        }
    }
</script>

</body>
</html>
