<script type="text/javascript">

    var table;

    $(document).ready(function(){
        table = $('#table').bootstrapTable({
            url: "{:url('admin/officialwebsite/crawl_children_content')}&type=0",
            queryParams: queryParams,
        });
        table = $('#table2').bootstrapTable({
            url: "{:url('admin/officialwebsite/crawl_children_content')}&type=1",
            queryParams: queryParams,
        });
        $('.form-control').attr('placeholder','搜索标题');
    });

    queryParams = function (params) {
        var temp = {
            sort: params.sort,
            order: params.order,
            limit: params.limit,            //页面大小
            offset: params.offset,          //页码
            search: params.search,
            pid:"{$pid}"
        };
        return temp;
    };

    //操作栏的格式化
    function actionFormatter(value, row, index) {
        var id = row.id;
        var title = row.title;

        var result = "";
        result += '<button style="margin-right: 5px;" type="button" onclick="edit('+id+',\''+title+'\',1)" class="btn btn-primary btn-xs">编辑</button>';
        result += '<button style="margin-right: 5px;" type="button" onclick="del('+id+',\''+title+'\',1)" class="btn btn-danger btn-xs">删除</button>';
        return result;
    }

    //操作栏的格式化
    function actionFormatter2(value, row, index) {
        var id = row.id;
        var title = row.title;

        var result = "";
        result += '<button style="margin-right: 5px;" type="button" onclick="edit('+id+',\''+title+'\',2)" class="btn btn-primary btn-xs">编辑</button>';
        result += '<button style="margin-right: 5px;" type="button" onclick="del('+id+',\''+title+'\',2)" class="btn btn-danger btn-xs">删除</button>';
        return result;
    }

    function getIdSelections() {
        return $.map($table.bootstrapTable('getSelections'), function(row) {
            return row.id
        });
    }
    //对比，并获取所有已选择的checkbox值
    function contrast(type){
        let ids = '';
        if(type==1){
            var idlist = $('#table').bootstrapTable('getAllSelections');
        }else if(type==2){
            var idlist = $('#table2').bootstrapTable('getAllSelections');
        }
        if(idlist.length>2){
            layer.alert('只能选择2条数据进行对比');
            return false;
        }else if(idlist.length<2){
            layer.alert('请选择2条数据进行对比');
            return false;
        }
        for (var i = 0; i < idlist.length; i++) {
            // ids.push(idlist[i].id);
            ids += ','+idlist[i].id;
        }
        var allCheck=document.getElementsByName("id");
        for(var i=0;i<allCheck.length;i++){
            allCheck[i].checked=false;
        }
        var btSelectAll=document.getElementsByName("btSelectAll");
        for(var i=0;i<btSelectAll.length;i++){
            btSelectAll[i].checked=false;
        }

        if(type==1) {
            $("#table").bootstrapTable('refresh');
        }else if(type==2){
            $("#table2").bootstrapTable('refresh');
        }

        //进行对比,跳转新页面
        layer.open({
            type: 2,
            title: '内容对比',
            area:['100%','100%'],
            content: "{:url('admin/officialwebsite/contrast_pfc_detail')}&ids="+ids
        });
    }

    function shelf(pid){
        var index = layer.open({
            type: 2,
            title: '拟上架列表',
            area:['100%','100%'],
            content: "{:url('admin/officialwebsite/fake_shelf_list')}&pid="+pid
        });
    }

    function add(id,type){
        var index = layer.open({
            type: 2,
            title: '新增内容',
            area:['100%','100%'],
            content: "{:url('admin/officialwebsite/add_content')}&pid="+id+"&type="+type
        });
    }

    function edit(id,name,type){
        let url = '';
        if(type==1){
            url = "{:url('admin/officialwebsite/pfc_detail')}&id="+id;
        }else if(type==2){
            url = "{:url('admin/officialwebsite/add_content')}&pid={$pid}&id="+id;
        }
        var index = layer.open({
            type: 2,
            title: '编辑-'+name,
            area:['100%','100%'],
            content: url
        });
        // layer.full(index);
    }

    function del(id,title,type){
        layer.confirm('确认删除该内容吗？',function(index){
            $.ajax({
                url: "<?php echo Url('admin/officialwebsite/del_pfc_detail'); ?>&type="+type,
                data:{'id':id},
                type:'post',
                cache:false,
                dataType:'json',
                success:function(data){
                    if(data.code==0)
                    {
                        layer.msg(data.msg, {
                            icon: 1,
                            time: 2000
                        }, function(){
                            window.location.reload();
                        });
                        return true;
                    }else {
                        layer.msg(data.message, {icon:2, time:2000});
                        return false;
                    }
                },
                error:function() {
                    layer.msg('系统出错,请重试',{icon:2,time:1000});
                }
            });
        });
    }
</script>

</body>
</html>
