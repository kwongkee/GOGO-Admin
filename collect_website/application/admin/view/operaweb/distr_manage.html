{include file="common/header_inner_new"}

<style>
    .disf{display:flex;align-items: center;}
    .layui-card-header{background:#0a8ddf;color:#fff;}
    .method1,.method2,.method3{display:none;}
    .show{display:block;}
</style>
<body style="padding: 10px;background-color: #f2f2f2;">
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <form class="layui-form" action="" method="post" lay-filter="component-form-element2">
            <input type="hidden" name="id" value="{$id}">
            <div class="layui-col-md12">
                <div class="layui-card">
                    <div class="layui-card-body">
                        <div class="layui-form-item">
                            <div class="layui-form-label">分佣方式</div>
                            <div class="layui-input-block">
                                <select name="type" id="method" lay-filter="method" lay-verify="required">
                                    <option value="">请选择分佣方式</option>
                                    {volist name="distr_method" id="vo"}
                                    <option value="{$vo['id']}" {if $data['agent_content']['type']==$vo['id']}selected{/if}>{$vo['name']}</option>
                                    {/volist}
                                </select>
                            </div>
                        </div>
                        <div class="layui-form-item method1  {if $data['agent_content']['type']==1}show{/if}">
                            <div class="layui-form-label">总金额(%)</div>
                            <div class="layui-input-block disf">
                                <input type="number" name="trade_amount1" class="layui-input" value="{$data['agent_content']['trade_amount']}" placeholder="请输入x%/总金额">
                            </div>
                        </div>
                        <div class="layui-form-item method2 {if $data['agent_content']['type']==2}show{/if}">
                            <div class="layui-form-label">计费重(元)</div>
                            <div class="layui-input-block">
                                <input type="number" name="trade_amount2" class="layui-input" value="{$data['agent_content']['trade_amount']}" placeholder="请输入x元/RT">
                            </div>
                        </div>
                        <div class="layui-form-item method3 {if $data['agent_content']['type']==3}show{/if}">
                            <label class="layui-form-label">订单(元)</label>
                            <div class="layui-input-block disf">
                                <input type="number" name="trade_amount3" class="layui-input" value="{$data['agent_content']['trade_amount']}" placeholder="请输入x元/票">
                            </div>
                        </div>
                        <div class="layui-form-item method4 {if $data['agent_content']['type']==4}show{/if}">
                            <label class="layui-form-label">总毛利(%)</label>
                            <div class="layui-input-block disf">
                                <input type="number" name="trade_amount4" class="layui-input" value="{$data['agent_content']['trade_amount']}" placeholder="请输入订单总毛利的x%">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">分销层次</div>
                            <div class="layui-input-block disf">
                                <input type="number" name="levels" class="layui-input" value="{$data['agent_content']['levels']}" placeholder="请输入限制层次" lay-verify="required">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">分销区域</div>
                            <div class="layui-input-block">
                                <input type="number" name="area" class="layui-input" value="{$data['agent_content']['area']}" placeholder="请输入分销区域" lay-verify="required">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <label class="layui-form-label">分销类别</label>
                            <div class="layui-input-block disf">
                                <select name="category" id="category" lay-verify="required">
                                    <option value="1" {if $data['agent_content']['category']==1}selected{/if}>物流服务</option>
                                    <option value="2" {if $data['agent_content']['category']==2}selected{/if}>仓储服务</option>
                                    <option value="3" {if $data['agent_content']['category']==3}selected{/if}>电商服务</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="layui-form-item" style="margin-top: 25px;text-align: center;">
                <div>
                    <button class="layui-btn layui-btn-normal" lay-submit lay-filter="component-form-element">立即提交</button>
                    <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                </div>
            </div>
        </form>
    </div>
</div>
</body>

<script type="text/javascript">
    layui.use(['layer','form','laydate','upload','colorpicker','element'],function(){
        laydate = layui.laydate;
        layer = layui.layer;
        var form  = layui.form;
        $ = layui.jquery;
        var upload = layui.upload;
        var element = layui.element;
        var colorpicker = layui.colorpicker;

        form.on('select(method)',function(data){
            let val=data.value;
            if(val==1){
                $('.method1').show();
                $('.method2').hide();
                $('.method3').hide();
                $('.method4').hide();
            }else if(val==2){
                $('.method1').hide();
                $('.method2').show();
                $('.method3').hide();$('.method4').hide();
            }else if(val==3){
                $('.method1').hide();
                $('.method2').hide();
                $('.method3').show();$('.method4').hide();
            }else if(val==4){
                $('.method1').hide();
                $('.method2').hide();
                $('.method3').hide();$('.method4').show();
            }
        });

        form.on('submit(component-form-element)', function(data){
            // JSON.stringify()
            // console.log(data.field);return false;
            $.ajax({
                url:"{:Url('admin/operaweb/distr_manage')}",
                method:'post',
                data:data.field,
                dataType:'JSON',
                success:function(res){
                    layer.msg(res.msg,{time:2000}, function () {
                        if(res.code == 0)
                        {
                            parent.location.reload();
                        }
                    });
                },
                error:function (data) {
                    layer.msg('系统错误',{time:2000});
                }
            });
            return false;
        });
    });
</script>
</body>
</html>
