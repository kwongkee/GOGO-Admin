{include file="common/header_inner_new"}
<!--百度富文本-->
<script type="text/javascript" src="static/cklein/plugins/ueditor/ueditor.config.js"></script>
<script type="text/javascript" src="static/cklein/plugins/ueditor/ueditor.all.min.js"> </script>
<script type="text/javascript" src="static/cklein/plugins/ueditor/lang/zh-cn/zh-cn.js"></script>
<style>
    .disf{display:flex;align-items: center;}
    .layui-card-header{background:#0a8ddf;color:#fff;}
    .other_link,.other_navbar,.other_pic,.other_msg{display:none;}
</style>
<body style="padding: 10px;background-color: #f2f2f2;">
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <form class="layui-form" action="" method="post" lay-filter="component-form-element">
            <input type="text" style="display:none;" name="id" id="id" value="{$id}">
            <input type="text" style="display:none;" name="pid" id="pid" value="{$pid}">
            <div class="layui-col-md12">
                <div class="layui-card">
                    <div class="layui-card-body">
                        <div class="layui-form-item">
                            <div class="layui-form-label">类别</div>
                            <div class="layui-input-block">
                                <select name="select_pid">
                                    {volist name="type_list" id="vo"}
                                        <option value="{$vo['id']}" {if $data['pid']==$vo['id']}selected{/if}>{$vo['name']}</option>
                                    {/volist}
                                </select>
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">标题</div>
                            <div class="layui-input-block">
                                <input type="text" class="layui-input" lay-verify="required" name="title" value="{$data['title']}">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">副标题</div>
                            <div class="layui-input-block">
                                <input type="text" class="layui-input" lay-verify="required" name="subtitle" value="{$data['subtitle']}">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">描述</div>
                            <div class="layui-input-block">
                                <input type="text" class="layui-input" lay-verify="required" name="desc" value="{$data['desc']}">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">右侧轮播图(600*300)</div>
                            <div class="layui-input-block">
                                <div class="layui-upload" style="margin-top: 10px;">
                                    <button type="button" class="layui-btn" id="img_file-upload">上传图片</button>
                                    <blockquote class="layui-elem-quote layui-quote-nm yulan" style="margin-top: 10px;">
                                        预览图：
                                        <div class="layui-upload-list" id="img_file-upload-list">
                                            {if !empty($data['pic_list'])}
                                                {volist name="data.pic_list" id="vo"}
                                                    <div style="display: inline-block;">
                                                        <img onclick="seePic(this);" src="/{$vo}" class="layui-upload-img" style="width:80px;height:80px;">
                                                        <button type="button" onclick="delPic(this);" class="layui-btn layui-btn-xs layui-btn-danger" style="position: relative;left: -45px;top: -39px;">删除</button>
                                                        <input type="hidden" name="pic_list[]" value="{$vo}">
                                                    </div>
                                                {/volist}
                                            {/if}
                                        </div>
                                    </blockquote>
                                </div>
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">详情按钮</div>
                            <div class="layui-input-block">
                                <select name="type" lay-filter="type">
                                    <option value="0">否</option>
                                    <option value="1" {if $data['type']==1}selected{/if}>第三方链接</option>
                                    <option value="2" {if $data['type']==2}selected{/if}>菜单链接</option>
                                </select>
                            </div>
                        </div>
                        <div class="layui-form-item other_link" {if $data['type']==1}style="display:block;"{/if}>
                            <div class="layui-form-label">第三方链接</div>
                            <div class="layui-input-block">
                                <input type="text" class="layui-input" name="link" placeholder="请输入第三方链接" value="{$data['link']}">
                            </div>
                        </div>
                        <div class="layui-form-item other_navbar" {if $data['type']==2}style="display:block;"{/if}>
                            <div class="layui-form-label">菜单链接</div>
                            <div class="layui-input-block">
                                <select name="menu_id" lay-search>
                                    <option value="">请选择应用</option>
                                        {volist name="list" id="vo"}
                                        <option value="{$vo.id}" {if $data['menu_id']==$vo.id}selected{/if}>{$vo.name}</option>
                                        {if !empty($vo.children)}
                                        {volist name="vo.children" id="vo2"}
                                        <option value="{$vo2.id}" {if $data['menu_id']==$vo2.id}selected{/if}>--{$vo2.name}</option>
                                        {if !empty($vo2.children)}
                                        {volist name="vo2.children" id="vo3"}
                                        <option value="{$vo3.id}" {if $data['menu_id']==$vo3.id}selected{/if}>----{$vo3.name}</option>
                                        {if !empty($vo3.children)}
                                        {volist name="vo3.children" id="vo4"}
                                        <option value="{$vo4.id}" {if $data['menu_id']==$vo4.id}selected{/if}>------{$vo4.name}</option>
                                        {/volist}
                                        {/if}
                                        {/volist}
                                        {/if}
                                        {/volist}
                                        {/if}
                                        {/volist}
                                </select>
                            </div>
                        </div>
                </div>
            </div>
    </div>
    <div class="layui-form-item" style="margin-top: 25px;text-align: center;">
        <div>
            <button class="layui-btn layui-btn-normal" lay-submit lay-filter="component-form-element">立即提交</button>
            <button type="reset" class="layui-btn layui-btn-primary">重置</button>
        </div>
    </div>
    </form>
</div>
</div>
</body>

<script type="text/javascript">
    layui.use(['layer','form','laydate','upload'],function(){
        var laydate = layui.laydate
            ,layer = layui.layer
            ,form  = layui.form
            ,$ = layui.jquery
            ,upload = layui.upload;

        form.on('select(type)',function(data){
            let val = data.value;
            if(val==0){
                $('.other_link').hide();
                $('.other_navbar').hide();
            }else if(val==1){
                $('.other_link').show();
                $('.other_navbar').hide();
            }else if(val==2){
                $('.other_link').hide();
                $('.other_navbar').show();
            }
        });

        form.on('submit(component-form-element)', function(data){
            // JSON.stringify()
            // console.log(data.field);return false;
            if( $('#img_file-upload-list').children().length == 0 )
            {
                layer.msg('请上传轮播图！');
                return false;
            }

            $.ajax({
                url:"{:Url('admin/operaweb/save_content2')}",
                method:'post',
                data:data.field,
                dataType:'JSON',
                success:function(res){
                    layer.msg(res.msg,{time:2000}, function () {
                        if(res.code == 0)
                        {
                            parent.location.reload();
                        }
                    });
                },
                error:function (data) {
                    layer.msg('系统错误',{time:2000});
                }
            });
            return false;
        });

        // 轮播图文件
        upload.render({
            elem: '#img_file-upload'
            ,url: '{:Url("admin/basic/upload_file")}'
            ,accept: 'image'
            ,data: { folder: 'centralize', type: 'website_rotate'}
            ,multiple: false
            ,number:1
            ,before: function(obj){
                layer.load(); //上传loading
            }
            ,done: function(res){
                layer.closeAll('loading'); //关闭loading
                if(res.code == 1)
                {

                    $('#img_file-upload-list').append('<div style="display: inline-block;"><img onclick="seePic(this);" src="/'+ res.file_path +'" class="layui-upload-img" style="width:80px;height:80px;"><button type="button" onclick="delPic(this);" class="layui-btn layui-btn-xs layui-btn-danger" style="position: relative;left: -45px;top: -39px;">删除</button><input type="hidden" name="pic_list[]" value="'+res.file_path+'"></div>')
                }
            }
        });
    });

    function delPic(obj)
    {
        var layer = layui.layer,$ = layui.$;
        layer.confirm('确认要删除该附件？', {
            btn: ['删除','取消']
        }, function(){
            $(obj).parent().remove();
            layer.closeAll();
        }, function(){

        });
    }

</script>
</body>
</html>
