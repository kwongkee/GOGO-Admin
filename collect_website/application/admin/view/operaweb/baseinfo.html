{include file="common/header_new"}

<style>
    img{ width:20px;height:20px;}
</style>
<body class="gray-bg">

<div class="row">
    <div class="col-sm-12">
        <div class="ibox float-e-margins">
            <div class="ibox-content">
                <h3 style="text-align: center;">企业（{$data['company']}）的认证文件</h3>
                <div class="box">
                    {volist name="data.reg_file" id="vo"}
                        <a href="//boss.gogo198.cn{$vo.files}" style="font-size:20px;color:#000;margin-right:20px;text-decoration: underline;" target="_blank" title="点击打开进行下载">{$vo.filenames}</a>
                    {/volist}
                    {if $data['status']==-1}
                    <div class="box">
                        <button style="margin-right: 5px;margin-top:20px;" type="button" onclick="openWindow({$data['id']},'{$data['company']}',1)" class="btn btn-primary btn-xs">通过审批</button>
                    </div>
                    {/if}
                </div>
            </div>
        </div>
    </div>
</div>

<script type="text/javascript">
    function openWindow(id,title,typ){
        let url = '';
        if(typ==1){
            layer.confirm('确认该企业['+title+']通过审批吗？',function(index){
                $.ajax({
                    url: "<?php echo Url('admin/operaweb/website_user'); ?>",
                    data: {'id': id,'typ':typ,'pa':1},
                    type: 'post',
                    cache: false,
                    dataType: 'json',
                    success: function (data) {
                        layer.msg(data.msg, {
                            icon: 1,
                            time: 2000
                        }, function(){
                            parent.location.reload();
                        });
                        return true;
                    }
                });
            });
        }
    }
</script>
</body>
</html>
