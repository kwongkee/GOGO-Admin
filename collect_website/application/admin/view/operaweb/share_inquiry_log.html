{include file="common/header_new"}

<style>
    img{ width:20px;height:20px;}
</style>
<body class="gray-bg">

<div class="row">
    <div class="col-sm-12">
        <div class="ibox float-e-margins">
            <div class="ibox-content">
                <h3 style="text-align: center;">分享列表</h3>
                <div id="toolbar" class="btn-group" style="margin-top: 10px;margin-bottom: 10px;line-height: 34px;">
<!--                    <button type="button" href="javascript:;" onclick="create();" class="btn btn-default">-->
<!--                        新增询价模板-->
<!--                    </button>-->
                </div>
                <table id="table" class="table table-striped table-bordered">
                    <thead>
                        <tr>
                            <th data-field="id"
                                data-align="center">序号</th>
                            <th data-field="id"
                                data-align="center"
                                data-sortable="true"
                                data-visible="true">商户名称</th>
                            <th data-field="name"
                                data-align="center"
                                data-sortable="true"
                                data-visible="true">通知方式</th>
                            <th data-field="link"
                                data-align="center"
                                data-sortable="true"
                                data-visible="true">分享状态</th>
    <!--                        <th data-field="manage"-->
    <!--                            data-align="center"-->
    <!--                            data-sortable="true"-->
    <!--                            data-formatter="actionFormatter">操作</th>-->
                        </tr>
                    </thead>
                    <tbody>
                        {volist name="log" key="key" id="vo"}
                        <tr>
                            <td>{$key}</td>
                            <td>{$vo['name']}</td>
                            <td>{$vo['notice_type']}</td>
                            <td>{if $vo['status']==1}<div><img src="./static/img/correct.png" alt="" style="width:30px;height:30px;"></div>{/if}{if $vo['status']==0}<div><img src="./static/img/error.png" alt="" style="width:30px;height:30px;cursor:pointer;" onclick="show_tips('{$vo[\'error_msg\']}')"></div>{/if}</td>
                        </tr>
                        {/volist}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script type="text/javascript">

    var table;

    $(document).ready(function(){
        // table = $('#table').bootstrapTable({
        //     url: "{:url('admin/operaweb/inquiry_list')}",
        //     queryParams: queryParams,
        // });
        // $('.form-control').attr('placeholder','搜索轮播图名称');
    });

    queryParams = function (params) {
        var temp = {
            sort: params.sort,
            order: params.order,
            limit: params.limit,            //页面大小
            offset: params.offset,          //页码
            search: params.search,
            pid:"{$id}"
        };
        return temp;
    };

    //操作栏的格式化
    function actionFormatter(value, row, index) {
        var id = row.id;
        var title = row.name;

        var result = "";

        result += '<button style="margin-right: 5px;" type="button" onclick="openWindow('+id+',\''+title+'\',1)" class="btn btn-warning btn-xs">编辑</button>';
        result += '<button style="margin-right: 5px;" type="button" onclick="del('+id+',\''+title+'\')" class="btn btn-danger btn-xs">删除</button>';
        result += '<button type="button" href="javascript:;" onclick="generate('+id+',\''+title+'\');" class="btn btn-default btn-xs">生成询价</button>';

        return result;
    }

    function create(id,name){
        var index = layer.open({
            type: 2,
            title: '新增询价模板',
            area:['100%','100%'],
            content: "{:url('admin/operaweb/save_inquiry')}&pid={$id}"
        });
        // layer.full(index);
    }
    function import2(){
        var index = layer.open({
            type: 2,
            title: '导入询价模板',
            area:['50%','50%'],
            content: "{:url('admin/operaweb/import_template')}&pid={$id}&type=1"
        });
    }
    function generate(id,name){
        var index = layer.open({
            type: 2,
            title: '生成['+name+']询价',
            area:['100%','100%'],
            content: "{:url('admin/operaweb/generate_inquiry')}&id="+id
        });
        // layer.full(index);
    }

    function show_tips(error_msg){
        layer.alert(error_msg);
    }

    function openWindow(id,title,typ){
        let url = '';
        if(typ==1){
            url = "{:Url('admin/operaweb/save_inquiry')}&pid={$id}";
        }
        else if(typ==2){
            url = "{:Url('admin/operaweb/baseinfo')}";
        }
        else if(typ==3){
            url = "{:Url('admin/operaweb/connect_app')}";
        }
        else if(typ==4){
            url = "{:Url('admin/operaweb/distr_manage')}";
        }

        if(url!=''){
            var index = layer.open({
                type: 2,
                title: '询价模板',
                area:['100%','100%'],
                content: url+'&id='+id
            });
        }
    }

    function del(id,title){
        layer.confirm('确认删除该询价模板吗？',function(index){
            $.ajax({
                url: "<?php echo Url('admin/operaweb/del_inquiry'); ?>",
                data:{'id':id},
                type:'post',
                cache:false,
                dataType:'json',
                success:function(data){
                    if(data.code==0)
                    {
                        layer.msg(data.msg, {
                            icon: 1,
                            time: 2000
                        }, function(){
                            window.location.reload();
                        });
                        return true;
                    }else {
                        layer.msg(data.msg, {icon:2, time:2000});
                        return false;
                    }
                },
                error:function() {
                    layer.msg('系统出错,请重试',{icon:2,time:1000});
                }
            });
        });
    }

</script>

</body>
</html>
