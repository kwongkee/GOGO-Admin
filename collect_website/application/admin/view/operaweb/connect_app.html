{include file="common/header_inner_new"}
<link rel="stylesheet" href="static/hadmin/css/zTreeStyle/zTreeStyle.css"/>
<script src="static/cklein/js/jquery.min.js"></script>
<script src="static/hadmin/js/jquery.ztree.core.js"></script>
<script src="static/hadmin/js/jquery.ztree.excheck.min.js"></script>
<style>
    .disf{display:flex;align-items: center;}
    .layui-card-header{background:#0a8ddf;color:#fff;}
    .format1,.format2,.seo_content,.url{display:none;}
    #edui1{z-index: 9 !important;}
</style>
<body style="padding: 10px;background-color: #f2f2f2;">
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <form class="layui-form" action="" method="post" lay-filter="component-form-element">
            <input type="text" style="display:none;" name="id" id="id" value="{$data['id']}">
            <div class="layui-col-md12">
                <div class="layui-card">
                    <div class="layui-card-body">
                        <div class="layui-form-item" style="display: none;">
                            <div class="layui-form-label">关联商户</div>
                            <div class="layui-input-block">
                                <div id="merchant_item" class="xm-select-demo"></div>
                            </div>
                        </div>
                        <div class="layui-form-item" style="display: none;">
                            <div class="layui-form-label">选择角色</div>
                            <div class="layui-input-block">
                                <select name="admin_role" id="admin_role">
                                    <option value="">请选择</option>
                                    {volist name="role" id="vo"}
                                    <option value="{$vo['id']}" {if $vo['id']==$data['admin_role']}selected{/if}>{$vo['name']}</option>
                                    {/volist}
                                </select>
                            </div>
                        </div>

                        <div class="layui-form-item">
                            <div class="layui-form-label">卖家权限配置</div>
                            <div class="layui-input-block">
                                <ul id="treeSeller" class="ztree"></ul>
                            </div>
                        </div>

                        <div class="layui-form-item">
                            <div class="layui-form-label">服务权限配置</div>
                            <div class="layui-input-block">
                                <ul id="treeServices" class="ztree"></ul>
                            </div>
                        </div>

                        <div class="layui-form-item" style="display: none;">
                            <div class="layui-form-label">独立站配置</div>
                            <div class="layui-input-block">
                                <ul id="treeWeb" class="ztree"></ul>
                            </div>
                        </div>
                        <div class="layui-form-item" style="display: none;">
                            <div class="layui-form-label">权限配置</div>
                            <div class="layui-input-block">
                                <ul id="treeDemo" class="ztree"></ul>
                            </div>
                        </div>

                        <div class="layui-form-item">
                            <div class="layui-form-label">费用配置</div>
                            <div class="layui-input-block">
                                <ul id="treeFee" class="ztree"></ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="layui-form-item" style="margin-top: 25px;text-align: center;">
                <div>
                    <button class="layui-btn layui-btn-normal" lay-submit lay-filter="component-form-element">立即关联</button>
                    <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                </div>
            </div>
        </form>
    </div>
</div>
</body>
<script src="./static/hadmin/assets/layui/xm-select.js"></script>
<script type="text/javascript">
    var setting = {
        view: {
            selectedMulti: true, //设置是否能够同时选中多个节点
            showIcon: true, //设置是否显示节点图标
            showLine: true, //设置是否显示节点与节点之间的连线
            showTitle: true, //设置是否显示节点的title提示信息
        },
        data: {
            simpleData: {
                enable: true, //设置是否启用简单数据格式（zTree支持标准数据格式跟简单数据格式，上面例子中是标准数据格式）
                idKey: "id", //设置启用简单数据格式时id对应的属性名称
                pidKey: "pid", //设置启用简单数据格式时parentId对应的属性名称,ztree根据id及pid层级关系构建树结构
                rootPId:0
            },
            key:{
                name:"title"
            }
        },
        check:{
            enable: true, //设置是否显示checkbox复选框
            chkStyle:"checkbox"
        },
    };

    layui.use(['layer','form','laydate','upload','colorpicker'],function(){
        var laydate = layui.laydate
            ,layer = layui.layer
            ,form  = layui.form
            ,$ = layui.jquery
            ,upload = layui.upload
            ,colorpicker = layui.colorpicker;

        $.ajax({
            url: "{:Url('admin/operaweb/get_seller')}", //ajax请求地址
            type: "POST",
            dataType: "JSON",
            data: {'company_id':"{$id}"},
            success: function (data) {
                $.fn.zTree.init($("#treeSeller"), setting, data.data.menuList);
                $.fn.zTree.getZTreeObj("treeSeller").expandAll(false);
            },
        });

        $.ajax({
            url: "{:Url('admin/operaweb/get_services')}", //ajax请求地址
            type: "POST",
            dataType: "JSON",
            data: {'company_id':"{$id}"},
            success: function (data) {
                $.fn.zTree.init($("#treeServices"), setting, data.data.menuList);
                $.fn.zTree.getZTreeObj("treeServices").expandAll(false);
            },
        });

        if(1>2){
            //旧的权限配置，暂时不需要
            $.ajax({
                url: "{:Url('admin/operaweb/get_web')}", //ajax请求地址
                type: "POST",
                dataType: "JSON",
                data: {'company_id':"{$id}"},
                success: function (data) {
                    $.fn.zTree.init($("#treeWeb"), setting, data.data.menuList);
                    $.fn.zTree.getZTreeObj("treeWeb").expandAll(true);
                },
            });

            $.ajax({
                url: "{:Url('admin/rolePermission/get_auth')}", //ajax请求地址
                type: "POST",
                dataType: "JSON",
                data: {'level_id':"{$id}",'auth_type':"3,4"},
                success: function (data) {
                    $.fn.zTree.init($("#treeDemo"), setting, data.data.menuList);
                    $.fn.zTree.getZTreeObj("treeDemo").expandAll(false);
                },
            });
        }

        $.ajax({
            url: "{:Url('admin/operaweb/get_fee')}", //ajax请求地址
            type: "POST",
            dataType: "JSON",
            data: {'company_id':"{$id}"},
            success: function (data) {
                $.fn.zTree.init($("#treeFee"), setting, data.data.menuList);
                $.fn.zTree.getZTreeObj("treeFee").expandAll(false);
            },
        });

        form.on('submit(component-form-element)', function(data){
            // JSON.stringify()
            // console.log(data.field);return false;

            //应用权限
            // var treeObj = $.fn.zTree.getZTreeObj("treeDemo"),
            //     nodes = treeObj.getCheckedNodes(true);
            // var menus = "";
            // for (i = 0; i < nodes.length; i++) {
            //     menus += nodes[i].id + ","; //获取选中节点的TID
            // }
            // // if(nodes.length=='' || nodes.length==0 || typeof(nodes.length) == 'undefined'){
            // //     layer.msg('请选择功能权限');return false;
            // // }
            // data.field['authList'] = menus;

            //费用权限
            var treeObj2 = $.fn.zTree.getZTreeObj("treeFee"),
                nodes2 = treeObj2.getCheckedNodes(true);
            var menus2 = "";
            for (i = 0; i < nodes2.length; i++) {
                menus2 += nodes2[i].id + ","; //获取选中节点的TID
            }
            data.field['feeList'] = menus2;

            //独立站权限
            // var treeObj3 = $.fn.zTree.getZTreeObj("treeWeb"),
            //     nodes3 = treeObj3.getCheckedNodes(true);
            // var menus3 = "";
            // for (i = 0; i < nodes3.length; i++) {
            //     menus3 += nodes3[i].id + ","; //获取选中节点的TID
            // }
            // data.field['webList'] = menus3;

            //卖家服务权限
            var treeObj4 = $.fn.zTree.getZTreeObj("treeSeller"),
                nodes4 = treeObj4.getCheckedNodes(true);
            var menus4 = "";
            for (i = 0; i < nodes4.length; i++) {
                menus4 += nodes4[i].id + ","; //获取选中节点的TID
            }
            data.field['sellerList'] = menus4;

            //服务商权限
            var treeObj5 = $.fn.zTree.getZTreeObj("treeServices"),
                nodes5 = treeObj5.getCheckedNodes(true);
            var menus5 = "";
            for (i = 0; i < nodes5.length; i++) {
                menus5 += nodes5[i].id + ","; //获取选中节点的TID
            }
            data.field['servicesList'] = menus5;

            $.ajax({
                url:"{:Url('admin/operaweb/connect_app')}",
                method:'post',
                data:data.field,
                dataType:'JSON',
                success:function(res){
                    layer.msg(res.msg,{time:2000}, function () {
                        if(res.code == 0)
                        {
                            parent.location.reload();
                        }
                    });
                },
                error:function (data) {
                    layer.msg('系统错误',{time:2000});
                }
            });
            return false;
        });

        xmSelect.render({
            el: '#merchant_item',
            paging: true,
            pageSize: 5,
            filterable: true,
            toolbar: {
                show: true,
            },
            prop: {
                name: 'company',
                value: 'id',
            },
            autoRow: true,
            data: <?php echo $merchant; ?>,
            name: 'pids',
            layVerify: '',
            layVerType: 'msg',
            initValue:[{$data['pids']}]
        });
    });

    function delPic(obj)
    {
        var layer = layui.layer,$ = layui.$;
        layer.confirm('确认要删除该附件？', {
            btn: ['删除','取消']
        }, function(){
            $(obj).parent().remove();
            layer.closeAll();
        }, function(){

        });
    }

</script>
</body>
</html>
