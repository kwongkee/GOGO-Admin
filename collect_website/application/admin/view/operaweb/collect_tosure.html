{include file="common/header_new"}

<style>
    img{ width:20px;height:20px;}
</style>
<body class="gray-bg">

<div class="row">
    <div class="col-sm-12">
        <div class="ibox float-e-margins">
            <div class="ibox-content">
                <h3 style="text-align: center;">待确认列表</h3>
                <div id="toolbar" class="btn-group" style="margin-top: 10px;margin-bottom: 10px;line-height: 34px;">
                    <!--                    <button type="button" href="javascript:;" onclick="save();" class="btn btn-default">-->
                    <!--                        添加留言-->
                    <!--                    </button>-->
                </div>
                <table id="table"

                /*默认排序项*/
                data-sort-name="id"
                data-sort-order="desc"
                /*工具栏相关*/
                data-toolbar="#toolbar"
                data-search="false"          /*搜索框*/
                data-search-on-enter-key="false"
                data-show-refresh="true"    /*刷新按钮*/
                /*分页相关*/
                data-side-pagination="server"
                data-pagination="true"      /*显示分页*/
                data-page-size="10"         /*每页显示条数*/
                /*移动端相关*/
                data-mobile-responsive="true"
                data-card-view="true"
                data-show-columns="true"
                /*radio or checkbox字段名称*/
                data-select-item-name="id" >

                <thead>
                <tr>
                    <th data-field="checkbox"
                        data-align="center"
                        data-checkbox="true"></th>
                    <th data-field="pay_name"
                        data-align="center"
                        data-sortable="true"
                        data-visible="true">付款人名称</th>
                    <th data-field="ordersn_flow"
                        data-align="center"
                        data-sortable="true">订单编号</th>
                    <th data-field="totalmoney"
                        data-align="center"
                        data-sortable="true">订单金额</th>
                    <th data-field="statusname"
                        data-align="center"
                        data-sortable="true">订单状态</th>
                    <th data-field="createtime"
                        data-align="center"
                        data-sortable="true">发起时间</th>
                    <th data-field="manage"
                        data-align="center"
                        data-sortable="true"
                        data-formatter="actionFormatter">操作</th>
                </tr>
                </thead>
                </table>
            </div>
        </div>
    </div>
</div>

<script type="text/javascript">

    var table;

    $(document).ready(function(){
        table = $('#table').bootstrapTable({
            url: "{:url('admin/operaweb/collect_tosure')}",
            queryParams: queryParams,
        });
        $('.form-control').attr('placeholder','搜索轮播图名称');
    });

    queryParams = function (params) {
        var temp = {
            sort: params.sort,
            order: params.order,
            limit: params.limit,            //页面大小
            offset: params.offset,          //页码
            search: params.search,
        };
        return temp;
    };

    //操作栏的格式化
    function actionFormatter(value, row, index) {
        var id = row.id;
        var title = row.ordersn_flow;

        var result = "";
        result += '<button style="margin-right: 5px;" type="button" onclick="openWindow('+id+',\''+title+'\',2)" class="btn btn-primary btn-xs">查看详情</button>';

        return result;
    }

    function edit(id,name){
        var index = layer.open({
            type: 2,
            title: '修改-'+name,
            area:['100%','100%'],
            content: "{:url('admin/operaweb/save_rotate')}&id="+id
        });
        // layer.full(index);
    }

    function openWindow(id,title,typ){
        let url = '';
        if(typ==1){
            layer.confirm('确认该客户['+title+']通过商户审批吗？',function(index){
                $.ajax({
                    url: "<?php echo Url('admin/operaweb/website_user'); ?>",
                    data: {'id': id,'typ':typ,'pa':1},
                    type: 'post',
                    cache: false,
                    dataType: 'json',
                    success: function (data) {
                        layer.msg(data.msg, {
                            icon: 1,
                            time: 2000
                        }, function(){
                            window.location.reload();
                        });
                        return true;
                    }
                });
            });
        }
        else if(typ==2){
            url = "{:Url('admin/operaweb/collect_detail')}";
        }
        else if(typ==3){
            url = "{:Url('admin/operaweb/connect_app')}";
        }
        else if(typ==4){
            url = "{:Url('admin/operaweb/distr_manage')}";
        }

        if(url!=''){
            var index = layer.open({
                type: 2,
                title: title,
                area:['100%','100%'],
                content: url+'&id='+id
            });
        }
    }

    function del(id,title){
        layer.confirm('确认删除该轮播图吗？',function(index){
            $.ajax({
                url: "<?php echo Url('admin/operaweb/del_rotate'); ?>",
                data:{'id':id},
                type:'post',
                cache:false,
                dataType:'json',
                success:function(data){
                    if(data.code==1)
                    {
                        layer.msg(data.msg, {
                            icon: 1,
                            time: 2000
                        }, function(){
                            window.location.reload();
                        });
                        return true;
                    }else {
                        layer.msg(data.message, {icon:2, time:2000});
                        return false;
                    }
                },
                error:function() {
                    layer.msg('系统出错,请重试',{icon:2,time:1000});
                }
            });
        });
    }

</script>

</body>
</html>
