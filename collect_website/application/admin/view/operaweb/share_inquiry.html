{include file="common/header_inner_new"}
<style>
    .disf{display:flex;align-items: center;}
    .layui-card-header{background:#0a8ddf;color:#fff;}
    .layui-input-block{line-height: 38px;}
    .phone,.select_box{display:none;}
</style>
<body style="padding: 10px;background-color: #f2f2f2;">
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <form class="layui-form" action="" method="post" lay-filter="component-form-element">
            <input type="text" style="display:none;" name="id" id="id" value="{$id}">
            <div class="layui-col-md12">
                <div class="layui-card">
                    <div class="layui-card-body">
                        <div class="layui-form-item">
                            <div class="layui-form-label">选择商户</div>
                            <div class="layui-input-block disf">
                                <div id="merch_id" class="xm-select-demo" style="width:300px;"></div>
                                <div class="notice_type" style="display: none;">
                                    <div id="notice_type" class="xm-select-demo" style="width:200px;"></div>
                                </div>
                            </div>
                        </div>
<!--                        <div class="layui-form-item">-->
<!--                            <div class="layui-form-label">通知方式</div>-->
<!--                            <div class="layui-input-block">-->
<!--                                <select name="notice_type" id="notice_type" lay-filter="notice_type">-->
<!--                                    <option value="1">邮箱</option>-->
<!--                                    <option value="2">手机</option>-->
<!--                                </select>-->
<!--                            </div>-->
<!--                        </div>-->
                        <div class="layui-form-item other_merch" style="display: none;">
                            <div class="layui-form-label">添加其他商户</div>
                            <div class="layui-input-block">
<!--                                <input type="text" class="layui-input" placeholder="请用顿号、隔开" name="other_contact">-->
                                <table class="layui-table">
                                    <thead>
                                        <th>商户名称</th>
                                        <th>商户链接</th>
                                        <th>操作</th>
                                    </thead>
                                    <tbody class="othermerch_tb">
                                        <tr>
                                            <td><input type="text" class="layui-input" name="other_name[]" placeholder="商户名称"></td>
                                            <td><input type="text" class="layui-input" name="other_link[]" placeholder="商户链接"></td>
                                            <td><div class="layui-btn layui-btn-primary" onclick="add_othermerch()">添加</div></td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="layui-form-item" style="margin-top: 25px;text-align: center;">
                <div>
                    <button class="layui-btn layui-btn-normal" lay-submit lay-filter="component-form-element2">立即分享</button>
                    <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                </div>
            </div>
        </form>
    </div>
</div>
</body>
<script src="./static/hadmin/assets/layui/xm-select.js"></script>
<script type="text/javascript">
    layui.use(['layer','form','laydate','upload'],function(){
        var laydate = layui.laydate
            ,layer = layui.layer
            ,form  = layui.form
            ,$ = layui.jquery
            ,upload = layui.upload;

        xmSelect.render({
            el: '#merch_id',
            name:'merch_id',
            autoRow: true, //自动换行
            filterable: true, //可搜索
            searchTips: '请选择商户',
            radio:false,//false可多选，true单选
            model: {
                icon: 'hidden',//是否展示复选框或者单选框图标 show, hidden:变换背景色  ！！这句话是重点，不然会变成父节点也有单选框！！
            },
            tree: {
                show: true, //用树显示
                showFolderIcon: true, //是否显示节点前的三角图标
                expandedKeys: true, //默认全部展开
                showLine: true, //显示渐近线
                indent: 20, //间距
                strict: false, //重点！！设置成非严格父子模式，这样父节点被禁用，子节点依然可以点击
                clickCheck:true,
            },
            toolbar: {
                show: true, //显示工具条
                list: ['ALL', 'REVERSE', 'CLEAR']
            },
            height: '300px', //最大下拉框高度
            data: {$all_merch},
            // initValue:[$data['navbar_id']]
            on:function(data){
                let change = data.change;
                if(change[0].value == -2){
                    //显示添加其他商户框
                    $('.other_merch').show();
                }else{
                    //显示通知方式框
                    $('.notice_type').show();
                }
            }
        });

        xmSelect.render({
            el: '#notice_type',
            name:'notice_type',
            paging: true,
            pageSize: 5,
            filterable: true,
            searchTips: '请选择通知方式',
            prop: {
                name: 'name',
                value: 'id',
            },
            autoRow: true,
            data: {$notice_type},
            // layVerify: '',
            layVerType: 'msg',
        });

        form.on('submit(component-form-element2)', function(data){
            // JSON.stringify()
            // console.log(data.field);return false;
            // if( $('#img_file-upload-list').children().length == 0 )
            // {
            //     layer.msg('请上传轮播图！');
            //     return false;
            // }
            layer.load();
            $.ajax({
                url:"{:Url('admin/operaweb/share_inquiry')}",
                method:'post',
                data:data.field,
                dataType:'JSON',
                success:function(res){
                    layer.closeAll('load');
                    layer.msg(res.msg,{time:2000}, function () {
                        if(res.code == 0)
                        {
                            window.location.href="{:url('admin/operaweb/share_inquiry_log')}&id={$id}";
                            // layer.open({
                            //     type: 2,
                            //     title: '分享列表',
                            //     content: "{:url('admin/operaweb/share_inquiry_log')}&id={$id}",
                            //     area:['100%','100%']
                            // });
                        }
                    });
                },
                error:function (data) {
                    layer.msg('系统错误',{time:2000});
                }
            });
            return false;
        });
    });

    function add_othermerch(){
        var layer = layui.layer,
            form  = layui.form,
            $ = layui.jquery;

        let html = '<tr>\n' +
            '                                            <td><input type="text" class="layui-input" name="other_name[]" placeholder="商户名称"></td>\n' +
            '                                            <td><input type="text" class="layui-input" name="other_link[]" placeholder="商户链接"></td>\n' +
            '                                            <td><div class="layui-btn layui-btn-primary" onclick="add_othermerch()">添加</div><div class="layui-btn layui-btn-danger" onclick="del_merch(this)">删除</div></td>\n' +
            '                                        </tr>';
        $('.othermerch_tb').append(html);
        form.render(null,'component-form-element');
    }

    function del_merch(t){
        var layer = layui.layer,
            form  = layui.form,
            $ = layui.jquery;

        $(t).parent().parent().remove();
        form.render(null,'component-form-element');
    }

    function delPic(obj)
    {
        var layer = layui.layer,$ = layui.$;
        layer.confirm('确认要删除该附件？', {
            btn: ['删除','取消']
        }, function(){
            $(obj).parent().remove();
            layer.closeAll();
        }, function(){

        });
    }

</script>
</body>
</html>
