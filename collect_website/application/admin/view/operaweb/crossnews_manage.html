{include file="common/header_new"}

<style>
    img{ width:20px;height:20px;}
</style>
<body class="gray-bg">

<div class="row">
    <div class="col-sm-12">
        <div class="ibox float-e-margins">
            <div class="ibox-content">
                <h3 style="text-align: center;">跨境新闻管理</h3>
                <div id="toolbar" class="btn-group" style="margin-top: 10px;margin-bottom: 10px;line-height: 34px;">

                </div>
                <ul id="myTab" class="nav nav-tabs" role="tablist">
                    <li class="active"><a href="#tab1" role="tab" data-toggle="tab">未上架</a></li>
                    <li><a href="#tab2" role="tab" data-toggle="tab">已上架</a></li>
                </ul>
                <div id="myTabContent" class="tab-content">
                    <div class="tab-pane active" id="tab1">
                        <div class="bs-bars pull-left" style="line-height: 4;">
                            <button type="button" href="javascript:;" onclick="zd();" class="btn btn-default">
                                自动执行上架
                            </button>
                            <button type="button" href="javascript:;" onclick="hd();" class="btn btn-default">
                                手动选择上架
                            </button>
                            <button type="button" href="javascript:;" onclick="save();" class="btn btn-default">
                                人工输入上架
                            </button>
                        </div>
                        <table id="table"

                        /*默认排序项*/
                        data-sort-name="id"
                        data-sort-order="desc"
                        /*工具栏相关*/
                        data-toolbar="#toolbar"
                        data-search="false"          /*搜索框*/
                        data-search-on-enter-key="false"
                        data-show-refresh="true"    /*刷新按钮*/
                        /*分页相关*/
                        data-side-pagination="server"
                        data-pagination="true"      /*显示分页*/
                        data-page-size="10"         /*每页显示条数*/
                        /*移动端相关*/
                        data-mobile-responsive="true"
                        data-card-view="true"
                        data-show-columns="true"
                        /*radio or checkbox字段名称*/
                        data-select-item-name="id" >

                        <thead>
                        <tr>
                            <th data-field="checkbox"
                                data-align="center"
                                data-checkbox="true"></th>
                            <th data-field="id"
                                data-align="center"
                                data-sortable="true"
                                data-visible="true">ID</th>
                            <th data-field="time"
                                data-align="center"
                                data-sortable="true">日期</th>
                            <th data-field="title"
                                data-align="center"
                                data-sortable="true">标题</th>
                            <th data-field="manage"
                                data-align="center"
                                data-sortable="true"
                                data-formatter="actionFormatter">操作</th>
                        </tr>
                        </thead>
                        </table>
                    </div>
                    <div class="tab-pane" id="tab2">
                        <table id="table2"

                        /*默认排序项*/
                        data-sort-name="id"
                        data-sort-order="desc"
                        /*工具栏相关*/
                        data-toolbar="#toolbar"
                        data-search="false"          /*搜索框*/
                        data-search-on-enter-key="false"
                        data-show-refresh="true"    /*刷新按钮*/
                        /*分页相关*/
                        data-side-pagination="server"
                        data-pagination="true"      /*显示分页*/
                        data-page-size="10"         /*每页显示条数*/
                        /*移动端相关*/
                        data-mobile-responsive="true"
                        data-card-view="true"
                        data-show-columns="true"
                        /*radio or checkbox字段名称*/
                        data-select-item-name="id" >

                        <thead>
                        <tr>
                            <th data-field="id"
                                data-align="center"
                                data-sortable="true"
                                data-visible="true">ID</th>
                            <th data-field="time"
                                data-align="center"
                                data-sortable="true">日期</th>
                            <th data-field="title"
                                data-align="center"
                                data-sortable="true">标题</th>
                            <th data-field="manage"
                                data-align="center"
                                data-sortable="true"
                                data-formatter="actionFormatter2">操作</th>
                        </tr>
                        </thead>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="text/javascript">

    var table;

    $(document).ready(function(){
        table = $('#table').bootstrapTable({
            url: "{:url('admin/operaweb/crossnews_manage')}&status=0",
            queryParams: queryParams,
        });
        table2 = $('#table2').bootstrapTable({
            url: "{:url('admin/operaweb/crossnews_manage')}&status=1",
            queryParams: queryParams,
        });
        $('.form-control').attr('placeholder','搜索分类名称');
    });

    queryParams = function (params) {
        var temp = {
            sort: params.sort,
            order: params.order,
            limit: params.limit,            //页面大小
            offset: params.offset,          //页码
            search: params.search,
        };
        return temp;
    };

    //操作栏的格式化
    function actionFormatter(value, row, index) {
        var id = row.id;
        var title = row.title;

        var result = "";
        // result += '<button style="margin-right: 5px;" type="button" onclick="edit('+id+',\''+title+'\')" class="btn btn-normal btn-xs">编辑</button>';
        result += '<button style="margin-right: 5px;" type="button" onclick="del('+id+',\''+title+'\',1)" class="btn btn-danger btn-xs">删除</button>';
        return result;
    }

    function actionFormatter2(value, row, index) {
        var id = row.id;
        var title = row.title;

        var result = "";
        result += '<button style="margin-right: 5px;" type="button" onclick="edit('+id+',\''+title+'\')" class="btn btn-normal btn-xs">编辑</button>';
        result += '<button style="margin-right: 5px;" type="button" onclick="del('+id+',\''+title+'\',1)" class="btn btn-danger btn-xs">删除</button>';
        return result;
    }

    //自动执行
    function zd(){
        layer.confirm('确认全部内容上架吗？',function(index){
            layer.closeAll();
            layer.load();
            $.ajax({
                url: "<?php echo Url('admin/operaweb/shelf_crossborder_news'); ?>",
                data:{'ids':10000},
                type:'post',
                cache:false,
                dataType:'json',
                success:function(data){
                    layer.closeAll('loading');
                    if(data.code==0)
                    {
                        layer.msg(data.msg, {
                            icon: 1,
                            time: 2000
                        }, function(){
                            window.location.reload();
                        });
                        return true;
                    }else {
                        layer.msg(data.message, {icon:2, time:2000});
                        return false;
                    }
                },
                error:function() {
                    layer.msg('系统出错,请重试',{icon:2,time:1000});
                }
            });
        });
    }

    //手动执行
    function hd(){
        let ids = '';
        var idlist = $('#table').bootstrapTable('getAllSelections');
        var allCheck=document.getElementsByName("id");
        for(var i=0;i<allCheck.length;i++){
            allCheck[i].checked=false;
        }
        var btSelectAll=document.getElementsByName("btSelectAll");
        for(var i=0;i<btSelectAll.length;i++){
            btSelectAll[i].checked=false;
        }

        $("#table").bootstrapTable('refresh');
        for (var i = 0; i < idlist.length; i++) {
            // ids.push(idlist[i].id);
            ids += ','+idlist[i].id;
        }

        layer.confirm('确认上架吗？',function(index){
            layer.closeAll();
            layer.load();
            $.ajax({
                url: "<?php echo Url('admin/operaweb/shelf_crossborder_news'); ?>",
                data:{'ids':ids},
                type:'post',
                cache:false,
                dataType:'json',
                success:function(data){
                    layer.closeAll('loading');
                    if(data.code==0)
                    {
                        layer.msg(data.msg, {
                            icon: 1,
                            time: 2000
                        }, function(){
                            window.location.reload();
                        });
                        return true;
                    }else {
                        layer.msg(data.message, {icon:2, time:2000});
                        return false;
                    }
                },
                error:function() {
                    layer.msg('系统出错,请重试',{icon:2,time:1000});
                }
            });
        });
    }

    //人工输入上架
    function save(){
        var index = layer.open({
            type: 2,
            title: '人工输入上架',
            area:['100%','100%'],
            content: "{:url('admin/operaweb/save_crossborder_news')}"
        });
    }

    function edit(id,name){
        var index = layer.open({
            type: 2,
            title: '修改-'+name,
            area:['100%','100%'],
            content: "{:url('admin/operaweb/save_crossborder_news')}&id="+id
        });
        // layer.full(index);
    }

    // function save(title) {
    //     var index = layer.open({
    //         type: 2,
    //         title: title,
    //         area:['100%','100%'],
    //         content: "{:url('admin/operaweb/save_enterprise_news')}"
    //     });
    //     // layer.full(index);
    // }

    function openWindow(t,id,title){
        let val = $(t).val();

        let url = '';
        if(val==1){
            url = "{:Url('admin/officialwebsite/base_setting')}";
        }else if(val==2){
            url = "{:Url('admin/officialwebsite/menu_list')}";
        }else if(val==3){
            url = "{:Url('admin/officialwebsite/rotate_list')}";
        }else if(val==4){
            url = "{:Url('admin/officialwebsite/index_list')}";
        }else if(val==5){
            url = "{:Url('admin/officialwebsite/index_list')}";
        }
        if(url!=''){
            var index = layer.open({
                type: 2,
                title: title,
                area:['100%','100%'],
                content: url+'&id='+id
            });
        }
    }

    function del(id,title,typ){
        let msg = '';
        layer.confirm('确认删除该新闻吗？',function(index){
            $.ajax({
                url: "<?php echo Url('admin/operaweb/del_crossborder_news'); ?>",
                data:{'id':id},
                type:'post',
                cache:false,
                dataType:'json',
                success:function(data){
                    if(data.code==0)
                    {
                        layer.msg(data.msg, {
                            icon: 1,
                            time: 2000
                        }, function(){
                            window.location.reload();
                        });
                        return true;
                    }else {
                        layer.msg(data.message, {icon:2, time:2000});
                        return false;
                    }
                },
                error:function() {
                    layer.msg('系统出错,请重试',{icon:2,time:1000});
                }
            });
        });
    }

</script>

</body>
</html>
