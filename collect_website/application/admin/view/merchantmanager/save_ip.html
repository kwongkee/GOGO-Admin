{include file="common/header_inner_new"}

<style>
    .disf{display:flex;align-items: center;}
    .layui-card-header{background:#0a8ddf;color:#fff;}
    .tel,.email{display:none;}
    .site-tips {margin-bottom: 10px;padding: 15px;line-height: 1.6;border-left: 5px solid #5FB878;background-color: #FAFAFA;}
    .site-text p {line-height: 1.6;margin: 0;}
</style>
<body style="padding: 10px;background-color: #f2f2f2;">
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <form class="layui-form" action="" method="post" lay-filter="component-form-element">
            <input type="hidden" name="id" value="{$id}" id="id">
            <div class="layui-col-md12">
                <div class="layui-card">
                    <div class="layui-card-body">
                        <div class="site-tips site-text">
                            <p>不同IP在X分钟内，访问Y次，系统通知管理员。</p>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">IP</div>
                            <div class="layui-input-block">
                                <input type="text" class="layui-input" name="ip" id="ip" value="{$data['ip']}" lay-verify="required">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">分钟内</div>
                            <div class="layui-input-block">
                                <input type="number" class="layui-input" name="minutes" id="minutes" value="{$data['minutes']}" lay-verify="required">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">访问次数</div>
                            <div class="layui-input-block">
                                <input type="number" class="layui-input" name="times" id="times" value="{$data['times']}" lay-verify="required">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="layui-form-item" style="margin-top: 25px;text-align: center;">
                <div>
                    <button class="layui-btn layui-btn-normal" lay-submit lay-filter="component-form-element2">立即提交</button>
                    <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                </div>
            </div>
        </form>
    </div>
</div>
</body>

<script type="text/javascript">
    layui.use(['layer','form','laydate','upload'],function(){
        laydate = layui.laydate;
        layer = layui.layer;
        var form  = layui.form;
        $ = layui.jquery;
        var upload = layui.upload;


        form.on('submit(component-form-element2)', function(data){
            // JSON.stringify()
            // console.log(data.field);return false;
            $.ajax({
                url:"{:Url('admin/merchantManager/save_ip')}",
                method:'post',
                data:data.field,
                dataType:'JSON',
                success:function(res){
                    layer.msg(res.msg,{time:2000}, function () {
                        if(res.code == 0)
                        {
                            parent.location.reload();
                        }
                    });
                },
                error:function (data) {
                    layer.msg('系统错误',{time:2000});
                }
            });
            return false;
        });
    });
</script>
</body>
</html>
