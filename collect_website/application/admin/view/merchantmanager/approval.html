{include file="common/header_new"}

<style>
    img{ width:20px;height:20px;}
</style>
<body class="gray-bg">

<div class="row">
    <div class="col-sm-12">
        <div class="ibox float-e-margins">
            <div class="ibox-content">
                <h3 style="text-align: center;">审批列表</h3>
                <div id="toolbar" class="btn-group" style="margin-top: 10px;margin-bottom: 10px;line-height: 34px;">
<!--                    <button type="button" href="javascript:;" onclick="openWindow(0,'',3);" class="btn btn-default">-->
<!--                        新增商户-->
<!--                    </button>-->
                </div>
                <table id="table"

                /*默认排序项*/
                data-sort-name="id"
                data-sort-order="desc"
                /*工具栏相关*/
                data-toolbar="#toolbar"
                data-search="true"          /*搜索框*/
                data-search-on-enter-key="true"
                data-show-refresh="true"    /*刷新按钮*/
                /*分页相关*/
                data-side-pagination="server"
                data-pagination="true"      /*显示分页*/
                data-page-size="10"         /*每页显示条数*/
                /*移动端相关*/
                data-mobile-responsive="true"
                data-card-view="true"
                data-show-columns="true"
                /*radio or checkbox字段名称*/
                data-select-item-name="id" >

                <thead>
                <tr>
                    <th data-field="checkbox"
                        data-align="center"
                        data-checkbox="true"></th>
                    <th data-field="id"
                        data-align="center"
                        data-sortable="true"
                        data-visible="true">ID</th>
                    <th data-field="company"
                        data-align="center"
                        data-sortable="true">企业名称</th>
                    <th data-field="mobile"
                        data-align="center"
                        data-sortable="true">手机号码</th>
<!--                    <th data-field="role_id"-->
<!--                        data-align="center"-->
<!--                        data-sortable="true">角色名称</th>-->
                    <th data-field="status_name"
                        data-align="center"
                        data-sortable="true">审核状态</th>
                    <th data-field="createtime"
                        data-align="center"
                        data-sortable="true">申请日期</th>
                    <th data-field="manage"
                        data-align="center"
                        data-sortable="true"
                        data-formatter="actionFormatter">操作</th>
                </tr>
                </thead>
                </table>
            </div>
        </div>
    </div>
</div>

<script type="text/javascript">

    var table;

    $(document).ready(function(){
        table = $('#table').bootstrapTable({
            url: "{:url('admin/merchantManager/approval')}",
            queryParams: queryParams,
        });
        $('.form-control').attr('placeholder','搜索企业名称');
    });

    queryParams = function (params) {
        var temp = {
            sort: params.sort,
            order: params.order,
            limit: params.limit,            //页面大小
            offset: params.offset,          //页码
            search: params.search,
        };
        return temp;
    };

    //操作栏的格式化
    function actionFormatter(value, row, index) {
        var id = row.id;
        var name = row.company;

        var result = "";

        // result += '<button style="margin-right: 5px;" type="button" onclick="openWindow('+id+',\''+name+'\',\''+1+'\')" class="btn btn-primary btn-xs">商户信息</button>';
        // result += '<button style="margin-right: 5px;" type="button" onclick="openWindow('+id+',\''+name+'\',\''+2+'\')" class="btn btn-info btn-xs">角色配置</button>';
        // result += '<button style="margin-right: 5px;" type="button" onclick="openWindow('+id+',\''+name+'\',4)" class="btn btn-warning btn-xs">业务管理</button>';
        result += '<button style="margin-right: 5px;" type="button" onclick="openWindow('+id+',\''+name+'\',1)" class="btn btn-primary btn-xs">审批详情</button>';
        // result += '<button style="margin-right: 5px;" type="button" onclick="openWindow('+id+',\''+name+'\',\''+2+'\')" class="btn btn-danger btn-xs">删除用户</button>';
        return result;
    }

    function del(id,title){
        layer.confirm('确认删除该用户吗？',function(index){
            $.ajax({
                url: "<?php echo Url('centralize/managemenber/del_person'); ?>",
                data:{'id':id},
                type:'post',
                cache:false,
                dataType:'json',
                success:function(data){
                    if(data.code==1)
                    {
                        layer.msg(data.msg, {
                            icon: 1,
                            time: 2000
                        }, function(){
                            window.location.reload();
                        });
                        return true;
                    }else {
                        layer.msg(data.message, {icon:2, time:2000});
                        return false;
                    }
                },
                error:function() {
                    layer.msg('系统出错,请重试',{icon:2,time:1000});
                }
            });
        });
    }

    function openWindow(id,name,type){
        if(type==1){
            //商户信息
            var index = layer.open({
                type: 2,
                title: name,
                area:['70%','60%'],
                content: "{:url('admin/operaweb/baseinfo')}&id="+id
            });
        }else if(type==2){
            //商户权限
            // del(id,name);
            var index = layer.open({
                type: 2,
                title: '商户权限',
                area:['70%','60%'],
                content: "{:url('admin/merchantManager/save_auth')}&id="+id
            });
        }else if(type==3){
            //新增商户
            var index = layer.open({
                type: 2,
                title: '新增商户',
                area:['100%','100%'],
                content: "{:url('admin/merchantManager/save')}&id="+id
            });
        }
        else if(type==4){
            var index = layer.open({
                type: 2,
                title: '['+name+']的业务管理',
                area:['100%','100%'],
                content: "{:Url('admin/operaweb/connect_app')}&id="+id
            });
        }
        else if(type==5){
            var index = layer.open({
                type: 2,
                title: '['+name+']的关联管理',
                area:['100%','100%'],
                content: "{:Url('admin/merchantManager/connect_manage')}&id="+id
            });
        }
    }
</script>

</body>
</html>
