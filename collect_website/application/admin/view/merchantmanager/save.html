{include file="common/header_inner_new"}

<style>
    .disf{display:flex;align-items: center;}
    .layui-card-header{background:#0a8ddf;color:#fff;}
    .tel,.email{display:none;}
</style>
<body style="padding: 10px;background-color: #f2f2f2;">
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <form class="layui-form" action="" method="post" lay-filter="component-form-element">
            <div class="layui-col-md12">
                <div class="layui-card">
                    <div class="layui-card-body">
                        <div class="layui-form-item">
                            <div class="layui-form-label">商户类别</div>
                            <div class="layui-input-block">
                                <select name="agent_type" id="agent_type">
                                    <option value="1">企业</option>
                                    <option value="2">个人</option>
                                </select>
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">商户验证</div>
                            <div class="layui-input-block">
                                <select name="type" id="type" lay-filter="type">
                                    <option value="">请选择验证方式</option>
                                    <option value="1">手机</option>
                                    <option value="2">电邮</option>
                                </select>
                            </div>
                        </div>
                        <div class="tel">
                            <div class="layui-form-item">
                                <div class="layui-form-label">手机号</div>
                                <div class="layui-input-block disf">
                                    <div class="layui-col-xs3">
                                        <input type="text" class="layui-input" name="country_code" id="country_code" value="" placeholder="请输入国家区号号码">
                                    </div>
                                    <div class="layui-col-xs9">
                                        <input type="number" class="layui-input" name="tel" id="tel" value="">
                                    </div>
                                </div>
                            </div>
                            <div class="layui-form-item">
                                <div class="layui-form-label">验证码</div>
                                <div class="layui-input-block disf">
                                    <input type="text" class="layui-input" name="code" id="code" value="">
                                    <div class="layui-btn layui-btn-primary" onclick="sendYzm(this);return false;" id="sendCode">发送验证码</div>
                                </div>
                            </div>
                        </div>
                        <div class="email">
                            <div class="layui-form-item">
                                <div class="layui-form-label">邮箱号</div>
                                <div class="layui-input-block disf">
                                    <input type="text" class="layui-input" name="email" id="email" value="">
                                </div>
                            </div>
                            <div class="layui-form-item">
                                <div class="layui-form-label">验证码</div>
                                <div class="layui-input-block disf">
                                    <input type="text" class="layui-input" name="emailcode" id="emailcode" value="">
                                    <div class="layui-btn layui-btn-primary" onclick="sendEmailCode(this);return false;" id="sendEmailCode">发送验证码</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="layui-form-item" style="margin-top: 25px;text-align: center;">
                <div>
                    <button class="layui-btn layui-btn-normal" lay-submit lay-filter="component-form-element">立即提交</button>
                    <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                </div>
            </div>
        </form>
    </div>
</div>
</body>

<script type="text/javascript">
    layui.use(['layer','form','laydate','upload'],function(){
        laydate = layui.laydate;
        layer = layui.layer;
        var form  = layui.form;
        $ = layui.jquery;
        var upload = layui.upload;


        form.on('submit(component-form-element)', function(data){
            // JSON.stringify()
            // console.log(data.field);return false;
            $.ajax({
                url:"{:Url('admin/merchantManager/save')}",
                method:'post',
                data:data.field,
                dataType:'JSON',
                success:function(res){
                    layer.msg(res.msg,{time:2000}, function () {
                        if(res.code == 0)
                        {
                            parent.location.reload();
                        }
                    });
                },
                error:function (data) {
                    layer.msg('系统错误',{time:2000});
                }
            });
            return false;
        });

        form.on('select(type)',function(data){
            let val = data.value;
            if(val==1){
                $('.tel').show();
                $('.email').hide();
            }else if(val==2){
                $('.tel').hide();
                $('.email').show();
            }
        });
    });


    //倒计时
    var n=60;
    function timers(typ){
        n-=1;
        if(n==0){
            n=60;
            if(typ==1){
                $("#sendCode").html("发送验证码");
            }else if(typ==2){
                $("#sendEmailCode").html("发送验证码");
            }
        }else{
            if(typ==1){
                $("#sendCode").html(n+"重试");
            }else if(typ==2){
                $("#sendEmailCode").html(n+"重试");
            }
            setTimeout(function () {
                timers(typ);
            },1000);
        }
    }

    //手机验证码start
    function sendYzm(obj) {
        var tel=$("#tel").val();
        if(tel==''){
            layer.msg('手机号不能为空');
            return false;
        }else{
            var myreg=/^[1][3,4,5,7,8][0-9]{9}$/; //手机正则
            if (!myreg.test(tel)){
                layer.msg('手机格式错误');
                return false;
            }else{
                if(n==60){
                    timers(1);
                    $.get("{:Url('admin/merchantManager/sendcode')}&tel="+$('#country_code').val()+''+$("#tel").val(),function (e) {
                        if(e.code==0){
                            layer.msg(e.msg);
                        }else{
                            layer.msg(e.msg);
                        }
                    });
                }
            }
        }
        return false;
    }
    //手机验证码end

    //邮箱验证码start
    function sendEmailCode(obj){
        var email=$("#email").val();
        if(email==''){
            layer.msg('邮箱号不能为空');
            return false;
        }else{
            var myreg=/^([a-zA-Z]|[0-9])(\w|\-)+@[a-zA-Z0-9]+\.([a-zA-Z]{2,4})$/; //邮箱正则
            if (!myreg.test(email)){
                layer.msg('邮箱格式错误');
                return false;
            }else{
                if(n==60){
                    timers(2);
                    $.get("{:Url('admin/merchantManager/sendemailcode')}&email="+$("#email").val(),function (e) {
                        if(e.code==0){
                            layer.msg(e.msg);
                        }else{
                            layer.msg(e.msg);
                        }
                    });
                }
            }
        }
    }
    //邮箱验证码end

</script>
</body>
</html>
