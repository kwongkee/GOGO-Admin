{include file="common/header_inner_new"}

<style>
    .disf{display:flex;align-items: center;}
    .layui-card-header{background:#0a8ddf;color:#fff;}
    .tel,.email{display:none;}
</style>
<body style="padding: 10px;background-color: #f2f2f2;">
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <form class="layui-form" action="" method="post" lay-filter="component-form-element">
            <input type="hidden" name="id" value="{$id}" id="id">
            <div class="layui-col-md12">
                <div class="layui-card">
                    <div class="layui-card-body">
                        <div class="layui-form-item">
                            <div class="layui-form-label">审核认证</div>
                            <div class="layui-input-block">
                                <select name="status" id="status" lay-verify="required" lay-filter="status">
                                    <option value="0">准予关联</option>
                                    <option value="-2">拒绝关联</option>
                                    <option value="-3">退回关联</option>
                                </select>
                            </div>
                        </div>
                        <div class="layui-form-item remark" style="display: none;">
                            <div class="layui-form-label">退回原因</div>
                            <div class="layui-input-block">
                                <textarea name="remark" class="layui-textarea" placeholder="请输入退回原因"></textarea>
                            </div>
                        </div>
                        <div class="layui-form-item company_role">
                            <div class="layui-form-label">关联角色</div>
                            <div class="layui-input-block">
                                <select name="role_id" id="role_id">
                                    {volist name='role' id="vo"}
                                    <option value="{$vo['id']}">{$vo['name']}</option>
                                    {/volist}
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="layui-form-item" style="margin-top: 25px;text-align: center;">
                <div>
                    <button class="layui-btn layui-btn-normal" lay-submit lay-filter="component-form-element">立即提交</button>
                    <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                </div>
            </div>
        </form>
    </div>
</div>
</body>

<script type="text/javascript">
    layui.use(['layer','form','laydate','upload'],function(){
        laydate = layui.laydate;
        layer = layui.layer;
        var form  = layui.form;
        $ = layui.jquery;
        var upload = layui.upload;

        form.on('select(status)',function(data){
            let val = data.value;

            if(val==-3){
                $('.remark').show();
                $('.company_role').hide();
            }else if(val==0){
                $('.company_role').show();
                $('.remark').hide();
            }else if(val==-2){
                $('.company_role').hide();
                $('.remark').hide();
            }
        });

        form.on('submit(component-form-element)', function(data){
            // JSON.stringify()
            // console.log(data.field);return false;
            $.ajax({
                url:"{:Url('admin/merchantManager/audit_merchant')}",
                method:'post',
                data:data.field,
                dataType:'JSON',
                success:function(res){
                    layer.msg(res.msg,{time:2000}, function () {
                        if(res.code == 0)
                        {
                            parent.location.reload();
                        }
                    });
                },
                error:function (data) {
                    layer.msg('系统错误',{time:2000});
                }
            });
            return false;
        });
    });
</script>
</body>
</html>
