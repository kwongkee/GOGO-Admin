{include file="common/header_new"}
<style>
    img{ width:20px;height:20px;}
</style>
<body class="gray-bg">

<div class="row">
    <div class="col-sm-12">
        <div class="ibox float-e-margins">
            <div class="ibox-content">
                <h3 style="text-align: center;">IP【{$ip}】日志记录【{$yesterday}】</h3>
                <div id="toolbar" class="btn-group" style="margin-top: 10px;margin-bottom: 10px;line-height: 34px;">
                    <!--                    <button type="button" href="javascript:;" onclick="openWindow(0,'',3);" class="btn btn-default">-->
                    <!--                        新增商户-->
                    <!--                    </button>-->
                </div>
                <table id="table"

                /*默认排序项*/
                data-sort-name="times"
                data-sort-order="desc"
                /*工具栏相关*/
                data-toolbar="#toolbar"
                data-search="true"          /*搜索框*/
                data-search-on-enter-key="true"
                data-show-refresh="true"    /*刷新按钮*/
                /*分页相关*/
                data-side-pagination="server"
                data-pagination="true"      /*显示分页*/
                data-page-size="10"         /*每页显示条数*/
                /*移动端相关*/
                data-mobile-responsive="true"
                data-card-view="true"
                data-show-columns="true"
                /*radio or checkbox字段名称*/
                data-select-item-name="" >

                <thead>
                <tr>
                    <th data-field="checkbox"
                        data-align="center"
                        data-checkbox="true"></th>
                    <th data-field="user"
                        data-align="center"
                        data-sortable="true"
                        data-visible="true">访问者</th>
                    <th data-field="device"
                        data-align="center"
                        data-sortable="true">访问设备</th>
                    <th data-field="time"
                        data-align="center"
                        data-sortable="true">访问时间</th>
                    <th data-field="manage"
                        data-align="center"
                        data-sortable="true"
                        data-formatter="actionFormatter">操作</th>
                </tr>
                </thead>
                </table>
            </div>
        </div>
    </div>
</div>

</body>
<script type="text/javascript">

    var table;

    $(document).ready(function(){
        table = $('#table').bootstrapTable({
            url: "{:url('admin/merchantManager/log_detail')}&pa=1&ip={$ip}",
            queryParams: queryParams,
        });
        $('.form-control').attr('placeholder','搜索商户名称');
    });

    queryParams = function (params) {
        var temp = {
            sort: params.sort,
            order: params.order,
            limit: params.limit,            //页面大小
            offset: params.offset,          //页码
            search: params.search,
        };
        return temp;
    };

    //操作栏的格式化
    function actionFormatter(value, row, index) {
        var url = row.url;

        var result = "";

        result += '<button style="margin-right: 5px;" type="button" onclick="openWindow(\''+url+'\',\''+1+'\')" class="btn btn-primary btn-xs">打开链接</button>';
        return result;
    }

    function del(id,title){
        layer.confirm('确认删除该用户吗？',function(index){
            $.ajax({
                url: "<?php echo Url('centralize/managemenber/del_person'); ?>",
                data:{'id':id},
                type:'post',
                cache:false,
                dataType:'json',
                success:function(data){
                    if(data.code==1)
                    {
                        layer.msg(data.msg, {
                            icon: 1,
                            time: 2000
                        }, function(){
                            window.location.reload();
                        });
                        return true;
                    }else {
                        layer.msg(data.message, {icon:2, time:2000});
                        return false;
                    }
                },
                error:function() {
                    layer.msg('系统出错,请重试',{icon:2,time:1000});
                }
            });
        });
    }

    function openWindow(url,type){
        if(type==1) {
            window.open(url);
            // var index = layer.open({
            //     type: 2,
            //     title: 'IP【' + ip + '】',
            //     area: ['100%', '100%'],
            //     content: "{:url('admin/merchantManager/log_detail')}&ip=" + ip
            // });
        }
    }
</script>
</html>
