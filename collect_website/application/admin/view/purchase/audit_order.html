<script type="text/javascript">
    var table;

    layui.use(['layer','form','laydate','upload','element'],function() {
        var laydate = layui.laydate
            , layer = layui.layer
            , form = layui.form
            , $ = layui.jquery
            , element = layui.element
            , upload = layui.upload;

    });

    $(document).ready(function() {
        table = $('#table').bootstrapTable({
            url: "{:url('admin/purchase/audit_order')}&pa=1&id={$buyer_id}",
            queryParams: queryParams,
        });
    });

    queryParams = function (params) {
        var temp = {
            sort: params.sort,
            order: params.order,
            limit: params.limit,            //页面大小
            offset: params.offset,          //页码
            search: params.search,

        };
        return temp;
    };

    //操作栏的格式化
    function actionFormatter(value, row, index) {
        var id = row.id;
        var title = row.ordersn;

        var result = "";

        result += '<button style="margin-right: 5px;" type="button" onclick="openWindow('+id+',\''+title+'\',2)" class="btn btn-primary btn-xs">查看详情</button>';

        return result;
    }

    function openWindow(id,title,typ){
        if(typ==2){
            window.location.href = "{:url('admin/purchase/audit_detail')}&id="+id+"&buyer_id={$buyer_id}";
            // var index = layer.open({
            //     type: 2,
            //     title: title+'-订单详情',
            //     area:['100%','100%'],
            //     content: "{:url('admin/purchase/audit_detail')}&id="+id+"&buyer_id={$buyer_id}"
            // });
        }
    }

    function del(id){
        layer.confirm('确认删除该买手吗？',function(index){
            $.ajax({
                url: "<?php echo Url('admin/purchase/del_buyer'); ?>",
                data:{'id':id},
                type:'post',
                cache:false,
                dataType:'json',
                success:function(data){
                    if(data.code==0)
                    {
                        layer.msg(data.msg, {
                            icon: 1,
                            time: 2000
                        }, function(){
                            window.location.reload();
                        });
                        return true;
                    }else {
                        layer.msg(data.msg, {icon:2, time:2000});
                        return false;
                    }
                },
                error:function() {
                    layer.msg('系统出错,请重试',{icon:2,time:1000});
                }
            });
        });
    }
</script>
