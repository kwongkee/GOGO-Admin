{include file="common/header_inner_new"}
<style>
    .disf{display:flex;align-items: center;}
    .layui-card-header{background:#0a8ddf;color:#fff;}
    .input30{width:30%;}
    @media (max-width: 992px) {
        .input30 {width: 100%;}
    }
</style>
<body style="padding: 10px;background-color: #f2f2f2;">
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <form class="layui-form" action="" method="post" lay-filter="component-form-element">
            <input type="text" style="display:none;" name="id" id="id" value="{$id}">
            <input type="text" style="display:none;" name="pa" id="pa" value="1">
            <div class="layui-col-md12">
                <div class="layui-card">
                    <div class="layui-card-body">
                        <div class="layui-form-item">
                            <div class="layui-form-label">买手类别</div>
                            <div class="layui-input-block">
                                <select name="type" id="type" lay-verify="required" lay-filter="type">
<!--                                    <option value="1" {if $data['type']==1}selected{/if}>接口买手</option>-->
                                    <option value="2" {if $data['type']==2}selected{/if}>平台买手</option>
<!--                                    <option value="3" {if $data['type']==3}selected{/if}>合作买手</option>-->
                                </select>
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">买手名称</div>
                            <div class="layui-input-block">
                                <input type="text" class="layui-input" name="name" lay-verify="required" value="{$data['name']}" placeholder="请输入买手名称">
                            </div>
                        </div>
                        <div class="type_box1" style="display:{if $data['type']==1}block{else}none{/if};">
                            <div class="layui-form-item">
                                <div class="layui-form-label">接口地址</div>
                                <div class="layui-input-block">
                                    <input type="text" class="layui-input" name="api_address" value="{$data['api_address']}" placeholder="请输入接口地址">
                                </div>
                            </div>
                        </div>
                        <div class="type_box2" style="display:{if $data['type']==1}none{else}block{/if};">
                            <div class="layui-form-item">
                                <div class="layui-form-label">验证方式</div>
                                <div class="layui-input-block">
                                    <select name="verify_type" id="verify_type" lay-filter="verify_type">
                                        <option value="1" {if $data['verify_type']==1}selected{/if}>手机号码</option>
                                        <option value="2" {if $data['verify_type']==2}selected{/if}>电邮地址</option>
                                    </select>
                                </div>
                            </div>
                            <div class="layui-form-item phone" style="display: {if $data['verify_type']==1}block{else}none{/if}">
                                <div class="layui-form-label">手机号码</div>
                                <div class="layui-input-block">
                                    <input type="number" class="layui-input" name="phone" value="{$data['phone']}" placeholder="请输入手机号码">
                                </div>
                            </div>
                            <div class="layui-form-item email" style="display: {if $data['verify_type']==1}none{else}block{/if};">
                                <div class="layui-form-label">电子邮箱</div>
                                <div class="layui-input-block">
                                    <input type="text" class="layui-input" name="email" value="{$data['email']}" placeholder="请输入电子邮箱">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="layui-form-item" style="margin-top: 25px;text-align: center;">
                <div>
                    <button class="layui-btn layui-btn-normal" lay-submit lay-filter="component-form-element2">立即保存</button>
                    <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                </div>
            </div>
        </form>
    </div>
</div>
</body>

<script type="text/javascript">
    layui.use(['layer','form','laydate','upload'],function(){
        var laydate = layui.laydate
            ,layer = layui.layer
            ,form  = layui.form
            ,$ = layui.jquery
            ,upload = layui.upload;

        form.on('select(type)',function(data){
            let val = data.value;
            if(val==1){
                $('.type_box1').show();
                $('.type_box2').hide();
            }else if(val==2 || val==3){
                $('.type_box1').hide();
                $('.type_box2').show();
            }
        });

        form.on('select(verify_type)',function(data){
            let val = data.value;
            if(val==1){
                $('.phone').show();
                $('.email').hide();
            }else if(val==2){
                $('.phone').hide();
                $('.email').show();
            }
        });

        form.on('submit(component-form-element2)', function(data){
            // JSON.stringify()
            // console.log(data.field);return false;

            $.ajax({
                url:"{:Url('admin/purchase/save_buyer')}",
                method:'post',
                data:data.field,
                dataType:'JSON',
                success:function(res){
                    layer.msg(res.msg,{time:2000}, function () {
                        if(res.code == 0)
                        {
                            parent.location.reload();
                        }
                    });
                },
                error:function (data) {
                    layer.msg('系统错误',{time:2000});
                }
            });
            return false;
        });
    });

    function delPic(obj)
    {
        var layer = layui.layer,$ = layui.$;
        layer.confirm('确认要删除该附件？', {
            btn: ['删除','取消']
        }, function(){
            $(obj).parent().remove();
            layer.closeAll();
        }, function(){

        });
    }

</script>
</body>
</html>
