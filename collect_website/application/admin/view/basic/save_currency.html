{include file="common/header_inner_new"}
<!--百度富文本-->
<script type="text/javascript" src="static/cklein/plugins/ueditor/ueditor.config.js"></script>
<script type="text/javascript" src="static/cklein/plugins/ueditor/ueditor.all.min.js"> </script>
<script type="text/javascript" src="static/cklein/plugins/ueditor/lang/zh-cn/zh-cn.js"></script>

<style>
    .disf{display:flex;}
    .layui-card-header{background:#0a8ddf;color:#fff;}
    .edui-editor{z-index: unset !important;}
    .edui1_iframeholder{z-index: unset !important;}
</style>
<body style="padding: 10px;background-color: #f2f2f2;">
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <form class="layui-form" action="" method="post" lay-filter="component-form-element">
            <input type="hidden" name="id" value="{$id}">
            <div class="layui-col-md12">
                <div class="layui-card">
                    <div class="layui-card-body">
                        <div class="layui-form-item">
                            <div class="layui-form-label">目的国地</div>
                            <div class="layui-input-block">
                                <select name="country_id" id="country_id" lay-search lay-verify="required">
                                    <option value="">请选择目的国地</option>
                                    {volist name="country" id="vo"}
                                    <option value="{$vo['id']}" {if $vo['id']==$data['country_id']}selected{/if}>{$vo['param2']}</option>
                                    {/volist}
                                </select>
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">法币名称</div>
                            <div class="layui-input-block disf">
                                <input type="text" class="layui-input" value="{$data['code_zhname']}" name="code_zhname" lay-verify="required" placeholder="中文名称">
                                <input type="text" class="layui-input" value="{$data['code_enname']}" name="code_enname" lay-verify="required" placeholder="英文名称">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">货币符号</div>
                            <div class="layui-input-block disf">
                                <input type="text" class="layui-input" value="{$data['currency_symbol_origin']}" name="currency_symbol_origin" lay-verify="" placeholder="原有符号">
                                <input type="text" class="layui-input" value="{$data['currency_symbol_standard']}" name="currency_symbol_standard" lay-verify="" placeholder="标准符号">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">辅币进位</div>
                            <div class="layui-input-block disf">
                                <textarea name="token_carry" id="token_carry" class="layui-textarea">{$data['token_carry']}</textarea>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="layui-form-item" style="margin-top: 25px;text-align: center;">
                <div>
                    <button class="layui-btn layui-btn-normal" lay-submit lay-filter="component-form-element2">立即提交</button>
                    <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                </div>
            </div>
        </form>
    </div>
</div>
</body>

<script type="text/javascript">
    layui.use(['layer','form','laydate','upload'],function(){
        laydate = layui.laydate;
        layer = layui.layer;
        var form  = layui.form;
        $ = layui.jquery;
        var upload = layui.upload;

        // UE.getEditor('cont1', {
        //     initialFrameHeight: 200,
        //     serverUrl: 'static/cklein/plugins/ueditor/php/controller.php'
        // });

        form.on('submit(component-form-element2)', function(data){
            // JSON.stringify()
            // console.log(data.field);return false;
            $.ajax({
                url:"{:Url('admin/basic/save_currency')}",
                method:'post',
                data:data.field,
                dataType:'JSON',
                success:function(res){
                    layer.msg(res.msg,{time:2000}, function () {
                        if(res.code == 0)
                        {
                            window.location.reload();
                        }
                    });
                },
                error:function (data) {
                    layer.msg('系统错误',{time:2000});
                }
            });
            return false;
        });
    });

    function delPic(obj)
    {
        var layer = layui.layer,$ = layui.$;
        layer.confirm('确认要删除该附件？', {
            btn: ['删除','取消']
        }, function(){
            $(obj).parent().remove();
            layer.closeAll();
        }, function(){

        });
    }

</script>
</body>
</html>
