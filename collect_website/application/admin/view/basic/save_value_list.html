{include file="common/header_inner_new"}
<!--百度富文本-->
<script type="text/javascript" src="static/cklein/plugins/ueditor/ueditor.config.js"></script>
<script type="text/javascript" src="static/cklein/plugins/ueditor/ueditor.all.min.js"> </script>
<script type="text/javascript" src="static/cklein/plugins/ueditor/lang/zh-cn/zh-cn.js"></script>

<style>
    .disf{display:flex;align-items: center;}
    .layui-card-header{background:#0a8ddf;color:#fff;}
    .edui-editor{z-index: unset !important;}
    .edui1_iframeholder{z-index: unset !important;}
</style>
<body style="padding: 10px;background-color: #f2f2f2;">
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <form class="layui-form" action="" method="post" lay-filter="component-form-element">
            <input type="hidden" name="id" value="{$id}">
            <div class="layui-col-md12">
                <div class="layui-card">
                    <div class="layui-card-body">
                        <div class="layui-form-item">
                            <div class="layui-form-label">类别</div>
                            <div class="layui-input-block">
                                <select name="type" id="type">
                                    <option value="1" {if $data['type']==1}selected{/if}>货物</option>
                                    <option value="2" {if $data['type']==2}selected{/if}>清关</option>
                                    <option value="3" {if $data['type']==3}selected{/if}>操作</option>
                                </select>
                            </div>
                        </div>
<!--                        <div class="layui-form-item">-->
<!--                            <div class="layui-form-label">属性</div>-->
<!--                            <div class="layui-input-block">-->
<!--                                <select name="value" id="value">-->
<!--                                    <option value="">请选择属性</option>-->
<!--                                    <option value="1" if $data['value']==1selected/if>普货</option>-->
<!--                                    <option value="2" if $data['value']==2selected/if>特货</option>-->
<!--                                </select>-->
<!--                            </div>-->
<!--                        </div>-->
                        <div class="layui-form-item">
                            <div class="layui-form-label">属性名称</div>
                            <div class="layui-input-block">
                                <input type="text" class="layui-input" value="{$data['name']}" name="name" lay-verify="required" placeholder="请输入属性名称">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">常见品名</div>
                            <div class="layui-input-block">
                                <script id="names" name="names" type="text/plain" style="width:100%;height:100px;">
                                    {$data['names']}
                                </script>
                                <div class="clearfix"></div>
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">属性说明</div>
                            <div class="layui-input-block">
                                <script id="cont1" name="desc" type="text/plain" style="width:100%;height:100px;">
                                    {$data['desc']}
                                </script>
                                <div class="clearfix"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="layui-form-item" style="margin-top: 25px;text-align: center;">
                <div>
                    <button class="layui-btn layui-btn-normal" lay-submit lay-filter="component-form-element2">立即配置</button>
                    <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                </div>
            </div>
        </form>
    </div>
</div>
</body>

<script type="text/javascript">
    layui.use(['layer','form','laydate','upload'],function(){
        laydate = layui.laydate;
        layer = layui.layer;
        var form  = layui.form;
        $ = layui.jquery;
        var upload = layui.upload;

        UE.getEditor('cont1', {
            initialFrameHeight: 200,
            serverUrl: 'static/cklein/plugins/ueditor/php/controller.php'
        });

        UE.getEditor('names', {
            initialFrameHeight: 200,
            serverUrl: 'static/cklein/plugins/ueditor/php/controller.php'
        });

        form.on('submit(component-form-element2)', function(data){
            // JSON.stringify()
            // console.log(data.field);return false;
            $.ajax({
                url:"{:Url('admin/basic/save_value_list')}",
                method:'post',
                data:data.field,
                dataType:'JSON',
                success:function(res){
                    layer.msg(res.msg,{time:2000}, function () {
                        if(res.code == 0)
                        {
                            parent.location.reload();
                        }
                    });
                },
                error:function (data) {
                    layer.msg('系统错误',{time:2000});
                }
            });
            return false;
        });
    });

    function delPic(obj)
    {
        var layer = layui.layer,$ = layui.$;
        layer.confirm('确认要删除该附件？', {
            btn: ['删除','取消']
        }, function(){
            $(obj).parent().remove();
            layer.closeAll();
        }, function(){

        });
    }

</script>
</body>
</html>
