<script type="text/javascript">

    var table;

    $(document).ready(function(){
        table = $('#table').bootstrapTable({
            url: "{:url('admin/basic/product_list')}&type=1",
            queryParams: queryParams,
        });
        table2 = $('#table2').bootstrapTable({
            url: "{:url('admin/basic/product_list')}&type=2",
            queryParams: queryParams,
        });
        table3 = $('#table3').bootstrapTable({
            url: "{:url('admin/basic/product_list')}&type=3",
            queryParams: queryParams,
        });

        $('.form-control').attr('placeholder','搜索商户名称');
    });

    queryParams = function (params) {
        var temp = {
            sort: params.sort,
            order: params.order,
            limit: params.limit,            //页面大小
            offset: params.offset,          //页码
            search: params.search,
        };
        return temp;
    };

    //操作栏的格式化
    function actionFormatter(value, row, index) {
        var id = row.id;
        var name = row.name;

        var result = "";

        result += '<button style="margin-right: 5px;" type="button" onclick="openWindow('+id+',\''+name+'\',\''+1+'\')" class="btn btn-primary btn-xs">编辑</button>';
        result += '<button style="margin-right: 5px;" type="button" onclick="del('+id+',\''+name+'\',\''+2+'\')" class="btn btn-danger btn-xs">删除</button>';
        return result;
    }

    function del(id,title){
        layer.confirm('确认删除该产品吗？',function(index){
            $.ajax({
                url: "<?php echo Url('admin/basic/del_product'); ?>",
                data:{'id':id},
                type:'post',
                cache:false,
                dataType:'json',
                success:function(data){
                    if(data.code==1)
                    {
                        layer.msg(data.msg, {
                            icon: 1,
                            time: 2000
                        }, function(){
                            window.location.reload();
                        });
                        return true;
                    }else {
                        layer.msg(data.msg, {icon:2, time:2000});
                        return false;
                    }
                },
                error:function() {
                    layer.msg('系统出错,请重试',{icon:2,time:1000});
                }
            });
        });
    }

    function add(type){
        var index = layer.open({
            type: 2,
            title: '新增产品',
            area:['100%','100%'],
            content: "{:url('admin/basic/add_product_list')}&type="+type
        });
    }

    function openWindow(id,name,type){
        if(type==1){
            var index = layer.open({
                type: 2,
                title: '查看-'+name,
                area:['100%','100%'],
                content: "{:url('admin/basic/see_product')}&id="+id
            });
        }
    }
</script>
