{include file="common/header_inner_new"}

<style>
    .disf{display:flex;align-items: center;}
    .layui-card-header{background:#0a8ddf;color:#fff;}
</style>
<body style="padding: 10px;background-color: #f2f2f2;">
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <form class="layui-form" action="" method="post" lay-filter="component-form-element">
            <input type="text" style="display:none;" name="id" id="id" value="{$id}">
            <div class="layui-col-md12">
                <div class="layui-card">
                    <div class="layui-card-body">
                        <div class="layui-form-item">
                            <div class="layui-form-label">用户名称</div>
                            <div class="layui-input-block">
                                <input type="text" class="layui-input" lay-verify="required" name="username" id="username" value="{$data['username']}">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">手机号</div>
                            <div class="layui-input-block">
                                <input type="text" class="layui-input" lay-verify="required" name="tel" id="tel" value="{$data['tel']}">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">验证码</div>
                            <div class="layui-input-block disf">
                                <input type="text" class="layui-input" lay-verify="required" name="code" id="code" value="">
                                <div class="layui-btn layui-btn-primary" onclick="sendYzm(this);return false;" id="sendCode">发送验证码</div>
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">验证码</div>
                            <div class="layui-input-block disf">
                                <input type="text" class="layui-input" lay-verify="required" name="admin_code" id="admin_code" value="">
                                <div class="layui-btn layui-btn-primary" onclick="sendYzm2(this);return false;" id="sendAdminCode">发送“超级管理员”验证码</div>
                            </div>
                        </div>
<!--                        <div class="layui-form-item">-->
<!--                            <div class="layui-form-label">状态</div>-->
<!--                            <div class="layui-input-block">-->
<!--                                <select name="user_status" id="user_status">-->
<!--                                    <option value="1" {if $data['user_status']==1}selected{/if}>正常</option>-->
<!--                                    <option value="0" {if $data['user_status']==0}selected{/if}>禁用</option>-->
<!--                                </select>-->
<!--                            </div>-->
<!--                        </div>-->
                    </div>
                </div>
            </div>
            <div class="layui-form-item" style="margin-top: 25px;text-align: center;">
                <div>
                    <button class="layui-btn layui-btn-normal" lay-submit lay-filter="component-form-element">立即提交</button>
                    <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                </div>
            </div>
        </form>
    </div>
</div>
</body>

<script type="text/javascript">
    layui.use(['layer','form','laydate','upload'],function(){
        laydate = layui.laydate;
        layer = layui.layer;
        var form  = layui.form;
        $ = layui.jquery;
        var upload = layui.upload;


        form.on('submit(component-form-element)', function(data){
            // JSON.stringify()
            // console.log(data.field);return false;

            $.ajax({
                url:"{:Url('admin/userManager/save')}",
                method:'post',
                data:data.field,
                dataType:'JSON',
                success:function(res){
                    layer.msg(res.msg,{time:2000}, function () {
                        if(res.code == 0)
                        {
                            parent.location.reload();
                        }
                    });
                },
                error:function (data) {
                    layer.msg('系统错误',{time:2000});
                }
            });
            return false;
        });

    });

    //倒计时
    var n=60;
    function timers(){
        n-=1;
        if(n==0){
            n=60
            $("#sendCode").html("发送验证码");
        }else{
            $("#sendCode").html(n+"重试");
            setTimeout(function () {
                timers();
            },1000);
        }
    }

    //发送验证码
    function sendYzm(obj) {
        var tel=$("#tel").val();
        if(tel==''){
            layer.msg('手机号不能为空');
//			alert('用户名不能为空')
            return false;
        }else{
            var myreg=/^[1][3,4,5,7,8][0-9]{9}$/; //手机正则
            if (!myreg.test(tel)){
 			    layer.msg('手机格式错误');
                return false;
            }else{
                if(n==60){
                    timers();
                    $.get("{:Url('admin/userManager/sendcode')}&admincode=0&tel="+$("#tel").val(),function (e) {
                        if(e.code==0){
                            layer.msg(e.msg);
                        }else{
                            layer.msg(e.msg);
                        }
                    });
                }
            }
        }
        return false;
    }

    //发送至管理员验证码
    function sendYzm2(obj) {
        var tel='18028192198';
        if(tel==''){
            layer.msg('手机号不能为空');
//			alert('用户名不能为空')
            return false;
        }else{
            var myreg=/^[1][3,4,5,7,8][0-9]{9}$/; //手机正则
            if (!myreg.test(tel)){
                layer.msg('手机格式错误');
                return false;
            }else{
                if(n==60){
                    timers();
                    $.get("{:Url('admin/userManager/sendcode')}&admincode=1&tel="+tel,function (e) {
                        if(e.code==0){
                            layer.msg(e.msg);
                        }else{
                            layer.msg(e.msg);
                        }
                    });
                }
            }
        }
        return false;
    }
</script>
</body>
</html>
