{include file="common/header_new"}
<body class="gray-bg">
<div class="row">
    <div class="col-sm-12">
        <div class="ibox float-e-margins">
            <div class="ibox-content">
                <h3 style="text-align: center;">人员管理</h3>
                <div id="toolbar" class="btn-group" style="margin-top: 10px;margin-bottom: 10px;line-height: 34px;">
                    <button type="button" href="javascript:;" onclick="save();" class="btn btn-default">
                        新增人员
                    </button>
                </div>
                <table id="table"

                /*默认排序项*/
                data-sort-name="id"
                data-sort-order="desc"
                /*工具栏相关*/
                data-toolbar="#toolbar"
                data-search="false"          /*搜索框*/
                data-search-on-enter-key="false"
                data-show-refresh="true"    /*刷新按钮*/
                /*分页相关*/
                data-side-pagination="server"
                data-pagination="true"      /*显示分页*/
                data-page-size="10"         /*每页显示条数*/
                /*移动端相关*/
                data-mobile-responsive="true"
                data-card-view="true"
                data-show-columns="true"
                /*radio or checkbox字段名称*/
                data-select-item-name="id" >

                <thead>
                <tr>
                    <th data-field="checkbox"
                        data-align="center"
                        data-checkbox="true"></th>
                    <th data-field="id"
                        data-align="center"
                        data-sortable="true"
                        data-visible="true">ID</th>
                    <th data-field="username"
                        data-align="center"
                        data-sortable="true">人员名称</th>
                    <th data-field="tel"
                        data-align="center"
                        data-sortable="true">手机号</th>
                    <th data-field="rolename"
                        data-align="center"
                        data-sortable="true">角色名称</th>
                    <th data-field="user_status"
                        data-align="center"
                        data-sortable="true">状态</th>
                    <th data-field="create_time"
                        data-align="center"
                        data-sortable="true">创建时间</th>
                    <th data-field="manage"
                        data-align="center"
                        data-sortable="true"
                        data-formatter="actionFormatter">操作</th>
                </tr>
                </thead>
                </table>
            </div>
        </div>
    </div>
</div>
<!-- 自定义js -->
<script src="./static/hadmin/js/content.js?v=1.0.0"></script>
<script src="./static/hadmin/layui/layui.all.js"></script>
</body>
<script>
    var table;

    $(document).ready(function(){
        table = $('#table').bootstrapTable({
            url: "{:url('admin/usermanager/index')}",
            queryParams: queryParams,
        });
        $('.form-control').attr('placeholder','搜索用户名称');
    });

    queryParams = function (params) {
        var temp = {
            sort: params.sort,
            order: params.order,
            limit: params.limit,            //页面大小
            offset: params.offset,          //页码
            search: params.search,
        };
        return temp;
    };

    //操作栏的格式化
    function actionFormatter(value, row, index) {
        var id = row.id;
        var name = row.username;

        var result = "";
        if(row.user_id=='' || row.user_id==0){
            result += '<button style="margin-right: 5px;" type="button" onclick="connect_miniprogram('+id+',\''+name+'\')" class="btn btn-warning btn-xs">关联小程序</button>';
        }
        result += '<button style="margin-right: 5px;" type="button" onclick="setting('+id+',\''+name+'\')" class="btn btn-info btn-xs">配置角色</button>';
        result += '<button style="margin-right: 5px;" type="button" onclick="edit('+id+',\''+name+'\')" class="btn btn-primary btn-xs">编辑</button>';
        result += '<button style="margin-right: 5px;" type="button" onclick="del('+id+',\''+name+'\')" class="btn btn-danger btn-xs">删除</button>';
        return result;
    }

    function connect_miniprogram(id,name){
        var index = layer.open({
            type: 1,
            title: '['+name+']关联小程序',
            area:['300px','30%'],
            content: "<div style='padding:20px;box-sizing: border-box;text-align: center;'><img src='https://shop.gogo198.cn/collect_website/public/miniprogram_code.png' style='width:150px;height:150px;'></div>"
        });
    }

    function setting(id,name){
        var index = layer.open({
            type: 2,
            title: '角色权限配置-'+name,
            area:['60%','50%'],
            content: "{:url('admin/userManager/setting_role')}&id="+id
        });
        // layer.full(index);
    }

    function edit(id,name){
        var index = layer.open({
            type: 2,
            title: '修改-'+name,
            area:['60%','50%'],
            content: "{:url('admin/userManager/save')}&id="+id
        });
        // layer.full(index);
    }

    function save(title) {
        var index = layer.open({
            type: 2,
            title: title,
            area:['60%','50%'],
            content: "{:url('admin/userManager/save')}"
        });
        // layer.full(index);
    }

    function del(id,title){
        layer.confirm('确认删除该人员吗？',function(index){
            $.ajax({
                url: "<?php echo Url('admin/userManager/del'); ?>",
                data:{'id':id},
                type:'post',
                cache:false,
                dataType:'json',
                success:function(data){
                    if(data.code==0)
                    {
                        layer.msg(data.msg, {
                            icon: 1,
                            time: 2000
                        }, function(){
                            window.location.reload();
                        });
                        return true;
                    }else {
                        layer.msg(data.msg, {icon:2, time:2000});
                        return false;
                    }
                },
                error:function() {
                    layer.msg('系统出错,请重试',{icon:2,time:1000});
                }
            });
        });
    }
</script>

</html>
