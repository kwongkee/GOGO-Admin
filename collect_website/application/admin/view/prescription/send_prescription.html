{include file="common/header_new"}
<link rel="stylesheet" href="static/agents/layui/css/layui.css">
<script src="static/agents/layui/layui.js"></script>
<style>
    .disf{display:flex;align-items: center;}
    img{ width:20px;height:20px;}
    .nav-tabs > li > a{color:#000;}
    .nav.nav-tabs li.active > a{border:1px solid #10b0e1;background:#10b0e1;color:#fff;}
    #tab1 .nav.nav-tabs li.active > a,#tab4 .nav.nav-tabs li.active > a{border:1px solid #50c4e7;background:#50c4e7;}
    #tab4 .nav-risk li.active > a{border:1px solid #7dd9f5 !important;background:#7dd9f5 !important;}
    #tab4 .nav-person li.active > a{border:1px solid #9be0f5  !important;background:#9be0f5  !important;}
    .layui-colla-item{border:1px solid #000;}
    .layui-colla-title{background:#0e2e68;color:#fff;margin-top:0;}
    .layui-form-label{width:100px;}

    .expend_div{width: 140px;text-align: right;border-left: 1px solid #fff;line-height: 1px;}
    .add_operation{font-size:30px;}
</style>
<body class="gray-bg">
<div class="row">
    <div class="col-sm-12">
        <div class="ibox float-e-margins">
            <div class="ibox-content">
                <h3 style="text-align: center;">处方待分配</h3>

<!--                <div id="toolbar1" class="btn-group" style="margin-top: 10px;margin-bottom: 10px;line-height: 34px;float: left;">-->
<!--                    <button type="button" href="javascript:;" onclick="add();" class="btn btn-default">-->
<!--                        添加分配-->
<!--                    </button>-->
<!--                </div>-->

                <table id="table"
                /*默认排序项*/
                data-sort-name="id"
                data-sort-order="desc"
                /*工具栏相关*/
                data-toolbar="#toolbar"
                data-search="false"          /*搜索框*/
                data-search-on-enter-key="true"
                data-show-refresh="true"    /*刷新按钮*/
                /*分页相关*/
                data-side-pagination="server"
                data-pagination="true"      /*显示分页*/
                data-page-size="10"         /*每页显示条数*/
                /*移动端相关*/
                data-mobile-responsive="true"
                data-card-view="true"
                data-show-columns="true"
                /*radio or checkbox字段名称*/
                data-select-item-name="id" >
                <thead>
                <tr>
                    <th data-field="id"
                        data-align="center"
                        data-sortable="true"
                        data-visible="true">ID</th>
                    <th data-field="ordersn"
                        data-align="center"
                        data-sortable="true">处方编号</th>
                    <th data-field="name"
                        data-align="center"
                        data-sortable="true">患者名称</th>
                    <th data-field="status_name"
                        data-align="center"
                        data-sortable="true">状态</th>
                    <th data-field="createtime"
                        data-align="center"
                        data-sortable="true">申请时间</th>
                    <th data-field="manage"
                        data-align="center"
                        data-sortable="true"
                        data-formatter="actionFormatter">操作</th>
                </tr>
                </thead>
                </table>
            </div>
        </div>
    </div>
</div>
</div>
</body>

<script type="text/javascript">
    var table;

    layui.use(['layer','form','laydate','upload','element'],function() {
        var laydate = layui.laydate
            , layer = layui.layer
            , form = layui.form
            , $ = layui.jquery
            , element = layui.element
            , upload = layui.upload;

    });

    $(document).ready(function() {
        table = $('#table').bootstrapTable({
            url: "{:url('admin/prescription/send_prescription')}&pa=1",
            queryParams: queryParams,
        });
    });

    queryParams = function (params) {
        var temp = {
            sort: params.sort,
            order: params.order,
            limit: params.limit,            //页面大小
            offset: params.offset,          //页码
            search: params.search,

        };
        return temp;
    };

    //操作栏的格式化
    function actionFormatter(value, row, index) {
        var id = row.id;
        var title = row.ordersn;

        var result = "";

        result += '<button style="margin-right: 5px;" type="button" onclick="openWindow('+id+',\''+title+'\',1)" class="btn btn-warning btn-xs">查看详情</button>';

        return result;
    }

    //导入exl
    function importExcel(){
        var index = layer.open({
            type: 2,
            title: '导入',
            area: ['50%', '50%'],
            content: "{:url('admin/prescription/import_excel')}&type=3"
        });
    }

    function openWindow(id,title,typ){
        var index = layer.open({
            type: 2,
            title: title+'-查看详情',
            area:['100%','100%'],
            content: "{:url('admin/prescription/prescription_detail')}&id="+id+"&type="+typ
        });
    }
</script>
