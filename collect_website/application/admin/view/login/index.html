<body class="signin">

                <form method="post" action="{:Url('admin/loginUserVerif')}">
                    <h4 class="no-margins" style="color: #333;;">登录</h4>
                    <!--<p class="m-t-md" style="color: #333;">Gogo总后台登录</p>-->
                    <input type="text" name="username" class="form-control uname" placeholder="用户名" id="username" required=""/>
                    <input type="text" name="yzm" class="form-control pword m-b" placeholder="验证码" id="yzm" required=""/>
                    <a href="#" onclick="sendYzm(this);return false;" style="float: right;padding-bottom:15px;" id="sendCode">发送验证码</a>
     <!--               <a href="">忘记密码了？</a>-->
                    <button class="btn btn-success btn-block">登录</button>
                    <a class="btn btn-success btn-block" href="javascript:;" id="wxqrlogin">微信扫码登录</a>
                    <a class="btn btn-success btn-block" href="https://open.weixin.qq.com/connect/oauth2/authorize?appid=wx76d541cc3e471aeb&redirect_uri=http://shop.gogo198.cn/app/wxapp.php?type=3&response_type=code&scope=snsapi_base&state=123#wechat_redirect" id="wxapplogin">微信授权登录</a>
                </form>
            </div>
        </div>
        <div id="wx_qrcode" style="display: none;"></div>
    </div>
</body>
<script src="https://res.wx.qq.com/connect/zh_CN/htmledition/js/wxLogin.js"></script>
<script>
	//倒计时
	var n=60;
    function timers(){
//      console.log(1);
        n-=1;
        if(n==0){
        	n=60
            $("#sendCode").html("发送验证码");
        }else{
            $("#sendCode").html(n+"重试");
            setTimeout(function () {
                timers();
            },1000);
        }
    }
    
    //发送验证码
    function sendYzm(obj) {
    	var username=$("#username").val();
    	if(username==''){
    		layer.msg('用户名不能为空');
//			alert('用户名不能为空')
    		return false;
    	}else{
    		var myreg=/^[1][3,4,5,7,8][0-9]{9}$/; //手机正则
    		if (!myreg.test(username)){  
//  			layer.msg('手机格式错误');

    			
                return false;  
            }else{
            	if(n==60){
		        	timers();
		            $.get("{:Url('admin/sendCode')}&username="+$("#username").val(),function (e) {
		            	console.log(e)
		                if(e.code==001){
		                    layer.msg(e.msg);		                    
		                }else{
		                    layer.msg(e.msg);		                    
		                }
		            });
	       		}
            }
    	}
        return false;
    }
