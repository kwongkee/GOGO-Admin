{extend name="common/_header"}
{block name="title"}<title>后台登录</title>{/block}
{block name="menu"}
<div class="login-logo"><h1>Gogo总后台登录</h1></div>
<div class="login-box">
    <form class="layui-form layui-form-pane" action="{:Url('admin/loginUserVerif')}" method="post">

        <h3>登录你的帐号</h3>
        <label class="login-title" for="username">帐号</label>
        <div class="layui-form-item">
            <label class="layui-form-label login-form"><i class="iconfont">&#xe6b8;</i></label>
            <div class="layui-input-inline login-inline">
                <input type="text" name="username" lay-verify="required" id="yzm" placeholder="请输入你的帐号" autocomplete="off" class="layui-input">
            </div>
        </div>
        <label class="login-title" for="password">验证码</label>
        <div class="layui-form-item">
            <label class="layui-form-label login-form"><i class="iconfont">&#xe82b;</i></label>
            <div class="layui-input-inline login-inline">
                <input type="text" name="yzm" lay-verify="required"  placeholder="请输入你的验证码" autocomplete="off" class="layui-input">
                <a href="javascript:0;" onclick="sendYzm(this)" style="float: right;" id="sendCode">发送验证码</a>
            </div>
        </div>
        <div class="form-actions">
            <button class="btn btn-warning pull-right" lay-submit lay-filter="login"  type="submit">登录</button>
            <!--<div class="forgot"><a href="#" class="forgot">忘记帐号或者密码</a></div>-->
        </div>
    </form>
</div>
<script>
    $(function  () {
        layui.use('form', function(){
            var form = layui.form();
			
        });
    })
    var n=60;
    function timers(){
//      console.log(1);
        n-=1;
        if(n==0){
        	n=60
            $("#sendCode").html("发送验证码");
        }else{
            $("#sendCode").html(n+"重试");
            setTimeout(function () {
                timers();
            },1000);
        }
    }
    function sendYzm(obj) {
    	var username=$("#yzm").val();
    	if(username==''){
    		layer.msg('用户名不能为空');
    		return false;
    	}else{
    		var myreg=/^[1][3,4,5,7,8][0-9]{9}$/; //手机正则
    		if (!myreg.test(username)){  
    			layer.msg('手机格式错误');
                return false;  
            }else{
            	if(n==60){
		        	timers();
		            $.get("{:Url('admin/sendCode')}&username="+$("#yzm").val(),function (e) {
		            	console.log(e)
		                if(e.code==001){
		                    layer.msg(e.msg);
		                }else{
		                    layer.msg(e.msg);
		                }
		            });
	       		}
            }
    	}
        
    }
</script>
{/block}
{extend name="common/_footer"}
