<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>新增</title>
    <link rel="stylesheet" href="./static/hadmin/assets/layui/css/layui.css">
    <link rel="stylesheet" href="./static/hadmin/assets/common.css"/>
    <style>
        form{margin-top: 47px;margin-right: 32px;}
        .edui-editor-iframeholder iframe{background:#444444;}
        .edui-editor{z-index: 1 !important;}
    </style>
</head>
<body>
<form class="layui-form" action="">

    <div class="layui-form-item">
        <label class="layui-form-label">配置名称</label>
        <div class="layui-input-block">
            <input type="text" name="name" required  lay-verify="required" placeholder="请输入配置名称" autocomplete="off" class="layui-input">
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">类型</label>
        <div class="layui-input-block">
            <input type="radio" name="type" value="1" title="提示" checked="">
            <input type="radio" name="type" value="2" title="指引">
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">是否强制</label>
        <div class="layui-input-block">
            <input type="radio" name="is_force" value="1" title="否" checked="">
            <input type="radio" name="is_force" value="2" title="是">
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">controller</label>
        <div class="layui-input-block">
            <input type="text" name="controller_name" id="controller_name" placeholder="请输入控制器名称" required  lay-verify="required" autocomplete="off" class="layui-input">
            <div class="layui-form-mid layui-word-aux" style="color: red !important;">controller和function在地址栏获取，一般是地址后两位参数，例如地址是：http://declare.gogo198.cn/mobile/payment/account_add  controller就是payment，function就是account_add</div>
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">function</label>
        <div class="layui-input-block">
            <input type="text" name="function_name" id="function_name" placeholder="请输入function名称" required  lay-verify="required" autocomplete="off" class="layui-input">

        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">字段名称</label>
        <div class="layui-input-block">
            <div class="layui-col-lg6">
                <select name="value" id="value" required  lay-verify="required" >
                    <option value="">请选择字段名称</option>
                </select>
            </div>
            <div class="layui-col-lg4" style="margin-left: 20px;">
                <button class="layui-btn" onclick="getTableFiled();" type="button">获取字段</button>
            </div>

        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">内容</label>
        <div class="layui-input-block" style="z-index: 0;">
            <script id="content" name="content" type="text/plain" style="width:100%;height:400px;"></script>
        </div>
    </div>

    <div class="layui-form-item">
        <div class="layui-input-block">
            <button class="layui-btn" lay-submit lay-filter="formDemo">立即保存</button>
        </div>
    </div>
</form>

</body>
<script src="./static/hadmin/assets/layui/layui.js"></script>
<script src="./static/hadmin/assets/jquery-3.2.1.min.js"></script>
<script type="text/javascript" src="static/cklein/plugins/ueditor/ueditor.config.js"></script>
<script type="text/javascript" src="static/cklein/plugins/ueditor/ueditor.all.min.js"> </script>
<script type="text/javascript" src="static/cklein/plugins/ueditor/lang/zh-cn/zh-cn.js"></script>

<script>
    layui.use(['form','upload'], function(){
        var form = layui.form,upload = layui.upload;

        var ue = UE.getEditor('content', {
            initialFrameHeight: 400,
            serverUrl: 'static/cklein/plugins/ueditor/php/controller.php'
        });
        //监听提交
        form.on('submit(formDemo)', function(data){
            var ue = UE.getEditor('content');
            var content = ue.getContent();
            data.field['content'] = content;
            // console.log(data.field)
            $.ajax({
                url:'{:Url("admin/systemTips/add")}',
                type:"POST",
                dataType:"json",
                data:data.field,
                success:function (res) {
                    layer.msg(res.message, {
                        icon: 1,
                        time: 2000
                    }, function(){
                        parent.window.location.reload();
                        var index = parent.layer.getFrameIndex(window.name);
                        parent.layer.close(index);
                    });
                },
                error:function (xhr) {
                    layer.msg('链接服务错误..');
                }
            });
            return false;
        });

        window.getTableFiled = function () {
            var controller_name = $("#controller_name").val();
            var function_name = $("#function_name").val();
            if( controller_name  == '' )
            {
                layer.msg('控制器名称不能为空');
                return false;
            }
            if( function_name  == '' )
            {
                layer.msg('function名称不能为空');
                return false;
            }

            $.ajax({
                url:'{:Url("admin/systemTips/gettableinfo")}',
                type:"GET",
                dataType:"json",
                data: {controller_name: controller_name, function_name:function_name},
                success:function (res) {
                    // console.log(res)
                    $("#value").empty();
                    if(res.length > 0 )
                    {
                        var option = '';
                        for (var i=0;i<res.length;i++) {
                            option += '<option value="'+res[i].field+'">'+res[i].field + '-'+res[i].comment+'</option>';
                        }

                        layer.msg('获取成功');
                    }else{
                        var option = '<option value="">暂无数据</option>';
                        layer.msg('暂无数据');
                    }
                    $("#value").append(option);
                    form.render('select');
                },
                error:function (xhr) {
                    layer.msg('链接服务错误..');
                }
            });
        }

    });

</script>
</html>
