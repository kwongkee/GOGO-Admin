{include file="common/header_new"}

<style>
    img{ width:20px;height:20px;}
</style>
<body class="gray-bg">

<div class="row">
    <div class="col-sm-12">
        <div class="ibox float-e-margins">
            <div class="ibox-content">
                <h3 style="text-align: center;">模型训练日志管理</h3>
                <div id="toolbar" class="btn-group" style="margin-top: 10px;margin-bottom: 10px;line-height: 34px;">

                </div>
                <table id="table"

                /*默认排序项*/
                data-sort-name="traintime"
                data-sort-order="desc"
                /*工具栏相关*/
                data-toolbar="#toolbar"
                data-search="false"          /*搜索框*/
                data-search-on-enter-key="false"
                data-show-refresh="true"    /*刷新按钮*/
                /*分页相关*/
                data-side-pagination="server"
                data-pagination="true"      /*显示分页*/
                data-page-size="10"         /*每页显示条数*/
                /*移动端相关*/
                data-mobile-responsive="true"
                data-card-view="true"
                data-show-columns="true"
                /*radio or checkbox字段名称*/
                data-select-item-name="id" >

                <thead>
                <tr>
                    <th data-field="name"
                        data-align="center"
                        data-sortable="true">数据包名称</th>
                    <th data-field="data_num"
                        data-align="center"
                        data-sortable="true">数据量（条）</th>
                    <th data-field="status_name"
                        data-align="center"
                        data-sortable="true">数据包状态</th>
                    <th data-field="traintime"
                        data-align="center"
                        data-sortable="true">训练时间</th>
                    <th data-field="manage"
                        data-align="center"
                        data-sortable="true"
                        data-formatter="actionFormatter">操作</th>
                </tr>
                </thead>
                </table>
            </div>
        </div>
    </div>
</div>

<script type="text/javascript">

    var table;

    $(document).ready(function(){
        table = $('#table').bootstrapTable({
            url: "{:url('admin/model/log_package')}&date={$date}",
            queryParams: queryParams,
        });
        $('.form-control').attr('placeholder','搜索服务名称');
    });

    queryParams = function (params) {
        var temp = {
            sort: params.sort,
            order: params.order,
            limit: params.limit,            //页面大小
            offset: params.offset,          //页码
            search: params.search,
        };
        return temp;
    };

    //操作栏的格式化
    function actionFormatter(value, row, index) {
        var id = row.id;
        var title = row.name;

        var result = "";
        result += '<button style="margin-right: 5px;" type="button" onclick="edit('+id+',\''+title+'\')" class="btn btn-primary btn-xs">查看训练日志</button>';
        return result;
    }

    function edit(id,title){
        var index = layer.open({
            type: 2,
            title: '查看训练日志-'+title,
            area:['100%','100%'],
            content: "{:url('admin/model/log_package_history')}&id="+id
        });
        // layer.full(index);
    }

</script>
</body>
</html>
