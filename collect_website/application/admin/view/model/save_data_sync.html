{include file="common/header_inner_new"}
<style>
    .disf{display:flex;align-items: center;}
    .layui-card-header{background:#0a8ddf;color:#fff;}
    #service_ids{width:200px;}
    .addService,.delService{font-size:20px;}
</style>
<body style="padding: 10px;background-color: #f2f2f2;">
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <form class="layui-form" action="" method="post" lay-filter="component-form-element">
            <div class="layui-col-md12">
                <div class="layui-card">
                    <div class="layui-card-body">
                        <div class="layui-form-item">
                            <div class="layui-form-label">选择表格</div>
                            <div class="layui-input-block">
                                <div id="tables" class="xm-select-demo"></div>
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">同步时间</div>
                            <div class="layui-input-block">
                                <div class="disf">
                                    <div class="train_time">
                                        <select name="method" lay-filter="method">
                                            <option value="1">现在</option>
                                            <option value="2">定时</option>
                                        </select>
                                    </div>
                                    <div class="regular_time" style="display:none;">
                                        <input type="text" class="layui-input" id="synctime" name="synctime" value="" placeholder="同步时间">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="layui-form-item" style="margin-top: 25px;text-align: center;">
                <div>
                    <button class="layui-btn layui-btn-normal" lay-submit lay-filter="component-form-element2">立即提交</button>
                    <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                </div>
            </div>
        </form>
    </div>
</div>
</body>
<script src="./static/hadmin/assets/layui/xm-select.js"></script>
<script type="text/javascript">
    layui.use(['layer','form','laydate','upload','colorpicker'],function(){
        laydate = layui.laydate;
        layer = layui.layer;
        var form  = layui.form;
        $ = layui.jquery;
        var upload = layui.upload;
        var colorpicker = layui.colorpicker;

        laydate.render({
            elem: '#synctime',
            format: 'yyyy-MM-dd HH:mm:ss',
            min: '-0',
            type:'datetime'//指定元素
        });

        form.on('select(method)',function(data){
            let val = data.value;

            if(val==1){
                $(this).parents(':eq(3)').find('.regular_time').hide();
            }
            else if(val==2){
                $(this).parents(':eq(3)').find('.regular_time').show();
            }
        });

        xmSelect.render({
            name:'content',
            el: '#tables',
            autoRow: true, //自动换行
            filterable: true, //可搜索
            model: {
                icon: 'hidden',//是否展示复选框或者单选框图标 show, hidden:变换背景色  ！！这句话是重点，不然会变成父节点也有单选框！！
            },
            tree: {
                show: true, //用树显示
                showFolderIcon: true, //是否显示节点前的三角图标
                expandedKeys: true, //默认全部展开
                showLine: true, //显示渐近线
                indent: 20, //间距
                strict: false, //重点！！设置成非严格父子模式，这样父节点被禁用，子节点依然可以点击
            },
            toolbar: {
                show: true, //显示工具条
                list: ['ALL', 'REVERSE', 'CLEAR']
            },
            height: '300px', //最大下拉框高度
            data: {$tables},
            // initValue:[$data["tables"]]
        });

        form.on('submit(component-form-element2)', function(data){
            // JSON.stringify()
            // console.log(data.field);return false;
            layer.load();
            $.ajax({
                url:"{:Url('admin/model/save_data_sync')}",
                method:'post',
                data:data.field,
                dataType:'JSON',
                success:function(res){
                    layer.closeAll('loading');
                    layer.msg(res.msg,{time:2000}, function () {
                        if(res.code == 0)
                        {
                            parent.location.reload();
                        }
                    });
                },
                error:function (data) {
                    layer.msg('系统错误',{time:2000});
                }
            });
            return false;
        });

    });
</script>
</body>
</html>
