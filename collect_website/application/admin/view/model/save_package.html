{include file="common/header_inner_new"}
<style>
    .disf{display:flex;align-items: center;}
    .layui-card-header{background:#0a8ddf;color:#fff;}
    #service_ids{width:200px;}
    .addService,.delService{font-size:20px;}
</style>
<body style="padding: 10px;background-color: #f2f2f2;">
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <form class="layui-form" action="" method="post" lay-filter="component-form-element">
            <input type="text" style="display:none;" name="ids" id="ids" value="{$ids}">
            <input type="text" style="display:none;" name="isall" id="isall" value="{$isall}">
            <div class="layui-col-md12">
                <div class="layui-card">
                    <div class="layui-card-body">
                        <div class="no_package" style="display: {if empty($package)}block{else}none{/if};">
                            <div class="layui-form-item">
                                <div class="layui-form-label">数据包名称</div>
                                <div class="layui-input-block">
                                    <input type="text" class="layui-input" lay-verify="" name="name" id="name" value="<?php echo date('Y-m-d H:i:s');?>的数据包" placeholder="数据包名称">
                                </div>
                            </div>
                        </div>

                        <div class="no_package" style="display: {if !empty($package)}block{else}none{/if};">
                            <div class="layui-form-item">
                                <div class="layui-form-label">选择数据包</div>
                                <div class="layui-input-block">
                                    <select name="id">
                                        {volist name="package" id="vo"}
                                            <option value="{$vo['id']}">{$vo['name']}</option>
                                        {/volist}
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="layui-form-item" style="margin-top: 25px;text-align: center;">
                <div>
                    <button class="layui-btn layui-btn-normal" lay-submit lay-filter="component-form-element2">{if empty($package)}立即创建{else}立即合并{/if}</button>
                    <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                </div>
            </div>
        </form>
    </div>
</div>
</body>

<script type="text/javascript">
    layui.use(['layer','form','laydate','upload','colorpicker'],function(){
        laydate = layui.laydate;
        layer = layui.layer;
        var form  = layui.form;
        $ = layui.jquery;
        var upload = layui.upload;
        var colorpicker = layui.colorpicker;

        form.on('submit(component-form-element2)', function(data){
            // JSON.stringify()
            // console.log(data.field);return false;
            layer.load();
            $.ajax({
                url:"{:Url('admin/model/save_package')}",
                method:'post',
                data:data.field,
                dataType:'JSON',
                success:function(res){
                    layer.closeAll();
                    layer.msg(res.msg,{time:2000}, function () {
                        if(res.code == 0)
                        {
                            parent.location.reload();
                        }
                    });
                },
                error:function (data) {
                    layer.msg('系统错误',{time:2000});
                }
            });
            return false;
        });

    });
</script>
</body>
</html>
