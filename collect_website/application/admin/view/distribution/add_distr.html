{include file="common/header_inner_new"}

<style>
    .disf{display:flex;align-items: center;}
    .layui-card-header{background:#0a8ddf;color:#fff;}
    .email,.mobile{display:none;}
</style>
<body style="padding: 10px;background-color: #f2f2f2;">
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <form class="layui-form" action="" method="post" lay-filter="component-form-element2">
            <div class="layui-col-md12">
                <div class="layui-card">
                    <div class="layui-card-body">
                        <div class="layui-form-item">
                            <div class="layui-form-label">通知方式</div>
                            <div class="layui-input-block">
                                <select name="method" id="method" lay-filter="method">
                                    <option value="">请选择通知方式</option>
                                    <option value="1">邮箱</option>
                                    <option value="2">短信</option>
                                </select>
                            </div>
                        </div>
                        <div class="layui-form-item email">
                            <div class="layui-form-label">邮箱号</div>
                            <div class="layui-input-block">
                                <input type="text" name="email" class="layui-input" value="" placeholder="请输入邮箱号">
                            </div>
                        </div>
                        <div class="layui-form-item mobile">
                            <div class="layui-form-label">手机号</div>
                            <div class="layui-input-block">
                                <input type="text" name="mobile" class="layui-input" value="" placeholder="请输入手机号">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <label class="layui-form-label">链接</label>
                            <div class="layui-input-block disf">
                                <input type="text" name="link" class="layui-input" value="" placeholder="请输入申请链接">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="layui-form-item" style="margin-top: 25px;text-align: center;">
                <div>
                    <button class="layui-btn layui-btn-normal" lay-submit lay-filter="component-form-element">立即提交</button>
                    <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                </div>
            </div>
        </form>
    </div>
</div>
</body>

<script type="text/javascript">
    layui.use(['layer','form','laydate','upload','colorpicker','element'],function(){
        laydate = layui.laydate;
        layer = layui.layer;
        var form  = layui.form;
        $ = layui.jquery;
        var upload = layui.upload;
        var element = layui.element;
        var colorpicker = layui.colorpicker;

        form.on('select(method)',function(data){
            let val=data.value;
            if(val==1){
                $('.email').show();
                $('.mobile').hide();
            }else{
                $('.mobile').show();
                $('.email').hide();
            }
        });

        form.on('submit(component-form-element)', function(data){
            // JSON.stringify()
            // console.log(data.field);return false;
            $.ajax({
                url:"{:Url('admin/distribution/add_distr')}",
                method:'post',
                data:data.field,
                dataType:'JSON',
                success:function(res){
                    layer.msg(res.msg,{time:2000}, function () {
                        if(res.code == 0)
                        {
                            parent.location.reload();
                        }
                    });
                },
                error:function (data) {
                    layer.msg('系统错误',{time:2000});
                }
            });
            return false;
        });
    });
</script>
</body>
</html>
