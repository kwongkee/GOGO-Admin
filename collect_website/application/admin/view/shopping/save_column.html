{include file="common/header_inner_new"}
<style>
    .disf{display:flex;align-items: center;}
    .layui-card-header{background:#0a8ddf;color:#fff;}
</style>
<body style="padding: 10px;background-color: #f2f2f2;">
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <form class="layui-form" action="" method="post" lay-filter="component-form-element">
            <input type="hidden" name="id" value="{$id}">
            <div class="layui-col-md12">
                <div class="layui-card">
                    <div class="layui-card-body">
                        <div class="layui-form-item">
                            <div class="layui-form-label">字段类型</div>
                            <div class="layui-input-block">
                                <select name="type" id="type">
<!--                                    <option value="1" {if $data['type']==1}selected{/if}>商品字段</option>-->
                                    <option value="2" {if $data['type']==2}selected{/if}>自定字段</option>
                                </select>
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">字段名称</div>
                            <div class="layui-input-block">
                                <input type="text" class="layui-input" lay-verify="required" name="name" id="name" value="{$data['name']}" placeholder="请输入字段名称">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">字段样式</div>
                            <div class="layui-input-block">
                                <select name="stype" id="stype" lay-filter="stype" lay-verify="required">
                                    <option value="">请选择</option>
                                    {volist name="search_fields" id="vo"}
                                    <option value="{$vo['id']}" {if $data['stype']==$vo['id']}selected{/if}>{$vo['name']}</option>
                                    {/volist}
                                </select>
                            </div>
                        </div>
                        <div class="layui-form-item content" style="display: {if $data['stype']==0 || $data['stype']==2}block{else}none{/if}">
                            <div class="layui-form-label">字段值</div>
                            <div class="layui-input-block">
                                <input type="text" class="layui-input" name="content" id="content" value="{$data['content']}" placeholder="多个以“、”隔开">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">对应表字段</div>
                            <div class="layui-input-block">
                                <select name="field" id="field" lay-verify="required" lay-search>
                                    <option value="">请选择</option>
                                    {volist name="field" id="vo"}
                                        <option value="{$vo['field']}" {if $data['field']==$vo['field']}selected{/if}>{$vo['field']}-{$vo['comment']}</option>
                                    {/volist}
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="layui-form-item" style="margin-top: 25px;text-align: center;">
                <div>
                    <button class="layui-btn layui-btn-normal" lay-submit lay-filter="component-form-element2">立即保存</button>
                    <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                </div>
            </div>
        </form>
    </div>
</div>
</body>

<script type="text/javascript">
    layui.use(['layer','form','upload'],function(){
        var laydate = layui.laydate
            ,layer = layui.layer
            ,form  = layui.form
            ,$ = layui.jquery
            ,upload = layui.upload;

        form.on('select(stype)',function(data){
            let val = data.value;

            if(val==2){
                $('.content').show();
            }else{
                $('.content').hide();
            }
        });

        form.on('submit(component-form-element2)', function(data){
            // JSON.stringify()
            // console.log(data.field);return false;

            $.ajax({
                url:"{:Url('admin/shopping/save_column')}",
                method:'post',
                data:data.field,
                dataType:'JSON',
                success:function(res){
                    layer.msg(res.msg,{time:2000}, function () {
                        if(res.code == 0)
                        {
                            parent.location.reload();
                        }
                    });
                },
                error:function (data) {
                    layer.msg('系统错误',{time:2000});
                }
            });
            return false;
        });
    });

    function delPic(obj)
    {
        var layer = layui.layer,$ = layui.$;
        layer.confirm('确认要删除该附件？', {
            btn: ['删除','取消']
        }, function(){
            $(obj).parent().remove();
            layer.closeAll();
        }, function(){

        });
    }

</script>
</body>
</html>
