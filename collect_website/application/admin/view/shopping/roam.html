{include file="common/header_inner_new"}

<style>
    .disf{display:flex;align-items: center;}
    .layui-card-header{background:#0a8ddf;color:#fff;}
    .roam{display:none;}
</style>
<body style="padding: 10px;background-color: #f2f2f2;">
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <form class="layui-form" action="" method="post" lay-filter="component-form-element">
            <input type="hidden" name="id" value="{$id}">
            <div class="layui-col-md12">
                <div class="layui-card">
                    <div class="layui-card-body">
                        <div class="layui-form-item">
                            <div class="layui-form-label">流转类别</div>
                            <div class="layui-input-block">
                                <select name="roam_type" id="roam_type" lay-filter="roam_type" lay-verify="required">
                                    <option value="">请选择流转类别</option>
                                    <option value="1">卖家</option>
                                    <option value="2">买家</option>
                                </select>
                            </div>
                        </div>
                        <div class="roam">

                        </div>
                    </div>
                </div>
            </div>
            <div class="layui-form-item" style="margin-top: 25px;text-align: center;">
                <div>
                    <button class="layui-btn layui-btn-normal" lay-submit lay-filter="component-form-element2">立即流转</button>
                    <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                </div>
            </div>
        </form>
    </div>
</div>
</body>

<script type="text/javascript">
    layui.use(['layer','form','laydate','upload'],function(){
        laydate = layui.laydate;
        layer = layui.layer;
        var form  = layui.form;
        $ = layui.jquery;
        var upload = layui.upload;

        form.on('select(roam_type)',function(data){
            let val = data.value;
            if(val==1 || val==2){
                $.ajax({
                    url:"{:Url('admin/task/roam_type')}",
                    method:'post',
                    data:{type:val},
                    dataType:'JSON',
                    success:function(res){
                        let html = '<div class="layui-form-item roam1">\n';
                        if(val==1){
                            html += '                                <div class="layui-form-label">卖家</div>\n';
                        }else if(val==2){
                            html += '                                <div class="layui-form-label">买家</div>\n';
                        }

                        html += '                                <div class="layui-input-block">\n' +
                            '                                    <select name="user_id" lay-verify="required" lay-search>\n'+
                            '                                        <option value="">请选择</option>\n';
                        for(let i=0;i<res.list.length;i++){
                            html += '<option value="'+res.list[i].id+'">'+'(ID:'+res.list[i].custom_id+')'+res.list[i].nickname+'</option>';
                        }
                        html += '                            </select>\n' +
                            '                                </div>\n' +
                            '                            </div>';

                        $('.roam').html(html);
                        form.render(null,'component-form-element');
                    },
                    error:function (data) {
                        layer.msg('系统错误',{time:2000});
                    }
                });
                $('.roam').show();
            }else{
                $('.roam').hide();
            }
        });


        form.on('submit(component-form-element2)', function(data){
            // JSON.stringify()
            // console.log(data.field);return false;
            $.ajax({
                url:"{:Url('admin/shopping/roam')}",
                method:'post',
                data:data.field,
                dataType:'JSON',
                success:function(res){
                    layer.msg(res.msg,{time:2000}, function () {
                        if(res.code == 0)
                        {
                            parent.location.reload();
                        }
                    });
                },
                error:function (data) {
                    layer.msg('系统错误',{time:2000});
                }
            });
            return false;
        });
    });

</script>
</body>
</html>
