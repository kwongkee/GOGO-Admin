<script>
    var table;

    $(document).ready(function(){
        table = $('#table').bootstrapTable({
            url: "{:url('admin/shopping/chat_index')}&type=1",
            queryParams: queryParams,
        });
        table = $('#table2').bootstrapTable({
            url: "{:url('admin/shopping/chat_index')}&type=2",
            queryParams: queryParams,
        });
        table = $('#table3').bootstrapTable({
            url: "{:url('admin/shopping/chat_index')}&type=3",
            queryParams: queryParams,
        });
        $('.form-control').attr('placeholder','搜索角色名称');
    });

    queryParams = function (params) {
        var temp = {
            sort: params.sort,
            order: params.order,
            limit: params.limit,            //页面大小
            offset: params.offset,          //页码
            search: params.search,
        };
        return temp;
    };

    //操作栏的格式化
    function actionFormatter(value, row, index) {
        var id = row.id;
        var name = row.gogo_id;

        var result = "";

        result += '<button style="margin-right: 5px;" type="button" onclick="confirm('+id+',\''+name+'\')" class="btn btn-info btn-xs">确认任务</button>';
        result += '<button style="margin-right: 5px;" type="button" onclick="reject('+id+',\''+name+'\')" class="btn btn-danger btn-xs">拒绝任务</button>';

        return result;
    }

    function actionFormatter2(value, row, index) {
        var id = row.id;
        var name = row.gogo_id;

        var result = "";

        result += '<button style="margin-right: 5px;" type="button" onclick="workorder_list('+id+',\''+name+'\')" class="btn btn-info btn-xs">工单列表</button>';

        return result;
    }

    function workorder_list(id,name){
        var index = layer.open({
            type: 2,
            title: '工单列表-'+name,
            area:['80%','80%'],
            content: "{:url('admin/shopping/workorder_list')}&id="+id
        });
        // layer.full(index);
    }

    function order(id,name,typ){
        if(typ==1){
            var index = layer.open({
                type: 2,
                title: '查看订仓单-'+name,
                area:['80%','80%'],
                content: "{:url('centralize/index/edit_booking')}&id="+id
            });
        }else{
            var index = layer.open({
                type: 2,
                title: '查看包裹-'+name,
                area:['100%','100%'],
                content: "{:url('centralize/index/package_info')}&id="+id
            });
        }
    }

    function confirm(id,title){
        layer.confirm('确认同意该任务吗？',function(index){
            $.ajax({
                url: "<?php echo Url('admin/shopping/chat_confirm'); ?>",
                data:{'id':id},
                type:'post',
                cache:false,
                dataType:'json',
                success:function(data){
                    if(data.code==0)
                    {
                        layer.msg(data.msg, {
                            icon: 1,
                            time: 2000
                        }, function(){
                            window.location.reload();
                        });
                        return true;
                    }else {
                        layer.msg(data.msg, {icon:2, time:2000});
                        return false;
                    }
                },
                error:function() {
                    layer.msg('系统出错,请重试',{icon:2,time:1000});
                }
            });
        });
    }

    function reject(id,title){
        layer.confirm('确认拒绝该任务吗？',function(index){
            $.ajax({
                url: "<?php echo Url('admin/shopping/chat_reject'); ?>",
                data:{'id':id},
                type:'post',
                cache:false,
                dataType:'json',
                success:function(data){
                    if(data.code==0)
                    {
                        layer.msg(data.msg, {
                            icon: 1,
                            time: 2000
                        }, function(){
                            window.location.reload();
                        });
                        return true;
                    }else {
                        layer.msg(data.msg, {icon:2, time:2000});
                        return false;
                    }
                },
                error:function() {
                    layer.msg('系统出错,请重试',{icon:2,time:1000});
                }
            });
        });
    }
</script>
