{include file="common/header_new"}

<style>
    .disf{display:flex;align-items: center;}
    img{ width:20px;height:20px;}
</style>
<body class="gray-bg">

<div class="row">
    <div class="col-sm-12">
        <div class="ibox float-e-margins">
            <div class="ibox-content">
                <h3 style="text-align: center;">{$title}</h3>
                <div id="toolbar" class="btn-group" style="margin-top: 10px;margin-bottom: 10px;line-height: 34px;">
<!--                    <div class="disf">-->
<!--                        <button type="button" href="javascript:;" onclick="save();" class="btn btn-default">-->
<!--                            新增活动-->
<!--                        </button>-->
<!--                    </div>-->
                </div>
                <table id="table"

                /*默认排序项*/
                data-sort-name="id"
                data-sort-order="desc"
                /*工具栏相关*/
                data-toolbar="#toolbar"
                data-search="false"          /*搜索框*/
                data-search-on-enter-key="false"
                data-show-refresh="true"    /*刷新按钮*/
                /*分页相关*/
                data-side-pagination="server"
                data-pagination="true"      /*显示分页*/
                data-page-size="10"         /*每页显示条数*/
                /*移动端相关*/
                data-mobile-responsive="true"
                data-card-view="true"
                data-show-columns="true"
                /*radio or checkbox字段名称*/
                data-select-item-name="id" >

                <thead>
                <tr>
                    <th data-field="checkbox"
                        data-align="center"
                        data-checkbox="true"></th>
                    <th data-field="id"
                        data-align="center"
                        data-sortable="true"
                        data-visible="true">ID</th>
                    <th data-field="ordersn"
                        data-align="center"
                        data-sortable="true"
                        data-visible="true">订单编号</th>
                    <th data-field="custom_id"
                        data-align="center"
                        data-sortable="true"
                        data-visible="true">买家名称</th>
                    <th data-field="status_name"
                        data-align="center"
                        data-sortable="true"
                        data-visible="true">订单状态</th>
                    <th data-field="createtime"
                        data-align="center"
                        data-sortable="true">创建时间</th>
                    <th data-field="manage"
                        data-align="center"
                        data-sortable="true"
                        data-formatter="actionFormatter">操作</th>
                </tr>
                </thead>
                </table>
            </div>
        </div>
    </div>
</div>

<script type="text/javascript">

    var table;

    $(document).ready(function(){
        table = $('#table').bootstrapTable({
            url: "{:url('admin/shopping/order_manage')}&pa={$pa}",
            queryParams: queryParams,
        });
        $('.form-control').attr('placeholder','搜索新闻名称');
    });

    queryParams = function (params) {
        var temp = {
            sort: params.sort,
            order: params.order,
            limit: params.limit,            //页面大小
            offset: params.offset,          //页码
            search: params.search,
        };
        return temp;
    };

    //操作栏的格式化
    function actionFormatter(value, row, index) {
        var id = row.id;
        var title = row.ordersn;

        var result = "";
        if(row.status==-13){
            //申请支付
            result += '<button style="margin-right: 5px;" type="button" onclick="del('+id+',\''+title+'\',2)" class="btn btn-primary btn-xs">允许支付</button>';
            result += '<button style="margin-right: 5px;" type="button" onclick="del('+id+',\''+title+'\',1)" class="btn btn-danger btn-xs">拒绝支付</button>';
        }

        return result;
    }

    function edit(id,name){
        var index = layer.open({
            type: 2,
            title: "查看详情["+name+']',
            area:['100%','100%'],
            content: "{:url('admin/shopping/order_detail')}&id="+id
        });
        // layer.full(index);
    }

    function save(title) {
        var index = layer.open({
            type: 2,
            title: '新增活动',
            area:['100%','100%'],
            content: "{:url('admin/shopping/save_activity')}"
        });
        // layer.full(index);
    }

    function openWindow(id,title){
        url = "{:Url('admin/shopping/value_list')}";
        if(url!=''){
            var index = layer.open({
                type: 2,
                title: title,
                area:['100%','100%'],
                content: url+'&pid='+id+'&name='+title
            });
        }
    }


    function del(id,title,type){
        let msg = '';
        if(type==1){
            msg = '确认拒绝该订单['+title+']支付吗？';
        }
        else if(type==2){
            msg = '确认允许该订单['+title+']支付吗？';
        }
        layer.confirm(msg,function(index){
            $.ajax({
                url: "<?php echo Url('admin/shopping/refuse_order'); ?>",
                data:{'id':id,'type':type},
                type:'post',
                cache:false,
                dataType:'json',
                success:function(data){
                    if(data.code==0)
                    {
                        layer.msg(data.msg, {
                            icon: 1,
                            time: 2000
                        }, function(){
                            window.location.reload();
                        });
                        return true;
                    }else {
                        layer.msg(data.msg, {icon:2, time:2000});
                        return false;
                    }
                },
                error:function() {
                    layer.msg('系统出错,请重试',{icon:2,time:1000});
                }
            });
        });
    }

</script>

</body>
</html>
