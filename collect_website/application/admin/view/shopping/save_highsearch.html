{include file="common/header_inner_new"}
<style>
    .disf{display:flex;align-items: center;}
    .layui-card-header{background:#0a8ddf;color:#fff;}
</style>
<body style="padding: 10px;background-color: #f2f2f2;">
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <form class="layui-form" action="" method="post" lay-filter="component-form-element">
            <input type="hidden" name="id" value="{$id}">
            <div class="layui-col-md12">
                <div class="layui-card">
                    <div class="layui-card-body">
                        <div class="layui-form-item">
                            <div class="layui-form-label">项目名称</div>
                            <div class="layui-input-block">
                                <input type="text" class="layui-input" lay-verify="required" name="name" id="name" value="{$data['name']}">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">类型</div>
                            <div class="layui-input-block">
                                <select name="type" lay-filter="type">
                                    <option value="0" {if $data['type']==0}selected{/if}>跳转搜索弹窗</option>
                                    <option value="1" {if $data['type']==1}selected{/if}>跳转首页板块</option>
                                </select>
                            </div>
                        </div>
                        <div class="layui-form-item guide_div" style="display: {if $data['type']==1}block{else}none{/if};">
                            <div class="layui-form-label">选择首页板块</div>
                            <div class="layui-input-block">
                                <select name="guide_id">
                                    {volist name="guide" id="vo"}
                                    <option value="{$vo['id']}" {if $vo['id']==$data['guide_id']}selected{/if}>{$vo['name']}</option>
                                    {/volist}
                                </select>
                            </div>
                        </div>
                        <div class="layui-form-item" style="display: none;">
                            <div class="layui-form-label">选择条件</div>
                            <div class="layui-input-block">
                                <div class="disf">
                                    <div id="menus" class="xm-select-demo" style="width: 300px;"></div>
                                    <div class="diycolumn" onclick="diycolumn()" style="margin-left:15px;font-size: 15px;cursor:pointer;text-decoration: underline;">自定字段&gt;</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="layui-form-item" style="margin-top: 25px;text-align: center;">
                <div>
                    <button class="layui-btn layui-btn-normal" lay-submit lay-filter="component-form-element2">立即保存</button>
                    <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                </div>
            </div>
        </form>
    </div>
</div>
</body>
<script src="./static/hadmin/assets/layui/xm-select.js"></script>
<script type="text/javascript">
    layui.use(['layer','form','upload'],function(){
        var laydate = layui.laydate
            ,layer = layui.layer
            ,form  = layui.form
            ,$ = layui.jquery
            ,upload = layui.upload;

        xmSelect.render({
            name:'content',
            el: '#menus',
            autoRow: true, //自动换行
            filterable: true, //可搜索
            model: {
                icon: 'hidden',//是否展示复选框或者单选框图标 show, hidden:变换背景色  ！！这句话是重点，不然会变成父节点也有单选框！！
            },
            tree: {
                show: true, //用树显示
                showFolderIcon: true, //是否显示节点前的三角图标
                expandedKeys: true, //默认全部展开
                showLine: true, //显示渐近线
                indent: 20, //间距
                strict: false, //重点！！设置成非严格父子模式，这样父节点被禁用，子节点依然可以点击
            },
            toolbar: {
                show: true, //显示工具条
                list: ['ALL', 'REVERSE', 'CLEAR']
            },
            height: '300px', //最大下拉框高度
            data: {$column},
            initValue:[{$data["content"]}]
        });

        form.on('select(type)',function(data){
            let val = data.value;

            if(val==0){
                $('.guide_div').hide();
            }else{
                $('.guide_div').show();
            }
        });

        form.on('submit(component-form-element2)', function(data){
            // JSON.stringify()
            // console.log(data.field);return false;

            $.ajax({
                url:"{:Url('admin/shopping/save_highsearch')}",
                method:'post',
                data:data.field,
                dataType:'JSON',
                success:function(res){
                    layer.msg(res.msg,{time:2000}, function () {
                        if(res.code == 0)
                        {
                            parent.location.reload();
                        }
                    });
                },
                error:function (data) {
                    layer.msg('系统错误',{time:2000});
                }
            });
            return false;
        });
    });

    function diycolumn(){
        url = "{:Url('admin/shopping/column_manage')}";
        if(url!=''){
            var index = layer.open({
                type: 2,
                title: '字段管理',
                area:['100%','100%'],
                content: url
            });
        }
    }

    function delPic(obj)
    {
        var layer = layui.layer,$ = layui.$;
        layer.confirm('确认要删除该附件？', {
            btn: ['删除','取消']
        }, function(){
            $(obj).parent().remove();
            layer.closeAll();
        }, function(){

        });
    }

</script>
</body>
</html>
