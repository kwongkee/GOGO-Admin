{include file="common/header_inner_new"}
<style>

</style>
<!--百度富文本-->
<script type="text/javascript" src="static/cklein/plugins/ueditor/ueditor.config.js"></script>
<script type="text/javascript" src="static/cklein/plugins/ueditor/ueditor.all.min.js"> </script>
<script type="text/javascript" src="static/cklein/plugins/ueditor/lang/zh-cn/zh-cn.js"></script>

<body style="padding:15px;box-sizing: border-box;">
<form class="layui-form" action="">
    <div class="layui-form-item">
        <div class="layui-form-label">网站小标志(200*200)</div>
        <div class="layui-input-block">
            <div class="layui-upload" style="margin-top: 10px;">
                <button type="button" class="layui-btn" id="slogo_file-upload">上传图片(一张)</button>
                <blockquote class="layui-elem-quote layui-quote-nm yulan" style="margin-top: 10px;">
                    预览图：
                    <div class="layui-upload-list" id="slogo_file-upload-list">
                        {if !empty($data['slogo'])}
                        <div style="display: inline-block;">
                            <img onclick="seePic(this);" src="/{$data['slogo']}" class="layui-upload-img" style="width:80px;height:80px;">
                            <button type="button" onclick="delPic(this);" class="layui-btn layui-btn-xs layui-btn-danger" style="position: relative;left: -45px;top: -39px;">删除</button>
                            <input type="hidden" name="slogo_file[]" value="{$data['slogo']}">
                        </div>
                        {/if}
                    </div>
                </blockquote>
            </div>
        </div>
    </div>
    <div class="layui-form-item">
        <div class="layui-form-label">网站标志(125*55)</div>
        <div class="layui-input-block">
            <div class="layui-upload" style="margin-top: 10px;">
                <button type="button" class="layui-btn" id="logo_file-upload">上传图片(一张)</button>
                <blockquote class="layui-elem-quote layui-quote-nm yulan" style="margin-top: 10px;">
                    预览图：
                    <div class="layui-upload-list" id="logo_file-upload-list">
                        {if !empty($data['logo'])}
                        <div style="display: inline-block;">
                            <img onclick="seePic(this);" src="/{$data['logo']}" class="layui-upload-img" style="width:80px;height:80px;">
                            <button type="button" onclick="delPic(this);" class="layui-btn layui-btn-xs layui-btn-danger" style="position: relative;left: -45px;top: -39px;">删除</button>
                            <input type="hidden" name="logo_file[]" value="{$data['logo']}">
                        </div>
                        {/if}
                    </div>
                </blockquote>
            </div>
        </div>
    </div>
    <div class="layui-form-item" style="display: none;">
        <div class="layui-form-label">首页背景图<br/>(896*1344)</div>
        <div class="layui-input-block">
            <div class="layui-upload" style="margin-top: 10px;">
                <button type="button" class="layui-btn" id="inpic_file-upload">上传图片(一张)</button>
                <blockquote class="layui-elem-quote layui-quote-nm yulan" style="margin-top: 10px;">
                    预览图：
                    <div class="layui-upload-list" id="inpic_file-upload-list">
                        {if !empty($data['inpic'])}
                        <div style="display: inline-block;">
                            <img onclick="seePic(this);" src="/{$data['inpic']}" class="layui-upload-img" style="width:80px;height:80px;">
                            <button type="button" onclick="delPic(this);" class="layui-btn layui-btn-xs layui-btn-danger" style="position: relative;left: -45px;top: -39px;">删除</button>
                            <input type="hidden" name="inpic[]" value="{$data['inpic']}">
                        </div>
                        {/if}
                    </div>
                </blockquote>
            </div>
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">网站名称</label>
        <div class="layui-input-block">
            <input type="text" name="name" value="{$data['name']}"  lay-verify="required" placeholder="请输入网站名称" autocomplete="off" class="layui-input">
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">网站描述</label>
        <div class="layui-input-block">
            <input type="text" name="desc" value="{$data['desc']}"  lay-verify="required" placeholder="请输入网站描述" autocomplete="off" class="layui-input">
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">网站关键词</label>
        <div class="layui-input-block">
            <input type="text" name="keywords" value="{$data['keywords']}"  lay-verify="required" placeholder="请输入网站关键词" autocomplete="off" class="layui-input">
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">客服电话</label>
        <div class="layui-input-block">
            <input type="text" name="mobile" value="{$data['mobile']}"  lay-verify="required" placeholder="请输入客服电话" autocomplete="off" class="layui-input">
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">客服电邮</label>
        <div class="layui-input-block">
            <input type="text" name="email" value="{$data['email']}"  lay-verify="required" placeholder="请输入客服电邮" autocomplete="off" class="layui-input">
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">服务时间</label>
        <div class="layui-input-block">
            <input type="text" name="service_time" value="{$data['service_time']}"  lay-verify="required" placeholder="请输入服务时间" autocomplete="off" class="layui-input">
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">加入我们</label>
        <div class="layui-input-block">
            <input type="text" name="join_us" value="{$data['join_us']}"  lay-verify="required" placeholder="请输入加入我们链接" autocomplete="off" class="layui-input">
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">服务协议</label>
        <div class="layui-input-block">
            <select name="service_rule" lay-search>
                <option value="">请选择</option>
                {volist name="rule" id="vo"}
                <option value="{$vo['id']}" {if $data['service_rule']==$vo['id']}selected{/if}>{$vo['rule_name']}</option>
                {/volist}
            </select>
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">私隐声明</label>
        <div class="layui-input-block">
            <select name="privacy_rule" lay-search>
                <option value="">请选择</option>
                {volist name="rule" id="vo"}
                <option value="{$vo['id']}" {if $data['privacy_rule']==$vo['id']}selected{/if}>{$vo['rule_name']}</option>
                {/volist}
            </select>
        </div>
    </div>

    <div class="layui-form-item" style="display: none;">
        <div class="layui-form-label">关于我们</div>
        <div class="layui-input-block">
            <script id="introduce" name="content[introduce]" type="text/plain" style="width:100%;height:100px;">
                {if !empty($data['content']['introduce'])}
                    {$data['content']['introduce']|htmlspecialchars_decode|stripslashes}
                {/if}
            </script>
            <div class="clearfix"></div>
        </div>
    </div>
    <div class="layui-form-item">
        <div class="layui-form-label">帮助中心</div>
        <div class="layui-input-block">
            <script id="help" name="content[help]" type="text/plain" style="width:100%;height:100px;">
                {if !empty($data['content']['help'])}
                    {$data['content']['help']|htmlspecialchars_decode|stripslashes}
                {/if}
            </script>
            <div class="clearfix"></div>
        </div>
    </div>
    <div class="layui-form-item">
        <div class="layui-form-label">版权信息</div>
        <div class="layui-input-block">
            <script id="copyright" name="copyright" type="text/plain" style="width:100%;height:100px;">
                {if !empty($data['copyright'])}
                    {$data['copyright']|htmlspecialchars_decode|stripslashes}
                {/if}
            </script>
            <div class="clearfix"></div>
        </div>
    </div>

    <div class="layui-form-item">
        <div class="layui-input-block">
            <button class="layui-btn" lay-submit lay-filter="formDemo">立即提交</button>
        </div>
    </div>
</form>

<script>
    //Demo
    layui.use(['layer','form','laydate','upload','colorpicker'], function(){
        var laydate = layui.laydate;
        var layer = layui.layer;
        var form  = layui.form;
        var $ = layui.jquery;
        var upload = layui.upload;
        var colorpicker = layui.colorpicker;

        UE.getEditor('introduce', {
            initialFrameHeight: 200,
            serverUrl: 'static/cklein/plugins/ueditor/php/controller.php',
        });
        UE.getEditor('copyright', {
            initialFrameHeight: 200,
            serverUrl: 'static/cklein/plugins/ueditor/php/controller.php',
        });
        UE.getEditor('help', {
            initialFrameHeight: 200,
            serverUrl: 'static/cklein/plugins/ueditor/php/controller.php',
        });

        setTimeout(function(){
            console.log($('#edui1').find('body'));
            $('#edui1').find('body').css('background','#666');
        },3000);

        //监听提交
        form.on('submit(formDemo)', function(data){
            $.ajax({
                url:"{:Url('admin/shopping/base_setting')}",
                type:"POST",
                dataType:"json",
                data:data.field,
                success:function (res) {
                    layer.msg(res.msg);
                    if(res.code==0){
                        setTimeout(function () {
                            window.location.reload();
                        },2000);
                    }

                },
                error:function (xhr) {
                    layer.msg('链接服务错误..');
                }
            });
            return false;
        });

        upload.render({
            elem: '#slogo_file-upload'
            ,url: '{:Url("admin/basic/upload_file")}'
            ,accept: 'file'
            ,data: { folder: 'centralize', type: 'website_index'}
            ,multiple: false
            ,number:1
            ,before: function(obj){
                layer.load(); //上传loading
            }
            ,done: function(res){
                layer.closeAll('loading'); //关闭loading
                if(res.code == 1)
                {

                    $('#slogo_file-upload-list').append('<div style="display: inline-block;"><img onclick="seePic(this);" src="/'+ res.file_path +'" class="layui-upload-img" style="width:80px;height:80px;"><button type="button" onclick="delPic(this);" class="layui-btn layui-btn-xs layui-btn-danger" style="position: relative;left: -45px;top: -39px;">删除</button><input type="hidden" name="slogo_file[]" value="'+res.file_path+'"></div>')
                }
            }
        });

        // 轮播图内页文件
        upload.render({
            elem: '#logo_file-upload'
            ,url: '{:Url("admin/basic/upload_file")}'
            ,accept: 'file'
            ,data: { folder: 'centralize', type: 'website_index'}
            ,multiple: false
            ,number:1
            ,before: function(obj){
                layer.load(); //上传loading
            }
            ,done: function(res){
                layer.closeAll('loading'); //关闭loading
                if(res.code == 1)
                {

                    $('#logo_file-upload-list').append('<div style="display: inline-block;"><img onclick="seePic(this);" src="/'+ res.file_path +'" class="layui-upload-img" style="width:80px;height:80px;"><button type="button" onclick="delPic(this);" class="layui-btn layui-btn-xs layui-btn-danger" style="position: relative;left: -45px;top: -39px;">删除</button><input type="hidden" name="logo_file[]" value="'+res.file_path+'"></div>')
                }
            }
        });

        upload.render({
            elem: '#inpic_file-upload'
            ,url: '{:Url("admin/basic/upload_file")}'
            ,accept: 'file'
            ,data: { folder: 'centralize', type: 'website_index'}
            ,multiple: false
            ,number:1
            ,before: function(obj){
                layer.load(); //上传loading
            }
            ,done: function(res){
                layer.closeAll('loading'); //关闭loading
                if(res.code == 1)
                {

                    $('#inpic_file-upload-list').append('<div style="display: inline-block;"><img onclick="seePic(this);" src="/'+ res.file_path +'" class="layui-upload-img" style="width:80px;height:80px;"><button type="button" onclick="delPic(this);" class="layui-btn layui-btn-xs layui-btn-danger" style="position: relative;left: -45px;top: -39px;">删除</button><input type="hidden" name="inpic[]" value="'+res.file_path+'"></div>')
                }
            }
        });

        // 轮播图内页文件
        upload.render({
            elem: '#banner_file-upload'
            ,url: '{:Url("admin/basic/upload_file")}'
            ,accept: 'file'
            ,data: { folder: 'centralize', type: 'gather_index'}
            ,multiple: false
            ,number:1
            ,before: function(obj){
                layer.load(); //上传loading
            }
            ,done: function(res){
                layer.closeAll('loading'); //关闭loading
                if(res.code == 1)
                {

                    $('#banner_file-upload-list').append('<div style="display: inline-block;"><img onclick="seePic(this);" src="/'+ res.file_path +'" class="layui-upload-img" style="width:80px;height:80px;"><button type="button" onclick="delPic(this);" class="layui-btn layui-btn-xs layui-btn-danger" style="position: relative;left: -45px;top: -39px;">删除</button><input type="hidden" name="banner_file[]" value="'+res.file_path+'"></div>')
                }
            }
        });

    });

    function delPic(obj)
    {
        var layer = layui.layer,$ = layui.$;
        layer.confirm('确认要删除该附件？', {
            btn: ['删除','取消']
        }, function(){
            $(obj).parent().remove();
            layer.closeAll();
        }, function(){

        });
    }
</script>
</body>
</html>
