{include file="common/header_inner_new"}
<style>
    .disf{display:flex;align-items: center;}
    .layui-card-header{background:#0a8ddf;color:#fff;}
</style>
<body style="padding: 10px;background-color: #f2f2f2;">
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <form class="layui-form" action="" method="post" lay-filter="component-form-element">
            <input type="hidden" name="id" value="{$id}">
            <div class="layui-col-md12">
                <div class="layui-card">
                    <div class="layui-card-body">
                        <div class="layui-form-item">
                            <div class="layui-form-label">开始时段</div>
                            <div class="layui-input-block">
                                <input type="text" class="layui-input" lay-verify="required" name="start" id="start" value="{$data['start']}" placeholder="请输入开始时间段">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">结束时段</div>
                            <div class="layui-input-block">
                                <input type="text" class="layui-input" lay-verify="required" name="end" id="end" value="{$data['end']}" placeholder="请输入结束时间段">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">类型</div>
                            <div class="layui-input-block">
                                <select name="type">
                                    <option value="1" {if $data['type']==1}selected{/if}>当日</option>
                                    <option value="2" {if $data['type']==2}selected{/if}>次日</option>
                                </select>
                            </div>
                        </div>
                        <div class="layui-form-item content">
                            <div class="layui-form-label">响应时段</div>
                            <div class="layui-input-block">
                                <input type="text" class="layui-input" name="fast" id="fast" value="{$data['fast']}" placeholder="最快响应时段">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="layui-form-item" style="margin-top: 25px;text-align: center;">
                <div>
                    <button class="layui-btn layui-btn-normal" lay-submit lay-filter="component-form-element2">立即保存</button>
                    <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                </div>
            </div>
        </form>
    </div>
</div>
</body>

<script type="text/javascript">
    layui.use(['layer','form','upload'],function(){
        var laydate = layui.laydate
            ,layer = layui.layer
            ,form  = layui.form
            ,$ = layui.jquery
            ,upload = layui.upload;

        form.on('submit(component-form-element2)', function(data){
            // JSON.stringify()
            // console.log(data.field);return false;

            $.ajax({
                url:"{:Url('admin/shopping/save_timeinterval')}",
                method:'post',
                data:data.field,
                dataType:'JSON',
                success:function(res){
                    layer.msg(res.msg,{time:2000}, function () {
                        if(res.code == 0)
                        {
                            parent.location.reload();
                        }
                    });
                },
                error:function (data) {
                    layer.msg('系统错误',{time:2000});
                }
            });
            return false;
        });
    });

    function delPic(obj)
    {
        var layer = layui.layer,$ = layui.$;
        layer.confirm('确认要删除该附件？', {
            btn: ['删除','取消']
        }, function(){
            $(obj).parent().remove();
            layer.closeAll();
        }, function(){

        });
    }

</script>
</body>
</html>
