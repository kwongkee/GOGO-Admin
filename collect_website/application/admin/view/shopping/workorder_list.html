<script>
    var table;

    $(document).ready(function(){
        table = $('#table').bootstrapTable({
            url: "{:url('admin/shopping/workorder_list')}&pa=1&status=0",
            queryParams: queryParams,
        });
        table = $('#table2').bootstrapTable({
            url: "{:url('admin/shopping/workorder_list')}&pa=1&status=1",
            queryParams: queryParams,
        });
        $('.form-control').attr('placeholder','搜索角色名称');
    });

    queryParams = function (params) {
        var temp = {
            sort: params.sort,
            order: params.order,
            limit: params.limit,            //页面大小
            offset: params.offset,          //页码
            search: params.search,
            id: {$id}
        };
        return temp;
    };

    //操作栏的格式化
    function actionFormatter(value, row, index) {
        var id = row.id;
        var name = row.gogo_id;

        var result = "";
        // result += '<button style="margin-right: 5px;" type="button" onclick="confirm('+id+',\''+name+'\')" class="btn btn-info btn-xs">确认任务</button>';
        if(row.is_roam!=1){
            result += '<button style="margin-right: 5px;" type="button" onclick="roam('+id+',\''+name+'\')" class="btn btn-primary btn-xs">流转工单</button>';
        }
        return result;
    }

        //     }

        return result;

    function edit(id,name){
        var index = layer.open({
            type: 2,
            title: '编辑工单-'+name,
            area:['80%','80%'],
            content: "{:url('admin/task/edit_workorder')}&id="+id
        });
    }

    function roam(id,name){
        var index = layer.open({
            type: 2,
            title: '流转工单-'+name,
            area:['80%','80%'],
            content: "{:url('admin/shopping/roam')}&id="+id
        });
        // layer.full(index);
    }

    function confirm(id,title){
        layer.confirm('确认同意该任务吗？',function(index){
            $.ajax({
                url: "<?php echo Url('admin/task/confirm'); ?>",
                data:{'id':id},
                type:'post',
                cache:false,
                dataType:'json',
                success:function(data){
                    if(data.code==0)
                    {
                        layer.msg(data.msg, {
                            icon: 1,
                            time: 2000
                        }, function(){
                            window.location.reload();
                        });
                        return true;
                    }else {
                        layer.msg(data.msg, {icon:2, time:2000});
                        return false;
                    }
                },
                error:function() {
                    layer.msg('系统出错,请重试',{icon:2,time:1000});
                }
            });
        });
    }
