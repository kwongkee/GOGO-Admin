{include file="common/header_new"}

<style>
    .disf{display:flex;align-items: center;}
    img{ width:20px;height:20px;}
</style>
<body class="gray-bg">

<div class="row">
    <div class="col-sm-12">
        <div class="ibox float-e-margins">
            <div class="ibox-content">
                <h3 style="text-align: center;">二级字段管理</h3>
                <div id="toolbar" class="btn-group" style="margin-top: 10px;margin-bottom: 10px;line-height: 34px;">
                    <div class="disf">
                        <button type="button" href="javascript:;" onclick="save();" class="btn btn-default">
                            添加字段
                        </button>

                        <!--                        <button type="button" href="javascript:;" onclick="column_manage();" class="btn btn-default">-->
                        <!--                            字段管理-->
                        <!--                        </button>-->
                    </div>
                </div>
                <table id="table"

                /*默认排序项*/
                data-sort-name="id"
                data-sort-order="desc"
                /*工具栏相关*/
                data-toolbar="#toolbar"
                data-search="false"          /*搜索框*/
                data-search-on-enter-key="false"
                data-show-refresh="true"    /*刷新按钮*/
                /*分页相关*/
                data-side-pagination="server"
                data-pagination="true"      /*显示分页*/
                data-page-size="10"         /*每页显示条数*/
                /*移动端相关*/
                data-mobile-responsive="true"
                data-card-view="true"
                data-show-columns="true"
                /*radio or checkbox字段名称*/
                data-select-item-name="id" >

                <thead>
                <tr>
                    <th data-field="checkbox"
                        data-align="center"
                        data-checkbox="true"></th>
                    <th data-field="id"
                        data-align="center"
                        data-sortable="true"
                        data-visible="true">ID</th>
                    <th data-field="name"
                        data-align="center"
                        data-sortable="true">二级字段名称</th>
                    <th data-field="manage"
                        data-align="center"
                        data-sortable="true"
                        data-formatter="actionFormatter">操作</th>
                </tr>
                </thead>
                </table>
            </div>
        </div>
    </div>
</div>

<script type="text/javascript">

    var table;

    $(document).ready(function(){
        table = $('#table').bootstrapTable({
            url: "{:url('admin/shopping/column_manage2')}",
            queryParams: queryParams,
        });
        $('.form-control').attr('placeholder','搜索新闻名称');
    });

    queryParams = function (params) {
        var temp = {
            sort: params.sort,
            order: params.order,
            limit: params.limit,            //页面大小
            offset: params.offset,          //页码
            search: params.search,
        };
        return temp;
    };

    //操作栏的格式化
    function actionFormatter(value, row, index) {
        var id = row.id;
        var title = row.name;

        var result = "";
        // result += '<button style="margin-right: 5px;" type="button" onclick="openWindow('+id+',\''+title+'\')" class="btn btn-warning btn-xs">属性描述</button>';
        result += '<button style="margin-right: 5px;" type="button" onclick="edit('+id+',\''+title+'\')" class="btn btn-primary btn-xs">编辑</button>';
        result += '<button style="margin-right: 5px;" type="button" onclick="del('+id+',\''+title+'\')" class="btn btn-danger btn-xs">删除</button>';

        return result;
    }

    function edit(id,name){
        var index = layer.open({
            type: 2,
            title: "编辑["+name+']',
            area:['100%','100%'],
            content: "{:url('admin/shopping/save_column2')}&id="+id
        });
        // layer.full(index);
    }

    function save(title) {
        var index = layer.open({
            type: 2,
            title: '添加字段',
            area:['100%','100%'],
            content: "{:url('admin/shopping/save_column2')}"
        });
        // layer.full(index);
    }

    function del(id,title){
        let msg = '';
        layer.confirm('确认删除该字段“'+title+'”吗？',function(index){
            $.ajax({
                url: "<?php echo Url('admin/shopping/del_column2'); ?>",
                data:{'id':id},
                type:'post',
                cache:false,
                dataType:'json',
                success:function(data){
                    if(data.code==0)
                    {
                        layer.msg(data.msg, {
                            icon: 1,
                            time: 2000
                        }, function(){
                            window.location.reload();
                        });
                        return true;
                    }else {
                        layer.msg(data.msg, {icon:2, time:2000});
                        return false;
                    }
                },
                error:function() {
                    layer.msg('系统出错,请重试',{icon:2,time:1000});
                }
            });
        });
    }

</script>

</body>
</html>
