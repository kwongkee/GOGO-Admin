<script type="text/javascript">
    layui.use(['layer','form','laydate','upload','element'],function(){
        var laydate = layui.laydate,
            layer = layui.layer,
            form  = layui.form,
            $ = layui.jquery,
            upload = layui.upload,
            element = layui.element;

        $('.lang-select').chosen();
        
        form.render(null, 'component-form-element');

        form.on('select(chat_user)',function(data){
           let val = data.value;
            // let indexs = layer.index;
            // layer.close(indexs);
            // layer.open({
            //     type: 2,
            //     title: '查看详情',
            //     area:['100%','100%'],
            //     content: "{:Url('admin/shopping/read_chat')}&uid="+val
            // });
           // console.log("{:Url('admin/shopping/read_chat')}&id=0&uid="+val);
           window.location.href="{:Url('admin/shopping/read_chat')}&id=0&uid_new="+val;
           return false;
        });

        chat();

        // var ue = UE.getEditor('content_chat', {
        //     initialFrameHeight: 400,
        //     serverUrl: 'static/cklein/plugins/ueditor/php/controller.php'
        // });

        /* 监听提交聊天记录 */
        form.on('submit(component-form-demo1)', function (data) {
            data.field['content_type'] = 1;
            data.field['pa'] = 1;
            data.field['who_send'] = "{$who_send}";

            if (data.field['content'] == '') {
                layer.msg('请输入内容！');
                return false;
            }

            data.field['quote_text'] = '';
            if($('.chatContent').find('.leftBtm').length>0){
                data.field['quote_text'] = $('.chatContent').find('.leftBtm').find('.quoteBox').find('.quote_info').text();
            }

            $.ajax({
                url: "{:Url('admin/shopping/read_chat')}",
                method: 'post',
                data: data.field,
                dataType: 'JSON',
                success: function (res) {
                    layer.msg(res.msg, {time: 2000}, function () {
                        if (res.code == 0) {
                            chat();
                            $('#content').val("");
                            $('.chatContent').find('.leftBtm').remove();
                        }
                    });
                },
                error: function (data) {
                    layer.msg('系统错误', {time: 2000});
                }
            });
            return false;
        });

        upload.render({
            elem: '#fileUpload'
            ,url: '{:Url("api/uploadfile/index")}'
            ,accept: 'file'
            ,data: { folder: 'shopping', type: 'advice'}
            ,multiple: false
            ,number:1
            ,before: function(obj){
                layer.load(); //上传loading
            }
            ,done: function(res){
                layer.closeAll('loading'); //关闭loading
                if(res.code == 1)
                {
                    let content = '<a href="https://shop.gogo198.cn/'+ res.file_path +'" target="_blank"><img src="https://shop.gogo198.cn/'+ res.file_path +'" onerror=src="https://shop.gogo198.cn/attachment/images/default_file.png" /></a>';
                    let pid = $('#pid').val();

                    $.ajax({
                        url: "{:Url('admin/shopping/read_chat')}",
                        method: 'post',
                        data: {'pid':pid,'id':"{$id}",'content_type':2,'pa':1,'who_send':"{$who_send}",'content':content},
                        dataType: 'JSON',
                        success: function (res) {
                            layer.msg(res.msg, {time: 2000}, function () {
                                if (res.code == 0) {
                                    chat();
                                }
                            });
                        },
                        error: function (data) {
                            layer.msg('系统错误', {time: 2000});
                        }
                    });
                }
            }
        });
    });

    function selectLang2(t){
        var $ = layui.$
            , layer = layui.layer;
        
        let val = $(t).val();
        if(val!=''){
            let oriCon = $('#content').val();
            oriCon += val;
            $('#content').val(oriCon);   
        }
    }
    
    function chat(){
        var $ = layui.$
            , layer = layui.layer
            , form = layui.form
            , laydate = layui.laydate;
        let html = '';
        let who_send="{$who_send}";

        $.ajax({
            url: "{:Url('admin/shopping/read_chat')}",
            method: 'post',
            data: {'pa':2,'who_send':who_send,'id':'{$id}','uid_new':'{$uid_new}'},
            dataType: 'JSON',
            success: function (res) {
                if(res.data.length>0){
                    $('#pid').val(res.pid);
                    for(let i=0;i<res.data.length;i++){
                        html += '             <div class="center">'+res.data[i].time+'</div>\n';
                        for(let i2=0;i2<res.data[i].info.length;i2++) {
                            if (res.data[i].info[i2]['who_send'] == who_send) {
                                html += '                <div class="conatact_info layui-col-xs12">\n';
                                if(res.data[i].info[i2]['is_withdraw']==1){
                                    html += '<p class="withdraw_txt">您撤回了一条消息</p>';
                                }else {
                                    html += '                            <div class="right disflex">\n';
                                    if (res.data[i].info[i2]['quote_text'] != null) {
                                        html += '                                <div class="my_txt" style="margin-bottom:15px;">\n';
                                    } else {
                                        html += '                                <div class="my_txt">\n';
                                    }
                                    if (res.data[i].info[i2]['quote_text'] != null) {
                                        html += '                          <div class="quoteBtm">\n' +
                                            '                                 <div class="quoteBox">\n' +
                                            '                                    <div class="quote_info">' + res.data[i].info[i2]['quote_text'] + '</div>\n' +
                                            '                                 </div>\n' +
                                            '                              </div>';
                                    }
                                    html += '                             <div class="chatlog">' + res.data[i].info[i2]['content'] + '</div>';

                                    html += '                            <div class="toolbar disf">\n' +
                                        '                                 <div class="quote toolbarImg" onclick="quoteInfo(this,' + res.data[i].info[i2]['id'] + ')"><img src="static/img/chat_quote.png"></div>\n';
                                    if (res.data[i].info[i2]['is_read'] == 0) {
                                        html += '                                 <div class="withdraw toolbarImg" onclick="withdrawInfo(this,' + res.data[i].info[i2]['id'] + ')"><img src="static/img/chat_withdraw.png"></div>';
                                    }
                                    html += '                            </div>\n';
                                    html += '                            <div class="disf time_info">\n' +
                                        '                                        <div class="time">' + res.data[i].info[i2]['createtime'] + '</div>\n' +
                                        '                                        <div class="status disf">\n';
                                    html += '                               <div class="check-style-unequal-width" style="margin-right:3px;"></div>\n';
                                    if (res.data[i].info[i2]['is_read'] == 0) {
                                        <!--对方未收到-->
                                        html += '                               <div class="check-style-unequal-width2-1" style="margin-right:3px;"></div>\n';
                                    } else if (res.data[i].info[i2]['is_read'] == 1) {
                                        html += '                               <div class="check-style-unequal-width2" style="margin-right:3px;"></div>\n';
                                    }
                                    html += '                                 </div>\n' +
                                        '                                    </div>\n';
                                    html += '                           </div>\n' +
                                        '                            </div>\n'+
                                        '                            <div class="kefu">'+res.data[i].info[i2]['kefu_name']+'</div>\n';
                                }
                                html += '                     </div>\n';
                            }
                            else if (res.data[i].info[i2]['who_send'] == 2) {
                                html += '                       <div class="conatact_info layui-col-xs12">\n';
                                if(res.data[i].info[i2]['is_withdraw']==1){
                                    html += '<p class="withdraw_txt">对方撤回了一条消息</p>';
                                }else {
                                    html += '                            <div class="left">\n';
                                    if (res.data[i].info[i2]['quote_text'] != null) {
                                        html += '                                <div class="my_txt" style="margin-bottom:15px;">\n';
                                    } else {
                                        html += '                                <div class="my_txt">\n';
                                    }
                                    if (res.data[i].info[i2]['quote_text'] != null) {
                                        html += '                          <div class="quoteBtm">\n' +
                                            '                                 <div class="quoteBox">\n' +
                                            '                                    <div class="quote_info">' + res.data[i].info[i2]['quote_text'] + '</div>\n' +
                                            '                                 </div>\n' +
                                            '                              </div>';
                                    }
                                    html += '                              <div class="chatlog">' + res.data[i].info[i2]['content'] + '</div>\n' +
                                        '                                    <div class="toolbar disf">\n' +
                                        '                                         <div class="quote toolbarImg" onclick="quoteInfo(this,' + res.data[i].info[i2]['id'] + ')"><img src="static/img/chat_quote.png"></div>\n' +
                                        '                            <div class="moreDiv">\n' +
                                        '                                 <img src="/collect_website/public/static/images/more.png" alt="" onclick="moreOpera(this)">\n'+
                                        '                                 <div class="moreContent">\n' +
                                        '                                           <div class="moreCon">\n' +
                                        '                                                <div class="moreChildname" onclick="showMoreChild(this)">详情</div>\n' +
                                        '                                                <div class="childDiv">\n' +
                                        '                                                     <div class="backDiv" onclick="hideMoreChild(this)">&lt;返回上级</div>\n'+
                                        '                                                     <div class="Childname" onclick="moreDetail(this,'+res.data[i].info[i2]['uid']+','+res.data[i].info[i2]['id']+',1)">会员详情</div>\n' +
                                        '                                                     <div class="Childname" onclick="moreDetail(this,'+res.data[i].info[i2]['uid']+','+res.data[i].info[i2]['id']+',2)">详情链接</div>\n' +
                                        '                                                </div>\n' +
                                        '                                           </div>\n' +
                                        '                                           <div class="moreCon">\n' +
                                        '                                                <div class="moreChildname" onclick="showMoreChild(this)">转发</div>\n' +
                                        '                                                <div class="childDiv">\n' +
                                        '                                                     <div class="backDiv" onclick="hideMoreChild(this)">&lt;返回上级</div>\n'+
                                        '                                                     <div class="Childname" onclick="moreDetail(this,'+res.data[i].info[i2]['uid']+','+res.data[i].info[i2]['id']+',3)">直接转发</div>\n' +
                                        '                                                     <div class="Childname" onclick="moreDetail(this,'+res.data[i].info[i2]['uid']+','+res.data[i].info[i2]['id']+',4)">编辑转发</div>\n' +
                                        '                                                </div>\n' +
                                        '                                           </div>\n' +
                                        '                                           <div class="moreCon">\n' +
                                        '                                                <div class="moreChildname" onclick="showMoreChild(this,1)">记录</div>\n' +
                                        '                                           </div>\n' +
                                        '                                 </div>\n'+
                                        '                            </div>\n'+
                                        '                                    </div>\n' +
                                        '                                    <div class="disf time_info">\n' +
                                        '                                        <div class="time">' + res.data[i].info[i2]['createtime'] + '</div>\n' +
                                        '                                    </div>\n';
                                    html += '                        </div>\n' +
                                        '                         </div>\n';
                                }
                                html += '                      </div>\n';
                            }
                        }
                    }
                }else{
                    $('.chat_content').html('');
                }
                if(html != ''){
                    $('.chat_content').html(html);
                }

                let conatact_height = 0;
                for(let i=0;i<$('.conatact_info').length;i++){
                    conatact_height += $('.conatact_info').eq(i).height();
                }
                for(let i=0;i<$('.chatBox_con').find('.chat_content').find('.center').length;i++){
                    conatact_height += $('.chatBox_con').find('.chat_content').find('.center').eq(i).height();
                }

                // let height = $('.chat_content .center').height() + conatact_height;
                // $('.chat_content').scrollTop(conatact_height, -1);
                setTimeout(function(){
                    $('.chat_content').scrollTop($('.chat_content')[0].scrollHeight, -1);
                },100);

                form.on(null,'component-form-group');

                //文件组渲染
                if(res.datas.file.length>0){
                    var fileHtml = '';
                    for(let i=0;i<res.datas.file.length;i++){
                        fileHtml += '<div class="fileDiv">\n'+
                            res.datas.file[i]+
                                    '</div>';
                    }
                    $('.files').html(fileHtml);
                }
            }
        });
        // console.log(idx,template_name);
    }

    //引用
    function quoteInfo(t,id){
        var $ = layui.$
            , layer = layui.layer;

        let txt = $(t).parents(":eq(2)").find('.chatlog').text();
        if(txt=='' || typeof(txt)=='undefined'){
            let file_name = $(t).parents(":eq(2)").find('.chatlog').find('a').attr('href');
            file_name = file_name.split('/');
            txt = 'File：'+file_name[8];
        }

        if($('.chatContent').find('.leftBtm').length>0){
            let html = '<div class="quoteBox">\n'+
                '            <div class="quote_info">'+txt+'</div>\n'+
                '            <div class="close" onclick="chatClose(this)"><div class="closeBtn">×</div></div>\n'+
                '       </div>\n';
            $('.chatContent').find('.leftBtm').html(html);
        }else{
            let html = '<div class="leftBtm">\n'+
                '   <div class="quoteBox">\n'+
                '    <div class="quote_info">'+txt+'</div>\n'+
                '    <div class="close" onclick="chatClose(this)"><div class="closeBtn">×</div></div>\n'+
                '   </div>\n'+
                '</div>';
            $('.chatContent').find('.chatrBox').append(html);
        }
    }

    function chatClose(t){
        var $ = layui.$
            , layer = layui.layer;

        $(t).parents(':eq(1)').remove();
    }

    //撤回
    function withdrawInfo(t,id){
        var $ = layui.$
            , layer = layui.layer;

        if(id>0){
            var confirm_div = layer.confirm('确定要撤回此消息吗？', {
                btn: ['确定','取消']
            }, function(){
                $.ajax({
                    url: "{:Url('admin/shopping/read_chat')}",
                    method: 'post',
                    data: {'pa': 3, 'id': id},
                    dataType: 'JSON',
                    success: function (res) {
                        if(res.code==0){
                            chat();
                            layer.close(confirm_div);
                        }
                    }
                });
            }, function(){

            });
        }
    }

    //更多详情
    function moreOpera(t){
        var $ = layui.$
            , layer = layui.layer;

        $('.moreContent').hide();

        if($(t).parent().find('.moreContent').hasClass('moreShow')){
            $(t).parent().find('.moreContent').removeClass('moreShow');
            $(t).parent().find('.moreContent').hide();
        }else{
            $(t).parent().find('.moreContent').addClass('moreShow');
            $(t).parent().find('.moreContent').show();
        }
    }

    //显示下级详情
    function showMoreChild(t,type=0){
        var layer = layui.layer,$ = layui.$;
        if(type==1){
            let area = ['50%','50%'];
            if(IsPhone()){
                area = ['100%','100%'];
            }
            var index = layer.open({
                type: 2,
                title: '聊天记录',
                area: area,
                content: "{:Url('admin/shopping/chat_log')}&id={$id}"
            });
        }else{
            $(t).parent().find('.childDiv').show();
            $('.moreChildname').hide();
        }
    }

    function hideMoreChild(t) {
        var layer = layui.layer,$ = layui.$;
        $(t).parent().hide();
        $('.moreChildname').show();
    }

    //详情信息
    function moreDetail(t,uid,id,type){
        var layer = layui.layer,$ = layui.$;
        let area = ['50%','50%'];
        if(IsPhone()){
            area = ['100%','100%'];
        }
        if (type == 1 || type==2) {
            $.ajax({
                url: "{:Url('admin/shopping/read_chat')}",
                method: 'post',
                data: {'pa': 4, 'type': type, 'uid': uid, 'id': id},
                dataType: 'JSON',
                success: function (res) {
                    if (res.code == 0) {
                        var html = '';
                        if (type == 1) {
                            //会员详情
                            html = '<div class="detailDiv">\n' +
                                '   <div class="disf detailCon">\n' +
                                '        <div class="title">网站ID</div>\n' +
                                '        <div class="desc">' + res.data.custom_id + '</div>\n' +
                                '    </div>\n' +
                                '    <div class="disf detailCon">\n' +
                                '        <div class="title">真实名称</div>\n' +
                                '        <div class="desc">' + res.data.realname + '</div>\n' +
                                '    </div>\n' +
                                '    <div class="disf detailCon">\n' +
                                '        <div class="title">网址昵称</div>\n' +
                                '        <div class="desc">' + res.data.nickname + '</div>\n' +
                                '    </div>\n' +
                                '    <div class="disf detailCon">\n' +
                                '        <div class="title">手机号码</div>\n' +
                                '        <div class="desc">' + res.data.phone + '</div>\n' +
                                '    </div>\n' +
                                '    <div class="disf detailCon">\n' +
                                '        <div class="title">邮箱号码</div>\n' +
                                '        <div class="desc">' + res.data.email + '</div>\n' +
                                '    </div>\n' +
                                '</div>';

                            var index = layer.open({
                                type: 1,
                                title: '会员详情',
                                area: area,
                                content: html
                            });
                        } else if (type == 2) {
                            //链接详情
                            window.open(res.data.origin_page);
                        }
                    }
                }
            });
        }else if (type == 3) {
            //直接转发(转发给商户)
            var index = layer.open({
                type: 2,
                title: '直接转发',
                area: area,
                content: "{:Url('admin/shopping/transmit_chat')}&id=" + id + "&type=0"
            });
        } else if (type == 4) {
            //编辑转发
            var index = layer.open({
                type: 2,
                title: '编辑转发',
                area: area,
                content: "{:Url('admin/shopping/transmit_chat')}&id=" + id + "&type=1"
            });
        }
    }

    //切换聊天框
    function switchChat(id,headType){
        window.location.href="{:Url('admin/shopping/read_chat')}&id="+id+"&headType="+headType;
    }

    function delPic(obj)
    {
        var layer = layui.layer,$ = layui.$;
        layer.confirm('确认要删除该附件？', {
            btn: ['删除','取消']
        }, function(){
            $(obj).parent().remove();
            layer.closeAll();
        }, function(){

        });
    }

    function IsPhone() {
        var info = navigator.userAgent;
        var isPhone = /mobile/i.test(info);
        return isPhone;
    }

</script>
</body>
