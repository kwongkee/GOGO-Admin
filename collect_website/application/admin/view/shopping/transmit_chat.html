{include file="common/header_inner_new"}
<!--百度富文本-->
<script type="text/javascript" src="static/cklein/plugins/ueditor/ueditor.config.js"></script>
<script type="text/javascript" src="static/cklein/plugins/ueditor/ueditor.all.min.js"> </script>
<script type="text/javascript" src="static/cklein/plugins/ueditor/lang/zh-cn/zh-cn.js"></script>
<style>
    .disf{display:flex;align-items: center;}
    .layui-card-header{background:#0a8ddf;color:#fff;}
</style>
<body style="padding: 10px;background-color: #f2f2f2;">
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <form class="layui-form" action="" method="post" lay-filter="component-form-element">
            <input type="hidden" name="id" value="{$id}">
            <input type="hidden" name="type" value="{$type}">
            <div class="layui-col-md12">
                <div class="layui-card">
                    <div class="layui-card-body">
                        <div class="layui-form-item">
                            <div class="layui-form-label">商户类型</div>
                            <div class="layui-input-block">
                                <select name="mtype" lay-filter="type" lay-verify="required">
                                    <option value="">请选择</option>
                                    <option value="1">链接商户</option>
                                    <option value="2">其他商户</option>
                                </select>
                            </div>
                        </div>
                        <div class="layui-form-item link_merchant" style="display: none;">
                            <div class="layui-form-label">链接商户</div>
                            <div class="layui-input-block">
                                <select name="merchant1">
                                    {if(!empty($link_merchant))}
                                        <option value="{$link_merchant['id']}">{$link_merchant['realname']}</option>
                                    {else}
                                        <option value="0">无</option>
                                    {/if}
                                </select>
                            </div>
                        </div>
                        <div class="layui-form-item other_merchant" style="display: none;">
                            <div class="layui-form-label">其他商户</div>
                            <div class="layui-input-block">
                                <select name="merchant2" lay-search>
                                    <option value="0">请选择</option>
                                    {volist name="all_merchant" id="vo"}
                                        <option value="{$vo['id']}">{$vo['realname']}</option>
                                    {/volist}
                                </select>
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">转发渠道</div>
                            <div class="layui-input-block">
                                <select name="channel">
                                    <option value="1">消息</option>
                                    <option value="2">邮箱</option>
                                    <option value="3">短信</option>
                                </select>
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-form-label">详情链接</div>
                            <div class="layui-input-block">
                                <input type="text" class="layui-input" name="origin_page" value="{$chatList['origin_page']}">
                            </div>
                        </div>
                        {if $type==1}
                            <div class="layui-form-item">
                                <div class="layui-form-label">编辑信息</div>
                                <div class="layui-input-block">
                                    <textarea name="content" class="layui-textarea">{$chatList['content']}</textarea>
                                </div>
                            </div>
                        {/if}
                    </div>
                </div>
            </div>
            <div class="layui-form-item" style="margin-top: 25px;text-align: center;">
                <div>
                    <button class="layui-btn layui-btn-normal" lay-submit lay-filter="component-form-element2">立即提交</button>
                    <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                </div>
            </div>
        </form>
    </div>
</div>
</body>

<script type="text/javascript">
    layui.use(['layer','form','laydate','upload','colorpicker'],function(){
        var laydate = layui.laydate,
            layer = layui.layer,
            form  = layui.form,
            $ = layui.jquery,
            upload = layui.upload,
            colorpicker = layui.colorpicker;

        form.on('select(type)',function(data){
            let val = data.value;
            if(val==1){
                $('.link_merchant').show();
                $('.other_merchant').hide();
            }else if(val==2){
                $('.link_merchant').hide();
                $('.other_merchant').show();
            }
        });

        form.on('submit(component-form-element2)', function(data){
            // JSON.stringify()
            // console.log(data.field);return false;
            // if( $('#img_file-upload-list').children().length == 0 )
            // {
            //     layer.msg('请上传广告图！');
            //     return false;
            // }

            $.ajax({
                url:"{:Url('admin/shopping/transmit_chat')}",
                method:'post',
                data:data.field,
                dataType:'JSON',
                success:function(res){
                    layer.msg(res.msg,{time:2000}, function () {
                        if(res.code == 0)
                        {
                            parent.location.reload();
                        }
                    });
                },
                error:function (data) {
                    layer.msg('系统错误',{time:2000});
                }
            });
            return false;
        });

        // 左侧栏
        upload.render({
            elem: '#img_file-upload'
            ,url: '{:Url("admin/basic/upload_file")}'
            ,accept: 'image'
            ,data: { folder: 'centralize', type: 'website_index'}
            ,multiple: false
            ,number:1
            ,before: function(obj){
                layer.load(); //上传loading
            }
            ,done: function(res){
                layer.closeAll('loading'); //关闭loading
                if(res.code == 1)
                {

                    $('#img_file-upload-list').append('<div style="display: inline-block;"><img onclick="seePic(this);" src="/'+ res.file_path +'" class="layui-upload-img" style="width:80px;height:80px;"><button type="button" onclick="delPic(this);" class="layui-btn layui-btn-xs layui-btn-danger" style="position: relative;left: -45px;top: -39px;">删除</button><input type="hidden" name="icon[]" value="'+res.file_path+'"></div>');
                }
            }
        });
    });

    function delPic(obj)
    {
        var layer = layui.layer,$ = layui.$;
        layer.confirm('确认要删除该附件？', {
            btn: ['删除','取消']
        }, function(){
            $(obj).parent().remove();
            layer.closeAll();
        }, function(){

        });
    }

</script>
</body>
</html>
