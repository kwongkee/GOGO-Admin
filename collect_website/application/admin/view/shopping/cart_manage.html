{include file="public/header_new"}
<style>
    img{ width:20px;height:20px;}
</style>
<body class="gray-bg">
<div class="row">
    <div class="col-sm-12">
        <div class="ibox float-e-margins">
            <div class="ibox-content">
                <h3 style="text-align: center;">选购单管理</h3>
                <div id="toolbar" class="btn-group" style="margin-top: 10px;margin-bottom: 10px;line-height: 34px;">
<!--                    <button type="button" href="javascript:;" onclick="save();" class="btn btn-default">-->
<!--                        新增支付类别-->
<!--                    </button>-->
                </div>
                <table id="table"

                /*默认排序项*/
                data-sort-name="cart_id"
                data-sort-order="desc"
                /*工具栏相关*/
                data-toolbar="#toolbar"
                data-search="false"          /*搜索框*/
                data-search-on-enter-key="false"
                data-show-refresh="true"    /*刷新按钮*/
                /*分页相关*/
                data-side-pagination="server"
                data-pagination="true"      /*显示分页*/
                data-page-size="10"         /*每页显示条数*/
                /*移动端相关*/
                data-mobile-responsive="true"
                data-card-view="true"
                data-show-columns="true"
                /*radio or checkbox字段名称*/
                data-select-item-name="id" >

                <thead>
                <tr>
<!--                    <th data-field="checkbox"-->
<!--                        data-align="center"-->
<!--                        data-checkbox="true"></th>-->
                    <th data-field="ordersn"
                        data-align="center"
                        data-sortable="true">选购单号</th>
                    <th data-field="buyer_name"
                        data-align="center"
                        data-sortable="true">买家信息</th>
                    <th data-field="goods_name"
                        data-align="center"
                        data-sortable="true">商品名称</th>
                    <th data-field="created_at"
                        data-align="center"
                        data-sortable="true">创建时间</th>
                    <th data-field="manage"
                        data-align="center"
                        data-sortable="true"
                        data-formatter="actionFormatter">操作</th>
                </tr>
                </thead>
                </table>
            </div>
        </div>
    </div>
</div>

<script type="text/javascript">
    var table;

    $(document).ready(function(){
        table = $('#table').bootstrapTable({
            url: "{:url('admin/shopping/cart_manage')}&pa={$pa}",
            queryParams: queryParams,
        });
        $('.form-control').attr('placeholder','搜索仓库名称');
    });

    queryParams = function (params) {
        var temp = {
            sort: params.sort,
            order: params.order,
            limit: params.limit,            //页面大小
            offset: params.offset,          //页码
            search: params.search,
        };
        return temp;
    };

    //操作栏的格式化
    function actionFormatter(value, row, index) {
        var id = row.cart_id;
        var title = row.goods_name;
        var result = '';

        result += '<button style="margin-right: 5px;" type="button" onclick="edit('+id+',\''+title+'\')" class="btn btn-primary btn-xs">查看</button>';

        return result;
    }

    function edit(id,name){
        var index = layer.open({
            type: 2,
            title: '查看-'+name,
            area:['100%','100%'],
            content: "{:url('admin/shopping/cart_detail')}&id="+id
        });
        // layer.full(index);
    }

    function del(id,title){
        layer.confirm('确认删除该支付类别['+title+']吗？',function(index){
            $.ajax({
                url: "<?php echo Url('admin/shopping/del_cashier_category'); ?>",
                data:{'id':id},
                type:'post',
                cache:false,
                dataType:'json',
                success:function(data){
                    if(data.code==0)
                    {
                        layer.msg(data.msg, {
                            icon: 1,
                            time: 2000
                        }, function(){
                            window.location.reload();
                        });
                        return true;
                    }else {
                        layer.msg(data.msg, {icon:2, time:2000});
                        return false;
                    }
                },
                error:function() {
                    layer.msg('系统出错,请重试',{icon:2,time:1000});
                }
            });
        });
    }

</script>
</body>
</html>
