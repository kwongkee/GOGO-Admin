<!DOCTYPE html>
<html>
<head>

    <style type="text/css">
        .btn{width:300px;line-height:40px}

        .diyform .layui-form-item:nth-child(even){margin-left:15px;}

        .layui-btn{

        .page_box .pi-top{color:#000;font-size:23.5pt;font-weight:bold;text-align:center;margin-bottom:3mm;height:fit-content;margin-top:2em;}
        .pi-mid{height:unset !important;}
        .paper{width: 190mm;margin: 0 auto;}
        .p-line2{margin-top:1em;text-indent:2em;padding-left: 0em;font-size: 12pt;width: 185mm;margin-left: 3.8em;}
        .p-line3{width:160mm;margin:0 auto;text-align: right;margin-top:10px;font-size:10.5pt;}
        .p-line4{width: 448pt;margin: 0 auto;text-align: right;font-size: 9pt;margin-top: 1mm;margin-left: 87pt;}
        .p-line5{width:190mm;margin:0 auto;}

        .p-line6{width:190mm;margin:0 auto;display:flex;align-items: baseline;margin-bottom: 3px;}

        .pi-bg{height:unset;}
        .p-line7{width:190mm;margin:0 auto;border-bottom:1px dashed #000;}
        .p-line8{width:165mm;margin:0 auto;font-size:12pt;margin-top:10px;}

            overflow: hidden;

        .one_bar img{width:210px;}
        .two_bar{position:absolute;bottom:39%;left:4%;}

<body style="font-family:宋体;">
<div class="page root">
    <div class="page_box">
        <div id="printId">
            <div class="content">
                
                    <div class="pi-bg" style="background:#999c9e;color: #000;text-align: center;">
                        <div class="express_content">
                            <img src="https://admin.gogo198.cn/collect_website/public{$imgSrc}" alt="">
                            <div class="one_bar">
                                <img id="barcode" />
                            </div>
                            <div class="two_bar">
                                <img id="barcode2" />
                            </div>
                        </div>
                    </div>
                
            </div>
        </div>
    </div>
</div>

<div style="padding: 30px 0;text-align: center;position: fixed;top: 0;right: 3em;">
    <button type="button" style="width: 10em;" class="btn" onclick="createPDF()">生成</button>
</div>

<script src="./static/doc/jquery.min.js"></script>
<script src="./static/doc/html2canvas.min.js"></script>
<script src="./static/doc/jspdf.min.js"></script>
<script src="./static/hadmin/assets/layui/layui.js"></script>
<script src="https://decl.gogo198.cn/barcode/JsBarcode.all.min.js"></script>
<script>
    //条形码生成器
    var barcode = document.getElementById('barcode'),
        str = "{$express_no}",
        options = {
            format: "CODE128",
            displayValue: true,
            fontSize: 18,
            height: 35,
            margin:5
        };
    JsBarcode(barcode, str, options); //原生

    var barcode2 = document.getElementById('barcode2'),
        str2 = "{$express_no}",
        options2 = {
            format: "CODE128",
            displayValue: true,
            fontSize: 18,
            height: 35,
            margin:5
        };
    JsBarcode(barcode2, str2, options2); //原生

    // 生成pdf
    function createPDF() {
        var layer = layui.layer;
        html2canvas(document.querySelector("#printId"), {
            allowTaint: !0,
            scale: 2
        }).then((function(canvas) {

            var contentWidth = canvas.width;
            var contentHeight = canvas.height;

            //一页pdf显示html页面生成的canvas高度;
            var pageHeight = contentWidth / 595.28 * 841.89;
            //未生成pdf的html页面高度
            var leftHeight = contentHeight;
            //pdf页面偏移
            var position = 0;
            //a4纸的尺寸[595.28,841.89]，html页面生成的canvas在pdf中图片的宽高
            var imgWidth = 555.28;
            var imgHeight = 555.28/contentWidth * contentHeight;

            var pageData = canvas.toDataURL('image/jpeg', 1.0);

            var pdf = new jsPDF('', 'pt', 'a4');
            //有两个高度需要区分，一个是html页面的实际高度，和生成pdf的页面高度(841.89)
            //当内容未超过pdf一页显示的范围，无需分页
            if (leftHeight < pageHeight) {
                pdf.addImage(pageData, 'JPEG', 30, 0, imgWidth, imgHeight );
            } else {
                while(leftHeight > 0) {
                    pdf.addImage(pageData, 'JPEG', 30, position, imgWidth, imgHeight)
                    leftHeight -= pageHeight;
                    position -= 841.89;
                    //避免添加空白页
                    if(leftHeight > 0) {
                        pdf.addPage();
                    }
                }
            }

            var pdfName = "物流运单{$express_no}.pdf";
            // 将pdf输入为base格式的字符串
            var buffer = pdf.output("datauristring");
            // 将base64格式的字符串转换为file文件
            var myfile = dataURLtoFile(buffer, pdfName);
            var formdata = new FormData();
            formdata.append('file', myfile);
            formdata.append('folder', 'payer_pay');
            formdata.append('type', 'pi_invoice');

            
            //保存运单
            $.ajax({
                url:"{:url('admin/behalf/update_order_express')}",
                method:'post',
                data:{id:"{$order['id']}",express_no:"{$express_no}"},
                dataType:'JSON',
                success:function(res){
                    // console.log(res);

                },
                error:function (data) {
                    // alert('系统错误');
                }
            });
            pdf.save(pdfName);
        }))
    }

    //将base64转换为文件对象
    function dataURLtoFile(dataurl, filename) {
        var arr = dataurl.split(',');
        var mime = arr[0].match(/:(.*?);/)[1];
        var bstr = atob(arr[1]);
        var n = bstr.length;
        var u8arr = new Uint8Array(n);
        while(n--){
            u8arr[n] = bstr.charCodeAt(n);
        }
        //转换成file对象
        return new File([u8arr], filename, {type:mime});
        //转换成成blob对象
        //return new Blob([u8arr],{type:mime});
    }
</script>

</body>
</html>
